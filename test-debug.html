<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Debug Test</title>
    <style>
        body {
            background: #0a0f1a;
            color: #e2e8f0;
            font-family: monospace;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
        }
        .success { background: rgba(16, 185, 129, 0.2); }
        .error { background: rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>
    <h1>C 语言训练器 - Debug 测试</h1>
    <div id="status"></div>

    <script type="module">
        const statusDiv = document.getElementById('status');
        const logs = [];

        function log(msg, type = 'info') {
            logs.push({msg, type});
            statusDiv.innerHTML = logs.map(l =>
                `<div class="status ${l.type}">${l.type.toUpperCase()}: ${l.msg}</div>`
            ).join('');
        }

        log('开始加载测试...');

        // 测试 1: 检查 React 加载
        try {
            import('http://localhost:5187/node_modules/.vite/deps/react.js?v=11dea6bd')
                .then(() => log('React 加载成功', 'success'))
                .catch(e => log('React 加载失败：' + e.message, 'error'));
        } catch(e) {
            log('React 导入错误：' + e.message, 'error');
        }

        // 测试 2: 检查 main.tsx 加载
        fetch('http://localhost:5187/src/main.tsx')
            .then(r => r.text())
            .then(t => log(`main.tsx 加载成功，大小：${t.length} 字节`, 'success'))
            .catch(e => log('main.tsx 加载失败：' + e.message, 'error'));

        // 测试 3: 检查 App.tsx 加载
        fetch('http://localhost:5187/src/App.tsx')
            .then(r => r.text())
            .then(t => log(`App.tsx 加载成功，大小：${t.length} 字节`, 'success'))
            .catch(e => log('App.tsx 加载失败：' + e.message, 'error'));

        // 测试 4: 检查 lessons.ts 加载
        fetch('http://localhost:5187/src/data/lessons.ts')
            .then(r => r.text())
            .then(t => log(`lessons.ts 加载成功，大小：${t.length} 字节`, 'success'))
            .catch(e => log('lessons.ts 加载失败：' + e.message, 'error'));

        setTimeout(() => {
            if (logs.length === 0) {
                log('5 秒内无响应，可能 Vite 服务器未运行', 'error');
            }
        }, 5000);
    </script>
</body>
</html>
