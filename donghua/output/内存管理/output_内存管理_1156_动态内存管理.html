// 嵌入式系统的堆内存分配

// 1. 内存堆定义
#define HEAP_SIZE  (16 * 1024)    // 16KB 堆空间
static uint8_t heap[HEAP_SIZE];
static uint32_t heap_used = 0;

// 2. 内存块头部 (8 字节)
typedef struct BlockHeader {
  uint32_t size;          // 块大小 (包含头部)
  uint8_t  free;          // 是否空闲 (0=已分配，1=空闲)
  uint8_t  reserved[3];   // 对齐填充
  struct BlockHeader *next; // 下一块 (空闲链表)
} BlockHeader_t;

// 3. 内存初始化
void heap_init(void) {
  BlockHeader_t *first = (BlockHeader_t*)heap;
  first->size = HEAP_SIZE;
  first->free = 1;
  first->next = NULL;
  heap_used = sizeof(BlockHeader_t);
}

// 4. malloc 实现 (首次适应算法)
void* malloc(size_t size) {
  // 对齐到 8 字节
  size = (size + 7) & ~7;

  BlockHeader_t *block = (BlockHeader_t*)heap;

  while (block != NULL) {
    if (block->free && block->size >= size + sizeof(BlockHeader_t)) {
      // 找到合适的块

      // 分割块 (如果剩余空间足够)
      uint32_t remaining = block->size - size - sizeof(BlockHeader_t);
      if (remaining > sizeof(BlockHeader_t) * 2) {
        // 分割：创建新的空闲块
        BlockHeader_t *new_block = (BlockHeader_t*)((uint8_t*)block + sizeof(BlockHeader_t) + size);
        new_block->size = remaining;
        new_block->free = 1;
        new_block->next = block->next;
        block->next = new_block;
        block->size = size + sizeof(BlockHeader_t);
      }

      block->free = 0;  // 标记为已分配
      heap_used += block->size;
      return (uint8_t*)block + sizeof(BlockHeader_t);
    }
    block = block->next;
  }

  return NULL;  // 内存不足
}

// 5. free 实现
void free(void *ptr) {
  if (ptr == NULL) return;

  BlockHeader_t *block = (BlockHeader_t*)((uint8_t*)ptr - sizeof(BlockHeader_t));
  block->free = 1;  // 标记为空闲
  heap_used -= block->size;

  // 合并相邻空闲块 (防止碎片)
  merge_free_blocks();
}

// 6. 合并空闲块
void merge_free_blocks(void) {
  BlockHeader_t *block = (BlockHeader_t*)heap;

  while (block != NULL && block->next != NULL) {
    if (block->free && block->next->free) {
      // 合并两块
      block->size += block->next->size;
      block->next = block->next->next;
    } else {
      block = block->next;
    }
  }
}

// 7. 内存统计
void heap_stats(uint32_t *total, uint32_t *used, uint32_t *max_used) {
  *total = HEAP_SIZE;
  *used = heap_used;
  *max_used = heap_used;  // 简化实现
}`;

            <div className="flex gap-1 flex-wrap">
              {['已分配', '空闲', '已分配', '空闲', '已分配', '空闲', '已分配'].map((s, i) => (
                <div key={i} className={`w-12 h-16 rounded-lg flex items-center justify-center ${s === '空闲' ? 'bg-green-600' : 'bg-blue-600'}`}>
                  <div className="text-white text-xs">{s}</div>
                </div>
              ))}
            </div>
            <div className="text-center text-gray-400 text-xs mt-3">
              总空闲空间足够，但没有连续的大块
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div className="bg-red-900/30 p-3 rounded border border-red-500">
              <div className="text-red-400 text-xs font-bold mb-2">问题</div>
              <div className="text-gray-400 text-xs">
                • 大块分配失败<br/>
                • 内存利用率低<br/>
                • 性能下降
              </div>
            </div>
            <div className="bg-green-900/30 p-3 rounded border border-green-500">
              <div className="text-green-400 text-xs font-bold mb-2">解决方案</div>
              <div className="text-gray-400 text-xs">
                • 合并空闲块<br/>
                • 使用内存池<br/>
                • 固定大小分配
              </div>
            </div>
          </div>
          {step >= 7 && (
            <div className="p-4 bg-gradient-to-r from-yellow-900/50 to-green-900/50 rounded-lg border-2 border-yellow-500">
              <div className="text-center text-yellow-300 font-bold">
                💡 嵌入式系统建议：尽量使用内存池而非通用 malloc
              </div>
            </div>
          )}
        </div>
      );
    }

    function Visualization({ step, visualization }) {
      switch(visualization) {
        case 'overview': return <Overview step={step} />;
        case 'structure': return <MemoryStructure step={step} />;
        case 'init': return <HeapInit step={step} />;
        case 'malloc': return <MallocProcess step={step} />;
        case 'split': return <SplitBlock step={step} />;
        case 'free': return <FreeProcess step={step} />;
        case 'merge': return <MergeBlocks step={step} />;
        case 'fragment': return <Fragmentation step={step} />;
        default: return null;
      }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showCode, setShowCode] = useState(true);
      const voiceEndTimerRef = useRef(null);
      const stepRef = useRef(0);

      const speak = useCallback((text) => {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v =>
          v.lang === 'zh-CN' ||
          v.lang === 'zh-CN-XiaoxiaoNeural' ||
          v.name.includes('Xiaoxiao') ||
          v.name.includes('Chinese')
        );
        if (zhVoice) utterance.voice = zhVoice;

        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        utterance.onerror = (event) => {
          console.warn('Speech synthesis error:', event.error);
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        window.speechSynthesis.speak(utterance);
      }, [isPaused, isPlaying]);

      useEffect(() => {
        stepRef.current = currentStep;
      }, [currentStep]);

      useEffect(() => {
        const loadVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };

        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const step = STEPS[currentStep];
        if (step && isPlaying) {
          speak(step.title + "。" + step.explanation);
        }
        return () => {
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        };
      }, [currentStep, isPlaying, speak]);

      const handleStepClick = (index) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(index);
        stepRef.current = index;
      };

      const togglePlay = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPlaying(!isPlaying);
        if (!isPlaying && currentStep < STEPS.length - 1) {
          setTimeout(() => setCurrentStep(prev => prev + 1), 100);
        }
      };

      const togglePause = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPaused(!isPaused);
      };

      const reset = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(0);
        stepRef.current = 0;
        setIsPaused(false);
        setIsPlaying(true);
      };

      const nextStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => {
            stepRef.current = prev + 1;
            return prev + 1;
          });
        }
      };

      const prevStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep > 0) {
          setCurrentStep(prev => {
            stepRef.current = prev - 1;
            return prev - 1;
          });
        }
      };

      const currentStepData = STEPS[currentStep];

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="mb-4 text-center">
            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
              1156 - 动态内存管理
            </h1>
            <p className="text-gray-400">Embedded C Animation · 共 {STEPS.length} 步</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {showCode && (
              <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4 overflow-auto" style={{ maxHeight: '70vh' }}>
                <pre className="text-xs font-mono leading-relaxed">
                  {CODE.split('\n').map((line, i) => (
                    <div
                      key={i}
                      className={`code-line px-2 py-1 rounded ${
                        currentStepData?.codeHighlight?.includes(i + 1) ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-500 select-none w-8 inline-block">{i + 1}</span>
                      <span className={currentStepData?.codeHighlight?.includes(i + 1) ? 'text-white' : 'text-gray-300'}>
                        {line}
                      </span>
                    </div>
                  ))}
                </pre>
              </div>
            )}

            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4" style={{ maxHeight: '70vh', overflow: 'auto' }}>
              <h3 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.primary }}>
                {currentStepData?.title}
              </h3>
              <Visualization step={currentStep} visualization={currentStepData?.visualization} />
            </div>

            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gray-800 rounded-lg p-4">
                <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.primaryLight }}>
                  说明
                </h3>
                <p className="text-gray-300 leading-relaxed">
                  {currentStepData?.explanation}
                </p>
              </div>

              <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex flex-wrap gap-2">
                  {STEPS.map((step, index) => (
                    <button
                      key={index}
                      onClick={() => handleStepClick(index)}
                      className={`px-3 py-2 rounded text-xs font-bold transition-all duration-300 ${
                        index === currentStep
                          ? 'bg-yellow-600 text-white scale-105'
                          : index < currentStep
                          ? 'bg-yellow-900/50 text-yellow-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}
                    >
                      {index + 1}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="mt-6 flex justify-center gap-4">
            <button onClick={reset} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors">
              🔄 重置
            </button>
            <button onClick={prevStep} disabled={currentStep === 0} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              ⏮️ 上一步
            </button>
            <button onClick={togglePlay} className={`px-6 py-3 rounded-lg font-bold transition-colors ${isPlaying ? 'bg-yellow-600 hover:bg-yellow-700' : 'bg-green-600 hover:bg-green-700'}`}>
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <button onClick={togglePause} disabled={!isPlaying} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              {isPaused ? '▶️ 继续' : '⏯️ 挂起'}
            </button>
            <button onClick={nextStep} disabled={currentStep === STEPS.length - 1} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              下一步 ⏭️
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
