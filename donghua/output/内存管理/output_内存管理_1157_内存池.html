// 固定大小块的高效内存管理

// 1. 内存池结构
#define POOL_BLOCK_SIZE   64      // 每块 64 字节
#define POOL_BLOCK_COUNT  32      // 共 32 块

typedef struct Block {
  struct Block *next;             // 指向下一空闲块
} Block_t;

typedef struct {
  uint8_t  pool[POOL_BLOCK_SIZE * POOL_BLOCK_COUNT]; // 内存池
  Block_t  *free_list;            // 空闲链表头
  uint32_t allocated_count;       // 已分配计数
} MemoryPool_t;

// 2. 初始化内存池
void pool_init(MemoryPool_t *pool) {
  pool->free_list = NULL;
  pool->allocated_count = 0;

  // 将所有块链接成空闲链表
  for (int i = 0; i < POOL_BLOCK_COUNT; i++) {
    Block_t *block = (Block_t*)(pool->pool + i * POOL_BLOCK_SIZE);
    block->next = pool->free_list;
    pool->free_list = block;
  }
}

// 3. 从池中分配 (O(1) 时间)
void* pool_alloc(MemoryPool_t *pool) {
  if (pool->free_list == NULL) {
    return NULL;  // 池已耗尽
  }

  // 从空闲链表头取出
  Block_t *block = pool->free_list;
  pool->free_list = block->next;
  pool->allocated_count++;

  return block;  // 返回块地址
}

// 4. 释放回池中 (O(1) 时间)
void pool_free(MemoryPool_t *pool, void *ptr) {
  if (ptr == NULL) return;

  // 重新链接到空闲链表头
  Block_t *block = (Block_t*)ptr;
  block->next = pool->free_list;
  pool->free_list = block;
  pool->allocated_count--;
}

// 5. 获取池统计
void pool_stats(MemoryPool_t *pool, uint32_t *total, uint32_t *free, uint32_t *used) {
  *total = POOL_BLOCK_COUNT;
  *used = pool->allocated_count;
  *free = POOL_BLOCK_COUNT - pool->allocated_count;
}

// 6. 多池管理 (不同大小)
typedef struct {
  MemoryPool_t small_pool;    // 小对象池 (32B)
  MemoryPool_t medium_pool;   // 中对象池 (128B)
  MemoryPool_t large_pool;    // 大对象池 (512B)
} MultiPool_t;

void* multi_alloc(MultiPool_t *mp, size_t size) {
  if (size <= 32) return pool_alloc(&mp->small_pool);
  if (size <= 128) return pool_alloc(&mp->medium_pool);
  if (size <= 512) return pool_alloc(&mp->large_pool);
  return malloc(size);  // 超大对象用 malloc
}`;

          ))}
          {step >= 6 && (
            <div className="p-4 bg-gradient-to-r from-green-900/50 to-blue-900/50 rounded-lg border-2 border-green-500">
              <div className="text-center text-green-300 font-bold">
                🎯 多池系统 = 灵活 + 高效
              </div>
            </div>
          )}
        </div>
      );
    }

    function CompareMallocPool({ step }) {
      const comparisons = [
        { feature: "时间复杂度", malloc: "O(n)", pool: "O(1)", winner: "pool" },
        { feature: "内存碎片", malloc: "可能严重", pool: "无", winner: "pool" },
        { feature: "确定性", malloc: "不确定", pool: "确定", winner: "pool" },
        { feature: "灵活性", malloc: "任意大小", pool: "固定大小", winner: "malloc" },
        { feature: "内存效率", malloc: "高 (按需)", pool: "低 (预分配)", winner: "malloc" },
      ];

      return (
        <div className="space-y-2">
          {comparisons.map((c, i) => (
            <div
              key={i}
              className={`flex items-center gap-4 p-3 rounded transition-all duration-300 ${
                step >= 7 ? 'bg-green-900/50' : 'bg-gray-800'
              }`}
            >
              <span className="text-gray-400 text-sm w-24">{c.feature}</span>
              <span className={`text-red-400 font-mono w-24 ${c.winner === 'malloc' ? 'text-green-400 font-bold' : ''}`}>
                {c.malloc}
              </span>
              <span className="text-gray-500">←→</span>
              <span className={`text-green-400 font-mono w-24 ${c.winner === 'pool' ? 'text-green-400 font-bold' : ''}`}>
                {c.pool}
              </span>
            </div>
          ))}
          {step >= 7 && (
            <div className="mt-4 grid grid-cols-2 gap-4">
              <div className="bg-blue-900/30 p-4 rounded-lg border border-blue-500">
                <div className="text-blue-400 font-bold mb-2">malloc 适用场景</div>
                <div className="text-gray-400 text-xs">
                  • 大小不确定的对象<br/>
                  • 内存受限系统<br/>
                  • 非实时应用
                </div>
              </div>
              <div className="bg-green-900/30 p-4 rounded-lg border border-green-500">
                <div className="text-green-400 font-bold mb-2">内存池适用场景</div>
                <div className="text-gray-400 text-xs">
                  • 固定大小对象<br/>
                  • 实时系统<br/>
                  • 高频分配/释放
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Visualization({ step, visualization }) {
      switch(visualization) {
        case 'overview': return <Overview step={step} />;
        case 'structure': return <PoolStructure step={step} />;
        case 'init': return <PoolInit step={step} />;
        case 'alloc': return <PoolAlloc step={step} />;
        case 'free': return <PoolFree step={step} />;
        case 'stats': return <PoolStats step={step} />;
        case 'multipool': return <MultiPool step={step} />;
        case 'compare': return <CompareMallocPool step={step} />;
        default: return null;
      }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showCode, setShowCode] = useState(true);
      const voiceEndTimerRef = useRef(null);
      const stepRef = useRef(0);

      const speak = useCallback((text) => {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v =>
          v.lang === 'zh-CN' ||
          v.lang === 'zh-CN-XiaoxiaoNeural' ||
          v.name.includes('Xiaoxiao') ||
          v.name.includes('Chinese')
        );
        if (zhVoice) utterance.voice = zhVoice;

        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        utterance.onerror = (event) => {
          console.warn('Speech synthesis error:', event.error);
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        window.speechSynthesis.speak(utterance);
      }, [isPaused, isPlaying]);

      useEffect(() => {
        stepRef.current = currentStep;
      }, [currentStep]);

      useEffect(() => {
        const loadVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };

        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const step = STEPS[currentStep];
        if (step && isPlaying) {
          speak(step.title + "。" + step.explanation);
        }
        return () => {
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        };
      }, [currentStep, isPlaying, speak]);

      const handleStepClick = (index) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(index);
        stepRef.current = index;
      };

      const togglePlay = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPlaying(!isPlaying);
        if (!isPlaying && currentStep < STEPS.length - 1) {
          setTimeout(() => setCurrentStep(prev => prev + 1), 100);
        }
      };

      const togglePause = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPaused(!isPaused);
      };

      const reset = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(0);
        stepRef.current = 0;
        setIsPaused(false);
        setIsPlaying(true);
      };

      const nextStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => {
            stepRef.current = prev + 1;
            return prev + 1;
          });
        }
      };

      const prevStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep > 0) {
          setCurrentStep(prev => {
            stepRef.current = prev - 1;
            return prev - 1;
          });
        }
      };

      const currentStepData = STEPS[currentStep];

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="mb-4 text-center">
            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
              1157 - 内存池
            </h1>
            <p className="text-gray-400">Embedded C Animation · 共 {STEPS.length} 步</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {showCode && (
              <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4 overflow-auto" style={{ maxHeight: '70vh' }}>
                <pre className="text-xs font-mono leading-relaxed">
                  {CODE.split('\n').map((line, i) => (
                    <div
                      key={i}
                      className={`code-line px-2 py-1 rounded ${
                        currentStepData?.codeHighlight?.includes(i + 1) ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-500 select-none w-8 inline-block">{i + 1}</span>
                      <span className={currentStepData?.codeHighlight?.includes(i + 1) ? 'text-white' : 'text-gray-300'}>
                        {line}
                      </span>
                    </div>
                  ))}
                </pre>
              </div>
            )}

            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4" style={{ maxHeight: '70vh', overflow: 'auto' }}>
              <h3 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.primary }}>
                {currentStepData?.title}
              </h3>
              <Visualization step={currentStep} visualization={currentStepData?.visualization} />
            </div>

            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gray-800 rounded-lg p-4">
                <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.primaryLight }}>
                  说明
                </h3>
                <p className="text-gray-300 leading-relaxed">
                  {currentStepData?.explanation}
                </p>
              </div>

              <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex flex-wrap gap-2">
                  {STEPS.map((step, index) => (
                    <button
                      key={index}
                      onClick={() => handleStepClick(index)}
                      className={`px-3 py-2 rounded text-xs font-bold transition-all duration-300 ${
                        index === currentStep
                          ? 'bg-green-600 text-white scale-105'
                          : index < currentStep
                          ? 'bg-green-900/50 text-green-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}
                    >
                      {index + 1}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="mt-6 flex justify-center gap-4">
            <button onClick={reset} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors">
              🔄 重置
            </button>
            <button onClick={prevStep} disabled={currentStep === 0} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              ⏮️ 上一步
            </button>
            <button onClick={togglePlay} className={`px-6 py-3 rounded-lg font-bold transition-colors ${isPlaying ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <button onClick={togglePause} disabled={!isPlaying} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              {isPaused ? '▶️ 继续' : '⏯️ 挂起'}
            </button>
            <button onClick={nextStep} disabled={currentStep === STEPS.length - 1} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              下一步 ⏭️
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
