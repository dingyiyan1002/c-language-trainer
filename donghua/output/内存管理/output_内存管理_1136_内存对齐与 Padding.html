<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1136 - 内存对齐与 Padding | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(14, 165, 233, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(14, 165, 233, 0.2); border-left: 3px solid #0ea5e9; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#0ea5e9', primaryLight: '#38bdf8',
      secondary: '#0284c7', secondaryLight: '#38bdf8',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 内存对齐与 Padding =====
// 编译器插入填充字节保证对齐

// 1. 糟糕的结构体布局 (12 字节)
struct Bad {
  char a;     // 1 字节 + 3 padding
  int b;      // 4 字节
  short c;    // 2 字节 + 2 padding
};            // 总共：12 字节

// 2. 优化的结构体布局 (8 字节)
struct Good {
  int b;      // 4 字节
  short c;    // 2 字节
  char a;     // 1 字节 + 1 padding
};            // 总共：8 字节 (节省 33%)

// 3. 强制对齐 (无 padding)
struct Packed {
  char a;
  int b;
  short c;
} __attribute__((packed));  // 7 字节，但访问可能更慢

// 4. 位域优化
struct Flags {
  uint8_t flag1 : 1;
  uint8_t flag2 : 1;
  uint8_t flag3 : 1;
  uint8_t : 5;  // 保留 5 位
};              // 1 字节`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百三十六题，内存对齐与 Padding。",
      2: "编译器为了保证内存对齐访问效率，会在结构体成员间插入填充字节 padding。",
      3: "糟糕的结构体布局浪费内存，12 字节中 3 字节是 padding，效率只有 75%。",
      4: "优化方法是大成员在前、小成员在后，按对齐要求降序排列，可减少 padding。",
      5: "优化后的布局节省 33% 内存，从 12 字节减到 8 字节，访问效率相同。",
      6: "packed 属性可完全消除 padding，但可能导致未对齐访问，降低性能。",
      7: "位域是另一种优化方式，将多个布尔标志打包到同一字节中。",
      8: "应用：大数组结构体优化、缓存敏感数据、网络协议包、嵌入式内存受限场景。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-sky-900/50 via-cyan-900/50 to-blue-900/50 rounded-xl p-6 mb-4 border border-sky-700/50">
            <h1 className="text-3xl font-bold text-sky-400 mb-2">1136 - 内存对齐与 Padding</h1>
            <p className="text-sky-300 text-sm">结构体布局优化 / 填充字节 / 位域压缩</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
              <h2 className="text-lg font-semibold text-sky-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 4) ||
                    (step === 3 && i >= 5 && i <= 10) ||
                    (step === 4 && i >= 13 && i <= 13) ||
                    (step === 5 && i >= 14 && i <= 18) ||
                    (step === 6 && i >= 21 && i <= 26) ||
                    (step === 7 && i >= 29 && i <= 34)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
              <h2 className="text-lg font-semibold text-sky-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">💡 内存对齐与 Padding</p>
                    <p className="text-xs text-gray-400">编译器为了保证 CPU 访问效率，在结构体成员间插入填充字节。合理布局可减少内存浪费，提升缓存命中率。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">为什么需要对齐</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-sky-400 text-xs font-medium">CPU 访问优化</div>
                        <p className="text-gray-400 text-xs mt-1">
                          对齐访问比非对齐访问快 2-3 倍<br/>
                          某些架构非对齐访问会触发异常
                        </p>
                      </div>
                      <div className="grid grid-cols-4 gap-1">
                        <div className="h-8 bg-sky-600/50 border border-sky-400 flex items-center justify-center text-xs">4 字节</div>
                        <div className="h-8 bg-sky-600/50 border border-sky-400 flex items-center justify-center text-xs">对齐</div>
                        <div className="h-8 bg-gray-700/30 border border-gray-500 flex items-center justify-center text-xs">一次读取</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">❌ 糟糕的布局 (12 字节)</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="font-mono text-xs">
                        <div>struct Bad {'{'}</div>
                        <div>&nbsp;&nbsp;char a;     <span className="text-gray-500">// 1 + 3 padding</span></div>
                        <div>&nbsp;&nbsp;int b;      <span className="text-gray-500">// 4</span></div>
                        <div>&nbsp;&nbsp;short c;    <span className="text-gray-500">// 2 + 2 padding</span></div>
                        <div>{'}'};</div>
                      </div>
                      <div className="flex items-center gap-0">
                        <div className="w-16 h-10 bg-sky-600/50 border border-sky-400 flex items-center justify-center text-xs">a(1)</div>
                        <div className="w-16 h-10 bg-gray-700/30 border border-gray-500 flex items-center justify-center text-xs text-gray-500">pad(3)</div>
                        <div className="w-16 h-10 bg-cyan-600/50 border border-cyan-400 flex items-center justify-center text-xs">b(4)</div>
                        <div className="w-16 h-10 bg-blue-600/50 border border-blue-400 flex items-center justify-center text-xs">c(2)</div>
                        <div className="w-16 h-10 bg-gray-700/30 border border-gray-500 flex items-center justify-center text-xs text-gray-500">pad(2)</div>
                      </div>
                      <div className="text-red-400 text-center text-xs">
                        12 字节中 5 字节是 padding，效率仅 58%!
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">优化原则</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-sky-900/20 rounded border border-sky-500/30">
                        <div className="text-sky-400 text-xs font-medium">按对齐要求降序排列</div>
                        <ul className="text-gray-400 text-xs mt-1 space-y-1">
                          <li>• int (4 字节) 在前</li>
                          <li>• short (2 字节) 居中</li>
                          <li>• char (1 字节) 在后</li>
                        </ul>
                      </div>
                      <div className="text-sky-400 text-center text-xs">
                        大成员优先，小成员靠后
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">✅ 优化的布局 (8 字节)</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="font-mono text-xs">
                        <div>struct Good {'{'}</div>
                        <div>&nbsp;&nbsp;int b;      <span className="text-gray-500">// 4</span></div>
                        <div>&nbsp;&nbsp;short c;    <span className="text-gray-500">// 2</span></div>
                        <div>&nbsp;&nbsp;char a;     <span className="text-gray-500">// 1 + 1 padding</span></div>
                        <div>{'}'};</div>
                      </div>
                      <div className="flex items-center gap-0">
                        <div className="w-16 h-10 bg-sky-600/50 border border-sky-400 flex items-center justify-center text-xs">b(4)</div>
                        <div className="w-16 h-10 bg-cyan-600/50 border border-cyan-400 flex items-center justify-center text-xs">c(2)</div>
                        <div className="w-16 h-10 bg-blue-600/50 border border-blue-400 flex items-center justify-center text-xs">a(1)</div>
                        <div className="w-16 h-10 bg-gray-700/30 border border-gray-500 flex items-center justify-center text-xs text-gray-500">pad(1)</div>
                      </div>
                      <div className="text-green-400 text-center text-xs">
                        8 字节，节省 33%，访问效率相同!
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">Packed 属性 (无 padding)</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="font-mono text-xs">
                        <div>struct Packed {'{'}</div>
                        <div>&nbsp;&nbsp;char a;     <span className="text-gray-500">// 1</span></div>
                        <div>&nbsp;&nbsp;int b;      <span className="text-gray-500">// 4</span></div>
                        <div>&nbsp;&nbsp;short c;    <span className="text-gray-500">// 2</span></div>
                        <div>{'}'} <span className="text-sky-400">__attribute__((packed))</span>;</div>
                      </div>
                      <div className="flex items-center gap-0">
                        <div className="w-10 h-10 bg-sky-600/50 border border-sky-400 flex items-center justify-center text-xs">a</div>
                        <div className="w-10 h-10 bg-cyan-600/50 border border-cyan-400 flex items-center justify-center text-xs">b1</div>
                        <div className="w-10 h-10 bg-cyan-600/50 border border-cyan-400 flex items-center justify-center text-xs">b2</div>
                        <div className="w-10 h-10 bg-cyan-600/50 border border-cyan-400 flex items-center justify-center text-xs">b3</div>
                        <div className="w-10 h-10 bg-cyan-600/50 border border-cyan-400 flex items-center justify-center text-xs">b4</div>
                        <div className="w-10 h-10 bg-blue-600/50 border border-blue-400 flex items-center justify-center text-xs">c1</div>
                        <div className="w-10 h-10 bg-blue-600/50 border border-blue-400 flex items-center justify-center text-xs">c2</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2 mt-2">
                        <div className="text-green-400 text-xs">✅ 7 字节，最紧凑</div>
                        <div className="text-orange-400 text-xs">⚠️ 非对齐访问可能更慢</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">位域优化</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="font-mono text-xs">
                        <div>struct Flags {'{'}</div>
                        <div className="text-sky-400">&nbsp;&nbsp;uint8_t flag1 : 1;</div>
                        <div className="text-cyan-400">&nbsp;&nbsp;uint8_t flag2 : 1;</div>
                        <div className="text-blue-400">&nbsp;&nbsp;uint8_t flag3 : 1;</div>
                        <div className="text-gray-500">&nbsp;&nbsp;uint8_t : 5; <span className="text-gray-400">// 保留 5 位</span></div>
                        <div>{'}'};</div>
                      </div>
                      <div className="flex items-center gap-0">
                        <div className="w-12 h-10 bg-sky-600/50 border border-sky-400 flex items-center justify-center text-xs">f1</div>
                        <div className="w-12 h-10 bg-cyan-600/50 border border-cyan-400 flex items-center justify-center text-xs">f2</div>
                        <div className="w-12 h-10 bg-blue-600/50 border border-blue-400 flex items-center justify-center text-xs">f3</div>
                        <div className="w-24 h-10 bg-gray-700/30 border border-gray-500 flex items-center justify-center text-xs text-gray-500">保留 5 位</div>
                      </div>
                      <div className="text-green-400 text-center text-xs">
                        3 个标志位 + 5 位保留 = 1 字节
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-sky-900/20 rounded-lg border border-sky-500/30">
                      <p className="text-sky-300 text-xs font-medium mb-2">📋 应用场景</p>
                      <div className="text-xs text-gray-400 space-y-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">大数组结构体</div>
                          <p className="text-gray-400 text-xs mt-1">每个结构体节省 4 字节，1000 个元素节省 4KB</p>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">网络协议包</div>
                          <p className="text-gray-400 text-xs mt-1">packed 确保字节布局精确，便于序列化</p>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">嵌入式内存受限</div>
                          <p className="text-gray-400 text-xs mt-1">每字节都珍贵，使用位域压缩标志</p>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
                <h2 className="text-lg font-semibold text-sky-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-sky-900/30 text-sky-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 对齐提升访问效率
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-sky-900/30 text-sky-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 大成员在前减少 padding
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-sky-900/30 text-sky-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 位域压缩布尔标志
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
                <h2 className="text-lg font-semibold text-sky-400 mb-3">对比总结</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">糟糕布局</p>
                    <pre className="text-gray-400 font-mono text-xs">12 字节 (5 字节 padding)</pre>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">优化布局</p>
                    <pre className="text-gray-400 font-mono text-xs">8 字节 (1 字节 padding)</pre>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">Packed</p>
                    <pre className="text-gray-400 font-mono text-xs">7 字节 (无 padding)</pre>
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
                <h2 className="text-lg font-semibold text-sky-400 mb-3">编译器指令</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-sky-900/20 rounded border border-sky-500/30">
                    <p className="text-sky-300 font-medium">GCC / Clang</p>
                    <pre className="text-gray-400 font-mono text-xs">__attribute__((packed))</pre>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">MSVC</p>
                    <pre className="text-gray-400 font-mono text-xs">#pragma pack(push, 1)</pre>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">C11</p>
                    <pre className="text-gray-400 font-mono text-xs">_Alignas / alignas</pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-sky-600 hover:bg-sky-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-sky-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-sky-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-sky-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-sky-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
