<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>continue 与 break 区别 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#dc2626 0%,#0891b2 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#164e63;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#7c3aed;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:400px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
    .comparison-card{border-radius:12px;padding:16px;border:3px solid transparent;transition:all 0.4s ease}
    .comparison-card.break{background:linear-gradient(135deg:#fef2f2,#fee2e2);border-color:#dc2626}
    .comparison-card.continue{background:linear-gradient(135deg:#ecfeff,#cffafe);border-color:#0891b2}
    .comparison-card.active{transform:scale(1.05);box-shadow:0 10px 30px rgba(0,0,0,0.2)}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .card-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
    .card-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
    .break .card-icon{background:#dc2626;color:white}
    .continue .card-icon{background:#0891b2;color:white}
    .card-body{font-size:13px;color:#475569;line-height:1.8}
    .card-body strong{display:block;margin-bottom:8px;color:#1e293b}
    .iteration-display{margin:16px 0}
    .iteration-row{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .iteration-row.pending{background:#f8fafc}
    .iteration-row.current{background:linear-gradient(135deg,#f59e0b,#d97706);color:white;transform:scale(1.02)}
    .iteration-row.processed{background:#fef3c7;opacity:0.7}
    .iteration-row.stopped{background:#fee2e2;border:2px solid#dc2626;opacity:0.5}
    .iteration-row.skipped{background:#cffafe;border:2px dashed#0891b2;opacity:0.6}
    .iteration-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:#e2e8f0}
    .iteration-label{flex:1;font-size:12px;font-weight:600}
    .badge{padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700}
    .badge-break{background:#dc2626;color:white}
    .badge-continue{background:#0891b2;color:white}
    .badge-stop{background:#dc2626;color:white}
    .badge-skip{background:#0891b2;color:white}
    .result-box{background:#1e293b;border-radius:12px;padding:16px;color:#22d3ee;font-family:'Consolas',monospace;font-size:14px}
    .result-title{color:#94a3b8;font-size:12px;margin-bottom:8px}
    .result-value{font-size:24px;font-weight:700}
    .flow-diagram{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .flow-step{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;transition:all 0.4s ease}
    .flow-step.pending{background:#f8fafc;opacity:0.5}
    .flow-step.active{background:#fef3c7;border:2px solid#f59e0b}
    .flow-step.done{background:#ecfdf5;border:2px solid#22c55e}
    .flow-step-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
    .flow-step-icon.pending{background:#e2e8f0;color:#64748b}
    .flow-step-icon.active{background:#f59e0b;color:white;animation:pulse 1s ease infinite}
    .flow-step-icon.done{background:#22c55e;color:white}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
    .flow-step-label{flex:1;font-size:13px;font-weight:600;color:#475569}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:13px;color:#22d3ee;min-height:80px}
    .terminal-line{margin-bottom:6px}
    .cursor{display:inline-block;width:8px;height:18px;background:#22d3ee;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
    .step-indicator{position:fixed;top:20px;right:20px;background:rgba(255,255,255,0.95);padding:12px 20px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.2);font-weight:700;color:#1e293b}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 7;
    const ARRAY_DATA = [1, 2, 3, 4, 5];
    const COLOR_MAP = {green:'#22c55e',red:'#dc2626',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',cyan:'#0891b2'};
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z',stop:'M6 19h12V5H6v14zm2-12h2v10H8V7zm6 0h2v10h-2V7z',skip:'M13 9V3.5L18.5 9H13zm0 11.5V14l5.5 5.5H13zM5 19h4V5H5v14zm6 0h4V5h-4v14z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',chip:'M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z',compare:'M7 7h10v3l4-4-4-4v3H3v6h4V7zm10 10H7v-3l-4 4 4 4v-3h14V9h-4v6z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    const BREAK_CODE = `for (i=0; i<5; i++) {
    if (i === 3) {
        break;  // 退出整个循环
    }
    sum += data[i];
}`;
    const CONTINUE_CODE = `for (i=0; i<5; i++) {
    if (i === 3) {
        continue;  // 跳过本次迭代
    }
    sum += data[i];
}`;
    const VOICE_TEXT_MAP = {
      1:'现在开始对比 break 和 continue 的区别，两者都用于循环控制，但行为完全不同',
      2:'break 语句：当 i 等于 3 时，break 立即退出整个循环，不再执行任何迭代',
      3:'continue 语句：当 i 等于 3 时，continue 跳过本次迭代，继续执行下一次迭代',
      4:'break 效果：循环在 i=3 时完全停止，sum 只累加了 0、1、2 索引的值',
      5:'continue 效果：循环跳过 i=3 但继续执行 i=4 和 i=5，sum 累加了所有值除了索引 3',
      6:'break 结果：sum = 1+2+3 = 6，循环提前结束，4 和 5 索引没有被处理',
      7:'continue 结果：sum = 1+2+4+5 = 12，索引 3 被跳过但后续迭代继续执行'
    };
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const [breakSum,setBreakSum] = useState(0);
      const [continueSum,setContinueSum] = useState(0);
      const [breakIndices,setBreakIndices] = useState([]);
      const [continueIndices,setContinueIndices] = useState([]);
      const [breakStoppedAt,setBreakStoppedAt] = useState(-1);
      const [continueSkippedAt,setContinueSkippedAt] = useState(-1);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        if(step === 1) {
          setBreakSum(0);
          setContinueSum(0);
          setBreakIndices([]);
          setContinueIndices([]);
          setBreakStoppedAt(-1);
          setContinueSkippedAt(-1);
        } else if(step === 2) {
          // break explanation
        } else if(step === 3) {
          // continue explanation
        } else if(step === 4) {
          setBreakIndices([0, 1, 2]);
          setBreakSum(1 + 2 + 3);
          setBreakStoppedAt(3);
        } else if(step === 5) {
          setContinueIndices([0, 1, 3, 4]);
          setContinueSum(1 + 2 + 4 + 5);
          setContinueSkippedAt(2);
        } else if(step === 6) {
          // break result
        } else if(step === 7) {
          // continue result
        }
      }, [step]);
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setBreakSum(0);
        setContinueSum(0);
        setBreakIndices([]);
        setContinueIndices([]);
        setBreakStoppedAt(-1);
        setContinueSkippedAt(-1);
        setIsPlaying(true);
      };
      const renderIterations = (type) => {
        const isBreak = type === 'break';
        const stoppedAt = isBreak ? breakStoppedAt : continueSkippedAt;
        const processedIndices = isBreak ? breakIndices : continueIndices;
        return ARRAY_DATA.map((val, idx) => {
          let status = 'pending';
          if(isBreak) {
            if(idx < stoppedAt && breakIndices.includes(idx)) status = 'processed';
            else if(idx === stoppedAt) status = 'stopped';
            else status = 'pending';
          } else {
            if(idx === stoppedAt) status = 'skipped';
            else if(processedIndices.includes(idx)) status = 'processed';
            else status = 'pending';
          }
          return (
            <div key={idx} className={`iteration-row ${status}`}>
              <div className="iteration-num">{idx}</div>
              <div className="iteration-label">data[{idx}] = {val}</div>
              {status === 'stopped' && <span className="badge badge-stop">STOP</span>}
              {status === 'skipped' && <span className="badge badge-skip">SKIP</span>}
              {status === 'processed' && <span className="badge" style={{background:'#22c55e',color:'white'}}>✓</span>}
            </div>
          );
        });
      };
      return (
        <div className="app-container">
          <div className="step-indicator">步骤：{step} / {MAX_STEPS}</div>
          <div className="header">
            <h1>break vs continue - C 语言对比</h1>
            <p>break 退出循环 | continue 跳过迭代 | 循环控制区别</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="comparison-grid">
            <div className="panel comparison-card break">
              <div className="panel-title">
                <Icon path={I.stop} size={22} />
                break - 退出循环
              </div>
              <div className="code-container" style={{background:'#1e293b',color:'#e2e8f0',fontSize:'12px',whiteSpace:'pre'}}>{BREAK_CODE}</div>
              <div className="iteration-display">
                {renderIterations('break')}
              </div>
              <div className="result-box">
                <div className="result-title">break 结果</div>
                <div className="result-value" style={{color:'#f87171'}}>sum = {breakSum}</div>
                <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'8px'}}>循环在 i=3 时停止</div>
              </div>
            </div>
            <div className="panel comparison-card continue">
              <div className="panel-title">
                <Icon path={I.skip} size={22} />
                continue - 跳过迭代
              </div>
              <div className="code-container" style={{background:'#1e293b',color:'#e2e8f0',fontSize:'12px',whiteSpace:'pre'}}>{CONTINUE_CODE}</div>
              <div className="iteration-display">
                {renderIterations('continue')}
              </div>
              <div className="result-box">
                <div className="result-title">continue 结果</div>
                <div className="result-value" style={{color:'#22d3ee'}}>sum = {continueSum}</div>
                <div style={{fontSize:'12px',color:'#94a3b8',marginTop:'8px'}}>i=3 被跳过，继续执行</div>
              </div>
            </div>
          </div>
          <div className="panel">
            <div className="panel-title">
              <Icon path={I.compare} size={22} />
              核心区别总结
            </div>
            <div className="comparison-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
              <div className="comparison-card break" style={{border:'2px solid #dc2626'}}>
                <div className="card-header">
                  <div className="card-title">
                    <div className="card-icon">✕</div>
                    break
                  </div>
                </div>
                <div className="card-body">
                  <strong>立即退出整个循环</strong>
                  循环完全终止，不再执行任何后续迭代<br/>
                  适用于：找到目标后提前退出、错误时中止循环
                </div>
              </div>
              <div className="comparison-card continue" style={{border:'2px solid #0891b2'}}>
                <div className="card-header">
                  <div className="card-title">
                    <div className="card-icon">⟳</div>
                    continue
                  </div>
                </div>
                <div className="card-body">
                  <strong>跳过本次迭代</strong>
                  继续执行下一次循环迭代<br/>
                  适用于：过滤数据、跳过无效输入、条件处理
                </div>
              </div>
            </div>
            <div style={{marginTop:20,padding:'16px',background:step >= 6 ? 'linear-gradient(135deg:#fef2f2,#fee2e2)' : 'linear-gradient(135deg:#f8fafc,#f1f5f9)',borderRadius:12,textAlign:'center'}}>
              <div style={{fontSize:'14px',color:step >= 6 ? '#dc2626' : '#64748b',fontWeight:700}}>
                break: sum = 1+2+3 = {breakSum} (索引 3,4 未处理)
              </div>
              <div style={{fontSize:'14px',color:step >= 7 ? '#0891b2' : '#64748b',fontWeight:700,marginTop:'8px'}}>
                continue: sum = 1+2+4+5 = {continueSum} (仅索引 2 被跳过)
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
