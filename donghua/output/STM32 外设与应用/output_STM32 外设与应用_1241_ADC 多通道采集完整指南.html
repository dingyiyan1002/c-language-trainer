<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 ADC 多通道采集完整指南 -  Analog-to-Digital Converter</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes flow { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes sampling { 0% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } 100% { transform: scaleY(0.3); } }
        @keyframes convert { 0%, 100% { background-color: #3b82f6; } 50% { background-color: #60a5fa; } }
        @keyframes dataShift { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        @keyframes sine { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .analog-wave { animation: wave 2s ease-in-out infinite; }
        .sample-point { animation: sampling 1s ease-in-out infinite; }
        .convert-anim { animation: convert 0.5s ease-in-out; }
        .data-flow { animation: dataShift 1s linear infinite; }
        .sine-wave { animation: sine 3s linear infinite; }
        .active-step { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        const COLOR_MAP = {
            primary: '#3b82f6', primaryLight: '#60a5fa', primaryDark: '#1d4ed8',
            secondary: '#10b981', success: '#22c55e', warning: '#f59e0b',
            analog: '#f97316', digital: '#3b82f6', channel: '#8b5cf6', result: '#22c55e',
            trigger: '#ef4444', gradient: 'from-blue-500 via-blue-600 to-emerald-500'
        };

        const STEPS = [
            {
                title: 'ADC 基础',
                voice: 'ADC 是模数转换器，将模拟电压转换为数字值。STM32F103 内置 12 位 SAR ADC，最大分辨率 4096 级，转换时间最快 1 微秒，支持 18 个通道。',
                highlights: ['ADC', '12 位', 'SAR', '4096 级', '18 通道']
            },
            {
                title: '工作原理',
                voice: 'SAR 逐次逼近型 ADC 通过比较器逐步逼近输入电压。采样保持电路捕获输入信号，SAR 逻辑从最高位开始逐位比较，最终输出 12 位数字结果。',
                highlights: ['SAR', '采样保持', '比较器', '逐位逼近', '12 位']
            },
            {
                title: '参考电压',
                voice: '参考电压决定转换范围。STM32 通常 Vref+ 接 3.3V，Vref- 接 GND。12 位分辨率下，每 LSB 等于 3.3V 除以 4095，约 0.8 毫伏。',
                highlights: ['Vref+', '3.3V', 'LSB', '0.8mV', '分辨率']
            },
            {
                title: '通道配置',
                voice: 'STM32 有 16 个外部通道和 2 个内部通道。外部通道 PA0 到 PA7、PB0 到 PB1，内部通道包括温度传感器和 Vrefint。可配置为单端或差分输入。',
                highlights: ['16 外部', '2 内部', 'PA0-PA7', '温度传感器', '单端']
            },
            {
                title: '转换模式',
                voice: '单次转换：触发一次转换一次。连续转换：自动连续采样。扫描模式：按顺序转换多个通道。注入模式：高优先级打断常规转换。',
                highlights: ['单次', '连续', '扫描', '注入', '优先级']
            },
            {
                title: '触发源',
                voice: 'ADC 可通过软件触发，也可由定时器或外部中断触发。常用触发源包括 TIM1、TIM2、TIM3 的 TRGO 输出，以及 EXTI 外部中断线。',
                highlights: ['软件触发', '定时器', 'TRGO', 'EXTI', '自动触发']
            },
            {
                title: 'DMA 传输',
                voice: '使用 DMA 可直接将 ADC 结果传输到内存，无需 CPU 干预。配置 DMA 循环模式，实现连续采样缓冲。大幅降低 CPU 负载，提高实时性。',
                highlights: ['DMA', '循环模式', '采样缓冲', '零 CPU', '实时性']
            },
            {
                title: '应用实例',
                voice: '实际应用：电池电压检测、温度采集、音频采样、电机电流监测。注意添加滤波电容，使用过采样提高精度，定期校准减少漂移。',
                highlights: ['电压检测', '温度采集', '过采样', '滤波', '校准']
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = React.useState(0);
            const [isPlaying, setIsPlaying] = React.useState(false);
            const [showWaveform, setShowWaveform] = React.useState(false);
            const [adcValue, setAdcValue] = React.useState(2048);
            const [voltage, setVoltage] = React.useState(1.65);
            const [channel, setChannel] = React.useState(0);
            const [isConverting, setIsConverting] = React.useState(false);
            const [conversionResult, setConversionResult] = React.useState(null);
            const [sampleBuffer, setSampleBuffer] = React.useState(Array(32).fill(2048));
            const [channels] = React.useState([
                { id: 0, name: 'PA0', value: 1.65 },
                { id: 1, name: 'PA1', value: 2.10 },
                { id: 2, name: 'PA2', value: 0.85 },
                { id: 3, name: 'PA3', value: 3.00 },
                { id: 4, name: 'PA4', value: 1.20 },
                { id: 5, name: 'PA5', value: 2.50 },
                { id: 6, name: 'PA6', value: 0.50 },
                { id: 7, name: 'PA7', value: 3.30 }
            ]);
            const [scanMode, setScanMode] = React.useState(false);
            const [dmaEnabled, setDmaEnabled] = React.useState(false);
            const voiceEndTimerRef = React.useRef(null);

            React.useEffect(() => {
                const utterance = new SpeechSynthesisUtterance(STEPS[currentStep].voice);
                const voices = speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang.includes('zh-CN') && v.name.includes('Xiaoxiao'))
                    || voices.find(v => v.lang.includes('zh-CN'))
                    || voices.find(v => v.lang.includes('Chinese'));
                if (zhVoice) utterance.voice = zhVoice;
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;

                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            setIsPlaying(false);
                            return prev;
                        });
                    }, 800);
                };

                utterance.onerror = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            setIsPlaying(false);
                            return prev;
                        });
                    }, 800);
                };

                if (isPlaying) speechSynthesis.speak(utterance);

                return () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    speechSynthesis.cancel();
                };
            }, [currentStep, isPlaying]);

            const handlePlay = () => setIsPlaying(true);
            const handlePause = () => {
                setIsPlaying(false);
                speechSynthesis.cancel();
            };
            const handleRestart = () => {
                setCurrentStep(0);
                setIsPlaying(true);
            };
            const handleStepClick = (index) => {
                setCurrentStep(index);
                setIsPlaying(false);
                speechSynthesis.cancel();
            };

            const startConversion = () => {
                setIsConverting(true);
                setConversionResult(null);
                setTimeout(() => {
                    const newValue = Math.floor((channels[channel].value / 3.3) * 4095);
                    setAdcValue(newValue);
                    setVoltage(channels[channel].value);
                    setConversionResult(newValue);
                    setIsConverting(false);
                    if (scanMode) {
                        setChannel(prev => (prev + 1) % channels.length);
                    }
                }, 500);
            };

            React.useEffect(() => {
                if (!showWaveform || !dmaEnabled) return;
                const interval = setInterval(() => {
                    setSampleBuffer(prev => {
                        const newBuf = [...prev.slice(1)];
                        const newValue = Math.floor(
                            2048 + 1500 * Math.sin(Date.now() / 200) +
                            (Math.random() - 0.5) * 100
                        );
                        newBuf.push(newValue);
                        return newBuf;
                    });
                }, 100);
                return () => clearInterval(interval);
            }, [showWaveform, dmaEnabled]);

            const renderWaveform = () => (
                <div className="bg-gray-800 rounded-lg p-4">
                    <div className="flex justify-between items-center mb-2">
                        <span className="text-sm text-gray-400">ADC 采样波形 (DMA 循环模式)</span>
                        <span className="text-xs text-green-400">{dmaEnabled ? 'DMA 运行中' : 'DMA 已禁用'}</span>
                    </div>
                    <div className="bg-gray-900 rounded h-32 relative overflow-hidden">
                        <svg className="w-full h-full" viewBox="0 0 320 100">
                            <line x1="0" y1="50" x2="320" y2="50" stroke="#374151" strokeWidth="1" strokeDasharray="2,2"/>
                            <path
                                d={sampleBuffer.map((v, i) => {
                                    const x = i * 10;
                                    const y = 50 - (v - 2048) / 40;
                                    return i === 0 ? `M ${x} ${y}` : `L ${x} ${y}`;
                                }).join(' ')}
                                fill="none"
                                stroke="#3b82f6"
                                strokeWidth="2"
                                className={dmaEnabled ? 'sine-wave' : ''}
                            />
                        </svg>
                    </div>
                    <div className="grid grid-cols-4 gap-2 mt-3">
                        {sampleBuffer.slice(-4).map((v, i) => (
                            <div key={i} className="bg-gray-800 rounded p-2 text-center">
                                <div className="text-[10px] text-gray-400">Sample</div>
                                <div className="font-mono text-xs text-blue-400">{v}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderContent = () => {
                switch (currentStep) {
                    case 0:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">STM32 ADC 规格</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="text-sm text-gray-400">分辨率</div>
                                            <div className="text-2xl font-bold text-blue-400">12 bit</div>
                                            <div className="text-xs text-gray-400">4096 量化级</div>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="text-sm text-gray-400">转换时间</div>
                                            <div className="text-2xl font-bold text-green-400">1 μs</div>
                                            <div className="text-xs text-gray-400">最快 1MHz 采样</div>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="text-sm text-gray-400">通道数</div>
                                            <div className="text-2xl font-bold text-purple-400">18</div>
                                            <div className="text-xs text-gray-400">16 外 +2 内</div>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="text-sm text-gray-400">类型</div>
                                            <div className="text-2xl font-bold text-orange-400">SAR</div>
                                            <div className="text-xs text-gray-400">逐次逼近型</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-gradient-to-r from-blue-900 to-emerald-900 rounded-lg p-4">
                                    <h4 className="font-bold mb-2">ADC 主要特点:</h4>
                                    <ul className="space-y-1 text-sm">
                                        <li className="flex items-center gap-2"><span className="text-green-400">✓</span> 12 位 SAR 型 ADC</li>
                                        <li className="flex items-center gap-2"><span className="text-green-400">✓</span> 18 通道多路复用器</li>
                                        <li className="flex items-center gap-2"><span className="text-green-400">✓</span> 支持 DMA 传输</li>
                                        <li className="flex items-center gap-2"><span className="text-green-400">✓</span> 多种触发源选择</li>
                                        <li className="flex items-center gap-2"><span className="text-green-400">✓</span> 扫描和注入模式</li>
                                    </ul>
                                </div>
                            </div>
                        );
                    case 1:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">SAR ADC 工作原理</h3>
                                    <div className="relative h-40 bg-gray-900 rounded-lg overflow-hidden">
                                        <div className="absolute top-4 left-4 right-4 h-12 bg-orange-900 rounded flex items-center justify-center">
                                            <span className="text-orange-400 font-bold">采样保持 (S/H)</span>
                                        </div>
                                        <div className="absolute top-20 left-4 w-16 h-16 bg-blue-900 rounded-full flex items-center justify-center">
                                            <span className="text-blue-400 text-xs font-bold">比较器</span>
                                        </div>
                                        <div className="absolute top-20 right-4 w-20 h-16 bg-purple-900 rounded flex items-center justify-center">
                                            <span className="text-purple-400 text-xs font-bold">SAR 逻辑</span>
                                        </div>
                                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 w-24 h-8 bg-green-900 rounded flex items-center justify-center">
                                            <span className="text-green-400 text-xs">12 位输出</span>
                                        </div>
                                        <div className="absolute top-28 left-24 text-blue-400 text-xs">→</div>
                                        <div className="absolute top-28 right-24 text-purple-400 text-xs">→</div>
                                        <div className="absolute bottom-12 left-1/2 transform -translate-x-1/2 text-green-400 text-xs">↓</div>
                                    </div>
                                </div>
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-emerald-400">转换过程</h3>
                                    <div className="space-y-2">
                                        <div className="flex items-center gap-3 bg-gray-900 rounded p-2">
                                            <span className="w-8 h-8 bg-orange-600 rounded flex items-center justify-center font-bold">1</span>
                                            <span className="text-sm">采样：捕获输入电压 Vin</span>
                                        </div>
                                        <div className="flex items-center gap-3 bg-gray-900 rounded p-2">
                                            <span className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center font-bold">2</span>
                                            <span className="text-sm">保持：保持电压稳定</span>
                                        </div>
                                        <div className="flex items-center gap-3 bg-gray-900 rounded p-2">
                                            <span className="w-8 h-8 bg-purple-600 rounded flex items-center justify-center font-bold">3</span>
                                            <span className="text-sm">比较：从 MSB 开始逐位比较</span>
                                        </div>
                                        <div className="flex items-center gap-3 bg-gray-900 rounded p-2">
                                            <span className="w-8 h-8 bg-green-600 rounded flex items-center justify-center font-bold">4</span>
                                            <span className="text-sm">输出：12 位数字结果</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case 2:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">参考电压与分辨率</h3>
                                    <div className="bg-gray-900 rounded p-4 mb-4">
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="text-center">
                                                <div className="text-3xl font-bold text-green-400">Vref+</div>
                                                <div className="text-sm text-gray-400">3.3V</div>
                                            </div>
                                            <div className="flex-1 mx-4">
                                                <div className="h-32 bg-gradient-to-t from-green-900 to-green-700 rounded relative">
                                                    <div className="absolute inset-0 flex flex-col justify-between py-2">
                                                        {[4095, 3072, 2048, 1024, 0].map(v => (
                                                            <div key={v} className="text-[10px] text-white pl-2">
                                                                {v} → {(v / 4095 * 3.3).toFixed(2)}V
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="text-center">
                                                <div className="text-3xl font-bold text-gray-500">Vref-</div>
                                                <div className="text-sm text-gray-400">GND</div>
                                            </div>
                                        </div>
                                        <div className="text-center bg-blue-900 rounded p-3">
                                            <div className="text-sm text-gray-400">LSB 大小</div>
                                            <div className="font-mono text-lg text-blue-400">
                                                3.3V ÷ 4095 = 0.805 mV
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-gradient-to-r from-green-900 to-blue-900 rounded-lg p-4">
                                    <h4 className="font-bold mb-2">📐 电压计算公式</h4>
                                    <div className="font-mono text-sm bg-gray-900 rounded p-3">
                                        Vin = (ADC_Value / 4095) × Vref+
                                    </div>
                                    <div className="mt-2 text-xs text-gray-300">
                                        例：ADC_Value = 2048 → Vin = (2048/4095) × 3.3V ≈ 1.65V
                                    </div>
                                </div>
                            </div>
                        );
                    case 3:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">通道分配</h3>
                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div className="bg-gray-900 rounded p-3">
                                            <h4 className="font-bold text-purple-400 mb-2">外部通道 (16 个)</h4>
                                            <div className="grid grid-cols-4 gap-1 text-xs">
                                                {['PA0','PA1','PA2','PA3','PA4','PA5','PA6','PA7','PB0','PB1','PC0','PC1','PC2','PC3','PC4','PC5'].map(pin => (
                                                    <div key={pin} className={`bg-purple-900 rounded py-1 text-center cursor-pointer hover:bg-purple-700 ${channel === parseInt(pin.slice(2)) ? 'ring-2 ring-white' : ''}`}
                                                         onClick={() => setChannel(parseInt(pin.slice(2)) % 8)}>
                                                        {pin}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <h4 className="font-bold text-orange-400 mb-2">内部通道 (2 个)</h4>
                                            <div className="space-y-2">
                                                <div className="bg-orange-900 rounded p-2 text-center">
                                                    <div className="text-sm font-bold">温度传感器</div>
                                                    <div className="text-xs text-gray-400">通道 16</div>
                                                </div>
                                                <div className="bg-orange-900 rounded p-2 text-center">
                                                    <div className="text-sm font-bold">Vrefint</div>
                                                    <div className="text-xs text-gray-400">通道 17</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-blue-900 rounded-lg p-4">
                                    <h4 className="font-bold mb-2">💡 通道选择建议</h4>
                                    <ul className="space-y-1 text-sm">
                                        <li>• 高速信号：使用 PA0-PA7</li>
                                        <li>• 低速信号：任意 GPIO 通道</li>
                                        <li>• 温度监测：内部温度传感器</li>
                                        <li>• 电压校准：Vrefint 基准</li>
                                    </ul>
                                </div>
                            </div>
                        );
                    case 4:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">转换模式对比</h3>
                                    <div className="space-y-3">
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-blue-400">单次转换 (Single)</span>
                                                <span className="text-xs text-gray-400">CONTC=0</span>
                                            </div>
                                            <div className="text-xs text-gray-400">触发一次，转换一次，然后停止</div>
                                            <div className="mt-2 flex gap-1">
                                                <div className="w-16 h-8 bg-blue-600 rounded"></div>
                                                <div className="w-16 h-8 bg-gray-700 rounded"></div>
                                                <div className="w-16 h-8 bg-gray-700 rounded"></div>
                                            </div>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-green-400">连续转换 (Continuous)</span>
                                                <span className="text-xs text-gray-400">CONTC=1</span>
                                            </div>
                                            <div className="text-xs text-gray-400">自动连续转换，无需重复触发</div>
                                            <div className="mt-2 flex gap-1">
                                                <div className="w-16 h-8 bg-green-600 rounded"></div>
                                                <div className="w-16 h-8 bg-green-600 rounded"></div>
                                                <div className="w-16 h-8 bg-green-600 rounded"></div>
                                            </div>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-purple-400">扫描模式 (Scan)</span>
                                                <span className="text-xs text-gray-400">SCAN=1</span>
                                            </div>
                                            <div className="text-xs text-gray-400">按顺序转换多个通道</div>
                                            <div className="mt-2 flex gap-1">
                                                <div className="w-16 h-8 bg-purple-600 rounded text-xs flex items-center justify-center">CH0</div>
                                                <div className="w-16 h-8 bg-purple-600 rounded text-xs flex items-center justify-center">CH1</div>
                                                <div className="w-16 h-8 bg-purple-600 rounded text-xs flex items-center justify-center">CH2</div>
                                            </div>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="font-bold text-orange-400">注入模式 (Injected)</span>
                                                <span className="text-xs text-gray-400">JGROUP</span>
                                            </div>
                                            <div className="text-xs text-gray-400">高优先级打断常规转换</div>
                                            <div className="mt-2 flex gap-1">
                                                <div className="w-12 h-8 bg-blue-600 rounded text-xs flex items-center justify-center">常规</div>
                                                <div className="w-12 h-8 bg-orange-600 rounded text-xs flex items-center justify-center">注入</div>
                                                <div className="w-12 h-8 bg-blue-600 rounded text-xs flex items-center justify-center">常规</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case 5:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">触发源选择</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-gray-900 rounded p-3">
                                            <h4 className="font-bold text-red-400 mb-2">软件触发</h4>
                                            <div className="text-xs text-gray-400 mb-2">设置 ADON 位启动转换</div>
                                            <button onClick={startConversion} className="w-full bg-red-600 rounded py-2 text-sm font-bold hover:bg-red-700">
                                                触发转换
                                            </button>
                                        </div>
                                        <div className="bg-gray-900 rounded p-3">
                                            <h4 className="font-bold text-green-400 mb-2">硬件触发</h4>
                                            <ul className="text-xs text-gray-400 space-y-1">
                                                <li>• TIM1_TRGO</li>
                                                <li>• TIM2_TRGO</li>
                                                <li>• TIM3_TRGO</li>
                                                <li>• EXTI11</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div className="bg-gradient-to-r from-red-900 to-green-900 rounded-lg p-4">
                                    <h4 className="font-bold mb-2">⏱️ 触发应用场景</h4>
                                    <ul className="space-y-1 text-sm">
                                        <li>• 手动测试：软件触发</li>
                                        <li>• 定时采样：定时器 TRGO</li>
                                        <li>• 事件同步：外部中断</li>
                                        <li>• PWM 联动：高级定时器</li>
                                    </ul>
                                </div>
                            </div>
                        );
                    case 6:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">DMA 传输配置</h3>
                                    <div className="bg-gray-900 rounded p-4 mb-4">
                                        <div className="flex items-center gap-4">
                                            <div className="bg-blue-900 rounded p-3 text-center">
                                                <div className="text-xs text-gray-400">ADC</div>
                                                <div className="font-bold text-blue-400">DR</div>
                                            </div>
                                            <div className="text-blue-400">→</div>
                                            <div className="bg-purple-900 rounded p-3 text-center">
                                                <div className="text-xs text-gray-400">DMA</div>
                                                <div className="font-bold text-purple-400">通道 1</div>
                                            </div>
                                            <div className="text-blue-400">→</div>
                                            <div className="bg-green-900 rounded p-3 text-center">
                                                <div className="text-xs text-gray-400">内存</div>
                                                <div className="font-bold text-green-400">Buffer</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="flex items-center gap-2 bg-gray-900 rounded p-3 cursor-pointer">
                                            <input type="checkbox" checked={dmaEnabled} onChange={(e) => setDmaEnabled(e.target.checked)} className="w-4 h-4"/>
                                            <span className="text-sm">启用 DMA 循环模式</span>
                                        </label>
                                        <label className="flex items-center gap-2 bg-gray-900 rounded p-3 cursor-pointer">
                                            <input type="checkbox" checked={scanMode} onChange={(e) => setScanMode(e.target.checked)} className="w-4 h-4"/>
                                            <span className="text-sm">扫描模式 (自动切换通道)</span>
                                        </label>
                                    </div>
                                </div>
                                <div className="bg-green-900 rounded-lg p-4">
                                    <h4 className="font-bold mb-2 text-green-400">✓ DMA 优势</h4>
                                    <ul className="space-y-1 text-sm">
                                        <li>• CPU 零负载，专注其他任务</li>
                                        <li>• 自动填充采样缓冲</li>
                                        <li>• 可实现高速连续采样</li>
                                        <li>• 降低中断延迟影响</li>
                                    </ul>
                                </div>
                            </div>
                        );
                    case 7:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-blue-400">STM32 代码实现</h3>
                                    <div className="bg-gray-900 rounded p-4 font-mono text-xs overflow-x-auto">
                                        <pre className="text-green-400">{`// ADC 初始化
void ADC_Init(void) {
    // 1. 使能时钟
    RCC->APB2ENR |= RCC_APB2ENR_ADC1EN;
    RCC->APB2ENR |= RCC_APB2ENR_IOPAEN;

    // 2. 配置 PA0 为模拟输入
    GPIOA->CRL &= ~0x0F;
    GPIOA->CRL |= 0x00;  // 模拟模式

    // 3. ADC 校准
    ADC1->CR2 |= ADC_CR2_ADON;
    Delay_us(10);
    ADC1->CR2 |= ADC_CR2_RSTCAL;
    while (ADC1->CR2 & ADC_CR2_RSTCAL);
    ADC1->CR2 |= ADC_CR2_CAL;
    while (ADC1->CR2 & ADC_CR2_CAL);

    // 4. 连续转换模式
    ADC1->CR2 |= ADC_CR2_CONT;
    ADC1->SQR3 = 0;  // 通道 0
}`}</pre>
                                    </div>
                                </div>
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-xl font-bold mb-3 text-emerald-400">读取函数</h3>
                                    <div className="bg-gray-900 rounded p-4 font-mono text-xs overflow-x-auto">
                                        <pre className="text-green-400">{`// 读取 ADC 值
uint16_t ADC_Read(uint8_t channel) {
    // 设置通道
    ADC1->SQR3 = channel;
    // 启动转换
    ADC1->CR2 |= ADC_CR2_SWSTART;
    // 等待转换完成
    while (!(ADC1->SR & ADC_SR_EOC));
    // 返回结果
    return ADC1->DR;
}

// 转换为电压
float ADC_ToVoltage(uint16_t value) {
    return (value * 3.3f) / 4095.0f;
}`}</pre>
                                    </div>
                                </div>
                                <div className="bg-gradient-to-r from-purple-900 to-blue-900 rounded-lg p-4">
                                    <h4 className="font-bold mb-2">🔧 提高精度技巧</h4>
                                    <ul className="space-y-1 text-sm">
                                        <li>• 过采样：16 次平均提高 2 位精度</li>
                                        <li>• 滤波电容：100nF 靠近 Vref 引脚</li>
                                        <li>• 屏蔽干扰：远离高频信号线</li>
                                        <li>• 定期校准：减少温度漂移</li>
                                    </ul>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-4">
                            <h1 className="text-2xl font-bold bg-gradient-to-r from-blue-400 via-blue-500 to-emerald-400 bg-clip-text text-transparent">
                                STM32 ADC 多通道采集完整指南
                            </h1>
                            <p className="text-sm text-gray-400">12 位 SAR ADC · 多通道扫描 · DMA 传输 · 触发源配置</p>
                        </div>

                        <div className="flex gap-2 mb-4 justify-center">
                            {!isPlaying ? (
                                <button onClick={handlePlay} className="px-4 py-2 bg-green-600 rounded-lg hover:bg-green-700 transition-colors flex items-center gap-2">
                                    <span>▶</span> 播放
                                </button>
                            ) : (
                                <button onClick={handlePause} className="px-4 py-2 bg-yellow-600 rounded-lg hover:bg-yellow-700 transition-colors flex items-center gap-2">
                                    <span>⏸</span> 暂停
                                </button>
                            )}
                            <button onClick={handleRestart} className="px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors flex items-center gap-2">
                                <span>🔄</span> 重新开始
                            </button>
                            <button
                                onClick={() => setShowWaveform(!showWaveform)}
                                className={`px-4 py-2 rounded-lg transition-colors ${showWaveform ? 'bg-blue-600' : 'bg-gray-600'} hover:opacity-80`}
                            >
                                {showWaveform ? '隐藏波形' : '显示波形'}
                            </button>
                        </div>

                        <div className="flex gap-2 mb-4 overflow-x-auto justify-center">
                            {STEPS.map((step, index) => (
                                <button
                                    key={index}
                                    onClick={() => handleStepClick(index)}
                                    className={`px-3 py-2 rounded-lg text-xs font-medium whitespace-nowrap transition-all ${
                                        index === currentStep
                                            ? `bg-gradient-to-r ${COLOR_MAP.gradient} text-white shadow-lg`
                                            : 'bg-gray-800 text-gray-400 hover:bg-gray-700'
                                    }`}
                                >
                                    {index + 1}. {step.title}
                                </button>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4">
                                <h3 className="text-sm font-bold text-gray-400 mb-3">代码区</h3>
                                <div className="bg-gray-900 rounded p-3 font-mono text-xs overflow-x-auto">
                                    <pre className="text-green-400">{`// ADC 操作函数
void ADC_Init(void);
uint16_t ADC_Read(uint8_t ch);
float ADC_GetVoltage(uint8_t ch);
void ADC_StartDMA(void);
void ADC_StopDMA(void);`}</pre>
                                </div>
                                <div className="mt-4">
                                    <div className="text-xs text-gray-400 mb-2">当前转换:</div>
                                    <div className={`text-center py-3 rounded font-bold ${isConverting ? 'bg-blue-600 animate-pulse' : conversionResult !== null ? 'bg-green-600' : 'bg-gray-700'}`}>
                                        {isConverting ? '转换中...' : conversionResult !== null ? `ADC=${conversionResult}` : '空闲'}
                                    </div>
                                </div>
                                {showWaveform && (
                                    <div className="mt-4">
                                        {renderWaveform()}
                                    </div>
                                )}
                            </div>

                            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4">
                                <h3 className="text-sm font-bold text-gray-400 mb-3">可视化区</h3>
                                <div className="space-y-4">
                                    <div className="bg-gray-900 rounded p-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-xs text-gray-400">通道选择</span>
                                            <span className="text-xs text-blue-400">CH{channel}: {channels[channel].name} = {channels[channel].value.toFixed(2)}V</span>
                                        </div>
                                        <div className="grid grid-cols-8 gap-1">
                                            {channels.map((ch, i) => (
                                                <button
                                                    key={ch.id}
                                                    onClick={() => setChannel(i)}
                                                    className={`py-2 rounded text-xs font-bold transition-all ${
                                                        channel === i ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'
                                                    }`}
                                                >
                                                    CH{i}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-gray-900 rounded p-4">
                                        <div className="text-center mb-4">
                                            <div className="text-4xl font-bold text-blue-400">{adcValue}</div>
                                            <div className="text-sm text-gray-400">ADC 值 (0-4095)</div>
                                        </div>
                                        <div className="h-4 bg-gray-800 rounded-full overflow-hidden">
                                            <div
                                                className="h-full bg-gradient-to-r from-blue-600 to-green-600 transition-all"
                                                style={{ width: `${(adcValue / 4095) * 100}%` }}
                                            ></div>
                                        </div>
                                        <div className="text-center mt-2 text-sm text-green-400 font-mono">
                                            {voltage.toFixed(3)} V
                                        </div>
                                    </div>

                                    <button
                                        onClick={startConversion}
                                        disabled={isConverting}
                                        className="w-full bg-gradient-to-r from-blue-600 to-emerald-600 rounded py-3 text-sm font-bold hover:opacity-90 disabled:opacity-50"
                                    >
                                        {isConverting ? '转换中...' : '启动 ADC 转换'}
                                    </button>
                                </div>
                            </div>

                            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4">
                                <h3 className="text-sm font-bold text-gray-400 mb-3">说明区</h3>
                                <div className="space-y-4">
                                    <div className="bg-gradient-to-r from-blue-900 to-emerald-900 rounded-lg p-3">
                                        <div className="font-bold text-blue-400 mb-2">步骤 {currentStep + 1}: {STEPS[currentStep].title}</div>
                                        <div className="text-xs text-gray-300">{STEPS[currentStep].voice}</div>
                                    </div>
                                    {renderContent()}
                                </div>
                            </div>
                        </div>

                        <div className="text-center mt-4 text-xs text-gray-500">
                            STM32 ADC 多通道采集完整指南 | 12 位 SAR | DMA 传输 | 遵循 SKILL.md v3.0 标准
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
