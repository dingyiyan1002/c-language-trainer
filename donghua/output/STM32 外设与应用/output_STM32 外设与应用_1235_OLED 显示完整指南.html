<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 OLED 显示完整指南 - 题库动画生成器</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { visibility: visible; } 50% { visibility: hidden; } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes flow { 0% { transform: translateY(0); } 100% { transform: translateY(20px); } }
        @keyframes press { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        @keyframes release { 0% { transform: scale(0.95); } 100% { transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes jitter { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes debounce { 0% { transform: scale(1); } 50% { transform: scale(0.8); } 100% { transform: scale(1); } }
        @keyframes longpress { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        @keyframes highlight { 0%, 100% { background-color: rgba(255,255,0,0.3); } 50% { background-color: rgba(255,255,0,0.8); } }
        @keyframes activate { 0% { box-shadow: 0 0 5px currentColor; } 50% { box-shadow: 0 0 20px currentColor; } 100% { box-shadow: 0 0 5px currentColor; } }
        @keyframes wave { 0% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } 100% { transform: rotate(0deg); } }
        @keyframes staircase { 0% { transform: translateY(0); } 25% { transform: translateY(-5px); } 50% { transform: translateY(-10px); } 75% { transform: translateY(-15px); } 100% { transform: translateY(0); } }
        @keyframes smooth { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }
        @keyframes triangle { 0% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); } 50% { clip-path: polygon(50% 100%, 0% 0%, 100% 0%); } 100% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); } }
        @keyframes noise { 0% { transform: translate(0,0); } 25% { transform: translate(-2px,2px); } 50% { transform: translate(2px,-2px); } 75% { transform: translate(-2px,-2px); } 100% { transform: translate(0,0); } }
        @keyframes tick { 0% { transform: rotate(-30deg); } 100% { transform: rotate(0deg); } }
        @keyframes second { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes update { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes alarm { 0%, 100% { background-color: rgba(255,0,0,0.3); } 50% { background-color: rgba(255,0,0,0.8); } }
        @keyframes backup { 0% { transform: translateX(0); } 50% { transform: translateX(10px); } 100% { transform: translateX(0); } }
        @keyframes circular { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes transfer { 0% { transform: translateX(0) scale(1); } 50% { transform: translateX(50px) scale(0.8); } 100% { transform: translateX(0) scale(1); } }
        @keyframes read { 0% { transform: scaleX(1); } 50% { transform: scaleX(1.2); } 100% { transform: scaleX(1); } }
        @keyframes write { 0% { transform: scaleY(1); } 50% { transform: scaleY(0.8); } 100% { transform: scaleY(1); } }
        @keyframes move { 0% { transform: translate(0,0); } 25% { transform: translate(10px,0); } 50% { transform: translate(20px,10px); } 75% { transform: translate(10px,20px); } 100% { transform: translate(0,0); } }
        @keyframes pixelOn { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        @keyframes dataStream { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes pageSwitch { 0% { transform: scaleY(1); } 50% { transform: scaleY(0.1); } 100% { transform: scaleY(1); } }
        .animate-pulse { animation: pulse 2s infinite; }
        .animate-blink { animation: blink 1s infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        .animate-flow { animation: flow 1.5s infinite; }
        .animate-press { animation: press 0.2s ease-out; }
        .animate-release { animation: release 0.2s ease-out; }
        .animate-bounce { animation: bounce 1s infinite; }
        .animate-jitter { animation: jitter 0.3s infinite; }
        .animate-debounce { animation: debounce 0.3s ease-out; }
        .animate-longpress { animation: longpress 1.5s infinite; }
        .animate-scan { animation: scan 2s linear infinite; }
        .animate-highlight { animation: highlight 1.5s infinite; }
        .animate-activate { animation: activate 1s infinite; }
        .animate-wave { animation: wave 1s infinite; }
        .animate-staircase { animation: staircase 2s infinite; }
        .animate-smooth { animation: smooth 1.5s infinite; }
        .animate-triangle { animation: triangle 2s infinite; }
        .animate-noise { animation: noise 0.3s infinite; }
        .animate-tick { animation: tick 0.3s ease-out; }
        .animate-second { animation: second 1s linear infinite; }
        .animate-update { animation: update 1s infinite; }
        .animate-alarm { animation: alarm 0.5s infinite; }
        .animate-backup { animation: backup 0.5s infinite; }
        .animate-circular { animation: circular 1s linear infinite; }
        .animate-transfer { animation: transfer 1s infinite; }
        .animate-read { animation: read 0.5s ease-out; }
        .animate-write { animation: write 0.5s ease-out; }
        .animate-move { animation: move 2s infinite; }
        .animate-pixelOn { animation: pixelOn 0.1s ease-out; }
        .animate-dataStream { animation: dataStream 1s linear infinite; }
        .animate-pageSwitch { animation: pageSwitch 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const COLOR_MAP = {
            primary: '#22c55e',
            secondary: '#16a34a',
            accent: '#4ade80',
            light: '#dcfce7',
            dark: '#14532d',
            highlight: '#86efac'
        };

        const STEPS = [
            {
                title: "OLED 显示基础",
                narration: "0.96 寸 OLED 显示屏，128x64 分辨率，SSD1306 控制器，支持 I2C 和 SPI 接口，自发光无需背光，低功耗高对比度。",
                code: `// OLED 显示屏参数
#define OLED_WIDTH    128    // 宽度 128 像素
#define OLED_HEIGHT   64     // 高度 64 像素
#define OLED_PAGES    8      // 8 页 (每页 8 行)

// SSD1306 控制器特性
// - 自发光 OLED 材料
// - 无需背光模组
// - 高对比度 (>10000:1)
// - 宽视角 (>160°)
// - 低功耗 (0.08W)
// - 工作电压：3.3V-5V

// 显示内存映射 (GDDRAM)
// 共 1024 字节 (128×64/8 = 128×8 页)
// 页地址：0xB0-0xB7 (8 页)
// 列地址：0x00-0x7F (128 列)

// 常用指令集
#define OLED_CMD_DISPLAY_OFF    0xAE  // 关闭显示
#define OLED_CMD_DISPLAY_ON     0xAF  // 开启显示
#define OLED_CMD_NORMAL_DISP    0xA6  // 正常显示
#define OLED_CMD_INVERSE_DISP   0xA7  // 反色显示
#define OLED_CMD_SET_CONTRAST   0x81  // 设置对比度
#define OLED_CMD_ENTIRE_ON      0xA4  // 正常显示 RAM`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-green-900 to-green-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">0.96" OLED 结构</div>
                        {/* OLED 屏幕 */}
                        <div className="absolute top-12 left-1/2 transform -translate-x-1/2 w-40 h-24 bg-black rounded-lg border-4 border-gray-600 shadow-lg overflow-hidden">
                            {/* 像素网格 */}
                            <div className="grid grid-cols-16 gap-0 h-full">
                                {Array.from({length: 64}).map((_, i) => (
                                    <div key={i} className={`w-full h-full ${i < 32 ? 'bg-green-500' : 'bg-black'} ${i % 2 === 0 ? 'opacity-100' : 'opacity-70'}`}></div>
                                ))}
                            </div>
                            {/* 文字 */}
                            <div className="absolute inset-0 flex items-center justify-center">
                                <span className="text-green-400 text-xs font-mono animate-pixelOn">OLED</span>
                            </div>
                        </div>
                        {/* 引脚 */}
                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 grid grid-cols-4 gap-4">
                            {[
                                {name:'VCC',color:'bg-red-500'},
                                {name:'GND',color:'bg-black'},
                                {name:'SCL',color:'bg-yellow-500'},
                                {name:'SDA',color:'bg-green-500'}
                            ].map(pin => (
                                <div key={pin.name} className="flex flex-col items-center">
                                    <div className={`w-4 h-6 rounded ${pin.color}`}></div>
                                    <span className="text-white text-xs mt-1">{pin.name}</span>
                                </div>
                            ))}
                        </div>
                        {/* 特性标签 */}
                        <div className="absolute top-4 right-4 space-y-1">
                            <div className="text-green-300 text-xs">✓ 128×64</div>
                            <div className="text-green-300 text-xs">✓ I2C/SPI</div>
                            <div className="text-green-300 text-xs">✓ 自发光</div>
                        </div>
                    </div>
                ),
                explanations: [
                    "0.96 寸：对角线尺寸，128×64 分辨率",
                    "SSD1306: Solomon Systech 控制器",
                    "GDDRAM: 图形显示数据 RAM(1024 字节)",
                    "8 页模式：每页 8 行，共 64 行",
                    "I2C 接口：仅 SCL+SDA 两根线",
                    "自发光：每个像素独立发光",
                    "高对比度：纯黑背景，纯白文字",
                    "低功耗：仅显示部分点亮时"
                ]
            },
            {
                title: "工作原理",
                narration: "SSD1306 通过 GDDRAM 映射控制像素。段驱动器和共极驱动器配合，逐页扫描显示。电荷泵产生 OLED 所需高压。",
                code: `// SSD1306 内部结构
// ┌─────────────────────────────┐
// │  GDDRAM (128×64 位)         │
// │  段驱动器 (128 路)           │
// │  共极驱动器 (64 路)          │
// │  电荷泵 (升压至 15V)         │
// │  振荡器电路                │
// │  I2C/SPI 接口逻辑           │
// └─────────────────────────────┘

// 显示数据流程:
// MCU → GDDRAM → 段驱动 → OLED 像素
//            ↓
//         共极驱动 (逐页扫描)

// 内存映射模式:
// 1. 页寻址模式 (默认)
// 2. 水平寻址模式
// 3. 垂直寻址模式`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-green-900 to-green-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">SSD1306 内部结构</div>
                        {/* GDDRAM */}
                        <div className="absolute top-16 left-1/2 transform -translate-x-1/2 grid grid-cols-8 gap-1">
                            {Array.from({length: 8}).map((_, page) => (
                                <div key={page} className={`border border-green-500 p-1 ${page === 0 ? 'bg-green-800 animate-pulse' : 'bg-green-900'}`}>
                                    <div className="text-green-300 text-xs text-center">Page{page}</div>
                                    <div className="text-green-500 text-xs text-center font-mono">0xB{page}</div>
                                </div>
                            ))}
                        </div>
                        {/* 驱动器 */}
                        <div className="absolute top-40 left-1/2 transform -translate-x-1/2 grid grid-cols-2 gap-4">
                            <div className="bg-blue-800 rounded-lg p-3 border-2 border-blue-500">
                                <div className="text-white text-xs text-center font-bold">段驱动器</div>
                                <div className="text-blue-300 text-xs text-center mt-1">128 路输出</div>
                            </div>
                            <div className="bg-purple-800 rounded-lg p-3 border-2 border-purple-500">
                                <div className="text-white text-xs text-center font-bold">共极驱动器</div>
                                <div className="text-purple-300 text-xs text-center mt-1">64 路输出</div>
                            </div>
                        </div>
                        {/* 电荷泵 */}
                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-yellow-800 rounded-lg p-3 border-2 border-yellow-500 animate-activate">
                            <div className="text-white text-xs text-center font-bold">电荷泵</div>
                            <div className="text-yellow-300 text-xs text-center mt-1">3.3V → 15V</div>
                        </div>
                        {/* 数据流 */}
                        <svg className="absolute inset-0 w-full h-full">
                            <path d="M 50% 100 L 50% 140" stroke="#22c55e" strokeWidth="2" fill="none" className="animate-flow" />
                            <path d="M 50% 200 L 50% 240" stroke="#3b82f6" strokeWidth="2" fill="none" className="animate-flow" />
                        </svg>
                    </div>
                ),
                explanations: [
                    "GDDRAM:128×64 位图，1 位=1 像素",
                    "段驱动器：控制 128 列数据",
                    "共极驱动器：控制 64 行扫描",
                    "电荷泵：3.3V 升压至 15V 驱动 OLED",
                    "页寻址：按 8 行一组组织数据",
                    "水平寻址：从左到右逐像素",
                    "垂直寻址：从上到下逐列",
                    "扫描频率：~100Hz 无闪烁"
                ]
            },
            {
                title: "硬件连接",
                narration: "STM32 与 OLED 的 I2C 连接。PB6 接 SCL，PB7 接 SDA。VCC 接 3.3V，GND 共地。SPI 模式需额外连接 MOSI、SCK、DC、RST、CS。",
                code: `// STM32F103 与 OLED(I2C) 连接
// OLED 引脚    STM32 引脚    功能
// VCC          3.3V         电源正
// GND          GND          电源地
// SCL          PB6          I2C 时钟 (硬件 I2C1_SCL)
// SDA          PB7          I2C 数据 (硬件 I2C1_SDA)
// RES          PB8          复位 (可选，可接 3.3V)
// DC           PB9          数据/命令选择 (SPI 模式用)

// STM32 硬件 I2C 配置
// I2C1: PB6(SCL), PB7(SDA)
// I2C2: PB10(SCL), PB11(SDA)

// I2C 时序:
// 标准模式：100kHz
// 快速模式：400kHz
// SSD1306 地址：0x3C(0b0111100)`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-green-900 to-green-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">I2C 硬件连接</div>
                        {/* STM32 */}
                        <div className="absolute left-4 top-1/2 transform -translate-y-1/2 w-20 h-40 bg-gradient-to-b from-blue-800 to-blue-900 rounded-lg border-2 border-blue-500">
                            <div className="text-white text-xs text-center py-2 font-bold">STM32</div>
                            <div className="grid grid-cols-1 gap-1 px-2 mt-2">
                                {['PB6','PB7','3.3V','GND'].map(pin => (
                                    <div key={pin} className="text-cyan-300 text-xs font-mono">{pin}</div>
                                ))}
                            </div>
                        </div>
                        {/* OLED */}
                        <div className="absolute right-4 top-1/2 transform -translate-y-1/2 w-32 h-20 bg-black rounded-lg border-4 border-gray-600">
                            <div className="text-green-400 text-xs text-center py-1 font-mono">OLED</div>
                            <div className="text-green-400 text-sm text-center">STM32</div>
                        </div>
                        {/* 连线 */}
                        <svg className="absolute inset-0 w-full h-full">
                            <line x1="130" y1="140" x2="180" y2="110" stroke="#fbbf24" strokeWidth="3" className="animate-pulse" />
                            <line x1="130" y1="160" x2="180" y2="125" stroke="#22c55e" strokeWidth="3" className="animate-pulse" />
                            <line x1="130" y1="180" x2="180" y2="140" stroke="#ef4444" strokeWidth="3" />
                            <line x1="130" y1="200" x2="180" y2="155" stroke="#000000" strokeWidth="3" strokeOpacity="0.5" />
                        </svg>
                        {/* 标签 */}
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black bg-opacity-50 rounded-lg p-2">
                            <div className="text-white text-xs">
                                <div><span className="text-yellow-400">PB6→SCL</span></div>
                                <div><span className="text-green-400">PB7→SDA</span></div>
                                <div><span className="text-red-400">3.3V→VCC</span></div>
                                <div><span className="text-gray-400">GND→GND</span></div>
                            </div>
                        </div>
                    </div>
                ),
                explanations: [
                    "VCC:3.3V 电源 (兼容 5V)",
                    "GND: 共地连接",
                    "SCL (PB6):I2C 时钟线，需上拉电阻",
                    "SDA (PB7):I2C 数据线，需上拉电阻",
                    "RES: 复位引脚 (低电平复位)",
                    "DC: 数据/命令选择 (I2C 可省略)",
                    "I2C 地址：0x3C(7 位：0111100)",
                    "上拉电阻：4.7kΩ典型值"
                ]
            },
            {
                title: "GPIO 配置",
                narration: "配置 PB6 和 PB7 为复用开漏输出模式。使能 I2C1 时钟，配置 SCL 和 SDA 引脚。内部上拉或外部上拉电阻。",
                code: `void OLED_I2C_GPIO_Init(void) {
    // 使能 GPIOB 和 I2C1 时钟
    RCC->APB2ENR |= RCC_APB2ENR_IOPBEN;
    RCC->APB1ENR |= RCC_APB1ENR_I2C1EN;

    // PB6(I2C1_SCL): 复用开漏输出，50MHz
    GPIOB->CRL &= ~0x000000FF;
    GPIOB->CRL |= 0x00000077;  // AF_OD, 50MHz

    // PB7(I2C1_SDA): 复用开漏输出，50MHz
    GPIOB->CRL &= ~0x0000FF00;
    GPIOB->CRL |= 0x00007700;  // AF_OD, 50MHz

    // 配置为无上拉 (外部上拉电阻)
    GPIOB->PUPDR &= ~(0x3 << 12);
    GPIOB->PUPDR &= ~(0x3 << 14);
}

// I2C 软件模拟 (兼容任意 GPIO)
#define SCL_HIGH()  GPIOB->BSRR = (1 << 6)
#define SCL_LOW()   GPIOB->BSRR = (1 << 6) << 16
#define SDA_HIGH()  GPIOB->BSRR = (1 << 7)
#define SDA_LOW()   GPIOB->BSRR = (1 << 7) << 16`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-green-900 to-green-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">GPIO 配置 (复用开漏)</div>
                        {/* GPIO 结构 */}
                        <div className="absolute top-16 left-1/2 transform -translate-x-1/2">
                            <div className="bg-blue-900 rounded-lg p-4 border-2 border-blue-500">
                                <div className="text-white text-sm font-bold mb-2">GPIOx MODER/OTYPER</div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">MODER[1:0]</div>
                                        <div className="text-yellow-400 text-sm font-mono">10=复用</div>
                                    </div>
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">OTYPER</div>
                                        <div className="text-green-400 text-sm font-mono">1=开漏</div>
                                    </div>
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">OSPEEDR[1:0]</div>
                                        <div className="text-blue-400 text-sm font-mono">11=50MHz</div>
                                    </div>
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">PUPDR[1:0]</div>
                                        <div className="text-purple-400 text-sm font-mono">00=外部上拉</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        {/* 开漏输出 */}
                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2">
                            <div className="text-white text-xs mb-2">开漏输出原理</div>
                            <div className="flex items-center space-x-4">
                                <div className="bg-gray-700 rounded p-2">
                                    <div className="text-green-400 text-xs">MOSFET</div>
                                    <div className="text-white text-xs font-mono">导通=GND</div>
                                </div>
                                <div className="text-white text-2xl">→</div>
                                <div className="bg-yellow-600 rounded p-2">
                                    <div className="text-white text-xs">上拉电阻</div>
                                    <div className="text-yellow-200 text-xs font-mono">4.7kΩ</div>
                                </div>
                                <div className="text-white text-2xl">→</div>
                                <div className="bg-green-600 rounded p-2 animate-pulse">
                                    <div className="text-white text-xs">SDA/SCL</div>
                                    <div className="text-green-200 text-xs font-mono">3.3V/GND</div>
                                </div>
                            </div>
                        </div>
                    </div>
                ),
                explanations: [
                    "RCC->APB2ENR: 使能 GPIOB 时钟",
                    "RCC->APB1ENR: 使能 I2C1 时钟",
                    "MODER[1:0]=10: 复用功能模式",
                    "OTYPER=1: 开漏输出 (I2C 必需)",
                    "OSPEEDR=11:50MHz 高速",
                    "外部上拉：4.7kΩ电阻",
                    "软件模拟：BSRR 原子操作",
                    "硬件 I2C: 需配置 AF 功能"
                ]

void I2C_Start(void) {
    SDA_HIGH(); SCL_HIGH();
    Delay_us(5);
    SDA_LOW();   // SDA 下降沿
    Delay_us(5);
    SCL_LOW();
}

// I2C 停止条件
void I2C_Stop(void) {
    SDA_LOW(); SCL_HIGH();
    Delay_us(5);
    SDA_HIGH();  // SDA 上升沿
    Delay_us(5);
}

// I2C 发送字节
void I2C_SendByte(uint8_t byte) {
    for (int i = 7; i >= 0; i--) {
        SCL_LOW();
        if (byte & (1 << i)) SDA_HIGH();
        else SDA_LOW();
        Delay_us(5);
        SCL_HIGH();
        Delay_us(5);
    }
    SCL_LOW(); SDA_HIGH();  // ACK
    SCL_HIGH(); Delay_us(5);
    SCL_LOW();
}

// OLED 写命令
void OLED_WriteCmd(uint8_t cmd) {
    I2C_Start();
    I2C_SendByte(0x78);  // 0x3C<<1, Co=0, D/C#=0
    I2C_SendByte(cmd);
    I2C_Stop();
}`,

                            {/* Explanations */}
                            <div className="bg-gray-800 rounded-xl p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-green-400 mb-4">📖 解释</h3>
                                <ul className="space-y-3">
                                    {STEPS[currentStep].explanations.map((exp, index) => (
                                        <li key={index} className="text-white text-sm flex items-start">
                                            <span className="text-green-400 mr-2">•</span>
                                            <span>{exp}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Step Info */}
                        <div className="mt-8 text-center">
                            <h2 className="text-2xl font-bold text-green-400">
                                {currentStep + 1}. {STEPS[currentStep].title}
                            </h2>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
