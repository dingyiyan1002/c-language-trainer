<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>STM32 看门狗完整指南 - IWDG 独立看门狗与 WWDG 窗口看门狗</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @keyframes danger { 0%, 100% { background-color: rgb(239, 68, 68); } 50% { background-color: rgb(248, 113, 113); } }

        .slideIn { animation: slideIn 0.5s ease-out; }
        .scaleIn { animation: scaleIn 0.5s ease-out; }
        .fadeIn { animation: fadeIn 0.5s ease-out; }
        .countdown { animation: countdown 1s linear infinite; }
        .rotate { animation: rotate 2s linear infinite; }
        .shake { animation: shake 0.5s infinite; }

<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ========== 可配置参数 ==========
        const STEPS = [
            { title: "看门狗基础概念", code: `// 看门狗 (Watchdog) - 系统故障恢复机制
// 原理：定时器倒计时，超时则复位系统
// 应用：防止程序跑飞、死锁、无限循环

// STM32 两种看门狗:
// 1. IWDG - 独立看门狗
//    - 独立 LSI 时钟 (32kHz)
//    - 始终运行 (停机/待机模式也工作)
//    - 配置简单，精度较低

// 2. WWDG - 窗口看门狗
//    - 系统时钟 (PCLK)
//    - 窗口限制 (不能太早/太晚喂狗)
//    - 精度更高，可检测异常` },
            { title: "IWDG 工作原理", code: `// IWDG 独立看门狗架构
// LSI 时钟 (约 32kHz) → 预分频 → 计数器 → 复位

// IWDG 寄存器:
// - KR: 键值寄存器 (喂狗用)
// - PR: 预分频寄存器
// - RLR: 重载寄存器 (计数初值)
// - SR: 状态寄存器

// 喂狗操作:
// 写入 0xAAAA → 重载计数器
// 写入 0xCCCC → 启动看门狗
// 写入 0x5555 → 允许配置 PR/RLR` },
            { title: "IWDG 配置与喂狗", code: `// IWDG 配置步骤
void IWDG_Config(void) {
    // 1. 允许配置
    IWDG->KR = 0x5555;

    // 2. 设置预分频 (64 分频)
    IWDG->PR = 0x05;  // /64

    // 3. 设置重载值
    // 超时时间 = (RLR+1) × 4 × 2^PR / LSI
    // = (500+1) × 4 × 64 / 32000 ≈ 4 秒
    IWDG->RLR = 500;

    // 4. 等待寄存器同步
    while (IWDG->SR);

    // 5. 启动看门狗
    IWDG->KR = 0xCCCC;
}

// 喂狗函数 (必须在超时前调用)
void IWDG_Feed(void) {
    IWDG->KR = 0xAAAA;  // 重载计数器
}` },
            { title: "IWDG 超时时间计算", code: `// 超时时间计算公式:
// TOUT = (RLR + 1) × 4 × 2^PR / f_LSI
// f_LSI ≈ 32kHz

// 预分频系数表:
// PR[2:0] | 分频系数
//   000   |    4
//   001   |    8
//   010   |   16
//   011   |   32
//   100   |   64  ← 常用
//   101   |  128
//   110   |  256

// 示例配置:
// PR = 4 (/64), RLR = 250
// TOUT = 251 × 4 × 64 / 32000 = 2 秒

// PR = 5 (/64), RLR = 500
// TOUT = 501 × 4 × 64 / 32000 = 4 秒` },
            { title: "WWDG 窗口看门狗", code: `// WWDG 窗口看门狗特性
// - 计数器在 0x40 递减到 0x3F 时复位
// - 喂狗窗口：必须在 [0x40, CNT] 区间内喂狗
// - 过早喂狗 (CNT > 窗口) → 复位
// - 过晚喂狗 (CNT < 0x40) → 复位

// WWDG 寄存器:
// - CR: 控制寄存器 (计数器 + 使能)
// - CFR: 配置寄存器 (窗口 + 预分频 + 中断)
// - SR: 状态寄存器 (中断标志)

// 应用：检测程序执行时间异常
// (太早=执行过快，太晚=执行过慢)` },
            { title: "WWDG 配置与喂狗", code: `// WWDG 配置
void WWDG_Config(uint8_t window) {
    // 使能时钟
    RCC->APB1ENR |= RCC_APB1ENR_WWDGEN;

    // 配置窗口和预分频
    // 窗口值 (0x40-0x7F), 预分频 /8
    WWDG->CFR = (window & 0x7F) | (0 << 7) | (1 << 10);

    // 使能看门狗和中断
    // 计数器初值 0x7F
    WWDG->CR = WWDG_CR_WDGA | WWDG_CR_T6 | WWDG_CR_EWI;
}

// 喂狗函数 (必须在窗口内)
void WWDG_Feed(uint8_t counter) {
    // counter 必须在窗口范围内
    if (counter >= 0x40 && counter <= window) {
        WWDG->CR = (counter & 0x7F) | WWDG_CR_WDGA;
    }
}` },
            { title: "看门狗中断与应用", code: `// WWDG 提前唤醒中断 (EWI)
// 计数器 = 0x40 时触发，可提前处理
void WWDG_IRQHandler(void) {
    if (WWDG->SR & WWDG_SR_EWIF) {
        WWDG->SR = ~WWDG_SR_EWIF;  // 清除标志
        // 保存关键数据/记录错误
    }
}

// 应用：主循环看门狗
void Main_Loop(void) {
    while (1) {
        // 处理任务
        Process_Task1();
        Process_Task2();

        // 喂狗 (确保在主循环内)
        IWDG_Feed();
        // 或 WWDG_Feed(counter);
    }
}` },
            { title: "应用实例与调试", code: `// 完整应用示例
// 系统监控 + 看门狗保护

// 初始化
void System_Init(void) {
    // 配置 IWDG (4 秒超时)
    IWDG_Config();

    // 配置 WWDG (窗口 = 0x50)
    WWDG_Config(0x50);
    NVIC_EnableIRQ(WWDG_IRQn);
}

// 主循环
void Main_Loop(void) {
    while (1) {
        // 传感器读取
        float temp = Read_Temperature();
        float humidity = Read_Humidity();

        // 数据处理
        Process_Data(temp, humidity);

        // 通信处理
        Handle_UART();

        // 喂狗
        IWDG_Feed();
        WWDG_Feed(0x55);  // 窗口内

        // 延时 (确保不超过超时)
        Delay_ms(100);
    }
}

// 调试技巧:
// 1. 开发阶段可暂时禁用看门狗
// 2. 使用 SWD 调试时看门狗仍运行
// 3. 喂狗失败会自动复位，检查日志` }
        ];

        // ========== 6 种颜色配置 ==========
        const COLOR_MAP = {
            primary: "#e11d48",     // rose-600 - 主色
            secondary: "#be123c",   // rose-700 - 次要色
            accent: "#fb7185",      // rose-400 - 强调色
            bgStart: "#fff1f2",     // rose-50 - 背景渐变起始
            bgEnd: "#ffe4e6",       // rose-100 - 背景渐变结束
            code: "#881337"         // rose-900 - 代码高亮
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isComplete, setIsComplete] = useState(false);
            const voiceEndTimerRef = useRef(null);

            // 语音播放函数
            const speak = (text) => {
                if ('speechSynthesis' in world) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;

                    const voices = speechSynthesis.getVoices();
                    const preferredVoice = voices.find(voice =>
                        voice.name.includes('Xiaoxiao') ||
                        voice.name.includes('Chinese') ||
                        voice.lang === 'zh-CN'
                    );
                    if (preferredVoice) utterance.voice = preferredVoice;

                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            if (currentStep < STEPS.length - 1 && isPlaying) {
                                setCurrentStep(prev => prev + 1);
                            } else if (currentStep >= STEPS.length - 1) {
                                setIsComplete(true);
                                setIsPlaying(false);
                            }
                        }, 800);
                    };

                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            if (currentStep < STEPS.length - 1 && isPlaying) {
                                setCurrentStep(prev => prev + 1);
                            }
                        }, 800);
                    };

                    window.speechSynthesis.speak(utterance);
                }
            };

            // 步骤变化时触发语音
            useEffect(() => {
                if (isPlaying || currentStep === 0) {
                    speak(STEPS[currentStep].title);
                }
                return () => {
                    if (voiceEndTimerRef.current) {
                        clearTimeout(voiceEndTimerRef.current);
                    }
                };
            }, [currentStep, isPlaying]);

            // 初始化语音
            useEffect(() => {
                if ('speechSynthesis' in window) {
                    speechSynthesis.getVoices();
                }
            }, []);

            const handleStart = () => {
                setCurrentStep(0);
                setIsPlaying(true);
                setIsComplete(false);
                speak(STEPS[0].title);
            };

            const handleNext = () => {
                if (currentStep < STEPS.length - 1) {
                    setCurrentStep(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setCurrentStep(prev => prev - 1);
                }
            };

            const handleReset = () => {
                setIsPlaying(false);
                setCurrentStep(0);
                setIsComplete(false);
                window.speechSynthesis.cancel();
            };

            // 看门狗动画组件
            const WatchdogAnimation = () => {
                const step = currentStep;

                // 步骤 1: 基础概念
                if (step === 0) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">看门狗工作原理</h4>
                            <div className="grid grid-cols-3 gap-4">
                                {/* 正常运行 */}
                                <div className="bg-white rounded-lg p-4 shadow text-center">
                                    <div className="text-4xl mb-2">🐕</div>
                                    <div className="text-sm font-bold text-green-600">正常运行</div>
                                    <div className="text-xs text-gray-500 mt-1">程序正常</div>
                                    <div className="mt-2 text-xs text-gray-400">主人在喂狗</div>
                                </div>

                                {/* 程序跑飞 */}
                                <div className="bg-white rounded-lg p-4 shadow text-center">
                                    <div className="text-4xl mb-2 shake">😵</div>
                                    <div className="text-sm font-bold text-red-600">程序跑飞</div>
                                    <div className="text-xs text-gray-500 mt-1">无人喂狗</div>
                                    <div className="mt-2 text-xs text-gray-400">狗饿了会咬人</div>
                                </div>

                                {/* 系统复位 */}
                                <div className="bg-white rounded-lg p-4 shadow text-center">
                                    <div className="text-4xl mb-2">🔄</div>
                                    <div className="text-sm font-bold text-rose-600">系统复位</div>
                                    <div className="text-xs text-gray-500 mt-1">看门狗触发</div>
                                    <div className="mt-2 text-xs text-gray-400">重启系统</div>
                                </div>
                            </div>

                            {/* 底部说明 */}
                            <div className="mt-4 bg-rose-600 text-white rounded-lg p-3 text-xs">
                                <div className="font-bold mb-1">看门狗比喻:</div>
                                <div>• 狗 = 定时器 (不断倒计时)</div>
                                <div>• 喂狗 = 重载计数器 (程序正常)</div>
                                <div>• 不喂狗 = 超时复位 (程序异常)</div>
                            </div>
                        </div>
                    );
                }

                // 步骤 2: IWDG 工作原理
                if (step === 1) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">IWDG 独立看门狗架构</h4>
                            <div className="flex items-center gap-2">
                                {/* LSI 时钟源 */}
                                <div className="bg-blue-100 rounded-lg p-3 shadow text-center">
                                    <div className="text-xs font-bold text-blue-700">LSI</div>
                                    <div className="text-2xl pulse">📡</div>
                                    <div className="text-xs text-blue-600">32kHz</div>
                                </div>

                                {/* 箭头 */}
                                <div className="text-rose-400 text-2xl">→</div>

                                {/* 预分频器 */}
                                <div className="bg-yellow-100 rounded-lg p-3 shadow text-center">
                                    <div className="text-xs font-bold text-yellow-700">预分频</div>
                                    <div className="text-xs text-yellow-600">/4 ~ /256</div>
                                    <div className="text-lg">⚙️</div>
                                </div>

                                {/* 箭头 */}
                                <div className="text-rose-400 text-2xl">→</div>

                                {/* 计数器 */}
                                <div className="bg-rose-100 rounded-lg p-3 shadow text-center relative">
                                    <div className="text-xs font-bold text-rose-700">计数器</div>
                                    <div className="text-2xl font-mono pulse">123</div>
                                    <div className="text-xs text-rose-600">递减中...</div>
                                </div>

                                {/* 箭头 */}
                                <div className="text-rose-400 text-2xl">→</div>

                                {/* 复位输出 */}
                                <div className="bg-red-500 rounded-lg p-3 shadow text-center text-white">
                                    <div className="text-xs font-bold">系统复位</div>
                                    <div className="text-2xl">⚠️</div>
                                </div>
                            </div>

                            {/* 寄存器说明 */}
                            <div className="mt-4 grid grid-cols-4 gap-2 text-xs">
                                <div className="bg-white p-2 rounded shadow">
                                    <div className="font-bold text-rose-600">KR</div>
                                    <div className="text-gray-500">键值寄存器</div>
                                    <div className="text-gray-400">0xAAAA 喂狗</div>
                                </div>
                                <div className="bg-white p-2 rounded shadow">
                                    <div className="font-bold text-rose-600">PR</div>
                                    <div className="text-gray-500">预分频</div>
                                    <div className="text-gray-400">0-6</div>
                                </div>
                                <div className="bg-white p-2 rounded shadow">
                                    <div className="font-bold text-rose-600">RLR</div>
                                    <div className="text-gray-500">重载值</div>
                                    <div className="text-gray-400">0-0xFFF</div>
                                </div>
                                <div className="bg-white p-2 rounded shadow">
                                    <div className="font-bold text-rose-600">SR</div>
                                    <div className="text-gray-500">状态</div>
                                    <div className="text-gray-400">同步标志</div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 3: IWDG 配置与喂狗
                if (step === 2) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">IWDG 配置流程</h4>
                            <div className="grid grid-cols-5 gap-2">
                                {[
                                    { icon: '🔓', title: '解锁', code: '0x5555', desc: '允许配置' },
                                    { icon: '⚙️', title: '分频', code: 'PR=5', desc: '/64' },
                                    { icon: '📊', title: '重载', code: 'RLR=500', desc: '4 秒' },
                                    { icon: '⏳', title: '同步', code: 'wait SR', desc: '等待' },
                                    { icon: '▶️', title: '启动', code: '0xCCCC', desc: '运行' }
                                ].map((s, i) => (
                                    <div key={i} className={`bg-white rounded-lg p-3 shadow text-center transition-all ${i <= currentStep ? 'ring-2 ring-rose-500' : ''}`}>
                                        <div className="text-2xl mb-1">{s.icon}</div>
                                        <div className="text-xs font-bold text-rose-700">{s.title}</div>
                                        <div className="text-xs text-rose-600 font-mono">{s.code}</div>
                                        <div className="text-xs text-gray-400">{s.desc}</div>
                                    </div>
                                ))}
                            </div>

                            {/* 喂狗演示 */}
                            <div className="mt-4 bg-white rounded-lg p-4 shadow">
                                <div className="flex items-center justify-between">
                                    <div className="text-sm font-bold text-rose-700">喂狗操作:</div>
                                    <button className="px-4 py-2 bg-rose-500 text-white rounded-lg text-sm font-bold hover:bg-rose-600 feed">
                                        🦴 写入 0xAAAA
                                    </button>
                                </div>
                                <div className="mt-2 flex items-center gap-4">
                                    <div className="flex-1 bg-gray-200 rounded-full h-4">
                                        <div className="bg-gradient-to-r from-green-500 to-yellow-500 h-4 rounded-full timeout" style={{ width: '70%' }}></div>
                                    </div>
                                    <div className="text-xs text-rose-600 font-bold">计数器: {Math.floor(Math.random() * 500)}</div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 4: 超时时间计算
                if (step === 3) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">超时时间计算</h4>

                            {/* 公式 */}
                            <div className="bg-white rounded-lg p-3 shadow mb-4">
                                <div className="text-xs font-mono text-rose-700">
                                    TOUT = (RLR + 1) × 4 × 2^PR / f_LSI
                                </div>
                                <div className="text-xs text-gray-500 mt-1">f_LSI ≈ 32kHz</div>
                            </div>

                            {/* 分频表 */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-rose-700 mb-2">预分频系数</h5>
                                    <table className="w-full text-xs">
                                        <thead>
                                            <tr className="bg-rose-100">
                                                <th className="p-1">PR</th>
                                                <th className="p-1">分频</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {[
                                                ['000', '/4'], ['001', '/8'], ['010', '/16'],
                                                ['011', '/32'], ['100', '/64'], ['101', '/128'],
                                                ['110', '/256']
                                            ].map((row, i) => (
                                                <tr key={i} className={i === 4 ? 'bg-rose-200 font-bold' : ''}>
                                                    <td className="p-1 text-center">{row[0]}</td>
                                                    <td className="p-1 text-center">{row[1]}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>

                                {/* 示例计算 */}
                                <div className="space-y-2">
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <div className="text-xs text-gray-500">示例 1</div>
                                        <div className="text-xs text-rose-700">PR=4, RLR=250</div>
                                        <div className="text-xs font-bold text-green-600">2 秒</div>
                                    </div>
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <div className="text-xs text-gray-500">示例 2</div>
                                        <div className="text-xs text-rose-700">PR=5, RLR=500</div>
                                        <div className="text-xs font-bold text-green-600">4 秒</div>
                                    </div>
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <div className="text-xs text-gray-500">示例 3</div>
                                        <div className="text-xs text-rose-700">PR=6, RLR=1000</div>
                                        <div className="text-xs font-bold text-green-600">8 秒</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 5: WWDG 窗口看门狗
                if (step === 4) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">WWDG 窗口看门狗</h4>

                            {/* 窗口示意图 */}
                            <div className="bg-white rounded-lg p-4 shadow mb-4">
                                <div className="flex items-end gap-1 h-24">
                                    {/* 计数器范围 */}
                                    {Array.from({ length: 64 }, (_, i) => {
                                        const cnt = 0x7F - i;
                                        const isWindow = cnt >= 0x40 && cnt <= 0x5A;
                                        const isDanger = cnt < 0x40;
                                        return (
                                            <div
                                                key={i}
                                                className={`flex-1 rounded-t transition-all ${
                                                    isDanger
                                                        ? 'bg-red-500 h-full'
                                                        : isWindow
                                                        ? 'bg-green-500 h-3/4 pulse'
                                                        : 'bg-yellow-300 h-1/2'
                                                }`}
                                                title={`0x${cnt.toString(16).toUpperCase()}`}
                                            ></div>
                                        );
                                    })}
                                </div>
                                <div className="flex justify-between text-xs mt-2">
                                    <span className="text-red-600 font-bold">0x3F 复位</span>
                                    <span className="text-green-600 font-bold">窗口 [0x40-0x5A]</span>
                                    <span className="text-yellow-600 font-bold">0x7F 最大值</span>
                                </div>
                            </div>

                            {/* 喂狗规则 */}
                            <div className="grid grid-cols-3 gap-2 text-xs">
                                <div className="bg-red-100 p-2 rounded border-l-4 border-red-500">
                                    <div className="font-bold text-red-700">过早喂狗</div>
                                    <div className="text-red-600">CNT > 窗口</div>
                                    <div className="text-red-500">→ 复位</div>
                                </div>
                                <div className="bg-green-100 p-2 rounded border-l-4 border-green-500">
                                    <div className="font-bold text-green-700">正确喂狗</div>
                                    <div className="text-green-600">0x40 ≤ CNT ≤ 窗口</div>
                                    <div className="text-green-500">→ 正常</div>
                                </div>
                                <div className="bg-red-100 p-2 rounded border-l-4 border-red-500">
                                    <div className="font-bold text-red-700">过晚喂狗</div>
                                    <div className="text-red-600">CNT < 0x40</div>
                                    <div className="text-red-500">→ 复位</div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 6: WWDG 配置与喂狗
                if (step === 5) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">WWDG 配置与喂狗</h4>

                            <div className="grid grid-cols-2 gap-4 h-full">
                                {/* 配置流程 */}
                                <div className="space-y-2">
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <div className="text-xs text-gray-500 mb-1">步骤 1</div>
                                        <div className="text-sm font-bold text-rose-700">使能时钟</div>
                                        <div className="text-xs text-rose-600">RCC->APB1ENR |= WWDGEN</div>
                                    </div>
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <div className="text-xs text-gray-500 mb-1">步骤 2</div>
                                        <div className="text-sm font-bold text-rose-700">配置窗口</div>
                                        <div className="text-xs text-rose-600">CFR = window | /8 | EWI</div>
                                    </div>
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <div className="text-xs text-gray-500 mb-1">步骤 3</div>
                                        <div className="text-sm font-bold text-rose-700">启动看门狗</div>
                                        <div className="text-xs text-rose-600">CR = 0x7F | WDGA | EWI</div>
                                    </div>
                                </div>

                                {/* 喂狗演示 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-rose-700 mb-2">喂狗时机</h5>
                                    <div className="relative h-32">
                                        {/* 计数器递减动画 */}
                                        <div className="absolute right-0 top-0 w-16 text-center">
                                            <div className="text-xs text-gray-500">CNT</div>
                                            <div className="text-2xl font-bold text-rose-600 blink">
                                                {0x40 + Math.floor(Math.random() * 20)}
                                            </div>
                                        </div>

                                        {/* 窗口指示器 */}
                                        <div className="absolute left-0 top-1/2 transform -translate-y-1/2">
                                            <div className="bg-green-100 border-2 border-green-500 rounded p-2 text-xs">
                                                <div className="font-bold text-green-700">窗口 = 0x5A</div>
                                                <div className="text-green-600">在此区间喂狗</div>
                                            </div>
                                        </div>

                                        {/* 喂狗按钮 */}
                                        <button className="absolute bottom-0 left-1/2 transform -translate-x-1/2 px-4 py-2 bg-rose-500 text-white rounded-lg text-xs font-bold hover:bg-rose-600 feed">
                                            🦴 喂狗!
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 7: 中断与应用
                if (step === 6) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">看门狗中断与应用</h4>

                            <div className="grid grid-cols-2 gap-4 h-full">
                                {/* WWDG 中断 */}
                                <div className="space-y-2">
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <h5 className="text-xs font-bold text-rose-700 mb-2">WWDG 提前唤醒中断 (EWI)</h5>
                                        <div className="text-xs text-gray-600 mb-2">
                                            计数器 = 0x40 时触发中断，可在复位前保存数据
                                        </div>
                                        <div className="bg-rose-100 p-2 rounded text-xs">
                                            <div className="font-bold text-rose-700">中断服务函数:</div>
                                            <div className="font-mono text-rose-600">WWDG_IRQHandler()</div>
                                            <div className="text-gray-500 mt-1">
                                                • 清除 EWIF 标志<br/>
                                                • 保存关键数据<br/>
                                                • 记录错误日志
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 主循环应用 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-rose-700 mb-2">主循环看门狗</h5>
                                    <div className="space-y-2 text-xs">
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-white text-xs">1</div>
                                            <div className="bg-gray-100 p-2 rounded flex-1">处理任务 1</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-white text-xs">2</div>
                                            <div className="bg-gray-100 p-2 rounded flex-1">处理任务 2</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-rose-500 rounded-full flex items-center justify-center text-white text-xs">3</div>
                                            <div className="bg-rose-100 p-2 rounded flex-1 border-2 border-rose-500">
                                                🦴 喂狗 IWDG_Feed()
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs">4</div>
                                            <div className="bg-blue-100 p-2 rounded flex-1">延时 100ms</div>
                                        </div>
                                    </div>
                                    <div className="mt-2 text-xs text-gray-500 text-center">
                                        确保喂狗间隔 &lt; 超时时间
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 8: 应用实例与调试
                if (step === 7) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-rose-700 mb-4">完整应用实例</h4>

                            <div className="grid grid-cols-3 gap-4 h-full">
                                {/* 系统初始化 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-rose-700 mb-2">系统初始化</h5>
                                    <div className="space-y-1 text-xs">
                                        <div className="bg-rose-100 p-2 rounded">
                                            <div className="font-bold text-rose-700">IWDG 配置</div>
                                            <div className="text-gray-600 font-mono">PR=5, RLR=500</div>
                                            <div className="text-green-600">4 秒超时</div>
                                        </div>
                                        <div className="bg-rose-100 p-2 rounded">
                                            <div className="font-bold text-rose-700">WWDG 配置</div>
                                            <div className="text-gray-600 font-mono">窗口=0x50</div>
                                            <div className="text-green-600">中断使能</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 主循环监控 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-rose-700 mb-2">主循环监控</h5>
                                    <div className="space-y-2">
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-green-500 rounded-full pulse"></div>
                                            <div className="text-xs">读取传感器</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-green-500 rounded-full pulse" style={{ animationDelay: '0.1s' }}></div>
                                            <div className="text-xs">处理数据</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-green-500 rounded-full pulse" style={{ animationDelay: '0.2s' }}></div>
                                            <div className="text-xs">UART 通信</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-3 h-3 bg-rose-500 rounded-full blink"></div>
                                            <div className="text-xs font-bold text-rose-600">喂狗!</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 调试技巧 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-rose-700 mb-2">调试技巧</h5>
                                    <ul className="text-xs space-y-1">
                                        <li className="flex items-start gap-1">
                                            <span className="text-yellow-500">⚠️</span>
                                            <span>开发阶段可暂时禁用</span>
                                        </li>
                                        <li className="flex items-start gap-1">
                                            <span className="text-blue-500">🔍</span>
                                            <span>SWD 调试时看门狗仍运行</span>
                                        </li>
                                        <li className="flex items-start gap-1">
                                            <span className="text-red-500">📝</span>
                                            <span>喂狗失败自动复位，检查日志</span>
                                        </li>
                                        <li className="flex items-start gap-1">
                                            <span className="text-green-500">✅</span>
                                            <span>生产环境必须启用</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-7xl mx-auto">
                        {/* 标题 */}
                        <h1 className="text-3xl font-bold text-center mb-4 text-rose-700">
                            STM32 看门狗完整指南 - IWDG 与 WWDG
                        </h1>

                        {/* 进度指示器 */}
                        <div className="flex justify-center mb-6">
                            <div className="flex gap-2">
                                {STEPS.map((step, index) => (
                                    <button
                                        key={index}
                                        onClick={() => setCurrentStep(index)}
                                        className={`w-10 h-10 rounded-full font-bold transition-all ${
                                            index === currentStep
                                                ? 'bg-rose-500 text-white scale-110'
                                                : index < currentStep
                                                ? 'bg-rose-200 text-rose-700'
                                                : 'bg-gray-200 text-gray-500'
                                        }`}
                                    >
                                        {index + 1}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 主内容区 */}
                        <div className="grid grid-cols-2 gap-6 mb-6">
                            {/* 代码区 */}
                            <div className="bg-gray-900 rounded-lg p-4 shadow-lg">
                                <div className="text-rose-400 font-bold mb-2">
                                    步骤 {currentStep + 1}: {STEPS[currentStep].title}
                                </div>
                                <pre className="text-green-400 text-xs overflow-auto h-64 font-mono">
                                    <code>{STEPS[currentStep].code}</code>
                                </pre>
                            </div>

                            {/* 动画区 */}
                            <div className="scaleIn">
                                <WatchdogAnimation />
                            </div>
                        </div>

                        {/* 讲解区 */}
                        <div className="bg-white rounded-lg p-6 shadow-lg mb-6">
                            <h3 className="text-xl font-bold text-rose-700 mb-4">核心知识点</h3>
                            <div className="grid grid-cols-3 gap-4">
                                <div className="border-l-4 border-rose-500 pl-4">
                                    <h4 className="font-bold text-rose-700 mb-2">IWDG 独立看门狗</h4>
                                    <ul className="text-sm text-gray-600 space-y-1">
                                        <li>• 独立 LSI 时钟 (32kHz)</li>
                                        <li>• 停机/待机模式也工作</li>
                                        <li>• 配置简单，精度较低</li>
                                    </ul>
                                </div>
                                <div className="border-l-4 border-rose-500 pl-4">
                                    <h4 className="font-bold text-rose-700 mb-2">WWDG 窗口看门狗</h4>
                                    <ul className="text-sm text-gray-600 space-y-1">
                                        <li>• 系统时钟 (PCLK)</li>
                                        <li>• 窗口限制 (不能太早/太晚)</li>
                                        <li>• 精度更高，可检测异常</li>
                                    </ul>
                                </div>
                                <div className="border-l-4 border-rose-500 pl-4">
                                    <h4 className="font-bold text-rose-700 mb-2">应用场景</h4>
                                    <ul className="text-sm text-gray-600 space-y-1">
                                        <li>• 防止程序跑飞</li>
                                        <li>• 检测死锁/无限循环</li>
                                        <li>• 系统故障自动恢复</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {/* 控制按钮 */}
                        <div className="flex justify-center gap-4">
                            <button
                                onClick={handlePrev}
                                disabled={currentStep === 0}
                                className={`px-6 py-3 rounded-lg font-bold ${
                                    currentStep === 0
                                        ? 'bg-gray-200 text-gray-400'
                                        : 'bg-rose-500 text-white hover:bg-rose-600'
                                }`}
                            >
                                上一步
                            </button>

                            {!isPlaying && !isComplete && (
                                <button
                                    onClick={handleStart}
                                    className="px-6 py-3 bg-rose-500 text-white rounded-lg font-bold hover:bg-rose-600"
                                >
                                    开始讲解
                                </button>
                            )}

                            {isPlaying && (
                                <button
                                    onClick={handleNext}
                                    className="px-6 py-3 bg-rose-500 text-white rounded-lg font-bold hover:bg-rose-600"
                                >
                                    下一步
                                </button>
                            )}

                            {isComplete && (
                                <button
                                    onClick={handleReset}
                                    className="px-6 py-3 bg-green-500 text-white rounded-lg font-bold hover:bg-green-600"
                                >
                                    重新学习
                                </button>
                            )}

                            <button
                                onClick={handleReset}
                                className="px-6 py-3 bg-gray-500 text-white rounded-lg font-bold hover:bg-gray-600"
                            >
                                重置
                            </button>
                        </div>

                        {/* 完成提示 */}
                        {isComplete && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                                <div className="bg-white rounded-lg p-8 max-w-md text-center scaleIn">
                                    <div className="text-6xl mb-4">🎉</div>
                                    <h2 className="text-2xl font-bold text-rose-700 mb-4">学习完成!</h2>
                                    <p className="text-gray-600 mb-6">
                                        已掌握 STM32 IWDG 和 WWDG 看门狗的核心知识
                                    </p>
                                    <button
                                        onClick={handleReset}
                                        className="px-6 py-3 bg-rose-500 text-white rounded-lg font-bold hover:bg-rose-600"
                                    >
                                        重新学习
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
