                    code: `// ADC 基本原理
// 12 位分辨率：0-4095 对应 0-Vref

// ADC 特性:

                    code: `// ADC 初始化配置
void ADC_Init(void) {
    // 1. 使能时钟
    RCC->APB2ENR |= RCC_APB2ENR_ADC1EN;
    RCC->APB2ENR |= RCC_APB2ENR_IOPAEN;

    // 2. 配置 PA1 为模拟输入
    GPIOA->CRL &= ~GPIO_CRL_CNF1;
    GPIOA->CRL &= ~GPIO_CRL_MODE1;

    // 3. ADC 预分频 (72MHz/6=12MHz)
    RCC->CFGR |= RCC_CFGR_ADCPRE_1;

    // 4. ADC 配置：连续转换，右对齐
    ADC1->CR2 |= ADC_CR2_CONT | ADC_CR2_ALIGN;

    // 5. 采样时间：55.5 周期
    ADC1->SMPR2 = (6 << ADC_SMPR2_SMP1_Pos);

    // 6. 规则通道：通道 1
    ADC1->SQR3 = (1 << ADC_SQR3_SQ1_Pos);

    // 7. 校准
    ADC1->CR2 |= ADC_CR2_RSTCAL;
    while (ADC1->CR2 & ADC_CR2_RSTCAL);
    ADC1->CR2 |= ADC_CR2_CAL;
    while (ADC1->CR2 & ADC_CR2_CAL);

    // 8. 启动 ADC
    ADC1->CR2 |= ADC_CR2_ADON;
}`,

void ADC_Injected_Init(void) {
    // 注入通道 1：通道 2 (过流检测)

    ADC1->SMPR1 = (1 << ADC_SMPR1_SMP17_Pos);

    // 使能注入通道中断
    ADC1->CR1 |= ADC_CR1_JEOCIE;

    ADC1->CR2 |= (1 << ADC_CR2_JEXTSEL_Pos);
    ADC1->CR2 |= ADC_CR2_JEXTEN;
}

// 注入通道中断服务
void ADC1_2_IRQHandler(void) {

void ADC_AnalogWatchdog_Init(void) {

                    code: `// 多通道扫描 +DMA 配置
void ADC_MultiChannel_DMA_Init(void) {
    // 1. 使能 DMA 时钟
    RCC->AHBENR |= RCC_AHBENR_DMA1EN;

    // 2. 配置 DMA 通道 1
    DMA1_Channel1->CPAR = (uint32_t)&ADC1->DR;

    DMA1_Channel1->CCR = DMA_CCR1_TE | DMA_CCR1_HTIE |

    // 3. ADC 扫描模式
    ADC1->CR1 |= ADC_CR1_SCAN;

    // 4. 配置 4 个通道 (0,1,2,3)
    ADC1->SQR3 = (0 << ADC_SQR3_SQ1_Pos) |
                 (1 << ADC_SQR3_SQ2_Pos) |
                 (2 << ADC_SQR3_SQ3_Pos) |

    ADC1->SQR1 = (3 << ADC_SQR1_L_Pos);  // 4 个转换

    // 5. ADC->DMA 请求
    ADC1->CR2 |= ADC_CR2_DMA;

    // 6. 启动 DMA 和 ADC
    DMA1_Channel1->CCR |= DMA_CCR1_EN;
    ADC1->CR2 |= ADC_CR2_ADON | ADC_CR2_CONT;
}

uint16_t adc_buffer[4];  // DMA 缓冲区`,

                    code: `// 过采样提高分辨率
#define OVERSAMPLE_COUNT 256

uint32_t ADC_Oversample(void) {
    uint32_t sum = 0;
    for (int i = 0; i < OVERSAMPLE_COUNT; i++) {
        ADC1->CR2 |= ADC_CR2_SWSTART;
        while (!(ADC1->SR & ADC_SR_EOC));
        sum += ADC1->DR;
    }
    // 256 次平均 = 右移 8 位
    // 12 位 +4 位 = 16 位有效分辨率
    return sum >> 8;
}

// 使用 DMA 过采样
void ADC_DMA_Oversample_Init(void) {
    // DMA 缓冲区：256 个采样
    DMA1_Channel1->CNDTR = OVERSAMPLE_COUNT;
    // 传输完成后处理
    DMA1_Channel1->CCR |= DMA_CCR1_TCIE;
}

// DMA 传输完成中断
void DMA1_Channel1_IRQHandler(void) {
    if (DMA1->ISR & DMA_ISR_TCIF1) {
        DMA1->IFCR = DMA_IFCR_CTCIF1;
        // 计算 256 次平均
        uint32_t sum = 0;
        for (int i = 0; i < OVERSAMPLE_COUNT; i++) {
            sum += adc_buffer[i];
        }
        high_precision_value = sum >> 8;
    }
}`,

void ADC_TempSensor_Init(void) {
    // 使能温度传感器
    ADC1->CR2 |= ADC_CR2_TSVREFE;

    // 配置通道 16(温度传感器)

    // 长采样时间：239.5 周期 (温度传感器需要)
    ADC1->SMPR1 = (7 << ADC_SMPR1_SMP16_Pos);
}

// 读取温度
float ADC_ReadTemperature(void) {
    // 启动转换
    ADC1->CR2 |= ADC_CR2_SWSTART;
    while (!(ADC1->SR & ADC_SR_EOC));

    uint16_t adc_value = ADC1->DR;

    // 转换为电压 (Vref=3.3V)
    float voltage = (adc_value / 4095.0) * 3.3;

    // 计算温度
    // Temp = 25 + ((V25 - V) / Avg_Slope)
    // V25 = 1.43V, Avg_Slope = 4.3mV/C
    float temperature = 25.0 + ((1.43 - voltage) / 0.0043);

    return temperature;
}`,

// ================

// 电机电流检测 (注入通道 + 看门狗)

}`,

            const speakStep = React.useCallback((stepIndex) => {

            );

            const TempSensorVisual = () => (
                <div className="h-64 flex flex-col">
                    {/* 温度曲线 */}
                    <div className="flex-1 bg-gray-800 rounded-lg relative overflow-hidden mb-4">
                        <svg viewBox="0 0 400 100" className="w-full h-full">
                            {/* 温度 - 电压曲线 */}
                            <line x1="50" y1="80" x2="350" y2="20" stroke="#8b5cf6" strokeWidth="3" />
                            <text x="60" y="85" fill="#8b5cf6" fontSize="10">25°C: 1.43V</text>
                            <text x="280" y="30" fill="#8b5cf6" fontSize="10">85°C: 1.17V</text>
                            {/* 斜率标注 */}
                            <line x1="100" y1="70" x2="200" y2="50" stroke="#ef4444" strokeWidth="1" strokeDasharray="4" />
                            <text x="210" y="55" fill="#ef4444" fontSize="10">-4.3mV/°C</text>
                        </svg>
                    </div>
                    {/* 当前温度 */}
                    <div className="text-center">
                        <div className="text-3xl font-bold text-purple-400">{(25 + (1.43 - (adcValue/4095*3.3)) / 0.0043).toFixed(1)}°C</div>
                        <div className="text-xs text-gray-400">芯片内部温度</div>
                    </div>
                </div>
            );

            const ApplicationsVisual = () => (
                <div className="h-64 grid grid-cols-2 gap-2">
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">电流检测</div>
                        <div className="text-2xl">⚡</div>
                        <div className="text-xs text-purple-400">注入通道</div>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">电池监测</div>
                        <div className="text-2xl">🔋</div>
                        <div className="text-xs text-purple-400">过采样</div>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">多传感器</div>
                        <div className="text-2xl">📊</div>
                        <div className="text-xs text-purple-400">扫描+DMA</div>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">温度保护</div>
                        <div className="text-2xl">🌡️</div>
                        <div className="text-xs text-purple-400">内部传感器</div>
                    </div>
                </div>
            );

            const renderVisual = () => {
                switch(currentStep) {
                    case 0: return <ADCArchVisual />;
                    case 1: return <ADCInitVisual />;
                    case 2: return <InjectedChannelVisual />;
                    case 3: return <AnalogWatchdogVisual />;
                    case 4: return <MultiChannelVisual />;
                    case 5: return <OversamplingVisual />;
                    case 6: return <TempSensorVisual />;
                    case 7: return <ApplicationsVisual />;
                    default: return <ADCArchVisual />;
                }
            };

            return (
                <div className="min-h-screen p-4 gradient-theme">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold text-center mb-2">STM32 ADC 高级应用完整指南</h1>
                        <p className="text-center text-white/80 mb-4">文件编号：1256 | 注入通道 · 模拟看门狗 · 过采样</p>
                        <div className="flex justify-center gap-4 mb-4">
                            <button onClick={handlePrev} disabled={currentStep === 0} className="px-6 py-2 bg-white/20 rounded-lg disabled:opacity-50 hover:bg-white/30">上一步</button>
                            <button onClick={handleStart} disabled={isPlaying} className="px-6 py-2 bg-green-500 rounded-lg hover:bg-green-600 disabled:opacity-50">{isPlaying ? '播放中...' : '开始播放'}</button>
                            <button onClick={handleNext} disabled={currentStep === steps.length - 1} className="px-6 py-2 bg-white/20 rounded-lg disabled:opacity-50 hover:bg-white/30">下一步</button>
                        </div>
                        <div className="flex justify-center gap-2 mb-4">
                            {steps.map((_, idx) => (<div key={idx} className={`w-3 h-3 rounded-full ${idx === currentStep ? 'bg-white animate-pulse' : 'bg-white/30'}`}></div>))}
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            <div className="code-bg rounded-lg p-4 font-mono text-sm overflow-auto">
                                <pre className="text-green-400 whitespace-pre-wrap">{steps[currentStep].code}</pre>
                            </div>
                            <div className="bg-gray-800 rounded-lg p-4">{renderVisual()}</div>
                            <div className="bg-white/10 rounded-lg p-4">
                                <h2 className="text-xl font-bold mb-4">{steps[currentStep].title}</h2>
                                <p className="text-white/80 leading-relaxed">{steps[currentStep].narration}</p>
                            </div>
                        </div>
                        <div className="text-center mt-4 text-white/60 text-sm">步骤 {currentStep + 1} / {steps.length} | 自动播放 | 中文语音</div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
