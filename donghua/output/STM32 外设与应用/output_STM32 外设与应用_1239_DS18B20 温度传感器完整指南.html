                code: `void DS18B20_GPIO_Init(void) {
    RCC->APB2ENR |= RCC_APB2ENR_IOPAEN;

    // PA0: 开漏输出，50MHz (单总线推荐)
    GPIOA->CRL &= ~0x0000000F;
    GPIOA->CRL |= 0x00000007;  // AF_OD, 50MHz

    // 或使用推挽输出 (也适用)
    // GPIOA->CRL |= 0x00000003;  // 推挽

    // 默认输出高 (释放总线)
    GPIOA->BSRR = (1 << 0);
}

// 总线控制宏
#define DQ_OUT_LOW()   GPIOA->BRR = (1 << 0)    // 输出 0
#define DQ_OUT_HIGH()  GPIOA->BSRR = (1 << 0)   // 输出 1(释放)
#define DQ_READ()      (GPIOA->IDR & (1 << 0))  // 读取

// 精确延时 (1μs 基准)
void Delay_us(uint32_t us) {
    // 使用定时器或 CPU 循环

    volatile uint32_t delay = us * 5;

                code: `// DS18B20 复位时序
uint8_t DS18B20_Reset(void) {
    uint8_t presence;

    // 主机复位脉冲：拉低 480μs
    DQ_OUT_LOW();
    Delay_us(480);

    // 释放总线，等待从机响应
    DQ_OUT_HIGH();
    Delay_us(15);  // 等待 15-60μs

    // 读取存在脉冲 (60-240μs 低电平)
    presence = DQ_READ();

                            <button
                                onClick={() => handleStepClick((currentStep + 1) % STEPS.length)}
                                className="px-6 py-3 bg-cyan-600 hover:bg-cyan-700 text-white rounded-lg transition-colors"
                            >
                                下一步 →
                            </button>
                        </div>

                        {/* Progress */}
                        <div className="flex justify-center space-x-2 mb-8">
                            {STEPS.map((_, index) => (
                                <div
                                    key={index}
                                    className={`w-3 h-3 rounded-full transition-colors ${index === currentStep ? 'bg-cyan-400' : 'bg-gray-600'}`}
                                />
                            ))}
                        </div>

                        {/* Main Content */}
                        <div className="grid grid-cols-3 gap-6">
                            {/* Code */}
                            <div className="bg-gray-800 rounded-xl p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-cyan-400 mb-4">💻 代码</h3>
                                <pre className="text-cyan-400 text-sm overflow-auto h-80 font-mono whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>

                            {/* Visualization */}
                            <div className="bg-gray-800 rounded-xl p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-cyan-400 mb-4">🎨 可视化</h3>
                                <div className="h-80">
                                    {STEPS[currentStep].visualization()}
                                </div>
                            </div>

                            {/* Explanations */}
                            <div className="bg-gray-800 rounded-xl p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-cyan-400 mb-4">📖 解释</h3>
                                <ul className="space-y-3">
                                    {STEPS[currentStep].explanations.map((exp, index) => (
                                        <li key={index} className="text-white text-sm flex items-start">
                                            <span className="text-cyan-400 mr-2">•</span>
                                            <span>{exp}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Step Info */}
                        <div className="mt-8 text-center">
                            <h2 className="text-2xl font-bold text-cyan-400">
                                {currentStep + 1}. {STEPS[currentStep].title}
                            </h2>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
