<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 LCD 显示驱动完整指南 - 题库动画生成器</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { visibility: visible; } 50% { visibility: hidden; } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes flow { 0% { transform: translateY(0); } 100% { transform: translateY(20px); } }
        @keyframes press { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }
        @keyframes release { 0% { transform: scale(0.95); } 100% { transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes jitter { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes debounce { 0% { transform: scale(1); } 50% { transform: scale(0.8); } 100% { transform: scale(1); } }
        @keyframes longpress { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        @keyframes highlight { 0%, 100% { background-color: rgba(255,255,0,0.3); } 50% { background-color: rgba(255,255,0,0.8); } }
        @keyframes activate { 0% { box-shadow: 0 0 5px currentColor; } 50% { box-shadow: 0 0 20px currentColor; } 100% { box-shadow: 0 0 5px currentColor; } }
        @keyframes wave { 0% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } 100% { transform: rotate(0deg); } }
        @keyframes staircase { 0% { transform: translateY(0); } 25% { transform: translateY(-5px); } 50% { transform: translateY(-10px); } 75% { transform: translateY(-15px); } 100% { transform: translateY(0); } }
        @keyframes smooth { 0% { transform: translateY(0); } 100% { transform: translateY(-20px); } }
        @keyframes triangle { 0% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); } 50% { clip-path: polygon(50% 100%, 0% 0%, 100% 0%); } 100% { clip-path: polygon(50% 0%, 0% 100%, 100% 100%); } }
        @keyframes noise { 0% { transform: translate(0,0); } 25% { transform: translate(-2px,2px); } 50% { transform: translate(2px,-2px); } 75% { transform: translate(-2px,-2px); } 100% { transform: translate(0,0); } }
        @keyframes tick { 0% { transform: rotate(-30deg); } 100% { transform: rotate(0deg); } }
        @keyframes second { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes update { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes alarm { 0%, 100% { background-color: rgba(255,0,0,0.3); } 50% { background-color: rgba(255,0,0,0.8); } }
        @keyframes backup { 0% { transform: translateX(0); } 50% { transform: translateX(10px); } 100% { transform: translateX(0); } }
        @keyframes circular { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes transfer { 0% { transform: translateX(0) scale(1); } 50% { transform: translateX(50px) scale(0.8); } 100% { transform: translateX(0) scale(1); } }
        @keyframes read { 0% { transform: scaleX(1); } 50% { transform: scaleX(1.2); } 100% { transform: scaleX(1); } }
        @keyframes write { 0% { transform: scaleY(1); } 50% { transform: scaleY(0.8); } 100% { transform: scaleY(1); } }
        @keyframes move { 0% { transform: translate(0,0); } 25% { transform: translate(10px,0); } 50% { transform: translate(20px,10px); } 75% { transform: translate(10px,20px); } 100% { transform: translate(0,0); } }
        @keyframes cursor { 0%, 100% { visibility: visible; } 50% { visibility: hidden; } }
        @keyframes charWrite { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes dataShift { 0% { transform: translateX(100%); } 100% { transform: translateX(0); } }
        @keyframes commandPulse { 0%, 100% { border-color: #3b82f6; } 50% { border-color: #10b981; } }
        .animate-pulse { animation: pulse 2s infinite; }
        .animate-blink { animation: blink 1s infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        .animate-flow { animation: flow 1.5s infinite; }
        .animate-press { animation: press 0.2s ease-out; }
        .animate-release { animation: release 0.2s ease-out; }
        .animate-bounce { animation: bounce 1s infinite; }
        .animate-jitter { animation: jitter 0.3s infinite; }
        .animate-debounce { animation: debounce 0.3s ease-out; }
        .animate-longpress { animation: longpress 1.5s infinite; }
        .animate-scan { animation: scan 2s linear infinite; }
        .animate-highlight { animation: highlight 1.5s infinite; }
        .animate-activate { animation: activate 1s infinite; }
        .animate-wave { animation: wave 1s infinite; }
        .animate-staircase { animation: staircase 2s infinite; }
        .animate-smooth { animation: smooth 1.5s infinite; }
        .animate-triangle { animation: triangle 2s infinite; }
        .animate-noise { animation: noise 0.3s infinite; }
        .animate-tick { animation: tick 0.3s ease-out; }
        .animate-second { animation: second 1s linear infinite; }
        .animate-update { animation: update 1s infinite; }
        .animate-alarm { animation: alarm 0.5s infinite; }
        .animate-backup { animation: backup 0.5s infinite; }
        .animate-circular { animation: circular 1s linear infinite; }
        .animate-transfer { animation: transfer 1s infinite; }
        .animate-read { animation: read 0.5s ease-out; }
        .animate-write { animation: write 0.5s ease-out; }
        .animate-move { animation: move 2s infinite; }
        .animate-cursor { animation: cursor 1s infinite; }
        .animate-charWrite { animation: charWrite 0.2s ease-out; }
        .animate-dataShift { animation: dataShift 0.3s ease-out; }
        .animate-commandPulse { animation: commandPulse 1s infinite; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const COLOR_MAP = {
            primary: '#06b6d4',
            secondary: '#0891b2',
            accent: '#14b8a6',
            light: '#cffafe',
            dark: '#164e63',
            highlight: '#67e8f9'
        };

        const STEPS = [
            {
                title: "LCD 显示基础",
                narration: "LCD1602 液晶显示器，16 字符×2 行，HD44780 控制器，支持 4 位和 8 位数据模式，内置字符发生器 CGROM。",
                code: `// LCD1602 引脚定义
#define LCD_RS  GPIO_PIN_0  // 寄存器选择
#define LCD_RW  GPIO_PIN_1  // 读写选择
#define LCD_EN  GPIO_PIN_2  // 使能信号
#define LCD_D4  GPIO_PIN_4  // 数据位 4-7(4 位模式)
#define LCD_D5  GPIO_PIN_5
#define LCD_D6  GPIO_PIN_6
#define LCD_D7  GPIO_PIN_7

// HD44780 指令集
#define LCD_CLEAR       0x01  // 清屏
#define LCD_HOME        0x02  // 归位
#define LCD_ENTRY_MODE  0x06  // 输入模式
#define LCD_DISPLAY_ON  0x0C  // 显示开
#define LCD_CURSOR_ON   0x0E  // 光标开
#define LCD_SHIFT_RIGHT 0x1C  // 右移
#define LCD_SHIFT_LEFT  0x18  // 左移
#define LCD_FUNCTION_4B 0x28  // 4 位模式，2 行，5x7 点阵
#define LCD_CGRAM_ADDR  0x40  // CGRAM 地址
#define LCD_DDRAM_ADDR  0x80  // DDRAM 地址`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-cyan-900 to-cyan-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">LCD1602 结构</div>
                        {/* LCD 屏幕 */}
                        <div className="absolute top-12 left-1/2 transform -translate-x-1/2 w-64 h-20 bg-gradient-to-b from-gray-300 to-gray-400 rounded-lg border-4 border-gray-500 shadow-lg">
                            <div className="absolute top-2 left-2 right-2 h-8 bg-gradient-to-b from-cyan-100 to-cyan-200 rounded flex items-center justify-center">
                                <span className="text-cyan-900 font-mono text-sm">Hello STM32!</span>
                            </div>
                            <div className="absolute bottom-2 left-2 right-2 h-8 bg-gradient-to-b from-cyan-100 to-cyan-200 rounded flex items-center justify-center">
                                <span className="text-cyan-900 font-mono text-sm animate-cursor">▊</span>
                            </div>
                        </div>
                        {/* 引脚 */}
                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 grid grid-cols-8 gap-2">
                            {[1,2,3,4,5,6,7,8].map(pin => (
                                <div key={pin} className="flex flex-col items-center">
                                    <div className={`w-3 h-6 rounded ${pin <= 3 ? 'bg-yellow-500 animate-pulse' : 'bg-green-500'}`}></div>
                                    <span className="text-white text-xs mt-1">{['RS','RW','EN','D4','D5','D6','D7','VDD'][pin-1]}</span>
                                </div>
                            ))}
                        </div>
                        {/* 数据流 */}
                        <div className="absolute top-1/2 right-4 w-16 h-1 bg-gradient-to-r from-yellow-400 to-transparent animate-dataShift"></div>
                    </div>
                ),
                explanations: [
                    "LCD1602: 16 字符×2 行点阵 LCD",
                    "HD44780: Hitachi 字符型 LCD 控制器",
                    "4 位模式: 仅需 7 个 GPIO(RS,RW,EN,D4-D7)",
                    "CGROM: 内置 160 个字符 (数字 + 字母)",
                    "CGRAM: 可自定义 8 个 5x8 字符",
                    "DDRAM: 显示数据 RAM(80 字节)",
                    "使能信号 EN: 下降沿锁存数据",
                    "时序要求：EN 脉冲宽度>450ns"
                ]
            },
            {
                title: "工作原理",
                narration: "LCD 通过 RS 选择寄存器，RW 选择读写，EN 使能信号锁存数据。指令寄存器 IR 控制操作，数据寄存器 DR 存储显示内容。",
                code: `// HD44780 内部结构
// RS=0,RW=0: 写指令寄存器 (IR)
// RS=1,RW=0: 写数据寄存器 (DR)
// RS=0,RW=1: 读忙标志 (BF) + 地址计数器 (AC)
// RS=1,RW=1: 读数据寄存器 (DR)

// 时序图:
// EN: ──┐    ┌────
//       └────┘
//       ↑
//   下降沿锁存
//
// 4 位数据传输 (高 4 位先):
// D7-D4: ──[数据高 4 位]──
// D3-D0: ──[数据低 4 位]──`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-cyan-900 to-cyan-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">HD44780 内部结构</div>
                        {/* 内部寄存器 */}
                        <div className="absolute top-16 left-1/2 transform -translate-x-1/2 grid grid-cols-2 gap-4">
                            <div className="bg-blue-800 rounded-lg p-3 border-2 border-blue-500">
                                <div className="text-white text-xs text-center font-bold">IR 指令寄存器</div>
                                <div className="text-cyan-300 text-xs text-center mt-1">RS=0</div>
                            </div>
                            <div className="bg-green-800 rounded-lg p-3 border-2 border-green-500">
                                <div className="text-white text-xs text-center font-bold">DR 数据寄存器</div>
                                <div className="text-cyan-300 text-xs text-center mt-1">RS=1</div>
                            </div>
                        </div>
                        {/* 地址计数器 */}
                        <div className="absolute top-40 left-1/2 transform -translate-x-1/2 bg-purple-800 rounded-lg p-3 border-2 border-purple-500">
                            <div className="text-white text-xs text-center font-bold">AC 地址计数器</div>
                            <div className="text-cyan-300 text-xs text-center mt-1 font-mono">Addr: 0x40</div>
                        </div>
                        {/* 控制信号 */}
                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 grid grid-cols-3 gap-4">
                            <div className="bg-yellow-600 rounded-lg p-2 border-2 border-yellow-400 animate-pulse">
                                <div className="text-white text-xs text-center">RS</div>
                                <div className="text-yellow-200 text-xs text-center font-mono">1</div>
                            </div>
                            <div className="bg-yellow-600 rounded-lg p-2 border-2 border-yellow-400">
                                <div className="text-white text-xs text-center">RW</div>
                                <div className="text-yellow-200 text-xs text-center font-mono">0</div>
                            </div>
                            <div className="bg-yellow-600 rounded-lg p-2 border-2 border-yellow-400 animate-activate">
                                <div className="text-white text-xs text-center">EN</div>
                                <div className="text-yellow-200 text-xs text-center font-mono">↹</div>
                            </div>
                        </div>
                        {/* 数据流箭头 */}
                        <svg className="absolute inset-0 w-full h-full">
                            <defs>
                                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                    <polygon points="0 0, 10 3.5, 0 7" fill="#67e8f9" />
                                </marker>
                            </defs>
                            <line x1="50%" y1="140" x2="50%" y2="180" stroke="#67e8f9" strokeWidth="2" markerEnd="url(#arrowhead)" className="animate-flow" />
                        </svg>
                    </div>
                ),
                explanations: [
                    "IR (指令寄存器): RS=0 时写入控制命令",
                    "DR (数据寄存器): RS=1 时写入显示字符",
                    "AC (地址计数器): 跟踪 DDRAM 当前地址",
                    "BF (忙标志): RW=1 时检测 LCD 是否就绪",
                    "RS 信号：0=指令，1=数据",
                    "RW 信号：0=写入，1=读取",
                    "EN 使能：高电平接收，下降沿锁存",
                    "4 位模式：分两次传输 8 位数据"
                ]
            },
            {
                title: "硬件连接",
                narration: "STM32 与 LCD1602 的硬件连接。RS 接 PA0，RW 接 PA1，EN 接 PA2，数据位 D4-D7 接 PA4-PA7。电位器调节对比度。",
                code: `// STM32F103 与 LCD1602 连接
// LCD 引脚    STM32 引脚    功能
// 1  VSS      GND         电源地
// 2  VDD      3.3V        电源正
// 3  VO       电位器      对比度调节 (0-3.3V)
// 4  RS       PA0         寄存器选择
// 5  RW       PA1         读写选择 (可接地常写)
// 6  EN       PA2         使能信号
// 7  D0       NC          未用 (4 位模式)
// 8  D1       NC          未用 (4 位模式)
// 9  D2       NC          未用 (4 位模式)
// 10 D3       NC          未用 (4 位模式)
// 11 D4       PA4         数据位 4
// 12 D5       PA5         数据位 5
// 13 D6       PA6         数据位 6
// 14 D7       PA7         数据位 7
// 15 A        3.3V        背光正 (串联 220Ω电阻)
// 16 K       GND         背光负`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-cyan-900 to-cyan-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">硬件连接图</div>
                        {/* STM32 */}
                        <div className="absolute left-4 top-1/2 transform -translate-y-1/2 w-20 h-40 bg-gradient-to-b from-blue-800 to-blue-900 rounded-lg border-2 border-blue-500">
                            <div className="text-white text-xs text-center py-2 font-bold">STM32</div>
                            <div className="grid grid-cols-2 gap-1 px-2">
                                {['PA0','PA1','PA2','PA4','PA5','PA6','PA7'].map(pin => (
                                    <div key={pin} className="text-cyan-300 text-xs font-mono">{pin}</div>
                                ))}
                            </div>
                        </div>
                        {/* LCD */}
                        <div className="absolute right-4 top-1/2 transform -translate-y-1/2 w-48 h-24 bg-gradient-to-b from-gray-300 to-gray-400 rounded-lg border-4 border-gray-500">
                            <div className="text-cyan-900 text-xs text-center py-1 font-bold">LCD1602</div>
                            <div className="text-cyan-900 text-sm text-center">Hello World!</div>
                        </div>
                        {/* 连线 */}
                        <svg className="absolute inset-0 w-full h-full">
                            <line x1="130" y1="140" x2="200" y2="100" stroke="#fbbf24" strokeWidth="2" className="animate-pulse" />
                            <line x1="130" y1="160" x2="200" y2="110" stroke="#10b981" strokeWidth="2" />
                            <line x1="130" y1="180" x2="200" y2="120" stroke="#3b82f6" strokeWidth="2" className="animate-pulse" />
                            <line x1="130" y1="200" x2="200" y2="140" stroke="#8b5cf6" strokeWidth="2" />
                            <line x1="130" y1="220" x2="200" y2="150" stroke="#ec4899" strokeWidth="2" />
                            <line x1="130" y1="240" x2="200" y2="160" stroke="#f97316" strokeWidth="2" />
                            <line x1="130" y1="260" x2="200" y2="170" stroke="#14b8a6" strokeWidth="2" />
                        </svg>
                        {/* 标签 */}
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-black bg-opacity-50 rounded-lg p-2">
                            <div className="text-white text-xs">
                                <div><span className="text-yellow-400">PA0→RS</span></div>
                                <div><span className="text-green-400">PA1→RW</span></div>
                                <div><span className="text-blue-400">PA2→EN</span></div>
                                <div><span className="text-purple-400">PA4-7→D4-7</span></div>
                            </div>
                        </div>
                    </div>
                ),
                explanations: [
                    "VSS/VDD: 电源地/3.3V 电源",
                    "VO: 电位器调节 LCD 对比度",
                    "RS (PA0): 寄存器选择信号",
                    "RW (PA1): 读写选择 (可接地常写)",
                    "EN (PA2): 使能信号",
                    "D4-D7:4 位数据总线",
                    "A/K: 背光电源 (串联限流电阻)",
                    "D0-D3:4 位模式下悬空"
                ]
            },
            {
                title: "GPIO 配置",
                narration: "配置 GPIO 为推挽输出模式。RS、EN 为推挽输出，数据引脚 D4-D7 同样配置为推挽输出。RW 可接地或配置为输出。",
                code: `void LCD_GPIO_Init(void) {
    // 使能 GPIOA 时钟
    RCC->APB2ENR |= RCC_APB2ENR_IOPAEN;

    // PA0(RS), PA1(RW), PA2(EN): 推挽输出，50MHz
    GPIOA->CRL &= ~0x00000FFF;  // 清除 0-2 位
    GPIOA->CRL |= 0x00000333;   // 输出，50MHz

    // PA4-PA7(D4-D7): 推挽输出，50MHz
    GPIOA->CRL &= ~0x0FFF0000;  // 清除 4-7 位
    GPIOA->CRL |= 0x03330000;   // 输出，50MHz
}

// RW 接地简化方案 (只写不读)
// 此时无需检测忙标志，固定延时即可
#define LCD_DELAY_US()  Delay_us(40)  // >37us`,
                visualization: () => (
                    <div className="relative bg-gradient-to-br from-cyan-900 to-cyan-700 rounded-xl p-6 h-80">
                        <div className="absolute top-4 left-4 text-white text-sm font-bold">GPIO 配置 (推挽输出)</div>
                        {/* GPIO 结构 */}
                        <div className="absolute top-16 left-1/2 transform -translate-x-1/2">
                            <div className="bg-blue-900 rounded-lg p-4 border-2 border-blue-500">
                                <div className="text-white text-sm font-bold mb-2">GPIOx MODER/PUPDR</div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">MODER[1:0]</div>
                                        <div className="text-yellow-400 text-sm font-mono">01=输出</div>
                                    </div>
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">OSPEEDR[1:0]</div>
                                        <div className="text-green-400 text-sm font-mono">11=50MHz</div>
                                    </div>
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">OTYPER</div>
                                        <div className="text-blue-400 text-sm font-mono">0=推挽</div>
                                    </div>
                                    <div className="bg-gray-800 rounded p-2">
                                        <div className="text-cyan-300 text-xs">PUPDR[1:0]</div>
                                        <div className="text-purple-400 text-sm font-mono">00=无上拉</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        {/* 引脚状态 */}
                        <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 grid grid-cols-8 gap-2">
                            {[
                                {pin:'PA0',sig:'RS',active:true},
                                {pin:'PA1',sig:'RW',active:false},
                                {pin:'PA2',sig:'EN',active:true},
                                {pin:'PA3',sig:'-',active:false},
                                {pin:'PA4',sig:'D4',active:true},
                                {pin:'PA5',sig:'D5',active:true},
                                {pin:'PA6',sig:'D6',active:true},
                                {pin:'PA7',sig:'D7',active:true}
                            ].map(item => (
                                <div key={item.pin} className={`flex flex-col items-center ${item.active ? 'opacity-100' : 'opacity-50'}`}>
                                    <div className={`w-8 h-8 rounded flex items-center justify-center ${item.active ? 'bg-green-500 animate-pulse' : 'bg-gray-600'}`}>
                                        <span className="text-white text-xs">{item.pin}</span>
                                    </div>
                                    <span className="text-white text-xs mt-1">{item.sig}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                ),
                explanations: [
                    "RCC->APB2ENR: 使能 GPIOA 时钟",
                    "MODER[1:0]=01: 通用输出模式",
                    "OSPEEDR[1:0]=11: 50MHz 高速",

void LCD_Write4Bits(uint8_t data) {
    GPIOA->BSRR = (data & 0x0F) << 4;      // 设置 D4-D7
    GPIOA->BSRR = (~data & 0x0F) << 20;    // 清零
    GPIOA->BSRR = (1 << 2);                 // EN=1
    LCD_DELAY_US();
    GPIOA->BSRR = (1 << 2) << 16;          // EN=0
    LCD_DELAY_US();
}

// 写指令
void LCD_WriteCmd(uint8_t cmd) {
    GPIOA->BRR = (1 << 0);  // RS=0
    LCD_Write4Bits(cmd >> 4);    // 高 4 位
    LCD_Write4Bits(cmd & 0x0F);  // 低 4 位
}

// 写数据
void LCD_WriteData(uint8_t data) {
    GPIOA->BSRR = (1 << 0);  // RS=1
    LCD_Write4Bits(data >> 4);
    LCD_Write4Bits(data & 0x0F);
}

// 初始化序列
void LCD_Init(void) {
    Delay_ms(50);  // 上电等待
    LCD_Write4Bits(0x03); Delay_ms(5);
    LCD_Write4Bits(0x03); Delay_ms(5);
    LCD_Write4Bits(0x03); Delay_ms(1);
    LCD_WriteCmd(0x28);  // 4 位模式，2 行
    LCD_WriteCmd(0x08);  // 显示关
    LCD_WriteCmd(0x01);  // 清屏
    LCD_WriteCmd(0x06);  // 输入模式
    LCD_WriteCmd(0x0C);  // 显示开
}`,

                                    {STEPS[currentStep].code}
                                </pre>
                            </div>

                            {/* Visualization */}
                            <div className="bg-gray-800 rounded-xl p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-cyan-400 mb-4">🎨 可视化</h3>
                                <div className="h-80">
                                    {STEPS[currentStep].visualization()}
                                </div>
                            </div>

                            {/* Explanations */}
                            <div className="bg-gray-800 rounded-xl p-6 shadow-2xl">
                                <h3 className="text-xl font-bold text-cyan-400 mb-4">📖 解释</h3>
                                <ul className="space-y-3">
                                    {STEPS[currentStep].explanations.map((exp, index) => (
                                        <li key={index} className="text-white text-sm flex items-start">
                                            <span className="text-cyan-400 mr-2">•</span>
                                            <span>{exp}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>

                        {/* Step Info */}
                        <div className="mt-8 text-center">
                            <h2 className="text-2xl font-bold text-cyan-400">
                                {currentStep + 1}. {STEPS[currentStep].title}
                            </h2>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
