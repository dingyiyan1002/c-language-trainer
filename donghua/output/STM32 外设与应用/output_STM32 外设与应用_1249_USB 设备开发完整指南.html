void USB_Hardware_Init(void) {
    // 1. 使能时钟
    RCC->APB1ENR |= RCC_APB1ENR_USBEN;
    RCC->APB2ENR |= RCC_APB2ENR_IOPAEN;

    // 2. USB 时钟配置 (必须 48MHz)
    // PLL 配置：8MHz HSE × 6 / 1 = 48MHz
    RCC->CFGR |= RCC_CFGR_PLLMULL6;
    RCC->CFGR &= ~RCC_CFGR_USBPRE;  // PLLCLK/1

    // 3. USB GPIO 配置
    // PA11: USB_DM (输入)
    // PA12: USB_DP (输入)
    GPIOA->CRL &= ~0xFF000000;  // 清除 PA11/12
    // 浮空输入 (设备模式)

    // 4. USB 唤醒中断配置
    EXTI->IMR |= EXTI_IMR_MR18;  // USB 唤醒
    EXTI->RTSR |= EXTI_RTSR_TR18; // 上升沿
}`,

void USB_EP_Config(void) {

    // TX: ADDR0_TX = 0x000 (64 字节)
    // RX: ADDR0_RX = 0x040 (64 字节)

    // EP1: 中断端点 (HID 报告)
    _SetEPTxAddr(ENDP1, 0x080);  // TX 地址
    _SetEPTxCount(ENDP1, 8);     // 8 字节
    _SetEPTxStat(ENDP1, EP_NAK); // NAK (无数据)

    _SetEPRxAddr(ENDP1, 0x0C0);  // RX 地址
    _SetEPRxCount(ENDP1, 8);
    _SetEPRxStat(ENDP1, EP_RX_VALID); // 可接收

    // 配置端点类型

    // 使能端点

void USB_LP_CAN1_RX0_IRQHandler(void) {
    uint16_t istr = _GetISTR();

    // 复位中断
    if (istr & ISTR_RESET) {
        USB_Enumeration_Init();
        _SetISTR(~ISTR_RESET);
    }

    // 挂起中断
    if (istr & ISTR_SUSP) {
        USB_Enter_LowPower();
        _SetISTR(~ISTR_SUSP);
    }

    // 唤醒中断
    if (istr & ISTR_WKUP) {
        USB_Leave_LowPower();
        _SetISTR(~ISTR_WKUP);
    }

    // 端点中断
    if (istr & ISTR_CTR) {
        USB_ISTR_CTR();  // 处理端点传输
    }
}

// 控制传输处理
void USB_ISTR_CTR(void) {
    uint8_t ep = _GetEPID();
    if (ep == 0) USB_Control_Transfer();
}`,

// CDC 需要 2 个接口:
// 接口 0: 通信类 (管理)
// 接口 1: 数据类 (发送/接收)

// CDC 发送数据
void CDC_SendData(uint8_t *data, uint16_t len) {
    // 检查端点空闲
    if (GetEPTxStat(ENDP2) != EP_TX_VALID) {
        // 配置 TX 端点
        SetEPTxCount(ENDP2, len);
        UserToPMABufferCopy(data, ENDP2_TXADDR, len);
        SetEPTxStat(ENDP2, EP_TX_VALID);
    }
}

// CDC 接收数据 (中断中处理)
void CDC_ReceiveData(void) {
    uint16_t len = GetEPRxCount(ENDP3);
    uint8_t buf[64];
    PMAToUserBufferCopy(buf, ENDP3_RXADDR, len);
    // 处理接收的数据
    ProcessData(buf, len);
    // 重新使能接收
    SetEPRxStat(ENDP3, EP_RX_VALID);
}

// 串口参数配置回调
void CDC_LineCodingChanged(void) {
    // 波特率、停止位、校验位变化
    uint32_t baudrate = *(uint32_t*)&LineCoding[0];
}`,

        };

        // USB 中断可视化
        const UsbInterrupts = ({ step }) => {
            const [interrupts, setInterrupts] = useState({
                reset: false,
                suspend: false,
                wakeup: false,
                ctr: false
            });

            useEffect(() => {
                const trigger = (type) => {
                    setInterrupts(prev => ({ ...prev, [type]: true }));
                    setTimeout(() => {
                        setInterrupts(prev => ({ ...prev, [type]: false }));
                    }, 800);
                };
                const intervals = [
                    setInterval(() => trigger('ctr'), 2000),
                    setInterval(() => trigger('suspend'), 8000),
                    setInterval(() => trigger('wakeup'), 10000)
                ];
                return () => intervals.forEach(clearInterval);
            }, []);

            return (
                <div className="space-y-3">
                    {Object.entries(interrupts).map(([type, active]) => (
                        <div
                            key={type}
                            className={`p-3 rounded-lg flex items-center justify-between transition-all ${
                                active ? 'bg-yellow-100 border-2 border-yellow-500' : 'bg-gray-100'
                            }`}
                        >
                            <div>
                                <div className="font-semibold text-sm capitalize">
                                    {type === 'ctr' ? '端点传输完成 (CTR)' :
                                     type === 'suspend' ? '挂起 (SUSPEND)' :
                                     type === 'wakeup' ? '唤醒 (WAKEUP)' : '复位 (RESET)'}
                                </div>
                            </div>
                            {active && (
                                <div className="text-yellow-600 font-bold animate-pulse">
                                    触发!
                                </div>
                            )}
                        </div>
                    ))}
                </div>
            );
        };

        // USB HID 可视化
        const UsbHid = ({ step }) => {
            const [keys, setKeys] = useState([]);
            const [modifier, setModifier] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    const newKeys = [];
                    if (Math.random() > 0.7) newKeys.push(0x04); // 'a'
                    if (Math.random() > 0.8) newKeys.push(0x16); // 'g'
                    setKeys(newKeys);
                    setModifier(Math.random() > 0.5 ? 0x02 : 0); // Shift
                }, 1500);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="space-y-4">
                    <div className="text-center text-sm font-semibold">
                        HID 键盘报告
                    </div>
                    <div className="grid grid-cols-8 gap-1">
                        {Array(8).fill(0).map((_, idx) => (
                            <div
                                key={idx}
                                className={`h-12 rounded flex items-center justify-center text-xs font-mono ${
                                    idx === 0 ? 'bg-purple-100' :
                                    keys.includes(idx - 1) ? 'bg-green-100' : 'bg-gray-100'
                                }`}
                            >
                                {idx === 0 ? 'MOD' : idx === 1 ? '0' : `K${idx-1}`}
                            </div>
                        ))}
                    </div>
                    <div className="bg-gray-50 rounded-lg p-3">
                        <div className="text-xs font-mono">
                            <div>修饰键：0x{modifier.toString(16).padStart(2, '0')}</div>
                            <div>按键：{keys.length > 0 ? keys.map(k => k.toString(16)).join(', ') : '无'}</div>
                        </div>
                    </div>
                    <div className="text-xs text-gray-500">
                        <div>• 字节 0: 修饰键 (Ctrl/Shift/Alt)</div>
                        <div>• 字节 1: 保留</div>
                        <div>• 字节 2-7: 6 个按键码</div>
                    </div>
                </div>
            );
        };

        // USB CDC 可视化
        const UsbCdc = ({ step }) => {
            const [txData, setTxData] = useState([]);
            const [rxData, setRxData] = useState([]);
            const [baudrate, setBaudrate] = useState(115200);

            useEffect(() => {
                const txInterval = setInterval(() => {
                    const char = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                    setTxData(prev => [...prev.slice(-19), { char, time: Date.now() }]);
                }, 500);

                const rxInterval = setInterval(() => {
                    if (Math.random() > 0.5) {
                        const char = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                        setRxData(prev => [...prev.slice(-19), { char, time: Date.now() }]);
                    }
                }, 700);

                return () => {
                    clearInterval(txInterval);
                    clearInterval(rxInterval);
                };
            }, []);

            return (
                <div className="space-y-4">
                    <div className="text-center text-sm font-semibold">
                        CDC 虚拟串口
                    </div>
                    <div className="bg-gray-50 rounded-lg p-3">
                        <div className="text-xs mb-2">串口配置:</div>
                        <div className="font-mono text-xs">
                            <div>波特率：<select
                                value={baudrate}
                                onChange={(e) => setBaudrate(Number(e.target.value))}
                                className="border rounded px-2 py-1"
                            >
                                <option value="9600">9600</option>
                                <option value="19200">19200</option>
                                <option value="115200">115200</option>
                            </select></div>
                            <div>数据位：8</div>
                            <div>停止位：1</div>
                            <div>校验位：无</div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-green-50 rounded-lg p-3">
                            <div className="text-xs font-semibold mb-2">📤 TX</div>
                            <div className="font-mono text-xs h-20 overflow-auto">
                                {txData.map((d, i) => (
                                    <div key={i}>{d.char}</div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-blue-50 rounded-lg p-3">
                            <div className="text-xs font-semibold mb-2">📥 RX</div>
                            <div className="font-mono text-xs h-20 overflow-auto">
                                {rxData.map((d, i) => (
                                    <div key={i}>{d.char}</div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 主 App 组件
        const App = () => {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const speak = useCallback((text) => {
                if (isMuted) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                const voices = window.speechSynthesis.getVoices();
                const xiaoXiao = voices.find(v => v.name.includes('XiaoXiao') || v.name.includes('zh-CN'));
                if (xiaoXiao) utterance.voice = xiaoXiao;
                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            else { setIsPlaying(false); return prev; }
                        });
                    }, 800);
                };
                utterance.onerror = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            else { setIsPlaying(false); return prev; }
                        });
                    }, 800);
                };
                window.speechSynthesis.speak(utterance);
            }, [isMuted]);

            useEffect(() => {
                if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                speak(STEPS[currentStep].explanation);
                return () => { if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current); };
            }, [currentStep, speak]);

            useEffect(() => {
                const handleKeydown = (e) => {
                    if (e.code === 'Space') { e.preventDefault(); setIsPlaying(prev => !prev); }
                    else if (e.code === 'ArrowRight' && currentStep < STEPS.length - 1) setCurrentStep(prev => prev + 1);
                    else if (e.code === 'ArrowLeft' && currentStep > 0) setCurrentStep(prev => prev - 1);
                };
                window.addEventListener('keydown', handleKeydown);
                return () => window.removeEventListener('keydown', handleKeydown);
            }, [currentStep]);

            const renderVisualization = () => {
                switch (STEPS[currentStep].visualization) {
                    case 'usb-basic': return <UsbBasic step={STEPS[currentStep]} />;
                    case 'usb-hardware': return <UsbHardware step={STEPS[currentStep]} />;
                    case 'usb-descriptors': return <UsbDescriptors step={STEPS[currentStep]} />;
                    case 'usb-enumeration': return <UsbEnumeration step={STEPS[currentStep]} />;
                    case 'usb-endpoints': return <UsbEndpoints step={STEPS[currentStep]} />;
                    case 'usb-interrupts': return <UsbInterrupts step={STEPS[currentStep]} />;
                    case 'usb-hid': return <UsbHid step={STEPS[currentStep]} />;
                    case 'usb-cdc': return <UsbCdc step={STEPS[currentStep]} />;
                    default: return <div>可视化组件</div>;
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 p-4">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold text-center mb-6 bg-gradient-to-r from-blue-600 to-cyan-600 bg-clip-text text-transparent">
                            STM32 USB 设备开发完整指南
                        </h1>
                        <div className="flex justify-center mb-6">
                            <div className="flex space-x-2">
                                {STEPS.map((_, idx) => (
                                    <button key={idx} onClick={() => setCurrentStep(idx)}
                                        className={`w-3 h-3 rounded-full transition-all ${
                                            idx === currentStep ? 'bg-blue-600 scale-125' :
                                            idx < currentStep ? 'bg-blue-400' : 'bg-gray-300'
                                        }`} />
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-xl font-bold mb-4 text-blue-600 flex items-center">
                                    <span className="mr-2">💻</span>{STEPS[currentStep].title}
                                </h2>
                                <pre className="bg-gray-900 text-green-400 p-4 rounded-lg overflow-x-auto text-sm font-mono whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-xl font-bold mb-4 text-cyan-600 flex items-center">
                                    <span className="mr-2">🎨</span>可视化演示
                                </h2>
                                <div className="h-96 overflow-auto">{renderVisualization()}</div>
                            </div>
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-xl font-bold mb-4 text-purple-600 flex items-center">
                                    <span className="mr-2">📖</span>说明
                                </h2>
                                <p className="text-gray-700 leading-relaxed">{STEPS[currentStep].explanation}</p>
                            </div>
                        </div>
                        <div className="flex justify-center mt-6 space-x-4">
                            <button onClick={() => setCurrentStep(prev => Math.max(0, prev - 1))}
                                disabled={currentStep === 0}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === 0 ? 'bg-gray-200 text-gray-400' : 'bg-blue-600 text-white hover:bg-blue-700'
                                }`}>⏮ 上一步</button>
                            <button onClick={() => setIsPlaying(!isPlaying)}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    isPlaying ? 'bg-yellow-500 text-white' : 'bg-green-500 text-white'
                                }`}>{isPlaying ? '⏸ 暂停' : '▶ 播放'}</button>
                            <button onClick={() => setIsMuted(!isMuted)}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    isMuted ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'
                                }`}>{isMuted ? '🔇 取消静音' : '🔊 静音'}</button>
                            <button onClick={() => setCurrentStep(prev => Math.min(STEPS.length - 1, prev + 1))}
                                disabled={currentStep === STEPS.length - 1}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === STEPS.length - 1 ? 'bg-gray-200 text-gray-400' : 'bg-blue-600 text-white hover:bg-blue-700'
                                }`}>下一步 ⏭</button>
                        </div>
                        <div className="text-center mt-4 text-sm text-gray-500">快捷键：空格 播放/暂停 | ← → 切换步骤</div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
