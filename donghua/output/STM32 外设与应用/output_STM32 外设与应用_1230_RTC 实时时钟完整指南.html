// 功能：提供精确的日期和时间
// 应用：时间戳、定时唤醒、日历

// STM32 RTC 特性:
// - 32 位计数器 (可选)
// - 日历功能 (年月日时分秒)
// - 独立时钟源 (LSE/LSI/HSE)

// 1. LSE - 外部 32.768kHz 晶振 (最精确)
// 2. LSI - 内部~32kHz RC 振荡器 (精度低)
// 3. HSE - 外部高速时钟分频

// LSE 配置 (推荐):
void RTC_LSE_Init(void) {
    // 1. 使能备份域访问
    PWR->CR |= PWR_CR_DBP;
    RCC->BDCR |= RCC_BDCR_BKEN;

    // 2. 使能 LSE
    RCC->BDCR |= RCC_BDCR_LSEON;
    while (!(RCC->BDCR & RCC_BDCR_LSERDY));

    // 3. 选择 LSE 作为 RTC 时钟
    RCC->BDCR |= RCC_BDCR_RTCSEL_LSE;

    // 4. 使能 RTC
    RCC->BDCR |= RCC_BDCR_RTCEN;
}` },
            { title: "RTC 时间配置", code: `// RTC 时间设置 (2024-01-15 10:30:00)
void RTC_SetTime(void) {
    // 1. 进入配置模式
    RTC->WPR = 0xCA;  // 禁用写保护
    RTC->WPR = 0x53;
    RTC->ISR |= RTC_ISR_INIT;
    while (!(RTC->ISR & RTC_ISR_INITF));

    // 2. 设置时间 (BCD 格式)
    RTC->TR = 0x00 << 20 |  // 亚秒
              0x30 << 16 |  // 秒 (30)
              0x30 << 8 |   // 分 (30)
              0x10 << 0;    // 时 (10)

    // 3. 设置日期 (2024-01-15)
    RTC->DR = 0x24 << 20 |  // 年 (24 = 2024)
              0x01 << 16 |  // 月 (01)
              0x15 << 0;    // 日 (15)

    // 4. 退出配置模式
    RTC->ISR &= ~RTC_ISR_INIT;

    // 5. 等待同步
    while (!(RTC->ISR & RTC_ISR_RSF));
}` },
            { title: "RTC 时间读取", code: `// 读取 RTC 时间
typedef struct {
    uint8_t hour;
    uint8_t minute;
    uint8_t second;
    uint8_t date;
    uint8_t month;
    uint8_t year;
} RTC_Time_t;

void RTC_GetTime(RTC_Time_t* time) {
    // 等待寄存器同步
    while (!(RTC->ISR & RTC_ISR_RSF));

    // 读取时间 (BCD 转十进制)
    uint32_t tr = RTC->TR;
    time->second = ((tr >> 16) & 0x7F);
    time->minute = ((tr >> 8) & 0x7F);
    time->hour = (tr & 0x3F);

    // 读取日期
    uint32_t dr = RTC->DR;
    time->date = (dr & 0x1F);
    time->month = ((dr >> 16) & 0x1F);
    time->year = ((dr >> 20) & 0xFF);
}

// BCD 转十进制宏
#define BCD2DEC(x) (((x) >> 4) * 10 + ((x) & 0x0F))
#define DEC2BCD(x) (((x) / 10) << 4 | ((x) % 10))` },
            { title: "RTC 闹钟配置", code: `// RTC 闹钟 A 配置 (每天 08:00:00 触发)
void RTC_Alarm_Init(void) {
    // 1. 禁用闹钟
    RTC->CR &= ~RTC_CR_ALRAE;
    while (RTC->CR & RTC_CR_ALRAE);

    // 2. 进入配置模式
    RTC->WPR = 0xCA;
    RTC->WPR = 0x53;
    RTC->ISR |= RTC_ISR_INIT;

    // 3. 设置闹钟时间 (08:00:00)
    RTC->ALRMAR = RTC_ALRMAR_MSK4 |       // 忽略星期
                  (0x08 << 22) |          // 时 = 08
                  (0x00 << 16) |          // 分 = 00
                  (0x00 << 0);            // 秒 = 00

    // 4. 使能闹钟和中断
    RTC->CR |= RTC_CR_ALRAE;
    RTC->CR |= RTC_CR_ALRAIE;
    EXTI->IMR |= EXTI_IMR_MR17;  // RTC 闹钟中断
}` },

// 应用：保存配置/掉电保护数据

// 写入备份寄存器
void Backup_Write(uint8_t index, uint32_t data) {
    if (index >= 20) return;

    // 使能备份域访问
    PWR->CR |= PWR_CR_DBP;

    // 写入数据
    *(&RTC->BKP0R + index) = data;
}

// 读取备份寄存器
uint32_t Backup_Read(uint8_t index) {
    if (index >= 20) return 0;
    return *(&RTC->BKP0R + index);
}

// 应用：保存系统运行标志
#define BOOT_FLAG_REG 0  // 启动标志
#define ERROR_COUNT_REG 1  // 错误计数

void Save_Error_Count(uint16_t count) {
    Backup_Write(ERROR_COUNT_REG, count);
}` },

// 校准值 = 目标频率 - 实际频率
void RTC_Calibrate(int8_t ppm_error) {
    RTC->CALIBR = (ppm_error & 0x1F) |  // 校准值 (-31~+31 ppm)
                  (1 << 7);             // 使能校准
}

// 低功耗配置
void RTC_LowPower_Init(void) {
    // 1. 配置唤醒定时器 (每 1 秒唤醒)
    RTC->CR |= RTC_CR_WUCKSEL_2;  // RTC/16 时钟
    RTC->WUTR = 1;                // 1 秒

    // 2. 使能唤醒中断
    RTC->CR |= RTC_CR_WUTIE;

    // 3. 进入 STOP 模式
    PWR->CR |= PWR_CR_LPDS;
    SCB->SCR |= SCB_SCR_SLEEPDEEP;
    __WFI();  // 等待中断唤醒
}` },

// 全局变量
RTC_Time_t current_time;

// 初始化
void RTC_App_Init(void) {
    RTC_LSE_Init();      // LSE 时钟

    RTC_Alarm_Init();    // 闹钟中断
}

// 主循环
void Main_Loop(void) {
    while (1) {
        // 读取 RTC 时间
        RTC_GetTime(&current_time);

        // 带时间戳的数据采集

        alarm_triggered = 1;
    }
}` }

                            <h4 className="text-sm font-bold text-blue-700 mb-4">RTC 时间读取</h4>

                            {/* 实时时钟显示 */}
                            <div className="bg-white rounded-lg p-4 shadow mb-4">
                                <div className="text-center">
                                    <div className="text-xs text-gray-500 mb-2">当前系统时间</div>
                                    <div className="text-3xl font-bold text-blue-700 font-mono">
                                        {currentTime.toLocaleTimeString('zh-CN', { hour12: false })}
                                    </div>
                                    <div className="text-sm text-gray-600 mt-1">
                                        {currentTime.toLocaleDateString('zh-CN')}
                                    </div>
                                </div>
                            </div>

                            {/* BCD 转换 */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">BCD 转十进制</h5>
                                    <div className="bg-blue-100 p-2 rounded text-xs font-mono">
                                        #define BCD2DEC(x)<br/>
                                        (((x) >> 4) * 10 + ((x) & 0x0F))
                                    </div>
                                    <div className="mt-2 text-xs text-gray-600">
                                        示例：0x30 → 30
                                    </div>
                                </div>

                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">十进制转 BCD</h5>
                                    <div className="bg-blue-100 p-2 rounded text-xs font-mono">
                                        #define DEC2BCD(x)<br/>
                                        (((x) / 10) << 4 | ((x) % 10))
                                    </div>
                                    <div className="mt-2 text-xs text-gray-600">
                                        示例：30 → 0x30
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 5: 闹钟配置
                if (step === 4) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-blue-700 mb-4">RTC 闹钟配置</h4>

                            <div className="grid grid-cols-2 gap-4 h-full">
                                {/* 闹钟寄存器 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">闹钟 A 寄存器 (ALRMAR)</h5>
                                    <div className="space-y-2 text-xs">
                                        <div className="bg-blue-100 p-2 rounded">
                                            <div className="font-bold text-blue-700">Bit 31 (MSK4)</div>
                                            <div className="text-gray-600">忽略星期匹配</div>
                                        </div>
                                        <div className="bg-blue-100 p-2 rounded">
                                            <div className="font-bold text-blue-700">Bit 23-22 (HT)</div>
                                            <div className="text-gray-600">小时十位</div>
                                        </div>
                                        <div className="bg-blue-100 p-2 rounded">
                                            <div className="font-bold text-blue-700">Bit 15-8 (MNT)</div>
                                            <div className="text-gray-600">分钟</div>
                                        </div>
                                        <div className="bg-blue-100 p-2 rounded">
                                            <div className="font-bold text-blue-700">Bit 7-0 (ST)</div>
                                            <div className="text-gray-600">秒</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 闹钟演示 */}
                                <div className="space-y-2">
                                    <div className="bg-white rounded-lg p-3 shadow text-center">
                                        <div className="text-xs text-gray-500 mb-1">设定闹钟</div>
                                        <div className="text-2xl font-bold text-blue-700 font-mono">08:00:00</div>
                                        <div className="text-xs text-gray-600">每天触发</div>
                                    </div>

                                    <div className="bg-red-100 rounded-lg p-3 shadow alarm text-center text-white">
                                        <div className="text-2xl">🔔</div>
                                        <div className="font-bold">闹钟触发!</div>
                                        <div className="text-xs">RTC_Alarm_IRQHandler</div>
                                    </div>

                                    <div className="bg-white rounded-lg p-2 shadow text-xs">
                                        <div className="font-bold text-blue-700 mb-1">中断标志清除:</div>
                                        <div className="font-mono text-blue-600">RTC->ISR &= ~RTC_ISR_ALRAF</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 6: 备份寄存器
                if (step === 5) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-blue-700 mb-4">RTC 备份寄存器</h4>

                            <div className="grid grid-cols-2 gap-4 h-full">
                                {/* 备份寄存器组 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">20×32-bit 备份寄存器</h5>
                                    <div className="grid grid-cols-5 gap-1">
                                        {Array.from({ length: 20 }, (_, i) => (
                                            <div key={i} className={`p-1 text-center rounded text-xs backup ${i === 0 ? 'bg-blue-500 text-white' : 'bg-blue-100 text-blue-700'}`}>
                                                BK{i}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-2 text-xs text-gray-600">
                                        <div>• VBAT 电池供电</div>
                                        <div>• 掉电数据不丢失</div>
                                        <div>• BK0-BK19 共 20 个</div>
                                    </div>
                                </div>

                                {/* 应用场景 */}
                                <div className="space-y-2">
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <h5 className="text-xs font-bold text-blue-700 mb-2">典型应用</h5>
                                        <div className="space-y-1 text-xs">
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-3 bg-green-500 rounded-full"></div>
                                                <span>系统运行标志</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-3 bg-blue-500 rounded-full"></div>
                                                <span>错误计数器</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-3 bg-yellow-500 rounded-full"></div>
                                                <span>校准参数</span>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <div className="w-3 h-3 bg-purple-500 rounded-full"></div>
                                                <span>用户配置</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-blue-600 rounded-lg p-3 shadow text-white text-xs">
                                        <div className="font-bold mb-1">API:</div>
                                        <div>Backup_Write(index, data)</div>
                                        <div>Backup_Read(index)</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 7: 校准与低功耗
                if (step === 6) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-blue-700 mb-4">校准与低功耗</h4>

                            <div className="grid grid-cols-2 gap-4 h-full">
                                {/* 时钟校准 */}
                                <div className="space-y-2">
                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <h5 className="text-xs font-bold text-blue-700 mb-2">RTC 校准</h5>
                                        <div className="text-xs text-gray-600 mb-2">
                                            补偿晶振频率误差 (ppm)
                                        </div>
                                        <div className="bg-blue-100 p-2 rounded text-xs font-mono text-blue-700">
                                            RTC->CALIBR = (ppm & 0x1F) | (1 << 7);
                                        </div>
                                        <div className="mt-2 text-xs text-gray-500">
                                            校准范围：-31 ~ +31 ppm
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-lg p-3 shadow">
                                        <h5 className="text-xs font-bold text-blue-700 mb-2">校准原理</h5>
                                        <div className="text-xs text-gray-600">
                                            • 测量实际频率<br/>
                                            • 计算与目标频率偏差<br/>
                                            • 写入 CALIBR 寄存器<br/>
                                            • RTC 自动补偿
                                        </div>
                                    </div>
                                </div>

                                {/* 低功耗唤醒 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">唤醒定时器 (WUT)</h5>
                                    <div className="space-y-2">
                                        <div className="bg-blue-100 p-2 rounded text-xs">
                                            <div className="font-bold text-blue-700">配置步骤:</div>
                                            <div className="text-gray-600">1. 选择时钟源 (RTC/16)</div>
                                            <div className="text-gray-600">2. 设置 WUTR 值</div>
                                            <div className="text-gray-600">3. 使能 WUT 中断</div>
                                        </div>

                                        <div className="bg-green-100 p-2 rounded text-xs">
                                            <div className="font-bold text-green-700">低功耗流程:</div>
                                            <div className="text-gray-600">1. 配置 WUT (1 秒)</div>
                                            <div className="text-gray-600">2. 进入 STOP 模式</div>
                                            <div className="text-gray-600">3. WUT 中断唤醒</div>
                                            <div className="text-gray-600">4. 执行任务后再次睡眠</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                // 步骤 8: 应用实例
                if (step === 7) {
                    return (
                        <div className="relative h-64 bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg p-4">
                            <h4 className="text-sm font-bold text-blue-700 mb-4">应用实例 - 数据记录仪</h4>

                            <div className="grid grid-cols-3 gap-4 h-full">
                                {/* 系统架构 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">系统架构</h5>
                                    <div className="space-y-2">
                                        <div className="bg-blue-100 p-2 rounded text-xs">
                                            <div className="font-bold text-blue-700">RTC 模块</div>
                                            <div className="text-gray-600">LSE 时钟源</div>
                                            <div className="text-gray-600">闹钟中断</div>
                                        </div>
                                        <div className="bg-green-100 p-2 rounded text-xs">
                                            <div className="font-bold text-green-700">传感器</div>
                                            <div className="text-gray-600">温度/湿度</div>
                                            <div className="text-gray-600">定时采集</div>
                                        </div>
                                        <div className="bg-purple-100 p-2 rounded text-xs">
                                            <div className="font-bold text-purple-700">存储</div>
                                            <div className="text-gray-600">带时间戳</div>
                                            <div className="text-gray-600">SD 卡/Flash</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 主循环流程 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">主循环流程</h5>
                                    <div className="space-y-1">
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center text-white text-xs font-bold">1</div>
                                            <div className="text-xs">读取 RTC 时间</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-green-500 rounded-full flex items-center justify-center text-white text-xs font-bold">2</div>
                                            <div className="text-xs">采集传感器数据</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-yellow-500 rounded-full flex items-center justify-center text-white text-xs font-bold">3</div>
                                            <div className="text-xs">添加时间戳存储</div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="w-6 h-6 bg-red-500 rounded-full flex items-center justify-center text-white text-xs font-bold">4</div>
                                            <div className="text-xs">闹钟触发处理</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 数据格式 */}
                                <div className="bg-white rounded-lg p-3 shadow">
                                    <h5 className="text-xs font-bold text-blue-700 mb-2">数据记录格式</h5>
                                    <div className="bg-gray-100 p-2 rounded text-xs font-mono">
                                        <div className="text-gray-600">时间戳:</div>
                                        <div>2024-01-15</div>
                                        <div>10:30:00</div>
                                        <div className="text-gray-600 mt-1">数据:</div>
                                        <div>Temp: 25.3°C</div>
                                        <div>Humi: 60.2%</div>
                                    </div>
                                    <div className="mt-2 text-xs text-gray-500 text-center">
                                        已记录：0/1000 条
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                return null;
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-7xl mx-auto">
                        {/* 标题 */}
                        <h1 className="text-3xl font-bold text-center mb-4 text-blue-700">
                            STM32 RTC 实时时钟完整指南
                        </h1>

                        {/* 进度指示器 */}
                        <div className="flex justify-center mb-6">
                            <div className="flex gap-2">
                                {STEPS.map((step, index) => (
                                    <button
                                        key={index}
                                        onClick={() => setCurrentStep(index)}
                                        className={`w-10 h-10 rounded-full font-bold transition-all ${
                                            index === currentStep
                                                ? 'bg-blue-500 text-white scale-110'
                                                : index < currentStep
                                                ? 'bg-blue-200 text-blue-700'
                                                : 'bg-gray-200 text-gray-500'
                                        }`}
                                    >
                                        {index + 1}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 主内容区 */}
                        <div className="grid grid-cols-2 gap-6 mb-6">
                            {/* 代码区 */}
                            <div className="bg-gray-900 rounded-lg p-4 shadow-lg">
                                <div className="text-blue-400 font-bold mb-2">
                                    步骤 {currentStep + 1}: {STEPS[currentStep].title}
                                </div>
                                <pre className="text-green-400 text-xs overflow-auto h-64 font-mono">
                                    <code>{STEPS[currentStep].code}</code>
                                </pre>
                            </div>

                            {/* 动画区 */}
                            <div className="scaleIn">
                                <RTCAnimation />
                            </div>
                        </div>

                        {/* 讲解区 */}
                        <div className="bg-white rounded-lg p-6 shadow-lg mb-6">
                            <h3 className="text-xl font-bold text-blue-700 mb-4">核心知识点</h3>
                            <div className="grid grid-cols-3 gap-4">
                                <div className="border-l-4 border-blue-500 pl-4">
                                    <h4 className="font-bold text-blue-700 mb-2">时钟源选择</h4>
                                    <ul className="text-sm text-gray-600 space-y-1">
                                        <li>• LSE 外部晶振 (最精确)</li>
                                        <li>• LSI 内部 RC (成本低)</li>
                                        <li>• HSE 分频 (特殊应用)</li>
                                    </ul>
                                </div>
                                <div className="border-l-4 border-blue-500 pl-4">
                                    <h4 className="font-bold text-blue-700 mb-2">BCD 编码</h4>
                                    <ul className="text-sm text-gray-600 space-y-1">
                                        <li>• 时间寄存器使用 BCD 格式</li>
                                        <li>• 需要 BCD↔十进制转换</li>
                                        <li>• 30 秒 = 0x30 不是 30</li>
                                    </ul>
                                </div>
                                <div className="border-l-4 border-blue-500 pl-4">
                                    <h4 className="font-bold text-blue-700 mb-2">备份寄存器</h4>
                                    <ul className="text-sm text-gray-600 space-y-1">
                                        <li>• 20×32-bit VBAT 供电</li>
                                        <li>• 掉电数据不丢失</li>
                                        <li>• 保存配置/标志</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        {/* 控制按钮 */}
                        <div className="flex justify-center gap-4">
                            <button
                                onClick={handlePrev}
                                disabled={currentStep === 0}
                                className={`px-6 py-3 rounded-lg font-bold ${
                                    currentStep === 0
                                        ? 'bg-gray-200 text-gray-400'
                                        : 'bg-blue-500 text-white hover:bg-blue-600'
                                }`}
                            >
                                上一步
                            </button>

                            {!isPlaying && !isComplete && (
                                <button
                                    onClick={handleStart}
                                    className="px-6 py-3 bg-blue-500 text-white rounded-lg font-bold hover:bg-blue-600"
                                >
                                    开始讲解
                                </button>
                            )}

                            {isPlaying && (
                                <button
                                    onClick={handleNext}
                                    className="px-6 py-3 bg-blue-500 text-white rounded-lg font-bold hover:bg-blue-600"
                                >
                                    下一步
                                </button>
                            )}

                            {isComplete && (
                                <button
                                    onClick={handleReset}
                                    className="px-6 py-3 bg-green-500 text-white rounded-lg font-bold hover:bg-green-600"
                                >
                                    重新学习
                                </button>
                            )}

                            <button
                                onClick={handleReset}
                                className="px-6 py-3 bg-gray-500 text-white rounded-lg font-bold hover:bg-gray-600"
                            >
                                重置
                            </button>
                        </div>

                        {/* 完成提示 */}
                        {isComplete && (
                            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
                                <div className="bg-white rounded-lg p-8 max-w-md text-center scaleIn">
                                    <div className="text-6xl mb-4">🎉</div>
                                    <h2 className="text-2xl font-bold text-blue-700 mb-4">学习完成!</h2>
                                    <p className="text-gray-600 mb-6">
                                        已掌握 STM32 RTC 实时时钟的核心知识
                                    </p>
                                    <button
                                        onClick={handleReset}
                                        className="px-6 py-3 bg-blue-500 text-white rounded-lg font-bold hover:bg-blue-600"
                                    >
                                        重新学习
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
