                    title: "FSMC 基础架构",

                    code: `// FSMC 基本原理
// 4 个片选区 (Bank1):
// - Bank1_NORSRAM1: 0x60000000
// - Bank1_NORSRAM2: 0x64000000
// - Bank1_NORSRAM3: 0x68000000
// - Bank1_NORSRAM4: 0x6C000000

// FSMC 特性:
// - 支持 SRAM/NOR/PSRAM/NAND

// - 可配置建立/保持时间

// 地址映射:

                    code: `// FSMC 初始化 (SRAM 模式)
void FSMC_SRAM_Init(void) {
    // 1. 使能时钟
    RCC->AHBENR |= RCC_AHBENR_FSMCEN;
    RCC->APB2ENR |= RCC_APB2ENR_IOPDEN;

    // 2. 配置 GPIO (PD0-15 为复用推挽)
    GPIOD->CRL = 0xBBBBBBBB;  // PD0-7
    GPIOD->CRH = 0xBBBBBBBB;  // PD8-15

    // 3. 配置 Bank1_NORSRAM1
    // 地址建立时间：3 个 HCLK
    // 数据建立时间：5 个 HCLK
    FSMC_Bank1->BTCR[0] = (2 << FSMC_BTR1_ADDSET_Pos) |
                          (4 << FSMC_BTR1_ADDHLD_Pos) |
                          (5 << FSMC_BTR1_DATAST_Pos) |
                          (0 << FSMC_BTR1_BUSTURN_Pos) |
                          (0 << FSMC_BTR1_CLKDIV_Pos) |
                          (0 << FSMC_BTR1_DATLAT_Pos) |
                          (FSMC_BCR1_MWID_0) |  // 16 位
                          (FSMC_BCR1_WREN) |     // 写使能
                          (FSMC_BCR1_MBKEN);     // Bank 使能
}

// 简单的读写字
#define SRAM_BASE 0x60000000
#define SRAM_WRITE(addr, data) (*(volatile uint16_t *)(SRAM_BASE + (addr)*2) = (data))
#define SRAM_READ(addr) (*(volatile uint16_t *)(SRAM_BASE + (addr)*2))`,

                    narration: "FSMC 连接 SRAM 是最常见应用。地址线 A0-Ann 连接到 FSMC_Ax，数据线 D0-D15 连接到 FSMC_Dx，片选 CS 连接到 FSMC_NE1。",
                    code: `// SRAM 连接示意图
// STM32              SRAM (IS61WV51216)
// FSMC_A0-19  ------> A0-19 (地址线 20 根，1MB)
// FSMC_D0-15  ------> DQ0-15 (数据线 16 根)
// FSMC_NE1    ------> /CE (片选)
// FSMC_NWE    ------> /WE (写使能)
// FSMC_NOE    ------> /OE (输出使能)

// SRAM 驱动代码
void SRAM_Write(uint32_t addr, uint16_t data) {
    *(volatile uint16_t *)(0x60000000 + addr * 2) = data;
}

uint16_t SRAM_Read(uint32_t addr) {
    return *(volatile uint16_t *)(0x60000000 + addr * 2);
}

// 批量写入
void SRAM_WriteBuffer(uint32_t addr, uint16_t *buf, uint32_t len) {
    for (uint32_t i = 0; i < len; i++) {
        SRAM_Write(addr + i, buf[i]);
    }
}

// 批量读取
void SRAM_ReadBuffer(uint32_t addr, uint16_t *buf, uint32_t len) {
    for (uint32_t i = 0; i < len; i++) {
        buf[i] = SRAM_Read(addr + i);
    }
}`,

void FSMC_NOR_Init(void) {
    // 时序配置 (72MHz HCLK)
    // 读时间：地址建立 2 + 数据建立 8 = 10 周期 = 139ns
    FSMC_Bank1->BTCR[0] = (2 << FSMC_BTR1_ADDSET_Pos) |
                          (0 << FSMC_BTR1_ADDHLD_Pos) |
                          (8 << FSMC_BTR1_DATAST_Pos) |
                          (FSMC_BCR1_MWID_0) |  // 16 位
                          (FSMC_BCR1_WREN) |
                          (FSMC_BCR1_MBKEN);
}

// NOR Flash 命令序列
#define NOR_BASE 0x60000000
#define NOR_UNLOCK1 (*(volatile uint16_t *)(NOR_BASE + 0x555 * 2))
#define NOR_UNLOCK2 (*(volatile uint16_t *)(NOR_BASE + 0x2AA * 2))

// 擦除芯片
void NOR_ChipErase(void) {
    NOR_UNLOCK1 = 0x00AA;
    NOR_UNLOCK2 = 0x0055;
    NOR_UNLOCK1 = 0x0080;
    NOR_UNLOCK1 = 0x00AA;
    NOR_UNLOCK2 = 0x0055;
    NOR_UNLOCK1 = 0x0010;
}

// 写一个字
void NOR_WriteWord(uint32_t addr, uint16_t data) {
    NOR_UNLOCK1 = 0x00AA;
    NOR_UNLOCK2 = 0x0055;
    NOR_UNLOCK1 = 0x00A0;
    *(volatile uint16_t *)(NOR_BASE + addr * 2) = data;
}`,

void FSMC_NAND_Init(void) {
    // Bank2 配置
    FSMC_Bank2->PCR2 = (2 << FSMC_PCR2_PWID_Pos) |  // 16 位
                       FSMC_PCR2_PEN |              // Bank 使能
                       (3 << FSMC_PCR2_TCLR_Pos) |  // CLE 到 RE 延迟
                       (3 << FSMC_PCR2_TAR_Pos);    // ALE 到 RE 延迟

    // 时序配置
    FSMC_Bank2->PMEM2 = (3 << FSMC_PMEM2_MEMSET2_Pos) |
                        (7 << FSMC_PMEM2_MEMWAIT2_Pos) |
                        (8 << FSMC_PMEM2_MEMHOLD2_Pos);

    // 使能 ECC
    FSMC_Bank2->SR2 |= FSMC_SR2_ECCEN;
}

// NAND 操作
#define NAND_BASE 0x70000000
#define NAND_CMD  (*(volatile uint8_t *)(NAND_BASE | 0x00070000))  // CLE
#define NAND_ADDR (*(volatile uint8_t *)(NAND_BASE | 0x00080000))  // ALE
#define NAND_DATA (*(volatile uint8_t *)(NAND_BASE | 0x00000000))  // DATA

// 读取页
void NAND_ReadPage(uint32_t page, uint8_t *buf) {
    NAND_CMD = 0x00;
    NAND_ADDR = (page >> 16) & 0xFF;
    NAND_ADDR = (page >> 8) & 0xFF;
    NAND_ADDR = page & 0xFF;
    NAND_CMD = 0x30;
    while (!(NAND_DATA & 0x40));  // 等待就绪
    for (int i = 0; i < 2048; i++) {
        buf[i] = NAND_DATA;
    }
}`,

void FSMC_LCD_Init(void) {

// LCD 宏定义
#define LCD_BASE  0x60000000
#define LCD_RS    0x00020000
#define LCD_CMD   (*(volatile uint16_t *)(LCD_BASE | LCD_RS))
#define LCD_DATA  (*(volatile uint16_t *)(LCD_BASE))

// LCD 操作
void LCD_WriteCmd(uint16_t cmd) {
    LCD_CMD = cmd;
}

void LCD_WriteData(uint16_t data) {
    LCD_DATA = data;
}

// 设置像素
void LCD_SetPixel(uint16_t x, uint16_t y, uint16_t color) {
    LCD_WriteCmd(0x2A);  // 列地址
    LCD_WriteCmd(0x00); LCD_WriteCmd(x >> 8);
    LCD_WriteCmd(0x2B);  // 行地址
    LCD_WriteCmd(0x00); LCD_WriteCmd(y >> 8);
    LCD_WriteCmd(0x2C);  // 写内存
    LCD_DATA = color;
}`,

                    title: "时序参数配置",

                    code: `// 时序参数详解
// ADDSET: 地址建立时间 (HCLK 周期数)
// - SRAM: 1-2 周期
// - NOR: 2-3 周期
// - LCD: 0-1 周期

// DATAST: 数据建立时间 (HCLK 周期数)
// - SRAM (100ns): 72MHz 时需 8 周期
// - NOR (70ns):  72MHz 时需 6 周期
// - LCD (60ns):  72MHz 时需 5 周期

// 高速 SRAM 配置 (72MHz, 50ns SRAM)
void FSMC_FastSRAM_Init(void) {
    FSMC_Bank1->BTCR[0] = (1 << FSMC_BTR1_ADDSET_Pos) |  // 14ns

    // 总周期：1+4=5 = 69ns @72MHz
}

// 时序计算公式:
// t_cycle = (ADDSET + DATAST) * (1/HCLK)`,
                    visual: "timing_config"

// ================

// 大数据采集系统 (SRAM 缓存)
#define ADC_BUFFER_SIZE 65536
uint16_t *adc_buffer = (uint16_t *)0x60000000;

            const speakStep = React.useCallback((stepIndex) => {

                        <div className="text-xs text-gray-400 mb-1">ECC 校验</div>
                        <div className="flex items-center gap-2">
                            <div className="flex-1 h-6 bg-green-500/50 rounded flex items-center justify-center text-xs">ECC✓</div>
                            <div className="flex-1 h-6 bg-red-500/50 rounded flex items-center justify-center text-xs">Error</div>
                        </div>
                    </div>
                </div>
            );

            const LCDInterfaceVisual = () => (
                <div className="h-64 flex flex-col">
                    <div className="flex-1 bg-gray-800 rounded-lg relative overflow-hidden mb-4">
                        <div className="absolute inset-0 bg-gradient-to-br from-cyan-500/20 to-pink-500/20"></div>
                        <svg viewBox="0 0 400 100" className="w-full h-full">
                            <rect x="50" y="20" width="300" height="60" fill="#1e293b" stroke="#06b6d4" strokeWidth="2" />
                            <circle cx="200" cy="50" r="20" fill="#06b6d4" className="animate-pulse" />
                        </svg>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                        <div className="bg-gray-800 rounded p-2 text-center">
                            <div className="text-xs text-gray-400">命令</div>
                            <div className="text-sm font-mono text-cyan-400">0x60020000</div>
                        </div>
                        <div className="bg-gray-800 rounded p-2 text-center">
                            <div className="text-xs text-gray-400">数据</div>
                            <div className="text-sm font-mono text-cyan-400">0x60000000</div>
                        </div>
                    </div>
                </div>
            );

            const TimingConfigVisual = () => (
                <div className="h-64 flex flex-col">
                    <div className="flex-1 bg-gray-800 rounded-lg relative overflow-hidden mb-4">
                        <svg viewBox="0 0 400 80" className="w-full h-full">
                            {/* 时钟 */}
                            <line x1="20" y1="10" x2="380" y2="10" stroke="#06b6d4" strokeWidth="2" />
                            <text x="25" y="8" fill="#06b6d4" fontSize="10">HCLK</text>
                            {/* 地址 */}
                            <rect x="50" y="30" width="80" height="20" fill="#0891b2" />
                            <text x="70" y="45" fill="white" fontSize="10">ADDSET</text>
                            {/* 数据 */}
                            <rect x="140" y="30" width="160" height="20" fill="#22d3ee" />
                            <text x="200" y="45" fill="#1e293b" fontSize="10">DATAST</text>
                            {/* 标注 */}
                            <line x1="50" y1="55" x2="130" y2="55" stroke="#ef4444" strokeWidth="1" />
                            <text x="80" y="65" fill="#ef4444" fontSize="9">t1</text>
                            <line x1="140" y1="55" x2="300" y2="55" stroke="#10b981" strokeWidth="1" />
                            <text x="210" y="65" fill="#10b981" fontSize="9">t2</text>
                        </svg>
                    </div>
                    <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="bg-gray-800 rounded p-2">
                            <div className="text-xs text-gray-400">ADDSET</div>
                            <div className="text-lg font-bold text-cyan-400">2</div>
                        </div>
                        <div className="bg-gray-800 rounded p-2">
                            <div className="text-xs text-gray-400">DATAST</div>
                            <div className="text-lg font-bold text-cyan-400">8</div>
                        </div>
                        <div className="bg-gray-800 rounded p-2">
                            <div className="text-xs text-gray-400">周期</div>
                            <div className="text-lg font-bold text-cyan-400">10</div>
                        </div>
                    </div>
                </div>
            );

            const ApplicationsVisual = () => (
                <div className="h-64 grid grid-cols-2 gap-2">
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">SRAM 扩展</div>
                        <div className="text-2xl">💾</div>
                        <div className="text-xs text-cyan-400">大数据存储</div>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">NOR Flash</div>
                        <div className="text-2xl">📀</div>
                        <div className="text-xs text-cyan-400">XIP 执行</div>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">NAND Flash</div>
                        <div className="text-2xl">📁</div>
                        <div className="text-xs text-cyan-400">文件系统</div>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-2 text-center">
                        <div className="text-xs text-gray-400">LCD 显示</div>
                        <div className="text-2xl">🖥️</div>
                        <div className="text-xs text-cyan-400">8080 接口</div>
                    </div>
                </div>
            );

            const renderVisual = () => {
                switch(currentStep) {
                    case 0: return <FSMCArchVisual />;
                    case 1: return <FSMCInitVisual />;
                    case 2: return <SRAMInterfaceVisual />;
                    case 3: return <NORFlashVisual />;
                    case 4: return <NANDFlashVisual />;
                    case 5: return <LCDInterfaceVisual />;
                    case 6: return <TimingConfigVisual />;
                    case 7: return <ApplicationsVisual />;
                    default: return <FSMCArchVisual />;
                }
            };

            return (
                <div className="min-h-screen p-4 gradient-theme">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold text-center mb-2">STM32 FSMC 存储器接口完整指南</h1>
                        <p className="text-center text-white/80 mb-4">文件编号：1258 | SRAM · NOR · NAND · LCD</p>
                        <div className="flex justify-center gap-4 mb-4">
                            <button onClick={handlePrev} disabled={currentStep === 0} className="px-6 py-2 bg-white/20 rounded-lg disabled:opacity-50 hover:bg-white/30">上一步</button>
                            <button onClick={handleStart} disabled={isPlaying} className="px-6 py-2 bg-green-500 rounded-lg hover:bg-green-600 disabled:opacity-50">{isPlaying ? '播放中...' : '开始播放'}</button>
                            <button onClick={handleNext} disabled={currentStep === steps.length - 1} className="px-6 py-2 bg-white/20 rounded-lg disabled:opacity-50 hover:bg-white/30">下一步</button>
                        </div>
                        <div className="flex justify-center gap-2 mb-4">
                            {steps.map((_, idx) => (<div key={idx} className={`w-3 h-3 rounded-full ${idx === currentStep ? 'bg-white animate-pulse' : 'bg-white/30'}`}></div>))}
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                            <div className="code-bg rounded-lg p-4 font-mono text-sm overflow-auto">
                                <pre className="text-green-400 whitespace-pre-wrap">{steps[currentStep].code}</pre>
                            </div>
                            <div className="bg-gray-800 rounded-lg p-4">{renderVisual()}</div>
                            <div className="bg-white/10 rounded-lg p-4">
                                <h2 className="text-xl font-bold mb-4">{steps[currentStep].title}</h2>
                                <p className="text-white/80 leading-relaxed">{steps[currentStep].narration}</p>
                            </div>
                        </div>
                        <div className="text-center mt-4 text-white/60 text-sm">步骤 {currentStep + 1} / {steps.length} | 自动播放 | 中文语音</div>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
