void I2C_Init(void) {
    // 1. 使能时钟
    RCC->APB1ENR |= RCC_APB1ENR_I2C1EN;
    RCC->APB2ENR |= RCC_APB2ENR_IOPAEN;
    RCC->APB2ENR |= RCC_APB2ENR_AFIOEN;

    // 2. GPIO 配置 (开漏复用)
    // PB6: I2C1_SCL
    // PB7: I2C1_SDA
    GPIOB->CRL &= ~0x000000FF;
    GPIOB->CRL |= 0x00000088;  // 开漏复用 50MHz

    // 3. I2C 复位
    RCC->APB1RSTR |= RCC_APB1RSTR_I2C1RST;
    RCC->APB1RSTR &= ~RCC_APB1RSTR_I2C1RST;

    // 4. I2C 配置 (400Kbps)
    I2C1->CR1 |= I2C_CR1_PE;  // 使能
    I2C1->CCR = (4 << I2C_CCR_CCR_Pos);  // 分频
    I2C1->TRISE = 5;  // 上升时间

    // 5. 使能 I2C
    I2C1->CR1 |= I2C_CR1_PE;
}`,

// 时序：START→地址+W→ACK→寄存器→ACK→数据→ACK→STOP

void I2C_WriteByte(uint8_t devAddr, uint8_t reg, uint8_t data) {
    // 1. 产生 START
    I2C1->CR1 |= I2C_CR1_START;
    while (!(I2C1->SR1 & I2C_SR1_SB));

    // 2. 发送地址 (写)
    I2C1->DR = (devAddr << 1) | 0x00;
    while (!(I2C1->SR1 & I2C_SR1_ADDR));
    I2C1->SR2;  // 清除 ADDR 标志

    // 3. 发送寄存器地址
    I2C1->DR = reg;
    while (!(I2C1->SR1 & I2C_SR1_TxE));

    // 4. 发送数据
    I2C1->DR = data;
    while (!(I2C1->SR1 & I2C_SR1_TxE));

    // 5. 产生 STOP
    I2C1->CR1 |= I2C_CR1_STOP;
}`,

// 时序：START→地址+W→ACK→寄存器→ACK→
//       RESTART→地址+R→ACK→数据→NACK→STOP

uint8_t I2C_ReadByte(uint8_t devAddr, uint8_t reg) {
    // 1. 写寄存器地址 (同上)
    I2C_WriteAddr(devAddr, reg);

    // 2. 重复 START
    I2C1->CR1 |= I2C_CR1_START;
    while (!(I2C1->SR1 & I2C_SR1_SB));

    // 3. 发送地址 (读)
    I2C1->DR = (devAddr << 1) | 0x01;
    while (!(I2C1->SR1 & I2C_SR1_ADDR));
    I2C1->SR2;

    // 4. 配置 NACK (单字节)
    I2C1->CR1 &= ~I2C_CR1_ACK;

    // 5. 读取数据
    while (!(I2C1->SR1 & I2C_SR1_RxNe));
    uint8_t data = I2C1->DR;

    // 6. 产生 STOP
    I2C1->CR1 |= I2C_CR1_STOP;

    // 7. 恢复 ACK
    I2C1->CR1 |= I2C_CR1_ACK;
    return data;
}`,

// EEPROM
#define AT24C02_ADDR    0x50  // 1010xxx
#define AT24C04_ADDR    0x50
#define AT24C08_ADDR    0x50

void I2C_EnableInterrupts(void) {

// I2C 事件中断处理
void I2C1_EV_IRQHandler(void) {

    if (sr1 & I2C_SR1_SB) {
        // START 发送完成

}

// DMA 配置 (参考 DMA 章节)`,

void EEPROM_Write(uint16_t addr, uint8_t data) {
    I2C_Start();
    I2C_SendByte(0xA0);  // 器件地址 + 写
    I2C_SendByte(addr);   // 存储地址
    I2C_SendByte(data);   // 数据
    I2C_Stop();
    Delay_ms(10);  // 等待写入完成
}

uint8_t EEPROM_Read(uint16_t addr) {
    I2C_Start();
    I2C_SendByte(0xA0);
    I2C_SendByte(addr);
    I2C_Start();  // 重复 START
    I2C_SendByte(0xA1);  // 读
    uint8_t data = I2C_RecvByte();
    I2C_Stop();
    return data;
}

// MPU6050 加速度计读取
void MPU6050_ReadData(int16_t *data) {
    I2C_Start();
    I2C_SendByte(0xD0);  // MPU6050 地址 + 写
    I2C_SendByte(0x3B);  // 数据起始寄存器
    I2C_Start();
    I2C_SendByte(0xD1);  // 读
    for (int i = 0; i < 14; i++) {

    }
    I2C_Stop();
}`,

// 1. 总线冲突检测
// 发送数据后检查 SDA 实际电平
// 如果不匹配，说明有其他主设备在使用总线

// 2. 仲裁丢失处理
if (I2C1->SR2 & I2C_SR2_LOSTARB) {
    // 失去仲裁，释放总线
    I2C1->SR2;  // 清除标志
    I2C1->CR1 &= ~I2C_CR1_PE;  // 禁用 I2C
    I2C1->CR1 |= I2C_CR1_PE;   // 重新使能
    // 等待总线空闲后重试
}

// 3. 总线空闲检测
int I2C_BusFree(void) {
    return ((I2C1->SR2 & I2C_SR2_MSL) == 0) &&
           ((I2C1->SR2 & I2C_SR2_BUSY) == 0);
}

// 4. 重试机制
for (int i = 0; i < 3; i++) {
    if (I2C_BusFree() && I2C_Transmit() == SUCCESS)
        break;
    Delay_ms(10);
}`,

                                        idx === 0 ? 'bg-cyan-100 border-2 border-cyan-500' : 'bg-gray-100'
                                    }`}
                                >
                                    <div className="flex justify-between items-center">
                                        <span className="font-mono text-sm">{evt.type}</span>
                                        <span className="text-xs text-gray-500">
                                            {new Date(evt.time).toLocaleTimeString()}
                                        </span>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                    <div className="text-xs text-gray-500">
                        <div>• SB: START 发送完成</div>
                        <div>• ADDR: 地址发送完成</div>
                        <div>• TxE/RxNe: 发送空/接收不空</div>
                    </div>
                </div>
            );
        };

        // I2C 器件可视化
        const I2cDevices = ({ step }) => {
            const [selectedDevice, setSelectedDevice] = useState('EEPROM');
            const [data, setData] = useState([]);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (selectedDevice === 'EEPROM') {
                        setData(prev => [Math.floor(Math.random() * 256), ...prev.slice(0, 7)]);
                    } else if (selectedDevice === 'MPU6050') {
                        setData(prev => [Math.floor(Math.random() * 100), Math.floor(Math.random() * 100), Math.floor(Math.random() * 100)]);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [selectedDevice]);

            return (
                <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-2">
                        <button
                            onClick={() => setSelectedDevice('EEPROM')}
                            className={`p-2 rounded text-xs ${
                                selectedDevice === 'EEPROM' ? 'bg-cyan-500 text-white' : 'bg-gray-100'
                            }`}
                        >
                            📀 EEPROM
                        </button>
                        <button
                            onClick={() => setSelectedDevice('MPU6050')}
                            className={`p-2 rounded text-xs ${
                                selectedDevice === 'MPU6050' ? 'bg-cyan-500 text-white' : 'bg-gray-100'
                            }`}
                        >
                            📊 MPU6050
                        </button>
                    </div>
                    <div className="bg-gray-50 rounded-lg p-3">
                        <div className="text-xs font-semibold mb-2">
                            {selectedDevice === 'EEPROM' ? 'EEPROM 数据:' : 'MPU6050 数据:'}
                        </div>
                        <div className="font-mono text-xs">
                            {data.map((d, i) => (
                                <span key={i} className="inline-block w-8 text-center">{d}</span>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // I2C 仲裁可视化
        const I2cArbitration = ({ step }) => {
            const [masters, setMasters] = useState([
                { id: 1, state: 'idle', won: false },
                { id: 2, state: 'idle', won: false }
            ]);

            useEffect(() => {
                const arbitrate = async () => {
                    setMasters(prev => prev.map(m => ({ ...m, state: 'competing', won: false })));
                    await sleep(1000);
                    const winner = Math.random() > 0.5 ? 0 : 1;
                    setMasters(prev => prev.map((m, i) => ({
                        ...m,
                        state: i === winner ? 'transmitting' : 'lost',
                        won: i === winner
                    })));
                    await sleep(2000);
                    setMasters(prev => prev.map(m => ({ ...m, state: 'idle' })));
                };
                arbitrate();
                const interval = setInterval(arbitrate, 4000);
                return () => clearInterval(interval);
            }, []);

            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            return (
                <div className="space-y-4">
                    <div className="text-center text-sm font-semibold">
                        多主仲裁
                    </div>
                    {masters.map((m) => (
                        <div
                            key={m.id}
                            className={`p-3 rounded-lg transition-all ${
                                m.state === 'transmitting' ? 'bg-green-100' :
                                m.state === 'competing' ? 'bg-yellow-100' :
                                m.state === 'lost' ? 'bg-red-100' : 'bg-gray-100'
                            }`}
                        >
                            <div className="flex justify-between items-center">
                                <span className="font-semibold">主设备 {m.id}</span>
                                <span className="text-sm">
                                    {m.state === 'idle' && '⏸️ 空闲'}
                                    {m.state === 'competing' && '⚔️ 仲裁中'}
                                    {m.state === 'transmitting' && '✅ 发送中'}
                                    {m.state === 'lost' && '❌ 失去仲裁'}
                                </span>
                            </div>
                        </div>
                    ))}
                    <div className="text-xs text-gray-500">
                        <div>• 仲裁基于 SDA 线电平</div>
                        <div>• 失败者自动重试</div>
                    </div>
                </div>
            );
        };

        // 主 App 组件
        const App = () => {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const speak = useCallback((text) => {
                if (isMuted) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                const voices = window.speechSynthesis.getVoices();
                const xiaoXiao = voices.find(v => v.name.includes('XiaoXiao') || v.name.includes('zh-CN'));
                if (xiaoXiao) utterance.voice = xiaoXiao;
                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            else { setIsPlaying(false); return prev; }
                        });
                    }, 800);
                };
                utterance.onerror = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            else { setIsPlaying(false); return prev; }
                        });
                    }, 800);
                };
                window.speechSynthesis.speak(utterance);
            }, [isMuted]);

            useEffect(() => {
                if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                speak(STEPS[currentStep].explanation);
                return () => { if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current); };
            }, [currentStep, speak]);

            useEffect(() => {
                const handleKeydown = (e) => {
                    if (e.code === 'Space') { e.preventDefault(); setIsPlaying(prev => !prev); }
                    else if (e.code === 'ArrowRight' && currentStep < STEPS.length - 1) setCurrentStep(prev => prev + 1);
                    else if (e.code === 'ArrowLeft' && currentStep > 0) setCurrentStep(prev => prev - 1);
                };
                window.addEventListener('keydown', handleKeydown);
                return () => window.removeEventListener('keydown', handleKeydown);
            }, [currentStep]);

            const renderVisualization = () => {
                switch (STEPS[currentStep].visualization) {
                    case 'i2c-basic': return <I2cBasic step={STEPS[currentStep]} />;
                    case 'i2c-hardware': return <I2cHardware step={STEPS[currentStep]} />;
                    case 'i2c-write': return <I2cWrite step={STEPS[currentStep]} />;
                    case 'i2c-read': return <I2cRead step={STEPS[currentStep]} />;
                    case 'i2c-addresses': return <I2cAddresses step={STEPS[currentStep]} />;
                    case 'i2c-interrupts': return <I2cInterrupts step={STEPS[currentStep]} />;
                    case 'i2c-devices': return <I2cDevices step={STEPS[currentStep]} />;
                    case 'i2c-arbitration': return <I2cArbitration step={STEPS[currentStep]} />;
                    default: return <div>可视化组件</div>;
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 p-4">
                    <div className="max-w-7xl mx-auto">
                        <h1 className="text-3xl font-bold text-center mb-6 bg-gradient-to-r from-cyan-600 to-teal-600 bg-clip-text text-transparent">
                            STM32 I2C 总线通信完整指南
                        </h1>
                        <div className="flex justify-center mb-6">
                            <div className="flex space-x-2">
                                {STEPS.map((_, idx) => (
                                    <button key={idx} onClick={() => setCurrentStep(idx)}
                                        className={`w-3 h-3 rounded-full transition-all ${
                                            idx === currentStep ? 'bg-cyan-600 scale-125' :
                                            idx < currentStep ? 'bg-cyan-400' : 'bg-gray-300'
                                        }`} />
                                ))}
                            </div>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-xl font-bold mb-4 text-cyan-600 flex items-center">
                                    <span className="mr-2">💻</span>{STEPS[currentStep].title}
                                </h2>
                                <pre className="bg-gray-900 text-green-400 p-4 rounded-lg overflow-x-auto text-sm font-mono whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-xl font-bold mb-4 text-teal-600 flex items-center">
                                    <span className="mr-2">🎨</span>可视化演示
                                </h2>
                                <div className="h-96 overflow-auto">{renderVisualization()}</div>
                            </div>
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                <h2 className="text-xl font-bold mb-4 text-blue-600 flex items-center">
                                    <span className="mr-2">📖</span>说明
                                </h2>
                                <p className="text-gray-700 leading-relaxed">{STEPS[currentStep].explanation}</p>
                            </div>
                        </div>
                        <div className="flex justify-center mt-6 space-x-4">
                            <button onClick={() => setCurrentStep(prev => Math.max(0, prev - 1))}
                                disabled={currentStep === 0}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === 0 ? 'bg-gray-200 text-gray-400' : 'bg-cyan-600 text-white hover:bg-cyan-700'
                                }`}>⏮ 上一步</button>
                            <button onClick={() => setIsPlaying(!isPlaying)}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    isPlaying ? 'bg-yellow-500 text-white' : 'bg-green-500 text-white'
                                }`}>{isPlaying ? '⏸ 暂停' : '▶ 播放'}</button>
                            <button onClick={() => setIsMuted(!isMuted)}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    isMuted ? 'bg-red-500 text-white' : 'bg-cyan-500 text-white'
                                }`}>{isMuted ? '🔇 取消静音' : '🔊 静音'}</button>
                            <button onClick={() => setCurrentStep(prev => Math.min(STEPS.length - 1, prev + 1))}
                                disabled={currentStep === STEPS.length - 1}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === STEPS.length - 1 ? 'bg-gray-200 text-gray-400' : 'bg-cyan-600 text-white hover:bg-cyan-700'
                                }`}>下一步 ⏭</button>
                        </div>
                        <div className="text-center mt-4 text-sm text-gray-500">快捷键：空格 播放/暂停 | ← → 切换步骤</div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
