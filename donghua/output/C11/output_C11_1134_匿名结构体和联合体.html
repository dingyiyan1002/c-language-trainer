<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1134 - 匿名结构体和联合体 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(236, 72, 153, 0.2); border-left: 3px solid #ec4899; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#ec4899', primaryLight: '#f472b6',
      secondary: '#db2777', secondaryLight: '#f472b6',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 匿名结构体和联合体 (C11) =====
// 嵌套的无名结构体/联合体，直接访问成员

// 1. 匿名结构体
struct Outer {
  struct {      // 匿名结构体
    int x;
    int y;
  };            // 无名称!
  int z;
};

struct Outer o = {.x = 1, .y = 2, .z = 3};
o.x = 10;       // 直接访问，无需 o.inner.x

// 2. 匿名联合体 (节省内存)
struct Event {
  int type;
  union {       // 匿名联合体
    int click_x;
    int key_code;
    float scroll;
  };            // 无名称!
};

struct Event e1 = {.type = 1, .click_x = 100};
struct Event e2 = {.type = 2, .key_code = 65};

// 3. 应用：GPU/CPU 共享缓冲区
struct Vertex {
  union {
    struct { float x, y, z, w; };  // 匿名结构体
    float data[4];                  // 数组访问
  };
};`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百三十四题，匿名结构体和联合体。",
      2: "匿名结构体是 C11 引入的特性，嵌套的结构体没有名称，可以直接访问其成员。",
      3: "使用匿名结构体，无需通过中间名称访问嵌套成员，代码更简洁。",
      4: "匿名联合体常用于事件处理，不同类型的事件共享同一内存空间。",
      5: "联合体中的所有成员共享同一内存，大小等于最大成员的大小。",
      6: "嵌套匿名结构体在联合体中，提供结构化访问和数组访问两种方式。",
      7: "应用：GPU 顶点数据、网络协议解析、变体类型、事件系统。",
      8: "注意：匿名结构体是 C11 特性，MSVC 需要特定标志，GCC/Clang 作为扩展支持。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-pink-900/50 via-rose-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-pink-700/50">
            <h1 className="text-3xl font-bold text-pink-400 mb-2">1134 - 匿名结构体和联合体</h1>
            <p className="text-pink-300 text-sm">C11 无名嵌套 / 直接访问 / 内存复用</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 10) ||
                    (step === 3 && i >= 12 && i <= 13) ||
                    (step === 4 && i >= 16 && i <= 24) ||
                    (step === 5 && i >= 16 && i <= 24) ||
                    (step === 6 && i >= 27 && i <= 33) ||
                    (step === 7 && i >= 27 && i <= 33)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">💡 匿名结构体/联合体</p>
                    <p className="text-xs text-gray-400">C11 允许嵌套的结构体或联合体没有名称，可以直接访问其成员，简化代码并提供灵活的内存布局。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">匿名结构体语法</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                        <div>struct Outer {'{'}</div>
                        <div className="text-pink-400">&nbsp;&nbsp;struct {'{'}</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;int x;</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;int y;</div>
                        <div className="text-pink-400">&nbsp;&nbsp;}; <span className="text-gray-500">// 无名称!</span></div>
                        <div>&nbsp;&nbsp;int z;</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="text-pink-400 text-center text-xs">
                        嵌套结构体没有变量名，直接访问 x, y
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">直接访问成员</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs font-medium">❌ 传统方式</div>
                          <pre className="text-gray-400 text-xs mt-1">o.inner.x = 10;<br/>o.inner.y = 20;</pre>
                        </div>
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs font-medium">✅ 匿名方式</div>
                          <pre className="text-gray-400 text-xs mt-1">o.x = 10;<br/>o.y = 20;</pre>
                        </div>
                      </div>
                      <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30 font-mono text-xs">
                        <div>struct Outer o = {'{'}.x = 1, .y = 2, .z = 3{'}'};</div>
                        <div className="text-green-400 mt-1">o.x = 10;  // 直接访问!</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">匿名联合体 - 事件系统</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded text-xs">
                        <div>struct Event {'{'}</div>
                        <div>&nbsp;&nbsp;int type;</div>
                        <div className="text-pink-400">&nbsp;&nbsp;union {'{'}</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;int click_x;</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;int key_code;</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;float scroll;</div>
                        <div className="text-pink-400">&nbsp;&nbsp;};</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="text-pink-400 text-center text-xs">
                        所有事件类型共享同一内存，节省空间!
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">联合体内存布局</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-1">
                        <div className="w-24 h-12 bg-pink-600/50 border border-pink-400 flex items-center justify-center text-xs">
                          click_x (4 字节)
                        </div>
                        <div className="text-gray-400 text-xs">
                          = 同一内存位置
                        </div>
                      </div>
                      <div className="flex items-center gap-1">
                        <div className="w-24 h-12 bg-rose-600/50 border border-rose-400 flex items-center justify-center text-xs">
                          key_code (4 字节)
                        </div>
                        <div className="text-gray-400 text-xs">
                          = 同一内存位置
                        </div>
                      </div>
                      <div className="flex items-center gap-1">
                        <div className="w-24 h-12 bg-fuchsia-600/50 border border-fuchsia-400 flex items-center justify-center text-xs">
                          scroll (4 字节)
                        </div>
                        <div className="text-gray-400 text-xs">
                          = 同一内存位置
                        </div>
                      </div>
                      <div className="text-pink-400 text-center text-xs mt-2">
                        sizeof(union) = 4 (最大成员大小)
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">GPU 顶点数据应用</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded text-xs">
                        <div>struct Vertex {'{'}</div>
                        <div className="text-pink-400">&nbsp;&nbsp;union {'{'}</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;struct {'{'} <span className="text-gray-500">float x, y, z, w;</span> {'}'};</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;float data[4];</div>
                        <div className="text-pink-400">&nbsp;&nbsp;};</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                          <div className="text-pink-400 text-xs">结构化访问</div>
                          <pre className="text-gray-400 text-xs mt-1">v.x = 1.0f;<br/>v.y = 2.0f;</pre>
                        </div>
                        <div className="p-2 bg-rose-900/20 rounded border border-rose-500/30">
                          <div className="text-rose-400 text-xs">数组访问</div>
                          <pre className="text-gray-400 text-xs mt-1">for(i=0;i&lt;4;i++)<br/>v.data[i];</pre>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-pink-900/20 rounded-lg border border-pink-500/30">
                      <p className="text-pink-300 text-xs font-medium mb-2">📋 应用场景</p>
                      <div className="text-xs text-gray-400 space-y-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">图形/GPU 编程</div>
                          <ul className="text-gray-400 text-xs mt-1">
                            <li>• 顶点数据 (XYZW / 数组)</li>
                            <li>• 颜色 (RGBA / 分量)</li>
                            <li>• 矩阵/向量运算</li>
                          </ul>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">事件系统</div>
                          <ul className="text-gray-400 text-xs mt-1">
                            <li>• 鼠标事件 (x, y, click)</li>
                            <li>• 键盘事件 (keycode, mods)</li>
                            <li>• 触摸事件 (id, x, y)</li>
                          </ul>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">网络协议</div>
                          <ul className="text-gray-400 text-xs mt-1">
                            <li>• 协议头解析</li>
                            <li>• 变体数据包</li>
                          </ul>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-pink-900/20 rounded-lg border border-pink-500/30">
                      <p className="text-pink-300 text-xs font-medium mb-2">⚠️ 注意事项</p>
                      <ul className="text-xs text-gray-400 space-y-2">
                        <li>• <span className="text-orange-400">C11 特性</span>: MSVC 需要 /std:c11 标志</li>
                        <li>• <span className="text-blue-400">GCC/Clang</span>: 作为 GNU 扩展支持 (即使 C99 模式)</li>
                        <li>• <span className="text-red-400">联合体陷阱</span>: 同一时刻只能存储一个成员的值</li>
                        <li>• <span className="text-green-400">类型安全</span>: 需要自行追踪当前存储的类型</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 嵌套结构体无名称
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 3 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 直接访问嵌套成员
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 联合体共享内存
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">内存对比</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                    <p className="text-pink-300 font-medium">结构体</p>
                    <pre className="text-gray-400 font-mono text-xs">sizeof = 成员大小之和</pre>
                  </div>
                  <div className="p-2 bg-rose-900/20 rounded border border-rose-500/30">
                    <p className="text-rose-300 font-medium">联合体</p>
                    <pre className="text-gray-400 font-mono text-xs">sizeof = 最大成员大小</pre>
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">标准支持</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                    <p className="text-pink-300 font-medium">C11+</p>
                    <p className="text-gray-400">标准支持</p>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">GCC / Clang</p>
                    <p className="text-gray-400">作为扩展支持 (C99 模式)</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">MSVC</p>
                    <p className="text-gray-400">需要 /std:c11 标志</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-pink-600 hover:bg-pink-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-pink-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-pink-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-pink-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-pink-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
