<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>联合体作为函数参数 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0284c7 0%,#0369a1 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#0c4a6e;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#0369a1;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#e0f2fe,#bae6fd);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#38bdf8;transition:all 0.3s ease}
    .var-card.highlight{border-color:#0284c7;box-shadow:0 0 20px rgba(2,132,199,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#0c4a6e;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .union-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .union-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .union-box.definition{background:linear-gradient(135deg:#e0f2fe,#bae6fd);border-color:#0284c7}
    .union-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .param-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .param-label{width:100px;font-size:11px;color:#0369a1;font-weight:600;font-family:'Consolas',monospace}
    .union-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .union-box-inner.active{border-color:#0284c7;background:linear-gradient(135deg:#e0f2fe,#bae6fd)}
    .param-type{font-size:10px;color:#64748b}
    .param-value{font-size:12px;font-weight:700;color:#0369a1;font-family:'Consolas',monospace}
    .memory-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .memory-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .memory-row.pending{opacity:0.5}
    .memory-row.active{background:linear-gradient(135deg,#0284c7,#0369a1);border:2px solid#38bdf8}
    .memory-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .memory-value{font-size:14px;font-weight:700;color:#7dd3fc;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#0284c7;background:linear-gradient(135deg:#e0f2fe,#bae6fd)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#0369a1;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#e0f2fe;border-radius:8px;padding:12px;border-left:4px solid#0284c7;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#e0f2fe,#bae6fd)}
    .use-title{font-size:11px;color:#0c4a6e;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#0369a1;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#7dd3fc;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#7dd3fc;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#0284c7',sky:'#0284c7'};
    const LINE_MAP = {
      1:{step:1,text:'union Data { int i; float f; };',color:'#0284c7'},
      2:{step:2,text:'void print_union(union Data d) {',color:'#38bdf8'},
      3:{step:3,text:'  printf("%d or %f\\n", d.i, d.f);',color:'#7dd3fc'},
      4:{step:4,text:'}',color:'#bae6fd'},
      5:{step:5,text:'union Data val; val.i = 42;',color:'#0ea5e9'},
      6:{step:6,text:'print_union(val); return 0;',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，联合体 union 可作为函数参数传递，共享内存的特性保持不变',
      2:'定义 print_union 函数，接受联合体参数 d，按值传递',
      3:'打印联合体成员，d.i 为整型解释，d.f 为浮点解释，内存共享',
      4:'函数定义结束，联合体参数在栈上分配 4 字节',
      5:'创建联合体变量 val，设置整型成员 i 为 42',
      6:'调用 print_union 传入 val，输出 42 和对应的浮点表示'
    };
    const unionParams = [
      {name:'union Data',member:'int i / float f',desc:'联合体类型'},
      {name:'参数 d',member:'4 字节共享',desc:'按值传递'},
      {name:'调用 val',member:'val.i = 42',desc:'实参'}
    ];
    const memOps = [
      {op:'定义联合体',addr:'union Data',state:'4 字节共享内存'},
      {op:'函数调用',addr:'print_union(val)',state:'压栈传递'},
      {op:'访问成员',addr:'d.i / d.f',state:'同一内存不同解释'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',union:'M7 7h10v3l4-4-4-4v3H3v6h4v-4zm10 10H7v-3l-4 4 4 4v-3h14v-6h-4v4z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeParam,setActiveParam] = useState(-1);
      const [memIdx,setMemIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveParam(-1);
          setMemIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveParam(0);
          setMemIdx(0);
        } else if(step === 3) {
          setActiveParam(1);
        } else if(step === 4) {
          setMemIdx(1);
          setActiveParam(2);
        } else if(step === 5) {
          // val.i = 42
        } else if(step === 6) {
          setMemIdx(2);
          setTerminalLines(['42 or 0.000000']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveParam(-1);
        setMemIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>联合体作为函数参数 - C 语言可视化</h1>
            <p>联合体参数 | 共享内存 | 类型解释</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.sky,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                union_param.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.union} size={22} />
                联合体参数可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">union Data</span>
                  <span className="var-type">Function Parameter</span>
                </div>
                <div className="union-container">
                  <div className={`union-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#0c4a6e',marginBottom:12}}>联合体参数传递</div>
                    {unionParams.map((p, idx) => (
                      <div key={p.name} className="param-row">
                        <span className="param-label">{p.name}</span>
                        <div className={`union-box-inner ${step >= 2 + idx && activeParam === idx ? 'active' : ''}`}>
                          <div className="param-type">{p.desc}</div>
                          <div className="param-value">{p.member}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="memory-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>内存传递过程</div>
                  {memOps.map((m, idx) => (
                    <div key={idx} className={`memory-row ${step >= 2 + idx && memIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="memory-name">{m.op}</span>
                      <span className="memory-value">{m.addr} → {m.state}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">按值传递</div>
                    <div className="compare-code">4 字节拷贝</div>
                    <div className="compare-desc">安全但拷贝</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">按引用传递</div>
                    <div className="compare-code">union Data*</div>
                    <div className="compare-desc">零拷贝</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">整型解释</div>
                    <div className="compare-code">d.i = 42</div>
                    <div className="compare-desc">原值</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">浮点解释</div>
                    <div className="compare-code">d.f ≈ 0.0</div>
                    <div className="compare-desc">同内存不同解释</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">变体参数</div>
                    <div className="use-example">void draw(Shape s); // 圆/矩形/三角形共用</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">网络数据包</div>
                    <div className="use-example">void process(Packet p); // 不同协议解析</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">命令消息</div>
                    <div className="use-example">void exec(Command cmd); // 多种命令类型</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">数值转换</div>
                    <div className="use-example">void show_numeric(Numeric n); // int/float 双解释</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.sky}}>联合体参数</strong>
                <p style={{marginTop:8,color:'#78350f'}}>按值传递 4 字节共享内存</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>内存解释</strong>
                <p style={{marginTop:8,color:'#78350f'>同一内存，不同数据类型</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>传递方式</strong>
                <p style={{marginTop:8,color:'#78350f'>按值安全，按引用高效</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>变体类型、协议解析、命令消息</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
