<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>联合体数组应用 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#5b21b6;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#6d28d9;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#ede9fe,#ddd6fe);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#a78bfa;transition:all 0.3s ease}
    .var-card.highlight{border-color:#7c3aed;box-shadow:0 0 20px rgba(124,58,237,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#5b21b6;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .array-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .array-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .array-box.definition{background:linear-gradient(135deg:#ede9fe,#ddd6fe);border-color:#7c3aed}
    .array-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .elem-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .elem-label{width:80px;font-size:11px;color:#6d28d9;font-weight:600;font-family:'Consolas',monospace}
    .array-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .array-box-inner.active{border-color:#7c3aed;background:linear-gradient(135deg:#ede9fe,#ddd6fe)}
    .elem-type{font-size:10px;color:#64748b}
    .elem-value{font-size:12px;font-weight:700;color:#6d28d9;font-family:'Consolas',monospace}
    .storage-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .storage-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .storage-row.pending{opacity:0.5}
    .storage-row.active{background:linear-gradient(135deg,#7c3aed,#6d28d9);border:2px solid#a78bfa}
    .storage-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .storage-value{font-size:14px;font-weight:700;color:#c4b5fd;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#7c3aed;background:linear-gradient(135deg:#ede9fe,#ddd6fe)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#6d28d9;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#ede9fe;border-radius:8px;padding:12px;border-left:4px solid#7c3aed;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#ede9fe,#ddd6fe)}
    .use-title{font-size:11px;color:#5b21b6;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#6d28d9;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#c4b5fd;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#c4b5fd;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',violet:'#7c3aed'};
    const LINE_MAP = {
      1:{step:1,text:'union Entry { int id; float val; char tag[4]; };',color:'#7c3aed'},
      2:{step:2,text:'union Entry pool[3];',color:'#a78bfa'},
      3:{step:3,text:'pool[0].id = 100;',color:'#c4b5fd'},
      4:{step:4,text:'pool[1].val = 3.14f;',color:'#ddd6fe'},
      5:{step:5,text:'pool[2].tag[0] = \'A\';',color:'#ede9fe'},
      6:{step:6,text:'// 总内存：3 * 4 = 12 字节',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，联合体数组每个元素都是独立的联合体实例，各自共享 4 字节内存',
      2:'声明联合体数组 pool[3]，包含 3 个联合体元素，总内存 12 字节',
      3:'设置 pool[0] 的 id 成员为 100，第一个元素存储整型数据',
      4:'设置 pool[1] 的 val 成员为 3.14，第二个元素存储浮点数据',
      5:'设置 pool[2] 的 tag 成员首字符为 A，第三个元素存储字符数据',
      6:'联合体数组总内存为 3*4=12 字节，而结构体数组需要 3*12=36 字节，节省 66%'
    };
    const arrayElems = [
      {name:'pool[0]',member:'id = 100',desc:'整型数据'},
      {name:'pool[1]',member:'val = 3.14f',desc:'浮点数据'},
      {name:'pool[2]',member:'tag = "A..."',desc:'字符数据'}
    ];
    const storageOps = [
      {op:'声明数组',addr:'pool[3]',state:'分配 12 字节'},
      {op:'元素 0 写入',addr:'pool[0].id',state:'100'},
      {op:'元素 1 写入',addr:'pool[1].val',state:'3.14f'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',array:'M4 6h16M4 12h16M4 18h16'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeElem,setActiveElem] = useState(-1);
      const [storageIdx,setStorageIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveElem(-1);
          setStorageIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveElem(0);
          setStorageIdx(0);
        } else if(step === 3) {
          setActiveElem(1);
        } else if(step === 4) {
          setStorageIdx(1);
          setActiveElem(2);
        } else if(step === 5) {
          setStorageIdx(2);
        } else if(step === 6) {
          setTerminalLines(['pool[0].id=100, pool[1].val=3.14, pool[2].tag="A"']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveElem(-1);
        setStorageIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>联合体数组应用 - C 语言可视化</h1>
            <p>联合体数组 | 内存节省 | 异构数据</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.violet,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                union_array.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.array} size={22} />
                联合体数组可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">union Entry[3]</span>
                  <span className="var-type">Union Array Pool</span>
                </div>
                <div className="array-container">
                  <div className={`array-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#5b21b6',marginBottom:12}}>数组元素</div>
                    {arrayElems.map((e, idx) => (
                      <div key={e.name} className="elem-row">
                        <span className="elem-label">{e.name}</span>
                        <div className={`array-box-inner ${step >= 2 + idx && activeElem === idx ? 'active' : ''}`}>
                          <div className="elem-type">{e.desc}</div>
                          <div className="elem-value">{e.member}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="storage-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>存储分配过程</div>
                  {storageOps.map((s, idx) => (
                    <div key={idx} className={`storage-row ${step >= 2 + idx && storageIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="storage-name">{s.op}</span>
                      <span className="storage-value">{s.addr} → {s.state}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">联合体数组</div>
                    <div className="compare-code">3 × 4 = 12 字节</div>
                    <div className="compare-desc">节省 66%</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">结构体数组</div>
                    <div className="compare-code">3 × 12 = 36 字节</div>
                    <div className="compare-desc">独立存储</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">元素 0</div>
                    <div className="compare-code">id = 100</div>
                    <div className="compare-desc">整型</div>
                  </div>
                  <div className={`compare-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="compare-label">元素 1</div>
                    <div className="compare-code">val = 3.14</div>
                    <div className="compare-desc">浮点</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">对象池</div>
                    <div className="use-example">union Entry pool[MAX]; // 复用内存</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">异构数据列表</div>
                    <div className="use-example">union Data items[N]; // 每个元素不同类型</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">协议消息池</div>
                    <div className="use-example">union Message buf[QUEUE_SIZE]; // 多种消息</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">内存优化</div>
                    <div className="use-example">比结构体数组节省 66% 内存</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.violet}}>联合体数组</strong>
                <p style={{marginTop:8,color:'#78350f'}}>每个元素独立共享 4 字节</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>内存节省</strong>
                <p style={{marginTop:8,color:'#78350f'>12 字节 vs 36 字节</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>异构存储</strong>
                <p style={{marginTop:8,color:'#78350f'>不同元素存储不同类型</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>对象池、异构列表、消息队列</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
