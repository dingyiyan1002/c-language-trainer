<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1146 - 环形缓冲区 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .animate-rotate { animation: rotate 2s linear infinite; }
    .highlight { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(139, 92, 246, 0.2); border-left: 3px solid #8b5cf6; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#8b5cf6', primaryLight: '#a78bfa',
      secondary: '#7c3aed', secondaryLight: '#9f7aea',
      accent: '#06b6d4', accentLight: '#22d3ee',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 环形缓冲区 (Ring Buffer / Circular Buffer) =====
// 固定大小缓冲区，首尾相连，用于数据流处理

// 1. 环形缓冲区结构定义
typedef struct {
  uint8_t *buffer;    // 数据缓冲区
  uint32_t size;      // 缓冲区大小 (2 的幂次便于优化)
  uint32_t head;      // 写指针 (生产者)
  uint32_t tail;      // 读指针 (消费者)
} RingBuffer;

// 2. 初始化
void ring_init(RingBuffer *rb, uint8_t *buf, uint32_t size) {
  rb->buffer = buf;
  rb->size = size;
  rb->head = 0;
  rb->tail = 0;
}

// 3. 判空/判满
int ring_is_empty(RingBuffer *rb) {
  return rb->head == rb->tail;
}

int ring_is_full(RingBuffer *rb) {
  return ((rb->head + 1) & (rb->size - 1)) == rb->tail;
}

// 4. 入队操作 (写)
int ring_push(RingBuffer *rb, uint8_t data) {
  uint32_t next = (rb->head + 1) & (rb->size - 1);  // 位运算优化
  if (next == rb->tail) return -1;  // 缓冲区满
  rb->buffer[rb->head] = data;
  rb->head = next;
  return 0;
}

// 5. 出队操作 (读)
int ring_pop(RingBuffer *rb, uint8_t *data) {
  if (ring_is_empty(rb)) return -1;  // 缓冲区空
  *data = rb->buffer[rb->tail];
  rb->tail = (rb->tail + 1) & (rb->size - 1);
  return 0;
}

// 6. UART 接收应用 (中断 + DMA)
RingBuffer uart_rx_rb;
uint8_t uart_buf[256];

void USART2_IRQHandler(void) {
  uint8_t data = USART2->DR;  // 读取数据
  ring_push(&uart_rx_rb, data);  // 存入环形缓冲
}`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百四十六题，环形缓冲区。",
      2: "环形缓冲区使用固定大小数组，头尾指针循环移动实现 FIFO 队列。",
      3: "初始化设置缓冲区指针、大小和头尾指针归零。",
      4: "判空条件头等于尾，判满需要预留一个空位防止指针重叠。",
      5: "入队操作写数据到头指针位置，然后更新头指针。",
      6: "出队操作从尾指针读取数据，然后更新尾指针。",
      7: "位运算与操作优化取模，要求大小为 2 的幂次。",
      8: "应用：UART 收发、数据流处理、生产者消费者模型、音频缓冲。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);
      const [ringData, setRingData] = useState(Array(8).fill(null));
      const [head, setHead] = useState(0);
      const [tail, setTail] = useState(0);

      useEffect(() => {
        if (isPlaying && step === 5) {
          const interval = setInterval(() => {
            setRingData(prev => {
              const newData = [...prev];
              newData[head] = Math.floor(Math.random() * 16);
              return newData;
            });
            setHead(prev => (prev + 1) % 8);
          }, 800);
          return () => clearInterval(interval);
        }
      }, [isPlaying, step, head]);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        const voices = window.speechSynthesis.getVoices();
        const xiaoxiaoVoice = voices.find(v => v.name.includes('Xiaoxiao') || v.name.includes('zh-CN'));
        if (xiaoxiaoVoice) utterance.voice = xiaoxiaoVoice;
        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step <= MAX_STEPS) {
          playVoice();
        } else if (step > MAX_STEPS) {
          setIsPlaying(false);
          setIsVoicePlaying(false);
        }
        return () => {
          if (voiceEndTimerRef.current) {
            clearTimeout(voiceEndTimerRef.current);
          }
        };
      }, [isPlaying, step, playVoice]);

      useEffect(() => {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) {
          window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
          };
        }
      }, []);

      const handlePlay = () => {
        setIsPlaying(!isPlaying);
        if (!isPlaying && step >= MAX_STEPS) {
          setStep(1);
        }
      };

      const handleReset = () => {
        window.speechSynthesis.cancel();
        setStep(1);
        setIsPlaying(false);
        setIsVoicePlaying(false);
        setRingData(Array(8).fill(null));
        setHead(0);
        setTail(0);
      };

      const handleStepChange = (newStep) => {
        window.speechSynthesis.cancel();
        setStep(newStep);
      };

      const getActiveLine = (lineIndex) => {
        const stepLines = {
          1: [0],
          2: [3, 4, 5, 6, 7, 8],
          3: [10, 11, 12, 13, 14, 15],
          4: [17, 18, 19, 20, 21, 22],
          5: [24, 25, 26, 27, 28, 29, 30],
          6: [32, 33, 34, 35, 36, 37],
          7: [26, 36],
          8: [40]
        };
        return (stepLines[step] || []).includes(lineIndex) ? 'active' : '';
      };

      const renderVisualization = () => {
        switch(step) {
          case 1:
            return (
              <div className="text-center">
                <div className="text-6xl mb-4">🔄</div>
                <h3 className="text-2xl font-bold mb-2" style={{color: COLOR_MAP.primary}}>环形缓冲区</h3>
                <p className="text-gray-300">Ring Buffer / Circular Buffer</p>
              </div>
            );
          case 2:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4 font-bold" style={{color: COLOR_MAP.primary}}>环形缓冲区结构</div>
                <div className="relative">
                  <div className="w-48 h-48 mx-auto rounded-full border-8 border-dashed" style={{borderColor: COLOR_MAP.primary}}></div>
                  <div className="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                    <div className="text-xs text-center">
                      <div className="w-8 h-8 rounded-full bg-green-600 flex items-center justify-center mx-auto">写</div>
                      <div className="text-xs">head</div>
                    </div>
                  </div>
                  <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 translate-y-1/2">
                    <div className="text-xs text-center">
                      <div className="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center mx-auto">读</div>
                      <div className="text-xs">tail</div>
                    </div>
                  </div>
                  <div className="absolute top-1/2 left-0 transform -translate-x-1/2 -translate-y-1/2 text-center">
                    <div className="text-xs text-gray-400">buffer</div>
                    <div className="text-xs text-gray-500">size=2^n</div>
                  </div>
                </div>
                <div className="text-xs text-gray-400 text-center mt-4">
                  首尾相连的固定大小数组
                </div>
              </div>
            );
          case 3:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4 font-bold" style={{color: COLOR_MAP.primary}}>初始化</div>
                <div className="space-y-3 text-sm">
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div className="text-purple-400">void</div> ring_init(RingBuffer *rb, uint8_t *buf, uint32_t size) {'{'}
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div className="pl-4">rb-&gt;buffer = buf;  <span className="text-gray-500">// 数据缓冲区</span></div>
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div className="pl-4">rb-&gt;size = size;   <span className="text-gray-500">// 大小 (2 的幂)</span></div>
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div className="pl-4">rb-&gt;head = 0;     <span className="text-gray-500">// 写指针归零</span></div>
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div className="pl-4">rb-&gt;tail = 0;     <span className="text-gray-500">// 读指针归零</span></div>
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div className="pl-4">{'}'}</div>
                  </div>
                </div>
              </div>
            );
          case 4:
            return (
              <div className="space-y-4">
                <div className="bg-gray-800 rounded-lg p-4">
                  <div className="text-center mb-3 font-bold" style={{color: COLOR_MAP.success}}>判空条件</div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded text-center">
                    <div>head == tail</div>
                    <div className="text-gray-500 mt-1">写指针等于读指针 = 空</div>
                  </div>
                </div>
                <div className="bg-gray-800 rounded-lg p-4">
                  <div className="text-center mb-3 font-bold" style={{color: COLOR_MAP.warning}}>判满条件</div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded text-center">
                    <div>(head + 1) & (size - 1) == tail</div>
                    <div className="text-gray-500 mt-1">下一个写位置等于读指针 = 满</div>
                    <div className="text-yellow-400 mt-1">⚠️ 浪费 1 字节防止指针重叠</div>
                  </div>
                </div>
              </div>
            );
          case 5:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4 font-bold" style={{color: COLOR_MAP.success}}>入队操作 (Push)</div>
                <div className="relative">
                  <div className="grid grid-cols-4 gap-2 mb-4">
                    {ringData.map((val, idx) => (
                      <div
                        key={idx}
                        className={`aspect-square rounded-lg flex items-center justify-center text-sm font-bold transition-all
                          ${idx === head ? 'ring-2 ring-green-400' : ''}
                          ${val !== null ? 'bg-purple-600' : 'bg-gray-700'}`}
                      >
                        {val !== null ? val : idx}
                      </div>
                    ))}
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div>uint32_t next = (head + 1) & (size - 1);</div>
                    <div className="text-gray-500 mt-1">// 位运算优化：等价于 % size</div>
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded mt-2">
                    <div>if (next == tail) return -1;  // 满</div>
                    <div>buffer[head] = data;</div>
                    <div>head = next;</div>
                  </div>
                </div>
              </div>
            );
          case 6:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4 font-bold" style={{color: COLOR_MAP.accent}}>出队操作 (Pop)</div>
                <div className="space-y-3">
                  <div className="relative">
                    <div className="grid grid-cols-4 gap-2 mb-4">
                      {ringData.map((val, idx) => (
                        <div
                          key={idx}
                          className={`aspect-square rounded-lg flex items-center justify-center text-sm font-bold transition-all
                            ${idx === tail ? 'ring-2 ring-red-400' : ''}
                            ${val !== null ? 'bg-purple-600' : 'bg-gray-700'}`}
                        >
                          {val !== null ? val : '-'}
                        </div>
                      ))}
                    </div>
                    <div className="text-xs text-gray-400 text-center">红色框 = tail 读指针</div>
                  </div>
                  <div className="text-xs font-mono bg-gray-900 p-3 rounded">
                    <div>if (ring_is_empty(rb)) return -1;  // 空</div>
                    <div>*data = buffer[tail];</div>
                    <div>tail = (tail + 1) & (size - 1);</div>
                  </div>
                </div>
              </div>
            );
          case 7:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4 font-bold" style={{color: COLOR_MAP.primary}}>位运算优化</div>
                <div className="space-y-3">
                  <div className="grid grid-cols-2 gap-3 text-sm">
                    <div className="bg-gray-900 p-3 rounded">
                      <div className="font-bold text-red-400 mb-1">取模运算</div>
                      <div className="text-xs font-mono">(idx + 1) % size</div>
                      <div className="text-xs text-gray-500 mt-1">~10-20 周期</div>
                    </div>
                    <div className="bg-gray-900 p-3 rounded">
                      <div className="font-bold text-green-400 mb-1">位与运算</div>
                      <div className="text-xs font-mono">(idx + 1) & (size - 1)</div>
                      <div className="text-xs text-gray-500 mt-1">~1 周期</div>
                    </div>
                  </div>
                  <div className="text-xs bg-blue-900 p-3 rounded">
                    <div className="text-blue-300">
                      <span className="font-bold">⚡ 要求:</span> size 必须是 2 的幂 (如 8, 16, 32, 64, 256)
                    </div>
                  </div>
                  <div className="text-xs text-gray-400 text-center">
                    size = 2^n → size - 1 = 0b11...1 (n 个 1)
                  </div>
                </div>
              </div>
            );
          case 8:
            return (
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">📡</div>
                  <div className="font-bold text-sm">UART 收发</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">🔄</div>
                  <div className="font-bold text-sm">数据流处理</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">🏭</div>
                  <div className="font-bold text-sm">生产者消费者</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">🎵</div>
                  <div className="font-bold text-sm">音频缓冲</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">📊</div>
                  <div className="font-bold text-sm">ADC 采样缓冲</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">🌊</div>
                  <div className="font-bold text-sm">波形发生器</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      const explanations = {
        1: "环形缓冲区基础概念",
        2: "环形缓冲区结构定义",
        3: "初始化操作",
        4: "判空判满条件",
        5: "入队操作 (写)",
        6: "出队操作 (读)",
        7: "位运算优化技巧",
        8: "环形缓冲区应用场景"
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          {/* Header */}
          <div className="text-center mb-6">
            <h1 className="text-3xl font-bold mb-2">1146 - 环形缓冲区</h1>
            <p className="text-gray-400">Ring Buffer / Circular Buffer</p>
          </div>

          {/* Controls */}
          <div className="flex justify-center items-center space-x-4 mb-6">
            <button
              onClick={handleReset}
              className="px-4 py-2 rounded bg-gray-700 hover:bg-gray-600 transition"
            >
              🔄 重置
            </button>
            <button
              onClick={handlePlay}
              className={`px-6 py-2 rounded transition ${isPlaying ? 'bg-yellow-600 hover:bg-yellow-500' : 'bg-green-600 hover:bg-green-500'}`}
              style={{backgroundColor: isPlaying ? COLOR_MAP.warning : COLOR_MAP.success}}
            >
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <div className="flex items-center space-x-2">
              <span className="text-gray-400">语速:</span>
              <input
                type="range"
                min="0.5"
                max="1.5"
                step="0.1"
                value={voiceRate}
                onChange={(e) => setVoiceRate(parseFloat(e.target.value))}
                className="w-24"
              />
              <span className="text-sm w-12">{voiceRate.toFixed(1)}x</span>
            </div>
          </div>

          {/* Step Indicator */}
          <div className="flex justify-center mb-6">
            <div className="flex space-x-2">
              {Array.from({length: MAX_STEPS}).map((_, i) => (
                <button
                  key={i}
                  onClick={() => handleStepChange(i + 1)}
                  className={`w-10 h-10 rounded-full transition ${step === i + 1 ? 'text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}
                  style={step === i + 1 ? {backgroundColor: COLOR_MAP.primary} : {}}
                >
                  {i + 1}
                </button>
              ))}
            </div>
          </div>

          {/* Main Content */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {/* Code */}
            <div className="bg-gray-800 rounded-lg p-4">
              <div className="text-sm font-bold mb-3" style={{color: COLOR_MAP.primary}}>💻 代码示例</div>
              <pre className="text-xs font-mono text-gray-300 overflow-x-auto">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${getActiveLine(i)} py-1`}>{line}</div>
                ))}
              </pre>
            </div>

            {/* Visualization */}
            <div className="bg-gray-800 rounded-lg p-4">
              <div className="text-sm font-bold mb-3" style={{color: COLOR_MAP.accent}}>🎨 可视化</div>
              {renderVisualization()}
            </div>

            {/* Explanations */}
            <div className="bg-gray-800 rounded-lg p-4">
              <div className="text-sm font-bold mb-3" style={{color: COLOR_MAP.secondary}}>📝 解释</div>
              <div className="space-y-4">
                {Array.from({length: MAX_STEPS}).map((_, i) => (
                  <div key={i} className={`p-3 rounded transition ${step >= i + 1 ? 'opacity-100' : 'opacity-30'}`}>
                    <div className="flex items-center mb-2">
                      <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= i + 1 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= i + 1 ? {backgroundColor: COLOR_MAP.primary} : {}}>{i + 1}</div>
                      <span className={step >= i + 1 ? 'text-white' : 'text-gray-500'}>{explanations[i + 1]}</span>
                    </div>
                  </div>
                ))}
              </div>

              {/* Voice Status */}
              <div className="mt-4 pt-4 border-t border-gray-700">
                <div className="text-sm text-gray-400 mb-2">🔊 语音讲解</div>
                <div className={`text-sm ${isVoicePlaying ? 'text-green-400' : 'text-gray-500'}`}>
                  {isVoicePlaying ? '正在播放...' : '已暂停'}
                </div>
                <div className="text-xs text-gray-500 mt-1">
                  当前：步骤 {step} / {MAX_STEPS}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
