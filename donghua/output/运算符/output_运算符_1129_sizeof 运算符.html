<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1129 - sizeof 运算符 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(251, 191, 36, 0.2); border-left: 3px solid #fbbf24; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#fbbf24', primaryLight: '#fcd34d',
      secondary: '#f59e0b', secondaryLight: '#fcd34d',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== sizeof 运算符 =====
// 编译时计算类型或变量占用的字节数

// 基本类型 (32 位系统)
sizeof(char)           // 1 (始终为 1)
sizeof(short)          // 2
sizeof(int)            // 4
sizeof(long)           // 4 (32 位) 或 8 (64 位)
sizeof(long long)      // 8
sizeof(float)          // 4
sizeof(double)         // 8

// 指针
sizeof(int*)           // 4 (32 位) 或 8 (64 位)
sizeof(void*)          // 同平台指针大小

// 数组
int arr[10];
sizeof(arr)            // 40 (10 * 4)
sizeof(arr[0])         // 4

// 结构体
struct Point { int x, y; };
sizeof(struct Point)   // 8 (可能有 padding)`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十九题，sizeof 运算符。",
      2: "sizeof 是编译时运算符，计算类型或变量占用的内存字节数，不是运行时函数。",
      3: "基本类型大小依赖于平台，char 始终为 1，int 在 32 位系统为 4，long 依赖架构。",
      4: "指针大小只与平台相关，32 位指针 4 字节，64 位指针 8 字节，与指向类型无关。",
      5: "数组的 sizeof 返回整个数组的字节数，等于元素个数乘以元素大小。",
      6: "结构体大小不是成员简单相加，编译器会插入 padding 保证对齐。",
      7: "sizeof 重要应用：malloc 分配内存、数组长度计算、跨平台可移植代码。",
      8: "注意：sizeof 不能用于动态数组、函数参数退化为指针的数组、变长数组 (C99 除外)。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-amber-900/50 via-yellow-900/50 to-orange-900/50 rounded-xl p-6 mb-4 border border-amber-700/50">
            <h1 className="text-3xl font-bold text-amber-400 mb-2">1129 - sizeof 运算符</h1>
            <p className="text-amber-300 text-sm">编译时计算 / 内存大小 / 平台相关</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
              <h2 className="text-lg font-semibold text-amber-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 12) ||
                    (step === 3 && i >= 5 && i <= 10) ||
                    (step === 4 && i >= 15 && i <= 16) ||
                    (step === 5 && i >= 19 && i <= 22) ||
                    (step === 6 && i >= 25 && i <= 27) ||
                    (step === 7 && i >= 4 && i <= 27)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
              <h2 className="text-lg font-semibold text-amber-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">💡 sizeof</p>
                    <p className="text-xs text-gray-400">sizeof 是编译时运算符，计算类型或变量占用的字节数，结果是 size_t 类型的编译时常量。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">基本类型大小</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                          <div className="text-amber-400">sizeof(char)</div>
                          <div className="text-green-400">= 1</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                          <div className="text-amber-400">sizeof(short)</div>
                          <div className="text-green-400">= 2</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                          <div className="text-amber-400">sizeof(int)</div>
                          <div className="text-green-400">= 4</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                          <div className="text-amber-400">sizeof(float)</div>
                          <div className="text-green-400">= 4</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                          <div className="text-amber-400">sizeof(double)</div>
                          <div className="text-green-400">= 8</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                          <div className="text-amber-400">sizeof(long long)</div>
                          <div className="text-green-400">= 8</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">平台相关性</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30">
                          <div className="text-amber-400 text-xs">32 位系统</div>
                          <div className="text-gray-400 text-xs">sizeof(long) = 4</div>
                          <div className="text-gray-400 text-xs">sizeof(void*) = 4</div>
                        </div>
                        <div className="p-2 bg-yellow-900/20 rounded border border-yellow-500/30">
                          <div className="text-yellow-400 text-xs">64 位系统</div>
                          <div className="text-gray-400 text-xs">sizeof(long) = 8</div>
                          <div className="text-gray-400 text-xs">sizeof(void*) = 8</div>
                        </div>
                      </div>
                      <div className="text-amber-400 text-center text-xs">
                        char 始终为 1，其他类型依赖平台
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">指针大小</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-amber-400">sizeof(int*)      = 4/8</div>
                        <div className="text-amber-400">sizeof(char*)     = 4/8</div>
                        <div className="text-amber-400">sizeof(void*)     = 4/8</div>
                        <div className="text-amber-400">sizeof(void(***)()) = 4/8</div>
                      </div>
                      <div className="text-amber-400 text-center text-xs">
                        所有指针类型大小相同，只与平台位数相关
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">数组的 sizeof</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>int arr[10];</div>
                        <div className="text-amber-400">sizeof(arr)      = 40</div>
                        <div className="text-amber-400">sizeof(arr[0])   = 4</div>
                        <div className="text-amber-400">sizeof(arr)/sizeof(arr[0]) = 10</div>
                      </div>
                      <div className="text-green-400 text-center text-xs">
                        经典用法：数组长度 = sizeof(arr)/sizeof(arr[0])
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">结构体与对齐</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>struct Point {'{'}</div>
                        <div>&nbsp;&nbsp;int x;  <span className="text-gray-500">// 4 字节</span></div>
                        <div>&nbsp;&nbsp;int y;  <span className="text-gray-500">// 4 字节</span></div>
                        <div>{'}'};</div>
                        <div className="text-amber-400">sizeof(struct Point) = 8</div>
                      </div>
                      <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30">
                        <div className="text-gray-400 text-xs">
                          结构体大小 ≥ 成员大小之和<br/>
                          编译器可能插入 padding 保证对齐
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-amber-900/20 rounded-lg border border-amber-500/30">
                      <p className="text-amber-300 text-xs font-medium mb-2">📋 典型应用</p>
                      <div className="text-xs text-gray-400 font-mono space-y-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400">// 1. malloc 分配内存</div>
                          <div>int* arr = (int*)malloc(<span className="text-amber-400">10 * sizeof(int)</span>);</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400">// 2. 数组长度</div>
                          <div>#define ARRAY_SIZE(arr) (<span className="text-amber-400">sizeof(arr)/sizeof((arr)[0])</span>)</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400">// 3. 跨平台代码</div>
                          <div>uint32_t val; <span className="text-gray-500">// 始终 4 字节</span></div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-amber-900/20 rounded-lg border border-amber-500/30">
                      <p className="text-amber-300 text-xs font-medium mb-2">⚠️ 注意事项</p>
                      <ul className="text-xs text-gray-400 space-y-2">
                        <li>• <span className="text-red-400">动态数组</span>: sizeof 不能获取堆分配数组的长度</li>
                        <li>• <span className="text-orange-400">函数参数</span>: 数组参数退化为指针，sizeof 返回指针大小</li>
                        <li>• <span className="text-blue-400">变长数组</span>: C99 支持，但 sizeof 在运行时计算</li>
                        <li>• <span className="text-green-400">编译时常量</span>: 普通数组的 sizeof 是编译时常量</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
                <h2 className="text-lg font-semibold text-amber-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> sizeof 是编译时运算符，不是函数
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 指针大小只与平台位数相关
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 6 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 结构体大小包含 padding
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
                <h2 className="text-lg font-semibold text-amber-400 mb-3">常见陷阱</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">数组退化为指针</p>
                    <pre className="text-gray-400 font-mono text-xs">void foo(int arr[]) { sizeof(arr) = 4/8; }</pre>
                  </div>
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">动态数组</p>
                    <pre className="text-gray-400 font-mono text-xs">int* p = malloc(n*sizeof(int)); sizeof(p) = 4/8</pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-amber-600 hover:bg-amber-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-amber-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-amber-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-amber-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-amber-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
