<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1110 - 函数指针进阶 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(236, 72, 153, 0.2); border-left: 3px solid #ec4899; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#ec4899', primaryLight: '#f472b6',
      secondary: '#db2777', secondaryLight: '#f472b6',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 函数指针数组 (跳转表) =====
int add(int a, int b) { return a + b; }
int sub(int a, int b) { return a - b; }
int mul(int a, int b) { return a * b; }
int div(int a, int b) { return a / b; }

// 函数指针数组
int (*op_table[])(int, int) = { add, sub, mul, div };

// 调用
int result = op_table[0](10, 5);  // 15
int result2 = op_table[3](20, 4); // 5

// ===== 回调函数模式 =====
void process(int (*callback)(int, int), int x, int y) {
  int res = callback(x, y);
  printf("Result: %d\\n", res);
}
process(add, 100, 50);  // Result: 150`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十题，函数指针进阶应用。",
      2: "函数指针数组可以创建跳转表，根据索引动态选择函数调用。",
      3: "op_table 是函数指针数组，每个元素指向返回 int、接受两个 int 参数的函数。",
      4: "op_table[0] 指向 add，op_table[3] 指向 div，通过索引动态调用。",
      5: "回调函数模式：将函数指针作为参数传递，实现通用处理逻辑。",
      6: "process 函数接受 callback 参数，在内部调用，实现策略模式。",
      7: "函数指针典型应用：跳转表、回调函数、状态机、插件架构。",
      8: "函数指针让 C 语言支持多态和行为参数化，是高级编程的基础。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-pink-900/50 via-rose-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-pink-700/50">
            <h1 className="text-3xl font-bold text-pink-400 mb-2">1110 - 函数指针进阶</h1>
            <p className="text-pink-300 text-sm">跳转表 / 回调函数 / 策略模式</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 1 && i <= 10) ||
                    (step === 3 && i >= 7 && i <= 7) ||
                    (step === 4 && i >= 10 && i <= 11) ||
                    (step === 5 && i >= 14 && i <= 18) ||
                    (step === 6 && i >= 19 && i <= 19)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">💡 函数指针进阶</p>
                    <p className="text-xs text-gray-400">函数指针数组实现跳转表，回调函数实现策略模式，是 C 语言高级编程的基础。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">跳转表模式</p>
                    <p className="text-xs text-gray-400 mb-2">使用函数指针数组，根据索引动态选择要调用的函数。</p>
                    <div className="text-xs bg-gray-900/50 p-2 rounded font-mono">
                      <span className="text-pink-400">int (*op_table[])(int,int)</span> = {'{'}add, sub, mul, div{'}'};
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">函数指针数组声明</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-pink-400">int (*op_table[])(int, int)</div>
                        <div className="text-gray-500 mt-1">分解:</div>
                        <div>• op_table[] — 数组</div>
                        <div>• * — 数组元素是指针</div>
                        <div>• (int, int) — 指向的函数接受两个 int</div>
                        <div>• int — 返回 int</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-pink-900/20 rounded-lg border border-pink-500/30">
                      <p className="text-pink-300 text-xs font-medium mb-2">跳转表调用</p>
                      <div className="text-xs text-gray-400 font-mono space-y-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div>op_table[0](10, 5);</div>
                          <div className="text-green-400">// → add(10, 5) = 15</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div>op_table[1](10, 5);</div>
                          <div className="text-green-400">// → sub(10, 5) = 5</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div>op_table[2](10, 5);</div>
                          <div className="text-green-400">// → mul(10, 5) = 50</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div>op_table[3](20, 4);</div>
                          <div className="text-green-400">// → div(20, 4) = 5</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">回调函数模式</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <p>将函数指针作为参数传递，实现通用处理逻辑。</p>
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>void process(<span className="text-pink-400">int (*callback)(int,int)</span>,</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;int x, int y) {'{'}</div>
                        <div>&nbsp;&nbsp;int res = <span className="text-green-400">callback</span>(x, y);</div>
                        <div>&nbsp;&nbsp;printf("Result: %d\\n", res);</div>
                        <div>{'}'}</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">策略模式实现</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>process(add, 100, 50);</div>
                        <div className="text-green-400">// → Result: 150</div>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>process(sub, 100, 50);</div>
                        <div className="text-green-400">// → Result: 50</div>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>process(mul, 100, 50);</div>
                        <div className="text-green-400">// → Result: 5000</div>
                      </div>
                      <div className="text-blue-400 mt-2">同一个 process 函数，不同的行为策略!</div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">🔧 典型应用场景</p>
                    <div className="grid grid-cols-2 gap-2 text-xs text-gray-400">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-pink-400 font-medium">跳转表</p>
                        <p>解释器、VM、状态机</p>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-pink-400 font-medium">回调函数</p>
                        <p>事件处理、信号槽</p>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-pink-400 font-medium">策略模式</p>
                        <p>可插拔算法</p>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-pink-400 font-medium">插件架构</p>
                        <p>动态加载模块</p>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-pink-900/20 rounded-lg border border-pink-500/30">
                      <p className="text-pink-300 text-xs font-medium mb-2">📋 总结</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• 函数指针数组 = 跳转表 (动态分发)</li>
                        <li>• 函数指针参数 = 回调 (行为参数化)</li>
                        <li>• 支持策略模式、观察者模式</li>
                        <li>• C 语言的"多态"实现基础</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 函数指针数组：跳转表，O(1) 动态分发
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 5 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 回调函数：行为参数化，策略模式
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 应用：解释器、事件系统、插件架构
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">语法解析</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                    <p className="text-pink-300 font-mono">int (*fp)(int, int)</p>
                    <p className="text-gray-400">函数指针：接受两个 int，返回 int</p>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-mono">int (*arr[])(int, int)</p>
                    <p className="text-gray-400">函数指针数组：数组元素是函数指针</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-mono">void (*fn(int))(int)</p>
                    <p className="text-gray-400">返回函数指针的函数 (复杂但合法)</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-pink-600 hover:bg-pink-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-pink-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-pink-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-pink-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-pink-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
