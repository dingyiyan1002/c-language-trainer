<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>信号处理函数 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#dc2626 0%,#b91c1c 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#991b1b;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#991b1b;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#fee2e2,#fecaca);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#f87171;transition:all 0.3s ease}
    .var-card.highlight{border-color:#dc2626;box-shadow:0 0 20px rgba(220,38,38,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#991b1b;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .signal-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .signal-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .signal-box.definition{background:linear-gradient(135deg:#fee2e2,#fecaca);border-color:#dc2626}
    .signal-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .sig-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .sig-label{width:120px;font-size:11px;color:#991b1b;font-weight:600;font-family:'Consolas',monospace}
    .signal-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .signal-box-inner.active{border-color:#dc2626;background:linear-gradient(135deg:#fee2e2,#fecaca)}
    .sig-type{font-size:10px;color:#64748b}
    .sig-value{font-size:12px;font-weight:700;color:#991b1b;font-family:'Consolas',monospace}
    .interrupt-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .interrupt-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .interrupt-row.pending{opacity:0.5}
    .interrupt-row.active{background:linear-gradient(135deg,#dc2626,#b91c1c);border:2px solid#f87171}
    .interrupt-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .interrupt-value{font-size:14px;font-weight:700;color:#fca5a5;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#dc2626;background:linear-gradient(135deg:#fee2e2,#fecaca)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#991b1b;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#fee2e2;border-radius:8px;padding:12px;border-left:4px solid#dc2626;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#fee2e2,#fecaca)}
    .use-title{font-size:11px;color:#991b1b;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#991b1b;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#fca5a5;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#fca5a5;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#dc2626',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',crimson:'#dc2626'};
    const LINE_MAP = {
      1:{step:1,text:'#include <signal.h>',color:'#dc2626'},
      2:{step:2,text:'void sig_handler(int signo) {',color:'#f87171'},
      3:{step:3,text:'  if(signo == SIGINT)',color:'#fca5a5'},
      4:{step:4,text:'    printf("收到 Ctrl+C\\n");',color:'#fecaca'},
      5:{step:5,text:'signal(SIGINT, sig_handler);',color:'#ef4444'},
      6:{step:6,text:'while(1); return 0; // 等待信号',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，信号处理函数用于响应异步事件，如 Ctrl+C 中断',
      2:'定义信号处理函数 sig_handler，参数 signo 标识信号类型',
      3:'检查信号是否为 SIGINT，即 Ctrl+C 触发的中断信号',
      4:'打印提示信息，告知用户捕获到 Ctrl+C 信号',
      5:'使用 signal 函数注册处理函数，当 SIGINT 到来时调用 sig_handler',
      6:'程序进入无限循环等待信号，异步事件触发时自动调用处理函数'
    };
    const signals = [
      {name:'SIGINT',value:'2 (Ctrl+C)',desc:'中断信号'},
      {name:'SIGTERM',value:'15',desc:'终止请求'},
      {name:'SIGSEGV',value:'11',desc:'段错误'}
    ];
    const interruptOps = [
      {op:'注册处理函数',addr:'signal(SIGINT,handler)',state:'绑定回调'},
      {op:'信号触发',addr:'Ctrl+C 按下',state:'异步中断'},
      {op:'执行处理',addr:'sig_handler(SIGINT)',state:'响应回调'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',signal:'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeSig,setActiveSig] = useState(-1);
      const [interruptIdx,setInterruptIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveSig(-1);
          setInterruptIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveSig(0);
          setInterruptIdx(0);
        } else if(step === 3) {
          setActiveSig(1);
        } else if(step === 4) {
          setInterruptIdx(1);
          setActiveSig(2);
        } else if(step === 5) {
          // signal registered
        } else if(step === 6) {
          setInterruptIdx(2);
          setTerminalLines(['收到 Ctrl+C']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveSig(-1);
        setInterruptIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>信号处理函数 - C 语言可视化</h1>
            <p>信号处理 | 异步中断 | 回调注册</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.crimson,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                signal_handler.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.signal} size={22} />
                信号处理可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">signal()</span>
                  <span className="var-type">Signal Handling API</span>
                </div>
                <div className="signal-container">
                  <div className={`signal-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#991b1b',marginBottom:12}}>常见信号类型</div>
                    {signals.map((s, idx) => (
                      <div key={s.name} className="sig-row">
                        <span className="sig-label">{s.name}</span>
                        <div className={`signal-box-inner ${step >= 2 + idx && activeSig === idx ? 'active' : ''}`}>
                          <div className="sig-type">{s.desc}</div>
                          <div className="sig-value">{s.value}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="interrupt-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>中断处理流程</div>
                  {interruptOps.map((i, idx) => (
                    <div key={idx} className={`interrupt-row ${step >= 2 + idx && interruptIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="interrupt-name">{i.op}</span>
                      <span className="interrupt-value">{i.addr} → {i.state}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">默认行为</div>
                    <div className="compare-code">终止进程</div>
                    <div className="compare-desc">SIGINT 默认</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">自定义处理</div>
                    <div className="compare-code">sig_handler()</div>
                    <div className="compare-desc">优雅退出</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">同步</div>
                    <div className="compare-code">顺序执行</div>
                    <div className="compare-desc">可预测</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">异步</div>
                    <div className="compare-code">信号中断</div>
                    <div className="compare-desc">随时触发</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">优雅退出</div>
                    <div className="use-example">signal(SIGINT, cleanup_handler); // 释放资源后退出</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">段错误捕获</div>
                    <div className="use-example">signal(SIGSEGV, crash_handler); // 记录错误信息</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">子进程终止</div>
                    <div className="use-example">signal(SIGCHLD, reap_handler); // 回收僵尸进程</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">定时器信号</div>
                    <div className="use-example">signal(SIGALRM, timeout_handler); // 超时处理</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.crimson}}>信号处理</strong>
                <p style={{marginTop:8,color:'#78350f'}}>异步事件回调机制</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>注册函数</strong>
                <p style={{marginTop:8,color:'#78350f'>signal(signo, handler)</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>异步中断</strong>
                <p style={{marginTop:8,color:'#78350f'>随时触发，打断主流程</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>优雅退出、错误处理、超时</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
