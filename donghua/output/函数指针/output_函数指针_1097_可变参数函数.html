<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>可变参数函数 va_list - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#db2777 0%,#be185d 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#831843;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#9d174d;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#fce7f3,#fbcfe8);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#f472b6;transition:all 0.3s ease}
    .var-card.highlight{border-color:#ec4899;box-shadow:0 0 20px rgba(236,72,153,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#831843;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .va-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .va-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .va-box.definition{background:linear-gradient(135deg:#fce7f3,#fbcfe8);border-color:#ec4899}
    .va-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .arg-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .arg-label{width:80px;font-size:11px;color:#9d174d;font-weight:600;font-family:'Consolas',monospace}
    .va-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .va-box-inner.active{border-color:#ec4899;background:linear-gradient(135deg:#fce7f3,#fbcfe8)}
    .arg-info{font-size:10px;color:#64748b}
    .arg-value{font-size:12px;font-weight:700;color:#9d174d;font-family:'Consolas',monospace}
    .stack-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .stack-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .stack-row.pending{opacity:0.5}
    .stack-row.active{background:linear-gradient(135deg,#db2777,#be185d);border:2px solid#f472b6}
    .stack-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .stack-value{font-size:14px;font-weight:700;color:#f9a8d4;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#ec4899;background:linear-gradient(135deg:#fce7f3,#fbcfe8)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#9d174d;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#fce7f3;border-radius:8px;padding:12px;border-left:4px solid#ec4899;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#fce7f3,#fbcfe8)}
    .use-title{font-size:11px;color:#831843;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#9d174d;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#f9a8d4;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#f9a8d4;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',pink:'#db2777'};
    const LINE_MAP = {
      1:{step:1,text:'#include <stdarg.h>',color:'#db2777'},
      2:{step:2,text:'int sum(int count, ...) {',color:'#f472b6'},
      3:{step:3,text:'  va_list args;',color:'#fb7185'},
      4:{step:4,text:'  va_start(args, count);',color:'#f9a8d4'},
      5:{step:5,text:'  int total = 0; for(int i=0; i<count; i++) total += va_arg(args, int);',color:'#fce7f3'},
      6:{step:6,text:'  va_end(args); return total; }',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，stdarg.h 头文件提供可变参数支持，用于实现类似 printf 的函数',
      2:'定义 sum 函数，第一个参数 count 表示可变参数个数，... 表示后续参数数量不固定',
      3:'声明 va_list 类型变量 args，用于遍历可变参数列表',
      4:'va_start 宏初始化 args，使其指向第一个可变参数',
      5:'循环遍历可变参数，va_arg 宏依次获取每个参数，累加到 total',
      6:'va_end 清理参数列表，返回总和，可变参数函数用于通用计算和格式化输出'
    };
    const vaArgs = [
      {name:'va_list',type:'args',desc:'参数列表指针'},
      {name:'va_start',call:'(args, count)',desc:'初始化参数'},
      {name:'va_arg',call:'(args, int)',desc:'获取下一个参数'}
    ];
    const stackOps = [
      {op:'函数调用',addr:'sum(3, 10, 20, 30)',state:'压栈参数'},
      {op:'va_start',addr:'args → &10',state:'指向第一个可变参数'},
      {op:'va_arg 循环',addr:'10+20+30=60',state:'依次读取累加'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',va:'M7 7h10v3l4-4-4-4v3H3v6h4v-4zm10 10H7v-3l-4 4 4 4v-3h14v-6h-4v4z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeVa,setActiveVa] = useState(-1);
      const [stackIdx,setStackIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveVa(-1);
          setStackIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveVa(0);
          setStackIdx(0);
        } else if(step === 3) {
          setActiveVa(1);
        } else if(step === 4) {
          setStackIdx(1);
          setActiveVa(2);
        } else if(step === 5) {
          setStackIdx(2);
        } else if(step === 6) {
          setTerminalLines(['sum(3, 10, 20, 30) = 60']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveVa(-1);
        setStackIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>可变参数函数 va_list - C 语言可视化</h1>
            <p>可变参数 | va_list | printf 实现原理</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.pink,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                variadic_func.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.va} size={22} />
                可变参数可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">stdarg.h</span>
                  <span className="var-type">Variadic Function API</span>
                </div>
                <div className="va-container">
                  <div className={`va-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#831843',marginBottom:12}}>可变参数 API</div>
                    {vaArgs.map((v, idx) => (
                      <div key={v.name} className="arg-row">
                        <span className="arg-label">{v.name}</span>
                        <div className={`va-box-inner ${step >= 2 + idx && activeVa === idx ? 'active' : ''}`}>
                          <div className="arg-info">{v.desc}</div>
                          <div className="arg-value">{v.call || v.type}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="stack-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>参数栈帧</div>
                  {stackOps.map((s, idx) => (
                    <div key={idx} className={`stack-row ${step >= 2 + idx && stackIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="stack-name">{s.op}</span>
                      <span className="stack-value">{s.addr} → {s.state}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">固定参数</div>
                    <div className="compare-code">int f(int a, int b)</div>
                    <div className="compare-desc">参数数量固定</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">可变参数</div>
                    <div className="compare-code">int f(int count, ...)</div>
                    <div className="compare-desc">参数数量可变</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">优点</div>
                    <div className="compare-code">灵活通用</div>
                    <div className="compare-desc">类似 printf</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">注意</div>
                    <div className="compare-code">类型不安全</div>
                    <div className="compare-desc">需手动管理</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">printf 系列</div>
                    <div className="use-example">int printf(const char *fmt, ...); // 格式化输出</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">求和函数</div>
                    <div className="use-example">int sum(int count, ...); // 可变参数求和</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">日志函数</div>
                    <div className="use-example">void log_msg(int level, const char *fmt, ...); // 可变参数日志</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">构造函数</div>
                    <div className="use-example">Object* make_obj(Type type, ...); // 可变参数构造</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.pink}}>可变参数</strong>
                <p style={{marginTop:8,color:'#78350f'}}>使用 ... 声明可变数量参数</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>va_list</strong>
                <p style={{marginTop:8,color:'#78350f'>遍历参数列表的指针</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>宏 API</strong>
                <p style={{marginTop:8,color:'#78350f'>va_start/va_arg/va_end</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>printf、日志、求和、通用构造</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
