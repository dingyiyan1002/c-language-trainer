<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1162 - ADC 模数转换器 - 嵌入式 C 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes sample { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.2); } }
    @keyframes wave { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    .animate-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .animate-blink { animation: blink 0.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out forwards; }
    .animate-scaleIn { animation: scaleIn 0.5s ease-out forwards; }
    .animate-sample { animation: sample 1s ease-in-out infinite; }
    .animate-wave { animation: wave 3s linear infinite; }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLOR_MAP = {
      primary: '#06b6d4',
      secondary: '#22d3ee',
      accent: '#67e8f9',
      bg: '#164e63',
      text: '#ecfeff',
      border: '#0891b2'
    };

    const STEPS = [
      { title: 'ADC 概述', voice: 'ADC 是 Analog-to-Digital Converter 的缩写，中文名为模数转换器。它将连续变化的模拟信号转换为离散的数字信号，是 MCU 与模拟世界沟通的桥梁。' },
      { title: 'ADC 原理', voice: 'ADC 通过采样保持电路在特定时刻捕捉模拟电压，然后使用量化编码器将电压值转换为数字码。常见转换原理有逐次逼近型 SAR、积分型、闪速型等。' },
      { title: '关键参数', voice: 'ADC 主要参数包括：分辨率决定精度，转换速率决定速度，参考电压决定量程，信噪比决定信号质量。STM32F4 的 ADC 是 12 位分辨率，最高 2.4MSPS 采样率。' },
      { title: 'STM32 ADC 结构', voice: 'STM32 ADC 包含多个通道，支持规则组和注入组两种转换序列。规则组用于常规转换，注入组可打断规则组进行高优先级转换。' },
      { title: '转换模式', voice: 'STM32 ADC 支持多种转换模式：单次转换、连续转换、扫描模式多通道采集、注入模式高优先级转换、间断模式分组转换。' },
      { title: '触发源', voice: 'ADC 转换可由软件触发，也可由硬件触发。硬件触发源包括定时器更新事件、外部中断、定时器捕获比较等，实现精确定时采样。' },
      { title: '数据对齐', voice: 'ADC 转换结果可以是左对齐或右对齐。右对齐时 LSB 对齐最低位，高位补零。左对齐时 MSB 对齐最高位，低位补零。通常使用右对齐方式。' },
      { title: 'HAL 库使用', voice: 'STM32 HAL 库提供 HAL_ADC_Start 启动转换、HAL_ADC_PollForConversion 等待转换完成、HAL_ADC_GetValue 读取结果、HAL_ADC_Start_IT 中断方式、HAL_ADC_Start_DMA DMA 连续采集等函数。' }
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(true);
      const [voiceStatus, setVoiceStatus] = useState('就绪');
      const voiceEndTimerRef = useRef(null);

      useEffect(() => {
        if (!isPlaying) return;
        const step = STEPS[currentStep];
        setVoiceStatus('播放中...');

        const utterance = new SpeechSynthesisUtterance(step.voice);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;

        const voices = speechSynthesis.getVoices();
        const xiaoxiao = voices.find(v => v.name.includes('Xiaoxiao') || v.name.includes('zh-CN'));
        if (xiaoxiao) utterance.voice = xiaoxiao;

        utterance.onend = () => {
          setVoiceStatus('已完成');
          voiceEndTimerRef.current = setTimeout(() => {
            if (currentStep < STEPS.length - 1) {
              setCurrentStep(prev => prev + 1);
            } else {
              setIsPlaying(false);
            }
          }, 800);
        };

        utterance.onerror = () => {
          setVoiceStatus('播放失败');
          voiceEndTimerRef.current = setTimeout(() => {
            if (currentStep < STEPS.length - 1) {
              setCurrentStep(prev => prev + 1);
            }
          }, 800);
        };

        speechSynthesis.speak(utterance);
        return () => clearTimeout(voiceEndTimerRef.current);
      }, [currentStep, isPlaying]);

      const handlePlay = () => {
        setCurrentStep(0);
        setIsPlaying(true);
        speechSynthesis.cancel();
      };

      const handlePause = () => {
        setIsPlaying(false);
        speechSynthesis.cancel();
      };

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => prev + 1);
          speechSynthesis.cancel();
        }
      };

      const handlePrev = () => {
        if (currentStep > 0) {
          setCurrentStep(prev => prev - 1);
          speechSynthesis.cancel();
        }
      };

      const renderStepContent = () => {
        switch(currentStep) {
          case 0: return <Step0Overview />;
          case 1: return <Step1Principle />;
          case 2: return <Step2Parameters />;
          case 3: return <Step3Structure />;
          case 4: return <Step4Modes />;
          case 5: return <Step5Trigger />;
          case 6: return <Step6Alignment />;
          case 7: return <Step7HALUsage />;
          default: return <Step0Overview />;
        }
      };

      return (
        <div className="min-h-screen p-4" style={{ background: `linear-gradient(135deg, ${COLOR_MAP.bg} 0%, #0f172a 100%)` }}>
          <div className="mb-4 flex items-center justify-between" style={{ backgroundColor: 'rgba(30, 41, 59, 0.8)', borderRadius: '12px', padding: '16px' }}>
            <div>
              <h1 className="text-2xl font-bold" style={{ color: COLOR_MAP.text }}>1162 - ADC 模数转换器</h1>
              <p className="text-sm" style={{ color: COLOR_MAP.accent }}>Embedded C - Analog-to-Digital Converter</p>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-sm" style={{ color: COLOR_MAP.accent }}>
                {voiceStatus} | 步骤 {currentStep + 1}/{STEPS.length}
              </div>
              <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 rounded disabled:opacity-50" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>上一个</button>
              {!isPlaying ? (
                <button onClick={handlePlay} className="px-4 py-2 rounded" style={{ backgroundColor: '#10b981', color: 'white' }}>播放</button>
              ) : (
                <button onClick={handlePause} className="px-4 py-2 rounded" style={{ backgroundColor: '#f59e0b', color: 'white' }}>暂停</button>
              )}
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} className="px-4 py-2 rounded disabled:opacity-50" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>下一个</button>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-4 h-[calc(100vh-150px)]">
            <div className="rounded-lg overflow-hidden shadow-xl" style={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', border: `2px solid ${COLOR_MAP.border}` }}>
              <div className="px-4 py-2 font-semibold" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>代码示例</div>
              <pre className="p-4 text-sm overflow-auto h-full text-gray-100 font-mono">
                <code>{renderStepContent()}</code>
              </pre>
            </div>

            <div className="rounded-lg overflow-hidden shadow-xl" style={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', border: `2px solid ${COLOR_MAP.border}` }}>
              <div className="px-4 py-2 font-semibold" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>可视化动画</div>
              <div className="p-4 h-full overflow-auto">
                {renderVisualization()}
              </div>
            </div>

            <div className="rounded-lg overflow-hidden shadow-xl" style={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', border: `2px solid ${COLOR_MAP.border}` }}>
              <div className="px-4 py-2 font-semibold" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>解释说明</div>
              <div className="p-4 space-y-3 h-full overflow-auto">
                <div className="p-3 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}20` }}>
                  <div className="font-bold mb-2" style={{ color: COLOR_MAP.text }}>{STEPS[currentStep].title}</div>
                  <p style={{ color: COLOR_MAP.accent }}>{STEPS[currentStep].voice}</p>
                </div>
                {renderExplanation()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function renderVisualization() {
      switch(currentStep) {
        case 0: return <Step0OverviewViz />;
        case 1: return <Step1PrincipleViz />;
        case 2: return <Step2ParametersViz />;
        case 3: return <Step3StructureViz />;
        case 4: return <Step4ModesViz />;
        case 5: return <Step5TriggerViz />;
        case 6: return <Step6AlignmentViz />;
        case 7: return <Step7HALUsageViz />;
        default: return <Step0OverviewViz />;
      }
    }

    function renderExplanation() {
      switch(currentStep) {
        case 0: return <Step0OverviewExp />;
        case 1: return <Step1PrincipleExp />;
        case 2: return <Step2ParametersExp />;
        case 3: return <Step3StructureExp />;
        case 4: return <Step4ModesExp />;
        case 5: return <Step5TriggerExp />;
        case 6: return <Step6AlignmentExp />;
        case 7: return <Step7HALUsageExp />;
        default: return null;
      }
    }

    function Step0Overview() {
      return `/**
 * ADC 模数转换器 - 概述
 * Analog-to-Digital Converter
 *
 * 作用:
 * - 将模拟信号转换为数字信号
 * - MCU 与模拟世界的桥梁
 * - 传感器信号采集必备
 */

// 常见应用
#define TEMP_SENSOR     // 温度传感器
#define LIGHT_SENSOR    // 光敏电阻/光电二极管
#define BATTERY_VOLT    // 电池电压检测
#define MOTOR_CURRENT   // 电机电流检测
#define AUDIO_INPUT     // 音频信号采集
#define POTENTIOMETER   // 电位器位置检测

// STM32 ADC 特性
// - 12 位分辨率 (4096 级)
// - 最高 2.4MSPS 采样率
// - 多个独立 ADC 模块
// - 多种转换模式

// 应用框图
// 模拟信号 → 信号调理 → ADC → 数字信号 → MCU 处理`;
    }

    function Step0OverviewViz() {
      return (
        <div className="space-y-4">
          <div className="text-center mb-4">
            <div className="text-lg font-bold" style={{ color: COLOR_MAP.text }}>ADC 应用框图</div>
          </div>
          <div className="p-4 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}20`, border: `2px solid ${COLOR_MAP.border}` }}>
            <div className="flex items-center justify-between">
              <div className="p-3 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.primary}40`, border: `1px solid ${COLOR_MAP.primary}` }}>
                <div className="font-bold text-xs" style={{ color: COLOR_MAP.text }}>模拟信号源</div>
                <div className="text-xs mt-1" style={{ color: COLOR_MAP.accent }}>温度/光照/电压</div>
              </div>
              <div className="flex items-center">
                <div className="w-16 h-0.5" style={{ backgroundColor: COLOR_MAP.accent }}></div>
                <div className="w-3 h-3 rotate-45 -mx-2" style={{ backgroundColor: COLOR_MAP.accent }}></div>
              </div>
              <div className="p-3 rounded text-center animate-pulse" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>
                <div className="font-bold">ADC</div>
                <div className="text-xs mt-1">模数转换器</div>
              </div>
              <div className="flex items-center">
                <div className="w-3 h-3 rotate-45 -mx-2" style={{ backgroundColor: COLOR_MAP.accent }}></div>
                <div className="w-16 h-0.5" style={{ backgroundColor: COLOR_MAP.accent }}></div>
              </div>
              <div className="p-3 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.secondary}40`, border: `1px solid ${COLOR_MAP.secondary}` }}>
                <div className="font-bold text-xs" style={{ color: COLOR_MAP.text }}>MCU</div>
                <div className="text-xs mt-1" style={{ color: COLOR_MAP.accent }}>数字处理</div>
              </div>
            </div>
            <div className="mt-4 grid grid-cols-3 gap-2">
              <div className="p-2 rounded text-center text-xs" style={{ backgroundColor: `${COLOR_MAP.accent}20`, border: `1px solid ${COLOR_MAP.accent}`, color: COLOR_MAP.text }}>
                0.0V → 0
              </div>
              <div className="p-2 rounded text-center text-xs animate-blink" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>
                1.65V → 2048
              </div>
              <div className="p-2 rounded text-center text-xs" style={{ backgroundColor: `${COLOR_MAP.accent}20`, border: `1px solid ${COLOR_MAP.accent}`, color: COLOR_MAP.text }}>
                3.3V → 4095
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Step0OverviewExp() {
      return (
        <div className="space-y-2 text-sm" style={{ color: COLOR_MAP.accent }}>
          <p><strong style={{ color: COLOR_MAP.text }}>ADC 作用：</strong> 将现实世界的连续模拟信号 (温度、光照、电压等) 转换为 MCU 可处理的离散数字信号。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>应用场景：</strong> 温度传感器、光敏传感器、电池电压检测、电流检测、音频采集、电位器读取等。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>STM32 ADC：</strong> STM32F4 系列 ADC 为 12 位分辨率，输出电压值范围 0-4095，对应 0V 到参考电压 (通常 3.3V)。</p>
        </div>
      );
    }

    function Step1Principle() {
      return `/**
 * ADC 工作原理
 */

// ADC 转换流程
// 1. 采样 (Sample)
//    采样保持电路采集模拟电压
//    在电容上保持电压值

// 2. 保持 (Hold)
//    断开输入，保持采样电压
//    准备进行量化编码

// 3. 量化 (Quantize)
//    将连续电压分为离散等级
//    12 位 ADC 有 4096 个等级

// 4. 编码 (Encode)
//    输出对应数字码
//    0V → 0x000
//    Vref/2 → 0x800 (2048)
//    Vref → 0xFFF (4095)

// 逐次逼近型 (SAR) ADC
// 1. 从 MSB 开始逐位比较
// 2. DAC 输出与输入比较
// 3. 确定该位为 1 或 0
// 4. 继续下一位直到 LSB

// 转换结果计算
// Digital = (Analog × 4095) / Vref`;
    }

    function Step1PrincipleViz() {
      return (
        <div className="space-y-3">
          <div className="text-center font-bold mb-2" style={{ color: COLOR_MAP.text }}>ADC 转换过程</div>
          <div className="p-3 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}10`, border: `2px solid ${COLOR_MAP.border}` }}>
            <div className="grid grid-cols-4 gap-2 text-xs">
              <div className="p-2 rounded text-center animate-pulse" style={{ backgroundColor: `${COLOR_MAP.primary}30`, border: `1px solid ${COLOR_MAP.primary}` }}>
                <div style={{ color: COLOR_MAP.text }}>采样</div>
                <div style={{ color: COLOR_MAP.accent }}>Sample</div>
              </div>
              <div className="p-2 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.secondary}30`, border: `1px solid ${COLOR_MAP.secondary}` }}>
                <div style={{ color: COLOR_MAP.text }}>保持</div>
                <div style={{ color: COLOR_MAP.accent }}>Hold</div>
              </div>
              <div className="p-2 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.accent}30`, border: `1px solid ${COLOR_MAP.accent}` }}>
                <div style={{ color: COLOR_MAP.text }}>量化</div>
                <div style={{ color: COLOR_MAP.accent }}>Quantize</div>
              </div>
              <div className="p-2 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.bg}60`, border: `1px solid ${COLOR_MAP.border}` }}>
                <div style={{ color: COLOR_MAP.text }}>编码</div>
                <div style={{ color: COLOR_MAP.accent }}>Encode</div>
              </div>
            </div>
          </div>
          <div className="p-3 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}20`, border: `1px solid ${COLOR_MAP.primary}` }}>
            <div className="text-xs font-bold mb-2" style={{ color: COLOR_MAP.text }}>SAR 逐次逼近过程 (转换 2.0V)</div>
            <div className="space-y-1 text-xs">
              <div className="flex justify-between" style={{ color: COLOR_MAP.accent }}>
                <span>第 1 位 (MSB): 比较 1.65V</span>
                <span style={{ color: '#22c55e' }}>2.0V &gt; 1.65V → 1</span>
              </div>
              <div className="flex justify-between" style={{ color: COLOR_MAP.accent }}>
                <span>第 2 位：比较 2.475V</span>
                <span style={{ color: '#ef4444' }}>2.0V &lt; 2.475V → 0</span>
              </div>
              <div className="flex justify-between" style={{ color: COLOR_MAP.accent }}>
                <span>第 3 位：比较 2.0625V</span>
                <span style={{ color: '#ef4444' }}>2.0V &lt; 2.0625V → 0</span>
              </div>
              <div className="flex justify-between" style={{ color: COLOR_MAP.accent }}>
                <span>第 4 位：比较 1.856V</span>
                <span style={{ color: '#22c55e' }}>2.0V &gt; 1.856V → 1</span>
              </div>
              <div className="text-center mt-2" style={{ color: COLOR_MAP.text }}>继续 8 位...最终结果：10100... → 2458</div>
            </div>
          </div>
        </div>
      );
    }

    function Step1PrincipleExp() {
      return (
        <div className="space-y-2 text-sm" style={{ color: COLOR_MAP.accent }}>
          <p><strong style={{ color: COLOR_MAP.text }}>采样保持：</strong> 采样时电容跟踪输入电压，保持时断开输入保持电压值，确保转换期间电压稳定。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>SAR 原理：</strong> 逐次逼近型 ADC 从最高位开始，用内部 DAC 产生比较电压，逐位确定输出码。12 位 ADC 需要 12 个比较周期。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>量化误差：</strong> 由于数字化是离散的，存在±1LSB 的量化误差。12 位 ADC 在 3.3V 量程下 1LSB ≈ 0.8mV。</p>
        </div>
      );
    }

    function Step2Parameters() {
      return `/**
 * ADC 关键参数
 */

// 1. 分辨率 (Resolution)
// 12 位 = 4096 级 (2^12)
// 最小分辨电压 = Vref / 4096
// 例如 Vref=3.3V: LSB = 3.3V/4096 ≈ 0.8mV

// 2. 转换速率 (Conversion Rate)
// 最高 2.4MSPS (每秒 240 万次转换)
// 单次转换时间 = 1 / 采样率
// 2.4MSPS → 0.42μs/次

// 3. 参考电压 (Reference Voltage)
// 决定输入量程
// Vref+ = 3.3V (通常)
// Vref- = 0V (GND)
// 输入范围：0V ~ Vref+

// 4. 信噪比 (SNR)
// 信号与噪声的比值
// STM32F4 ADC: SNR ≈ 70dB

// 5. 采样时间 (Sampling Time)
// 可选：3/15/28/56/84/112/239/480 周期
// 采样时间越长，精度越高，速度越慢`;
    }

    function Step2ParametersViz() {
      return (
        <div className="space-y-3">
          <div className="text-center font-bold mb-2" style={{ color: COLOR_MAP.text }}>ADC 主要参数</div>
          <div className="space-y-2">
            <div className="p-2 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}20`, border: `1px solid ${COLOR_MAP.primary}` }}>
              <div className="flex justify-between items-center">
                <span className="text-xs font-bold" style={{ color: COLOR_MAP.text }}>分辨率</span>
                <span className="text-xs" style={{ color: COLOR_MAP.accent }}>12 位 = 4096 级</span>
              </div>
              <div className="mt-1 flex gap-0.5">
                {Array.from({ length: 12 }).map((_, i) => (
                  <div key={i} className="flex-1 h-2 rounded animate-blink" style={{ backgroundColor: COLOR_MAP.primary, animationDelay: `${i * 50}ms` }}></div>
                ))}
              </div>
            </div>
            <div className="p-2 rounded" style={{ backgroundColor: `${COLOR_MAP.secondary}20`, border: `1px solid ${COLOR_MAP.secondary}` }}>
              <div className="flex justify-between items-center">
                <span className="text-xs font-bold" style={{ color: COLOR_MAP.text }}>采样率</span>
                <span className="text-xs" style={{ color: COLOR_MAP.accent }}>最高 2.4MSPS</span>
              </div>
              <div className="text-xs mt-1" style={{ color: COLOR_MAP.accent }}>单次转换：0.42μs</div>
            </div>
            <div className="p-2 rounded" style={{ backgroundColor: `${COLOR_MAP.accent}20`, border: `1px solid ${COLOR_MAP.accent}` }}>
              <div className="flex justify-between items-center">
                <span className="text-xs font-bold" style={{ color: COLOR_MAP.text }}>参考电压</span>
                <span className="text-xs" style={{ color: COLOR_MAP.text }}>3.3V</span>
              </div>

          <p><strong style={{ color: COLOR_MAP.text }}>初始化：</strong> 使用 CubeMX 配置 ADC 参数 (时钟、分辨率、模式、触发源、对齐方式)，生成初始化代码。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>阻塞式：</strong> Start() 启动 → PollForConversion() 等待 → GetValue() 读取 → Stop() 停止。适合低频采样。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>DMA 方式：</strong> Start_DMA() 启动后，ADC 自动转换，DMA 自动传输结果到内存，CPU 完全解放。适合高速连续采集。</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
