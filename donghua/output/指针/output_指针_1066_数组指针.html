<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>数组指针 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#f97316 0%,#ea580c 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#7c2d12;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#c2410c;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#ffedd5,#fed7aa);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#fb923c;transition:all 0.3s ease}
    .var-card.highlight{border-color:#f97316;box-shadow:0 0 20px rgba(249,115,22,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#7c2d12;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .array-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .array-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .array-box.definition{background:linear-gradient(135deg:#ffedd5,#fed7aa);border-color:#f97316}
    .array-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .element-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .element-idx{width:32px;height:32px;border-radius:50%;background:#ea580c;color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .element-box{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .element-box.active{border-color:#f97316;background:linear-gradient(135deg:#ffedd5,#fed7aa)}
    .element-val{font-size:12px;font-weight:700;color:#ea580c;font-family:'Consolas',monospace}
    .pointer-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .pointer-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .pointer-row.pending{opacity:0.5}
    .pointer-row.active{background:linear-gradient(135deg,#f97316,#ea580c);border:2px solid#fb923c}
    .ptr-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .ptr-value{font-size:14px;font-weight:700;color:#22d3ee;font-family:'Consolas',monospace}
    .arrow-animation{display:flex;align-items:center;margin:16px 0}
    .arrow-box{flex:1;height:4px;background:#e5e7eb;position:relative;border-radius:2px}
    .arrow-box.active::after{content:'';position:absolute;right:0;top:-6px;width:0;height:0;border-left:10px solid #f97316;border-top:6px solid transparent;border-bottom:6px solid transparent;animation:moveArrow 1s infinite}
    @keyframes moveArrow{0%,100%{left:0}50%{left:100%}}
    .memory-strip{display:flex;gap:4px;margin:16px 0;overflow-x:auto;padding:8px;background:#fff7ed;border-radius:8px}
    .memory-cell{min-width:48px;height:48px;border:2px solid#f97316;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:white;transition:all 0.3s ease}
    .memory-cell.active{background:linear-gradient(135deg,#f97316,#ea580c);color:white;border-color:#c2410c}
    .cell-idx{font-size:8px;color:#64748b}
    .memory-cell.active .cell-idx{color:#ffedd5}
    .cell-val{font-size:10px;font-weight:700;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#22d3ee;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#22d3ee;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',orange:'#f97316'};
    const LINE_MAP = {
      1:{step:1,text:'#include <stdio.h>',color:'#7c3aed'},
      2:{step:2,text:'int arr[] = {10, 20, 30, 40, 50};',color:'#f97316'},
      3:{step:3,text:'int (*ptr)[5] = &arr;',color:'#3b82f6'},
      4:{step:4,text:'printf("%d\\n", (*ptr)[2]);',color:'#22c55e'},
      5:{step:5,text:'ptr++;',color:'#ef4444'},
      6:{step:6,text:'return 0;',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，数组指针是指向数组的指针，与指针数组不同',
      2:'定义整型数组 arr，包含 5 个元素，连续内存存储',
      3:'ptr 是指向长度为 5 的数组的指针，ptr 指向整个数组',
      4:'解引用 (*ptr) 得到数组，(*ptr)[2] 访问第三个元素 30',
      5:'ptr++ 移动一个数组长度，指向下一个数组',
      6:'程序结束，数组指针用于多维数组和数组传递'
    };
    const arr = [10,20,30,40,50];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',array:'M7 7h10v3l4-4-4-4v3H5V6h12v3H7V7zm10 10H7v-3l-4 4 4 4v-3h12v-1H5v-3h12v2z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeIdx,setActiveIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveIdx(-1);
        } else if(step === 3) {
          setActiveIdx(-1);
        } else if(step === 4) {
          setActiveIdx(2);
          setTerminalLines(['30']);
        } else if(step === 5) {
          setActiveIdx(-1);
        } else if(step === 6) {
          // Complete
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>数组指针 - C 语言可视化</h1>
            <p>指向数组的指针 | 数组引用 | 指针运算</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.orange,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                array_pointer.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.array} size={22} />
                数组指针可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">int (*ptr)[5]</span>
                  <span className="var-type">Pointer to Array</span>
                </div>
                <div className="array-container">
                  <div className={`array-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#7c2d12',marginBottom:12}}>数组 arr (5 个元素)</div>
                    {arr.map((val, idx) => (
                      <div key={idx} className="element-row">
                        <div className="element-idx">{idx}</div>
                        <div className={`element-box ${step >= 4 && activeIdx === idx ? 'active' : ''}`}>
                          <div className="element-val">{val}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="pointer-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>数组指针</div>
                  <div className={`pointer-row ${step >= 3 ? 'active' : 'pending'}`}>
                    <span className="ptr-name">ptr</span>
                    <span className="ptr-value">&arr[0] → 0x{step >= 3 ? '7fff2000' : '????'}</span>
                  </div>
                  <div className={`pointer-row ${step >= 4 ? 'active' : 'pending'}`}>
                    <span className="ptr-name">(*ptr)[2]</span>
                    <span className="ptr-value">{step >= 4 ? '30' : '?'}</span>
                  </div>
                </div>
                <div className="arrow-animation">
                  <div className={`arrow-box ${step >= 3 ? 'active' : ''}`}></div>
                </div>
                <div className="memory-strip">
                  {arr.map((val, idx) => (
                    <div key={idx} className={`memory-cell ${step >= 4 && activeIdx === idx ? 'active' : ''}`}>
                      <span className="cell-idx">[{idx}]</span>
                      <span className="cell-val">{val}</span>
                    </div>
                  ))}
                </div>
              </div>
              {step >= 4 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.orange}}>数组指针</strong>
                <p style={{marginTop:8,color:'#78350f'}}>指向整个数组的指针</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>语法区别</strong>
                <p style={{marginTop:8,color:'#78350f'}}>int (*ptr)[5] vs int *ptr[5]</p>
              </div>
              <div className={`explanation-card ${step >= 3 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>指针运算</strong>
                <p style={{marginTop:8,color:'#78350f'>ptr++ 移动整个数组长度</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:#78350f'}}>二维数组、数组传递</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
