<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1120 - void 指针 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(6, 182, 212, 0.2); border-left: 3px solid #06b6d4; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#06b6d4', primaryLight: '#22d3ee',
      secondary: '#0891b2', secondaryLight: '#22d3ee',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== void 指针 (通用指针) =====
int x = 42;
float f = 3.14f;

// void* 可以指向任何类型
void* ptr;
ptr = &x;    // ✅ 指向 int
ptr = &f;    // ✅ 指向 float

// 使用前必须类型转换
int* ip = (int*)ptr;
printf("%d\\n", *ip);  // 42

// ===== 典型应用 =====
// malloc 返回 void*
int* arr = (int*)malloc(10 * sizeof(int));

// 泛型函数
void swap(void* a, void* b, size_t size) {
  char temp[size];
  memcpy(temp, a, size);
  memcpy(a, b, size);
  memcpy(b, temp, size);
}`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十题，void 指针。",
      2: "void 指针是通用指针，可以指向任何数据类型的地址。",
      3: "ptr 可以先指向 int 变量 x，再指向 float 变量 f，非常灵活。",
      4: "但 void 指针不能直接解引用，必须先转换为具体类型指针。",
      5: "int* ip = (int*)ptr 转换后，才能*ip 访问值。",
      6: "malloc 返回 void*，需要转换为具体类型才能使用。",
      7: "泛型函数如 swap 接受 void 参数，可以处理任何类型的数据。",
      8: "void 指针是 C 语言实现泛型编程的基础，但要小心类型安全。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-cyan-900/50 via-sky-900/50 to-blue-900/50 rounded-xl p-6 mb-4 border border-cyan-700/50">
            <h1 className="text-3xl font-bold text-cyan-400 mb-2">1120 - void 指针</h1>
            <p className="text-cyan-300 text-sm">通用指针 / 类型转换 / 泛型编程</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
              <h2 className="text-lg font-semibold text-cyan-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 5 && i <= 8) ||
                    (step === 3 && i >= 7 && i <= 8) ||
                    (step === 4 && i >= 11 && i <= 12) ||
                    (step === 5 && i >= 11 && i <= 13) ||
                    (step === 6 && i >= 17 && i <= 18) ||
                    (step === 7 && i >= 21 && i <= 26)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
              <h2 className="text-lg font-semibold text-cyan-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">💡 void 指针</p>
                    <p className="text-xs text-gray-400">void 指针是通用指针，可以指向任何类型的数据，是 C 语言实现泛型的基础。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">通用指针特性</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>int x = 42;</div>
                        <div>float f = 3.14;</div>
                        <div className="text-cyan-400">void* ptr;</div>
                      </div>
                      <div className="text-cyan-400 text-center">
                        void* 可以保存任何类型的地址
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">指向不同类型</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-cyan-900/20 rounded border border-cyan-500/30">
                        <div>ptr = &x;  // 指向 int</div>
                        <div className="text-green-400">// ptr 保存 x 的地址</div>
                      </div>
                      <div className="p-2 bg-sky-900/20 rounded border border-sky-500/30">
                        <div>ptr = &f;  // 指向 float</div>
                        <div className="text-green-400">// ptr 现在保存 f 的地址</div>
                      </div>
                      <div className="text-orange-400 text-center">
                        void* 可以重新指向任何类型
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">⚠️ 不能直接解引用</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                        <div className="text-red-400">*ptr;      // ❌ 编译错误!</div>
                        <div className="text-gray-500 text-xs">不知道类型，无法确定大小</div>
                      </div>
                      <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                        <div className="text-red-400">ptr++;     // ❌ 编译错误!</div>
                        <div className="text-gray-500 text-xs">不知道类型，无法计算步长</div>
                      </div>
                      <div className="text-gray-400 text-center">
                        必须先转换为具体类型
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">类型转换后使用</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-cyan-400">ptr = &x;</div>
                        <div className="text-purple-400">int* ip = (int*)ptr;</div>
                        <div>printf("%d", *ip);  // 42</div>
                      </div>
                      <div className="text-green-400 text-center">
                        转换为 int* 后可以解引用
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">malloc 返回 void*</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-cyan-400">int* arr = (int*)malloc(10 * sizeof(int));</div>
                      </div>
                      <div className="text-gray-400 text-xs">
                        malloc 返回 void*，需要转换为 int*<br/>
                        C++ 中可以不转换，但 C 中建议显式转换
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">泛型函数示例</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>void swap(void* a, void* b, size_t size) {'{'}</div>
                        <div>&nbsp;&nbsp;char temp[size];</div>
                        <div>&nbsp;&nbsp;memcpy(temp, a, size);</div>
                        <div>&nbsp;&nbsp;memcpy(a, b, size);</div>
                        <div>&nbsp;&nbsp;memcpy(b, temp, size);</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-green-400 text-center">
                        可以交换 int、float、struct 任何类型!
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-cyan-900/20 rounded-lg border border-cyan-500/30">
                      <p className="text-cyan-300 text-xs font-medium mb-2">📋 注意事项</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• void* 是通用指针，可指向任何类型</li>
                        <li>• 不能直接解引用或指针运算</li>
                        <li>• 使用前必须转换为具体类型</li>
                        <li>• 应用：malloc、泛型函数、回调数据</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
                <h2 className="text-lg font-semibold text-cyan-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-cyan-900/30 text-cyan-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> void* 可以保存任何类型的地址
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-cyan-900/30 text-cyan-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 不能直接解引用或算术运算
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-cyan-900/30 text-cyan-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 用于泛型编程和通用 API
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
                <h2 className="text-lg font-semibold text-cyan-400 mb-3">典型应用</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-cyan-900/20 rounded border border-cyan-500/30">
                    <p className="text-cyan-300 font-medium">动态内存分配</p>
                    <p className="text-gray-400">void* malloc(size_t n)</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">泛型排序</p>
                    <p className="text-gray-400">qsort(void* base, ..., int (*cmp)(const void*, const void*))</p>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">回调数据</p>
                    <p className="text-gray-400">void (*callback)(void* user_data)</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-cyan-600 hover:bg-cyan-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-cyan-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-cyan-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-cyan-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-cyan-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
