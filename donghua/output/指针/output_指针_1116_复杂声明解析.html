<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1116 - 复杂声明解析 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(139, 92, 246, 0.2); border-left: 3px solid #8b5cf6; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#8b5cf6', primaryLight: '#a78bfa',
      secondary: '#7c3aed', secondaryLight: '#a78bfa',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 复杂声明解析 (右左法则) =====

// 例 1: 函数指针
void (*fp)(int);
// fp 先与*结合 → fp 是指针 → 指向函数 → 函数返回 void，参数 int

// 例 2: 返回指针的函数
int* func(int x);
// func 先与 () 结合 → func 是函数 → 返回 int* 指针

// 例 3: 数组指针
int (*p)[10];
// p 先与*结合 → p 是指针 → 指向 int[10] 数组

// 例 4: 指针数组
int *arr[5];
// arr 先与 [] 结合 → arr 是数组 → 元素是 int* 指针

// 例 5: 复杂组合
int (*(*fp)(int))[10];
// fp 是指针 → 指向函数 (参数 int) → 函数返回指针 → 指向 int[10] 数组`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十六题，复杂声明解析。",
      2: "C 语言声明使用右左法则：从标识符开始，右→左→括号内交替阅读。",
      3: "例 1：fp 先与*结合成指针，指向函数，函数返回 void，接受 int 参数。",
      4: "例 2：func 先与 () 结合成函数，返回 int* 指针。",
      5: "例 3：p 先与*结合成指针，指向 int[10] 数组。",
      6: "例 4：arr 先与 [] 结合成数组，元素是 int* 指针。",
      7: "例 5：fp 是指针指向函数，函数返回指针指向 int[10] 数组。",
      8: "右左法则：标识符→右→左→括号内，循环直到声明结束。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-violet-900/50 via-purple-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-violet-700/50">
            <h1 className="text-3xl font-bold text-violet-400 mb-2">1116 - 复杂声明解析</h1>
            <p className="text-violet-300 text-sm">右左法则 / 螺旋法则 / 优先级解析</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 4) ||
                    (step === 3 && i >= 6 && i <= 8) ||
                    (step === 4 && i >= 10 && i <= 12) ||
                    (step === 5 && i >= 14 && i <= 16) ||
                    (step === 6 && i >= 18 && i <= 20) ||
                    (step === 7 && i >= 22 && i <= 25)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">💡 复杂声明解析</p>
                    <p className="text-xs text-gray-400">C 语言复杂声明使用右左法则 (Right-Left Rule) 或螺旋法则解析，从标识符开始交替向右向左阅读。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">右左法则步骤</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <ol className="list-decimal list-inside space-y-1">
                        <li>从标识符 (变量名) 开始</li>
                        <li>向右看，遇到()或 [] 就结合</li>
                        <li>向右到头后，向左看，遇到*就结合</li>
                        <li>重复步骤 2-3，直到解析完所有符号</li>
                      </ol>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">例 1：函数指针</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-violet-400">void (*fp)(int);</div>
                      </div>
                      <div className="text-xs space-y-1">
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">①</span>
                          <span>fp 是起点</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">②</span>
                          <span>向左：*fp → fp 是指针</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">③</span>
                          <span>向右：fp(int) → 指向函数，参数 int</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">④</span>
                          <span>向左：void → 函数返回 void</span>
                        </div>
                      </div>
                      <div className="text-green-400 text-center">结果：fp 是指向函数的指针，函数接受 int 返回 void</div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">例 2：返回指针的函数</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-violet-400">int* func(int x);</div>
                      </div>
                      <div className="text-xs space-y-1">
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">①</span>
                          <span>func 是起点</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">②</span>
                          <span>向右：func(int x) → func 是函数，参数 int</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">③</span>
                          <span>向左：*func → 返回指针</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">④</span>
                          <span>向左：int → 返回 int* 指针</span>
                        </div>
                      </div>
                      <div className="text-green-400 text-center">结果：func 是函数，返回 int* 指针</div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">例 3：数组指针</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-violet-400">int (*p)[10];</div>
                      </div>
                      <div className="text-xs space-y-1">
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">①</span>
                          <span>p 是起点</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">②</span>
                          <span>向左：*p → p 是指针</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">③</span>
                          <span>向右：p[10] → 指向含 10 个元素的数组</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">④</span>
                          <span>向左：int → 数组元素是 int</span>
                        </div>
                      </div>
                      <div className="text-green-400 text-center">结果：p 是指针，指向含 10 个 int 的数组</div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">例 4：指针数组</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-violet-400">int *arr[5];</div>
                      </div>
                      <div className="text-xs space-y-1">
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">①</span>
                          <span>arr 是起点</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">②</span>
                          <span>向右：arr[5] → arr 是含 5 个元素的数组</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">③</span>
                          <span>向左：*arr → 数组元素是指针</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">④</span>
                          <span>向左：int → 指针指向 int</span>
                        </div>
                      </div>
                      <div className="text-green-400 text-center">结果：arr 是含 5 个 int* 指针的数组</div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">例 5：超复杂组合</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-violet-400">int (*(*fp)(int))[10];</div>
                      </div>
                      <div className="text-xs space-y-1">
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">①</span>
                          <span>fp 是起点</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">②</span>
                          <span>向左：*fp → fp 是指针</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">③</span>
                          <span>向右：fp(int) → 指向函数，参数 int</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">④</span>
                          <span>向左：*fp(int) → 函数返回指针</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">⑤</span>
                          <span>向右：[10] → 返回的指针指向数组</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-green-400">⑥</span>
                          <span>向左：int → 数组元素是 int</span>
                        </div>
                      </div>
                      <div className="text-green-400 text-center">结果：fp 是指针，指向函数，函数返回指针，指向含 10 个 int 的数组</div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-violet-900/20 rounded-lg border border-violet-500/30">
                      <p className="text-violet-300 text-xs font-medium mb-2">📋 优先级总结</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• 优先级：() [] &gt; * &gt; 类型</li>
                        <li>• 结合性：从内到外，从右到左</li>
                        <li>• 括号改变优先级：(*p)[N] vs *p[N]</li>
                        <li>• 多练习复杂声明，形成直觉</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 从标识符开始，右→左交替阅读
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 3 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 优先级：() [] &gt; * &gt; 类型
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 括号改变结合性
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">在线工具</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-violet-900/20 rounded border border-violet-500/30">
                    <p className="text-violet-300 font-medium">cdecl.org</p>
                    <p className="text-gray-400">将 C 声明翻译成英语</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">练习建议</p>
                    <p className="text-gray-400">从简单开始，逐步增加复杂度</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-violet-600 hover:bg-violet-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-violet-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-violet-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-violet-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-violet-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
