<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>函数指针 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#6366f1 0%,#4f46e5 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#312e81;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#4f46e5;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#e0e7ff,#c7d2fe);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#818cf8;transition:all 0.3s ease}
    .var-card.highlight{border-color:#6366f1;box-shadow:0 0 20px rgba(99,102,241,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#312e81;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .function-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .func-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent;cursor:pointer}
    .func-box.definition{background:linear-gradient(135deg:#e0e7ff,#c7d2fe);border-color:#6366f1}
    .func-box.active{transform:scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,0.2);border-color:#4f46e5;background:linear-gradient(135deg,#6366f1,#4f46e5);color:white}
    .func-box.pending{opacity:0.5}
    .func-name{font-size:14px;font-weight:700;margin-bottom:4px;font-family:'Consolas',monospace}
    .func-signature{font-size:10px;opacity:0.8;font-family:'Consolas',monospace}
    .pointer-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .pointer-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .pointer-row.pending{opacity:0.5}
    .pointer-row.active{background:linear-gradient(135deg,#6366f1,#4f46e5);border:2px solid#818cf8}
    .ptr-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .ptr-value{font-size:14px;font-weight:700;color:#22d3ee;font-family:'Consolas',monospace}
    .call-flow{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .call-step{display:flex;align-items:center;gap:12px;padding:12px;background:white;border-radius:8px;border:2px solid#e5e7eb;transition:all 0.4s ease}
    .call-step.pending{opacity:0.5}
    .call-step.active{background:linear-gradient(135deg,#6366f1,#4f46e5);border-color:#4f46e5;color:white}
    .call-num{width:24px;height:24px;border-radius:50%;background:#e0e7ff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .call-step.active .call-num{background:rgba(255,255,255,0.3)}
    .call-text{flex:1;font-size:12px;font-family:'Consolas',monospace}
    .use-case-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .use-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .use-card.active{border-color:#6366f1;background:linear-gradient(135deg:#e0e7ff,#c7d2fe)}
    .use-icon{font-size:20px;margin-bottom:4px}
    .use-label{font-size:10px;color:#64748b}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#22d3ee;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#22d3ee;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',indigo:'#6366f1'};
    const LINE_MAP = {
      1:{step:1,text:'#include <stdio.h>',color:'#7c3aed'},
      2:{step:2,text:'int add(int a, int b) { return a + b; }',color:'#22c55e'},
      3:{step:2,text:'int sub(int a, int b) { return a - b; }',color:'#ef4444'},
      4:{step:3,text:'int (*func_ptr)(int, int) = add;',color:'#6366f1'},
      5:{step:4,text:'int result = func_ptr(5, 3);',color:'#3b82f6'},
      6:{step:5,text:'printf("%d\\n", result);',color:'#eab308'},
      7:{step:6,text:'return 0;',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，函数指针是指向函数入口地址的指针变量',
      2:'定义 add 和 sub 两个函数，函数名即函数地址',
      3:'声明函数指针 func_ptr，指向接受两个 int 参数返回 int 的函数',
      4:'通过函数指针调用 add 函数，传入 5 和 3，结果 8',
      5:'输出结果 8，函数指针实现回调和动态分发',
      6:'程序结束，函数指针用于回调、函数表、策略模式'
    };
    const functions = [
      {name:'add',sig:'int (int, int)',code:'return a + b'},
      {name:'sub',sig:'int (int, int)',code:'return a - b'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',function:'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeFunc,setActiveFunc] = useState(null);
      const [result,setResult] = useState(null);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 7; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveFunc(null);
          setResult(null);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveFunc('defined');
        } else if(step === 3) {
          setActiveFunc('add');
        } else if(step === 4) {
          setActiveFunc('add');
          setResult(8);
        } else if(step === 5) {
          setTerminalLines(['8']);
        } else if(step === 6) {
          // Complete
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveFunc(null);
        setResult(null);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>函数指针 - C 语言可视化</h1>
            <p>函数地址 | 回调函数 | 动态调用</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.indigo,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                function_pointer.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6,7].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.function} size={22} />
                函数指针可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">int (*func_ptr)(int,int)</span>
                  <span className="var-type">Function Pointer</span>
                </div>
                <div className="function-container">
                  <div className={`func-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#312e81',marginBottom:12}}>函数定义区</div>
                    {functions.map((f, idx) => (
                      <div key={f.name} className={`func-box ${step >= 2 ? 'pending' : ''} ${activeFunc === f.name ? 'active' : ''}`} style={{marginBottom:8}}>
                        <div className="func-name">{f.name}</div>
                        <div className="func-signature">{f.sig} {{ return {f.code}; }}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="pointer-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>函数指针赋值</div>
                  <div className={`pointer-row ${step >= 3 ? 'active' : 'pending'}`}>
                    <span className="ptr-name">func_ptr</span>
                    <span className="ptr-value">&add → 0x{step >= 3 ? '4005a0' : '????'}</span>
                  </div>
                </div>
                <div className="call-flow">
                  {['func_ptr = add','result = func_ptr(5,3)','result = 8'].map((text, idx) => (
                    <div key={idx} className={`call-step ${step >= idx + 3 ? 'active' : 'pending'}`}>
                      <div className="call-num">{idx + 1}</div>
                      <div className="call-text">{text}</div>
                    </div>
                  ))}
                </div>
                <div className="use-case-grid">
                  <div className={`use-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-icon">🔄</div>
                    <div className="use-label">回调函数</div>
                  </div>
                  <div className={`use-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-icon">📋</div>
                    <div className="use-label">函数表</div>
                  </div>
                  <div className={`use-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-icon">🎯</div>
                    <div className="use-label">策略模式</div>
                  </div>
                  <div className={`use-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-icon">⚙️</div>
                    <div className="use-label">动态分发</div>
                  </div>
                </div>
              </div>
              {step >= 5 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.indigo}}>函数指针</strong>
                <p style={{marginTop:8,color:'#78350f'}}>存储函数入口地址</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>声明语法</strong>
                <p style={{marginTop:8,color:'#78350f'}}>返回类型 (* 指针名)(参数)</p>
              </div>
              <div className={`explanation-card ${step >= 3 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>动态调用</strong>
                <p style={{marginTop:8,color:'#78350f'>通过指针间接调用函数</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:#78350f'}}>回调、函数表、策略模式</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
