<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1115 - 数组指针 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #3b82f6; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#3b82f6', primaryLight: '#60a5fa',
      secondary: '#2563eb', secondaryLight: '#60a5fa',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 数组指针 (指向数组的指针) =====
int arr[5] = {1, 2, 3, 4, 5};
int (*p)[5] = &arr;  // p 指向 int[5] 类型的数组

// 访问
printf("%d\\n", (*p)[0]);    // 1
printf("%d\\n", (*p)[2]);    // 3

// ===== 二维数组 =====
int matrix[3][4] = {0};
int (*row)[4] = matrix;  // row 指向含 4 个 int 的数组

for(int i = 0; i < 3; i++) {
  for(int j = 0; j < 4; j++) {
    printf("%d ", row[i][j]);  // 访问 matrix[i][j]
  }
}

// ===== vs 指针数组 =====
int *p1[5];  // 指针数组：5 个 int* 指针
int (*p2)[5];  // 数组指针：指向 int[5] 的指针`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十五题，数组指针。",
      2: "数组指针是指向数组的指针，声明为 int (*p)[N]，p 指向含 N 个 int 的数组。",
      3: "p 指向 arr 整个数组，(*p)[0] 解引用后访问数组的第一个元素。",
      4: "数组指针的步长是整个数组的大小，p+1 跳过整个数组。",
      5: "二维数组名本身就是数组指针，matrix 指向第一行 (含 4 个 int 的数组)。",
      6: "row[i][j] 等价于 matrix[i][j]，数组指针支持二维数组遍历。",
      7: "对比：int *p1[5] 是指针数组 (5 个指针)，int (*p2)[5] 是数组指针 (1 个指针)。",
      8: "记忆：括号改变优先级，(*p)[N] 中 p 先与*结合成指针，再指向数组。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-blue-900/50 via-indigo-900/50 to-cyan-900/50 rounded-xl p-6 mb-4 border border-blue-700/50">
            <h1 className="text-3xl font-bold text-blue-400 mb-2">1115 - 数组指针</h1>
            <p className="text-blue-300 text-sm">指向数组的指针 / 二维数组遍历 / 步长计算</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-blue-700/30">
              <h2 className="text-lg font-semibold text-blue-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 2 && i <= 2) ||
                    (step === 3 && i >= 5 && i <= 6) ||
                    (step === 4 && i >= 2 && i <= 2) ||
                    (step === 5 && i >= 10 && i <= 10) ||
                    (step === 6 && i >= 12 && i <= 16) ||
                    (step === 7 && i >= 19 && i <= 20)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-blue-700/30">
              <h2 className="text-lg font-semibold text-blue-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-indigo-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">💡 数组指针</p>
                    <p className="text-xs text-gray-400">数组指针是指向数组的指针，用于遍历多维数组或传递固定大小的数组给函数。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-indigo-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">数组指针声明</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>int arr[5] = {'{'}1,2,3,4,5{'}'};</div>
                        <div className="text-blue-400">int (*p)[5] = &arr;</div>
                      </div>
                      <div className="text-blue-400 text-center">p 是指针，指向含 5 个 int 的数组</div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-indigo-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">访问方式</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>(*p)[0]  // 解引用 p，取第 0 个元素 = 1</div>
                        <div>(*p)[1]  // = 2</div>
                        <div>(*p)[2]  // = 3</div>
                      </div>
                      <div className="text-green-400 text-center">(*p) 得到整个数组，再以下标访问</div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-indigo-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">指针步长</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-2">
                        <div className="w-24 text-right text-gray-400">p + 0</div>
                        <div className="flex-1 p-2 bg-blue-900/30 rounded text-xs">
                          &arr[0] (跳过 0 个数组)
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-24 text-right text-blue-400">p + 1</div>
                        <div className="flex-1 p-2 bg-blue-900/50 rounded text-xs">
                          &arr[0] + 20 字节 (跳过 1 个数组)
                        </div>
                      </div>
                      <div className="text-gray-500 text-xs text-center">
                        步长 = sizeof(int[5]) = 5 × 4 = 20 字节
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-indigo-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">二维数组应用</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>int matrix[3][4];  // 3 行 4 列</div>
                        <div className="text-blue-400">int (*row)[4] = matrix;</div>
                      </div>
                      <div className="text-gray-500 text-xs">
                        matrix  decay 为指向第一行的指针<br/>
                        row 的类型：指向含 4 个 int 的数组的指针
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-indigo-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">遍历二维数组</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>for(int i = 0; i < 3; i++) {'{'}</div>
                        <div>&nbsp;&nbsp;for(int j = 0; j < 4; j++) {'{'}</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;row[i][j];  // = matrix[i][j]</div>
                        <div>&nbsp;&nbsp;{'}'}</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-green-400 text-center">row[i] 跳过 i 行，row[i][j] 取第 j 列</div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-indigo-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">⚠️ 对比指针数组</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                          <div className="text-blue-400 font-mono text-xs">int *p1[5];</div>
                          <div className="text-gray-400 text-xs mt-1">指针数组</div>
                          <div className="text-gray-500 text-xs">5 个 int* 指针</div>
                        </div>
                        <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30">
                          <div className="text-indigo-400 font-mono text-xs">int (*p2)[5];</div>
                          <div className="text-gray-400 text-xs mt-1">数组指针</div>
                          <div className="text-gray-500 text-xs">指向 int[5] 的指针</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-blue-900/20 rounded-lg border border-blue-500/30">
                      <p className="text-blue-300 text-xs font-medium mb-2">📋 总结</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• 数组指针：int (*p)[N]，指向含 N 个元素的数组</li>
                        <li>• 步长：p+1 跳过 N×sizeof(T) 字节</li>
                        <li>• 应用：二维数组遍历、函数参数传递</li>
                        <li>• 优先级：[] > *，括号改变结合性</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-blue-700/30">
                <h2 className="text-lg font-semibold text-blue-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-blue-900/30 text-blue-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 数组指针：指向整个数组，不是首元素
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-blue-900/30 text-blue-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 步长 = 数组大小 (N×sizeof(T))
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 5 ? 'bg-blue-900/30 text-blue-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 二维数组遍历的经典模式
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-blue-700/30">
                <h2 className="text-lg font-semibold text-blue-400 mb-3">函数参数应用</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <pre className="text-gray-300 font-mono text-xs">
{`void process(int (*arr)[4], int rows) {
  for(int i = 0; i < rows; i++) {
    for(int j = 0; j < 4; j++) {
      arr[i][j] *= 2;
    }
  }
}

// 调用
int matrix[3][4];
process(matrix, 3);`}
                    </pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-blue-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-blue-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-blue-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-blue-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-blue-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
