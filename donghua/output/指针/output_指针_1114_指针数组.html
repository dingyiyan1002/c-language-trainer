<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1114 - 指针数组 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(34, 197, 94, 0.2); border-left: 3px solid #22c55e; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#22c55e', primaryLight: '#4ade80',
      secondary: '#16a34a', secondaryLight: '#4ade80',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 指针数组 =====
char *fruits[] = {
  "apple",   // fruits[0] → "apple"
  "banana",  // fruits[1] → "banana"
  "orange"   // fruits[2] → "orange"
};

// 访问
printf("%s\\n", fruits[0]);     // "apple"
printf("%c\\n", fruits[1][0]);  // 'b'

// ===== 应用：命令行参数 =====
int main(int argc, char *argv[]) {
  for(int i = 0; i < argc; i++) {
    printf("arg[%d] = %s\\n", i, argv[i]);
  }
}

// ===== vs 数组指针 =====
int (*p1)[5];  // 数组指针：指向 int[5] 的指针
int *p2[5];    // 指针数组：5 个 int* 指针`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十四题，指针数组。",
      2: "指针数组是数组，每个元素都是指针，可以指向不同的数据。",
      3: "fruits 数组有 3 个元素，每个都是 char* 指针，指向字符串。",
      4: "fruits[0] 指向"apple"，fruits[1][0] 取出"banana"的首字母'b'。",
      5: "典型应用：命令行参数 argv 就是指针数组，argc 是参数个数。",
      6: "main 函数的 argc 和 argv 是指针数组的标准用法。",
      7: "区分：int (*p1)[5] 是数组指针 (指向数组的指针)，int *p2[5] 是指针数组 (指针的数组)。",
      8: "记忆口诀：[] 优先级高于*，所以 p2[5] 先结合成数组，再乘以指针。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-green-900/50 via-emerald-900/50 to-teal-900/50 rounded-xl p-6 mb-4 border border-green-700/50">
            <h1 className="text-3xl font-bold text-green-400 mb-2">1114 - 指针数组</h1>
            <p className="text-green-300 text-sm">指针的数组 / 字符串数组 / argv 参数</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
              <h2 className="text-lg font-semibold text-green-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 2 && i <= 6) ||
                    (step === 3 && i >= 2 && i <= 6) ||
                    (step === 4 && i >= 9 && i <= 10) ||
                    (step === 5 && i >= 13 && i <= 17) ||
                    (step === 6 && i >= 14 && i <= 16) ||
                    (step === 7 && i >= 20 && i <= 21)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
              <h2 className="text-lg font-semibold text-green-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">💡 指针数组</p>
                    <p className="text-xs text-gray-400">指针数组是数组，每个元素都是指针。典型应用是字符串数组和命令行参数。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">指针数组定义</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>char *fruits[] = {'{'}</div>
                        <div>&nbsp;&nbsp;"apple",</div>
                        <div>&nbsp;&nbsp;"banana",</div>
                        <div>&nbsp;&nbsp;"orange"</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="text-green-400 text-center">3 个指针，每个指向字符串字面量</div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">内存布局</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-2">
                        <div className="w-20 text-right text-green-400">fruits[0]</div>
                        <div className="flex-1 p-2 bg-green-900/30 rounded">
                          <div className="text-xs">→ "apple" \0</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-20 text-right text-green-400">fruits[1]</div>
                        <div className="flex-1 p-2 bg-green-900/30 rounded">
                          <div className="text-xs">→ "banana" \0</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-20 text-right text-green-400">fruits[2]</div>
                        <div className="flex-1 p-2 bg-green-900/30 rounded">
                          <div className="text-xs">→ "orange" \0</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">访问方式</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>fruits[0]      // "apple" (整个字符串)</div>
                        <div>fruits[1]      // "banana"</div>
                        <div>fruits[1][0]   // 'b' (首字符)</div>
                        <div>fruits[2][1]   // 'r'</div>
                      </div>
                      <div className="text-blue-400">双重解引用：数组 + 字符串</div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-cyan-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">命令行参数</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>int main(int argc, char *argv[])</div>
                      </div>
                      <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                        <div className="text-gray-500">// 运行：./prog hello world</div>
                        <div>argc = 3</div>
                        <div>argv[0] = "./prog"</div>
                        <div>argv[1] = "hello"</div>
                        <div>argv[2] = "world"</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-cyan-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">遍历参数</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>for(int i = 0; i &lt; argc; i++) {'{'}</div>
                        <div>&nbsp;&nbsp;printf("arg[%d] = %s\\n",</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;i, argv[i]);</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-green-400">输出所有命令行参数</div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">⚠️ 优先级陷阱</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 font-mono text-xs">int (*p1)[5];</div>
                          <div className="text-gray-400 text-xs mt-1">数组指针</div>
                          <div className="text-gray-500 text-xs">指向 int[5] 的指针</div>
                        </div>
                        <div className="p-2 bg-emerald-900/20 rounded border border-emerald-500/30">
                          <div className="text-emerald-400 font-mono text-xs">int *p2[5];</div>
                          <div className="text-gray-400 text-xs mt-1">指针数组</div>
                          <div className="text-gray-500 text-xs">5 个 int* 指针</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-green-900/20 rounded-lg border border-green-500/30">
                      <p className="text-green-300 text-xs font-medium mb-2">📋 记忆技巧</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• [] 优先级高于*，所以*p[5] 先结合成数组</li>
                        <li>• 带括号 (*p)[5] 是指向数组的指针</li>
                        <li>• 无括号 *p[5] 是指针的数组</li>
                        <li>• 口诀：有括号是指针，无括号是数组</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
                <h2 className="text-lg font-semibold text-green-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-green-900/30 text-green-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 指针数组：数组的每个元素都是指针
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 5 ? 'bg-green-900/30 text-green-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 典型应用：字符串数组、argv 参数
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-green-900/30 text-green-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 区分：int (*p)[N] vs int *p[N]
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
                <h2 className="text-lg font-semibold text-green-400 mb-3">应用示例</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">字符串表</p>
                    <p className="text-gray-400">错误消息、菜单选项</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">命令行参数</p>
                    <p className="text-gray-400">int main(int argc, char *argv[])</p>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">函数指针数组</p>
                    <p className="text-gray-400">跳转表、状态机</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-green-600 hover:bg-green-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-green-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-green-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-green-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-green-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
