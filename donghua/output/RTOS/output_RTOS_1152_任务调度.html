    const CODE = `// ===== RTOS 任务调度 (Real-Time OS Scheduling) =====
// 基于优先级的抢占式调度

// 1. 任务控制块 (TCB)
typedef struct {
  uint32_t *stack_ptr;      // 任务栈顶指针
  uint32_t *stack_start;    // 栈起始地址
  uint32_t stack_size;      // 栈大小
  uint8_t  priority;        // 优先级 (0=最高)
  uint8_t  state;           // 任务状态
  char     name[32];        // 任务名称
  uint32_t delay_ticks;     // 延时 ticks
} TCB_t;

// 2. 任务状态
typedef enum {
  TASK_READY,               // 就绪态
  TASK_RUNNING,             // 运行态
  TASK_BLOCKED,             // 阻塞态 (等待事件)
  TASK_DELAYED,             // 延时态
  TASK_SUSPENDED            // 挂起态
} TaskState_t;

// 3. 创建任务
void task_create(void (*entry)(void*), void* arg,
                 uint8_t priority, uint32_t stack_size) {
  TCB_t *tcb = malloc(sizeof(TCB_t));
  tcb->stack_ptr = (uint32_t*)((uint8_t*)stack_start + stack_size);
  tcb->stack_start = stack_start;
  tcb->stack_size = stack_size;
  tcb->priority = priority;
  tcb->state = TASK_READY;

  // 初始化栈帧 (模拟中断返回)
  tcb->stack_ptr -= 16;     // 预留空间
  tcb->stack_ptr[0] = (uint32_t)entry;  // PC
  tcb->stack_ptr[1] = (uint32_t)arg;    // R0

  // 添加到就绪链表
  list_add(&ready_list, tcb);
}

// 4. 调度器 (选择最高优先级就绪任务)
TCB_t* scheduler(void) {
  TCB_t *highest = NULL;
  uint8_t highest_prio = 255;

  // 遍历就绪链表
  for (TCB_t *t = ready_list.head; t; t = t->next) {
    if (t->state == TASK_READY && t->priority < highest_prio) {
      highest = t;
      highest_prio = t->priority;
    }
  }

  return highest;  // 返回最高优先级任务
}

// 5. 任务切换 (Context Switch)
void task_switch(TCB_t *from, TCB_t *to) {
  if (from == to) return;

  // 保存当前上下文
  from->stack_ptr = save_context(from->stack_ptr);

  // 恢复新任务上下文
  restore_context(to->stack_ptr);

  // 更新当前运行任务
  current_task = to;
  to->state = TASK_RUNNING;
}

// 6. 阻塞当前任务 (等待信号量)
void task_block_on_semaphore(Semaphore_t *sem) {
  __disable_irq();
  current_task->state = TASK_BLOCKED;
  list_add(&sem->wait_queue, current_task);
  __enable_irq();

  // 触发调度
  yield();
}

// 7. 系统滴答定时器中断 (SysTick)
void SysTick_Handler(void) {
  system_ticks++;

  // 检查延时任务
  for (TCB_t *t = delayed_list.head; t; t = t->next) {
    if (t->delay_ticks > 0) {
      t->delay_ticks--;
      if (t->delay_ticks == 0) {
        t->state = TASK_READY;  // 延时到期，进入就绪
      }
    }
  }

  // 触发调度器
  if (current_task->state != TASK_RUNNING) {
    yield();
  }
}`;

                <span className="text-green-300 text-sm">delay_ticks-- (到期置为 READY)</span>
              </div>
              <div className="flex items-center gap-3 p-3 bg-green-900/30 rounded border border-green-500">
                <span className="text-green-400">✓</span>
                <span className="text-green-300 text-sm">触发调度器</span>
              </div>
            </div>
          )}
          {step >= 7 && (
            <div className="mt-4 p-4 bg-gradient-to-r from-green-900/50 to-blue-900/50 rounded-lg border-2 border-green-500">
              <div className="text-center text-green-300 font-bold">
                ⏱️ SysTick 是 RTOS 的心脏
              </div>
            </div>
          )}
        </div>
      );
    }

    function Visualization({ step, visualization }) {
      switch(visualization) {
        case 'overview': return <Overview step={step} />;
        case 'tcb': return <TCBStructure step={step} />;
        case 'state': return <StateMachine step={step} />;
        case 'create': return <CreateTask step={step} />;
        case 'schedule': return <Scheduler step={step} />;
        case 'switch': return <ContextSwitch step={step} />;
        case 'block': return <BlockTask step={step} />;
        case 'systick': return <SysTick step={step} />;
        default: return null;
      }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showCode, setShowCode] = useState(true);
      const voiceEndTimerRef = useRef(null);
      const stepRef = useRef(0);

      const speak = useCallback((text) => {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v =>
          v.lang === 'zh-CN' ||
          v.lang === 'zh-CN-XiaoxiaoNeural' ||
          v.name.includes('Xiaoxiao') ||
          v.name.includes('Chinese')
        );
        if (zhVoice) utterance.voice = zhVoice;

        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        utterance.onerror = (event) => {
          console.warn('Speech synthesis error:', event.error);
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        window.speechSynthesis.speak(utterance);
      }, [isPaused, isPlaying]);

      useEffect(() => {
        stepRef.current = currentStep;
      }, [currentStep]);

      useEffect(() => {
        const loadVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };

        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const step = STEPS[currentStep];
        if (step && isPlaying) {
          speak(step.title + "。" + step.explanation);
        }
        return () => {
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        };
      }, [currentStep, isPlaying, speak]);

      const handleStepClick = (index) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(index);
        stepRef.current = index;
      };

      const togglePlay = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPlaying(!isPlaying);
        if (!isPlaying && currentStep < STEPS.length - 1) {
          setTimeout(() => setCurrentStep(prev => prev + 1), 100);
        }
      };

      const togglePause = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPaused(!isPaused);
      };

      const reset = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(0);
        stepRef.current = 0;
        setIsPaused(false);
        setIsPlaying(true);
      };

      const nextStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => {
            stepRef.current = prev + 1;
            return prev + 1;
          });
        }
      };

      const prevStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep > 0) {
          setCurrentStep(prev => {
            stepRef.current = prev - 1;
            return prev - 1;
          });
        }
      };

      const currentStepData = STEPS[currentStep];

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="mb-4 text-center">
            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
              1152 - RTOS 任务调度
            </h1>
            <p className="text-gray-400">Embedded C Animation · 共 {STEPS.length} 步</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {showCode && (
              <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4 overflow-auto" style={{ maxHeight: '70vh' }}>
                <pre className="text-xs font-mono leading-relaxed">
                  {CODE.split('\n').map((line, i) => (
                    <div
                      key={i}
                      className={`code-line px-2 py-1 rounded ${
                        currentStepData?.codeHighlight?.includes(i + 1) ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-500 select-none w-8 inline-block">{i + 1}</span>
                      <span className={currentStepData?.codeHighlight?.includes(i + 1) ? 'text-white' : 'text-gray-300'}>
                        {line}
                      </span>
                    </div>
                  ))}
                </pre>
              </div>
            )}

            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4" style={{ maxHeight: '70vh', overflow: 'auto' }}>
              <h3 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.primary }}>
                {currentStepData?.title}
              </h3>
              <Visualization step={currentStep} visualization={currentStepData?.visualization} />
            </div>

            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gray-800 rounded-lg p-4">
                <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.primaryLight }}>
                  说明
                </h3>
                <p className="text-gray-300 leading-relaxed">
                  {currentStepData?.explanation}
                </p>
              </div>

              <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex flex-wrap gap-2">
                  {STEPS.map((step, index) => (
                    <button
                      key={index}
                      onClick={() => handleStepClick(index)}
                      className={`px-3 py-2 rounded text-xs font-bold transition-all duration-300 ${
                        index === currentStep
                          ? 'bg-green-600 text-white scale-105'
                          : index < currentStep
                          ? 'bg-green-900/50 text-green-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}
                    >
                      {index + 1}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="mt-6 flex justify-center gap-4">
            <button onClick={reset} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors">
              🔄 重置
            </button>
            <button onClick={prevStep} disabled={currentStep === 0} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              ⏮️ 上一步
            </button>
            <button onClick={togglePlay} className={`px-6 py-3 rounded-lg font-bold transition-colors ${isPlaying ? 'bg-green-600 hover:bg-green-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <button onClick={togglePause} disabled={!isPlaying} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              {isPaused ? '▶️ 继续' : '⏯️ 挂起'}
            </button>
            <button onClick={nextStep} disabled={currentStep === STEPS.length - 1} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              下一步 ⏭️
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
