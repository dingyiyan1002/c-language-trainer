// RTOS 同步与互斥原语

// 1. 信号量结构
typedef struct {
  uint32_t count;           // 信号量计数值
  uint32_t max_count;       // 最大计数值 (计数信号量)
  List_t wait_queue;        // 等待队列
} Semaphore_t;

// 2. 互斥量结构 (带优先级继承)
typedef struct {
  uint32_t owned;           // 是否被占用 (0/1)
  TCB_t *owner;             // 持有者 TCB
  uint8_t  original_prio;   // 所有者原始优先级
  uint8_t  current_prio;    // 当前优先级 (可能已提升)
  List_t wait_queue;        // 等待队列
} Mutex_t;

// 3. 创建信号量
Semaphore_t* sem_create(uint32_t initial, uint32_t max) {
  Semaphore_t *sem = malloc(sizeof(Semaphore_t));
  sem->count = initial;       // 初始计数
  sem->max_count = max;       // 最大计数
  list_init(&sem->wait_queue);
  return sem;
}

// 4. 获取信号量 (P 操作 / wait)
void sem_wait(Semaphore_t *sem, uint32_t timeout) {
  __disable_irq();

  if (sem->count > 0) {
    sem->count--;             // 有资源，直接获取
    __enable_irq();
  } else {
    // 无资源，阻塞当前任务
    current_task->state = TASK_BLOCKED;
    list_add(&sem->wait_queue, current_task);
    __enable_irq();
    schedule();               // 触发调度
  }
}

// 5. 释放信号量 (V 操作 / post)
void sem_post(Semaphore_t *sem) {
  __disable_irq();

  if (!list_empty(&sem->wait_queue)) {
    // 有任务在等待，唤醒最高优先级
    TCB_t *t = queue_remove_head(&sem->wait_queue);
    t->state = TASK_READY;
  } else {
    if (sem->count < sem->max_count) {
      sem->count++;           // 增加资源计数
    }
  }

  __enable_irq();
}

// 6. 互斥锁获取 (带优先级继承)
void mutex_lock(Mutex_t *mtx) {
  __disable_irq();

  if (!mtx->owned) {
    // 无人占用，直接获取
    mtx->owned = 1;
    mtx->owner = current_task;
    mtx->original_prio = current_task->priority;
    __enable_irq();
  } else {
    // 被占用，检查优先级继承
    if (current_task->priority < mtx->owner->priority) {
      // 当前任务优先级更高，提升所有者优先级
      mtx->owner->priority = current_task->priority;
    }
    // 阻塞当前任务
    current_task->state = TASK_BLOCKED;
    list_add(&mtx->wait_queue, current_task);
    __enable_irq();
    schedule();
  }
}

// 7. 互斥锁释放
void mutex_unlock(Mutex_t *mtx) {
  __disable_irq();

  mtx->owned = 0;
  // 恢复原始优先级
  mtx->owner->priority = mtx->original_prio;

  if (!list_empty(&mtx->wait_queue)) {
    TCB_t *t = queue_remove_head(&mtx->wait_queue);
    t->state = TASK_READY;
    mtx->owner = t;
    mtx->owned = 1;
  }

  __enable_irq();
  schedule();
}`;

              <span className="text-2xl">⬇️</span>
              <div>
                <div className="text-blue-300 font-bold text-sm">恢复原始优先级</div>
                <div className="text-gray-400 text-xs font-mono">owner-&gt;prio = original_prio</div>
              </div>
            </div>
          </div>
          <div className="p-4 bg-purple-900/30 rounded-lg border border-purple-500">
            <div className="flex items-center gap-3">
              <span className="text-2xl">📬</span>
              <div>
                <div className="text-purple-300 font-bold text-sm">唤醒等待者</div>
                <div className="text-gray-400 text-xs font-mono">移除队列头 → READY</div>
              </div>
            </div>
          </div>
          <div className="p-4 bg-yellow-900/30 rounded-lg border border-yellow-500">
            <div className="flex items-center gap-3">
              <span className="text-2xl">🔄</span>
              <div>
                <div className="text-yellow-300 font-bold text-sm">触发调度</div>
                <div className="text-gray-400 text-xs font-mono">schedule()</div>
              </div>
            </div>
          </div>
          {step >= 7 && (
            <div className="mt-4 p-4 bg-gradient-to-r from-green-900/50 to-blue-900/50 rounded-lg border-2 border-green-500 text-center">
              <div className="text-green-300 font-bold">✅ 互斥锁释放完成</div>
            </div>
          )}
        </div>
      );
    }

    function Visualization({ step, visualization }) {
      switch(visualization) {
        case 'overview': return <Overview step={step} />;
        case 'semaphore': return <SemaphoreStruct step={step} />;
        case 'mutex': return <MutexStruct step={step} />;
        case 'create': return <CreateSemaphore step={step} />;
        case 'wait': return <SemWait step={step} />;
        case 'post': return <SemPost step={step} />;
        case 'lock': return <MutexLock step={step} />;
        case 'unlock': return <MutexUnlock step={step} />;
        default: return null;
      }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showCode, setShowCode] = useState(true);
      const voiceEndTimerRef = useRef(null);
      const stepRef = useRef(0);

      const speak = useCallback((text) => {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v =>
          v.lang === 'zh-CN' ||
          v.lang === 'zh-CN-XiaoxiaoNeural' ||
          v.name.includes('Xiaoxiao') ||
          v.name.includes('Chinese')
        );
        if (zhVoice) utterance.voice = zhVoice;

        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        utterance.onerror = (event) => {
          console.warn('Speech synthesis error:', event.error);
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        window.speechSynthesis.speak(utterance);
      }, [isPaused, isPlaying]);

      useEffect(() => {
        stepRef.current = currentStep;
      }, [currentStep]);

      useEffect(() => {
        const loadVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };

        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const step = STEPS[currentStep];
        if (step && isPlaying) {
          speak(step.title + "。" + step.explanation);
        }
        return () => {
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        };
      }, [currentStep, isPlaying, speak]);

      const handleStepClick = (index) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(index);
        stepRef.current = index;
      };

      const togglePlay = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPlaying(!isPlaying);
        if (!isPlaying && currentStep < STEPS.length - 1) {
          setTimeout(() => setCurrentStep(prev => prev + 1), 100);
        }
      };

      const togglePause = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPaused(!isPaused);
      };

      const reset = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(0);
        stepRef.current = 0;
        setIsPaused(false);
        setIsPlaying(true);
      };

      const nextStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => {
            stepRef.current = prev + 1;
            return prev + 1;
          });
        }
      };

      const prevStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep > 0) {
          setCurrentStep(prev => {
            stepRef.current = prev - 1;
            return prev - 1;
          });
        }
      };

      const currentStepData = STEPS[currentStep];

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="mb-4 text-center">
            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
              1153 - 信号量与互斥锁
            </h1>
            <p className="text-gray-400">Embedded C Animation · 共 {STEPS.length} 步</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {showCode && (
              <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4 overflow-auto" style={{ maxHeight: '70vh' }}>
                <pre className="text-xs font-mono leading-relaxed">
                  {CODE.split('\n').map((line, i) => (
                    <div
                      key={i}
                      className={`code-line px-2 py-1 rounded ${
                        currentStepData?.codeHighlight?.includes(i + 1) ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-500 select-none w-8 inline-block">{i + 1}</span>
                      <span className={currentStepData?.codeHighlight?.includes(i + 1) ? 'text-white' : 'text-gray-300'}>
                        {line}
                      </span>
                    </div>
                  ))}
                </pre>
              </div>
            )}

            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4" style={{ maxHeight: '70vh', overflow: 'auto' }}>
              <h3 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.primary }}>
                {currentStepData?.title}
              </h3>
              <Visualization step={currentStep} visualization={currentStepData?.visualization} />
            </div>

            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gray-800 rounded-lg p-4">
                <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.primaryLight }}>
                  说明
                </h3>
                <p className="text-gray-300 leading-relaxed">
                  {currentStepData?.explanation}
                </p>
              </div>

              <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex flex-wrap gap-2">
                  {STEPS.map((step, index) => (
                    <button
                      key={index}
                      onClick={() => handleStepClick(index)}
                      className={`px-3 py-2 rounded text-xs font-bold transition-all duration-300 ${
                        index === currentStep
                          ? 'bg-yellow-600 text-white scale-105'
                          : index < currentStep
                          ? 'bg-yellow-900/50 text-yellow-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}
                    >
                      {index + 1}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="mt-6 flex justify-center gap-4">
            <button onClick={reset} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors">
              🔄 重置
            </button>
            <button onClick={prevStep} disabled={currentStep === 0} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              ⏮️ 上一步
            </button>
            <button onClick={togglePlay} className={`px-6 py-3 rounded-lg font-bold transition-colors ${isPlaying ? 'bg-yellow-600 hover:bg-yellow-700' : 'bg-green-600 hover:bg-green-700'}`}>
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <button onClick={togglePause} disabled={!isPlaying} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              {isPaused ? '▶️ 继续' : '⏯️ 挂起'}
            </button>
            <button onClick={nextStep} disabled={currentStep === STEPS.length - 1} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              下一步 ⏭️
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
