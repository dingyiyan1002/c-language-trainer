    const CODE = `// ===== RTOS 消息队列 (Message Queue) =====
// 任务间通信 (IPC) 机制

// 1. 消息队列结构
typedef struct {
  void **buffer;            // 环形缓冲区指针
  uint32_t size;            // 队列容量 (消息数量)
  uint32_t item_size;       // 每条消息大小 (字节)
  uint32_t head;            // 队头 (出队位置)
  uint32_t tail;            // 队尾 (入队位置)
  uint32_t count;           // 当前消息数
  List_t send_waiters;      // 发送等待队列 (队满)
  List_t recv_waiters;      // 接收等待队列 (队空)
} Queue_t;

// 2. 创建消息队列
Queue_t* queue_create(uint32_t size, uint32_t item_size) {
  Queue_t *q = malloc(sizeof(Queue_t));
  q->buffer = malloc(size * item_size);
  q->size = size;
  q->item_size = item_size;
  q->head = 0;
  q->tail = 0;
  q->count = 0;
  list_init(&q->send_waiters);
  list_init(&q->recv_waiters);
  return q;
}

// 3. 发送消息 (队尾入队)
int queue_send(Queue_t *q, void *msg, uint32_t timeout) {
  __disable_irq();

  if (q->count >= q->size) {
    // 队满，阻塞发送者
    if (timeout > 0) {
      current_task->state = TASK_BLOCKED;
      list_add(&q->send_waiters, current_task);
      __enable_irq();
      schedule();
    } else {
      __enable_irq();
      return -1;  // 非阻塞，返回失败
    }
  }

  // 复制消息到队尾
  memcpy(&q->buffer[q->tail * q->item_size], msg, q->item_size);
  q->tail = (q->tail + 1) % q->size;
  q->count++;

  // 唤醒等待的接收者
  if (!list_empty(&q->recv_waiters)) {
    TCB_t *t = list_remove_head(&q->recv_waiters);
    t->state = TASK_READY;
  }

  __enable_irq();
  return 0;
}

// 4. 接收消息 (队头出队)
int queue_recv(Queue_t *q, void *buf, uint32_t timeout) {
  __disable_irq();

  if (q->count == 0) {
    // 队空，阻塞接收者
    if (timeout > 0) {
      current_task->state = TASK_BLOCKED;
      list_add(&q->recv_waiters, current_task);
      __enable_irq();
      schedule();
    } else {
      __enable_irq();
      return -1;  // 非阻塞，返回失败
    }
  }

  // 从队头复制消息
  memcpy(buf, &q->buffer[q->head * q->item_size], q->item_size);
  q->head = (q->head + 1) % q->size;
  q->count--;

  // 唤醒等待的发送者
  if (!list_empty(&q->send_waiters)) {
    TCB_t *t = list_remove_head(&q->send_waiters);
    t->state = TASK_READY;
  }

  __enable_irq();
  return 0;
}

// 5. 从中断发送消息 (ISR 版本)
void queue_send_from_isr(Queue_t *q, void *msg) {
  if (q->count >= q->size) {
    return;  // 队满，直接返回
  }

  memcpy(&q->buffer[q->tail * q->item_size], msg, q->item_size);
  q->tail = (q->tail + 1) % q->size;
  q->count++;

  // 如果有接收者在等待，唤醒它
  if (!list_empty(&q->recv_waiters)) {
    TCB_t *t = list_remove_head(&q->recv_waiters);
    t->state = TASK_READY;
    // 触发上下文切换 (PendSV)
    pend_sv_trigger();
  }
}`;

            </div>
          </div>
          <div className="p-4 bg-blue-900/30 rounded-lg border border-blue-500">
            <div className="flex items-center gap-3">
              <span className="text-2xl">📬</span>
              <div>
                <div className="text-blue-300 font-bold text-sm">唤醒等待的接收者</div>
                <div className="text-gray-400 text-xs">触发 PendSV 切换</div>
              </div>
            </div>
          </div>
          {step >= 6 && (
            <div className="mt-4 p-4 bg-gradient-to-r from-red-900/50 to-green-900/50 rounded-lg border-2 border-red-500">
              <div className="text-center text-red-300 font-bold">
                ⚡ ISR 发送：非阻塞，队满即丢
              </div>
            </div>
          )}
        </div>
      );
    }

    function Applications({ step }) {
      const apps = [
        { icon: "📡", name: "UART 接收", desc: "ISR 收集数据 → 任务处理", active: step >= 7 },
        { icon: "📊", name: "传感器采集", desc: "定时读取 → 队列缓冲 → 处理任务", active: step >= 7 },
        { icon: "🎛️", name: "命令分发", desc: "CLI 解析 → 队列 → 执行任务", active: step >= 7 },
        { icon: "🔔", name: "事件通知", desc: "中断/任务 → 事件队列 → 响应", active: step >= 7 },
      ];

      return (
        <div className="space-y-3">
          {apps.map((a, i) => (
            <div
              key={i}
              className={`flex items-center gap-4 p-4 rounded-lg transition-all duration-300 ${
                a.active ? 'bg-blue-900/50 border border-blue-500' : 'bg-gray-800'
              }`}
            >
              <span className="text-3xl">{a.icon}</span>
              <div className="flex-1">
                <div className="font-bold text-blue-300">{a.name}</div>
                <div className="text-xs text-gray-400">{a.desc}</div>
              </div>
            </div>
          ))}
          {step >= 7 && (
            <div className="mt-4 p-4 bg-gradient-to-r from-blue-900/50 to-green-900/50 rounded-lg border-2 border-blue-500 text-center">
              <div className="text-blue-300 font-bold">
                🎯 消息队列 = 最常用的 IPC 机制
              </div>
            </div>
          )}
        </div>
      );
    }

    function Visualization({ step, visualization }) {
      switch(visualization) {
        case 'overview': return <Overview step={step} />;
        case 'structure': return <QueueStructure step={step} />;
        case 'create': return <CreateQueue step={step} />;
        case 'send': return <SendMessage step={step} />;
        case 'receive': return <ReceiveMessage step={step} />;
        case 'ring': return <RingBuffer step={step} />;
        case 'isr': return <ISRSend step={step} />;
        case 'apps': return <Applications step={step} />;
        default: return null;
      }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showCode, setShowCode] = useState(true);
      const voiceEndTimerRef = useRef(null);
      const stepRef = useRef(0);

      const speak = useCallback((text) => {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v =>
          v.lang === 'zh-CN' ||
          v.lang === 'zh-CN-XiaoxiaoNeural' ||
          v.name.includes('Xiaoxiao') ||
          v.name.includes('Chinese')
        );
        if (zhVoice) utterance.voice = zhVoice;

        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        utterance.onerror = (event) => {
          console.warn('Speech synthesis error:', event.error);
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        window.speechSynthesis.speak(utterance);
      }, [isPaused, isPlaying]);

      useEffect(() => {
        stepRef.current = currentStep;
      }, [currentStep]);

      useEffect(() => {
        const loadVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };

        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const step = STEPS[currentStep];
        if (step && isPlaying) {
          speak(step.title + "。" + step.explanation);
        }
        return () => {
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        };
      }, [currentStep, isPlaying, speak]);

      const handleStepClick = (index) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(index);
        stepRef.current = index;
      };

      const togglePlay = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPlaying(!isPlaying);
        if (!isPlaying && currentStep < STEPS.length - 1) {
          setTimeout(() => setCurrentStep(prev => prev + 1), 100);
        }
      };

      const togglePause = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPaused(!isPaused);
      };

      const reset = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(0);
        stepRef.current = 0;
        setIsPaused(false);
        setIsPlaying(true);
      };

      const nextStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => {
            stepRef.current = prev + 1;
            return prev + 1;
          });
        }
      };

      const prevStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep > 0) {
          setCurrentStep(prev => {
            stepRef.current = prev - 1;
            return prev - 1;
          });
        }
      };

      const currentStepData = STEPS[currentStep];

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="mb-4 text-center">
            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
              1154 - RTOS 消息队列
            </h1>
            <p className="text-gray-400">Embedded C Animation · 共 {STEPS.length} 步</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {showCode && (
              <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4 overflow-auto" style={{ maxHeight: '70vh' }}>
                <pre className="text-xs font-mono leading-relaxed">
                  {CODE.split('\n').map((line, i) => (
                    <div
                      key={i}
                      className={`code-line px-2 py-1 rounded ${
                        currentStepData?.codeHighlight?.includes(i + 1) ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-500 select-none w-8 inline-block">{i + 1}</span>
                      <span className={currentStepData?.codeHighlight?.includes(i + 1) ? 'text-white' : 'text-gray-300'}>
                        {line}
                      </span>
                    </div>
                  ))}
                </pre>
              </div>
            )}

            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4" style={{ maxHeight: '70vh', overflow: 'auto' }}>
              <h3 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.primary }}>
                {currentStepData?.title}
              </h3>
              <Visualization step={currentStep} visualization={currentStepData?.visualization} />
            </div>

            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gray-800 rounded-lg p-4">
                <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.primaryLight }}>
                  说明
                </h3>
                <p className="text-gray-300 leading-relaxed">
                  {currentStepData?.explanation}
                </p>
              </div>

              <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex flex-wrap gap-2">
                  {STEPS.map((step, index) => (
                    <button
                      key={index}
                      onClick={() => handleStepClick(index)}
                      className={`px-3 py-2 rounded text-xs font-bold transition-all duration-300 ${
                        index === currentStep
                          ? 'bg-blue-600 text-white scale-105'
                          : index < currentStep
                          ? 'bg-blue-900/50 text-blue-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}
                    >
                      {index + 1}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="mt-6 flex justify-center gap-4">
            <button onClick={reset} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors">
              🔄 重置
            </button>
            <button onClick={prevStep} disabled={currentStep === 0} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              ⏮️ 上一步
            </button>
            <button onClick={togglePlay} className={`px-6 py-3 rounded-lg font-bold transition-colors ${isPlaying ? 'bg-blue-600 hover:bg-blue-700' : 'bg-green-600 hover:bg-green-700'}`}>
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <button onClick={togglePause} disabled={!isPlaying} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              {isPaused ? '▶️ 继续' : '⏯️ 挂起'}
            </button>
            <button onClick={nextStep} disabled={currentStep === STEPS.length - 1} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              下一步 ⏭️
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
