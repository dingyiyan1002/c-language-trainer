// 多事件同步机制

// 1. 事件标志组结构
typedef struct {
  uint32_t flags;             // 当前标志位 (32 位)
  List_t waiters;             // 等待任务队列
} EventGroup_t;

// 2. 事件标志位定义
#define EVENT_FLAG_0    (1 << 0)    // 0x01 - 数据就绪
#define EVENT_FLAG_1    (1 << 1)    // 0x02 - 命令完成
#define EVENT_FLAG_2    (1 << 2)    // 0x04 - 错误发生
#define EVENT_FLAG_3    (1 << 3)    // 0x08 - 超时
#define EVENT_FLAG_ALL  (0x0F)      // 所有标志位

// 3. 创建事件标志组
EventGroup_t* event_group_create(void) {
  EventGroup_t *eg = malloc(sizeof(EventGroup_t));
  eg->flags = 0;                  // 初始所有位清零
  list_init(&eg->waiters);
  return eg;
}

// 4. 设置事件标志 (置位)
void event_group_set_bits(EventGroup_t *eg, uint32_t bits) {
  __disable_irq();

  eg->flags |= bits;              // 置位指定位

  // 检查是否有等待任务的条件满足
  for (TCB_t *t = eg->waiters.head; t; t = t->next) {
    if (t->wait_type == WAIT_ANY) {
      if (eg->flags & t->wait_mask) {
        t->state = TASK_READY;
        t->wait_result = eg->flags & t->wait_mask;
      }
    } else { // WAIT_ALL
      if ((eg->flags & t->wait_mask) == t->wait_mask) {
        t->state = TASK_READY;
        t->wait_result = eg->flags & t->wait_mask;
      }
    }
  }

  __enable_irq();
  schedule();
}

// 5. 清除事件标志 (清零)
void event_group_clear_bits(EventGroup_t *eg, uint32_t bits) {
  __disable_irq();
  eg->flags &= ~bits;             // 清除指定位
  __enable_irq();
}

// 6. 等待事件 (任意一个)
uint32_t event_group_wait_any(EventGroup_t *eg, uint32_t mask, uint32_t timeout) {
  __disable_irq();

  if (eg->flags & mask) {         // 已有任意一位满足
    uint32_t result = eg->flags & mask;
    __enable_irq();
    return result;
  }

  // 阻塞当前任务
  current_task->wait_type = WAIT_ANY;
  current_task->wait_mask = mask;
  current_task->state = TASK_BLOCKED;
  list_add(&eg->waiters, current_task);

  __enable_irq();
  schedule();

  return current_task->wait_result;
}

// 7. 等待所有事件
uint32_t event_group_wait_all(EventGroup_t *eg, uint32_t mask, uint32_t timeout) {
  __disable_irq();

  if ((eg->flags & mask) == mask) {  // 所有位都已满足
    uint32_t result = eg->flags & mask;
    __enable_irq();
    return result;
  }

  // 阻塞当前任务
  current_task->wait_type = WAIT_ALL;
  current_task->wait_mask = mask;
  current_task->state = TASK_BLOCKED;
  list_add(&eg->waiters, current_task);

  __enable_irq();
  schedule();

  return current_task->wait_result;
}`;

              <div className="flex-1">
                <div className="font-bold text-purple-300">{a.name}</div>
                <div className="text-xs text-gray-400">{a.desc}</div>
              </div>
            </div>
          ))}
          {step >= 7 && (
            <div className="mt-4 p-4 bg-gradient-to-r from-purple-900/50 to-green-900/50 rounded-lg border-2 border-purple-500 text-center">
              <div className="text-purple-300 font-bold">
                🚩 事件标志组 = 多事件同步最佳选择
              </div>
            </div>
          )}
        </div>
      );
    }

    function Visualization({ step, visualization }) {
      switch(visualization) {
        case 'overview': return <Overview step={step} />;
        case 'structure': return <EventStructure step={step} />;
        case 'flags': return <FlagBits step={step} />;
        case 'set': return <SetEvent step={step} />;
        case 'clear': return <ClearEvent step={step} />;
        case 'waitany': return <WaitAny step={step} />;
        case 'waitall': return <WaitAll step={step} />;
        case 'apps': return <Applications step={step} />;
        default: return null;
      }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showCode, setShowCode] = useState(true);
      const voiceEndTimerRef = useRef(null);
      const stepRef = useRef(0);

      const speak = useCallback((text) => {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v =>
          v.lang === 'zh-CN' ||
          v.lang === 'zh-CN-XiaoxiaoNeural' ||
          v.name.includes('Xiaoxiao') ||
          v.name.includes('Chinese')
        );
        if (zhVoice) utterance.voice = zhVoice;

        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        utterance.onerror = (event) => {
          console.warn('Speech synthesis error:', event.error);
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        window.speechSynthesis.speak(utterance);
      }, [isPaused, isPlaying]);

      useEffect(() => {
        stepRef.current = currentStep;
      }, [currentStep]);

      useEffect(() => {
        const loadVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };

        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const step = STEPS[currentStep];
        if (step && isPlaying) {
          speak(step.title + "。" + step.explanation);
        }
        return () => {
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        };
      }, [currentStep, isPlaying, speak]);

      const handleStepClick = (index) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(index);
        stepRef.current = index;
      };

      const togglePlay = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPlaying(!isPlaying);
        if (!isPlaying && currentStep < STEPS.length - 1) {
          setTimeout(() => setCurrentStep(prev => prev + 1), 100);
        }
      };

      const togglePause = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPaused(!isPaused);
      };

      const reset = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(0);
        stepRef.current = 0;
        setIsPaused(false);
        setIsPlaying(true);
      };

      const nextStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => {
            stepRef.current = prev + 1;
            return prev + 1;
          });
        }
      };

      const prevStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep > 0) {
          setCurrentStep(prev => {
            stepRef.current = prev - 1;
            return prev - 1;
          });
        }
      };

      const currentStepData = STEPS[currentStep];

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="mb-4 text-center">
            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
              1155 - RTOS 事件标志组
            </h1>
            <p className="text-gray-400">Embedded C Animation · 共 {STEPS.length} 步</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {showCode && (
              <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4 overflow-auto" style={{ maxHeight: '70vh' }}>
                <pre className="text-xs font-mono leading-relaxed">
                  {CODE.split('\n').map((line, i) => (
                    <div
                      key={i}
                      className={`code-line px-2 py-1 rounded ${
                        currentStepData?.codeHighlight?.includes(i + 1) ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-500 select-none w-8 inline-block">{i + 1}</span>
                      <span className={currentStepData?.codeHighlight?.includes(i + 1) ? 'text-white' : 'text-gray-300'}>
                        {line}
                      </span>
                    </div>
                  ))}
                </pre>
              </div>
            )}

            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4" style={{ maxHeight: '70vh', overflow: 'auto' }}>
              <h3 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.primary }}>
                {currentStepData?.title}
              </h3>
              <Visualization step={currentStep} visualization={currentStepData?.visualization} />
            </div>

            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gray-800 rounded-lg p-4">
                <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.primaryLight }}>
                  说明
                </h3>
                <p className="text-gray-300 leading-relaxed">
                  {currentStepData?.explanation}
                </p>
              </div>

              <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex flex-wrap gap-2">
                  {STEPS.map((step, index) => (
                    <button
                      key={index}
                      onClick={() => handleStepClick(index)}
                      className={`px-3 py-2 rounded text-xs font-bold transition-all duration-300 ${
                        index === currentStep
                          ? 'bg-purple-600 text-white scale-105'
                          : index < currentStep
                          ? 'bg-purple-900/50 text-purple-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}
                    >
                      {index + 1}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          <div className="mt-6 flex justify-center gap-4">
            <button onClick={reset} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors">
              🔄 重置
            </button>
            <button onClick={prevStep} disabled={currentStep === 0} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              ⏮️ 上一步
            </button>
            <button onClick={togglePlay} className={`px-6 py-3 rounded-lg font-bold transition-colors ${isPlaying ? 'bg-purple-600 hover:bg-purple-700' : 'bg-green-600 hover:bg-green-700'}`}>
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <button onClick={togglePause} disabled={!isPlaying} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              {isPaused ? '▶️ 继续' : '⏯️ 挂起'}
            </button>
            <button onClick={nextStep} disabled={currentStep === STEPS.length - 1} className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50">
              下一步 ⏭️
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
