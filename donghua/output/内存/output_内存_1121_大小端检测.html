<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1121 - 大小端检测 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(236, 72, 153, 0.2); border-left: 3px solid #ec4899; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#ec4899', primaryLight: '#f472b6',
      secondary: '#db2777', secondaryLight: '#f472b6',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 大小端检测 =====
#include <stdint.h>

// 方法 1: 联合体检测
union Endian {
  uint16_t word;
  uint8_t byte[2];
};

union Endian e = {0x0102};
if(e.byte[0] == 0x01) {
  // 大端 (Big Endian)
} else {
  // 小端 (Little Endian)
}

// 方法 2: 指针检测
int x = 1;
if(*(char*)&x == 1) {
  // 小端：最低字节在低地址
} else {
  // 大端：最低字节在高地址
}

// 方法 3: 预处理器
#if __BYTE_ORDER__ == __ORDER_LITTLE_ENDIAN__
  // 小端架构
#endif`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十一题，大小端检测。",
      2: "大端模式：高字节在低地址，低字节在高地址，符合人类阅读习惯。",
      3: "小端模式：低字节在低地址，高字节在高地址，x86 和 ARM 通常使用。",
      4: "联合体检测法：0x0102 存入联合体，检查 byte[0] 是 0x01 还是 0x02。",
      5: "byte[0]=0x01 是大端，byte[0]=0x02 是小端。",
      6: "指针检测法：将 int* 转换为 char*，检查第一个字节的值。",
      7: "*(char*)&x==1 说明 x=1 的最低字节在低地址，是小端。",
      8: "预处理器方法：使用__BYTE_ORDER__ 宏在编译时判断架构字节序。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-pink-900/50 via-rose-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-pink-700/50">
            <h1 className="text-3xl font-bold text-pink-400 mb-2">1121 - 大小端检测</h1>
            <p className="text-pink-300 text-sm">字节序 / 联合体检测 / 指针检测</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 7 && i <= 7) ||
                    (step === 3 && i >= 9 && i <= 9) ||
                    (step === 4 && i >= 3 && i <= 12) ||
                    (step === 5 && i >= 8 && i <= 11) ||
                    (step === 6 && i >= 15 && i <= 20) ||
                    (step === 7 && i >= 16 && i <= 20)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">💡 大小端模式</p>
                    <p className="text-xs text-gray-400">大小端指多字节数据在内存中的存储顺序，x86/ARM 通常是小端，网络协议是大端。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">大端模式 (Big Endian)</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-1">
                        <div className="w-16 text-right text-gray-400 text-xs">地址:</div>
                        <div className="w-16 h-8 bg-pink-600/50 border border-pink-400 flex items-center justify-center text-xs">0x100</div>
                        <div className="w-16 h-8 bg-pink-600/30 border border-pink-400 flex items-center justify-center text-xs">0x101</div>
                      </div>
                      <div className="flex items-center gap-1">
                        <div className="w-16 text-right text-pink-400 text-xs">数据 (0x0102):</div>
                        <div className="w-16 h-8 bg-pink-600/50 border border-pink-400 flex items-center justify-center text-xs font-mono">01</div>
                        <div className="w-16 h-8 bg-pink-600/30 border border-pink-400 flex items-center justify-center text-xs font-mono">02</div>
                      </div>
                      <div className="text-gray-500 text-xs text-center">
                        高字节 (0x01) 在低地址 (0x100)<br/>
                        符合人类阅读习惯
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">小端模式 (Little Endian)</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-1">
                        <div className="w-16 text-right text-gray-400 text-xs">地址:</div>
                        <div className="w-16 h-8 bg-rose-600/50 border border-rose-400 flex items-center justify-center text-xs">0x100</div>
                        <div className="w-16 h-8 bg-rose-600/30 border border-rose-400 flex items-center justify-center text-xs">0x101</div>
                      </div>
                      <div className="flex items-center gap-1">
                        <div className="w-16 text-right text-rose-400 text-xs">数据 (0x0102):</div>
                        <div className="w-16 h-8 bg-rose-600/50 border border-rose-400 flex items-center justify-center text-xs font-mono">02</div>
                        <div className="w-16 h-8 bg-rose-600/30 border border-rose-400 flex items-center justify-center text-xs font-mono">01</div>
                      </div>
                      <div className="text-gray-500 text-xs text-center">
                        低字节 (0x02) 在低地址 (0x100)<br/>
                        x86/ARM 默认使用
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">联合体检测法</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>union Endian {'{'}</div>
                        <div>&nbsp;&nbsp;uint16_t word;</div>
                        <div>&nbsp;&nbsp;uint8_t byte[2];</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                        <div>union Endian e = {'{'}0x0102{'}'};</div>
                        <div className="text-gray-500 text-xs mt-1">// word 和 byte 共享内存</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">判断逻辑</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                          <div className="text-pink-400 text-xs font-mono">e.byte[0] == 0x01</div>
                          <div className="text-gray-400 text-xs mt-1">大端模式</div>
                        </div>
                        <div className="p-2 bg-rose-900/20 rounded border border-rose-500/30">
                          <div className="text-rose-400 text-xs font-mono">e.byte[0] == 0x02</div>
                          <div className="text-gray-400 text-xs mt-1">小端模式</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">指针检测法</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>int x = 1;</div>
                        <div className="text-pink-400">if(*(char*)&x == 1) {'{'}</div>
                        <div>&nbsp;&nbsp;// 小端</div>
                        <div>{'}'} else {'{'}</div>
                        <div>&nbsp;&nbsp;// 大端</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-gray-500 text-xs">
                        &x 取地址 → (char*) 转换为字节指针 → *解引用取第一个字节
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">指针法图解</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-1">
                        <div className="w-24 text-right text-gray-400 text-xs">x = 1 内存:</div>
                        <div className="w-12 h-8 bg-rose-600/50 border border-rose-400 flex items-center justify-center text-xs font-mono">01</div>
                        <div className="w-12 h-8 bg-rose-600/30 border border-rose-400 flex items-center justify-center text-xs font-mono">00</div>
                        <div className="w-12 h-8 bg-rose-600/30 border border-rose-400 flex items-center justify-center text-xs font-mono">00</div>
                        <div className="w-12 h-8 bg-rose-600/30 border border-rose-400 flex items-center justify-center text-xs font-mono">00</div>
                      </div>
                      <div className="flex items-center gap-1">
                        <div className="w-24 text-right text-pink-400 text-xs">*(char*)&x:</div>
                        <div className="w-12 h-8 bg-pink-600/50 border border-pink-400 flex items-center justify-center text-xs font-mono">01</div>
                        <div className="flex-1 text-gray-500 text-xs">← 取最低字节</div>
                      </div>
                      <div className="text-green-400 text-center">
                        *(char*)&x == 1 → 小端!
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-pink-900/20 rounded-lg border border-pink-500/30">
                      <p className="text-pink-300 text-xs font-medium mb-2">📋 预处理器方法</p>
                      <pre className="text-xs text-gray-400 font-mono">
{`#if __BYTE_ORDER__ == __ORDER_LITTLE_ENDIAN__
  // 小端架构 (x86, ARM)
#elif __BYTE_ORDER__ == __ORDER_BIG_ENDIAN__
  // 大端架构 (网络字节序)
#endif`}
                      </pre>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 大端：高字节在低地址 (网络字节序)
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 3 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 小端：低字节在低地址 (x86/ARM)
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 检测：联合体或指针转换
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">应用场景</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                    <p className="text-pink-300 font-medium">网络编程</p>
                    <p className="text-gray-400">htonl/ntohl 转换字节序</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">文件格式</p>
                    <p className="text-gray-400">PNG/GIF 等格式的魔数检测</p>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">跨平台通信</p>
                    <p className="text-gray-400">不同架构间数据交换</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-pink-600 hover:bg-pink-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-pink-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-pink-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-pink-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-pink-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
