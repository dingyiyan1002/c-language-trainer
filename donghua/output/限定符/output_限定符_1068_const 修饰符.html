<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>const 限制修饰符 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0ea5e9 0%,#0284c7 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#0c4a6e;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#0369a1;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#e0f2fe,#bae6fd);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#38bdf8;transition:all 0.3s ease}
    .var-card.highlight{border-color:#0ea5e9;box-shadow:0 0 20px rgba(14,165,233,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#0c4a6e;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .modifier-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .modifier-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .modifier-box.definition{background:linear-gradient(135deg:#e0f2fe,#bae6fd);border-color:#0ea5e9}
    .modifier-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .modifier-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .modifier-label{width:100px;font-size:11px;color:#0369a1;font-weight:600;font-family:'Consolas',monospace}
    .modifier-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .modifier-box-inner.active{border-color:#0ea5e9;background:linear-gradient(135deg:#e0f2fe,#bae6fd)}
    .modifier-box-inner.readonly{border-color:#ef4444;background:#fef2f2}
    .modifier-type{font-size:10px;color:#64748b}
    .modifier-value{font-size:12px;font-weight:700;color:#0369a1}
    .lock-icon{font-size:16px}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#0ea5e9;background:linear-gradient(135deg:#e0f2fe,#bae6fd)}
    .compare-card.error{border-color:#ef4444;background:#fef2f2}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#0369a1;font-family:'Consolas',monospace}
    .compare-status{font-size:16px;margin-top:4px}
    .rule-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .rule-item{background:#e0f2fe;border-radius:8px;padding:12px;border-left:4px solid#0ea5e9;transition:all 0.3s ease}
    .rule-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#e0f2fe,#bae6fd)}
    .rule-title{font-size:11px;color:#0369a1;font-weight:700;margin-bottom:4px}
    .rule-example{font-size:10px;color:#075985;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#22d3ee;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#22d3ee;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',sky:'#0ea5e9'};
    const LINE_MAP = {
      1:{step:1,text:'#include <stdio.h>',color:'#7c3aed'},
      2:{step:2,text:'const int x = 10;',color:'#0ea5e9'},
      3:{step:3,text:'int const y = 20;',color:'#0ea5e9'},
      4:{step:4,text:'const int *ptr = &x;',color:'#3b82f6'},
      5:{step:5,text:'int const *ptr2 = &y;',color:'#22c55e'},
      6:{step:6,text:'printf("%d\\n", *ptr);',color:'#eab308'},
      7:{step:6,text:'printf("%d\\n", *ptr2);',color:'#eab308'},
      8:{step:7,text:'return 0;',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，const 是只读修饰符，用于定义常量或限制修改',
      2:'定义 const 常量 x 值为 10，const 在前，编译期常量',
      3:'int const y 等价于 const int y，两种写法都正确',
      4:'ptr 是指向 const int 的指针，不能通过 ptr 修改值',
      5:'ptr2 同样指向常量，const 在 * 前或后都限制指针本身',
      6:'输出 ptr 和 ptr2 的值，const 保证数据不被意外修改',
      7:'程序结束，const 用于参数保护、常量定义、接口安全'
    };
    const modifiers = [
      {name:'const int x',value:'10',lock:true,desc:'常量定义'},
      {name:'int const y',value:'20',lock:true,desc:'等价写法'},
      {name:'const int *p',value:'&x',lock:true,desc:'指向常量的指针'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',lock:'M12 17a2 2 0 100-4 2 2 0 000 4zm6-9h-1V6a5 5 0 10-10 0v2H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V10a2 2 0 00-2-2zM9 6a3 3 0 116 0v2H9V6z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeMod,setActiveMod] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 8; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveMod(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveMod(0);
        } else if(step === 3) {
          setActiveMod(1);
        } else if(step === 4) {
          setActiveMod(2);
        } else if(step === 5) {
          setActiveMod(2);
        } else if(step === 6) {
          setTerminalLines(['10','20']);
        } else if(step === 7) {
          // Complete
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveMod(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>const 限制修饰符 - C 语言可视化</h1>
            <p>const | 只读修饰符 | 常量定义</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.sky,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                const_modifier.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6,7,8].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.lock} size={22} />
                const 修饰符可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">const</span>
                  <span className="var-type">Read-Only Modifier</span>
                </div>
                <div className="modifier-container">
                  <div className={`modifier-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#0369a1',marginBottom:12}}>const 修饰符演示</div>
                    {modifiers.map((m, idx) => (
                      <div key={m.name} className="modifier-row">
                        <span className="modifier-label">{m.name}</span>
                        <div className={`modifier-box-inner ${step >= 2 + idx ? 'active' : ''} ${m.lock ? 'readonly' : ''}`}>
                          <div className="modifier-type">{m.desc}</div>
                          <div className="modifier-value">{m.lock ? '🔒' : ''} {m.value}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">const int x</div>
                    <div className="compare-code">x = 10;</div>
                    <div className="compare-status">✅</div>
                  </div>
                  <div className={`compare-card error ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">x = 20;</div>
                    <div className="compare-code">error!</div>
                    <div className="compare-status">❌</div>
                  </div>
                  <div className={`compare-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="compare-label">*ptr = 5;</div>
                    <div className="compare-code">error!</div>
                    <div className="compare-status">❌</div>
                  </div>
                  <div className={`compare-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="compare-label">ptr++;</div>
                    <div className="compare-code">ok</div>
                    <div className="compare-status">✅</div>
                  </div>
                </div>
                <div className="rule-list">
                  <div className={`rule-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="rule-title">const int x = 10</div>
                    <div className="rule-example">x 是只读常量，不可修改</div>
                  </div>
                  <div className={`rule-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="rule-title">const int *ptr</div>
                    <div className="rule-example">ptr 可变，*ptr 不可变</div>
                  </div>
                  <div className={`rule-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="rule-title">int *const ptr</div>
                    <div className="rule-example">ptr 不可变，*ptr 可变</div>
                  </div>
                  <div className={`rule-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="rule-title">const int *const ptr</div>
                    <div className="rule-example">ptr 和*ptr 都不可变</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.sky}}>const 作用</strong>
                <p style={{marginTop:8,color:'#78350f'}}>只读修饰符，防止修改</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>两种写法</strong>
                <p style={{marginTop:8,color:'#78350f'}}>const int = int const</p>
              </div>
              <div className={`explanation-card ${step >= 3 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>指针 const</strong>
                <p style={{marginTop:8,color:'#78350f'}}>位置决定修饰对象</p>
              </div>
              <div className={`explanation-card ${step >= 7 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:#78350f'}}>常量定义、参数保护</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
