// 通过无线方式更新固件

// 1. Flash 分区定义 (双 Bank 设计)
#define FLASH_BANK_A_ADDR   0x08008000    // Bank A 起始地址
#define FLASH_BANK_B_ADDR   0x08080000    // Bank B 起始地址
#define FLASH_BANK_SIZE     0x78000       // 每个 Bank 480KB
#define FLASH_META_ADDR     0x080FF000    // 元数据区

// 2. 固件头结构
typedef struct {
  uint32_t magic;           // 魔术字：0x4F544100 ("OTA\0")
  uint32_t version;         // 固件版本号
  uint32_t size;            // 固件大小
  uint32_t crc32;           // CRC32 校验值
  uint32_t timestamp;       // 编译时间戳
  uint8_t  bank_id;         // 目标 Bank (0=A, 1=B)
  uint8_t  reserved[3];     // 保留
} FirmwareHeader_t;

// 3. OTA 状态机
typedef enum {
  OTA_STATE_IDLE,           // 空闲
  OTA_STATE_DOWNLOADING,    // 下载中
  OTA_STATE_VERIFYING,      // 验证中
  OTA_STATE_FLASHING,       // 烧录中
  OTA_STATE_REBOOTING,      // 重启中
  OTA_STATE_SUCCESS,        // 成功
  OTA_STATE_FAILED          // 失败
} OTA_State_t;

// 4. 下载回调 (HTTPS 安全下载)
void ota_download_callback(uint8_t* data, uint32_t len, void* ctx) {
  OTA_Context_t* ctx = (OTA_Context_t*)ctx;

  // 写入 Flash
  HAL_FLASH_Unlock();
  FLASH_Program(ctx->write_addr, data, len);
  HAL_FLASH_Lock();

  ctx->write_addr += len;
  ctx->downloaded_size += len;

  // 进度回调
  ota_progress_callback(ctx->downloaded_size, ctx->total_size);
}

// 5. 固件验证
int ota_verify_firmware(uint32_t bank_addr) {
  FirmwareHeader_t* header = (FirmwareHeader_t*)bank_addr;

  // 检查魔术字
  if (header->magic != 0x4F544100) {
    return -1;  // 无效固件
  }

  // 计算 CRC 并校验
  uint32_t crc = calculate_crc32(
    (uint8_t*)(bank_addr + sizeof(FirmwareHeader_t)),
    header->size - sizeof(FirmwareHeader_t)
  );

  if (crc != header->crc32) {
    return -2;  // CRC 校验失败
  }

  return 0;  // 验证通过
}

// 6. 切换 Bank 并重启
void ota_switch_bank(uint8_t bank_id) {
  // 更新 Bootloader 的 Bank 选择标志
  FLASH_Meta_t meta;
  meta.active_bank = bank_id;
  meta.pending_switch = 1;
  meta.magic = 0xDEADBEEF;

  HAL_FLASH_Unlock();
  FLASH_Program(FLASH_META_ADDR, &meta, sizeof(meta));
  HAL_FLASH_Lock();

  // 系统软复位
  NVIC_SystemReset();
}

// 7. 回滚机制 (失败时恢复)
void ota_rollback(void) {
  uint8_t current_bank = get_active_bank();
  uint8_t other_bank = current_bank ^ 1;  // 切换到另一个 Bank

  // 检查另一个 Bank 是否有效
  if (ota_verify_firmware(other_bank == 0 ? FLASH_BANK_A_ADDR : FLASH_BANK_B_ADDR) == 0) {
    ota_switch_bank(other_bank);  // 切换到已知良好的版本
  } else {
    // 两个 Bank 都损坏，进入 Bootloader 等待新固件
    enter_bootloader_mode();
  }
}`;

              <div className="flex justify-between">
                <span className="text-gray-400">active_bank:</span>
                <span className="text-green-400">0 → 1</span>
              </div>
              <div className="flex justify-between">
                <span className="text-gray-400">pending_switch:</span>
                <span className="text-green-400">0 → 1</span>
              </div>
              <div className="flex justify-between">
                <span className="text-gray-400">magic:</span>
                <span className="text-green-400">0xDEADBEEF</span>
              </div>
            </div>
          </div>
          {step >= 6 && (
            <div className="text-center">
              <div className="inline-block px-6 py-3 bg-gradient-to-r from-blue-600 to-green-600 rounded-lg animate-pulse">
                <span className="font-bold text-lg">🔄 NVIC_SystemReset()</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Rollback({ step }) {
      const scenario = [
        { name: "检测新 Bank 启动失败", icon: "❌", status: step >= 7 ? 'done' : 'pending' },
        { name: "读取当前 Bank 编号", icon: "📖", status: step >= 7 ? 'done' : 'pending' },
        { name: "切换到另一 Bank", icon: "🔄", status: step >= 7 ? 'done' : 'pending' },
        { name: "验证旧 Bank 有效性", icon: "✅", status: step >= 7 ? 'done' : 'pending' },
        { name: "跳转到已知良好版本", icon: "🚀", status: step >= 7 ? 'done' : 'pending' },
      ];

      return (
        <div className="space-y-3">
          {scenario.map((s, i) => (
            <div
              key={i}
              className={`flex items-center gap-4 p-4 rounded-lg transition-all duration-300 ${
                s.status === 'done' ? 'bg-green-900/30 border border-green-500' : 'bg-gray-800'
              }`}
            >
              <span className="text-2xl">{s.icon}</span>
              <span className={`flex-1 ${s.status === 'done' ? 'text-green-300' : 'text-gray-500'}`}>
                {s.name}
              </span>
              {s.status === 'done' && <span className="text-green-400 text-xl">✓</span>}
            </div>
          ))}
          {step >= 7 && (
            <div className="mt-4 grid grid-cols-2 gap-4">
              <div className="bg-red-900/30 p-3 rounded border border-red-500">
                <div className="text-red-400 text-xs text-center">❌ 新固件 v2.0 启动失败</div>
              </div>
              <div className="bg-green-900/30 p-3 rounded border border-green-500">
                <div className="text-green-400 text-xs text-center">✅ 回滚到 v1.0 正常运行</div>
              </div>
            </div>
          )}
          {step >= 7 && (
            <div className="mt-4 p-4 bg-gradient-to-r from-green-900/50 to-blue-900/50 rounded-lg border-2 border-green-500">
              <div className="text-center text-green-300 font-bold">
                🛡️ 双 Bank 设计提供天然回滚保护
              </div>
            </div>
          )}
        </div>
      );
    }

    function Visualization({ step, visualization }) {
      switch(visualization) {
        case 'overview': return <Overview step={step} />;
        case 'layout': return <FlashLayout step={step} />;
        case 'header': return <FirmwareHeader step={step} />;
        case 'state': return <StateMachine step={step} />;
        case 'download': return <DownloadProcess step={step} />;
        case 'verify': return <VerifyProcess step={step} />;
        case 'switch': return <BankSwitch step={step} />;
        case 'rollback': return <Rollback step={step} />;
        default: return null;
      }
    }

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPaused, setIsPaused] = useState(false);
      const [isPlaying, setIsPlaying] = useState(true);
      const [showCode, setShowCode] = useState(true);
      const voiceEndTimerRef = useRef(null);
      const stepRef = useRef(0);

      const speak = useCallback((text) => {
        if (!('speechSynthesis' in window)) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        const voices = window.speechSynthesis.getVoices();
        const zhVoice = voices.find(v =>
          v.lang === 'zh-CN' ||
          v.lang === 'zh-CN-XiaoxiaoNeural' ||
          v.name.includes('Xiaoxiao') ||
          v.name.includes('Chinese')
        );
        if (zhVoice) utterance.voice = zhVoice;

        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        utterance.onerror = (event) => {
          console.warn('Speech synthesis error:', event.error);
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
          voiceEndTimerRef.current = setTimeout(() => {
            if (!isPaused && isPlaying && stepRef.current < STEPS.length - 1) {
              setCurrentStep(prev => {
                stepRef.current = prev + 1;
                return prev + 1;
              });
            }
          }, 800);
        };

        window.speechSynthesis.speak(utterance);
      }, [isPaused, isPlaying]);

      useEffect(() => {
        stepRef.current = currentStep;
      }, [currentStep]);

      useEffect(() => {
        const loadVoices = () => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
          }
        };

        loadVoices();
        if ('speechSynthesis' in window && window.speechSynthesis.onvoiceschanged !== undefined) {
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const step = STEPS[currentStep];
        if (step && isPlaying) {
          speak(step.title + "。" + step.explanation);
        }
        return () => {
          if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        };
      }, [currentStep, isPlaying, speak]);

      const handleStepClick = (index) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(index);
        stepRef.current = index;
      };

      const togglePlay = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPlaying(!isPlaying);
        if (!isPlaying && currentStep < STEPS.length - 1) {
          setTimeout(() => setCurrentStep(prev => prev + 1), 100);
        }
      };

      const togglePause = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsPaused(!isPaused);
      };

      const reset = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setCurrentStep(0);
        stepRef.current = 0;
        setIsPaused(false);
        setIsPlaying(true);
      };

      const nextStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => {
            stepRef.current = prev + 1;
            return prev + 1;
          });
        }
      };

      const prevStep = () => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        if (currentStep > 0) {
          setCurrentStep(prev => {
            stepRef.current = prev - 1;
            return prev - 1;
          });
        }
      };

      const currentStepData = STEPS[currentStep];

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="mb-4 text-center">
            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
              1151 - OTA 固件升级
            </h1>
            <p className="text-gray-400">Embedded C Animation · 共 {STEPS.length} 步</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* 代码区域 */}
            {showCode && (
              <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4 overflow-auto" style={{ maxHeight: '70vh' }}>
                <pre className="text-xs font-mono leading-relaxed">
                  {CODE.split('\n').map((line, i) => (
                    <div
                      key={i}
                      className={`code-line px-2 py-1 rounded ${
                        currentStepData?.codeHighlight?.includes(i + 1) ? 'active' : ''
                      }`}
                    >
                      <span className="text-gray-500 select-none w-8 inline-block">{i + 1}</span>
                      <span className={currentStepData?.codeHighlight?.includes(i + 1) ? 'text-white' : 'text-gray-300'}>
                        {line}
                      </span>
                    </div>
                  ))}
                </pre>
              </div>
            )}

            {/* 可视化区域 */}
            <div className="lg:col-span-1 bg-gray-800 rounded-lg p-4" style={{ maxHeight: '70vh', overflow: 'auto' }}>
              <h3 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.primary }}>
                {currentStepData?.title}
              </h3>
              <Visualization step={currentStep} visualization={currentStepData?.visualization} />
            </div>

            {/* 说明区域 */}
            <div className="lg:col-span-1 space-y-4">
              <div className="bg-gray-800 rounded-lg p-4">
                <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.primaryLight }}>
                  说明
                </h3>
                <p className="text-gray-300 leading-relaxed">
                  {currentStepData?.explanation}
                </p>
              </div>

              {/* 进度指示器 */}
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="flex flex-wrap gap-2">
                  {STEPS.map((step, index) => (
                    <button
                      key={index}
                      onClick={() => handleStepClick(index)}
                      className={`px-3 py-2 rounded text-xs font-bold transition-all duration-300 ${
                        index === currentStep
                          ? 'bg-blue-600 text-white scale-105'
                          : index < currentStep
                          ? 'bg-blue-900/50 text-blue-300'
                          : 'bg-gray-700 text-gray-400'
                      }`}
                    >
                      {index + 1}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* 控制按钮 */}
          <div className="mt-6 flex justify-center gap-4">
            <button
              onClick={reset}
              className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors"
            >
              🔄 重置
            </button>
            <button
              onClick={prevStep}
              disabled={currentStep === 0}
              className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50"
            >
              ⏮️ 上一步
            </button>
            <button
              onClick={togglePlay}
              className={`px-6 py-3 rounded-lg font-bold transition-colors ${
                isPlaying ? 'bg-blue-600 hover:bg-blue-700' : 'bg-green-600 hover:bg-green-700'
              }`}
            >
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <button
              onClick={togglePause}
              disabled={!isPlaying}
              className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50"
            >
              {isPaused ? '▶️ 继续' : '⏯️ 挂起'}
            </button>
            <button
              onClick={nextStep}
              disabled={currentStep === STEPS.length - 1}
              className="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-lg font-bold transition-colors disabled:opacity-50"
            >
              下一步 ⏭️
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
