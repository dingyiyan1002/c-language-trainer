<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>宏定义进阶 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#059669 0%,#047857 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#064e3b;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#059669;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#d1fae5,#a7f3d0);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#34d399;transition:all 0.3s ease}
    .var-card.highlight{border-color:#059669;box-shadow:0 0 20px rgba(5,150,105,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#064e3b;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .macro-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .macro-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .macro-box.definition{background:linear-gradient(135deg:#d1fae5,#a7f3d0);border-color:#059669}
    .macro-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .macro-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .macro-label{width:100px;font-size:11px;color:#059669;font-weight:600;font-family:'Consolas',monospace}
    .macro-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .macro-box-inner.active{border-color:#059669;background:linear-gradient(135deg:#d1fae5,#a7f3d0)}
    .macro-type{font-size:10px;color:#64748b}
    .macro-value{font-size:12px;font-weight:700;color:#059669;font-family:'Consolas',monospace}
    .expand-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .expand-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .expand-row.pending{opacity:0.5}
    .expand-row.active{background:linear-gradient(135deg,#059669,#047857);border:2px solid#34d399}
    .expand-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .expand-value{font-size:14px;font-weight:700;color:#6ee7b7;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#059669;background:linear-gradient(135deg:#d1fae5,#a7f3d0)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#059669;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#d1fae5;border-radius:8px;padding:12px;border-left:4px solid#059669;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#d1fae5,#a7f3d0)}
    .use-title{font-size:11px;color:#064e3b;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#059669;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#6ee7b7;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#6ee7b7;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',emerald:'#059669'};
    const LINE_MAP = {
      1:{step:1,text:'#define MAX(a,b) ((a)>(b)?(a):(b))',color:'#059669'},
      2:{step:2,text:'#define SQUARE(x) ((x)*(x))',color:'#34d399'},
      3:{step:3,text:'#define PRINT(x) printf(#x " = %d\\n", x)',color:'#6ee7b7'},
      4:{step:4,text:'#define CONCAT(a,b) a##b',color:'#a7f3d0'},
      5:{step:5,text:'int a = MAX(10,20); // 20',color:'#d1fae5'},
      6:{step:6,text:'SQUARE(5); PRINT(a); CONCAT(var,1)=100;',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，宏定义使用 #define，带参数宏进行文本替换，注意括号防止运算符优先级问题',
      2:'SQUARE 宏计算平方，双重括号确保展开正确，#define SQUARE(x) ((x)*(x))',
      3:'#运算符将宏参数转换为字符串，PRINT(x) 展开为 printf("x = %d", x)',
      4:'## 运算符连接两个参数，CONCAT(a,b) 生成 ab，用于动态标识符',
      5:'MAX(10,20) 展开为 ((10)>(20)?(10):(20)) 结果 20，三元运算符实现',
      6:'宏展开：SQUARE(5)=25, PRINT(a) 输出 a=20, CONCAT(var,1) 生成 var1=100'
    };
    const macros = [
      {name:'MAX',params:'(a,b)',desc:'最大值宏',expansion:'((a)>(b)?(a):(b))'},
      {name:'SQUARE',params:'(x)',desc:'平方宏',expansion:'((x)*(x))'},
      {name:'#',params:'x',desc:'字符串化',expansion:'"x"'},
      {name:'##',params:'a,b',desc:'连接符',expansion:'ab'}
    ];
    const expandOps = [
      {op:'MAX(10,20)',result:'((10)>(20)?(10):(20))',value:'20'},
      {op:'SQUARE(5)',result:'((5)*(5))',value:'25'},
      {op:'PRINT(a)',result:'printf("a = %d", a)',value:'a=20'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',macro:'M4 6h16M4 12h16M4 18h16M8 6v12M16 6v12'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeMacro,setActiveMacro] = useState(-1);
      const [expandIdx,setExpandIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveMacro(-1);
          setExpandIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveMacro(0);
          setExpandIdx(0);
        } else if(step === 3) {
          setActiveMacro(1);
        } else if(step === 4) {
          setExpandIdx(1);
          setActiveMacro(2);
        } else if(step === 5) {
          setActiveMacro(3);
          setExpandIdx(2);
        } else if(step === 6) {
          setTerminalLines(['MAX(10,20)=20', 'SQUARE(5)=25', 'PRINT(a) → a=20', 'CONCAT(var,1)=var1=100']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveMacro(-1);
        setExpandIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>宏定义进阶 - 预处理器可视化</h1>
            <p>#define | 带参宏 | # 运算符 | ## 连接符</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.emerald,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                macros.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.macro} size={22} />
                宏展开可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">#define 带参数宏</span>
                  <span className="var-type">Preprocessor Macro</span>
                </div>
                <div className="macro-container">
                  <div className={`macro-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#064e3b',marginBottom:12}}>宏定义与展开</div>
                    {macros.map((m, idx) => (
                      <div key={m.name} className="macro-row">
                        <span className="macro-label">{m.name}</span>
                        <div className={`macro-box-inner ${step >= 1 + idx && activeMacro === idx ? 'active' : ''}`}>
                          <div className="macro-type">{m.desc}</div>
                          <div className="macro-value">{m.params} → {m.expansion}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="expand-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>宏展开过程</div>
                  {expandOps.map((e, idx) => (
                    <div key={idx} className={`expand-row ${step >= 2 + idx && expandIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="expand-name">{e.op}</span>
                      <span className="expand-value">{e.result} = {e.value}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">函数</div>
                    <div className="compare-code">int max(int a,int b)</div>
                    <div className="compare-desc">运行时调用</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">宏</div>
                    <div className="compare-code">#define MAX(a,b)</div>
                    <div className="compare-desc">编译前替换</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label"># 运算符</div>
                    <div className="compare-code">#x → "x"</div>
                    <div className="compare-desc">字符串化</div>
                  </div>
                  <div className={`compare-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="compare-label">## 运算符</div>
                    <div className="compare-code">a##b → ab</div>
                    <div className="compare-desc">标识符连接</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">通用宏</div>
                    <div className="use-example">#define MIN(a,b) ((a)<(b)?(a):(b)) // 最小值</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">调试宏</div>
                    <div className="use-example">#define DBG(x) printf(#x "=%d\\n", x) // 调试输出</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">拼接宏</div>
                    <div className="use-example">#define MKSYM(n) symbol_##n // 生成 symbol_xxx</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">断言宏</div>
                    <div className="use-example">#define ASSERT(e) if(!(e)) abort() // 条件检查</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.emerald}}>带参宏</strong>
                <p style={{marginTop:8,color:'#78350f'}}>文本替换，注意括号</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>编译前处理</strong>
                <p style={{marginTop:8,color:'#78350f'>预处理器阶段展开</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}># 和 ##</strong>
                <p style={{marginTop:8,color:'#78350f'>字符串化和连接符</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>通用宏、调试、代码生成</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
