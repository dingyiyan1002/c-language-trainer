<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1135 - 预处理宏技巧 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(251, 191, 36, 0.2); border-left: 3px solid #fbbf24; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#fbbf24', primaryLight: '#fcd34d',
      secondary: '#f59e0b', secondaryLight: '#fcd34d',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 预处理宏技巧 =====
// 高级宏编程技术

// 1. 字符串化运算符 #
#define STR(x) #x
#define PRINT_VAR(var) printf(#var " = %d\\n", var)
// 展开：printf("var = %d\\n", var);

// 2. 连接运算符 ##
#define CONCAT(a, b) a##b
#define MAKE_FUNC(name) void name##_init(void)
// MAKE_FUNC(timer) → void timer_init(void)

// 3. 变参宏 __VA_ARGS__
#define LOG(fmt, ...) printf(fmt, ##__VA_ARGS__)
// LOG("Temp: %d", temp); → printf("Temp: %d", temp);

// 4. 预定义宏
__FILE__    // 当前文件名
__LINE__    // 当前行号
__DATE__    // 编译日期
__TIME__    // 编译时间
__func__    // 当前函数名

// 5. 断言宏
#define ASSERT(expr) \\
  if(!(expr)) { \\
    printf("Assert failed: %s\\n", #expr); \\
  }`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百三十五题，预处理宏技巧。",
      2: "字符串化运算符#将宏参数转换为字符串字面量，用于调试和日志输出。",
      3: "连接运算符##将两个标记连接成一个，用于生成函数名或变量名。",
      4: "变参宏使用__VA_ARGS__接受可变参数，实现 printf 风格的日志宏。",
      5: "预定义宏提供编译信息，如文件名、行号、日期，用于调试和错误报告。",
      6: "断言宏结合字符串化，在失败时打印表达式原文和上下文信息。",
      7: "应用：日志系统、寄存器定义、代码生成、调试辅助、配置管理。",
      8: "注意：宏可能产生副作用，参数应加括号，复杂逻辑建议用 inline 函数。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-amber-900/50 via-yellow-900/50 to-orange-900/50 rounded-xl p-6 mb-4 border border-amber-700/50">
            <h1 className="text-3xl font-bold text-amber-400 mb-2">1135 - 预处理宏技巧</h1>
            <p className="text-amber-300 text-sm">字符串化 / 连接运算 / 变参宏</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
              <h2 className="text-lg font-semibold text-amber-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 8) ||
                    (step === 3 && i >= 11 && i <= 14) ||
                    (step === 4 && i >= 17 && i <= 19) ||
                    (step === 5 && i >= 22 && i <= 26) ||
                    (step === 6 && i >= 29 && i <= 32) ||
                    (step === 7 && i >= 4 && i <= 32)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
              <h2 className="text-lg font-semibold text-amber-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">💡 预处理宏技巧</p>
                    <p className="text-xs text-gray-400">C 预处理器提供强大的宏功能，包括字符串化、连接运算、变参宏等，用于代码生成、调试和配置管理。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">字符串化运算符 #</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                        <div className="text-amber-400">#define STR(x) #x</div>
                        <div>STR(hello) → <span className="text-green-400">"hello"</span></div>
                      </div>
                      <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30 font-mono text-xs">
                        <div className="text-amber-400">#define PRINT_VAR(var)</div>
                        <div>&nbsp;&nbsp;printf(#var " = %d\\n", var)</div>
                      </div>
                      <div className="text-amber-400 text-center text-xs">
                        展开：printf("var = %d\\n", var);
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">连接运算符 ##</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                        <div className="text-amber-400">#define CONCAT(a, b) a##b</div>
                        <div>CONCAT(foo, 123) → <span className="text-green-400">foo123</span></div>
                      </div>
                      <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30 font-mono text-xs">
                        <div className="text-amber-400">#define MAKE_FUNC(name)</div>
                        <div>&nbsp;&nbsp;void name##_init(void)</div>
                      </div>
                      <div className="text-amber-400 text-center text-xs">
                        MAKE_FUNC(timer) → void timer_init(void)
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">变参宏 __VA_ARGS__</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                        <div className="text-amber-400">#define LOG(fmt, ...)</div>
                        <div>&nbsp;&nbsp;printf(fmt, ##__VA_ARGS__)</div>
                      </div>
                      <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30 font-mono text-xs">
                        <div>LOG("Temp: %d", temp);</div>
                        <div className="text-green-400 mt-1">→ printf("Temp: %d", temp);</div>
                      </div>
                      <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30 font-mono text-xs">
                        <div>LOG("Error!\\n");</div>
                        <div className="text-green-400 mt-1">→ printf("Error!\\n");</div>
                      </div>
                      <div className="text-amber-400 text-center text-xs">
                        ## 消除逗号，当__VA_ARGS__ 为空时
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">预定义宏</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30">
                          <div className="text-amber-400 text-xs font-mono">__FILE__</div>
                          <div className="text-gray-400 text-xs">"main.c"</div>
                        </div>
                        <div className="p-2 bg-yellow-900/20 rounded border border-yellow-500/30">
                          <div className="text-yellow-400 text-xs font-mono">__LINE__</div>
                          <div className="text-gray-400 text-xs">42</div>
                        </div>
                        <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                          <div className="text-orange-400 text-xs font-mono">__DATE__</div>
                          <div className="text-gray-400 text-xs">"Mar 21 2026"</div>
                        </div>
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs font-mono">__TIME__</div>
                          <div className="text-gray-400 text-xs">"14:30:00"</div>
                        </div>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                        <div className="text-amber-400">printf("Error at %s:%d\\n", __FILE__, __LINE__);</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-yellow-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">断言宏应用</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded text-xs">
                        <div className="text-amber-400">#define ASSERT(expr)</div>
                        <div>&nbsp;&nbsp;if(!(expr)) {'{'}</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;printf("Assert: %s\\n", #expr);</div>
                        <div>&nbsp;&nbsp;{'}'}</div>
                      </div>
                      <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30 text-xs">
                        <div>ASSERT(ptr != NULL);</div>
                        <div className="text-gray-500 mt-1">// 展开：</div>
                        <div className="text-green-400">if(!(ptr != NULL)) {'{'}</div>
                        <div className="text-green-400">&nbsp;&nbsp;printf("Assert: %s\\n", "ptr != NULL");</div>
                        <div className="text-green-400">{'}'}</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-amber-900/20 rounded-lg border border-amber-500/30">
                      <p className="text-amber-300 text-xs font-medium mb-2">📋 应用场景</p>
                      <div className="text-xs text-gray-400 space-y-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">日志系统</div>
                          <pre className="text-gray-400 text-xs mt-1">#define LOG_INFO(fmt, ...) \
  printf("[INFO] " fmt, ##__VA_ARGS__)</pre>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">寄存器定义</div>
                          <pre className="text-gray-400 text-xs mt-1">#define REG(name, addr) \
  volatile uint32_t name __attribute__((at(addr)))</pre>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">代码生成</div>
                          <pre className="text-gray-400 text-xs mt-1">#define DECLARE_MODULE(name) \
  void name##_init(void); \
  void name##_process(void);</pre>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-amber-900/20 rounded-lg border border-amber-500/30">
                      <p className="text-amber-300 text-xs font-medium mb-2">⚠️ 注意事项</p>
                      <ul className="text-xs text-gray-400 space-y-2">
                        <li>• <span className="text-red-400">副作用</span>: 宏参数可能被多次求值</li>
                        <li>• <span className="text-orange-400">括号</span>: 宏定义中参数应加括号</li>
                        <li>• <span className="text-blue-400">调试困难</span>: 宏展开后难以调试</li>
                        <li>• <span className="text-green-400">替代方案</span>: 复杂逻辑用 inline 函数</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
                <h2 className="text-lg font-semibold text-amber-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> # 字符串化，## 连接
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> __VA_ARGS__ 变参
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 5 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 预定义宏提供编译信息
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
                <h2 className="text-lg font-semibold text-amber-400 mb-3">宏陷阱示例</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">❌ 没有括号</p>
                    <pre className="text-gray-400 font-mono text-xs">#define MUL(a,b) a*b
MUL(1+2, 3) → 1+2*3 = 7 ❌</pre>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">✅ 正确写法</p>
                    <pre className="text-gray-400 font-mono text-xs">#define MUL(a,b) ((a)*(b))
MUL(1+2, 3) → ((1+2)*(3)) = 9 ✅</pre>
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
                <h2 className="text-lg font-semibold text-amber-400 mb-3">宏 vs 函数</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30">
                    <p className="text-amber-300 font-medium">宏优点</p>
                    <p className="text-gray-400">无调用开销、类型无关、可生成代码</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">函数优点</p>
                    <p className="text-gray-400">类型安全、易调试、无副作用</p>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">推荐</p>
                    <p className="text-gray-400">简单用宏，复杂用 inline 函数</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-amber-600 hover:bg-amber-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-amber-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-amber-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-amber-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-amber-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
