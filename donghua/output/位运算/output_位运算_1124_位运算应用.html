<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1124 - 位运算应用 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(34, 211, 238, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(34, 211, 238, 0.2); border-left: 3px solid #22d3ee; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#22d3ee', primaryLight: '#67e8f9',
      secondary: '#06b6d4', secondaryLight: '#67e8f9',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 位运算实际应用 =====

// 1. 寄存器配置 (STM32 GPIO)
#define GPIO_MODE_OUT (1 << 0)    // 模式：输出
#define GPIO_MODE_ALT (1 << 1)    // 模式：复用
#define GPIO_SPEED_LOW  (0 << 2)  // 速度：低速
#define GPIO_SPEED_HIGH (1 << 2)  // 速度：高速
#define GPIO_PUPD_NONE  (0 << 4)  // 无上下拉
#define GPIO_PUPD_PULLUP (1 << 4) // 上拉

// 配置 GPIO: 输出 + 高速 + 上拉
uint32_t config = GPIO_MODE_OUT | GPIO_SPEED_HIGH | GPIO_PUPD_PULLUP;

// 2. 检查标志位
if (config & GPIO_SPEED_HIGH) {
  // 高速模式已启用
}

// 3. 清除特定位 (清零)
config &= ~GPIO_SPEED_HIGH;  // 清除高速位

// 4. 设置特定位 (置位)
config |= GPIO_SPEED_LOW;    // 设置为低速

// 5. 切换特定位 (翻转)
config ^= GPIO_PUPD_PULLUP;  // 切换上拉位

// 6. 提取指定位
uint32_t mode = (config >> 2) & 0x3;  // 提取速度位 (2-3 位)`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十四题，位运算应用。",
      2: "寄存器配置使用位域，每个位或位组控制不同功能，通过组合实现配置。",
      3: "定义宏表示单个功能位，使用左移操作确定位位置，代码更清晰。",
      4: "按位或组合多个配置，将所有需要启用的功能位合并为一个值。",
      5: "按位与检查标志位，如果结果非零说明该位已设置。",
      6: "按位取反加与操作清零特定位，先将该位取反再与原值相与。",
      7: "按位或置位设置特定位为 1，不影响其他位的状态。",
      8: "右移加掩码提取指定位，将目标位移到最低位后与掩码相与。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-cyan-900/50 via-sky-900/50 to-blue-900/50 rounded-xl p-6 mb-4 border border-cyan-700/50">
            <h1 className="text-3xl font-bold text-cyan-400 mb-2">1124 - 位运算应用</h1>
            <p className="text-cyan-300 text-sm">寄存器配置 / 标志位操作 / 位域提取</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
              <h2 className="text-lg font-semibold text-cyan-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 3 && i <= 10) ||
                    (step === 3 && i >= 5 && i <= 7) ||
                    (step === 4 && i >= 13 && i <= 13) ||
                    (step === 5 && i >= 16 && i <= 18) ||
                    (step === 6 && i >= 21 && i <= 21) ||
                    (step === 7 && i >= 24 && i <= 24) ||
                    (step === 8 && i >= 27 && i <= 28)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
              <h2 className="text-lg font-semibold text-cyan-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">💡 位运算应用</p>
                    <p className="text-xs text-gray-400">嵌入式开发中，位运算用于寄存器配置、标志位管理、状态压缩等场景，是底层编程的核心技能。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">寄存器位域定义</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-cyan-400">#define GPIO_MODE_OUT (1 &lt;&lt; 0)</div>
                        <div className="text-sky-400">#define GPIO_SPEED_HIGH (1 &lt;&lt; 2)</div>
                        <div className="text-blue-400">#define GPIO_PUPD_PULLUP (1 &lt;&lt; 4)</div>
                      </div>
                      <div className="text-cyan-400 text-center text-xs">
                        每个宏定义一个功能位，左移确定位置
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">位域布局图</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-0">
                        {[7,6,5,4,3,2,1,0].map(bit => (
                          <div key={bit} className={`w-12 h-10 border border-cyan-400 flex flex-col items-center justify-center text-xs ${
                            bit === 0 ? 'bg-cyan-600/50' :
                            bit === 1 ? 'bg-sky-600/50' :
                            bit === 2 || bit === 3 ? 'bg-blue-600/50' :
                            bit === 4 ? 'bg-purple-600/50' : 'bg-gray-700/50'
                          }`}>
                            <span className="text-gray-300">{bit}</span>
                            <span className="text-white font-mono text-xs">
                              {bit === 0 ? 'MODE' : bit === 1 ? 'ALT' : bit <= 3 ? 'SPEED' : bit === 4 ? 'PUPD' : '-'}
                            </span>
                          </div>
                        ))}
                      </div>
                      <div className="text-gray-400 text-xs text-center">
                        32 位寄存器的低 8 位布局示例
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">按位或组合配置</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-cyan-400">GPIO_MODE_OUT  = 0b00000001</div>
                        <div className="text-sky-400">GPIO_SPEED_HIGH = 0b00000100</div>
                        <div className="text-blue-400">GPIO_PUPD_PULLUP= 0b00010000</div>
                        <div className="border-t border-cyan-500/30 my-1"></div>
                        <div className="text-green-400">config = OR 结果 = 0b00010101</div>
                      </div>
                      <div className="text-green-400 text-center text-xs">
                        config = 0x15 = 21
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">按位与检查标志</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>config = 0b00010101</div>
                        <div>GPIO_SPEED_HIGH = 0b00000100</div>
                        <div className="text-purple-400">result = config & GPIO_SPEED_HIGH</div>
                        <div className="text-green-400">result = 0b00000100 (非零=已设置)</div>
                      </div>
                      <div className="text-purple-400 text-center text-xs">
                        if (config & FLAG) { /* 已启用 */ }
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">清零特定位</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>config = 0b00010101</div>
                        <div>~GPIO_SPEED_HIGH = 0b11111011</div>
                        <div className="text-orange-400">config &= ~GPIO_SPEED_HIGH</div>
                        <div className="border-t border-cyan-500/30 my-1"></div>
                        <div className="text-green-400">config = 0b00010001 (第 2 位已清零)</div>
                      </div>
                      <div className="text-orange-400 text-center text-xs">
                        先取反再相与，只清除目标位
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-cyan-600/20 to-sky-600/20 rounded-lg border border-cyan-500/30">
                    <p className="text-cyan-300 text-sm font-medium mb-2">置位与翻转</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-purple-400 text-xs">置位 (|=)</div>
                          <div>config = 0b00010001</div>
                          <div>config |= 0b00000100</div>
                          <div className="border-t border-cyan-500/30 my-1"></div>
                          <div className="text-green-400">= 0b00010101</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-cyan-400 text-xs">翻转 (^=)</div>
                          <div>config = 0b00010101</div>
                          <div>config ^= 0b00010000</div>
                          <div className="border-t border-cyan-500/30 my-1"></div>
                          <div className="text-green-400">= 0b00000101</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-cyan-900/20 rounded-lg border border-cyan-500/30">
                      <p className="text-cyan-300 text-xs font-medium mb-2">📋 提取指定位</p>
                      <div className="text-xs text-gray-400 font-mono space-y-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div>config = 0b00010101</div>
                          <div className="text-purple-400">speed = (config &gt;&gt; 2) & 0x3</div>
                          <div className="text-gray-500 text-xs">// 右移 2 位：0b00000101</div>
                          <div className="text-gray-500 text-xs">// & 0x3: 0b00000001</div>
                          <div className="text-green-400">speed = 1 (二进制 01)</div>
                        </div>
                      </div>
                    </div>
                    <div className="text-xs text-gray-500 text-center">
                      右移到最低位 + 掩码提取 = 通用提取模式
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
                <h2 className="text-lg font-semibold text-cyan-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-cyan-900/30 text-cyan-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 每个功能位独立定义，便于组合
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 6 ? 'bg-cyan-900/30 text-cyan-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> |= 置位，&= ~清零，^= 翻转
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 8 ? 'bg-cyan-900/30 text-cyan-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> (value &gt;&gt; n) & mask 提取位域
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
                <h2 className="text-lg font-semibold text-cyan-400 mb-3">实际应用场景</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-cyan-900/20 rounded border border-cyan-500/30">
                    <p className="text-cyan-300 font-medium">STM32 GPIO 配置</p>
                    <pre className="text-gray-400 font-mono text-xs">GPIOx_MODER, GPIOx_OSPEEDR, GPIOx_PUPDR</pre>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">中断标志位</p>
                    <pre className="text-gray-400 font-mono text-xs">NVIC_EnableIRQ(IRQn_Type IRQn)</pre>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">状态压缩</p>
                    <pre className="text-gray-400 font-mono text-xs">用一个字节存储 8 个布尔状态</pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-cyan-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-cyan-600 hover:bg-cyan-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-cyan-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-cyan-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-cyan-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-cyan-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
