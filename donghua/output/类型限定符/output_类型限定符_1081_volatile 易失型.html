<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>volatile 易失型限定符 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#dc2626 0%,#b91c1c 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#7f1d1d;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#991b1b;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#fee2e2,#fecaca);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#f87171;transition:all 0.3s ease}
    .var-card.highlight{border-color:#dc2626;box-shadow:0 0 20px rgba(220,38,38,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#7f1d1d;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .volatile-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .volatile-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .volatile-box.definition{background:linear-gradient(135deg:#fee2e2,#fecaca);border-color:#dc2626}
    .volatile-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .access-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .access-label{width:100px;font-size:11px;color:#991b1b;font-weight:600;font-family:'Consolas',monospace}
    .volatile-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .volatile-box-inner.active{border-color:#dc2626;background:linear-gradient(135deg,#fee2e2,#fecaca)}
    .access-type{font-size:10px;color:#64748b}
    .access-value{font-size:12px;font-weight:700;color:#991b1b;font-family:'Consolas',monospace}
    .memory-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .memory-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .memory-row.pending{opacity:0.5}
    .memory-row.active{background:linear-gradient(135deg,#dc2626,#b91c1c);border:2px solid#f87171}
    .memory-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .memory-value{font-size:14px;font-weight:700;color:#fca5a5;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#dc2626;background:linear-gradient(135deg:#fee2e2,#fecaca)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#991b1b;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#fee2e2;border-radius:8px;padding:12px;border-left:4px solid#dc2626;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#fee2e2,#fecaca)}
    .use-title{font-size:11px;color:#7f1d1d;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#991b1b;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#fca5a5;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#fca5a5;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
    .external-change{position:fixed;top:20px;right:20px;background:#1e293b;border:3px solid#dc2626;border-radius:12px;padding:16px;z-index:100}
    .external-title{color:#fca5a5;font-size:12px;font-weight:700;margin-bottom:8px}
    .external-value{font-size:24px;color:#dc2626;font-family:'Consolas',monospace;font-weight:700}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',rose:'#dc2626'};
    const LINE_MAP = {
      1:{step:1,text:'#include <stdio.h>',color:'#7c3aed'},
      2:{step:2,text:'volatile int sensor_value;',color:'#dc2626'},
      3:{step:3,text:'// 硬件中断可能修改此值',color:'#f87171'},
      4:{step:4,text:'int main() {',color:'#dc2626'},
      5:{step:5,text:'  printf("%d\\n", sensor_value);',color:'#fca5a5'},
      6:{step:6,text:'  return 0; }',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，volatile 告诉编译器变量可能被外部因素修改',
      2:'定义 volatile 变量 sensor_value，硬件中断可能随时修改它',
      3:'volatile 禁止编译器优化，每次访问都从内存重新读取',
      4:'在 main 函数中使用 volatile 变量，确保读取最新值',
      5:'printf 读取 sensor_value，volatile 保证不从缓存读取',
      6:'程序结束，volatile 用于硬件寄存器、中断服务、多线程共享'
    };
    const accesses = [
      {type:'读取操作',value:'从内存读取',desc:'不缓存'},
      {type:'写入操作',value:'立即写入',desc:'不优化'},
      {type:'编译器',value:'禁止优化',desc:'强制访问'}
    ];
    const memoryOps = [
      {op:'声明变量',result:'volatile int sensor'},
      {op:'外部修改',result:'硬件中断修改值'},
      {op:'读取操作',result:'每次从内存读取'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',volatile:'M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2zm0 2.8L17.2 10H6.8L12 4.8zM6 18v-6h4v6H6zm8 0v-6h4v6h-4z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeAccess,setActiveAccess] = useState(-1);
      const [memoryIdx,setMemoryIdx] = useState(-1);
      const [externalValue,setExternalValue] = useState(42);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);

      // Simulate external value changes
      useEffect(() => {
        if(step >= 2 && step < 6) {
          const interval = setInterval(() => {
            setExternalValue(prev => (prev + Math.floor(Math.random() * 20)) % 100);
          }, 2000);
          return () => clearInterval(interval);
        }
      }, [step]);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveAccess(-1);
          setMemoryIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveAccess(0);
          setMemoryIdx(0);
        } else if(step === 3) {
          setActiveAccess(1);
          setMemoryIdx(1);
        } else if(step === 4) {
          setActiveAccess(2);
        } else if(step === 5) {
          setMemoryIdx(2);
          setTerminalLines([`sensor_value = ${externalValue}`]);
        } else if(step === 6) {
          // Complete
        }
      }, [step, externalValue]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveAccess(-1);
        setMemoryIdx(-1);
        setTerminalLines([]);
        setExternalValue(42);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="external-change">
            <div className="external-title">⚡ 外部中断修改</div>
            <div className="external-value">{externalValue}</div>
          </div>
          <div className="header">
            <h1>volatile 易失型限定符 - C 语言可视化</h1>
            <p>volatile | 禁止优化 | 外部修改</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.rose,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                volatile_example.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.volatile} size={22} />
                volatile 可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">volatile int</span>
                  <span className="var-type">Volatile Qualifier</span>
                </div>
                <div className="volatile-container">
                  <div className={`volatile-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#7f1d1d',marginBottom:12}}>volatile 访问特性</div>
                    {accesses.map((a, idx) => (
                      <div key={a.type} className="access-row">
                        <span className="access-label">{a.type}</span>
                        <div className={`volatile-box-inner ${step >= 2 + idx && activeAccess === idx ? 'active' : ''}`}>
                          <div className="access-type">{a.desc}</div>
                          <div className="access-value">{a.value}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="memory-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>内存操作</div>
                  {memoryOps.map((m, idx) => (
                    <div key={idx} className={`memory-row ${step >= 2 + idx && memoryIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="memory-name">{m.op}</span>
                      <span className="memory-value">{m.result}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">volatile</div>
                    <div className="compare-code">每次从内存读</div>
                    <div className="compare-desc">不缓存</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">普通变量</div>
                    <div className="compare-code">可能用寄存器</div>
                    <div className="compare-desc">编译器优化</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">优点</div>
                    <div className="compare-code">实时性</div>
                    <div className="compare-desc">保证最新值</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">代价</div>
                    <div className="compare-code">性能开销</div>
                    <div className="compare-desc">无优化</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">硬件寄存器映射</div>
                    <div className="use-example">volatile uint32_t * const REG = 0x40000000;</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">中断服务程序共享变量</div>
                    <div className="use-example">volatile bool data_ready;</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">多线程共享标志</div>
                    <div className="use-example">volatile int flag;</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">传感器数据</div>
                    <div className="use-example">volatile int sensor_value;</div>
                  </div>
                </div>
              </div>
              {step >= 5 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.rose}}>易失变量</strong>
                <p style={{marginTop:8,color:'#78350f'}}>可能被外部修改</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>禁止优化</strong>
                <p style={{marginTop:8,color:'#78350f'}}>每次从内存读取</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>使用场景</strong>
                <p style={{marginTop:8,color:'#78350f'}}>硬件、中断、多线程</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>注意事项</strong>
                <p style={{marginTop:8,color:'#78350f'>性能开销，仅必要时使用</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
