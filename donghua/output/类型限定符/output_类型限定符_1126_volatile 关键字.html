<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1126 - volatile 关键字 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(236, 72, 153, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(236, 72, 153, 0.2); border-left: 3px solid #ec4899; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#ec4899', primaryLight: '#f472b6',
      secondary: '#db2777', secondaryLight: '#f472b6',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== volatile 关键字 =====
// 告诉编译器变量可能被意外修改，禁止优化

// 1. 内存映射寄存器
#define GPIO_INPUT  (*(volatile uint32_t*)0x40020000)
#define GPIO_OUTPUT (*(volatile uint32_t*)0x40020004)

// 2. 中断服务程序共享变量
volatile uint8_t rx_flag = 0;  // 接收标志

void UART_IRQHandler(void) {
  rx_flag = 1;  // 中断中修改
}

// 主循环中检查
while (1) {
  if (rx_flag) {  // 每次重新读取，不使用缓存值
    rx_flag = 0;
    process_data();
  }
}

// 3. 多线程共享变量
volatile bool stop_flag = false;

// 不使用 volatile 的问题:
// 编译器可能优化为只读一次，进入死循环!`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十六题，volatile 关键字。",
      2: "volatile 告诉编译器变量可能被程序之外的因素修改，每次访问都必须从内存重新读取。",
      3: "内存映射寄存器是典型的 volatile 场景，硬件可能随时改变其值。",
      4: "中断服务程序中修改的共享变量必须声明为 volatile，否则主程序可能看不到变化。",
      5: "没有 volatile 时，编译器可能缓存变量值到寄存器，导致读取到过时的值。",
      6: "volatile 变量每次访问都生成内存读取指令，确保获取最新值。",
      7: "多线程或多核环境中，共享标志位必须使用 volatile 保证可见性。",
      8: "volatile 应用：内存映射寄存器、中断共享变量、多线程标志位、硬件状态寄存器。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-pink-900/50 via-rose-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-pink-700/50">
            <h1 className="text-3xl font-bold text-pink-400 mb-2">1126 - volatile 关键字</h1>
            <p className="text-pink-300 text-sm">禁止编译器优化 / 内存可见性 / 中断共享</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 6) ||
                    (step === 3 && i >= 4 && i <= 5) ||
                    (step === 4 && i >= 9 && i <= 16) ||
                    (step === 5 && i >= 9 && i <= 10) ||
                    (step === 6 && i >= 9 && i <= 10) ||
                    (step === 7 && i >= 20 && i <= 20)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
              <h2 className="text-lg font-semibold text-pink-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">💡 volatile</p>
                    <p className="text-xs text-gray-400">volatile 是类型限定符，告诉编译器变量可能被程序控制流之外的因素修改，必须禁用相关优化。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">volatile 的作用</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-pink-400">volatile uint32_t status;</div>
                      </div>
                      <div className="text-gray-400 text-xs">
                        编译器必须：<br/>
                        • 每次访问都从内存读取<br/>
                        • 不缓存到寄存器<br/>
                        • 不删除"冗余"读取
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">内存映射寄存器</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-pink-400">#define GPIO_IN (*(volatile uint32_t*)0x40020000)</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                          <div className="text-gray-400 text-xs">CPU</div>
                          <div className="text-pink-400 text-xs">读取</div>
                        </div>
                        <div className="p-2 bg-rose-900/20 rounded border border-rose-500/30">
                          <div className="text-gray-400 text-xs">GPIO 硬件</div>
                          <div className="text-rose-400 text-xs">随时改变</div>
                        </div>
                      </div>
                      <div className="text-pink-400 text-center text-xs">
                        硬件寄存器值由外部硬件决定，CPU 无法控制
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">中断共享变量</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-purple-400 text-xs">主程序</div>
                          <div className="text-xs text-gray-400">while(1) {'{'}</div>
                          <div className="text-xs text-pink-400">if(rx_flag)</div>
                          <div className="text-xs text-gray-400">{'}'}</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-orange-400 text-xs">中断服务</div>
                          <div className="text-xs text-gray-400">void IRQ() {'{'}</div>
                          <div className="text-xs text-pink-400">rx_flag = 1;</div>
                          <div className="text-xs text-gray-400">{'}'}</div>
                        </div>
                      </div>
                      <div className="text-pink-400 text-center text-xs">
                        中断可在任何时刻修改 rx_flag
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">❌ 没有 volatile 的问题</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                        <div className="text-red-400">uint8_t flag = 0;</div>
                        <div className="text-gray-500 text-xs">// 编译器优化:</div>
                        <div className="text-gray-400 text-xs">while(1) {'{'}</div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;register r = flag; <span className="text-orange-400">// 只读一次!</span></div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;if(r) break; <span className="text-orange-400">// 永远为 0!</span></div>
                        <div className="text-gray-400 text-xs">{'}'}</div>
                        <div className="text-red-400 text-xs mt-1">❌ 死循环!</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">✅ 使用 volatile</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400">volatile uint8_t flag = 0;</div>
                        <div className="text-gray-500 text-xs">// 编译器生成:</div>
                        <div className="text-gray-400 text-xs">while(1) {'{'}</div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;LOAD r, [flag_addr]; <span className="text-green-400">// 每次重新加载</span></div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;if(r) break; <span className="text-green-400">// 能看到中断修改</span></div>
                        <div className="text-gray-400 text-xs">{'}'}</div>
                        <div className="text-green-400 text-xs mt-1">✅ 正常工作!</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-pink-600/20 to-rose-600/20 rounded-lg border border-pink-500/30">
                    <p className="text-pink-300 text-sm font-medium mb-2">多线程共享变量</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-pink-400">volatile bool stop_flag = false;</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                          <div className="text-purple-400 text-xs">线程 A</div>
                          <div className="text-xs text-gray-400">while(!stop_flag)</div>
                          <div className="text-xs text-gray-400">process();</div>
                        </div>
                        <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                          <div className="text-pink-400 text-xs">线程 B</div>
                          <div className="text-xs text-pink-400">stop_flag = true;</div>
                          <div className="text-xs text-gray-400">// 通知停止</div>
                        </div>
                      </div>
                      <div className="text-pink-400 text-center text-xs">
                        volatile 保证线程 B 的修改对线程 A 可见
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-pink-900/20 rounded-lg border border-pink-500/30">
                      <p className="text-pink-300 text-xs font-medium mb-2">📋 应用场景总结</p>
                      <ul className="text-xs text-gray-400 space-y-2">
                        <li>• <span className="text-pink-400">内存映射寄存器</span>: 硬件状态寄存器、数据寄存器</li>
                        <li>• <span className="text-rose-400">中断共享变量</span>: ISR 和主程序共享的标志位</li>
                        <li>• <span className="text-fuchsia-400">多线程共享</span>: 线程间通信标志</li>
                        <li>• <span className="text-purple-400">DMA 缓冲区</span>: DMA 引擎修改的内存区域</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> volatile 禁止编译器优化访问
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 中断共享变量必须 volatile
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-pink-900/30 text-pink-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 保证多线程可见性
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
                <h2 className="text-lg font-semibold text-pink-400 mb-3">注意事项</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">不是原子操作</p>
                    <p className="text-gray-400">volatile 不保证原子性，大变量仍需临界区保护</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">性能影响</p>
                    <p className="text-gray-400">每次访问都读内存，比寄存器缓存慢</p>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">仅限必要时</p>
                    <p className="text-gray-400">滥用 volatile 会导致代码效率降低</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-pink-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-pink-600 hover:bg-pink-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-pink-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-pink-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-pink-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-pink-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
