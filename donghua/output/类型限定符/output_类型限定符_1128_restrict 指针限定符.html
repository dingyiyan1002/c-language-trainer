<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1128 - restrict 指针限定符 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(168, 85, 247, 0.2); border-left: 3px solid #a855f7; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#a855f7', primaryLight: '#c084fc',
      secondary: '#9333ea', secondaryLight: '#c084fc',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== restrict 指针限定符 (C99) =====
// 告诉编译器：该指针是访问数据的唯一途径，允许激进优化

// 无 restrict: 编译器必须假设可能重叠
void copy_no_opt(int* a, int* b, int n) {
  for(int i = 0; i < n; i++) {
    a[i] = b[i] + 1;  // 每次都要重新加载 a[i]
  }
}

// 有 restrict: 编译器知道不重叠，可优化
void copy_opt(int* restrict a, int* restrict b, int n) {
  for(int i = 0; i < n; i++) {
    a[i] = b[i] + 1;  // 可缓存 a[i]，批量加载 b
  }
}

// 典型应用：DSP 运算、memcpy、向量处理
void vec_add(float* restrict out,
             const float* restrict in1,
             const float* restrict in2,
             int n) {
  for(int i = 0; i < n; i++) {
    out[i] = in1[i] + in2[i];  // 可 SIMD 优化!
  }
}`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十八题，restrict 指针限定符。",
      2: "restrict 是 C99 引入的指针限定符，告诉编译器该指针是访问数据的唯一途径。",
      3: "没有 restrict 时，编译器必须假设指针可能指向同一内存，不能做激进优化。",
      4: "有 restrict 后，编译器知道指针不重叠，可以缓存值、重排访问顺序、使用 SIMD。",
      5: "restrict 只影响编译器优化，不改变运行时行为，是纯粹的优化提示。",
      6: "典型应用是 DSP 运算、内存拷贝、向量处理等数据并行场景。",
      7: "向量加法函数使用三个 restrict 指针，编译器可生成高效的 SIMD 指令。",
      8: "注意：错误使用 restrict 会导致未定义行为，必须确保指针真的不重叠。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-purple-900/50 via-fuchsia-900/50 to-pink-900/50 rounded-xl p-6 mb-4 border border-purple-700/50">
            <h1 className="text-3xl font-bold text-purple-400 mb-2">1128 - restrict 指针限定符</h1>
            <p className="text-purple-300 text-sm">C99 优化提示 / 指针别名消除 / SIMD 优化</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
              <h2 className="text-lg font-semibold text-purple-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 4) ||
                    (step === 3 && i >= 7 && i <= 11) ||
                    (step === 4 && i >= 14 && i <= 18) ||
                    (step === 5 && i >= 4 && i <= 18) ||
                    (step === 6 && i >= 21 && i <= 21) ||
                    (step === 7 && i >= 22 && i <= 28)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
              <h2 className="text-lg font-semibold text-purple-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">💡 restrict</p>
                    <p className="text-xs text-gray-400">restrict 是 C99 引入的指针限定符，用于消除指针别名 (alias)，允许编译器进行更激进的优化。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">restrict 语义</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-purple-400">int* restrict ptr;</div>
                      </div>
                      <div className="text-purple-400 text-center text-xs">
                        "通过 ptr 访问的数据，不会通过其他指针访问"<br/>
                        编译器可以安全地缓存、重排、向量化
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">❌ 无 restrict 的问题</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                        <div className="text-gray-400 text-xs">void copy(int* a, int* b, int n) {'{'}</div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;for(int i = 0; i &lt; n; i++) {'{'}</div>
                        <div className="text-orange-400 text-xs">&nbsp;&nbsp;&nbsp;&nbsp;a[i] = b[i] + 1;</div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;{'}'}</div>
                        <div className="text-gray-400 text-xs">{'}'}</div>
                      </div>
                      <div className="text-orange-400 text-center text-xs">
                        如果 a 和 b 重叠，每次迭代都必须重新加载 a[i]
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">✅ 有 restrict 的优化</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-gray-400 text-xs">void copy(int* restrict a, int* restrict b, int n) {'{'}</div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;for(int i = 0; i &lt; n; i++) {'{'}</div>
                        <div className="text-green-400 text-xs">&nbsp;&nbsp;&nbsp;&nbsp;a[i] = b[i] + 1;</div>
                        <div className="text-gray-400 text-xs">&nbsp;&nbsp;{'}'}</div>
                        <div className="text-gray-400 text-xs">{'}'}</div>
                      </div>
                      <div className="text-green-400 text-center text-xs">
                        编译器知道 a 和 b 不重叠，可以：<br/>
                        • 缓存 a[i] 的地址<br/>
                        • 批量加载 b 的数据<br/>
                        • 使用 SIMD 指令
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">优化提示，非运行时约束</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-purple-400">restrict 不影响程序行为</div>
                        <div className="text-gray-400 text-xs">只告诉编译器可以做什么优化</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2 mt-2">
                        <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                          <div className="text-blue-400 text-xs">正确使用</div>
                          <div className="text-gray-400 text-xs">性能提升</div>
                        </div>
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs">错误使用</div>
                          <div className="text-gray-400 text-xs">未定义行为</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">典型应用场景</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-3 gap-2">
                        <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                          <div className="text-purple-400 text-xs">DSP 运算</div>
                          <div className="text-gray-400 text-xs">FIR、IIR 滤波</div>
                        </div>
                        <div className="p-2 bg-fuchsia-900/20 rounded border border-fuchsia-500/30">
                          <div className="text-fuchsia-400 text-xs">内存拷贝</div>
                          <div className="text-gray-400 text-xs">memcpy 实现</div>
                        </div>
                        <div className="p-2 bg-pink-900/20 rounded border border-pink-500/30">
                          <div className="text-pink-400 text-xs">向量处理</div>
                          <div className="text-gray-400 text-xs">SIMD 优化</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">向量加法示例</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-purple-400">void vec_add(</div>
                        <div className="text-purple-400">&nbsp;&nbsp;float* restrict out,</div>
                        <div className="text-fuchsia-400">&nbsp;&nbsp;const float* restrict in1,</div>
                        <div className="text-pink-400">&nbsp;&nbsp;const float* restrict in2,</div>
                        <div>&nbsp;&nbsp;int n) {'{'}</div>
                        <div>&nbsp;&nbsp;for(int i = 0; i &lt; n; i++)</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;out[i] = in1[i] + in2[i];</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-green-400 text-center text-xs">
                        三个 restrict 指针告诉编译器可以安全使用 SIMD!
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-purple-900/20 rounded-lg border border-purple-500/30">
                      <p className="text-purple-300 text-xs font-medium mb-2">📋 注意事项</p>
                      <ul className="text-xs text-gray-400 space-y-2">
                        <li>• <span className="text-red-400">未定义行为</span>: 如果指针实际重叠，程序行为未定义</li>
                        <li>• <span className="text-orange-400">仅 C99+</span>: C89/C++ 不支持 (C++ 无 restrict)</li>
                        <li>• <span className="text-blue-400">编译器依赖</span>: 不同编译器优化程度不同</li>
                        <li>• <span className="text-green-400">性能提升</span>: 循环密集计算场景可提升 2-4 倍</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
                <h2 className="text-lg font-semibold text-purple-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-purple-900/30 text-purple-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> restrict 消除指针别名假设
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-purple-900/30 text-purple-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 允许编译器激进优化
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 8 ? 'bg-purple-900/30 text-purple-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 错误使用导致未定义行为
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
                <h2 className="text-lg font-semibold text-purple-400 mb-3">编译器扩展</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">GCC / Clang</p>
                    <pre className="text-gray-400 font-mono text-xs">__restrict__ 或 __restrict</pre>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">MSVC</p>
                    <pre className="text-gray-400 font-mono text-xs">__restrict</pre>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">C99 标准</p>
                    <pre className="text-gray-400 font-mono text-xs">restrict (无下划线)</pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-purple-600 hover:bg-purple-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-purple-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-purple-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-purple-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-purple-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
