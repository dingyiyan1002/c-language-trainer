<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1130 - alignof 和 alignas | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(99, 102, 241, 0.2); border-left: 3px solid #6366f1; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#6366f1', primaryLight: '#818cf8',
      secondary: '#4f46e5', secondaryLight: '#818cf8',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== alignof 和 alignas (C11) =====
// 查询和指定内存对齐要求

// 1. alignof: 查询类型的对齐要求
printf("%zu\\n", alignof(int));        // 4
printf("%zu\\n", alignof(double));     // 8
printf("%zu\\n", alignof(max_align_t));// 16

// 2. alignas: 指定变量/类型的对齐
alignas(16) int simd_data[4];  // 16 字节对齐，用于 SIMD

// 3. 结构体对齐
struct alignas(16) Vec4 {
  float x, y, z, w;  // 确保 16 字节对齐
};

// 4. 实际应用：DMA 缓冲区需要特定对齐
alignas(32) uint8_t dma_buffer[1024];  // DMA 缓存行对齐

// 5. 动态分配对齐内存
void* aligned_malloc(size_t size, size_t align) {
  void* ptr = aligned_alloc(align, size);
  return ptr;
}`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百三十题，alignof 和 alignas。",
      2: "alignof 是 C11 引入的运算符，查询类型的对齐要求，结果是 size_t 类型的编译时常量。",
      3: "基本类型有自然对齐，int 通常 4 字节对齐，double 通常 8 字节对齐。",
      4: "alignas 允许指定变量或结构体的对齐要求，用于 SIMD、DMA 等需要特殊对齐的场景。",
      5: "结构体使用 alignas 可以确保整体对齐，便于向量指令或硬件 DMA 访问。",
      6: "DMA 缓冲区通常需要缓存行对齐 (32 或 64 字节)，避免缓存一致性问题和伪共享。",
      7: "C11 提供 aligned_alloc 函数分配对齐内存，C++17 有 aligned_new。",
      8: "应用：SIMD 向量运算、DMA 数据传输、硬件加速器接口、无锁并发数据结构。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-indigo-900/50 via-violet-900/50 to-purple-900/50 rounded-xl p-6 mb-4 border border-indigo-700/50">
            <h1 className="text-3xl font-bold text-indigo-400 mb-2">1130 - alignof 和 alignas</h1>
            <p className="text-indigo-300 text-sm">C11 内存对齐 / SIMD / DMA 缓冲区</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
              <h2 className="text-lg font-semibold text-indigo-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 7) ||
                    (step === 3 && i >= 5 && i <= 6) ||
                    (step === 4 && i >= 10 && i <= 14) ||
                    (step === 5 && i >= 10 && i <= 14) ||
                    (step === 6 && i >= 17 && i <= 17) ||
                    (step === 7 && i >= 20 && i <= 23)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
              <h2 className="text-lg font-semibold text-indigo-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">💡 alignof / alignas</p>
                    <p className="text-xs text-gray-400">C11 引入的内存对齐控制机制，alignof 查询对齐要求，alignas 指定对齐方式，用于 SIMD、DMA 等场景。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">alignof 查询对齐</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-indigo-400">alignof(char)   = 1</div>
                        <div className="text-indigo-400">alignof(short)  = 2</div>
                        <div className="text-indigo-400">alignof(int)    = 4</div>
                        <div className="text-indigo-400">alignof(double) = 8</div>
                      </div>
                      <div className="text-indigo-400 text-center text-xs">
                        每个类型有自然对齐要求，通常是自身大小的约数
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">自然对齐原理</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-0">
                        <div className="w-32 h-8 bg-indigo-600/50 border border-indigo-400 flex items-center justify-center text-xs">
                          <span className="text-white">int (4 字节)</span>
                        </div>
                        <div className="text-gray-400 text-xs ml-2">
                          地址必须是 4 的倍数<br/>
                          如：0x1000, 0x1004, 0x1008
                        </div>
                      </div>
                      <div className="flex items-center gap-0">
                        <div className="w-32 h-8 bg-violet-600/50 border border-violet-400 flex items-center justify-center text-xs">
                          <span className="text-white">double (8 字节)</span>
                        </div>
                        <div className="text-gray-400 text-xs ml-2">
                          地址必须是 8 的倍数<br/>
                          如：0x1000, 0x1008
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">alignas 指定对齐</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-indigo-400">alignas(16) int simd_data[4];</div>
                      </div>
                      <div className="flex items-center gap-0">
                        <div className="w-16 h-8 bg-gray-700/50 border border-gray-500"></div>
                        <div className="w-16 h-8 bg-gray-700/50 border border-gray-500"></div>
                        <div className="w-16 h-8 bg-indigo-600/50 border border-indigo-400 flex items-center justify-center text-xs">
                          <span className="text-white">16 字节对齐</span>
                        </div>
                        <div className="w-16 h-8 bg-gray-700/50 border border-gray-500"></div>
                      </div>
                      <div className="text-indigo-400 text-center text-xs">
                        simd_data 的地址是 16 的倍数，可用于 SIMD 指令
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">结构体对齐</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-indigo-400">struct alignas(16) Vec4 {'{'}</div>
                        <div>&nbsp;&nbsp;float x, y, z, w;</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="grid grid-cols-4 gap-1">
                        <div className="h-8 bg-indigo-600/50 border border-indigo-400 flex items-center justify-center text-xs">x</div>
                        <div className="h-8 bg-violet-600/50 border border-violet-400 flex items-center justify-center text-xs">y</div>
                        <div className="h-8 bg-purple-600/50 border border-purple-400 flex items-center justify-center text-xs">z</div>
                        <div className="h-8 bg-pink-600/50 border border-pink-400 flex items-center justify-center text-xs">w</div>
                      </div>
                      <div className="text-indigo-400 text-center text-xs">
                        整个结构体 16 字节对齐，可一条 SIMD 指令加载
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">DMA 缓冲区对齐</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-indigo-400">alignas(32) uint8_t dma_buffer[1024];</div>
                      </div>
                      <div className="text-gray-400 text-xs">
                        DMA 通常需要缓存行对齐 (32/64 字节)：<br/>
                        • 避免缓存一致性问题和伪共享 (False Sharing)<br/>
                        • DMA 直接内存访问，绕过 CPU 缓存<br/>
                        • 某些 DMA 控制器要求硬件对齐
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">动态对齐分配</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-green-400">// C11 aligned_alloc</div>
                        <div>void* ptr = <span className="text-indigo-400">aligned_alloc(32, 1024)</span>;</div>
                        <div>free(ptr);</div>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-green-400">// POSIX posix_memalign</div>
                        <div>void* ptr;</div>
                        <div><span className="text-indigo-400">posix_memalign(&ptr, 32, 1024)</span>;</div>
                        <div>free(ptr);</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-indigo-900/20 rounded-lg border border-indigo-500/30">
                      <p className="text-indigo-300 text-xs font-medium mb-2">📋 应用场景</p>
                      <ul className="text-xs text-gray-400 space-y-2">
                        <li>• <span className="text-indigo-400">SIMD 优化</span>: SSE/AVX/NEON 需要 16/32 字节对齐</li>
                        <li>• <span className="text-violet-400">DMA 传输</span>: 缓存行对齐避免伪共享</li>
                        <li>• <span className="text-purple-400">硬件加速器</span>: 特定对齐要求的寄存器接口</li>
                        <li>• <span className="text-pink-400">无锁并发</span>: atomic 操作需要自然对齐</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
                <h2 className="text-lg font-semibold text-indigo-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-indigo-900/30 text-indigo-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> alignof 查询类型对齐要求
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-indigo-900/30 text-indigo-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> alignas 指定变量/结构体对齐
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-indigo-900/30 text-indigo-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 动态分配使用 aligned_alloc
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
                <h2 className="text-lg font-semibold text-indigo-400 mb-3">编译器支持</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30">
                    <p className="text-indigo-300 font-medium">C11 标准</p>
                    <pre className="text-gray-400 font-mono text-xs">alignas, alignof, aligned_alloc</pre>
                  </div>
                  <div className="p-2 bg-violet-900/20 rounded border border-violet-500/30">
                    <p className="text-violet-300 font-medium">GCC/Clang 扩展</p>
                    <pre className="text-gray-400 font-mono text-xs">__attribute__((aligned(16)))</pre>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">MSVC 扩展</p>
                    <pre className="text-gray-400 font-mono text-xs">__declspec(align(16))</pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-indigo-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-indigo-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-indigo-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-indigo-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
