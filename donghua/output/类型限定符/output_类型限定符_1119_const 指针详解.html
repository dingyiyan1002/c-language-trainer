<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1119 - const 指针详解 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(168, 85, 247, 0.2); border-left: 3px solid #a855f7; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#a855f7', primaryLight: '#c084fc',
      secondary: '#9333ea', secondaryLight: '#c084fc',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== const 与指针的四种组合 =====

int x = 10, y = 20;

// 1. const int* p 或 int const* p
const int* p1 = &x;  // 指向 const 的指针
// *p1 = 30;  // ❌ 错误：不能修改指向的值
p1 = &y;     // ✅ 正确：指针本身可变

// 2. int* const p
int* const p2 = &x;  // 指针本身是 const
*p2 = 30;    // ✅ 正确：可以修改值
// p2 = &y;  // ❌ 错误：指针本身不可变

// 3. const int* const p
const int* const p3 = &x;  // 双 const
// *p3 = 30;  // ❌ 错误
// p3 = &y;   // ❌ 错误

// 4. int* p (普通指针)
int* p4 = &x;
*p4 = 30;    // ✅ 都可以修改
p4 = &y;     // ✅`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十九题，const 指针详解。",
      2: "const int* p 是指向 const 的指针，不能通过指针修改值，但指针本身可以指向其他地方。",
      3: "p1 指向常量，*p1=30 会编译错误，但 p1=&y 合法。",
      4: "int* const p 是 const 指针，指针本身不能改变，但指向的值可以修改。",
      5: "p2 是常量指针，p2=&y 会编译错误，但*p2=30 合法。",
      6: "const int* const p 是双 const，指针和指向的值都不能修改。",
      7: "普通指针 int* p 没有任何限制，指针和值都可以修改。",
      8: "记忆口诀：const 在*前修饰值，在*后修饰指针，双 const 都不可变。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-purple-900/50 via-fuchsia-900/50 to-pink-900/50 rounded-xl p-6 mb-4 border border-purple-700/50">
            <h1 className="text-3xl font-bold text-purple-400 mb-2">1119 - const 指针详解</h1>
            <p className="text-purple-300 text-sm">四种组合 / 记忆技巧 / 使用场景</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
              <h2 className="text-lg font-semibold text-purple-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 5 && i <= 9) ||
                    (step === 3 && i >= 8 && i <= 9) ||
                    (step === 4 && i >= 11 && i <= 15) ||
                    (step === 5 && i >= 14 && i <= 15) ||
                    (step === 6 && i >= 17 && i <= 20) ||
                    (step === 7 && i >= 23 && i <= 26)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
              <h2 className="text-lg font-semibold text-purple-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">💡 const 与指针的组合</p>
                    <p className="text-xs text-gray-400">const 可以和指针组合成四种类型，const 的位置决定了指针本身还是指向的值不可变。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">类型 1：指向 const 的指针</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-purple-400">const int* p1 = &x;</div>
                        <div className="text-gray-500">// 或 int const* p1</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs">*p1 = 30;</div>
                          <div className="text-gray-500 text-xs">❌ 不能改值</div>
                        </div>
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs">p1 = &y;</div>
                          <div className="text-gray-500 text-xs">✅ 可以改指针</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">图解：指向 const 的指针</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-2">
                        <div className="w-16 text-right text-purple-400">p1</div>
                        <div className="w-4 h-4 bg-purple-600 rounded-full"></div>
                        <div className="w-8 h-0.5 bg-purple-400"></div>
                        <div className="flex-1 p-2 bg-gray-700/50 rounded">
                          <div className="text-xs">x = 10 (const 只读)</div>
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-16 text-right text-gray-500">p1</div>
                        <div className="w-4 h-4 bg-gray-600 rounded-full"></div>
                        <div className="w-8 h-0.5 bg-gray-400"></div>
                        <div className="flex-1 p-2 bg-gray-700/50 rounded">
                          <div className="text-xs">y = 20 (const 只读)</div>
                        </div>
                      </div>
                      <div className="text-gray-500 text-xs text-center">
                        p1 可以从 x 移动到 y，但不能修改 x 或 y 的值
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">类型 2：const 指针</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-purple-400">int* const p2 = &x;</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs">*p2 = 30;</div>
                          <div className="text-gray-500 text-xs">✅ 可以改值</div>
                        </div>
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs">p2 = &y;</div>
                          <div className="text-gray-500 text-xs">❌ 不能改指针</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">图解：const 指针</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-2">
                        <div className="w-16 text-right text-purple-400">p2 (const)</div>
                        <div className="w-4 h-4 bg-purple-600 rounded-full border-2 border-white"></div>
                        <div className="w-8 h-0.5 bg-purple-400"></div>
                        <div className="flex-1 p-2 bg-purple-900/30 rounded border border-purple-500/30">
                          <div className="text-xs">x = 10 → 30 (可修改)</div>
                        </div>
                      </div>
                      <div className="text-gray-500 text-xs text-center">
                        p2 被锁定指向 x，但可以修改 x 的值
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">类型 3：双 const</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-purple-400">const int* const p3 = &x;</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs">*p3 = 30;</div>
                          <div className="text-gray-500 text-xs">❌ 不能改值</div>
                        </div>
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs">p3 = &y;</div>
                          <div className="text-gray-500 text-xs">❌ 不能改指针</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-fuchsia-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">类型 4：普通指针</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-purple-400">int* p4 = &x;</div>
                      </div>
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs">*p4 = 30;</div>
                          <div className="text-gray-500 text-xs">✅ 可以改值</div>
                        </div>
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs">p4 = &y;</div>
                          <div className="text-gray-500 text-xs">✅ 可以改指针</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-purple-900/20 rounded-lg border border-purple-500/30">
                      <p className="text-purple-300 text-xs font-medium mb-2">📋 记忆技巧</p>
                      <table className="text-xs text-gray-400 w-full">
                        <thead><tr className="border-b border-purple-500/30"><th className="text-left py-1">类型</th><th className="text-left">读法</th><th className="text-left">可变性</th></tr></thead>
                        <tbody>
                          <tr><td className="py-1 font-mono">const int* p</td><td>指向 const 的指针</td><td>指针✅ 值❌</td></tr>
                          <tr><td className="py-1 font-mono">int* const p</td><td>const 指针</td><td>指针❌ 值✅</td></tr>
                          <tr><td className="py-1 font-mono">const int* const</td><td>双 const</td><td>都❌</td></tr>
                          <tr><td className="py-1 font-mono">int* p</td><td>普通指针</td><td>都✅</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
                <h2 className="text-lg font-semibold text-purple-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-purple-900/30 text-purple-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> const 在*前：值不可变，指针可变
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-purple-900/30 text-purple-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> const 在*后：指针不可变，值可变
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 6 ? 'bg-purple-900/30 text-purple-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 双 const：都不可变
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
                <h2 className="text-lg font-semibold text-purple-400 mb-3">使用场景</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">const int* p</p>
                    <p className="text-gray-400">函数参数：不修改传入数据</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">int* const p</p>
                    <p className="text-gray-400">固定缓冲区指针</p>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">const int* const p</p>
                    <p className="text-gray-400">查找表、常量数据</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-purple-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-purple-600 hover:bg-purple-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-purple-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-purple-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-purple-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-purple-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
