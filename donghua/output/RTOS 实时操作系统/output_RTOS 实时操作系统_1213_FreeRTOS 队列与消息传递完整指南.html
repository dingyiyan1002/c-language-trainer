                title: "队列基础概念",
                code: `// FreeRTOS 队列概述
// 队列是 FreeRTOS 最重要的 IPC 机制

// 队列特性:
// - 线程安全 (自动关中断)
// - 按值拷贝 (非指针传递)
// - FIFO (先进先出)
// - 可阻塞读写

// 队列创建
QueueHandle_t xQueue;
xQueue = xQueueCreate(

);

// 队列发送 (阻塞)
xQueueSend(xQueue, &data, tickstoWait);

xQueueReceive(xQueue, &data, tickstoWait);

// 队列发送 (中断)

                description: "队列是 FreeRTOS 的核心 IPC 机制，用于任务间和中断与任务间的消息传递。队列按值拷贝数据，不是传递指针，因此更安全但效率略低。队列是线程安全的，内部自动关中断保护。支持阻塞读写，当队列空时读操作阻塞，队列满时写操作阻塞。",

            {
                title: "队列创建与配置",
                code: `// 创建队列
// 参数 1: 队列长度 (最多存储的消息数)
// 参数 2: 每条消息的大小 (字节)
QueueHandle_t xQueue_Create(void) {
    // 创建长度为 10，消息大小为 32 字节的队列
    return xQueueCreate(10, 32);

// 静态创建 (不动态分配内存)

// 队列类型定义 (推荐)
typedef struct {

    uint8_t data[28];
    uint32_t timestamp;
} Message_t;

QueueHandle_t xMessageQueue;
xMessageQueue = xQueueCreate(20, sizeof(Message_t));

vQueueDelete(xQueue);
// 注意：不能有任务还在等待该队列`,
                description: "xQueueCreate 动态分配内存，xQueueCreateStatic 使用静态缓冲区。队列长度决定能缓存多少消息，消息大小决定每条消息的最大字节数。推荐使用结构体定义消息格式，包含类型、数据和时间戳字段。删除队列前必须确保没有任务在等待该队列。",

            {
                title: "队列发送与接收",
                code: `// 任务 A: 发送数据到队列
void vTaskSender(void *pvParameters) {
    Message_t msg;
    for(;;) {
        msg.type = SENSOR_DATA;
        msg.timestamp = xTaskGetTickCount();
        msg.data[0] = Read_Sensor();

        // 发送到队列 (阻塞 100ms)
        if(xQueueSend(xQueue, &msg, pdMS_TO_TICKS(100)) == pdPASS) {
            // 发送成功
        } else {
            // 队列满，发送失败
        }

        vTaskDelay(pdMS_TO_TICKS(50));
    }
}

// 任务 B: 从队列接收数据
void vTaskReceiver(void *pvParameters) {
    Message_t msg;
    for(;;) {
        // 阻塞等待数据 (portMAX_DELAY = 永久等待)
        if(xQueueReceive(xQueue, &msg, portMAX_DELAY) == pdPASS) {
            // 接收成功，处理消息
            Process_Message(msg.type, msg.data);
        }
    }
}

// 返回值:pdPASS=成功，errQUEUE_FULL=队列满，errQUEUE_EMPTY=队列空`,
                description: "xQueueSend 发送数据到队列尾，如果队列满则阻塞等待。xQueueReceive 从队列头读取数据，如果队列空则阻塞等待。阻塞时间用 Tick 表示，portMAX_DELAY 表示永久等待。发送/接收成功返回 pdPASS。队列满/空时返回相应错误码。",

            {
                title: "中断中使用队列",
                code: `// 中断中发送数据到队列
QueueHandle_t xISRQueue;

void UART_IRQHandler(void) {
    BaseType_t xHigherPriorityTaskWoken = pdFALSE;
    uint8_t data = UART1->DR;

    // 从中断发送数据到队列
    xQueueSendFromISR(xISRQueue, &data, &xHigherPriorityTaskWoken);

    // 如果接收任务优先级更高，立即切换
    portYIELD_FROM_ISR(xHigherPriorityTaskWoken);
}

// 任务接收中断数据
void vTaskProcessISR(void *pvParameters) {
    uint8_t data;
    for(;;) {
        // 阻塞等待中断数据
        xQueueReceive(xISRQueue, &data, portMAX_DELAY);

        // 处理数据
        Process_UART_Data(data);
    }
}

// 注意:
// 1. 中断中必须用 FromISR 版本 API

if(xQueueSend(xQueue, &data, 0) == pdPASS) {

} else {

} else {

}

typedef enum {
    CMD_LED_ON,
    CMD_LED_OFF,
    CMD_MOTOR_SET,
    CMD_SENSOR_READ
} CommandType;

typedef struct {
    CommandType cmd;
    uint32_t param;
} Command_t;

QueueHandle_t xCommandQueue;

// 命令发送任务 (如 CLI、网络)
void vTaskCommandSend(void *pvParameters) {
    Command_t cmd;
    for(;;) {
        // 解析用户输入
        cmd.cmd = CMD_LED_ON;
        cmd.param = 1;

        // 发送命令
        xQueueSend(xCommandQueue, &cmd, portMAX_DELAY);
    }
}

// 命令执行任务
void vTaskCommandExec(void *pvParameters) {
    Command_t cmd;
    for(;;) {
        // 等待命令
        xQueueReceive(xCommandQueue, &cmd, portMAX_DELAY);

        // 分发执行
        switch(cmd.cmd) {
            case CMD_LED_ON: LED_On(cmd.param); break;
            case CMD_LED_OFF: LED_Off(cmd.param); break;
            case CMD_MOTOR_SET: Motor_Set(cmd.param); break;
            case CMD_SENSOR_READ: Sensor_Read(); break;
        }
    }
}`,
                description: "命令队列模式将命令请求与执行分离。发送任务 (CLI、网络、按键等) 将命令发送到队列，执行任务按顺序处理命令。这种模式实现解耦，多个命令源可以共享同一个执行器。命令结构体包含命令类型和参数，便于扩展。",
                highlight: "命令队列实现解耦，多个命令源共享一个执行器"
            },
            {
                title: "队列应用：数据缓冲",
                code: `// 数据缓冲队列 (如串口接收)

#define RX_BUFFER_SIZE  64
typedef uint8_t RxByte_t;

QueueHandle_t xRxQueue;

// 中断接收串口数据
void USART1_IRQHandler(void) {
    BaseType_t xHigherPriorityTaskWoken = pdFALSE;

    while(USART1->SR & USART_SR_RXNE) {
        uint8_t data = USART1->DR;

        // 发送到队列 (可能失败，队列满时丢弃)
        xQueueSendFromISR(xRxQueue, &data, &xHigherPriorityTaskWoken);
    }

    portYIELD_FROM_ISR(xHigherPriorityTaskWoken);
}

// 数据处理任务
void vTaskProcessRx(void *pvParameters) {
    uint8_t data;
    for(;;) {
        // 阻塞等待数据
        xQueueReceive(xRxQueue, &data, portMAX_DELAY);

        // 批量处理 (提高效率)
        uint8_t batch[32];
        uint8_t count = 0;
        batch[count++] = data;

        // 读取队列中剩余数据
        while(count < 32 && xQueueReceive(xRxQueue, &batch[count], 0) == pdPASS) {
            count++;
        }

        // 处理批量数据
        Process_Rx_Batch(batch, count);
    }
}`,
                description: "队列用作数据缓冲区，中断接收数据后发送到队列，处理任务从队列读取并处理。批量处理模式提高 CPU 效率：接收到一个数据后，继续读取队列中所有可用数据，一次性处理。队列满时新数据会被丢弃，适合允许丢包的应用 (如串口流)。",

// 队列优势:
// 1. 传递实际数据 (不只是状态)

        function App() {

                        <h3 className="text-sm font-bold text-green-400 mb-3">IPC 选择指南</h3>
                        <div className="grid grid-cols-2 gap-2">
                            {options.map((o, i) => (
                                <div key={i} className={`${o.color} p-2 rounded text-center`}>
                                    <div className="text-xs opacity-75">{o.name}</div>
                                    <div className="text-sm font-bold">{o.choice}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4">
                    {/* 头部 */}
                    <div className="max-w-7xl mx-auto mb-4">
                        <div className="flex justify-between items-center mb-2">
                            <h1 className="text-xl font-bold text-amber-400">
                                1213 - FreeRTOS 队列与消息传递完整指南
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => setIsPlaying(!isPlaying)} className="px-3 py-1 bg-blue-600 rounded hover:bg-blue-700 text-sm">
                                    {isPlaying ? '暂停' : '播放'}
                                </button>
                                <button onClick={() => setShowCode(!showCode)} className="px-3 py-1 bg-purple-600 rounded hover:bg-purple-700 text-sm">
                                    {showCode ? '隐藏代码' : '显示代码'}
                                </button>
                            </div>
                        </div>

                        {/* 进度条 */}
                        <div className="flex gap-1 mb-4">
                            {STEPS.map((_, i) => (
                                <button
                                    key={i}
                                    onClick={() => setCurrentStep(i)}
                                    className={`flex-1 h-2 rounded transition-all ${
                                        i === currentStep ? 'bg-amber-500 scale-110' :
                                        i < currentStep ? 'bg-amber-700' : 'bg-gray-600'
                                    }`}
                                />
                            ))}
                        </div>
                    </div>

                    {/* 主内容区 - 三列布局 */}
                    <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
                        {/* 左列：代码 */}
                        {showCode && (
                            <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                                <h2 className="text-sm font-bold text-amber-400 mb-2">
                                    {STEPS[currentStep].title}
                                </h2>
                                <pre className="text-xs text-gray-300 overflow-x-auto whitespace-pre-wrap bg-gray-900 p-3 rounded">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                        )}

                        {/* 中列：可视化动画 */}
                        <div className={`${showCode ? 'col-span-1' : 'col-span-2'} space-y-4`}>
                            <QueueVisual />
                            <div className="grid grid-cols-2 gap-4">
                                {currentStep >= 2 ? <OperationsVisual /> : <CommandQueueVisual />}
                                {currentStep >= 7 ? <SelectionGuide /> : <div className="bg-gray-800 rounded-lg p-4"><h3 className="text-sm font-bold text-gray-400 mb-2">等待下一步...</h3></div>}
                            </div>
                        </div>

                        {/* 右列：说明 */}
                        <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                            <h3 className="text-sm font-bold text-blue-400 mb-2">说明</h3>
                            <p className="text-xs text-gray-300 leading-relaxed mb-3">
                                {STEPS[currentStep].description}
                            </p>
                            <div className="bg-yellow-900/30 border border-yellow-600/50 rounded p-2">
                                <p className="text-xs text-yellow-300">
                                    <span className="font-bold">💡 重点:</span> {STEPS[currentStep].highlight}
                                </p>
                            </div>

                            {/* 导航按钮 */}
                            <div className="flex gap-2 mt-4">
                                <button
                                    onClick={() => setCurrentStep(Math.max(0, currentStep - 1))}
                                    disabled={currentStep === 0}
                                    className="flex-1 py-2 bg-gray-700 rounded hover:bg-gray-600 disabled:opacity-50 text-xs"
                                >
                                    ← 上一步
                                </button>
                                <button
                                    onClick={() => setCurrentStep(Math.min(STEPS.length - 1, currentStep + 1))}
                                    disabled={currentStep === STEPS.length - 1}
                                    className="flex-1 py-2 bg-amber-600 rounded hover:bg-amber-500 disabled:opacity-50 text-xs"
                                >
                                    下一步 →
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 底部摘要 */}
                    <div className="max-w-7xl mx-auto mt-4 bg-gray-800 rounded-lg p-4">
                        <h3 className="text-sm font-bold text-amber-400 mb-2">FreeRTOS 队列核心要点</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-amber-400 font-bold">按值拷贝</span>
                                <p className="text-gray-400 mt-1">安全传递数据</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-green-400 font-bold">阻塞读写</span>
                                <p className="text-gray-400 mt-1">高效任务同步</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-blue-400 font-bold">中断安全</span>
                                <p className="text-gray-400 mt-1">FromISR API</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-purple-400 font-bold">命令模式</span>
                                <p className="text-gray-400 mt-1">解耦请求执行</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
