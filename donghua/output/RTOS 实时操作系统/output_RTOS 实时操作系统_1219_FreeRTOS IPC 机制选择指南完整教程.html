<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeRTOS IPC 机制选择指南完整教程 - 可视化动画教程</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes flow { 0% { transform: translateX(0); } 100% { transform: translateX(20px); } }
        @keyframes highlight { 0%, 100% { background-color: #ec4899; } 50% { background-color: #f472b6; } }
        @keyframes select { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes compare { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes recommend { 0% { transform: translateY(0); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0); } }

        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-blink { animation: blink 1s linear infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        .animate-flow { animation: flow 1.5s ease-in-out infinite; }
        .animate-highlight { animation: highlight 2s ease-in-out infinite; }
        .animate-select { animation: select 0.5s ease-in-out; }
        .animate-compare { animation: compare 2s ease-in-out infinite; }
        .animate-recommend { animation: recommend 1.5s ease-in-out infinite; }

        .ipc-card { transition: all 0.3s ease; }
        .ipc-card:hover { transform: translateY(-5px); }

        * { font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-900">
    <div id="root"></div>
    <script type="text/babel">
        const COLOR_MAP = {
            primary: '#ec4899',
            secondary: '#f472b6',
            accent: '#f9a8d4',
            highlight: '#fbcfe8',
            text: '#fce7f3',
            bg: '#9d174d'
        };

        const STEPS = [
            { title: "IPC 机制概览", subtitle: "6 种进程间通信方式" },
            { title: "二值信号量", subtitle: "同步与事件通知" },
            { title: "计数信号量", subtitle: "资源计数与访问控制" },
            { title: "互斥量", subtitle: "资源共享与优先级继承" },
            { title: "队列", subtitle: "数据传递与消息缓冲" },
            { title: "事件组", subtitle: "多事件同步与广播" },
            { title: "任务通知", subtitle: "轻量级直接通知" },
            { title: "选择指南", subtitle: "场景匹配与最佳实践" }
        ];

        const IPC_METHODS = [
            { name: '二值信号量', icon: '🔔', use: '同步/事件', speed: '快', overhead: '低' },
            { name: '计数信号量', icon: '🔢', use: '资源计数', speed: '快', overhead: '低' },
            { name: '互斥量', icon: '🔒', use: '互斥访问', speed: '中', overhead: '中' },
            { name: '队列', icon: '📬', use: '数据传递', speed: '中', overhead: '中' },
            { name: '事件组', icon: '🚩', use: '多事件同步', speed: '快', overhead: '低' },
            { name: '任务通知', icon: '⚡', use: '直接通知', speed: '最快', overhead: '最低' }
        ];

        function App() {
            const [currentStep, setCurrentStep] = React.useState(0);
            const [isPlaying, setIsPlaying] = React.useState(false);
            const [selectedMethod, setSelectedMethod] = React.useState(null);
            const [comparisonMode, setComparisonMode] = React.useState(false);
            const [recommendation, setRecommendation] = React.useState(null);
            const voiceEndTimerRef = React.useRef(null);

            const simulateIPC = (step) => {
                setSelectedMethod(null);
                setRecommendation(null);

                switch(step) {
                    case 0:
                        setComparisonMode(true);
                        break;
                    case 1:
                        setSelectedMethod('binary');
                        break;
                    case 2:
                        setSelectedMethod('counting');
                        break;
                    case 3:
                        setSelectedMethod('mutex');
                        break;
                    case 4:
                        setSelectedMethod('queue');
                        break;
                    case 5:
                        setSelectedMethod('eventgroup');
                        break;
                    case 6:
                        setSelectedMethod('notification');
                        break;
                    case 7:
                        setRecommendation('scenario');
                        break;
                }
            };

            const speak = (text) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                const voices = speechSynthesis.getVoices();
                const zhVoice = voices.find(v => v.lang === 'zh-CN' || v.lang.includes('Chinese'));
                if (zhVoice) utterance.voice = zhVoice;
                speechSynthesis.speak(utterance);
                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        } else {
                            setIsPlaying(false);
                        }
                    }, 800);
                };
                utterance.onerror = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        } else {
                            setIsPlaying(false);
                        }
                    }, 800);
                };
            };

            React.useEffect(() => {
                if (isPlaying) {
                    simulateIPC(currentStep);
                    setTimeout(() => {
                        const narration = [
                            "FreeRTOS 提供 6 种 IPC 机制：二值信号量、计数信号量、互斥量、队列、事件组、任务通知。每种适用于不同场景，选择合适的机制是设计关键。",
                            "二值信号量只有 0 和 1 两个状态。适用于同步 (ISR 通知任务) 和事件通知 (外设完成中断)。xSemaphoreCreateBinary 创建。",
                            "计数信号量值范围 0 到最大值。适用于资源计数 (如缓冲区空位数)、限流 (如最多 N 个并发)。xSemaphoreCreateCounting 创建。",
                            "互斥量用于保护共享资源。具有优先级继承机制，防止优先级反转。只能由获取的任务释放。xSemaphoreCreateMutex 创建。",
                            "队列用于任务间传递数据。支持 FIFO 缓冲，可存储多个消息。适用于命令模式、数据流处理。xQueueCreate 创建。",
                            "事件组提供 24 位事件标志。支持 AND/OR 逻辑等待多个事件。适用于多条件同步、广播通知。xEventGroupCreate 创建。",
                            "任务通知是直接发送给特定任务的通知。无需创建内核对象，速度最快，开销最低。适用于简单通知场景。",
                            "选择指南：简单通知用任务通知，同步用二值信号量，资源计数用计数信号量，共享资源用互斥量，数据传递用队列，多事件用事件组。"
                        ];
                        speak(narration[currentStep]);
                    }, 300);
                }
                return () => clearTimeout(voiceEndTimerRef.current);
            }, [isPlaying, currentStep]);

            React.useEffect(() => {
                if (!isPlaying) {
                    simulateIPC(currentStep);
                }
            }, [currentStep]);

            const handleNext = () => {
                if (currentStep < STEPS.length - 1) {
                    setCurrentStep(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setCurrentStep(prev => prev - 1);
                }
            };

            const getMethodCard = (method, index) => {
                const isSelected = selectedMethod === method.name.toLowerCase().replace(' ', '');
                const isRecommended = recommendation && selectedMethod === method.name.toLowerCase().replace(' ', '');

                return (
                    <div
                        key={index}
                        className={`ipc-card p-4 rounded-xl border-2 transition-all cursor-pointer ${
                            isSelected
                                ? 'bg-pink-800/50 border-pink-400 scale-105'
                                : 'bg-gray-800 border-gray-700 hover:border-pink-500/50'
                        }`}
                        onClick={() => setSelectedMethod(method.name.toLowerCase().replace(' ', ''))}
                    >
                        <div className="text-3xl mb-2">{method.icon}</div>
                        <div className="font-bold text-white mb-1">{method.name}</div>
                        <div className="text-sm text-gray-400">用途：{method.use}</div>
                        <div className="text-sm text-gray-400">速度：{method.speed}</div>
                        <div className="text-sm text-gray-400">开销：{method.overhead}</div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-6 bg-gradient-to-br from-gray-900 via-pink-900 to-rose-900">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-6">
                            <h1 className="text-4xl font-bold text-white mb-2">FreeRTOS IPC 机制选择指南完整教程</h1>
                            <p className="text-pink-200 text-lg">6 种进程间通信方式对比与场景匹配</p>
                        </div>

                        {/* 进度指示器 */}
                        <div className="flex justify-center mb-6">
                            <div className="flex gap-2">
                                {STEPS.map((step, index) => (
                                    <button
                                        key={index}
                                        onClick={() => setCurrentStep(index)}
                                        className={`w-10 h-10 rounded-full transition-all ${
                                            index === currentStep
                                                ? 'bg-pink-500 text-white scale-110'
                                                : index < currentStep
                                                ? 'bg-pink-700 text-pink-200'
                                                : 'bg-gray-700 text-gray-400'
                                        }`}
                                    >
                                        {index + 1}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* 代码区 */}
                            <div className="bg-gray-900/80 backdrop-blur rounded-xl p-6 border border-pink-500/30">
                                <h3 className="text-xl font-bold text-pink-400 mb-4">💻 核心代码</h3>
                                <div className="space-y-4 text-sm">
                                    {currentStep === 0 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// 6 种 IPC 机制创建 API

// 1. 二值信号量
SemaphoreHandle_t xBinarySem = xSemaphoreCreateBinary();

// 2. 计数信号量
SemaphoreHandle_t xCountingSem = xSemaphoreCreateCounting(max, initial);

// 3. 互斥量
SemaphoreHandle_t xMutex = xSemaphoreCreateMutex();

// 4. 队列
QueueHandle_t xQueue = xQueueCreate(length, itemSize);

// 5. 事件组
EventGroupHandle_t xEventGroup = xEventGroupCreate();

// 6. 任务通知 (无需创建，直接使用)
vTaskNotifyGive(taskHandle);`}</code>
                                        </pre>
                                    )}
                                    {currentStep === 1 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// 二值信号量 - ISR 同步
SemaphoreHandle_t xIsrSem;

// ISR 中
void HAL_GPIO_EXTI_Callback(void) {
    BaseType_t xHigherPriorityTaskWoken = pdFALSE;
    xSemaphoreGiveFromISR(xIsrSem, &xHigherPriorityTaskWoken);
    portYIELD_FROM_ISR(xHigherPriorityTaskWoken);
}

// 任务中
void vTask(void* pvParameters) {
    xSemaphoreTake(xIsrSem, portMAX_DELAY);  // 等待 ISR
    // 处理中断事件
}`}</code>
                                        </pre>
                                    )}
                                    {currentStep === 2 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// 计数信号量 - 资源计数
SemaphoreHandle_t xBufferSem;

// 初始化：缓冲区有 10 个空位
xBufferSem = xSemaphoreCreateCounting(10, 10);

// 生产者
xSemaphoreTake(xBufferSem, portMAX_DELAY);  // 空位 -1
putDataToBuffer(data);

// 消费者
takeDataFromBuffer();
xSemaphoreGive(xBufferSem);  // 空位 +1`}</code>
                                        </pre>
                                    )}
                                    {currentStep === 3 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// 互斥量 - 保护共享资源
SemaphoreHandle_t xResourceMutex;

void vTask1(void* pvParameters) {
    xSemaphoreTake(xResourceMutex, portMAX_DELAY);
    // 访问共享资源 (UART、SPI 等)
    UART_Send(data);
    xSemaphoreGive(xResourceMutex);
}

// 优先级继承：防止优先级反转
// 如果低优先级持有互斥量，其优先级会临时提升到高于等待任务的优先级`}</code>
                                        </pre>
                                    )}
                                    {currentStep === 4 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// 队列 - 数据传递
QueueHandle_t xCommandQueue;

// 创建：10 个元素，每个 int 大小
xCommandQueue = xQueueCreate(10, sizeof(int));

// 发送
int cmd = CMD_START;
xQueueSend(xCommandQueue, &cmd, portMAX_DELAY);

// 接收
int receivedCmd;
xQueueReceive(xCommandQueue, &receivedCmd, portMAX_DELAY);

// ISR 安全版本
xQueueSendFromISR(xCommandQueue, &cmd, &xHigherPriorityTaskWoken);`}</code>
                                        </pre>
                                    )}
                                    {currentStep === 5 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// 事件组 - 多事件同步
EventGroupHandle_t xEventGroup;
#define EVENT_DATA_READY  (1 << 0)
#define EVENT_CONFIG_DONE (1 << 1)
#define EVENT_ERROR       (1 << 2)

// 设置事件
xEventGroupSetBits(xEventGroup, EVENT_DATA_READY);

// 等待多个事件 (AND 逻辑：所有位都要置 1)
xEventGroupWaitBits(xEventGroup,
    EVENT_DATA_READY | EVENT_CONFIG_DONE,
    pdTRUE,  // 清除位
    pdTRUE,  // AND 逻辑
    portMAX_DELAY);

// 广播通知所有等待任务
xEventGroupSetBits(xEventGroup, EVENT_ERROR);`}</code>
                                        </pre>
                                    )}
                                    {currentStep === 6 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// 任务通知 - 轻量级通知
// 发送通知 (替代 xSemaphoreGive)
vTaskNotifyGive(xTaskHandle);

// ISR 版本
vTaskNotifyGiveFromISR(xTaskHandle, &xHigherPriorityTaskWoken);

// 接收通知 (替代 xSemaphoreTake)
ulTaskNotifyTake(pdTRUE, portMAX_DELAY);

// 优点：
// - 无需创建内核对象
// - 速度最快 (直接写入 TCB)
// - 开销最低 (4 字节 vs 几十字节)
// 缺点：只能通知，不能传数据`}</code>
                                        </pre>
                                    )}
                                    {currentStep === 7 && (
                                        <pre className="bg-gray-800 p-4 rounded-lg text-pink-300 overflow-x-auto">
                                            <code>{`// IPC 选择决策树
if (只需要简单通知) {
    return 任务通知;  // 最快，最低开销
}
else if (需要同步 ISR 和任务) {
    return 二值信号量;
}
else if (需要计数资源) {
    return 计数信号量;
}
else if (需要保护共享资源) {
    return 互斥量;  // 优先级继承
}
else if (需要传递数据) {
    return 队列;
}
else if (需要等待多个事件) {
    return 事件组;
}`}</code>
                                        </pre>
                                    )}

                                    <div className="flex gap-2 mt-4">
                                        <button
                                            onClick={() => simulateIPC(currentStep)}
                                            className="flex-1 bg-pink-600 hover:bg-pink-700 text-white px-4 py-2 rounded-lg transition"
                                        >
                                            ▶️ 运行模拟
                                        </button>
                                        <button
                                            onClick={() => {
                                                setSelectedMethod(null);
                                                setRecommendation(null);
                                                setComparisonMode(false);
                                            }}
                                            className="flex-1 bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition"
                                        >
                                            🔄 重置
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* 可视化区 */}
                            <div className="bg-gray-900/80 backdrop-blur rounded-xl p-6 border border-pink-500/30">
                                <h3 className="text-xl font-bold text-pink-400 mb-4">🔬 IPC 机制对比</h3>
                                <div className="space-y-4">
                                    {/* 6 种方法卡片 */}
                                    <div className="grid grid-cols-2 gap-3">
                                        {IPC_METHODS.map((method, index) => getMethodCard(method, index))}
                                    </div>

                                    {/* 性能对比 */}
                                    <div className="bg-gray-800 rounded-lg p-4">
                                        <h4 className="text-lg font-bold text-pink-300 mb-3">性能对比</h4>
                                        <div className="space-y-2">
                                            {IPC_METHODS.map((method, i) => (
                                                <div key={i} className="flex items-center gap-2">
                                                    <span className="text-gray-400 w-20 text-xs">{method.name}</span>
                                                    <div className="flex-1 bg-gray-700 rounded-full h-3">
                                                        <div
                                                            className={`h-3 rounded-full transition-all ${
                                                                method.speed === '最快' ? 'bg-green-500 w-full' :
                                                                method.speed === '快' ? 'bg-green-400 w-4/5' :
                                                                'bg-yellow-400 w-3/5'
                                                            }`}
                                                        ></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 使用场景 */}
                                    {selectedMethod && (
                                        <div className="bg-pink-800/30 border border-pink-500/50 rounded-lg p-4 animate-scaleIn">
                                            <h4 className="text-lg font-bold text-pink-300 mb-2">
                                                {IPC_METHODS.find(m => m.name.toLowerCase().replace(' ', '') === selectedMethod)?.icon}
                                                {IPC_METHODS.find(m => m.name.toLowerCase().replace(' ', '') === selectedMethod)?.name}
                                            </h4>
                                            <p className="text-sm text-pink-200">
                                                {selectedMethod === 'binary' && '适用于：ISR 同步、事件通知、简单信号传递'}
                                                {selectedMethod === 'counting' && '适用于：资源池管理、流量控制、并发限制'}
                                                {selectedMethod === 'mutex' && '适用于：共享资源保护、临界区同步'}
                                                {selectedMethod === 'queue' && '适用于：命令模式、数据流、消息缓冲'}
                                                {selectedMethod === 'eventgroup' && '适用于：多条件同步、广播通知、状态机'}
                                                {selectedMethod === 'notification' && '适用于：简单通知、中断处理、唤醒任务'}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* 解释区 */}
                            <div className="bg-gray-900/80 backdrop-blur rounded-xl p-6 border border-pink-500/30">
                                <h3 className="text-xl font-bold text-pink-400 mb-4">📖 选择指南</h3>
                                <div className="space-y-4 text-gray-300">
                                    {currentStep === 0 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 IPC 机制概览</h4>
                                            <p>FreeRTOS 提供 6 种 IPC 机制，各有适用场景。选择合适机制可简化设计、提高性能。本指南帮助您快速定位最佳方案。</p>
                                        </div>
                                    )}
                                    {currentStep === 1 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 二值信号量</h4>
                                            <p>状态：0 或 1。典型用途：ISR 通知任务、外设完成中断、简单同步信号。xSemaphoreGive 触发，xSemaphoreTake 等待。</p>
                                        </div>
                                    )}
                                    {currentStep === 2 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 计数信号量</h4>
                                            <p>值范围：0 到最大值。典型用途：缓冲区空位计数、并发连接数限制、资源池管理。每次 Take 减 1，Give 加 1。</p>
                                        </div>
                                    )}
                                    {currentStep === 3 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 互斥量</h4>
                                            <p>专用于共享资源保护。关键特性：优先级继承 (防止反转)、所有权 (只能由获取者释放)。保护 UART、SPI、全局变量等。</p>
                                        </div>
                                    )}
                                    {currentStep === 4 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 队列</h4>
                                            <p>FIFO 数据缓冲。支持多生产者多消费者。典型用途：命令队列、数据流处理、任务间消息传递。可设置超时和 ISR 安全版本。</p>
                                        </div>
                                    )}
                                    {currentStep === 5 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 事件组</h4>
                                            <p>24 位事件标志。支持 AND(所有位) 或 OR(任意位) 等待逻辑。典型用途：多条件同步 (等待所有初始化完成)、广播通知 (错误事件)。</p>
                                        </div>
                                    )}
                                    {currentStep === 6 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 任务通知</h4>
                                            <p>直接写入目标任务 TCB，无需内核对象。速度最快，开销最低 (4 字节)。适用于简单通知，不能传递数据。</p>
                                        </div>
                                    )}
                                    {currentStep === 7 && (
                                        <div>
                                            <h4 className="font-bold text-pink-300 mb-2">📌 决策树</h4>
                                            <p>优先顺序：任务通知 &gt; 信号量 &gt; 事件组 &gt; 队列 &gt; 互斥量。越靠前开销越低。根据具体需求选择，避免过度设计。</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* 导航按钮 */}
                        <div className="flex justify-center gap-4 mt-6">
                            <button
                                onClick={handlePrev}
                                disabled={currentStep === 0}
                                className="bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-lg transition disabled:opacity-50"
                            >
                                ⬅️ 上一步
                            </button>
                            <button
                                onClick={() => setIsPlaying(!isPlaying)}
                                className={`px-6 py-3 rounded-lg transition ${
                                    isPlaying
                                        ? 'bg-red-600 hover:bg-red-700'
                                        : 'bg-pink-600 hover:bg-pink-700'
                                } text-white`}
                            >
                                {isPlaying ? '⏸️ 暂停' : '▶️  autoplay'}
                            </button>
                            <button
                                onClick={handleNext}
                                disabled={currentStep === STEPS.length - 1}
                                className="bg-pink-600 hover:bg-pink-700 text-white px-6 py-3 rounded-lg transition disabled:opacity-50"
                            >
                                下一步 ➡️
                            </button>
                        </div>

                        {/* 当前步骤指示 */}
                        <div className="text-center mt-6 p-4 bg-gray-900/80 backdrop-blur rounded-xl border border-pink-500/30">
                            <h2 className="text-2xl font-bold text-pink-400 mb-2">
                                步骤 {currentStep + 1}: {STEPS[currentStep].title}
                            </h2>
                            <p className="text-gray-300">{STEPS[currentStep].subtitle}</p>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
