<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1139 - 内存映射 IO | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>

    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }

</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#8b5cf6', primaryLight: '#a78bfa',
      secondary: '#7c3aed', secondaryLight: '#9f7aea',
      accent: '#06b6d4', accentLight: '#22d3ee',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 内存映射 IO (Memory-Mapped I/O) =====
// 将外设寄存器映射到内存地址空间

// 1. 基础定义：寄存器指针
#define GPIO_BASE    0x48000000
#define GPIO_MODER   (*(volatile uint32_t*)(GPIO_BASE + 0x00))
#define GPIO_OTYPER  (*(volatile uint32_t*)(GPIO_BASE + 0x04))
#define GPIO_OSPEEDR (*(volatile uint32_t*)(GPIO_BASE + 0x08))

// 2. 使用结构体访问寄存器组
typedef struct {
  volatile uint32_t MODER;    // 模式寄存器
  volatile uint32_t OTYPER;   // 输出类型
  volatile uint32_t OSPEEDR;  // 速度寄存器
  volatile uint32_t PUPDR;    // 上拉/下拉
  volatile uint32_t IDR;      // 输入数据
  volatile uint32_t ODR;      // 输出数据
} GPIO_TypeDef;

#define GPIOA   ((GPIO_TypeDef*)GPIO_BASE)

// 3. 配置 GPIO 引脚
void gpio_config(void) {
  // 设置 PA5 为输出模式 (01 = 输出)
  GPIOA->MODER &= ~(3 << 10);  // 清除位 10-11
  GPIOA->MODER |= (1 << 10);   // 设置为输出

  // 推挽输出
  GPIOA->OTYPER &= ~(1 << 5);

  // 高速模式
  GPIOA->OSPEEDR |= (3 << 10);
}

// 4. 读写 GPIO
void gpio_toggle(void) {
  GPIOA->ODR ^= (1 << 5);  // 翻转 PA5
}

uint8_t gpio_read(void) {
  return (GPIOA->IDR >> 5) & 1;  // 读取 PA5
}

// 5. 位带操作 (Bit-Banding, Cortex-M3/M4)
#define PERIPH_BASE     0x40000000
#define PERIPH_BIT_BASE 0x42000000
#define BIT_ADDR(addr, bit) \
  *(volatile uint32_t*)(PERIPH_BIT_BASE + \
    ((addr - PERIPH_BASE) * 32) + (bit * 4))

// 原子位操作
BIT_ADDR(GPIO_BASE + 0x14, 5) = 1;  // 原子设置 ODR5`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百三十九题，内存映射 IO。",
      2: "内存映射 IO 将外设寄存器映射到内存地址，通过指针直接访问硬件。",
      3: "使用 volatile 确保每次访问都从内存读取，避免编译器优化。",
      4: "结构体方式更直观，寄存器偏移自动计算，代码可读性更好。",
      5: "配置 GPIO 需要清除目标位后设置，避免影响其他配置位。",
      6: "读写 GPIO 使用位移和掩码操作，精确控制单个引脚状态。",
      7: "位带操作实现原子位修改，Cortex-M3/M4 硬件支持，无需关中断。",
      8: "应用：GPIO 控制、UART 配置、定时器设置、ADC 采样、DMA 编程。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        const voices = window.speechSynthesis.getVoices();
        const xiaoxiaoVoice = voices.find(v => v.name.includes('Xiaoxiao') || v.name.includes('zh-CN'));
        if (xiaoxiaoVoice) utterance.voice = xiaoxiaoVoice;
        utterance.onend = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step <= MAX_STEPS) {
          playVoice();
        } else if (step > MAX_STEPS) {
          setIsPlaying(false);
          setIsVoicePlaying(false);
        }
        return () => {
          if (voiceEndTimerRef.current) {
            clearTimeout(voiceEndTimerRef.current);
          }
        };
      }, [isPlaying, step, playVoice]);

      useEffect(() => {
        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) {
          window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
          };
        }
      }, []);

      const handlePlay = () => {
        setIsPlaying(!isPlaying);
        if (!isPlaying && step >= MAX_STEPS) {
          setStep(1);
        }
      };

      const handleReset = () => {
        window.speechSynthesis.cancel();
        setStep(1);
        setIsPlaying(false);
        setIsVoicePlaying(false);
      };

      const handleStepChange = (newStep) => {
        window.speechSynthesis.cancel();
        setStep(newStep);
      };

      const getActiveLine = (lineIndex) => {
        const stepLines = {
          1: [0],
          2: [1, 2, 3, 4, 5, 6],
          3: [1, 2, 3, 4, 5, 6],
          4: [8, 9, 10, 11, 12, 13, 14, 15, 16],
          5: [18, 19, 20, 21, 22],
          6: [24, 25, 26, 27, 28],
          7: [30, 31, 32, 33, 34, 35, 36, 37, 38],
          8: [40]
        };
        return (stepLines[step] || []).includes(lineIndex) ? 'active' : '';
      };

      const renderVisualization = () => {
        switch(step) {
          case 1:
            return (
              <div className="text-center">
                <div className="text-6xl mb-4">📍</div>
                <h3 className="text-2xl font-bold mb-2" style={{color: COLOR_MAP.primary}}>内存映射 IO</h3>
                <p className="text-gray-300">Memory-Mapped Input/Output</p>
              </div>
            );
          case 2:
            return (
              <div className="space-y-4">
                <div className="bg-gray-800 rounded-lg p-4">
                  <div className="text-sm text-gray-400 mb-2">CPU 地址空间</div>
                  <div className="flex items-center justify-between">
                    <div className="flex-1 bg-gray-700 rounded p-2 text-center">0x00000000</div>
                    <div className="mx-2 text-gray-500">→</div>
                    <div className="flex-1" style={{backgroundColor: COLOR_MAP.primary}} className="rounded p-2 text-center font-bold">0x48000000 (GPIO)</div>
                    <div className="mx-2 text-gray-500">→</div>
                    <div className="flex-1 bg-gray-700 rounded p-2 text-center">0xFFFFFFFF</div>
                  </div>
                </div>
                <div className="bg-gray-800 rounded-lg p-4">
                  <div className="text-sm text-gray-400 mb-2">外设寄存器</div>
                  <div className="space-y-2">
                    <div className="flex justify-between items-center">
                      <span>GPIO_MODER</span>
                      <span className="font-mono text-xs">0x48000000</span>
                    </div>
                    <div className="flex justify-between items-center">
                      <span>GPIO_OTYPER</span>
                      <span className="font-mono text-xs">0x48000004</span>
                    </div>
                    <div className="flex justify-between items-center">
                      <span>GPIO_OSPEEDR</span>
                      <span className="font-mono text-xs">0x48000008</span>
                    </div>
                  </div>
                </div>
              </div>
            );
          case 3:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4">
                  <div className="text-4xl mb-2">⚠️</div>
                  <div className="font-bold" style={{color: COLOR_MAP.warning}}>volatile 关键字</div>
                </div>
                <div className="space-y-3">
                  <div className="flex items-start">
                    <div className="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center mr-3 flex-shrink-0">1</div>
                    <div>每次访问都从内存读取</div>
                  </div>
                  <div className="flex items-start">
                    <div className="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center mr-3 flex-shrink-0">2</div>
                    <div>禁止编译器优化</div>
                  </div>
                  <div className="flex items-start">
                    <div className="w-8 h-8 rounded-full bg-gray-700 flex items-center justify-center mr-3 flex-shrink-0">3</div>
                    <div>确保硬件状态同步</div>
                  </div>
                </div>
              </div>
            );
          case 4:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4 font-bold" style={{color: COLOR_MAP.primary}}>GPIO 结构体布局</div>
                <div className="space-y-2">
                  <div className="flex justify-between items-center p-2 rounded" style={{backgroundColor: COLOR_MAP.primary + '40'}}>
                    <span>MODER</span>
                    <span className="text-xs">偏移 +0x00</span>
                  </div>
                  <div className="flex justify-between items-center p-2 rounded" style={{backgroundColor: COLOR_MAP.primary + '30'}}>
                    <span>OTYPER</span>
                    <span className="text-xs">偏移 +0x04</span>
                  </div>
                  <div className="flex justify-between items-center p-2 rounded" style={{backgroundColor: COLOR_MAP.primary + '20'}}>
                    <span>OSPEEDR</span>
                    <span className="text-xs">偏移 +0x08</span>
                  </div>
                  <div className="flex justify-between items-center p-2 rounded" style={{backgroundColor: COLOR_MAP.primary + '10'}}>
                    <span>PUPDR</span>
                    <span className="text-xs">偏移 +0x0C</span>
                  </div>
                  <div className="flex justify-between items-center p-2 rounded" style={{backgroundColor: COLOR_MAP.primary + '08'}}>
                    <span>IDR / ODR</span>
                    <span className="text-xs">偏移 +0x10 / +0x14</span>
                  </div>
                </div>
                <div className="mt-4 text-center text-sm text-gray-400">
                  GPIOA->MODER = GPIO_BASE + 0x00
                </div>
              </div>
            );
          case 5:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-3 font-bold">配置 PA5 为输出模式</div>
                <div className="space-y-3">
                  <div className="text-xs font-mono bg-gray-900 p-2 rounded">
                    <div className="text-gray-500">初始值：????????</div>
                    <div className="text-gray-400">清除位 10-11:</div>
                    <div>MODER &= ~(3 &lt;&lt; 10)</div>
                    <div className="text-gray-400 mt-1">设置位 10:</div>
                    <div>MODER |= (1 &lt;&lt; 10)</div>
                    <div className={step >= 5 ? 'text-green-400' : 'text-gray-500'}>结果：01 = 输出模式</div>
                  </div>
                  <div className="flex justify-center space-x-2">
                    {[0,1,2,3,4,5,6,7].map(i => (
                      <div key={i} className={`w-8 h-10 rounded border-2 flex items-center justify-center ${i === 5 ? 'border-green-400 bg-green-900' : 'border-gray-600'}`}>
                        <span className={i === 5 ? 'text-green-400 font-bold' : 'text-gray-500'}>P{i}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          case 6:
            return (
              <div className="space-y-4">
                <div className="bg-gray-800 rounded-lg p-4">
                  <div className="text-center mb-3 font-bold" style={{color: COLOR_MAP.accent}}>读取 GPIO 输入</div>
                  <div className="text-xs font-mono bg-gray-900 p-2 rounded">
                    <div>(GPIOA->IDR >> 5) & 1</div>
                    <div className="text-gray-500 mt-2">IDR: Input Data Register</div>
                  </div>
                </div>
                <div className="bg-gray-800 rounded-lg p-4">
                  <div className="text-center mb-3 font-bold" style={{color: COLOR_MAP.success}}>写入 GPIO 输出</div>
                  <div className="text-xs font-mono bg-gray-900 p-2 rounded">
                    <div>GPIOA->ODR ^= (1 &lt;&lt; 5)</div>
                    <div className="text-gray-500 mt-2">ODR: Output Data Register</div>
                  </div>
                </div>
              </div>
            );
          case 7:
            return (
              <div className="bg-gray-800 rounded-lg p-4">
                <div className="text-center mb-4 font-bold" style={{color: COLOR_MAP.primary}}>位带操作 (Bit-Banding)</div>
                <div className="text-xs text-gray-400 mb-3">Cortex-M3/M4 硬件特性</div>
                <div className="space-y-3">
                  <div className="text-xs font-mono bg-gray-900 p-2 rounded">
                    <div className="text-gray-500">外设区：0x40000000</div>
                    <div className="text-gray-500">位带区：0x42000000</div>
                    <div className="text-yellow-400 mt-2">映射公式:</div>
                    <div>bit_word_addr = bit_band_base + (byte_offset × 32) + (bit_number × 4)</div>
                  </div>
                  <div className="text-xs bg-blue-900 p-2 rounded">
                    <div className="text-blue-300">优势:</div>
                    <div>✓ 原子操作 (Atomic)</div>
                    <div>✓ 无需关中断</div>
                    <div>✓ 单周期执行</div>
                  </div>
                </div>
              </div>
            );
          case 8:
            return (
              <div className="grid grid-cols-2 gap-3">
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">🔌</div>
                  <div className="font-bold text-sm">GPIO 控制</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">📡</div>
                  <div className="font-bold text-sm">UART 配置</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">⏱️</div>
                  <div className="font-bold text-sm">定时器设置</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">📊</div>
                  <div className="font-bold text-sm">ADC 采样</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">🔄</div>
                  <div className="font-bold text-sm">DMA 编程</div>
                </div>
                <div className="bg-gray-800 rounded-lg p-3 text-center">
                  <div className="text-3xl mb-2">💾</div>
                  <div className="font-bold text-sm">Flash 操作</div>
                </div>
              </div>
            );
          default:
            return null;
        }
      };

      const explanations = {
        1: "内存映射 IO 基础概念",
        2: "外设寄存器映射到 CPU 地址空间",
        3: "volatile 确保不被编译器优化",
        4: "结构体方式组织寄存器访问",
        5: "配置 GPIO 引脚为输出模式",
        6: "读写 GPIO 引脚状态",
        7: "位带操作实现原子位修改",
        8: "内存映射 IO 的典型应用场景"
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          {/* Header */}
          <div className="text-center mb-6">
            <h1 className="text-3xl font-bold mb-2">1139 - 内存映射 IO</h1>
            <p className="text-gray-400">Memory-Mapped I/O - Embedded C</p>
          </div>

          {/* Controls */}
          <div className="flex justify-center items-center space-x-4 mb-6">
            <button
              onClick={handleReset}
              className="px-4 py-2 rounded bg-gray-700 hover:bg-gray-600 transition"
            >
              🔄 重置
            </button>
            <button
              onClick={handlePlay}
              className={`px-6 py-2 rounded transition ${isPlaying ? 'bg-yellow-600 hover:bg-yellow-500' : 'bg-green-600 hover:bg-green-500'}`}
              style={{backgroundColor: isPlaying ? COLOR_MAP.warning : COLOR_MAP.success}}
            >
              {isPlaying ? '⏸️ 暂停' : '▶️ 播放'}
            </button>
            <div className="flex items-center space-x-2">
              <span className="text-gray-400">语速:</span>
              <input
                type="range"
                min="0.5"
                max="1.5"
                step="0.1"
                value={voiceRate}
                onChange={(e) => setVoiceRate(parseFloat(e.target.value))}
                className="w-24"
              />
              <span className="text-sm w-12">{voiceRate.toFixed(1)}x</span>
            </div>
          </div>

          {/* Step Indicator */}
          <div className="flex justify-center mb-6">
            <div className="flex space-x-2">
              {Array.from({length: MAX_STEPS}).map((_, i) => (
                <button
                  key={i}
                  onClick={() => handleStepChange(i + 1)}
                  className={`w-10 h-10 rounded-full transition ${step === i + 1 ? 'text-white' : 'bg-gray-700 text-gray-400 hover:bg-gray-600'}`}
                  style={step === i + 1 ? {backgroundColor: COLOR_MAP.primary} : {}}
                >
                  {i + 1}
                </button>
              ))}
            </div>
          </div>

          {/* Main Content */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {/* Code */}
            <div className="bg-gray-800 rounded-lg p-4">
              <div className="text-sm font-bold mb-3" style={{color: COLOR_MAP.primary}}>💻 代码示例</div>
              <pre className="text-xs font-mono text-gray-300 overflow-x-auto">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${getActiveLine(i)} py-1`}>{line}</div>
                ))}
              </pre>
            </div>

            {/* Visualization */}
            <div className="bg-gray-800 rounded-lg p-4">
              <div className="text-sm font-bold mb-3" style={{color: COLOR_MAP.accent}}>🎨 可视化</div>
              {renderVisualization()}
            </div>

            {/* Explanations */}
            <div className="bg-gray-800 rounded-lg p-4">
              <div className="text-sm font-bold mb-3" style={{color: COLOR_MAP.secondary}}>📝 解释</div>
              <div className="space-y-4">
                <div className={`p-3 rounded transition ${step >= 1 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 1 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 1 ? {backgroundColor: COLOR_MAP.primary} : {}}>1</div>
                    <span className={step >= 1 ? 'text-white' : 'text-gray-500'}>{explanations[1]}</span>
                  </div>
                </div>
                <div className={`p-3 rounded transition ${step >= 2 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 2 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 2 ? {backgroundColor: COLOR_MAP.primary} : {}}>2</div>
                    <span className={step >= 2 ? 'text-white' : 'text-gray-500'}>{explanations[2]}</span>
                  </div>
                </div>
                <div className={`p-3 rounded transition ${step >= 3 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 3 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 3 ? {backgroundColor: COLOR_MAP.primary} : {}}>3</div>
                    <span className={step >= 3 ? 'text-white' : 'text-gray-500'}>{explanations[3]}</span>
                  </div>
                </div>
                <div className={`p-3 rounded transition ${step >= 4 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 4 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 4 ? {backgroundColor: COLOR_MAP.primary} : {}}>4</div>
                    <span className={step >= 4 ? 'text-white' : 'text-gray-500'}>{explanations[4]}</span>
                  </div>
                </div>
                <div className={`p-3 rounded transition ${step >= 5 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 5 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 5 ? {backgroundColor: COLOR_MAP.primary} : {}}>5</div>
                    <span className={step >= 5 ? 'text-white' : 'text-gray-500'}>{explanations[5]}</span>
                  </div>
                </div>
                <div className={`p-3 rounded transition ${step >= 6 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 6 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 6 ? {backgroundColor: COLOR_MAP.primary} : {}}>6</div>
                    <span className={step >= 6 ? 'text-white' : 'text-gray-500'}>{explanations[6]}</span>
                  </div>
                </div>
                <div className={`p-3 rounded transition ${step >= 7 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 7 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 7 ? {backgroundColor: COLOR_MAP.primary} : {}}>7</div>
                    <span className={step >= 7 ? 'text-white' : 'text-gray-500'}>{explanations[7]}</span>
                  </div>
                </div>
                <div className={`p-3 rounded transition ${step >= 8 ? 'opacity-100' : 'opacity-30'}`}>
                  <div className="flex items-center mb-2">
                    <div className={`w-6 h-6 rounded-full mr-2 flex items-center justify-center text-sm font-bold ${step >= 8 ? 'text-white' : 'bg-gray-700 text-gray-500'}`} style={step >= 8 ? {backgroundColor: COLOR_MAP.primary} : {}}>8</div>
                    <span className={step >= 8 ? 'text-white' : 'text-gray-500'}>{explanations[8]}</span>
                  </div>
                </div>
              </div>

              {/* Voice Status */}
              <div className="mt-4 pt-4 border-t border-gray-700">
                <div className="text-sm text-gray-400 mb-2">🔊 语音讲解</div>
                <div className={`text-sm ${isVoicePlaying ? 'text-green-400' : 'text-gray-500'}`}>
                  {isVoicePlaying ? '正在播放...' : '已暂停'}
                </div>
                <div className="text-xs text-gray-500 mt-1">
                  当前：步骤 {step} / {MAX_STEPS}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
