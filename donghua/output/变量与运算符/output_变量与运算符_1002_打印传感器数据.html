// ════════════════════════════════════════════════════════════════
//  固化 VarCard 组件（禁止修改）
// ════════════════════════════════════════════════════════════════
function VarCard({name,type,value,addr,glowColor,accentCls,badgeCls,isActive,isNew}){
  const prevRef=useRef(value);
  const[changed,setChanged]=useState(false);
  useEffect(()=>{
    if(value!==null&&value!==undefined&&prevRef.current!==value){
      prevRef.current=value;setChanged(true);
      const t=setTimeout(()=>setChanged(false),640);
      return()=>clearTimeout(t);
    }
  },[value]);
  return(
    <div className={`var-card ${isActive?'is-active':''} p-3 relative`}
      style={{'--card-glow':glowColor,background:'rgba(255,255,255,0.026)',
        border:'1px solid rgba(255,255,255,0.068)',
        animation:isNew?'boxPop 0.45s cubic-bezier(0.34,1.3,0.64,1) forwards':'none',
        borderRadius:12,minWidth:82}}>
      <div className={`absolute -top-2.5 left-2.5 px-2 py-0.5 rounded-full text-[10px] font-bold border ${badgeCls}`}>{type}</div>
      <div className={`text-[11px] mt-1 mb-0.5 ${accentCls}`}>{name}</div>
      <div className={`text-[22px] font-bold leading-none text-white ${changed?'anim-value-changed':''}`}>{value??'—'}</div>
      <div className="text-[10px] text-gray-700 mt-1.5 font-mono tracking-tight">{addr}</div>
    </div>
  );
}

function App(){
  // ────────── 【基础配置】──────────
  const TITLE     = "打印传感器数据";
  const FILE_NAME = "sensor.c";
  const MAX_STEPS = 6;
  const PROG_NAME = "sensor";

  // ────────── 固化基础状态（禁止修改）──────────
  const[step,setStep]=useState(0);
  const[isPlaying,setIsPlaying]=useState(false);
  const[speed,setSpeed]=useState(3200);
  const[isFS,setIsFS]=useState(false);
  const[executedLines,setExecutedLines]=useState([]);
  const[highlightVar,setHighlightVar]=useState(null);
  const[isDangerLine,setIsDangerLine]=useState(false);
  const[prevLine,setPrevLine]=useState(-1);
  const[linePositions,setLinePositions]=useState(new Map());
  const[output,setOutput]=useState([]);
  const[isVoicePlaying,setIsVoicePlaying]=useState(false);
  const[voiceRate,setVoiceRate]=useState(1.0);

  // ────────── 固化 useRef（禁止修改）──────────
  const codeContainerRef=useRef(null);
  const lineRefs=useRef(new Map());
  const msgScrollRef=useRef(null);
  const voiceEndTimerRef=useRef(null);

  // ────────── 【业务状态变量】──────────
  const temperatureRef=useRef(null);
  const humidityRef=useRef(null);

  // ────────── 【LINE_MAP】──────────
  const LINE_MAP={
    0:-1,
    1:1,
    2:5,
    3:6,
    4:7,
    5:7,
    6:8
  };
  const currentLine=LINE_MAP[step]??-1;

  // ────────── 固化 useEffect 组（禁止修改）──────────
  useEffect(()=>{
    const calc=()=>{
      const box=codeContainerRef.current;if(!box)return;
      const br=box.getBoundingClientRect();const m=new Map();
      lineRefs.current.forEach((el,n)=>{if(el){const r=el.getBoundingClientRect();m.set(n,r.top-br.top+r.height/2);}});
      setLinePositions(m);
    };
    calc();const t=setTimeout(calc,120);
    window.addEventListener('resize',calc);
    return()=>{clearTimeout(t);window.removeEventListener('resize',calc);};
  },[step]);

  useEffect(()=>{const t=setTimeout(()=>setPrevLine(currentLine),650);return()=>clearTimeout(t);},[currentLine]);
  useEffect(()=>{if(msgScrollRef.current)msgScrollRef.current.scrollTop=0;},[step]);
  useEffect(()=>{document.documentElement.style.setProperty('--anim-speed',`${speed*1.5}ms`);},[speed]);

  // ────────── 语音驱动自动播放逻辑 ──────────
  const playVoice=useCallback(()=>{
    window.speechSynthesis.cancel();
    if(voiceEndTimerRef.current){clearTimeout(voiceEndTimerRef.current);}
    const text=VOICE_TEXT_MAP[step]||"";
    if(!text){
      voiceEndTimerRef.current=setTimeout(()=>{
        setStep(p=>Math.min(MAX_STEPS,p+1));
      },1500);
      return;
    }
    const u=new SpeechSynthesisUtterance(text);
    u.lang="zh-CN";u.rate=voiceRate;
    u.onend=()=>{
      setIsVoicePlaying(false);
      voiceEndTimerRef.current=setTimeout(()=>{
        setStep(p=>Math.min(MAX_STEPS,p+1));
      },800);
    };
    u.onerror=()=>{
      setIsVoicePlaying(false);
      voiceEndTimerRef.current=setTimeout(()=>{
        setStep(p=>Math.min(MAX_STEPS,p+1));
      },800);
    };
    const voices=window.speechSynthesis.getVoices();
    const v=voices.find(v=>v.name.includes('Xiaoxiao'))||voices.find(v=>v.lang.startsWith('zh-CN'))||null;
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
    setIsVoicePlaying(true);
  },[step,voiceRate,MAX_STEPS]);

  useEffect(()=>{
    if(isPlaying&&step<MAX_STEPS){
      playVoice();
    }
  },[isPlaying,step,playVoice,MAX_STEPS]);

  const stopVoice=useCallback(()=>{
    window.speechSynthesis.cancel();
    if(voiceEndTimerRef.current){clearTimeout(voiceEndTimerRef.current);}
    setIsVoicePlaying(false);
  },[]);

  function toggleVoice(){
    if(window.speechSynthesis.speaking&&!window.speechSynthesis.paused){
      window.speechSynthesis.pause();
      setIsVoicePlaying(false);
    }else if(window.speechSynthesis.paused){
      window.speechSynthesis.resume();
      setIsVoicePlaying(true);
    }else{
      playVoice();
    }
  }

  useEffect(()=>{stopVoice();},[step,stopVoice]);
  useEffect(()=>{window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();return()=>stopVoice();},[stopVoice]);

  // ────────── 【状态机】──────────
  useEffect(()=>{
    setHighlightVar(null);setIsDangerLine(false);
    setExecutedLines([]);setOutput([]);
    temperatureRef.current=null;humidityRef.current=null;

    switch(step){
      case 0:break;
      case 1:
        setExecutedLines([]);
        break;
      case 2:
        temperatureRef.current=-15;
        setExecutedLines([1,2,3,4,5]);
        setHighlightVar('temperature');
        break;
      case 3:
        humidityRef.current=65;
        setExecutedLines([1,2,3,4,5,6]);
        setHighlightVar('humidity');
        break;
      case 4:
        setExecutedLines([1,2,3,4,5,6,7]);
        break;
      case 5:
        setOutput([{type:'success',text:'Temp: -15C, Humidity: 65%'}]);
        setExecutedLines([1,2,3,4,5,6,7]);
        break;
      case 6:
        setOutput([{type:'success',text:'Temp: -15C, Humidity: 65%'}]);
        setExecutedLines([1,2,3,4,5,6,7,8]);
        break;
    }
  },[step]);

  // ────────── 固化导航函数（禁止修改）──────────
  const goNext=useCallback(()=>setStep(p=>Math.min(MAX_STEPS,p+1)),[MAX_STEPS]);
  const goPrev=useCallback(()=>setStep(p=>Math.max(0,p-1)),[]);
  const goReset=useCallback(()=>{setStep(0);setIsPlaying(false);stopVoice();},[stopVoice]);

  useEffect(()=>{
    if(isPlaying&&step<MAX_STEPS){const t=setTimeout(goNext,speed);return()=>clearTimeout(t);}
    if(step>=MAX_STEPS)setIsPlaying(false);
  },[isPlaying,step,speed,goNext,MAX_STEPS]);

  useEffect(()=>{
    const onKey=e=>{
      if(e.target.tagName==='INPUT')return;
      if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();goNext();}
      if(e.key==='ArrowLeft'){e.preventDefault();goPrev();}
      if(e.key==='Enter')setIsPlaying(p=>!p);
      if(e.key==='r'||e.key==='R')goReset();
      if(e.key==='f'||e.key==='F')setIsFS(p=>!p);
    };
    window.addEventListener('keydown',onKey);
    return()=>window.removeEventListener('keydown',onKey);
  },[goNext,goPrev,goReset]);

  // ────────── 【语音文本映射】──────────
  const VOICE_TEXT_MAP={
    0:"欢迎来到代码可视化讲解，点击播放开始学习",
    1:"程序开始，包含标准输入输出库和标准整数类型库",
    2:"声明 int16_t 类型变量 temperature 并赋值为负 15，int16_t 可存储负温度",
    3:"声明 uint16_t 类型变量 humidity 并赋值为 65，uint16_t 只能存储正值",
    4:"执行 printf 输出，百分号 d 输出有符号温度值，百分号 u 输出无符号湿度值，百分号百分号输出百分号字符",
    5:"输出缓冲区显示完整结果，Temp 冒号负 15C，Humidity 冒号 65 百分号",
    6:"程序正常结束返回 0，表示执行成功"
  };

  // ────────── 【讲解文本 explanations】──────────
  const explanations=useMemo(()=>{
    const d=[];
    if(step>=1) d.push({id:'s1',icon:'info',text:'进入 main 函数，准备执行',color:'blue',step:1});
    if(step>=2) d.push({id:'s2',icon:'memory',text:'声明 int16_t temperature = -15',color:'yellow',step:2});
    if(step>=3) d.push({id:'s3',icon:'memory',text:'声明 uint16_t humidity = 65',color:'orange',step:3});
    if(step>=4) d.push({id:'s4',icon:'terminal',text:'printf 输出格式化字符串',color:'green',step:4});
    if(step>=5) d.push({id:'s5',icon:'check',text:'输出完成：Temp: -15C, Humidity: 65%',color:'green',step:5});
    if(step>=6) d.push({id:'s6',icon:'rocket',text:'程序执行完毕',color:'purple',step:6});
    return d;
  },[step]);
  const revExplanations=useMemo(()=>[...explanations].reverse(),[explanations]);
  const pct=Math.round((step/MAX_STEPS)*100);

  // ════════════════════════════════════════════════════════════════
  //  固化页面渲染（禁止修改布局结构）
  // ════════════════════════════════════════════════════════════════
  return(
    <div className={`flex flex-col h-screen ${isFS?'fixed inset-0 z-50':''}`} style={{background:'#080c14'}}>
      {/* ═══ 顶部控制栏 ═══ */}
      <div className="flex-shrink-0 px-4 py-2.5 flex items-center gap-3 border-b border-white/[0.05]"
        style={{background:'rgba(10,14,20,0.95)',backdropFilter:'blur(12px)'}}>
        <div className="flex items-center gap-2 mr-2">
          {I.code(16,'#a78bfa')}
          <span className="text-[13px] font-bold text-gray-200 tracking-wide">{TITLE}</span>
        </div>
        <div className="flex-1 flex items-center gap-2.5">
          <div className="flex-1 h-[3px] rounded-full overflow-hidden" style={{background:'rgba(255,255,255,0.07)'}}>
            <div className="h-full rounded-full transition-all duration-500"
              style={{width:`${pct}%`,background:isDangerLine?'linear-gradient(90deg,#ef4444,#f97316)':'linear-gradient(90deg,#6366f1,#8b5cf6,#a78bfa)'}}/>
          </div>
          <span className="text-[11px] font-mono text-gray-600 w-12 text-right">{step}/{MAX_STEPS}</span>
        </div>
        <div className="flex items-center gap-2 border-l border-white/[0.05] pl-3">
          <button className={`ctrl-btn btn-voice ${isVoicePlaying?'active':''}`}
            onClick={toggleVoice} disabled={step===0}>
            {isVoicePlaying?I.pause(12):I.voice(14)} {isVoicePlaying?'暂停':'讲解'}
          </button>
          <div className="flex items-center gap-1.5 text-[11px] text-gray-600">
            <span>语速</span>
            <input type="range" min="0.5" max="2.0" step="0.1" value={voiceRate}
              onChange={e=>setVoiceRate(+e.target.value)} className="w-16"/>
            <span className="w-7">{voiceRate.toFixed(1)}x</span>
          </div>
        </div>
        <div className="flex items-center gap-1.5 text-[11px] text-gray-600 border-l border-white/[0.05] pl-3">
          <span>速度</span>
          <input type="range" min="800" max="5000" step="200" value={speed}
            onChange={e=>setSpeed(+e.target.value)} className="w-16"/>
        </div>
        <div className="flex items-center gap-1.5">
          <button className="ctrl-btn" onClick={goPrev} disabled={step===0}>{I.prev()}</button>
          <button className={`ctrl-btn ${isPlaying?'btn-pause':'btn-play'}`}
            onClick={()=>setIsPlaying(p=>!p)} disabled={step===MAX_STEPS}>
            {isPlaying?I.pause():I.play()}{isPlaying?'暂停':'播放'}
          </button>
          <button className="ctrl-btn" onClick={goNext} disabled={step===MAX_STEPS}>{I.next()}</button>
          <button className="ctrl-btn btn-reset" onClick={goReset}>{I.refresh()} 重置</button>
          <button className={`ctrl-btn btn-fs ${isFS?'active':''}`} onClick={()=>setIsFS(p=>!p)}>{I.expand()}</button>
        </div>
      </div>

      {/* ═══ 三栏主内容 ═══ */}
      <div className="flex-1 flex gap-3 p-3 min-h-0">

        {/* ─── 左栏：代码面板 340px ─── */}
        <div className="glass-panel flex flex-col w-[340px] flex-shrink-0 overflow-hidden">
          <div className="px-3 py-2 flex items-center gap-2 border-b border-white/[0.05]"
            style={{background:'rgba(255,255,255,0.014)'}}>
            {I.dot(7,'#f97316')}{I.dot(7,'#eab308')}{I.dot(7,'#22c55e')}
            <span className="text-[11px] text-gray-500 font-medium">{FILE_NAME}</span>
          </div>
          <div className="flex-1 overflow-auto py-2 relative" ref={codeContainerRef}>
            {currentLine>0&&linePositions.has(currentLine)&&(()=>{
              const cy=linePositions.get(currentLine)??0;
              const py=linePositions.get(prevLine)??cy;
              return(<>
                <div className="exec-orb-trail absolute left-[17px] w-[6px] rounded-full"
                  style={{top:Math.min(cy,py)-4,height:Math.abs(cy-py)+8,
                    background:isDangerLine?'linear-gradient(180deg,transparent,rgba(239,68,68,0.11),transparent)':'linear-gradient(180deg,transparent,rgba(250,204,21,0.11),transparent)',
                    animation:'orbTrailFade 3.5s ease-in-out infinite'}}/>
                <div className="exec-orb absolute w-[10px] h-[10px] rounded-full"
                  style={{'--orb-color':isDangerLine?'#ef4444':'#facc15',left:14,top:cy,transform:'translateY(-50%)',
                    background:isDangerLine?'radial-gradient(circle at 35% 35%,#fca5a5,#ef4444)':'radial-gradient(circle at 35% 35%,#fef08a,#eab308)',
                    animation:'orbGlow 3.5s ease-in-out infinite'}}/>
              </>);
            })()}

            {/* ────── 【代码行 CodeLine】────── */}
            <CodeLine num={1}><span className="text-purple-400">#include</span>{' '}<span className="text-green-300">&lt;stdio.h&gt;</span></CodeLine>
            <CodeLine num={2}><span className="text-purple-400">#include</span>{' '}<span className="text-green-300">&lt;stdint.h&gt;</span></CodeLine>
            <CodeLine num={3}>{' '}</CodeLine>
            <CodeLine num={4}><span className="text-blue-400">int</span>{' '}<span className="text-yellow-300">main</span>(<span className="text-blue-400">void</span>) {'{'}</CodeLine>
            <CodeLine num={5}><span className="text-blue-400">int16_t</span>{' '}temperature{' '}<span className="text-pink-400">=</span>{' '}<span className="text-orange-300">-15</span>{';'}</CodeLine>
            <CodeLine num={6}><span className="text-blue-400">uint16_t</span>{' '}humidity{' '}<span className="text-pink-400">=</span>{' '}<span className="text-orange-300">65</span>{';'}</CodeLine>
            <CodeLine num={7}><span className="text-yellow-300">printf</span>(<span className="text-green-300">"Temp: %dC, Humidity: %u%%\\n"</span>,temperature,humidity){';'}</CodeLine>
            <CodeLine num={8}><span className="text-blue-400">return</span>{' '}<span className="text-orange-300">0</span>{';'}</CodeLine>
            <CodeLine num={9}>{'}'}</CodeLine>

          </div>
        </div>

        {/* ─── 中栏：内存/可视化面板 flex-1 ─── */}
        <div className="glass-panel flex flex-col flex-1 overflow-hidden">
          <div className="px-3 py-2 flex items-center gap-2 border-b border-white/[0.05]"
            style={{background:'rgba(255,255,255,0.014)'}}>
            {I.memory(13,'#8b949e')}
            <span className="text-[11px] text-gray-500 font-medium">内存可视化</span>
          </div>
          <div className="flex-1 flex flex-col items-center justify-center gap-5 p-4 overflow-auto">

            {/* ────── 【中栏可视化内容】────── */}
            {step>=2&&(
              <div className="flex gap-4 flex-wrap justify-center">
                <VarCard name="temperature" type="int16_t" value={temperatureRef.current} addr="0x7fff5a8c"
                  glowColor="rgba(250,204,21,0.4)" accentCls="text-yellow-400"
                  badgeCls="text-yellow-400 border-yellow-500/25 bg-yellow-500/10"
                  isActive={highlightVar==='temperature'} isNew={step===2}/>
                {step>=3&&(
                  <VarCard name="humidity" type="uint16_t" value={humidityRef.current} addr="0x7fff5a88"
                    glowColor="rgba(249,115,22,0.4)" accentCls="text-orange-400"
                    badgeCls="text-orange-400 border-orange-500/25 bg-orange-500/10"
                    isActive={highlightVar==='humidity'} isNew={step===3}/>
                )}
              </div>
            )}

            {step===0&&(
              <div className="text-center text-gray-700 text-[12px]">
                <div style={{opacity:0.3}} className="mb-2">{I.rocket(28,'#6b7280')}</div>
                点击播放开始代码执行可视化
              </div>
            )}

          </div>
        </div>

        {/* ─── 右栏：讲解面板 260px ─── */}
        <div className="glass-panel flex flex-col w-[260px] flex-shrink-0 overflow-hidden">
          <div className="px-3 py-2 flex items-center gap-2 border-b border-white/[0.05]"
            style={{background:'rgba(255,255,255,0.014)'}}>
            {I.info(13,'#8b949e')}
            <span className="text-[11px] text-gray-500 font-medium">步骤讲解</span>
          </div>
          <div className="flex-1 overflow-auto px-3 pb-3 pt-2" ref={msgScrollRef}>
            {step===0?(
              <div className="flex flex-col items-center justify-center h-full gap-3 text-gray-700">
                <div style={{opacity:0.35}}>{I.rocket(32,'#6b7280')}</div>
                <div className="text-[12px] text-center leading-relaxed">
                  点击 <span className="text-green-400 font-semibold">播放</span> 开始
                  <br/><span className="text-[10px] text-gray-600">空格/→ 步进 &nbsp; ← 后退 &nbsp; Enter 播放</span>
                </div>
              </div>
            ):(
              <div className="space-y-1.5">
                {revExplanations.map((item,idx)=>{
                  const c=COLOR_MAP[item.color];const isTop=idx===0;const isNew=item.step===step;
                  return(
                    <div key={item.id}
                      className={`flex items-start gap-2.5 px-3 py-2.5 rounded-xl ${isNew?'anim-bubble-up':'anim-push-up'}`}
                      style={{background:isTop?`linear-gradient(135deg,${c.bg},${c.bg.replace('0.07','0.12')})`:c.bg,
                        borderLeft:`2.5px solid ${c.border}`,
                        opacity:isTop?1:Math.max(0.36,1-idx*0.09),
                        animation:isTop?'newMsgGlow 4s ease-in-out infinite':undefined}}>
                      <span className="flex-shrink-0 mt-0.5" style={{opacity:isTop?1:0.6}}>
                        {(ICON_MAP[item.icon]||I.info)(isTop?15:13,c.ic)}
                      </span>
                      <span className={`${c.text} text-[11.5px] leading-relaxed flex-1 ${isTop?'font-semibold':''}`}>{item.text}</span>
                      {isTop&&<span className={`text-[9px] px-1.5 py-0.5 rounded-full border font-bold flex-shrink-0 ${c.badge}`}>NEW</span>}
                      <span className="text-[9.5px] text-gray-700 font-mono flex-shrink-0 ml-0.5">#{item.step}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ═══ 底部终端 ═══ */}
      <div className="h-[100px] flex-shrink-0 border-t border-white/[0.044]"
        style={{background:'rgba(4,8,14,0.85)'}}>
        <div className="px-3 py-1.5 flex items-center gap-2 border-b border-white/[0.038]"
          style={{background:'rgba(255,255,255,0.014)'}}>
          {I.dot(7,'#22c55e')}
          <span className="text-[11px] text-gray-500 font-medium tracking-wide">Terminal</span>
        </div>
        <div className="px-3 pt-2 text-[12.5px] h-[58px] overflow-auto">
          <div className="text-gray-600 mb-0.5">$ ./{PROG_NAME}</div>
          {output.map((line,i)=>(
            <div key={`${step}-${i}`} className="anim-fade-in" style={{animationDelay:`${i*55}ms`}}>
              {line.type==='error'?(
                <div className="flex items-center gap-2 text-red-400">
                  <span>{line.text}</span>
                  <span className="text-[10px] px-1.5 py-0.5 rounded border border-red-500/22 bg-red-500/9 inline-flex items-center gap-1">{I.alert(10,'#f87171')} 错误</span>
                </div>
              ):(
                <div className="flex items-center gap-2 text-green-400">
                  <span>{line.text}</span>
                  <span className="text-[10px] px-1 py-0.5 rounded border border-green-500/18 bg-green-500/7 inline-flex items-center">{I.check(10,'#4ade80')}</span>
                </div>
              )}
            </div>
          ))}
          <span className="inline-block w-[7px] h-[14px] bg-green-500/75 align-middle ml-0.5"
            style={{animation:'cursorBlink 1.12s step-end infinite'}}/>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════
//  CodeLine 子组件（必须放在 App 函数之后）
// ════════════════════════════════════════════════════════════════
const CodeLine=({num,children})=>{
  const{currentLine,isDangerLine,executedLines}=React.useContext(AppContext)||{};
  const isCur=num===currentLine;const isExec=executedLines?.includes(num);const isDL=isCur&&isDangerLine;
  let cls='code-line-flow flex items-center min-h-[30px]';
  if(isDL)cls+=' is-current-danger';else if(isCur)cls+=' is-current';else if(isExec)cls+=' is-executed';
  const bg=isCur?(isDL?'linear-gradient(90deg,rgba(239,68,68,0.11),rgba(239,68,68,0.03) 55%,transparent)':'linear-gradient(90deg,rgba(250,204,21,0.08),rgba(250,204,21,0.025) 55%,transparent)'):undefined;
  return(
    <div className={cls} style={{background:bg}}>
      {isCur&&<div className={`absolute left-0 top-1 bottom-1 w-[2.5px] rounded-full ${isDL?'bg-red-400':'bg-yellow-400'}`}
        style={{boxShadow:isDL?'0 0 6px #ef4444':'0 0 6px #facc15',animation:'breathe 3s ease-in-out infinite'}}/>}
      <div className="w-8 flex-shrink-0 flex justify-center">
        {isCur&&<svg width="9" height="11" viewBox="0 0 9 11" style={{animation:'arrowFloat 3s ease-in-out infinite'}}>
          <polygon points="0,0 9,5.5 0,11" fill={isDL?'#f87171':'#facc15'}/>
        </svg>}
      </div>
      <div className={`w-7 text-right pr-3 flex-shrink-0 select-none text-[12px] transition-colors duration-300 ${isCur?(isDL?'text-red-400 font-bold':'text-yellow-400 font-bold'):'text-gray-700'}`}>{num}</div>
      <div className="flex-1 text-[13px] py-1.5 pr-4 leading-relaxed">{children}</div>
    </div>
  );
};

const AppContext=React.createContext(null);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
