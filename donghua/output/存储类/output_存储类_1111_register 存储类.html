<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1111 - register 存储类 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(249, 115, 22, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(249, 115, 22, 0.2); border-left: 3px solid #f97316; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#f97316', primaryLight: '#fb923c',
      secondary: '#ea580c', secondaryLight: '#fb923c',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== register 存储类 =====

// 建议编译器将变量存储在寄存器中
register int counter = 0;  // 快速访问

// 典型应用：循环计数器
for(register int i = 0; i < 1000; i++) {
  // 频繁访问的变量
  sum += i;
}

// ===== 现代编译器 =====
// C99 后 register 成为提示，编译器自动优化
// 现代编译器比程序员更懂寄存器分配

int auto_opt = 0;  // 编译器会自动分析并放入寄存器

// ===== 限制 =====
// 不能对 register 变量取地址
// register int x;
// int *p = &x;  // ❌ 错误！`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十一题，register 存储类。",
      2: "register 关键字建议编译器将变量存储在 CPU 寄存器中，而不是内存。",
      3: "寄存器访问比内存快几个数量级，适合频繁访问的变量如循环计数器。",
      4: "for 循环中的 i 每次迭代都访问，放入寄存器可以显著提升性能。",
      5: "现代编译器非常智能，会自动分析并将热点变量放入寄存器。",
      6: "即使不写 register，编译器也会自动优化，所以现代代码很少显式使用。",
      7: "register 变量不能取地址，因为寄存器没有内存地址。",
      8: "C99 后 register 只是提示，编译器可忽略。现代编译器比程序员更懂优化。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-orange-900/50 via-amber-900/50 to-yellow-900/50 rounded-xl p-6 mb-4 border border-orange-700/50">
            <h1 className="text-3xl font-bold text-orange-400 mb-2">1111 - register 存储类</h1>
            <p className="text-orange-300 text-sm">寄存器存储 → 快速访问 → 现代编译器自动优化</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-orange-700/30">
              <h2 className="text-lg font-semibold text-orange-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 3 && i >= 3) ||
                    (step === 3 && i >= 7 && i <= 10) ||
                    (step === 4 && i >= 8 && i <= 8) ||
                    (step === 5 && i >= 13 && i <= 13) ||
                    (step === 6 && i >= 15 && i <= 15) ||
                    (step === 7 && i >= 18 && i <= 21)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-orange-700/30">
              <h2 className="text-lg font-semibold text-orange-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-orange-600/20 to-amber-600/20 rounded-lg border border-orange-500/30">
                    <p className="text-orange-300 text-sm font-medium mb-2">💡 register 存储类</p>
                    <p className="text-xs text-gray-400">register 建议编译器将变量存入 CPU 寄存器，但现代编译器会自动优化，已很少显式使用。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-orange-600/20 to-amber-600/20 rounded-lg border border-orange-500/30">
                    <p className="text-orange-300 text-sm font-medium mb-2">寄存器 vs 内存</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-2">
                        <div className="w-20 text-right text-orange-400 font-medium">寄存器</div>
                        <div className="flex-1 h-8 bg-orange-600/30 rounded flex items-center justify-center text-xs">
                          1-2 CPU 周期
                        </div>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-20 text-right text-gray-400">内存 (RAM)</div>
                        <div className="flex-1 h-8 bg-gray-700/50 rounded flex items-center justify-center text-xs">
                          100-300 CPU 周期
                        </div>
                      </div>
                      <div className="text-center text-green-400 text-xs">
                        寄存器快 50-150 倍!
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-orange-600/20 to-amber-600/20 rounded-lg border border-orange-500/30">
                    <p className="text-orange-300 text-sm font-medium mb-2">循环计数器优化</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-orange-400">register int i;</div>
                        <div>for(i = 0; i &lt; 1000; i++) {'{'}</div>
                        <div>&nbsp;&nbsp;sum += i;  // i 在寄存器中</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-green-400">每次迭代：寄存器访问，无内存延迟</div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-orange-600/20 to-amber-600/20 rounded-lg border border-orange-500/30">
                    <p className="text-orange-300 text-sm font-medium mb-2">性能对比</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-gray-500">// 普通变量 (内存访问)</div>
                        <div>int i; // 每次访问：~100 周期</div>
                        <div>1000 次迭代 ≈ 100,000 周期</div>
                      </div>
                      <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                        <div className="text-orange-400">// register 变量 (寄存器)</div>
                        <div>register int i; // 每次：~2 周期</div>
                        <div>1000 次迭代 ≈ 2,000 周期</div>
                      </div>
                      <div className="text-green-400 text-center">50 倍性能提升!</div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-cyan-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">现代编译器优化</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <p>编译器会自动进行寄存器分配：</p>
                      <div className="p-2 bg-gray-900/50 rounded font-mono text-xs">
                        <div className="text-gray-500">// 即使不写 register</div>
                        <div>int auto_opt = 0;</div>
                        <div>for(int i=0; i&lt;1000; i++)</div>
                        <div>&nbsp;&nbsp;auto_opt += i;</div>
                        <div className="text-green-400 mt-2">// 编译器分析后自动放入寄存器</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-purple-600/20 to-violet-600/20 rounded-lg border border-purple-500/30">
                    <p className="text-purple-300 text-sm font-medium mb-2">编译器智能分析</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-purple-400 font-medium">编译器分析步骤:</p>
                        <ol className="list-decimal list-inside space-y-1 mt-2">
                          <li>识别热点变量 (频繁访问)</li>
                          <li>计算变量生命周期</li>
                          <li>分配有限的寄存器资源</li>
                          <li>溢出到内存 (register spill)</li>
                        </ol>
                      </div>
                      <div className="text-blue-400 text-center">比程序员手动指定更优!</div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-red-600/20 to-orange-600/20 rounded-lg border border-red-500/30">
                    <p className="text-red-300 text-sm font-medium mb-2">⚠️ 限制：不能取地址</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-orange-400">register int x = 10;</div>
                        <div className="text-red-400">int *p = &x;  // ❌ 编译错误!</div>
                        <div className="text-gray-500 mt-2">// 原因：寄存器没有内存地址</div>
                      </div>
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400">int y = 20;</div>
                        <div className="text-green-400">int *q = &y;  // ✅ 正确</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-orange-900/20 rounded-lg border border-orange-500/30">
                      <p className="text-orange-300 text-xs font-medium mb-2">📋 现代实践</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• C99 后 register 是提示 (hint)，编译器可忽略</li>
                        <li>• 现代编译器优化非常智能，不需要手动指定</li>
                        <li>• -O2/-O3 优化级别自动进行寄存器分配</li>
                        <li>• 建议：写清晰的代码，让编译器优化</li>
                      </ul>
                    </div>
                    <div className="text-xs text-gray-500 text-center">
                      信任编译器 &gt; 手动优化
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-orange-700/30">
                <h2 className="text-lg font-semibold text-orange-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-orange-900/30 text-orange-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 寄存器比内存快 50-150 倍
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 3 ? 'bg-orange-900/30 text-orange-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 适合循环计数器等热点变量
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-orange-900/30 text-orange-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 不能对 register 变量取地址
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-orange-700/30">
                <h2 className="text-lg font-semibold text-orange-400 mb-3">存储类别对比</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">register</p>
                    <p className="text-gray-400">建议存入寄存器 (提示)</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">auto (默认)</p>
                    <p className="text-gray-400">栈上存储，编译器可能优化到寄存器</p>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">static</p>
                    <p className="text-gray-400">数据段存储，程序生命周期</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-orange-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-orange-600 hover:bg-orange-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-orange-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-orange-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-orange-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-orange-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
