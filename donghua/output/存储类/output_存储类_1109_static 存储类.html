<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1109 - static 存储类 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(139, 92, 246, 0.2); border-left: 3px solid #8b5cf6; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#8b5cf6', primaryLight: '#a78bfa',
      secondary: '#6366f1', secondaryLight: '#818cf8',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== static 三种用法 =====

// 1. 修饰局部变量 (延长生命周期)
void counter() {
  static int count = 0;  // 只初始化一次，存储在数据段
  count++;
  printf("%d\\n", count);
}

// 2. 修饰全局变量 (限制文件作用域)
static int file_global = 100;  // 仅当前文件可见
// 其他文件无法通过 extern 引用

// 3. 修饰函数 (限制文件作用域)
static void helper() {  // 仅当前文件可调用
  printf("helper\\n");
}

// ===== 对比 =====
int normal_global = 200;      // 外部可见 (default extern)
static int static_global = 300; // 仅本文件可见`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百零九题，static 存储类。",
      2: "static 有三种用法：修饰局部变量、全局变量和函数。",
      3: "修饰局部变量时，static 延长生命周期到程序结束，存储在数据段而非栈。",
      4: "counter 函数每次调用，count 都保留上次的值，不会重新初始化为 0。",
      5: "修饰全局变量时，static 限制作用域为当前文件，其他文件无法通过 extern 访问。",
      6: "修饰函数时，static 同样限制作用域为当前文件，实现私有函数。",
      7: "对比：normal_global 默认 extern 可见，static_global 仅本文件可见。",
      8: "static 的核心：修饰局部变量延长生命周期，修饰全局限制作用域。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-violet-900/50 via-purple-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-violet-700/50">
            <h1 className="text-3xl font-bold text-violet-400 mb-2">1109 - static 存储类</h1>
            <p className="text-violet-300 text-sm">延长生命周期 / 限制作用域 / 私有化函数</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 3 && i >= 3 && i <= 7) ||
                    (step === 4 && i >= 11 && i <= 15) ||
                    (step === 5 && i >= 10 && i <= 10) ||
                    (step === 6 && i >= 14 && i <= 14) ||
                    (step === 7 && i >= 18 && i <= 19)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">💡 static 存储类</p>
                    <p className="text-xs text-gray-400">static 有三种用法：延长局部变量生命周期、限制全局变量/函数的文件作用域。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">三种用法</p>
                    <ul className="text-xs text-gray-400 space-y-1">
                      <li>① static 修饰局部变量 → 延长生命周期</li>
                      <li>② static 修饰全局变量 → 限制文件作用域</li>
                      <li>③ static 修饰函数 → 私有化函数</li>
                    </ul>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-violet-900/20 rounded-lg border border-violet-500/30">
                      <p className="text-violet-300 text-xs font-medium mb-2">static 局部变量</p>
                      <div className="text-xs text-gray-400 space-y-1">
                        <div>• 存储在数据段 (data segment)</div>
                        <div>• 程序启动时初始化，程序结束时销毁</div>
                        <div>• 只初始化一次，后续调用保留上次的值</div>
                      </div>
                    </div>
                    <div className="text-xs bg-gray-900/50 p-2 rounded font-mono">
                      <div className="text-gray-500">// 普通局部变量</div>
                      <div>auto int x; // 栈，函数返回后销毁</div>
                      <div className="text-gray-500 mt-2">// static 局部变量</div>
                      <div>static int y; // 数据段，程序结束才销毁</div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">counter() 调用过程</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>counter(); // count: 0→1, 输出 1</div>
                        <div>counter(); // count: 1→2, 输出 2</div>
                        <div>counter(); // count: 2→3, 输出 3</div>
                      </div>
                      <div className="text-green-400">static 保留状态!</div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-cyan-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">static 全局变量</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-green-400">// file1.c</div>
                        <div>static int file_global = 100;</div>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-green-400">// file2.c</div>
                        <div>extern int file_global; // ❌ 链接错误!</div>
                      </div>
                      <div className="text-orange-400">其他文件无法访问 static 全局变量</div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-fuchsia-600/20 to-pink-600/20 rounded-lg border border-fuchsia-500/30">
                    <p className="text-fuchsia-300 text-sm font-medium mb-2">static 函数</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-green-400">// file1.c</div>
                        <div>static void helper() {'{'}...{'}'}</div>
                        <div>void public_func() {'{'}</div>
                        <div>&nbsp;&nbsp;helper(); // ✅ 本文件可调用</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-green-400">// file2.c</div>
                        <div>void helper(); // ❌ 链接错误!</div>
                      </div>
                      <div className="text-blue-400">实现私有函数，避免命名冲突</div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">链接属性对比</p>
                    <table className="text-xs text-gray-400 w-full">
                      <thead><tr className="border-b border-violet-500/30"><th className="text-left py-1">声明</th><th className="text-left">作用域</th><th className="text-left">链接</th></tr></thead>
                      <tbody>
                        <tr><td className="py-1">int global</td><td>全局</td><td className="text-orange-400">extern (可见)</td></tr>
                        <tr><td className="py-1">static int g</td><td>全局</td><td className="text-green-400">internal (私有)</td></tr>
                        <tr><td className="py-1">static void fn()</td><td>全局</td><td className="text-green-400">internal (私有)</td></tr>
                      </tbody>
                    </table>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-violet-900/20 rounded-lg border border-violet-500/30">
                      <p className="text-violet-300 text-xs font-medium mb-2">📋 使用场景</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• 计数器/状态保持 (static 局部)</li>
                        <li>• 模块私有配置 (static 全局)</li>
                        <li>• 辅助函数/回调 (static 函数)</li>
                        <li>• 避免命名空间污染</li>
                      </ul>
                    </div>
                    <div className="text-xs text-gray-500 text-center">
                      static = 延长生命周期 (局部) 或 限制作用域 (全局/函数)
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 3 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> static 局部：数据段存储，程序结束销毁
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 5 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> static 全局：internal linkage，文件私有
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 6 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> static 函数：模块内部辅助函数
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">内存布局</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">代码段 (.text)</p>
                    <p className="text-gray-400">函数代码</p>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">数据段 (.data/.bss)</p>
                    <p className="text-gray-400">static 变量、全局变量</p>
                  </div>
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">栈 (stack)</p>
                    <p className="text-gray-400">auto 局部变量、函数参数</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-violet-600 hover:bg-violet-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-violet-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-violet-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-violet-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-violet-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
