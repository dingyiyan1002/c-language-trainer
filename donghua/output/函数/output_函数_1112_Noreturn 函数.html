<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1112 - _Noreturn 函数 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(239, 68, 68, 0.2); border-left: 3px solid #ef4444; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#ef4444', primaryLight: '#f87171',
      secondary: '#dc2626', secondaryLight: '#f87171',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== _Noreturn 函数 =====
#include <stdnoreturn.h>

// C11 引入，标记函数永不返回
noreturn void crash_handler() {
  printf("CRASH! System halting...\\n");
  while(1) {
    // 死循环，永不返回
    __wfi();  // 等待中断
  }
}

// ===== 典型应用 =====
noreturn void system_reset() {
  printf("Resetting...\\n");
  NVIC_SystemReset();  // 硬件复位
  // 永远不会执行到这里
}

// ===== 编译器优化 =====
// 知道函数不返回，编译器可以：
// 1. 省略返回后的代码
// 2. 更好的警告检测
void check(int x) {
  if(x < 0) crash_handler();
  // 编译器知道这里 x >= 0
  printf("%d\\n", x);  // 无未初始化警告
}`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十二题，_Noreturn 函数。",
      2: "_Noreturn 或 noreturn 是 C11 引入的关键字，标记函数永远不会返回到调用点。",
      3: "典型应用包括崩溃处理、系统复位、无限循环等。",
      4: "crash_handler 函数进入死循环，等待中断，永远不会返回调用者。",
      5: "system_reset 调用硬件复位函数，执行后系统重启，不会返回。",
      6: "编译器知道函数不返回，可以进行优化，省略返回后的清理代码。",
      7: "编译器还可以进行更好的静态分析，消除虚假的未初始化警告。",
      8: "C11 标准：noreturn，C++11：[[noreturn]]，GCC：__attribute__((noreturn))。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-red-900/50 via-rose-900/50 to-pink-900/50 rounded-xl p-6 mb-4 border border-red-700/50">
            <h1 className="text-3xl font-bold text-red-400 mb-2">1112 - _Noreturn 函数</h1>
            <p className="text-red-300 text-sm">永不返回的函数 → 编译器优化 → 更好的静态分析</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-red-700/30">
              <h2 className="text-lg font-semibold text-red-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 10) ||
                    (step === 3 && i >= 14 && i <= 14) ||
                    (step === 4 && i >= 6 && i <= 10) ||
                    (step === 5 && i >= 15 && i <= 18) ||
                    (step === 6 && i >= 22 && i <= 25) ||
                    (step === 7 && i >= 27 && i <= 32)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-red-700/30">
              <h2 className="text-lg font-semibold text-red-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-red-600/20 to-rose-600/20 rounded-lg border border-red-500/30">
                    <p className="text-red-300 text-sm font-medium mb-2">💡 _Noreturn 函数</p>
                    <p className="text-xs text-gray-400">noreturn 标记函数永远不会返回到调用点，帮助编译器优化和静态分析。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-red-600/20 to-rose-600/20 rounded-lg border border-red-500/30">
                    <p className="text-red-300 text-sm font-medium mb-2">C11 noreturn 关键字</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <p>包含头文件：</p>
                      <div className="text-red-400 font-mono bg-gray-900/50 p-2 rounded">
                        #include &lt;stdnoreturn.h&gt;
                      </div>
                      <p>声明永不返回的函数：</p>
                      <div className="text-red-400 font-mono bg-gray-900/50 p-2 rounded">
                        noreturn void crash_handler() {'{'}...{'}'}
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-red-600/20 to-rose-600/20 rounded-lg border border-red-500/30">
                    <p className="text-red-300 text-sm font-medium mb-2">典型应用场景</p>
                    <div className="grid grid-cols-2 gap-2 text-xs text-gray-400">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-red-400 font-medium">崩溃处理</p>
                        <p>crash_handler()</p>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-red-400 font-medium">系统复位</p>
                        <p>system_reset()</p>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-red-400 font-medium">无限循环</p>
                        <p>main 事件循环</p>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <p className="text-red-400 font-medium">致命错误</p>
                        <p>fatal_error()</p>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-red-600/20 to-rose-600/20 rounded-lg border border-red-500/30">
                    <p className="text-red-300 text-sm font-medium mb-2">crash_handler 实现</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>noreturn void crash_handler() {'{'}</div>
                        <div>&nbsp;&nbsp;printf("CRASH!");</div>
                        <div>&nbsp;&nbsp;while(1) {'{'}</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;__wfi();  // 等待中断</div>
                        <div>&nbsp;&nbsp;{'}'}</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-red-400">死循环 → 永不返回</div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-orange-600/20 to-amber-600/20 rounded-lg border border-orange-500/30">
                    <p className="text-orange-300 text-sm font-medium mb-2">system_reset 实现</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>noreturn void system_reset() {'{'}</div>
                        <div>&nbsp;&nbsp;printf("Resetting...");</div>
                        <div>&nbsp;&nbsp;NVIC_SystemReset();</div>
                        <div>&nbsp;&nbsp;// 永远不会执行到这里</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-orange-400">硬件复位 → 程序终止</div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-blue-600/20 to-cyan-600/20 rounded-lg border border-blue-500/30">
                    <p className="text-blue-300 text-sm font-medium mb-2">编译器优化</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <p>知道函数不返回，编译器可以：</p>
                      <ul className="list-disc list-inside space-y-1">
                        <li>省略返回后的栈清理代码</li>
                        <li>更好的寄存器分配</li>
                        <li>消除不可达代码警告</li>
                        <li>优化控制流图</li>
                      </ul>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">静态分析改进</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-gray-500">// 没有 noreturn</div>
                        <div>void check(int x) {'{'}</div>
                        <div>&nbsp;&nbsp;if(x &lt; 0) error();</div>
                        <div>&nbsp;&nbsp;printf("%d", x);</div>
                        <div>&nbsp;&nbsp;// ⚠️ 警告：x 可能未初始化</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400">// 有 noreturn</div>
                        <div>void check(int x) {'{'}</div>
                        <div>&nbsp;&nbsp;if(x &lt; 0) crash_handler();</div>
                        <div>&nbsp;&nbsp;printf("%d", x);</div>
                        <div>&nbsp;&nbsp;// ✅ 编译器知道 x 有效</div>
                        <div>{'}'}</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-red-900/20 rounded-lg border border-red-500/30">
                      <p className="text-red-300 text-xs font-medium mb-2">📋 不同编译器语法</p>
                      <table className="text-xs text-gray-400 w-full">
                        <thead><tr className="border-b border-red-500/30"><th className="text-left py-1">标准/编译器</th><th className="text-left">语法</th></tr></thead>
                        <tbody>
                          <tr><td className="py-1">C11</td><td>noreturn void fn()</td></tr>
                          <tr><td className="py-1">C++11</td><td>[[noreturn]] void fn()</td></tr>
                          <tr><td className="py-1">GCC/Clang</td><td>void fn() __attribute__((noreturn))</td></tr>
                          <tr><td className="py-1">MSVC</td><td>__declspec(noreturn) void fn()</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-red-700/30">
                <h2 className="text-lg font-semibold text-red-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-red-900/30 text-red-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> noreturn 标记函数永不返回
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 6 ? 'bg-red-900/30 text-red-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 帮助编译器优化控制流
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-red-900/30 text-red-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 改善静态分析，消除假警告
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-red-700/30">
                <h2 className="text-lg font-semibold text-red-400 mb-3">使用场景</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">错误处理</p>
                    <p className="text-gray-400">崩溃、断言失败、致命错误</p>
                  </div>
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">系统控制</p>
                    <p className="text-gray-400">复位、关机、重启</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">事件循环</p>
                    <p className="text-gray-400">RTOS 任务、无限循环</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-red-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-red-600 hover:bg-red-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-red-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-red-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-red-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-red-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
