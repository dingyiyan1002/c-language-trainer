<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1122 - 可变参数函数 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(34, 197, 94, 0.2); border-left: 3px solid #22c55e; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#22c55e', primaryLight: '#4ade80',
      secondary: '#16a34a', secondaryLight: '#4ade80',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 可变参数函数 (stdarg.h) =====
#include <stdarg.h>
#include <stdio.h>

// printf 风格可变参数
int sum(int count, ...) {
  va_list args;
  va_start(args, count);  // 初始化

  int total = 0;
  for(int i = 0; i < count; i++) {
    total += va_arg(args, int);  // 获取下一个参数
  }

  va_end(args);  // 清理
  return total;
}

// 调用
int result = sum(5, 1, 2, 3, 4, 5);  // 15

// 类似 printf 的实现
void my_printf(const char* fmt, ...) {
  va_list args;
  va_start(args, fmt);
  vprintf(fmt, args);
  va_end(args);
}`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十二题，可变参数函数。",
      2: "可变参数函数使用 ellipsis (...) 接受不定数量和类型的参数。",
      3: "sum 函数接受 count 参数和可变数量的 int 参数。",
      4: "va_list 声明参数列表变量，va_start 初始化它。",
      5: "va_arg 依次获取每个参数，需要指定类型。",
      6: "va_end 清理资源，必须在函数返回前调用。",
      7: "调用 sum(5, 1,2,3,4,5) 返回 15，第一个参数告诉函数后面有多少个参数。",
      8: "典型应用：printf、scanf、日志函数等需要灵活参数数量的场景。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-green-900/50 via-emerald-900/50 to-teal-900/50 rounded-xl p-6 mb-4 border border-green-700/50">
            <h1 className="text-3xl font-bold text-green-400 mb-2">1122 - 可变参数函数</h1>
            <p className="text-green-300 text-sm">stdarg.h / va_list / printf 风格</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
              <h2 className="text-lg font-semibold text-green-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 6 && i <= 6) ||
                    (step === 3 && i >= 6 && i <= 6) ||
                    (step === 4 && i >= 8 && i <= 9) ||
                    (step === 5 && i >= 12 && i <= 12) ||
                    (step === 6 && i >= 15 && i <= 15) ||
                    (step === 7 && i >= 18 && i <= 18)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
              <h2 className="text-lg font-semibold text-green-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">💡 可变参数函数</p>
                    <p className="text-xs text-gray-400">使用 stdarg.h 宏实现接受不定数量和类型参数的函数，如 printf 和 scanf。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">函数声明</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>int sum(int count, <span className="text-green-400">...</span>);</div>
                      </div>
                      <div className="text-gray-400 text-xs">
                        ... 是 ellipsis 操作符，表示可变参数<br/>
                        必须至少有一个命名参数 (count)
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">参数访问流程</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400">① va_list args;</div>
                        <div className="text-gray-500 text-xs">声明参数列表变量</div>
                      </div>
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400">② va_start(args, count);</div>
                        <div className="text-gray-500 text-xs">初始化，指向第一个可变参数</div>
                      </div>
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400">③ va_arg(args, int);</div>
                        <div className="text-gray-500 text-xs">获取下一个参数，类型为 int</div>
                      </div>
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400">④ va_end(args);</div>
                        <div className="text-gray-500 text-xs">清理资源</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">va_list 和 va_start</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>va_list args;</div>
                        <div className="text-green-400">va_start(args, count);</div>
                      </div>
                      <div className="text-gray-500 text-xs">
                        va_list 实际是指针类型<br/>
                        va_start 让 args 指向 count 后面的第一个参数
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">va_arg 获取参数</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>total += <span className="text-green-400">va_arg(args, int)</span>;</div>
                      </div>
                      <div className="text-gray-500 text-xs">
                        每次调用 va_arg 返回下一个参数<br/>
                        必须正确指定类型，否则行为未定义
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">va_end 清理</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-green-400">va_end(args);</div>
                      </div>
                      <div className="text-gray-500 text-xs">
                        清理 va_list 占用的资源<br/>
                        必须在函数返回前调用 (包括 return 语句前)
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">调用示例</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-gray-500">// 调用可变参数函数</div>
                        <div>sum(3, 10, 20, 30);  // = 60</div>
                        <div>sum(5, 1, 2, 3, 4, 5);  // = 15</div>
                      </div>
                      <div className="text-green-400 text-center">
                        第一个参数告诉函数后面有多少个参数
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-green-900/20 rounded-lg border border-green-500/30">
                      <p className="text-green-300 text-xs font-medium mb-2">📋 printf 实现</p>
                      <pre className="text-xs text-gray-400 font-mono">
{`void my_printf(const char* fmt, ...) {
  va_list args;
  va_start(args, fmt);
  vprintf(fmt, args);  // 格式化输出
  va_end(args);
}`}
                      </pre>
                    </div>
                    <div className="text-xs text-gray-500 text-center">
                      printf 使用格式字符串解析后续参数类型
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
                <h2 className="text-lg font-semibold text-green-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-green-900/30 text-green-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> ... 表示可变参数，必须至少一个命名参数
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-green-900/30 text-green-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> va_start → va_arg → va_end 顺序使用
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 8 ? 'bg-green-900/30 text-green-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 需要额外机制知道参数数量和类型
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
                <h2 className="text-lg font-semibold text-green-400 mb-3">注意事项</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">类型安全</p>
                    <p className="text-gray-400">va_arg 不会自动类型转换，必须指定正确类型</p>
                  </div>
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">参数计数</p>
                    <p className="text-gray-400">需要某种方式知道有多少参数 (如 printf 的格式串)</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">默认提升</p>
                    <p className="text-gray-400">float 会被提升为 double，char/short 提升为 int</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-green-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-green-600 hover:bg-green-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-green-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-green-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-green-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-green-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
