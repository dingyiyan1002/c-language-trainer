<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>inline 内联函数 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#ec4899 0%,#db2777 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#831843;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#9d174d;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#fce7f3,#fbcfe8);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#f472b6;transition:all 0.3s ease}
    .var-card.highlight{border-color:#ec4899;box-shadow:0 0 20px rgba(236,72,153,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#831843;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .function-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .function-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .function-box.definition{background:linear-gradient(135deg:#fce7f3,#fbcfe8);border-color:#ec4899}
    .function-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .call-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .call-label{width:100px;font-size:11px;color:#9d174d;font-weight:600;font-family:'Consolas',monospace}
    .call-box{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .call-box.active{border-color:#ec4899;background:linear-gradient(135deg:#fce7f3,#fbcfe8)}
    .call-type{font-size:10px;color:#64748b}
    .call-value{font-size:12px;font-weight:700;color:#9d174d;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#ec4899;background:linear-gradient(135deg:#fce7f3,#fbcfe8)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#9d174d;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .performance-chart{display:flex;align-items:flex-end;gap:16px;margin:16px 0;padding:16px;background:#fff;border-radius:12px}
    .bar-group{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
    .bar{width:60px;border-radius:8px 8px 0 0;transition:all 0.5s ease;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
    .bar-normal{background:linear-gradient(135deg:#f472b6,#ec4899);height:0}
    .bar-inline{background:linear-gradient(135deg,#22c55e,#16a34a);height:0}
    .bar-label{font-size:11px;color:#64748b;text-align:center}
    .bar-value{font-size:12px;font-weight:700;color:#64748b}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#fce7f3;border-radius:8px;padding:12px;border-left:4px solid#ec4899;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#fce7f3,#fbcfe8)}
    .use-title{font-size:11px;color:#831843;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#9d174d;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#22d3ee;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#22d3ee;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',pink:'#ec4899'};
    const LINE_MAP = {
      1:{step:1,text:'#include <stdio.h>',color:'#7c3aed'},
      2:{step:2,text:'inline int square(int x) {',color:'#ec4899'},
      3:{step:2,text:'    return x * x;',color:'#ec4899'},
      4:{step:3,text:'int result = square(5);',color:'#3b82f6'},
      5:{step:4,text:'printf("%d\\n", result);',color:'#eab308'},
      6:{step:5,text:'inline int add(int a, int b) { return a + b; }',color:'#22c55e'},
      7:{step:6,text:'return 0;',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，inline 关键字建议编译器将函数代码内联展开',
      2:'定义 inline 函数 square，编译器可能将代码直接插入调用处',
      3:'调用 square(5)，内联后相当于 result = 5 * 5，省去调用开销',
      4:'输出 25，inline 消除函数调用开销，提升执行速度',
      5:'定义另一个 inline 函数 add，用于小型频繁调用函数',
      6:'程序结束，inline 用于小型函数，编译器决定是否真正内联'
    };
    const functions = [
      {name:'square',params:'int x',body:'return x*x;',calls:3},
      {name:'add',params:'int a, int b',body:'return a+b;',calls:2},
      {name:'max',params:'int a, int b',body:'return a>b?a:b;',calls:1}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',inline:'M13 10V3L4 14h7v7l9-11h-7z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeFunc,setActiveFunc] = useState(-1);
      const [normalCycles,setNormalCycles] = useState(0);
      const [inlineCycles,setInlineCycles] = useState(0);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 7; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveFunc(-1);
          setNormalCycles(0);
          setInlineCycles(0);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveFunc(0);
        } else if(step === 3) {
          setActiveFunc(0);
          setNormalCycles(12);
          setInlineCycles(4);
        } else if(step === 4) {
          setTerminalLines(['25']);
        } else if(step === 5) {
          setActiveFunc(1);
        } else if(step === 6) {
          // Complete
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveFunc(-1);
        setNormalCycles(0);
        setInlineCycles(0);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>inline 内联函数 - C 语言可视化</h1>
            <p>inline | 函数内联 | 性能优化</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.pink,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                inline_function.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6,7].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.inline} size={22} />
                inline 内联函数可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">inline</span>
                  <span className="var-type">Function Inlining</span>
                </div>
                <div className="function-container">
                  <div className={`function-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#831843',marginBottom:12}}>内联函数演示</div>
                    {functions.map((f, idx) => (
                      <div key={f.name} className="call-row">
                        <span className="call-label">{f.name}()</span>
                        <div className={`call-box ${step >= 2 + idx && activeFunc === idx ? 'active' : ''}`}>
                          <div className="call-type">{f.params}</div>
                          <div className="call-value">{f.body}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">普通函数</div>
                    <div className="compare-code">CALL + RET</div>
                    <div className="compare-desc">函数调用开销</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">inline 函数</div>
                    <div className="compare-code">直接展开</div>
                    <div className="compare-desc">无调用开销</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">普通函数</div>
                    <div className="compare-code">栈帧创建</div>
                    <div className="compare-desc">压栈/出栈</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">inline 函数</div>
                    <div className="compare-code">代码替换</div>
                    <div className="compare-desc">零栈开销</div>
                  </div>
                </div>
                <div className="performance-chart">
                  <div className="bar-group">
                    <div className="bar bar-normal" style={{height:step >= 3 ? `${normalCycles * 4}px` : '0'}}>
                      <span className="bar-value">{normalCycles}</span>
                    </div>
                    <span className="bar-label">普通函数<br/>调用周期</span>
                  </div>
                  <div className="bar-group">
                    <div className="bar bar-inline" style={{height:step >= 3 ? `${inlineCycles * 4}px` : '0'}}>
                      <span className="bar-value">{inlineCycles}</span>
                    </div>
                    <span className="bar-label">inline 函数<br/>调用周期</span>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">小型数学函数</div>
                    <div className="use-example">inline int square(int x) { return x * x; }</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">访问器/设置器</div>
                    <div className="use-example">inline int get_value() { return value; }</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">频繁调用的工具函数</div>
                    <div className="use-example">inline int max(int a, int b) { return a > b ? a : b; }</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">嵌入式性能关键代码</div>
                    <div className="use-example">inline void set_bit(volatile uint32_t *reg, int bit);</div>
                  </div>
                </div>
              </div>
              {step >= 4 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.pink}}>inline 作用</strong>
                <p style={{marginTop:8,color:'#78350f'}}>建议编译器内联展开</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>消除开销</strong>
                <p style={{marginTop:8,color:'#78350f'}}>省去 CALL/RET 指令</p>
              </div>
              <div className={`explanation-card ${step >= 3 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>性能提升</strong>
                <p style={{marginTop:8,color:'#78350f'}}>减少 60-70% 周期</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>编译器决策</strong>
                <p style={{marginTop:8,color:#78350f'}}>编译器可忽略 inline</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
