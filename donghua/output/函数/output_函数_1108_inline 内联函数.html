<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1108 - inline 内联函数 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #3b82f6; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#0ea5e9', primaryLight: '#38bdf8',
      secondary: '#6366f1', secondaryLight: '#818cf8',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 内联函数 vs 普通函数 =====

// 普通函数 (有调用开销)
int square_func(int x) {
  return x * x;
}

// 内联函数 (编译器内联展开)
inline int square_inline(int x) {
  return x * x;
}

// ===== 调用点 =====
int a = square_func(5);      // 函数调用：压栈→跳转→返回
int b = square_inline(5);    // 内联展开：直接计算 5*5

// ===== 适用场景 =====
inline int max_inline(int a, int b) {
  return a > b ? a : b;      // 小函数适合内联
}

// 递归函数不适合内联
int factorial(int n) {
  return n <= 1 ? 1 : n * factorial(n-1);
}`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百零八题，inline 内联函数。",
      2: "内联函数使用 inline 关键字声明，建议编译器在编译时将函数体直接插入到调用点。",
      3: "普通函数调用需要压栈、跳转、返回，有运行时开销。内联函数消除这些开销。",
      4: "调用 square_func 时，CPU 执行函数调用指令，有压栈和返回开销。",
      5: "调用 square_inline 时，编译器直接展开为 x*x，没有函数调用开销。",
      6: "内联函数适合小型、频繁调用的函数，如 max、min 等工具函数。",
      7: "递归函数不适合内联，因为展开次数不确定，编译器会忽略 inline 请求。",
      8: "内联是编译器的建议，不是命令。编译器可能根据优化级别决定是否内联。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-sky-900/50 via-cyan-900/50 to-blue-900/50 rounded-xl p-6 mb-4 border border-sky-700/50">
            <h1 className="text-3xl font-bold text-sky-400 mb-2">1108 - inline 内联函数</h1>
            <p className="text-sky-300 text-sm">函数调用开销 → 编译时内联展开 → 零运行时开销</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
              <h2 className="text-lg font-semibold text-sky-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 2 && i <= 4) ||
                    (step === 3 && i >= 6 && i <= 8) ||
                    (step === 4 && i >= 13 && i <= 13) ||
                    (step === 5 && i >= 14 && i <= 14) ||
                    (step === 6 && i >= 17 && i <= 19) ||
                    (step === 7 && i >= 22 && i <= 25)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
              <h2 className="text-lg font-semibold text-sky-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">💡 inline 内联函数</p>
                    <p className="text-xs text-gray-400">编译器建议在调用点直接展开函数体，消除函数调用开销。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">内联关键字</p>
                    <p className="text-xs text-gray-400 mb-2">inline 是编译器的建议，不是强制命令。</p>
                    <div className="text-xs bg-gray-900/50 p-2 rounded font-mono">
                      <span className="text-sky-400">inline</span> int square_inline(int x) {'{'}...{'}'}
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-red-900/20 rounded-lg border border-red-500/30">
                      <p className="text-red-300 text-xs font-medium mb-2">普通函数调用开销</p>
                      <div className="text-xs text-gray-400 space-y-1">
                        <div>① 参数压栈 (push arguments)</div>
                        <div>② 跳转到函数地址 (call instruction)</div>
                        <div>③ 执行函数体</div>
                        <div>④ 返回值 (return)</div>
                        <div>⑤ 清理栈 (cleanup stack)</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-red-600/20 to-orange-600/20 rounded-lg border border-red-500/30">
                    <p className="text-red-300 text-sm font-medium mb-2">square_func(5) 调用过程</p>
                    <div className="text-xs text-gray-400 font-mono space-y-1">
                      <div className="animate-pulse">caller: push 5 → call square_func</div>
                      <div className="animate-pulse delay-100">callee: return 5*5 = 25</div>
                      <div className="animate-pulse delay-200">caller: pop result → a = 25</div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">square_inline(5) 内联展开</p>
                    <div className="text-xs text-gray-400 font-mono space-y-1">
                      <div className="text-green-400">编译器展开:</div>
                      <div>int b = square_inline(5);</div>
                      <div className="text-sky-400">↓ 编译后</div>
                      <div>int b = 5 * 5;</div>
                      <div className="text-green-400">零函数调用开销!</div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-sky-600/20 to-cyan-600/20 rounded-lg border border-sky-500/30">
                    <p className="text-sky-300 text-sm font-medium mb-2">✅ 适合内联的场景</p>
                    <ul className="text-xs text-gray-400 space-y-1">
                      <li>• 小型函数 (&lt; 10 行)</li>
                      <li>• 频繁调用的工具函数 (max, min, abs)</li>
                      <li>• 简单 getter/setter</li>
                      <li>• 性能关键路径上的函数</li>
                    </ul>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-orange-600/20 to-amber-600/20 rounded-lg border border-orange-500/30">
                    <p className="text-orange-300 text-sm font-medium mb-2">⚠️ 不适合内联的场景</p>
                    <ul className="text-xs text-gray-400 space-y-1">
                      <li>• 递归函数 (展开次数不确定)</li>
                      <li>• 大型函数 (代码膨胀)</li>
                      <li>• 包含复杂循环的函数</li>
                      <li>• 虚函数 (运行时绑定)</li>
                    </ul>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-sky-900/20 rounded-lg border border-sky-500/30">
                      <p className="text-sky-300 text-xs font-medium mb-2">编译器优化建议</p>
                      <table className="text-xs text-gray-400 w-full">
                        <thead><tr className="border-b border-sky-500/30"><th className="text-left py-1">优化级别</th><th className="text-left">内联行为</th></tr></thead>
                        <tbody>
                          <tr><td className="py-1">-O0</td><td>不内联 (便于调试)</td></tr>
                          <tr><td className="py-1">-O2</td><td>自动内联小函数</td></tr>
                          <tr><td className="py-1">-O3</td><td>激进内联 (可能代码膨胀)</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
                <h2 className="text-lg font-semibold text-sky-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 1 ? 'bg-sky-900/30 text-sky-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> inline 是建议，编译器可忽略
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 3 ? 'bg-sky-900/30 text-sky-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 消除函数调用开销 (压栈/跳转/返回)
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 5 ? 'bg-sky-900/30 text-sky-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 代价：代码膨胀 (多次展开)
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 6 ? 'bg-sky-900/30 text-sky-300' : 'text-gray-500'}`}>
                    <span className="font-medium">④</span> 适合小函数、频繁调用场景
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
                <h2 className="text-lg font-semibold text-sky-400 mb-3">使用场景</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">性能关键代码</p>
                    <p className="text-gray-400">循环中频繁调用的小函数</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">工具函数</p>
                    <p className="text-gray-400">max/min/abs/clamp 等</p>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">头文件中的函数</p>
                    <p className="text-gray-400">避免多重定义错误</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-sky-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-sky-600 hover:bg-sky-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-sky-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-sky-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-sky-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-sky-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
