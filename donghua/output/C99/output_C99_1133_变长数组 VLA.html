<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1133 - 变长数组 VLA | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(139, 92, 246, 0.2); border-left: 3px solid #8b5cf6; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#8b5cf6', primaryLight: '#a78bfa',
      secondary: '#7c3aed', secondaryLight: '#a78bfa',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 变长数组 VLA (Variable Length Array, C99) =====
// 数组长度在运行时确定

// 1. 基本用法
void process(int n) {
  int arr[n];  // VLA: 长度在运行时确定
  for(int i = 0; i < n; i++) {
    arr[i] = i * 2;
  }
}

// 2. 多维 VLA
void matrix(int rows, int cols) {
  int mat[rows][cols];  // 运行时确定维度
  mat[0][0] = 1;
}

// 3. 与 malloc 对比
void example(int n) {
  int vla[n];           // 栈上分配，自动释放
  int* dyn = malloc(n * sizeof(int));  // 堆上分配，需手动 free
  free(dyn);
  // vla 自动释放，无需 free
}

// 4. 限制：不能有初始值
int bad[n] = {0};  // ❌ 编译错误
int good[5] = {0}; // ✅ 固定长度可以

// 5. C11 状态：VLA 变为可选特性
// GCC/Clang 支持，MSVC 不支持`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百三十三题，变长数组 VLA (Variable Length Array)。",
      2: "变长数组是 C99 引入的特性，允许在运行时确定数组长度，而非常量表达式。",
      3: "VLA 在栈上分配内存，函数返回时自动释放，无需手动管理，比 malloc 更方便。",
      4: "VLA 支持多维数组，所有维度都可以在运行时确定，方便矩阵运算。",
      5: "与 malloc 对比：VLA 在栈上分配、自动释放；malloc 在堆上、需手动 free。",
      6: "VLA 的限制：不能有初始值、不能是结构体成员、不能在全局作用域。",
      7: "C11 标准中 VLA 变为可选特性，部分编译器可能不支持，需注意可移植性。",
      8: "应用：临时缓冲区、已知大小的栈上分配、避免 malloc 碎片的场景。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-violet-900/50 via-purple-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-violet-700/50">
            <h1 className="text-3xl font-bold text-violet-400 mb-2">1133 - 变长数组 VLA</h1>
            <p className="text-violet-300 text-sm">C99 运行时长度 / 栈上分配 / 自动释放</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 9) ||
                    (step === 3 && i >= 4 && i <= 9) ||
                    (step === 4 && i >= 12 && i <= 16) ||
                    (step === 5 && i >= 19 && i <= 23) ||
                    (step === 6 && i >= 26 && i <= 28) ||
                    (step === 7 && i >= 30 && i <= 31)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">💡 变长数组 VLA</p>
                    <p className="text-xs text-gray-400">变长数组 (VLA) 是 C99 引入的特性，允许数组长度在运行时确定，而不是编译时常量，提供更灵活的栈上内存分配。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">基本语法</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-violet-400">void process(int n) {'{'}</div>
                        <div>&nbsp;&nbsp;int arr[n];  <span className="text-gray-500">// n 是运行时变量</span></div>
                        <div>&nbsp;&nbsp;for(int i = 0; i &lt; n; i++) {'{'}</div>
                        <div>&nbsp;&nbsp;&nbsp;&nbsp;arr[i] = i * 2;</div>
                        <div>&nbsp;&nbsp;{'}'}</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="text-violet-400 text-center text-xs">
                        数组长度由函数参数决定，非常量!
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">栈上分配，自动释放</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-violet-900/20 rounded border border-violet-500/30">
                          <div className="text-violet-400 text-xs font-medium">VLA</div>
                          <div className="text-gray-400 text-xs mt-1">栈上分配</div>
                          <div className="text-gray-400 text-xs">自动释放</div>
                          <div className="text-green-400 text-xs mt-1">✅ 无需 free</div>
                        </div>
                        <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                          <div className="text-purple-400 text-xs font-medium">malloc</div>
                          <div className="text-gray-400 text-xs mt-1">堆上分配</div>
                          <div className="text-gray-400 text-xs">手动管理</div>
                          <div className="text-orange-400 text-xs mt-1">⚠️ 需要 free</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">多维 VLA</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-violet-400">void matrix(int rows, int cols) {'{'}</div>
                        <div>&nbsp;&nbsp;int mat[rows][cols];</div>
                        <div>&nbsp;&nbsp;mat[0][0] = 1;</div>
                        <div>&nbsp;&nbsp;mat[rows-1][cols-1] = 100;</div>
                        <div>{'}'}</div>
                      </div>
                      <div className="flex items-center justify-center gap-1">
                        {[...Array(3)].map((_, r) => (
                          <div key={r} className="flex flex-col gap-1">
                            {[...Array(4)].map((_, c) => (
                              <div key={c} className={`w-10 h-8 border flex items-center justify-center text-xs ${r === 0 && c === 0 ? 'bg-violet-600/50 border-violet-400' : r === 2 && c === 3 ? 'bg-purple-600/50 border-purple-400' : 'bg-gray-700/30 border-gray-500'}`}>
                                {(r === 0 && c === 0) ? '1' : (r === 2 && c === 3) ? '100' : '0'}
                              </div>
                            ))}
                          </div>
                        ))}
                      </div>
                      <div className="text-violet-400 text-center text-xs">
                        rows=3, cols=4 的矩阵，运行时确定
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">VLA vs malloc</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-violet-900/20 rounded border border-violet-500/30">
                        <div className="text-violet-400">// VLA (栈)</div>
                        <div>void func(int n) {'{'}</div>
                        <div>&nbsp;&nbsp;int arr[n];</div>
                        <div>&nbsp;&nbsp;// 使用 arr</div>
                        <div>{'}'} <span className="text-gray-500">// 自动释放</span></div>
                      </div>
                      <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                        <div className="text-purple-400">// malloc (堆)</div>
                        <div>void func(int n) {'{'}</div>
                        <div>&nbsp;&nbsp;int* p = malloc(n*4);</div>
                        <div>&nbsp;&nbsp;// 使用 p</div>
                        <div>&nbsp;&nbsp;<span className="text-green-400">free(p)</span>; <span className="text-gray-500">// 必须手动释放</span></div>
                        <div>{'}'}</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">VLA 的限制</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                        <div className="text-red-400 text-xs font-medium">❌ 不能有初始值</div>
                        <pre className="text-gray-400 text-xs mt-1">int arr[n] = {0};  // 编译错误!</pre>
                      </div>
                      <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                        <div className="text-red-400 text-xs font-medium">❌ 不能是结构体成员</div>
                        <pre className="text-gray-400 text-xs mt-1">struct {'{'} int arr[n]; {'}'};  // 错误!</pre>
                      </div>
                      <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                        <div className="text-red-400 text-xs font-medium">❌ 不能在全局作用域</div>
                        <pre className="text-gray-400 text-xs mt-1">int g_arr[n];  // 错误! n 必须是常量</pre>
                      </div>
                      <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                        <div className="text-green-400 text-xs font-medium">✅ 只能在函数内使用</div>
                        <pre className="text-gray-400 text-xs mt-1">void func(int n) {'{'} int arr[n]; {'}'}</pre>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">C11 标准状态</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-violet-400 text-xs font-medium">C99</div>
                        <div className="text-gray-400 text-xs">VLA 是必需特性 (Required)</div>
                      </div>
                      <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30 mt-2">
                        <div className="text-orange-400 text-xs font-medium">C11 / C17</div>
                        <div className="text-gray-400 text-xs">VLA 变为可选特性 (Optional)</div>
                        <div className="text-gray-400 text-xs">编译器可以选择不支持</div>
                      </div>
                      <div className="grid grid-cols-3 gap-2 mt-2">
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs">GCC</div>
                          <div className="text-gray-400 text-xs">✅ 支持</div>
                        </div>
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs">Clang</div>
                          <div className="text-gray-400 text-xs">✅ 支持</div>
                        </div>
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs">MSVC</div>
                          <div className="text-gray-400 text-xs">❌ 不支持</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-violet-900/20 rounded-lg border border-violet-500/30">
                      <p className="text-violet-300 text-xs font-medium mb-2">📋 应用场景与注意</p>
                      <div className="text-xs text-gray-400 space-y-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-green-400 text-xs font-medium">✅ 适用场景</div>
                          <ul className="text-gray-400 text-xs mt-1 space-y-1">
                            <li>• 临时缓冲区 (已知大小)</li>
                            <li>• 避免 malloc 碎片</li>
                            <li>• 小内存分配 (栈空间充足)</li>
                          </ul>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-red-400 text-xs font-medium">⚠️ 注意事项</div>
                          <ul className="text-gray-400 text-xs mt-1 space-y-1">
                            <li>• 栈空间有限 (可能溢出)</li>
                            <li>• 大数组用 malloc</li>
                            <li>• 跨平台代码需检查支持</li>
                          </ul>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 长度在运行时确定
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 3 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 栈上分配，自动释放
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 6 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 有多种使用限制
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">VLA 限制</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">不能初始化</p>
                    <pre className="text-gray-400 font-mono text-xs">int arr[n] = {0}; ❌</pre>
                  </div>
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">不能是结构体成员</p>
                    <pre className="text-gray-400 font-mono text-xs">struct {'{'} int arr[n]; {'}'} ❌</pre>
                  </div>
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">不能全局定义</p>
                    <pre className="text-gray-400 font-mono text-xs">int g_arr[n]; ❌</pre>
                  </div>
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">栈空间有限</p>
                    <pre className="text-gray-400 font-mono text-xs">大数组可能溢出</pre>
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">编译器支持</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-violet-900/20 rounded border border-violet-500/30">
                    <p className="text-violet-300 font-medium">GCC / Clang</p>
                    <p className="text-gray-400">完整支持 VLA</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">MSVC</p>
                    <p className="text-gray-400">不支持，使用 _alloca()</p>
                  </div>
                  <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                    <p className="text-green-300 font-medium">可移植方案</p>
                    <pre className="text-gray-400 font-mono text-xs">用 malloc 代替</pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-violet-600 hover:bg-violet-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-violet-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-violet-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-violet-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-violet-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
