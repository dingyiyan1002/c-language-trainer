<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1125 - 位域 bitfield | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(139, 92, 246, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(139, 92, 246, 0.2); border-left: 3px solid #8b5cf6; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#8b5cf6', primaryLight: '#a78bfa',
      secondary: '#7c3aed', secondaryLight: '#a78bfa',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 位域 (Bitfield) =====
// 结构体中指定成员占用的位数，节省内存

// STM32 GPIO 配置寄存器映射
typedef struct {
  uint32_t MODE : 2;   // 模式：00=输入，01=输出，10=复用，11=模拟
  uint32_t TYPE : 1;   // 类型：0=推挽，1=开漏
  uint32_t SPEED : 2;  // 速度：00=低，01=中，10=高，11=超高
  uint32_t PUPD : 2;   // 上下拉：00=无，01=上拉，10=下拉
  uint32_t : 25;       // 保留位 (unnamed bitfield)
} GPIO_Config;

// 使用
GPIO_Config cfg;
cfg.MODE = 0b01;   // 输出模式
cfg.TYPE = 0;      // 推挽
cfg.SPEED = 0b10;  // 高速
cfg.PUPD = 0b01;   // 上拉

// 整个结构体只占 4 字节 (32 位)
printf("Size: %zu bytes\\n", sizeof(GPIO_Config));  // 4`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百二十五题，位域 bitfield。",
      2: "位域允许在结构体中定义指定位数的成员，精确控制内存布局，节省空间。",
      3: "冒号后跟数字表示该成员占用的位数，多个成员可 packing 到同一个字节。",
      4: "MODE 占 2 位可表示 4 种模式，TYPE 占 1 位表示两种类型，SPEED 占 2 位表示 4 档速度。",
      5: "未命名的位域用于填充或对齐，保留位不分配名称，编译器自动处理。",
      6: "使用时像普通结构体成员一样访问，编译器自动生成位运算代码。",
      7: "整个结构体打包到 32 位即 4 字节，比分别定义变量节省大量空间。",
      8: "位域应用：寄存器映射、协议帧解析、内存受限的嵌入式场景。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-violet-900/50 via-purple-900/50 to-fuchsia-900/50 rounded-xl p-6 mb-4 border border-violet-700/50">
            <h1 className="text-3xl font-bold text-violet-400 mb-2">1125 - 位域 Bitfield</h1>
            <p className="text-violet-300 text-sm">结构体位域 / 内存压缩 / 寄存器映射</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 4 && i <= 5) ||
                    (step === 3 && i >= 7 && i <= 12) ||
                    (step === 4 && i >= 8 && i <= 10) ||
                    (step === 5 && i >= 13 && i <= 13) ||
                    (step === 6 && i >= 17 && i <= 21) ||
                    (step === 7 && i >= 25 && i <= 26)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
              <h2 className="text-lg font-semibold text-violet-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">💡 位域</p>
                    <p className="text-xs text-gray-400">位域是 C 语言提供的内存压缩机制，允许在结构体中定义指定位数的成员，广泛用于寄存器映射和协议解析。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">位域语法</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>struct {'{'}</div>
                        <div>&nbsp;&nbsp;uint32_t field : <span className="text-violet-400">4</span>;</div>
                        <div>&nbsp;&nbsp;uint32_t mode : <span className="text-purple-400">2</span>;</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="text-violet-400 text-center text-xs">
                        冒号后的数字表示该成员占用的位数
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">GPIO 配置结构体</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-0">
                        <div className="w-20 h-12 bg-violet-600/50 border border-violet-400 flex flex-col items-center justify-center text-xs">
                          <span className="text-white">MODE</span>
                          <span className="text-gray-300 text-xs">2 位</span>
                        </div>
                        <div className="w-12 h-12 bg-purple-600/50 border border-purple-400 flex flex-col items-center justify-center text-xs">
                          <span className="text-white">TYPE</span>
                          <span className="text-gray-300 text-xs">1 位</span>
                        </div>
                        <div className="w-20 h-12 bg-fuchsia-600/50 border border-fuchsia-400 flex flex-col items-center justify-center text-xs">
                          <span className="text-white">SPEED</span>
                          <span className="text-gray-300 text-xs">2 位</span>
                        </div>
                        <div className="w-20 h-12 bg-pink-600/50 border border-pink-400 flex flex-col items-center justify-center text-xs">
                          <span className="text-white">PUPD</span>
                          <span className="text-gray-300 text-xs">2 位</span>
                        </div>
                        <div className="flex-1 h-12 bg-gray-700/50 border border-gray-500 flex flex-col items-center justify-center text-xs">
                          <span className="text-gray-400">Reserved</span>
                          <span className="text-gray-300 text-xs">25 位</span>
                        </div>
                      </div>
                      <div className="text-violet-400 text-center text-xs">
                        总共 32 位 = 4 字节，紧凑 packing
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">位域值范围</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-violet-400 text-xs">MODE (2 位)</div>
                          <div className="text-gray-400 text-xs">0b00 = 输入</div>
                          <div className="text-gray-400 text-xs">0b01 = 输出</div>
                          <div className="text-gray-400 text-xs">0b10 = 复用</div>
                          <div className="text-gray-400 text-xs">0b11 = 模拟</div>
                        </div>
                        <div className="p-2 bg-gray-900/50 rounded">
                          <div className="text-purple-400 text-xs">SPEED (2 位)</div>
                          <div className="text-gray-400 text-xs">0b00 = 低速</div>
                          <div className="text-gray-400 text-xs">0b01 = 中速</div>
                          <div className="text-gray-400 text-xs">0b10 = 高速</div>
                          <div className="text-gray-400 text-xs">0b11 = 超高速</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">未命名位域</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>uint32_t : 25;  <span className="text-gray-500">// 保留位</span></div>
                      </div>
                      <div className="text-gray-400 text-xs">
                        不指定名称的位域用于：<br/>
                        • 填充对齐 (padding)<br/>
                        • 保留未来使用<br/>
                        • 匹配硬件寄存器布局
                      </div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">使用方式</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>GPIO_Config cfg;</div>
                        <div className="text-violet-400">cfg.MODE = 0b01;</div>
                        <div className="text-purple-400">cfg.TYPE = 0;</div>
                        <div className="text-fuchsia-400">cfg.SPEED = 0b10;</div>
                        <div className="text-pink-400">cfg.PUPD = 0b01;</div>
                      </div>
                      <div className="text-green-400 text-center text-xs">
                        编译器自动生成位运算代码，无需手动移位!
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-violet-600/20 to-purple-600/20 rounded-lg border border-violet-500/30">
                    <p className="text-violet-300 text-sm font-medium mb-2">内存效率对比</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 text-xs">普通结构体</div>
                          <div className="text-gray-400 text-xs">uint32_t MODE;</div>
                          <div className="text-gray-400 text-xs">uint32_t TYPE;</div>
                          <div className="text-gray-400 text-xs">uint32_t SPEED;</div>
                          <div className="text-gray-400 text-xs">uint32_t PUPD;</div>
                          <div className="text-red-400 text-xs mt-1">= 16 字节</div>
                        </div>
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 text-xs">位域结构体</div>
                          <div className="text-gray-400 text-xs">MODE : 2;</div>
                          <div className="text-gray-400 text-xs">TYPE : 1;</div>
                          <div className="text-gray-400 text-xs">SPEED : 2;</div>
                          <div className="text-gray-400 text-xs">PUPD : 2;</div>
                          <div className="text-green-400 text-xs mt-1">= 4 字节 (75% 节省!)</div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-violet-900/20 rounded-lg border border-violet-500/30">
                      <p className="text-violet-300 text-xs font-medium mb-2">📋 应用场景</p>
                      <ul className="text-xs text-gray-400 space-y-2">
                        <li>• <span className="text-violet-400">寄存器映射</span>: 直接对应硬件寄存器位域</li>
                        <li>• <span className="text-purple-400">协议帧</span>: CAN、Modbus 等协议解析</li>
                        <li>• <span className="text-fuchsia-400">状态压缩</span>: 多个布尔标志 packing 到一个字节</li>
                        <li>• <span className="text-pink-400">内存受限</span>: RAM/Flash 紧张的嵌入式系统</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 位域精确控制每个成员的位数
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 5 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 未命名位域用于填充和对齐
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-violet-900/30 text-violet-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 编译器自动处理位运算
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
                <h2 className="text-lg font-semibold text-violet-400 mb-3">注意事项</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">实现定义行为</p>
                    <p className="text-gray-400">位域的字节序 (bit ordering) 依赖于编译器和平台</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">不能取地址</p>
                    <p className="text-gray-400">位域成员没有独立地址，不能使用&运算符</p>
                  </div>
                  <div className="p-2 bg-purple-900/20 rounded border border-purple-500/30">
                    <p className="text-purple-300 font-medium">类型限制</p>
                    <p className="text-gray-400">只能是 int、unsigned int、signed int 或_Bool</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-violet-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-violet-600 hover:bg-violet-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-violet-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-violet-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-violet-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-violet-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
