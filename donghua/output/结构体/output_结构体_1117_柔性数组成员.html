<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1117 - 柔性数组成员 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(245, 158, 11, 0.2); border-left: 3px solid #f59e0b; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#f59e0b', primaryLight: '#fbbf24',
      secondary: '#d97706', secondaryLight: '#fbbf24',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== 柔性数组成员 (Flexible Array Member) =====
struct Buffer {
  size_t len;      // 4/8 字节
  char data[];     // 柔性数组成员 (C99)
};

// 分配内存：结构体 + 动态数组
struct Buffer *buf = malloc(sizeof(struct Buffer) + 100);
buf->len = 100;
strcpy(buf->data, "hello world");

// ===== 对比：旧式写法 =====
struct OldBuffer {
  size_t len;
  char data[1];    //  hacky 占位符
};

// ===== 优势 =====
// 单次分配，内存连续，易于释放
free(buf);  // 一次释放，无需分别释放`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十七题，柔性数组成员。",
      2: "柔性数组成员是 C99 引入的特性，允许结构体的最后一个成员是未指定大小的数组。",
      3: "Buffer 结构体中，data[] 是柔性数组，不占空间，只标记位置。",
      4: "分配时使用 malloc(sizeof(struct Buffer) + 100)，额外分配 100 字节给 data。",
      5: "柔性数组让结构体和动态数组内存连续，访问高效。",
      6: "旧式写法用 data[1] 占位，是 hack 技巧，C99 后应使用柔性数组。",
      7: "优势：单次 malloc 分配，内存连续，缓存友好，一次 free 释放。",
      8: "典型应用：变长字符串、动态缓冲区、网络包头部 + 载荷。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-amber-900/50 via-orange-900/50 to-yellow-900/50 rounded-xl p-6 mb-4 border border-amber-700/50">
            <h1 className="text-3xl font-bold text-amber-400 mb-2">1117 - 柔性数组成员</h1>
            <p className="text-amber-300 text-sm">C99 flexible array member / 单次分配 / 内存连续</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
              <h2 className="text-lg font-semibold text-amber-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 2 && i <= 5) ||
                    (step === 3 && i >= 4 && i <= 4) ||
                    (step === 4 && i >= 8 && i <= 10) ||
                    (step === 5 && i >= 8 && i <= 10) ||
                    (step === 6 && i >= 13 && i <= 16) ||
                    (step === 7 && i >= 19 && i <= 19)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
              <h2 className="text-lg font-semibold text-amber-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-orange-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">💡 柔性数组成员</p>
                    <p className="text-xs text-gray-400">C99 引入的柔性数组成员允许结构体最后一个成员是未指定大小的数组，实现结构体 + 动态数组的单次分配。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-orange-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">柔性数组声明</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>struct Buffer {'{'}</div>
                        <div>&nbsp;&nbsp;size_t len;   // 固定成员</div>
                        <div>&nbsp;&nbsp;char data[];  // 柔性数组</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="text-amber-400 text-center">data[] 不占空间，只标记位置</div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-orange-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">内存布局</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="flex items-center gap-1">
                        <div className="w-32 h-10 bg-amber-600/50 border border-amber-400 flex items-center justify-center text-xs">
                          struct header (len)
                        </div>
                        <div className="w-48 h-10 bg-orange-600/50 border border-orange-400 flex items-center justify-center text-xs">
                          data[] (动态扩展)
                        </div>
                      </div>
                      <div className="text-gray-500 text-xs text-center">
                        sizeof(struct Buffer) = sizeof(size_t) = 4/8 字节<br/>
                        data[] 不占用 sizeof 空间
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-orange-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">内存分配</p>
                    <div className="text-xs text-gray-400 font-mono space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div className="text-amber-400">struct Buffer *buf = </div>
                        <div>&nbsp;&nbsp;malloc(sizeof(struct Buffer) + 100);</div>
                        <div className="text-gray-500 mt-2">// 分配：8 字节 header + 100 字节 data</div>
                      </div>
                      <div className="p-2 bg-gray-900/50 rounded">
                        <div>buf->len = 100;</div>
                        <div>strcpy(buf->data, "hello world");</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-amber-600/20 to-orange-600/20 rounded-lg border border-amber-500/30">
                    <p className="text-amber-300 text-sm font-medium mb-2">访问方式</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-amber-900/20 rounded border border-amber-500/30">
                        <div className="text-amber-400 font-medium">连续内存访问</div>
                        <div className="text-gray-400 text-xs mt-1">
                          buf-&gt;data[0] = 'h';<br/>
                          buf-&gt;data[1] = 'e';<br/>
                          // 和普通数组一样访问
                        </div>
                      </div>
                      <div className="text-green-400 text-center">内存连续，缓存友好!</div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-gray-600/20 to-slate-600/20 rounded-lg border border-gray-500/30">
                    <p className="text-gray-300 text-sm font-medium mb-2">旧式写法 (hack)</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>struct OldBuffer {'{'}</div>
                        <div>&nbsp;&nbsp;size_t len;</div>
                        <div>&nbsp;&nbsp;char data[1];  // 占位符</div>
                        <div>{'}'};</div>
                      </div>
                      <div className="text-orange-400 text-xs">
                        ⚠️ 这是 hack 技巧，C99 后应使用 data[]
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-green-600/20 to-emerald-600/20 rounded-lg border border-green-500/30">
                    <p className="text-green-300 text-sm font-medium mb-2">优势对比</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="grid grid-cols-2 gap-2">
                        <div className="p-2 bg-green-900/20 rounded border border-green-500/30">
                          <div className="text-green-400 font-medium">柔性数组</div>
                          <ul className="text-xs mt-1 space-y-1">
                            <li>✅ 单次 malloc</li>
                            <li>✅ 内存连续</li>
                            <li>✅ 缓存友好</li>
                            <li>✅ 一次 free</li>
                          </ul>
                        </div>
                        <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                          <div className="text-red-400 font-medium">分离分配</div>
                          <ul className="text-xs mt-1 space-y-1">
                            <li>❌ 两次 malloc</li>
                            <li>❌ 内存碎片</li>
                            <li>❌ 缓存不友好</li>
                            <li>❌ 两次 free</li>
                          </ul>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-amber-900/20 rounded-lg border border-amber-500/30">
                      <p className="text-amber-300 text-xs font-medium mb-2">🔧 典型应用</p>
                      <ul className="text-xs text-gray-400 space-y-1">
                        <li>• 变长字符串：struct String {'{'} size_t len; char data[]; {'}'}</li>
                        <li>• 动态缓冲区：struct Buffer {'{'} size_t cap; char data[]; {'}'}</li>
                        <li>• 网络包：struct Packet {'{'} header_t hdr; uint8_t payload[]; {'}'}</li>
                        <li>• 动态数组：struct Array {'{'} size_t n; int items[]; {'}'}</li>
                      </ul>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
                <h2 className="text-lg font-semibold text-amber-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> 柔性数组必须是结构体最后一个成员
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 分配时：sizeof(struct) + 数组大小
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-amber-900/30 text-amber-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 优势：单次分配、内存连续、易释放
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
                <h2 className="text-lg font-semibold text-amber-400 mb-3">注意事项</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-red-900/20 rounded border border-red-500/30">
                    <p className="text-red-300 font-medium">不能直接赋值</p>
                    <p className="text-gray-400">柔性数组不是左值，不能 buf->data = xxx</p>
                  </div>
                  <div className="p-2 bg-orange-900/20 rounded border border-orange-500/30">
                    <p className="text-orange-300 font-medium">必须动态分配</p>
                    <p className="text-gray-400">不能在栈上创建柔性数组结构体</p>
                  </div>
                  <div className="p-2 bg-blue-900/20 rounded border border-blue-500/30">
                    <p className="text-blue-300 font-medium">C99 标准</p>
                    <p className="text-gray-400">GCC 扩展支持，MSVC 需用 data[1] hack</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-amber-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-amber-600 hover:bg-amber-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-amber-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-amber-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-amber-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-amber-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
