<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>位域操作 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#14b8a6 0%,#0d9488 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#134e4a;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#0d9488;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#ccfbf1,#99f6e4);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#2dd4bf;transition:all 0.3s ease}
    .var-card.highlight{border-color:#14b8a6;box-shadow:0 0 20px rgba(20,184,166,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#134e4a;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .bitfield-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .bitfield-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .bitfield-box.definition{background:linear-gradient(135deg:#ccfbf1,#99f6e4);border-color:#14b8a6}
    .bitfield-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .bitfield-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .bitfield-label{width:80px;font-size:11px;color:#14b8a6;font-weight:600;font-family:'Consolas',monospace}
    .bitfield-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .bitfield-box-inner.active{border-color:#14b8a6;background:linear-gradient(135deg:#ccfbf1,#99f6e4)}
    .bitfield-type{font-size:10px;color:#64748b}
    .bitfield-value{font-size:12px;font-weight:700;color:#14b8a6;font-family:'Consolas',monospace}
    .bit-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .bit-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .bit-row.pending{opacity:0.5}
    .bit-row.active{background:linear-gradient(135deg,#14b8a6,#0d9488);border:2px solid#2dd4bf}
    .bit-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .bit-num{font-size:14px;font-weight:700;color:#5eead4;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#14b8a6;background:linear-gradient(135deg:#ccfbf1,#99f6e4)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#14b8a6;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#ccfbf1;border-radius:8px;padding:12px;border-left:4px solid#14b8a6;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#ccfbf1,#99f6e4)}
    .use-title{font-size:11px;color:#134e4a;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#14b8a6;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#5eead4;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#5eead4;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',teal:'#14b8a6'};
    const LINE_MAP = {
      1:{step:1,text:'struct { unsigned flag:1, mode:3, data:4; } bits;',color:'#14b8a6'},
      2:{step:2,text:'// flag:bit0(1 位), mode:bit1-3(3 位)',color:'#2dd4bf'},
      3:{step:3,text:'// data:bit4-7(4 位), 共 8 位=1 字节',color:'#5eead4'},
      4:{step:4,text:'bits.flag = 1; bits.mode = 5;',color:'#99f6e4'},
      5:{step:5,text:'bits.data = 0xA; // 1010',color:'#ccfbf1'},
      6:{step:6,text:'// 最终：1010 101 1 = 0xAB',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，位域结构体定义，冒号后指定位数，用于紧凑存储和硬件寄存器映射',
      2:'flag 占 1 位 (bit0)，mode 占 3 位 (bit1-3)，可表示 0-7 共 8 种模式',
      3:'data 占 4 位 (bit4-7)，可表示 0-15，整个结构体紧凑打包为 1 字节',
      4:'设置 flag=1 置位 bit0，mode=5(二进制 101) 写入 bit1-3',
      5:'设置 data=0xA(二进制 1010) 写入高 4 位 bit4-7',
      6:'最终内存布局：bit7-4=1010, bit3-1=101, bit0=1 → 10101011=0xAB'
    };
    const bitfields = [
      {name:'flag:1',bits:'bit 0',range:'[0:0]',val:'0 或 1'},
      {name:'mode:3',bits:'bit 1-3',range:'[3:1]',val:'0-7'},
      {name:'data:4',bits:'bit 4-7',range:'[7:4]',val:'0-15'},
      {name:'total:8',bits:'1 byte',range:'[7:0]',val:'紧凑打包'}
    ];
    const bitOps = [
      {op:'初始',layout:'0000 0000',value:'0x00'},
      {op:'flag=1',layout:'0000 0001',value:'0x01'},
      {op:'mode=5',layout:'0000 1011',value:'0x0B'},
      {op:'data=0xA',layout:'1010 1011',value:'0xAB'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',bit:'M4 6h16M4 12h16M4 18h16M8 6v12M12 6v12M16 6v12'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeBitfield,setActiveBitfield] = useState(-1);
      const [bitIdx,setBitIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveBitfield(-1);
          setBitIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveBitfield(0);
          setBitIdx(0);
        } else if(step === 3) {
          setActiveBitfield(1);
        } else if(step === 4) {
          setBitIdx(1);
          setActiveBitfield(2);
        } else if(step === 5) {
          setActiveBitfield(3);
          setBitIdx(2);
        } else if(step === 6) {
          setBitIdx(3);
          setTerminalLines(['bits = 0xAB', 'flag=1, mode=5, data=10']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveBitfield(-1);
        setBitIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>位域操作 - 嵌入式 C 可视化</h1>
            <p>位域 | bit field | 硬件寄存器 | 内存压缩</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.teal,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                bitfield.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.bit} size={22} />
                位域操作可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">struct { flag:1, mode:3, data:4 }</span>
                  <span className="var-type">Bit Field Structure</span>
                </div>
                <div className="bitfield-container">
                  <div className={`bitfield-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#134e4a',marginBottom:12}}>位域成员定义</div>
                    {bitfields.map((b, idx) => (
                      <div key={b.name} className="bitfield-row">
                        <span className="bitfield-label">{b.name}</span>
                        <div className={`bitfield-box-inner ${step >= 1 + idx && activeBitfield === idx ? 'active' : ''}`}>
                          <div className="bitfield-type">{b.bits} {b.range}</div>
                          <div className="bitfield-value">值：{b.val}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bit-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>位写入过程</div>
                  {bitOps.map((b, idx) => (
                    <div key={idx} className={`bit-row ${step >= 2 + idx && bitIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="bit-name">{b.op}</span>
                      <span className="bit-num">{b.layout} = {b.value}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">普通结构体</div>
                    <div className="compare-code">char+char+char=3 字节</div>
                    <div className="compare-desc">浪费内存</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">位域结构体</div>
                    <div className="compare-code">1+3+4=8 位=1 字节</div>
                    <div className="compare-desc">节省 66%</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">优点</div>
                    <div className="compare-code">内存紧凑</div>
                    <div className="compare-desc">硬件映射</div>
                  </div>
                  <div className={`compare-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="compare-label">应用</div>
                    <div className="compare-code">寄存器/协议</div>
                    <div className="compare-desc">位级控制</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title\">硬件寄存器</div>
                    <div className="use-example">struct { u32 EN:1,MODE:3,DATA:28; } REG;</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title\">协议帧头</div>
                    <div className="use-example">struct { u8 VER:2,TYP:3,LEN:3; } header;</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title\">状态标志</div>
                    <div className="use-example">struct { u8 ERR:2,WARN:2,OK:1,RES:3; } status;</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title\">内存优化</div>
                    <div className="use-example\">大数组场景下显著节省内存</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.teal}}>位域</strong>
                <p style={{marginTop:8,color:'#78350f'}}>指定成员位数，紧凑打包</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>内存节省</strong>
                <p style={{marginTop:8,color:'#78350f'>1 字节代替 3 字节</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>硬件映射</strong>
                <p style={{marginTop:8,color:'#78350f'>完美匹配寄存器布局</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>MCU 寄存器、协议头、状态字</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
