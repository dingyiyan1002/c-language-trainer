<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1118 - typedef 进阶 | Embedded C Visualization</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .animate-blink { animation: blink 1.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out; }
    .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
    .highlight { box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
    .code-line { transition: all 0.3s ease; }
    .code-line.active { background: rgba(99, 102, 241, 0.2); border-left: 3px solid #6366f1; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const COLOR_MAP = {
      primary: '#6366f1', primaryLight: '#818cf8',
      secondary: '#4f46e5', secondaryLight: '#818cf8',
      accent: '#14b8a6', accentLight: '#2dd4bf',
      success: '#22c55e', warning: '#f59e0b', error: '#ef4444'
    };

    const CODE = `// ===== typedef 进阶用法 =====

// 1. 基本类型别名
typedef unsigned long ulong;
typedef int Status;

// 2. 结构体别名
typedef struct {
  int x, y;
} Point;

typedef struct Node Node;  // 前向声明 + typedef

// 3. 指针类型别名
typedef char* String;
typedef void (*Callback)(int);

// 4. 数组类型别名
typedef int IntArray[10];
IntArray arr;  // 等价于 int arr[10]

// 5. 函数指针类型
typedef int (*MathOp)(int, int);
MathOp add = (int a, int b) { return a + b; };`;

    const VOICE_TEXT_MAP = {
      1: "第一千一百一十八题，typedef 进阶用法。",
      2: "typedef 为类型创建别名，不是宏替换，是编译器级别的类型定义。",
      3: "结构体别名简化声明，无需再写 struct 关键字。",
      4: "指针类型别名让复杂声明更可读，String 比 char* 更清晰。",
      5: "Callback 是函数指针类型，指向接受 int 返回 void 的函数。",
      6: "数组类型别名：IntArray 是含 10 个 int 的数组类型。",
      7: "函数指针类型：MathOp 是指向二元整数函数的指针类型。",
      8: "typedef 优势：提高可读性、简化复杂声明、便于移植。"
    };

    const MAX_STEPS = 8;

    function App() {
      const [step, setStep] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [isVoicePlaying, setIsVoicePlaying] = useState(false);
      const [voiceRate, setVoiceRate] = useState(1);
      const voiceEndTimerRef = useRef(null);

      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if (voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if (!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate]);

      useEffect(() => {
        if (isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);

      const handleStepChange = (newStep) => {
        if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
        setIsVoicePlaying(false);
        setStep(newStep);
      };

      const togglePlay = () => {
        if (step >= MAX_STEPS) {
          handleStepChange(1);
          setTimeout(() => setIsPlaying(true), 100);
        } else {
          setIsPlaying(!isPlaying);
        }
      };

      return (
        <div className="p-4 max-w-7xl mx-auto">
          <div className="bg-gradient-to-r from-indigo-900/50 via-violet-900/50 to-purple-900/50 rounded-xl p-6 mb-4 border border-indigo-700/50">
            <h1 className="text-3xl font-bold text-indigo-400 mb-2">1118 - typedef 进阶</h1>
            <p className="text-indigo-300 text-sm">类型别名 / 简化声明 / 提高可读性</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
              <h2 className="text-lg font-semibold text-indigo-400 mb-3">代码展示</h2>
              <pre className="text-xs text-gray-300 overflow-x-auto bg-gray-900/50 p-3 rounded-lg font-mono leading-relaxed">
                {CODE.split('\n').map((line, i) => (
                  <div key={i} className={`code-line ${
                    (step === 2 && i >= 2 && i <= 3) ||
                    (step === 3 && i >= 6 && i <= 11) ||
                    (step === 4 && i >= 14 && i <= 15) ||
                    (step === 5 && i >= 16 && i <= 16) ||
                    (step === 6 && i >= 19 && i <= 20) ||
                    (step === 7 && i >= 23 && i <= 24)
                    ? 'active' : ''
                  }`}>{line || '\u00A0'}</div>
                ))}
              </pre>
            </div>

            <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
              <h2 className="text-lg font-semibold text-indigo-400 mb-3">可视化演示</h2>
              <div className="space-y-4">
                {step === 1 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">💡 typedef 进阶</p>
                    <p className="text-xs text-gray-400">typedef 为复杂类型创建简洁别名，提高代码可读性和可移植性。</p>
                  </div>
                )}
                {step === 2 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">基本类型别名</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>typedef unsigned long ulong;</div>
                        <div>typedef int Status;</div>
                      </div>
                      <div className="text-indigo-400 text-center">
                        ulong x;  // 等价于 unsigned long x;<br/>
                        Status s; // 等价于 int s;
                      </div>
                    </div>
                  </div>
                )}
                {step === 3 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">结构体别名</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div className="text-gray-500">// 传统写法</div>
                        <div>struct Point {'{'} int x, y; {'}'};</div>
                        <div>struct Point p;</div>
                      </div>
                      <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30 font-mono">
                        <div className="text-indigo-400">// typedef 简化</div>
                        <div>typedef struct {'{'} int x, y; {'}'} Point;</div>
                        <div>Point p;  // 无需 struct 关键字!</div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 4 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">指针类型别名</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>typedef char* String;</div>
                      </div>
                      <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30">
                        <div className="text-gray-500 text-xs">对比：</div>
                        <div className="text-xs">
                          char* s1, s2;  // ❌ s2 是 char!<br/>
                          String s1, s2; // ✅ 都是 String 类型
                        </div>
                      </div>
                      <div className="text-green-400 text-center">typedef 避免指针歧义!</div>
                    </div>
                  </div>
                )}
                {step === 5 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">函数指针类型</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>typedef void (*Callback)(int);</div>
                      </div>
                      <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30">
                        <div className="text-gray-500 text-xs">使用：</div>
                        <div className="text-xs">
                          Callback onDone;  // 声明回调<br/>
                          onDone = myFunc;  // 赋值<br/>
                          onDone(42);       // 调用
                        </div>
                      </div>
                      <div className="text-blue-400 text-center">简化复杂的函数指针声明!</div>
                    </div>
                  </div>
                )}
                {step === 6 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">数组类型别名</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>typedef int IntArray[10];</div>
                      </div>
                      <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30">
                        <div className="text-gray-500 text-xs">使用：</div>
                        <div className="text-xs">
                          IntArray arr;  // 等价于 int arr[10]<br/>
                          arr[0] = 1;<br/>
                          arr[9] = 10;
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {step === 7 && (
                  <div className="animate-scaleIn p-4 bg-gradient-to-r from-indigo-600/20 to-violet-600/20 rounded-lg border border-indigo-500/30">
                    <p className="text-indigo-300 text-sm font-medium mb-2">函数指针类型应用</p>
                    <div className="text-xs text-gray-400 space-y-2">
                      <div className="p-2 bg-gray-900/50 rounded font-mono">
                        <div>typedef int (*MathOp)(int, int);</div>
                      </div>
                      <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30">
                        <div className="text-gray-500 text-xs">使用：</div>
                        <div className="text-xs">
                          MathOp add = ...;<br/>
                          MathOp sub = ...;<br/>
                          int result = add(10, 5);
                        </div>
                      </div>
                      <div className="text-green-400 text-center">回调表、策略模式!</div>
                    </div>
                  </div>
                )}
                {step === 8 && (
                  <div className="animate-scaleIn space-y-3">
                    <div className="p-3 bg-indigo-900/20 rounded-lg border border-indigo-500/30">
                      <p className="text-indigo-300 text-xs font-medium mb-2">📋 typedef vs #define</p>
                      <table className="text-xs text-gray-400 w-full">
                        <thead><tr className="border-b border-indigo-500/30"><th className="text-left py-1">特性</th><th className="text-left">typedef</th><th className="text-left">#define</th></tr></thead>
                        <tbody>
                          <tr><td className="py-1">作用域</td><td className="text-green-400">有作用域</td><td className="text-red-400">全局</td></tr>
                          <tr><td className="py-1">类型检查</td><td className="text-green-400">有</td><td className="text-red-400">无</td></tr>
                          <tr><td className="py-1">指针处理</td><td className="text-green-400">正确</td><td className="text-red-400">错误</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="space-y-4">
              <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
                <h2 className="text-lg font-semibold text-indigo-400 mb-3">关键点说明</h2>
                <div className="space-y-2 text-sm">
                  <div className={`p-2 rounded transition-colors ${step >= 2 ? 'bg-indigo-900/30 text-indigo-300' : 'text-gray-500'}`}>
                    <span className="font-medium">①</span> typedef 是编译器级别，不是宏替换
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 4 ? 'bg-indigo-900/30 text-indigo-300' : 'text-gray-500'}`}>
                    <span className="font-medium">②</span> 指针 typedef 避免声明歧义
                  </div>
                  <div className={`p-2 rounded transition-colors ${step >= 7 ? 'bg-indigo-900/30 text-indigo-300' : 'text-gray-500'}`}>
                    <span className="font-medium">③</span> 简化复杂类型，提高可读性
                  </div>
                </div>
              </div>

              <div className="bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
                <h2 className="text-lg font-semibold text-indigo-400 mb-3">实际项目应用</h2>
                <div className="space-y-2 text-xs">
                  <div className="p-2 bg-indigo-900/20 rounded border border-indigo-500/30">
                    <pre className="text-gray-300 font-mono text-xs">
{`// Linux 内核风格
typedef struct task_struct task_t;
typedef unsigned int uint;
typedef long long int64;

// 回调函数类型
typedef void (*irq_handler_t)(int irq, void *dev_id);`}
                    </pre>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-4 bg-gray-800/80 rounded-xl p-4 border border-indigo-700/30">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-3">
                <button onClick={togglePlay} className={`px-4 py-2 rounded-lg font-medium transition-colors ${isPlaying ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700'} text-white`}>
                  {step >= MAX_STEPS ? '🔄 重新播放' : isPlaying ? '⏸ 暂停' : '▶ 播放'}
                </button>
                <button onClick={() => handleStepChange(Math.max(1, step - 1))} disabled={step <= 1} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  ◀ 上一步
                </button>
                <span className="text-indigo-400 font-medium px-3">步骤 {step} / {MAX_STEPS}</span>
                <button onClick={() => handleStepChange(Math.min(MAX_STEPS, step + 1))} disabled={step >= MAX_STEPS} className="px-3 py-2 bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:text-gray-600 rounded-lg text-sm font-medium transition-colors">
                  下一步 ▶
                </button>
              </div>
              <div className="flex items-center gap-3">
                <label className="text-sm text-indigo-300">
                  语速：
                  <input type="range" min="0.5" max="1.5" step="0.1" value={voiceRate} onChange={(e) => setVoiceRate(parseFloat(e.target.value))} className="ml-2 w-24" />
                  <span className="ml-2 text-indigo-400">{voiceRate.toFixed(1)}x</span>
                </label>
                {isVoicePlaying && <span className="text-indigo-400 animate-pulse">🔊 语音播放中...</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
