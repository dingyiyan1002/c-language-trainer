<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>restrict 关键字 - 指针优化 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#06b6d4 0%,#0891b2 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#164e63;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#0891b2;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#cffafe,#a5f3fc);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#22d3ee;transition:all 0.3s ease}
    .var-card.highlight{border-color:#06b6d4;box-shadow:0 0 20px rgba(6,182,212,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#164e63;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .restrict-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .restrict-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .restrict-box.definition{background:linear-gradient(135deg:#cffafe,#a5f3fc);border-color:#06b6d4}
    .restrict-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .restrict-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .restrict-label{width:100px;font-size:11px;color:#0891b2;font-weight:600;font-family:'Consolas',monospace}
    .restrict-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .restrict-box-inner.active{border-color:#06b6d4;background:linear-gradient(135deg:#cffafe,#a5f3fc)}
    .restrict-type{font-size:10px;color:#64748b}
    .restrict-value{font-size:12px;font-weight:700;color:#0891b2;font-family:'Consolas',monospace}
    .alias-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .alias-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .alias-row.pending{opacity:0.5}
    .alias-row.active{background:linear-gradient(135deg,#06b6d4,#0891b2);border:2px solid#22d3ee}
    .alias-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .alias-value{font-size:14px;font-weight:700;color:#67e8f9;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#06b6d4;background:linear-gradient(135deg:#cffafe,#a5f3fc)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#0891b2;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#cffafe;border-radius:8px;padding:12px;border-left:4px solid#06b6d4;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#cffafe,#a5f3fc)}
    .use-title{font-size:11px;color:#164e63;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#0891b2;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#67e8f9;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#67e8f9;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',cyan:'#06b6d4'};
    const LINE_MAP = {
      1:{step:1,text:'void copy(int *restrict dst, const int *restrict src, int n)',color:'#06b6d4'},
      2:{step:2,text:'// restrict 承诺：dst 和 src 不重叠',color:'#22d3ee'},
      3:{step:3,text:'for(int i=0; i<n; i++) dst[i] = src[i];',color:'#67e8f9'},
      4:{step:4,text:'// 有 restrict: 编译器可向量优化',color:'#a5f3fc'},
      5:{step:5,text:'// 无 restrict: 保守逐拷贝，防重叠',color:'#cffafe'},
      6:{step:6,text:'// 违反 restrict 承诺 = 未定义行为!',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，restrict 是 C99 关键字，用于指针参数，承诺该指针访问的内存是唯一的',
      2:'copy 函数中 dst 和 src 都标记为 restrict，承诺它们指向的内存区域不重叠',
      3:'循环拷贝时，编译器看到 restrict 知道可以安全向量化，无需担心重叠',
      4:'有 restrict 承诺，编译器生成 SIMD 向量化指令，一次处理 4-8 个元素',
      5:'没有 restrict 编译器必须保守逐元素拷贝，防止 src 和 dst 重叠导致数据损坏',
      6:'如果违反 restrict 承诺 (实际重叠),程序产生未定义行为，结果不可预测'
    };
    const restrictPtrs = [
      {name:'int *restrict',desc:'受限指针',promise:'唯一访问路径',opt:'可向量化'},
      {name:'int *',desc:'普通指针',promise:'无承诺',opt:'保守处理'},
      {name:'__restrict__',desc:'GCC 扩展',promise:'同 restrict',opt:'编译器特定'}
    ];
    const aliasOps = [
      {op:'有 restrict',result:'编译器假设不重叠',opt:'SIMD 向量化'},
      {op:'无 restrict',result:'可能重叠',opt:'逐元素拷贝'},
      {op:'性能提升',result:'4-8 倍加速',opt:'取决于数据宽度'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',restrict:'M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-2h2v2zm0-4h-2V7h2v6z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeRestrict,setActiveRestrict] = useState(-1);
      const [aliasIdx,setAliasIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveRestrict(-1);
          setAliasIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveRestrict(0);
          setAliasIdx(0);
        } else if(step === 3) {
          setActiveRestrict(1);
        } else if(step === 4) {
          setAliasIdx(1);
          setActiveRestrict(2);
        } else if(step === 5) {
          setActiveRestrict(3);
        } else if(step === 6) {
          setAliasIdx(2);
          setTerminalLines(['restrict 启用向量化优化', '性能提升 4-8 倍']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveRestrict(-1);
        setAliasIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>restrict 关键字 - 指针优化提示</h1>
            <p>restrict | C99 | 向量化优化 | 内存别名</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.cyan,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                restrict.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.restrict} size={22} />
                restrict 指针优化可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">int *restrict ptr</span>
                  <span className="var-type">Pointer Optimization Hint</span>
                </div>
                <div className="restrict-container">
                  <div className={`restrict-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#164e63',marginBottom:12}}>restrict 指针类型</div>
                    {restrictPtrs.map((r, idx) => (
                      <div key={r.name} className="restrict-row">
                        <span className="restrict-label">{r.name}</span>
                        <div className={`restrict-box-inner ${step >= 1 + idx && activeRestrict === idx ? 'active' : ''}`}>
                          <div className="restrict-type">{r.desc} - {r.promise}</div>
                          <div className="restrict-value">优化：{r.opt}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="alias-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12'}}>别名分析对比</div>
                  {aliasOps.map((a, idx) => (
                    <div key={idx} className={`alias-row ${step >= 2 + idx && aliasIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="alias-name">{a.op}</span>
                      <span className="alias-value">{a.result} → {a.opt}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">restrict</div>
                    <div className="compare-code">int *restrict p</div>
                    <div className="compare-desc">编译器假设唯一</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">普通指针</div>
                    <div className="compare-code">int *p</div>
                    <div className="compare-desc">可能别名</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">优点</div>
                    <div className="compare-code">性能优化</div>
                    <div className="compare-desc">SIMD 向量化</div>
                  </div>
                  <div className={`compare-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="compare-label">风险</div>
                    <div className="compare-code">未定义行为</div>
                    <div className="compare-desc">违反承诺危险</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">数组拷贝</div>
                    <div className="use-example">void memcpy(void *restrict dst, const void *restrict src, size_t n);</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">DSP 处理</div>
                    <div className="use-example">void filter(float *restrict out, const float *restrict in, int n);</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">矩阵运算</div>
                    <div className="use-example">void matmul(double *restrict C, const double *restrict A, const double *restrict B);</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">注意事项</div>
                    <div className="use-example">确保 restrict 指针实际不重叠，否则 UB!</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.cyan}}>restrict</strong>
                <p style={{marginTop:8,color:'#78350f'}}>C99 指针优化提示</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>唯一访问</strong>
                <p style={{marginTop:8,color:'#78350f'>承诺指针不与其他别名</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>向量化</strong>
                <p style={{marginTop:8,color:'#78350f'>启用 SIMD 指令加速</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>memcpy、DSP、矩阵运算</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
