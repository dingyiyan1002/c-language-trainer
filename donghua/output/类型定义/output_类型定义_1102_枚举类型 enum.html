<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>枚举类型 enum - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#f97316 0%,#ea580c 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#9a3412;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#ea580c;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#ffedd5,#fed7aa);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#fb923c;transition:all 0.3s ease}
    .var-card.highlight{border-color:#ea580c;box-shadow:0 0 20px rgba(234,88,12,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#9a3412;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .enum-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .enum-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .enum-box.definition{background:linear-gradient(135deg:#ffedd5,#fed7aa);border-color:#ea580c}
    .enum-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .enum-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .enum-label{width:80px;font-size:11px;color:#ea580c;font-weight:600;font-family:'Consolas',monospace}
    .enum-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .enum-box-inner.active{border-color:#ea580c;background:linear-gradient(135deg:#ffedd5,#fed7aa)}
    .enum-type{font-size:10px;color:#64748b}
    .enum-value{font-size:12px;font-weight:700;color:#ea580c;font-family:'Consolas',monospace}
    .value-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .value-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .value-row.pending{opacity:0.5}
    .value-row.active{background:linear-gradient(135deg,#f97316,#ea580c);border:2px solid#fb923c}
    .value-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .value-num{font-size:14px;font-weight:700;color:#fdba74;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#ea580c;background:linear-gradient(135deg:#ffedd5,#fed7aa)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#ea580c;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#ffedd5;border-radius:8px;padding:12px;border-left:4px solid#ea580c;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#ffedd5,#fed7aa)}
    .use-title{font-size:11px;color:#9a3412;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#ea580c;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#fdba74;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#fdba74;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#3b82f6',orange:'#ea580c'};
    const LINE_MAP = {
      1:{step:1,text:'enum Color { RED, GREEN, BLUE };',color:'#ea580c'},
      2:{step:2,text:'// RED=0, GREEN=1, BLUE=2',color:'#fb923c'},
      3:{step:3,text:'enum Color c = GREEN;',color:'#fdba74'},
      4:{step:4,text:'enum Status { OK=0, ERR=1, WARN=2 };',color:'#fed7aa'},
      5:{step:5,text:'// 显式赋值，从指定值开始',color:'#ffedd5'},
      6:{step:6,text:'if(c == GREEN) printf("Green!\\n");',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，枚举 enum 定义命名整数常量，提高代码可读性和可维护性',
      2:'Color 枚举：RED 默认 0，GREEN 自动 1，BLUE 自动 2，依次递增',
      3:'声明枚举变量 c 赋值为 GREEN，实际存储为整数 1',
      4:'显式赋值枚举 Status，OK=0,ERR=1,WARN=2，用于精确定义值',
      5:'显式赋值场景：与硬件寄存器位域映射、协议状态码对应',
      6:'枚举比较：if(c==GREEN) 比 if(c==1) 更清晰，类型更安全'
    };
    const enumVals = [
      {name:'RED',val:'0',desc:'红色常量'},
      {name:'GREEN',val:'1',desc:'绿色常量'},
      {name:'BLUE',val:'2',desc:'蓝色常量'},
      {name:'OK',val:'0',desc:'成功状态'},
      {name:'ERR',val:'1',desc:'错误状态'},
      {name:'WARN',val:'2',desc:'警告状态'}
    ];
    const valueOps = [
      {op:'enum Color',layout:'RED=0, GREEN=1, BLUE=2',total:'隐式递增'},
      {op:'enum Status',layout:'OK=0, ERR=1, WARN=2',total:'显式赋值'},
      {op:'优点',layout:'类型安全 + 可读性',total:'替代 magic number'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',enum:'M4 6h16M4 12h16M4 18h16M10 6v12M14 6v12'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeEnum,setActiveEnum] = useState(-1);
      const [valueIdx,setValueIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveEnum(-1);
          setValueIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveEnum(0);
          setValueIdx(0);
        } else if(step === 3) {
          setActiveEnum(1);
        } else if(step === 4) {
          setValueIdx(1);
          setActiveEnum(2);
        } else if(step === 5) {
          setActiveEnum(3);
        } else if(step === 6) {
          setValueIdx(2);
          setTerminalLines(['c = GREEN (value=1)', 'status = OK', '枚举比 magic number 更清晰']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveEnum(-1);
        setValueIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>枚举类型 enum - C 语言可视化</h1>
            <p>枚举 | enum | 命名常量 | 类型安全</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.orange,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                enum.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.enum} size={22} />
                枚举类型可视化
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">enum Color { RED, GREEN, BLUE }</span>
                  <span className="var-type">Named Integer Constants</span>
                </div>
                <div className="enum-container">
                  <div className={`enum-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#9a3412',marginBottom:12}}>枚举常量定义</div>
                    {enumVals.map((e, idx) => (
                      <div key={e.name} className="enum-row">
                        <span className="enum-label">{e.name}</span>
                        <div className={`enum-box-inner ${step >= 1 + idx && activeEnum === idx ? 'active' : ''}`}>
                          <div className="enum-type">{e.desc}</div>
                          <div className="enum-value">= {e.val}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="value-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>枚举值对比</div>
                  {valueOps.map((v, idx) => (
                    <div key={idx} className={`value-row ${step >= 2 + idx && valueIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="value-name">{v.op}</span>
                      <span className="value-num">{v.layout} → {v.total}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">#define</div>
                    <div className="compare-code">#define RED 0</div>
                    <div className="compare-desc">预处理器宏</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">enum</div>
                    <div className="compare-code">enum { RED=0 }</div>
                    <div className="compare-desc">类型作用域</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">优点</div>
                    <div className="compare-code">类型安全</div>
                    <div className="compare-desc">调试友好</div>
                  </div>
                  <div className={`compare-card ${step >= 4 ? 'active' : ''}`}>
                    <div className="compare-label">应用</div>
                    <div className="compare-code">状态机</div>
                    <div className="compare-desc">替代 magic number</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">状态机</div>
                    <div className="use-example">enum State { IDLE, RUN, STOP }; // 状态枚举</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">颜色/类型</div>
                    <div className="use-example">enum Color { RED, GREEN, BLUE }; // 颜色选择</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">错误码</div>
                    <div className="use-example">enum Err { OK=0, ERR_IO, ERR_MEM }; // 错误码</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">位掩码</div>
                    <div className="use-example">enum Flag { READ=1, WRITE=2, EXEC=4 }; // 位标志</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.orange}}>枚举类型</strong>
                <p style={{marginTop:8,color:'#78350f'}}>命名整数常量集合</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>隐式赋值</strong>
                <p style={{marginTop:8,color:'#78350f'>从 0 开始自动递增</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>显式赋值</strong>
                <p style={{marginTop:8,color:'#78350f'>精确定义枚举值</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>状态机、错误码、位掩码</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
