<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>typedef 与函数指针组合 - 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0891b2 0%,#0e7490 100%);min-height:100vh}
    .app-container{padding:20px;max-width:1400px;margin:0 auto}
    .header{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .header h1{color:#164e63;font-size:28px;font-weight:700;margin-bottom:8px}
    .header p{color:#6b7280;font-size:14px}
    .main-grid{display:grid;grid-template-columns:380px 1fr 300px;gap:20px}
    .panel{background:rgba(255,255,255,0.95);border-radius:16px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,0.2)}
    .panel-title{color:#0e7490;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .code-container{background:#1e293b;border-radius:12px;padding:16px;font-family:'Consolas','Monaco',monospace;font-size:13px;line-height:1.8;max-height:450px;overflow-y:auto}
    .code-line{padding:2px 8px;border-radius:6px;transition:all 0.3s ease}
    .code-line.active{background:rgba(255,255,0,0.2);box-shadow:0 0 10px rgba(255,255,0,0.3)}
    .code-line.executed{opacity:1}
    .code-line.pending{opacity:0.5}
    .line-num{color:#64748b;margin-right:12px;user-select:none;width:24px;display:inline-block;text-align:right}
    .controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    .btn{padding:10px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s ease;display:flex;align-items:center;gap:8px;font-size:14px}
    .btn-play{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
    .btn-pause{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
    .btn-restart{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .var-card{background:linear-gradient(135deg:#cffafe,#a5f3fc);border-radius:12px;padding:16px;margin-bottom:12px;border:2px solid#22d3ee;transition:all 0.3s ease}
    .var-card.highlight{border-color:#0891b2;box-shadow:0 0 20px rgba(8,145,178,0.4);transform:scale(1.02)}
    .var-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .var-name{color:#164e63;font-weight:700;font-size:15px}
    .var-type{color:#64748b;font-size:12px;background:#fff;padding:4px 10px;border-radius:20px}
    .typedef-container{display:flex;flex-direction:column;gap:12px;margin:16px 0}
    .typedef-box{border-radius:12px;padding:16px;transition:all 0.4s ease;border:3px solid transparent}
    .typedef-box.definition{background:linear-gradient(135deg:#cffafe,#a5f3fc);border-color:#0891b2}
    .typedef-box.active{transform:scale(1.02);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .type-row{display:flex;align-items:center;margin-bottom:8px;gap:8px}
    .type-label{width:120px;font-size:11px;color:#0e7490;font-weight:600;font-family:'Consolas',monospace}
    .typedef-box-inner{flex:1;background:white;border-radius:8px;padding:12px;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .typedef-box-inner.active{border-color:#0891b2;background:linear-gradient(135deg:#cffafe,#a5f3fc)}
    .type-info{font-size:10px;color:#64748b}
    .type-value{font-size:12px;font-weight:700;color:#0e7490;font-family:'Consolas',monospace}
    .simplify-display{background:#1e293b;border-radius:12px;padding:16px;margin:16px 0}
    .simplify-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:#0f172a;border-radius:8px;margin-bottom:8px;transition:all 0.4s ease}
    .simplify-row.pending{opacity:0.5}
    .simplify-row.active{background:linear-gradient(135deg,#0891b2,#0e7490);border:2px solid#22d3ee}
    .simplify-name{font-size:12px;color:#94a3b8;font-family:'Consolas',monospace}
    .simplify-value{font-size:14px;font-weight:700;color:#22d3ee;font-family:'Consolas',monospace}
    .comparison-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
    .compare-card{background:white;border-radius:8px;padding:12px;text-align:center;border:2px solid#e5e7eb;transition:all 0.3s ease}
    .compare-card.active{border-color:#0891b2;background:linear-gradient(135deg:#cffafe,#a5f3fc)}
    .compare-label{font-size:10px;color:#64748b;margin-bottom:4px}
    .compare-code{font-size:11px;color:#0e7490;font-family:'Consolas',monospace}
    .compare-desc{font-size:9px;color:#64748b;margin-top:4px}
    .use-case-list{display:flex;flex-direction:column;gap:8px;margin:16px 0}
    .use-item{background:#cffafe;border-radius:8px;padding:12px;border-left:4px solid#0891b2;transition:all 0.3s ease}
    .use-item.active{border-left-color:#22c55e;background:linear-gradient(135deg:#cffafe,#a5f3fc)}
    .use-title{font-size:11px;color:#164e63;font-weight:700;margin-bottom:4px}
    .use-example{font-size:10px;color:#0e7490;font-family:'Consolas',monospace}
    .terminal{background:#0f172a;border-radius:12px;padding:16px;font-family:'Consolas',monospace;font-size:12px;color:#22d3ee;min-height:80px}
    .terminal-line{margin-bottom:4px}
    .cursor{display:inline-block;width:8px;height:18px;background:#22d3ee;animation:blink 1s infinite;vertical-align:middle}
    @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
    .explanation-card{background:linear-gradient(135deg:#fef3c7,#fde68a);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid#f59e0b}
    .explanation-card.active{border-left-color:#22c55e;animation:slideIn 0.5s ease}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    .voice-status{display:flex;align-items:center;gap:8px;color:#647480;font-size:13px}
    .voice-dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1;transition:all 0.3s ease}
    .voice-dot.active{background:#22c55e;animation:pulse 0.6s infinite}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const{useState,useEffect,useCallback,useRef} = React;
    const MAX_STEPS = 6;
    const COLOR_MAP = {green:'#22c55e',red:'#ef4444',yellow:'#f59e0b',purple:'#7c3aed',blue:'#0891b2',cyan:'#0891b2'};
    const LINE_MAP = {
      1:{step:1,text:'typedef int (*MathOp)(int, int);',color:'#0891b2'},
      2:{step:2,text:'int add(int a, int b) { return a + b; }',color:'#22d3ee'},
      3:{step:3,text:'int sub(int a, int b) { return a - b; }',color:'#67e8f9'},
      4:{step:4,text:'MathOp operations[2] = {add, sub};',color:'#a5f3fc'},
      5:{step:5,text:'int result = operations[0](10, 5);',color:'#cffafe'},
      6:{step:6,text:'printf("%d\\n", result); // 15',color:'#3b82f6'}
    };
    const VOICE_TEXT_MAP = {
      1:'程序开始，typedef 用于简化函数指针类型声明，MathOp 代表指向二元整型函数的指针',
      2:'定义 add 函数，实现加法运算，返回两数之和',
      3:'定义 sub 函数，实现减法运算，返回两数之差',
      4:'使用 typedef 类型声明函数指针数组，包含 add 和 sub 两个函数',
      5:'调用 operations[0] 即 add 函数，传入参数 10 和 5，结果为 15',
      6:'打印结果 15，typedef 使复杂函数指针声明变得清晰易读'
    };
    const typeDefs = [
      {name:'MathOp',original:'int (*)(int,int)',desc:'函数指针类型'},
      {name:'operations',type:'MathOp[2]',desc:'函数指针数组'},
      {name:'result',type:'int',desc:'调用结果'}
    ];
    const simplifyOps = [
      {op:'原始声明',before:'int (*ops[])(int,int)',after:'使用 typedef'},
      {op:'简化声明',before:'MathOp ops[]',after:'清晰易读'},
      {op:'调用',before:'(*ops[0])(10,5)',after:'ops[0](10,5)'}
    ];
    const I = {play:'M8 5v14l11-7z',pause:'M6 19h4V5H6v14zm8-14v14h4V5h-4z',restart:'M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8z',speaker:'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',code:'M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z',typedef:'M7 7h10v3l4-4-4-4v3H3v6h4v-4zm10 10H7v-3l-4 4 4 4v-3h14v-6h-4v4z'};
    const Icon = ({path,size=20,color='currentColor'}) => (<svg width={size} height={size} viewBox="0 0 24 24" fill={color}><path d={path}/></svg>);
    function App() {
      const [step,setStep] = useState(1);
      const [isPlaying,setIsPlaying] = useState(false);
      const [activeLine,setActiveLine] = useState(1);
      const [terminalLines,setTerminalLines] = useState([]);
      const [activeType,setActiveType] = useState(-1);
      const [simplifyIdx,setSimplifyIdx] = useState(-1);
      const [isVoicePlaying,setIsVoicePlaying] = useState(false);
      const voiceEndTimerRef = useRef(null);
      const [voiceRate,setVoiceRate] = useState(0.95);
      const playVoice = useCallback(() => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        const text = VOICE_TEXT_MAP[step] || "";
        if(!text) {
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 1500);
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = voiceRate;
        utterance.onend = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        utterance.onerror = () => {
          setIsVoicePlaying(false);
          voiceEndTimerRef.current = setTimeout(() => {
            setStep(p => Math.min(MAX_STEPS, p + 1));
          }, 800);
        };
        const voices = window.speechSynthesis.getVoices();
        const voice = voices.find(v => v.name.includes('Xiaoxiao')) || voices.find(v => v.lang.startsWith('zh-CN')) || null;
        if(voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
        setIsVoicePlaying(true);
      }, [step, voiceRate, MAX_STEPS]);
      useEffect(() => {
        if(isPlaying && step < MAX_STEPS) {
          playVoice();
        }
      }, [isPlaying, step, playVoice, MAX_STEPS]);
      useEffect(() => {
        let foundLine = 1;
        for(let line = 1; line <= 6; line++) {
          if(LINE_MAP[line] && LINE_MAP[line].step === step) {
            foundLine = line;
            break;
          }
        }
        setActiveLine(foundLine);
        if(step === 1) {
          setActiveType(-1);
          setSimplifyIdx(-1);
          setTerminalLines([]);
        } else if(step === 2) {
          setActiveType(0);
          setSimplifyIdx(0);
        } else if(step === 3) {
          setActiveType(1);
        } else if(step === 4) {
          setSimplifyIdx(1);
          setActiveType(2);
        } else if(step === 5) {
          setSimplifyIdx(2);
        } else if(step === 6) {
          setTerminalLines(['15']);
        }
      }, [step]);
      const renderCodeLine = (lineNum) => {
        const lineInfo = LINE_MAP[lineNum];
        const isActive = lineNum === activeLine;
        const isExecuted = lineInfo && lineInfo.step <= step;
        return (
          <div key={lineNum} className={`code-line ${isActive ? 'active' : ''} ${isExecuted ? 'executed' : 'pending'}`} style={{background:isActive ? 'rgba(255,255,0,0.15)' : 'transparent'}}>
            <span className="line-num">{String(lineNum).padStart(2,' ')}</span>
            <span style={{color:lineInfo?.color || '#e2e8f0'}}>{lineInfo?.text || ''}</span>
          </div>
        );
      };
      const handleRestart = () => {
        window.speechSynthesis.cancel();
        if(voiceEndTimerRef.current) {
          clearTimeout(voiceEndTimerRef.current);
        }
        setStep(1);
        setActiveLine(1);
        setActiveType(-1);
        setSimplifyIdx(-1);
        setTerminalLines([]);
        setIsPlaying(true);
      };
      return (
        <div className="app-container">
          <div className="header">
            <h1>typedef 与函数指针组合 - C 语言可视化</h1>
            <p>typedef | 函数指针数组 | 简化声明</p>
          </div>
          <div className="controls" style={{marginBottom:20,background:'rgba(255,255,255,0.95)',padding:16,borderRadius:16}}>
            <button className="btn btn-restart" onClick={handleRestart}>
              <Icon path={I.restart} size={18} /> 重新开始
            </button>
            <button className="btn btn-play" onClick={() => setIsPlaying(true)} disabled={isPlaying || step >= MAX_STEPS}>
              <Icon path={I.play} size={18} /> 播放
            </button>
            <button className="btn btn-pause" onClick={() => {setIsPlaying(false);window.speechSynthesis.cancel();}} disabled={!isPlaying}>
              <Icon path={I.pause} size={18} /> 暂停
            </button>
            <div style={{background:COLOR_MAP.cyan,color:'white',padding:'10px 20px',borderRadius:10,fontWeight:700}}>步骤：{step} / {MAX_STEPS}</div>
            <div className="voice-status">
              <span>语音:</span>
              <div className={`voice-dot ${isVoicePlaying ? 'active' : ''}`}></div>
              <span>{isVoicePlaying ? '播放中...' : '就绪'}</span>
            </div>
          </div>
          <div className="main-grid">
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.code} size={22} />
                typedef_func_ptr.c
              </div>
              <div className="code-container">
                {[1,2,3,4,5,6].map(n => renderCodeLine(n))}
              </div>
            </div>
            <div className="panel">
              <div className="panel-title">
                <Icon path={I.typedef} size={22} />
                typedef 简化函数指针
              </div>
              <div className={`var-card ${step >= 1 ? 'highlight' : ''}`}>
                <div className="var-header">
                  <span className="var-name">typedef</span>
                  <span className="var-type">Type Alias for Function Pointer</span>
                </div>
                <div className="typedef-container">
                  <div className={`typedef-box definition ${step >= 2 ? 'active' : ''}`}>
                    <div style={{fontSize:13,fontWeight:700,color:'#164e63',marginBottom:12}}>类型定义</div>
                    {typeDefs.map((t, idx) => (
                      <div key={t.name} className="type-row">
                        <span className="type-label">{t.name}</span>
                        <div className={`typedef-box-inner ${step >= 2 + idx && activeType === idx ? 'active' : ''}`}>
                          <div className="type-info">{t.desc}</div>
                          <div className="type-value">{t.original || t.type}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="simplify-display">
                  <div style={{color:'#94a3b8',fontSize:12,marginBottom:12}}>简化前后对比</div>
                  {simplifyOps.map((s, idx) => (
                    <div key={idx} className={`simplify-row ${step >= 2 + idx && simplifyIdx >= idx ? 'active' : 'pending'}`}>
                      <span className="simplify-name">{s.op}</span>
                      <span className="simplify-value">{s.before} → {s.after}</span>
                    </div>
                  ))}
                </div>
                <div className="comparison-grid">
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">无 typedef</div>
                    <div className="compare-code">int (*p)(int,int)</div>
                    <div className="compare-desc">复杂难读</div>
                  </div>
                  <div className={`compare-card ${step >= 2 ? 'active' : ''}`}>
                    <div className="compare-label">有 typedef</div>
                    <div className="compare-code">MathOp p</div>
                    <div className="compare-desc">简洁清晰</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">数组声明</div>
                    <div className="compare-code">MathOp ops[]</div>
                    <div className="compare-desc">一目了然</div>
                  </div>
                  <div className={`compare-card ${step >= 3 ? 'active' : ''}`}>
                    <div className="compare-label">类型安全</div>
                    <div className="compare-code">编译器检查</div>
                    <div className="compare-desc">防止错误</div>
                  </div>
                </div>
                <div className="use-case-list">
                  <div className={`use-item ${step >= 2 ? 'active' : ''}`}>
                    <div className="use-title">回调函数类型</div>
                    <div className="use-example">typedef void (*Callback)(void* data); // 通用回调</div>
                  </div>
                  <div className={`use-item ${step >= 3 ? 'active' : ''}`}>
                    <div className="use-title">操作函数表</div>
                    <div className="use-example">typedef int (*Op)(int,int); Op ops[] = {add,sub,mul,div};</div>
                  </div>
                  <div className={`use-item ${step >= 4 ? 'active' : ''}`}>
                    <div className="use-title">策略模式</div>
                    <div className="use-example">typedef void (*Strategy)(Context*); void set_strategy(Strategy s);</div>
                  </div>
                  <div className={`use-item ${step >= 5 ? 'active' : ''}`}>
                    <div className="use-title">状态机转换</div>
                    <div className="use-example">typedef State (*Transition)(Event); Transition table[MAX];</div>
                  </div>
                </div>
              </div>
              {step >= 6 && (
                <div style={{marginTop:20}}>
                  <div style={{fontSize:12,color:'#64748b',marginBottom:8}}>终端输出</div>
                  <div className="terminal">
                    {terminalLines.map((line, idx) => (
                      <div key={idx} className="terminal-line">{line}</div>
                    ))}
                    <span className="cursor"></span>
                  </div>
                </div>
              )}
            </div>
            <div className="panel">
              <div className="panel-title">
                <span style={{fontSize:20}}>💡</span>
                解释说明
              </div>
              <div className={`explanation-card ${step >= 1 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.cyan}}>typedef 作用</strong>
                <p style={{marginTop:8,color:'#78350f'}}>简化复杂类型声明</p>
              </div>
              <div className={`explanation-card ${step >= 2 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.blue}}>函数指针数组</strong>
                <p style={{marginTop:8,color:'#78350f'>MathOp ops[] 清晰声明</p>
              </div>
              <div className={`explanation-card ${step >= 4 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.yellow}}>类型安全</strong>
                <p style={{marginTop:8,color:'#78350f'>编译器类型检查</p>
              </div>
              <div className={`explanation-card ${step >= 6 ? 'active' : ''}`}>
                <strong style={{color:COLOR_MAP.green}}>应用场景</strong>
                <p style={{marginTop:8,color:'#78350f'>回调表、策略模式、状态机</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
