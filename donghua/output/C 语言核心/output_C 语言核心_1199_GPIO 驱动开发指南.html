        const STEPS = [
            {
                title: "GPIO 基础结构",
                description: "通用输入输出端口",
                code: `// GPIO 核心概念
// 1. 数字输入：读取引脚电平 (0/1)
// 2. 数字输出：驱动引脚电平 (推挽/开漏)
// 3. 模拟输入：ADC 采集
// 4. 复用功能：I2C/SPI/UART 等外设

// STM32 GPIO 模式
// 1. 输入模式 (Input)
//    - 浮空输入 (FLOATING)
//    - 上拉输入 (PULL_UP)
//    - 下拉输入 (PULL_DOWN)

// 2. 输出模式 (Output)
//    - 推挽输出 (PUSH_PULL)
//    - 开漏输出 (OPEN_DRAIN)

// 3. 复用功能 (Alternate Function)
//    - 复用推挽 (AF_PP)
//    - 复用开漏 (AF_OD)

// 4. 模拟模式 (Analog)
//    - ADC 输入，关闭数字电路

// GPIO 速度配置

            },
            {
                title: "GPIO 输入模式",
                description: "浮空、上拉、下拉输入",
                code: `// GPIO 输入模式配置

// 1. 浮空输入 (Floating Input)
// 引脚悬空，电平不确定
// 应用：按键 (需外接电阻)
void GPIO_FloatingInput(void) {
    GPIOA->MODER &= ~(0x3 << 0);  // 输入模式
    GPIOA->PUPDR &= ~(0x3 << 0);  // 无上拉下拉
}

// 2. 上拉输入 (Pull-up Input)
// 内部上拉电阻，默认高电平
// 应用：按键 (一端接地)
void GPIO_PullUpInput(void) {
    GPIOA->MODER &= ~(0x3 << 0);  // 输入模式
    GPIOA->PUPDR |= (0x1 << 0);   // 上拉
}

// 3. 下拉输入 (Pull-down Input)
// 内部下拉电阻，默认低电平
// 应用：按键 (一端接 VCC)
void GPIO_PullDownInput(void) {
    GPIOA->MODER &= ~(0x3 << 0);  // 输入模式
    GPIOA->PUPDR |= (0x2 << 0);   // 下拉
}

// 读取输入数据
uint8_t GPIO_ReadPin(void) {
    return (GPIOA->IDR >> 0) & 0x01;
}`,
                visualState: { showInput: true, showPullUp: true, showPullDown: true }
            },
            {
                title: "GPIO 输出模式",
                description: "推挽输出与开漏输出",
                code: `// GPIO 输出模式配置

// 1. 推挽输出 (Push-Pull Output)
// 可输出高电平和低电平
// 驱动能力强，适合 LED、蜂鸣器
void GPIO_PushPullOutput(void) {
    GPIOA->MODER |= (0x1 << 0);   // 输出模式
    GPIOA->OTYPER &= ~(0x1 << 0); // 推挽
    GPIOA->OSPEEDR |= (0x2 << 0); // 中速
}

// 2. 开漏输出 (Open-Drain Output)
// 只能输出低电平或高阻态
// 需外接上拉电阻，输出高电平
// 应用：I2C 总线、电平转换
void GPIO_OpenDrainOutput(void) {
    GPIOA->MODER |= (0x1 << 0);   // 输出模式
    GPIOA->OTYPER |= (0x1 << 0);  // 开漏
    GPIOA->PUPDR &= ~(0x3 << 0);  // 无上拉 (外接)
}

// 输出控制
void GPIO_SetPin(void) {
    GPIOA->BSRR = (0x1 << 0);     // 置位 (高电平)
}

void GPIO_ResetPin(void) {
    GPIOA->BSRR = (0x1 << 16);    // 复位 (低电平)
}

void GPIO_TogglePin(void) {
    GPIOA->ODR ^= (0x1 << 0);     // 翻转
}`,

            {

                description: "外设引脚映射",

// 将引脚映射到外设 (I2C/SPI/UART 等)

// STM32 复用功能映射
// AF0:  MCO, RTC
// AF1:  TIM1, TIM2
// AF2:  TIM3, TIM4, TIM5
// AF3:  TIM8, TIM9, TIM10, TIM11
// AF4:  I2C1, I2C2, I2C3
// AF5:  SPI1, SPI2
// AF6:  SPI3
// AF7:  USART1, USART2, USART3
// AF8:  UART4, UART5, USART6
// AF9:  CAN1, TIM12, TIM13, TIM14
// AF10: OTG_FS, OTG_HS
// AF11: ETH
// AF12: FSMC, FMC
// AF13: DCMI
// AF14: LCD-TFT
// AF15: EVENTOUT

// 配置 PA9/PA10 为 USART1
void GPIO_AF_USART1(void) {
    // PA9 = TX (AF7), PA10 = RX (AF7)
    GPIOA->AFR[1] &= ~(0xF << 0);  // PA9
    GPIOA->AFR[1] &= ~(0xF << 4);  // PA10
    GPIOA->AFR[1] |= (0x7 << 0);   // AF7
    GPIOA->AFR[1] |= (0x7 << 4);   // AF7

    GPIOA->MODER &= ~(0x3 << 18);  // PA9
    GPIOA->MODER &= ~(0x3 << 20);  // PA10
    GPIOA->MODER |= (0x2 << 18);   // 复用
    GPIOA->MODER |= (0x2 << 20);   // 复用
}`,
                visualState: { showAF: true, showMapping: true }
            },
            {
                title: "GPIO 中断配置",
                description: "外部中断控制器 EXTI",
                code: `// GPIO 中断配置
// 使用 EXTI (外部中断) 检测边沿变化

// EXTI 线映射
// EXTI0  ←  PA0, PB0, PC0, ...
// EXTI1  ←  PA1, PB1, PC1, ...
// ...
// EXTI15 ←  PA15, PB15, PC15, ...
// 同一时间只能一个端口的引脚使用

void GPIO_EXTI_Config(void) {
    // 1. 使能时钟
    RCC->APB2ENR |= RCC_APB2ENR_SYSCFGEN;
    RCC->AHB1ENR |= RCC_AHB1ENR_GPIOAEN;

    // 2. 配置 PA0 为浮空输入
    GPIOA->MODER &= ~(0x3 << 0);
    GPIOA->PUPDR &= ~(0x3 << 0);

    // 3. 映射 PA0 到 EXTI0
    SYSCFG->EXTICR[0] &= ~0x0F;
    SYSCFG->EXTICR[0] |= 0x00;  // PA0

    // 4. 配置中断触发边沿
    EXTI->RTSR |= EXTI_RTSR_TR0;   // 上升沿
    EXTI->FTSR &= ~EXTI_FTSR_TR0;  // 无下降沿

    // 5. 使能中断
    EXTI->IMR |= EXTI_IMR_MR0;

    // 6. 配置 NVIC
    NVIC_EnableIRQ(EXTI0_IRQn);
    NVIC_SetPriority(EXTI0_IRQn, 1);
}

// 中断处理函数
void EXTI0_IRQHandler(void) {
    if (EXTI->PR & EXTI_PR_PR0) {
        EXTI->PR = EXTI_PR_PR0;  // 清除标志
        // 处理中断
        GPIO_TogglePin();
    }
}`,
                visualState: { showEXTI: true, showInterrupt: true }
            },
            {
                title: "GPIO 速度配置",
                description: "输出速度等级与功耗",
                code: `// GPIO 速度配置
// 影响开关速度、功耗、EMI

// STM32 速度等级
// 00: Low Speed (2 MHz)    - 最低功耗
// 01: Medium Speed (10 MHz)- 平衡
// 10: High Speed (50 MHz)  - 高速
// 11: Very High (100 MHz)  - 最高速 (部分型号)

// 速度选择原则
// 1. 满足应用即可，不要过高
// 2. 低速信号 (LED) 用 Low
// 3. 通信接口 (SPI/UART) 用 Medium/High
// 4. 高速接口 (SDRAM) 用 Very High

void GPIO_SpeedConfig(void) {
    // PA0: LED, 低速
    GPIOA->OSPEEDR &= ~(0x3 << 0);
    GPIOA->OSPEEDR |= (0x0 << 0);  // 2MHz

    // PA1: SPI MOSI, 高速
    GPIOA->OSPEEDR &= ~(0x3 << 2);
    GPIOA->OSPEEDR |= (0x2 << 2);  // 50MHz

    // PA2: UART TX, 中速
    GPIOA->OSPEEDR &= ~(0x3 << 4);
    GPIOA->OSPEEDR |= (0x1 << 4);  // 10MHz
}

// 降低功耗技巧
// 1. 未用引脚设为模拟输入
// 2. 输出引脚设为合适速度
// 3. 悬空输入引脚加上拉/下拉`,
                visualState: { showSpeed: true, showPower: true }
            },
            {
                title: "GPIO 驱动框架",
                description: "HAL 库与寄存器操作",
                code: `// GPIO 驱动框架对比

// 1. 寄存器操作 (最快)
#define LED_PIN  (1 << 0)
void LED_On(void) {
    GPIOA->BSRR = LED_PIN;      // 原子操作
}
void LED_Off(void) {
    GPIOA->BSRR = (LED_PIN << 16);
}
void LED_Toggle(void) {
    GPIOA->ODR ^= LED_PIN;
}

// 2. HAL 库操作 (可移植)
void LED_Init(void) {
    GPIO_InitTypeDef GPIO_InitStruct = {0};
    __HAL_RCC_GPIOA_CLK_ENABLE();
    HAL_GPIO_WritePin(GPIOA, GPIO_PIN_0, GPIO_PIN_RESET);
}
void LED_On(void) {
    HAL_GPIO_WritePin(GPIOA, GPIO_PIN_0, GPIO_PIN_SET);
}

// 3. 位带操作 (Cortex-M 特有)
#define BITBAND(addr, bit) \\
    *((__IO uint32_t *)(0x42000000 + ((addr - 0x40000000)*32) + (bit*4)))

#define PA0_OUT  BITBAND(&GPIOA->ODR, 0)
PA0_OUT = 1;  // 置高

// 性能对比
// 寄存器：1 周期 (最快)
// 位带：  2 周期
// HAL:    10+ 周期 (函数调用开销)`,
                visualState: { showDriver: true, showRegister: true }
            },
            {
                title: "GPIO 应用实例",
                description: "LED 驱动与按键检测",
                code: `// 应用 1: LED 驱动 (推挽输出)
void LED_Init(void) {
    RCC->AHB1ENR |= RCC_AHB1ENR_GPIOAEN;
    GPIOA->MODER |= (0x1 << 0);    // 输出
    GPIOA->OTYPER &= ~(0x1 << 0);  // 推挽
    GPIOA->OSPEEDR |= (0x1 << 0);  // 中速
    GPIOA->PUPDR &= ~(0x3 << 0);   // 无上拉下拉
    GPIOA->BSRR = (0x1 << 16);     // 默认灭
}

// LED 呼吸灯 (PWM 模拟)
void LED_Breath(void) {
    for (int duty = 0; duty < 100; duty++) {
        for (int i = 0; i < duty; i++) GPIOA->BSRR = (0x1 << 0);
        for (int i = duty; i < 100; i++) GPIOA->BSRR = (0x1 << 16);
        Delay_us(100);
    }
}

// 应用 2: 按键检测 (上拉输入 + 中断)
volatile uint8_t key_pressed = 0;

void KEY_Init(void) {
    RCC->AHB1ENR |= RCC_AHB1ENR_GPIOBEN;
    GPIOB->MODER &= ~(0x3 << 0);   // 输入
    GPIOB->PUPDR |= (0x1 << 0);    // 上拉
    // 配置 EXTI...
}

void EXTI0_IRQHandler(void) {
    EXTI->PR = EXTI_PR_PR0;
    if (!GPIO_ReadPin()) {  // 确认按下
        key_pressed = 1;
    }
}

// 消抖处理
uint8_t KEY_Scan(void) {
    static uint32_t last_time = 0;
    if (key_pressed && (millis() - last_time > 50)) {
        last_time = millis();
        key_pressed = 0;
        return 1;
    }
    return 0;
}`,
                visualState: { showApplication: true, showLED: true, showKEY: true }
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isAutoPlaying, setIsAutoPlaying] = useState(true);
            const [showAnswer, setShowAnswer] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const speak = (text) => {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const zhVoice = voices.find(v =>
                    v.lang === 'zh-CN' &&
                    (v.name.includes('Xiaoxiao') || v.name.includes('Chinese'))
                );
                if (zhVoice) utterance.voice = zhVoice;
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.lang = 'zh-CN';

                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (isAutoPlaying && currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 800);
                };
                utterance.onerror = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (isAutoPlaying && currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 800);
                };
                speechSynthesis.speak(utterance);
            };

            useEffect(() => {
                speak(STEPS[currentStep].title + '。' + STEPS[currentStep].description);
                return () => clearTimeout(voiceEndTimerRef.current);
            }, [currentStep]);

            const handleNext = () => {
                if (currentStep < STEPS.length - 1) {
                    setCurrentStep(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setCurrentStep(prev => prev - 1);
                }
            };

            const handleRestart = () => {
                setCurrentStep(0);
                speechSynthesis.cancel();
                setTimeout(() => speak(STEPS[0].title + '。' + STEPS[0].description), 100);
            };

            const GPIOVisualization = () => {
                const step = STEPS[currentStep];
                const vs = step.visualState;

                return (
                    <div className="w-full h-96 bg-gray-800 rounded-lg p-6 relative overflow-hidden">

                        {(vs.showStructure || vs.showPin) && (

                                {/* Output Driver */}
                                <rect x="80" y="110" width="40" height="30" fill={COLOR_MAP.primary} opacity="0.3" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="100" y="130" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">驱动</text>

                                {/* IDR Register */}
                                <rect x="140" y="65" width="50" height="30" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="165" y="85" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">IDR</text>

                                {/* ODR Register */}
                                <rect x="140" y="110" width="50" height="30" fill={COLOR_MAP.primary} opacity="0.3" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="165" y="130" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">ODR</text>

                                {/* Arrows */}

                                <line x1="125" y1="125" x2="135" y2="125" stroke={COLOR_MAP.primary} strokeWidth="2" />

                        {/* Input Modes */}
                        {(vs.showInput || vs.showPullUp || vs.showPullDown) && (

                        {(vs.showOutput || vs.showPushPull || vs.showOpenDrain) && (

                                <text x="20" y="40" fill="#fff" fontSize="11">输出模式:</text>

                                <circle cx="50" cy="90" r="8" fill={COLOR_MAP.primary} opacity="0.5" />
                                <text x="50" y="95" fill="#fff" fontSize="6" textAnchor="middle">PMOS</text>
                                <circle cx="90" cy="90" r="8" fill={COLOR_MAP.secondary} opacity="0.5" />
                                <text x="90" y="95" fill="#fff" fontSize="6" textAnchor="middle">NMOS</text>
                                <text x="70" y="110" fill="#888" fontSize="7" textAnchor="middle">强驱动</text>

                                {/* Open-Drain */}
                                <rect x="140" y="50" width="100" height="70" fill={COLOR_MAP.accent2} opacity="0.2" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="190" y="70" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">开漏输出</text>
                                {/* Single transistor */}
                                <circle cx="190" cy="95" r="8" fill={COLOR_MAP.secondary} opacity="0.5" />
                                <text x="190" y="100" fill="#fff" fontSize="6" textAnchor="middle">NMOS</text>
                                <text x="190" y="110" fill="#888" fontSize="7" textAnchor="middle">需上拉</text>

                                {/* Output waveforms */}
                                <text x="20" y="140" fill="#fff" fontSize="9">推挽输出波形:</text>
                                <line x1="20" y1="155" x2="60" y2="155" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="60" y1="155" x2="60" y2="140" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="60" y1="140" x2="100" y2="140" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="100" y1="140" x2="100" y2="155" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="100" y1="155" x2="140" y2="155" stroke={COLOR_MAP.primary} strokeWidth="2" />

                                <text x="160" y="140" fill="#fff" fontSize="9">开漏输出:</text>
                                <line x1="160" y1="155" x2="200" y2="155" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <line x1="200" y1="155" x2="200" y2="145" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <line x1="200" y1="145" x2="240" y2="145" stroke={COLOR_MAP.accent2} strokeWidth="2" strokeDasharray="3,3" />
                                <text x="250" y="150" fill={COLOR_MAP.accent2} fontSize="7">外接上拉</text>
                            </g>
                        )}

                        {/* Alternate Function */}
                        {(vs.showAF || vs.showMapping) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">复用功能映射:</text>

                                {/* Pin */}
                                <circle cx="50" cy="70" r="12" fill={COLOR_MAP.accent3} opacity="0.5" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="50" y="75" fill="#fff" fontSize="8" textAnchor="middle">PA</text>

                                {/* AF Selection */}
                                <rect x="80" y="50" width="120" height="40" fill={COLOR_MAP.accent3} opacity="0.2" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="140" y="70" fill={COLOR_MAP.accent3} fontSize="8" textAnchor="middle">AF 选择器</text>

                                {/* AF Outputs */}
                                <text x="220" y="50" fill={COLOR_MAP.accent1} fontSize="8">AF4 → I2C</text>
                                <text x="220" y="65" fill={COLOR_MAP.accent2} fontSize="8">AF5 → SPI</text>
                                <text x="220" y="80" fill={COLOR_MAP.accent4} fontSize="8">AF7 → USART</text>

                                {/* AFR register */}
                                <rect x="80" y="100" width="120" height="30" fill={COLOR_MAP.accent3} opacity="0.3" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="140" y="120" fill={COLOR_MAP.accent3} fontSize="8" textAnchor="middle">AFR 寄存器</text>
                                <text x="220" y="120" fill={COLOR_MAP.accent3} fontSize="8">设置 0-15</text>
                            </g>
                        )}

                        {/* EXTI Interrupt */}
                        {(vs.showEXTI || vs.showInterrupt) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">外部中断 (EXTI):</text>

                                {/* GPIO to EXTI */}
                                <circle cx="50" cy="70" r="12" fill={COLOR_MAP.primary} opacity="0.5" />
                                <text x="50" y="75" fill="#fff" fontSize="8" textAnchor="middle">PA0</text>

                                <line x1="65" y1="70" x2="90" y2="70" stroke={COLOR_MAP.accent1} strokeWidth="2" />

                                {/* EXTI Controller */}
                                <rect x="90" y="50" width="70" height="40" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="125" y="70" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">EXTI0</text>

                                {/* Edge Detector */}
                                <rect x="170" y="50" width="60" height="40" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="200" y="70" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">边沿</text>

                                {/* NVIC */}
                                <rect x="250" y="50" width="60" height="40" fill={COLOR_MAP.accent4} opacity="0.3" stroke={COLOR_MAP.accent4} strokeWidth="2" />
                                <text x="280" y="70" fill={COLOR_MAP.accent4} fontSize="8" textAnchor="middle">NVIC</text>

                                {/* CPU */}
                                <rect x="330" y="50" width="50" height="40" fill={COLOR_MAP.primary} opacity="0.3" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="355" y="70" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">CPU</text>

                                {/* Trigger waveform */}
                                <text x="20" y="120" fill="#fff" fontSize="9">上升沿触发:</text>
                                <line x1="20" y1="135" x2="50" y2="135" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="50" y1="135" x2="50" y2="120" stroke={COLOR_MAP.accent4} strokeWidth="2" />
                                <polygon points="50,115 45,125 55,125" fill={COLOR_MAP.accent4} />
                                <line x1="50" y1="125" x2="100" y2="125" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="110" y="140" fill={COLOR_MAP.accent4} fontSize="8">→ 中断请求</text>
                            </g>
                        )}

                        {/* Speed Configuration */}
                        {(vs.showSpeed || vs.showPower) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">速度等级:</text>

                                {/* Low Speed */}
                                <rect x="20" y="50" width="70" height="50" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="55" y="70" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">Low</text>
                                <text x="55" y="85" fill="#888" fontSize="7" textAnchor="middle">2MHz</text>
                                <text x="55" y="95" fill={COLOR_MAP.accent1} fontSize="6" textAnchor="middle">最低功耗</text>

                                {/* Medium Speed */}
                                <rect x="100" y="50" width="70" height="50" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="135" y="70" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">Medium</text>
                                <text x="135" y="85" fill="#888" fontSize="7" textAnchor="middle">10MHz</text>
                                <text x="135" y="95" fill={COLOR_MAP.accent2} fontSize="6" textAnchor="middle">平衡</text>

                                {/* High Speed */}
                                <rect x="180" y="50" width="70" height="50" fill={COLOR_MAP.accent3} opacity="0.3" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="215" y="70" fill={COLOR_MAP.accent3} fontSize="8" textAnchor="middle">High</text>
                                <text x="215" y="85" fill="#888" fontSize="7" textAnchor="middle">50MHz</text>
                                <text x="215" y="95" fill={COLOR_MAP.accent3} fontSize="6" textAnchor="middle">高速</text>

                                {/* Power consumption */}
                                <text x="20" y="130" fill="#fff" fontSize="9">功耗对比:</text>
                                <rect x="20" y="140" width="50" height="15" fill={COLOR_MAP.accent1} opacity="0.6" />
                                <text x="25" y="150" fill="#fff" fontSize="7">Low</text>

                                <rect x="80" y="140" width="70" height="15" fill={COLOR_MAP.accent2} opacity="0.6" />
                                <text x="85" y="150" fill="#fff" fontSize="7">Medium</text>

                                <rect x="160" y="140" width="90" height="15" fill={COLOR_MAP.accent3} opacity="0.6" />
                                <text x="165" y="150" fill="#fff" fontSize="7">High</text>
                            </g>
                        )}

                        {/* Driver Framework */}
                        {(vs.showDriver || vs.showRegister) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">驱动方式对比:</text>

                                {/* Register */}
                                <rect x="20" y="50" width="100" height="50" fill={COLOR_MAP.primary} opacity="0.3" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="70" y="70" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">寄存器</text>
                                <text x="70" y="85" fill={COLOR_MAP.primary} fontSize="7" textAnchor="middle">1 周期 (最快)</text>

                                {/* Bit-banding */}
                                <rect x="140" y="50" width="100" height="50" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="190" y="70" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">位带操作</text>
                                <text x="190" y="85" fill={COLOR_MAP.accent1} fontSize="7" textAnchor="middle">2 周期</text>

                                {/* HAL */}
                                <rect x="260" y="50" width="100" height="50" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="310" y="70" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">HAL 库</text>
                                <text x="310" y="85" fill={COLOR_MAP.accent2} fontSize="7" textAnchor="middle">10+ 周期</text>

                                {/* BSRR register */}
                                <text x="20" y="130" fill="#fff" fontSize="9">BSRR 原子操作:</text>
                                <rect x="20" y="140" width="150" height="30" fill={COLOR_MAP.primary} opacity="0.2" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="35" y="155" fill={COLOR_MAP.primary} fontSize="8">BS[0] 置位</text>
                                <text x="100" y="155" fill={COLOR_MAP.secondary} fontSize="8">BR[0] 复位</text>
                                <text x="180" y="160" fill="#fff" fontSize="7">原子操作，无竞态</text>
                            </g>
                        )}

                        {/* Applications */}
                        {(vs.showApplication || vs.showLED || vs.showKEY) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">应用实例:</text>

                                {/* LED */}
                                <rect x="20" y="50" width="100" height="70" fill={COLOR_MAP.primary} opacity="0.2" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="70" y="70" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">LED 驱动</text>
                                {/* LED circuit */}
                                <circle cx="50" cy="100" r="10" fill={COLOR_MAP.secondary} opacity="0.5" className="toggle" />
                                <text x="50" y="105" fill="#fff" fontSize="6" textAnchor="middle">LED</text>
                                <line x1="50" y1="115" x2="50" y2="130" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <rect x="45" y="115" width="10" height="15" fill="none" stroke={COLOR_MAP.accent4} strokeWidth="2" />
                                <text x="60" y="130" fill={COLOR_MAP.accent4} fontSize="7">限流电阻</text>

                                {/* KEY */}
                                <rect x="140" y="50" width="100" height="70" fill={COLOR_MAP.accent2} opacity="0.2" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="190" y="70" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">按键检测</text>
                                {/* Key circuit */}
                                <line x1="160" y1="90" x2="180" y2="90" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <line x1="160" y1="100" x2="180" y2="100" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <circle cx="170" cy="95" r="5" fill={COLOR_MAP.accent2} opacity="0.5" />
                                <text x="195" y="100" fill={COLOR_MAP.accent2} fontSize="7">→ PA0</text>
                                <text x="150" y="115" fill="#888" fontSize="7" textAnchor="middle">上拉 + 中断</text>

                                {/* Debounce */}
                                <rect x="260" y="50" width="100" height="70" fill={COLOR_MAP.accent3} opacity="0.2" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="310" y="70" fill={COLOR_MAP.accent3} fontSize="8" textAnchor="middle">消抖处理</text>
                                {/* Debounce timing */}
                                <line x1="270" y1="90" x2="300" y2="90" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <line x1="300" y1="90" x2="300" y2="105" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <line x1="300" y1="105" x2="350" y2="105" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="310" y="115" fill={COLOR_MAP.accent3} fontSize="6" textAnchor="middle">50ms</text>
                            </g>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-4">
                            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
                                1199. GPIO 驱动开发指南
                            </h1>
                            <p className="text-gray-400 text-sm">输入输出 · 推挽开漏 · 复用功能 · 外部中断</p>
                        </div>

                        {/* Progress Bar */}
                        <div className="mb-4">
                            <div className="flex justify-between text-xs text-gray-400 mb-1">
                                <span>步骤 {currentStep + 1} / {STEPS.length}</span>
                                <span>{Math.round(((currentStep + 1) / STEPS.length) * 100)}%</span>
                            </div>
                            <div className="w-full bg-gray-800 rounded-full h-2">
                                <div
                                    className="h-2 rounded-full transition-all duration-500"
                                    style={{
                                        width: `${((currentStep + 1) / STEPS.length) * 100}%`,
                                        background: `linear-gradient(90deg, ${COLOR_MAP.primary}, ${COLOR_MAP.secondary})`
                                    }}
                                />
                            </div>
                        </div>

                        {/* Main Content - Three Column Layout */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            {/* Left: Code */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.primary }}>
                                    💻 代码示例
                                </h3>
                                <pre className="text-xs text-gray-300 overflow-x-auto whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>

                            {/* Center: Visualization */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.secondary }}>
                                    🔬 可视化动画
                                </h3>
                                <svg className="w-full h-64" viewBox="0 0 400 320">
                                    <GPIOVisualization />
                                </svg>
                            </div>

                            {/* Right: Explanation */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.accent1 }}>
                                    📖 核心概念
                                </h3>
                                <ul className="space-y-2 text-sm text-gray-300">
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.primary }}>4 种模式:</strong> 输入/输出/复用/模拟</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.secondary }}>推挽输出:</strong> 强驱动高低电平</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent1 }}>开漏输出:</strong> 需外接上拉电阻</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent2 }}>上拉/下拉:</strong> 确定默认电平</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent3 }}>复用功能:</strong> 映射外设引脚</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.primary }}>EXTI 中断:</strong> 边沿触发检测</span>
                                    </li>
                                </ul>

                                {/* Code Challenge */}
                                <div className="mt-4 p-3 bg-gray-700 rounded">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-semibold">💡 代码挑战</span>
                                        <button
                                            onClick={() => setShowAnswer(!showAnswer)}
                                            className="text-xs px-2 py-1 rounded"
                                            style={{ backgroundColor: COLOR_MAP.primary, color: '#fff' }}
                                        >
                                            {showAnswer ? '隐藏' : '显示'}答案
                                        </button>
                                    </div>
                                    <p className="text-xs text-gray-400 mb-2">
                                        配置 PA5 为推挽输出，速度 50MHz:
                                    </p>
                                    {showAnswer && (
                                        <pre className="text-xs text-gray-300 overflow-x-auto">
{`void GPIO_PA5_Init(void) {
    RCC->AHB1ENR |= RCC_AHB1ENR_GPIOAEN;
    // MODER: 输出模式
    GPIOA->MODER &= ~(0x3 << 10);
    GPIOA->MODER |= (0x1 << 10);
    // OTYPER: 推挽
    GPIOA->OTYPER &= ~(0x1 << 5);
    // OSPEEDR: 50MHz
    GPIOA->OSPEEDR |= (0x2 << 10);
}`}
                                        </pre>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Control Buttons */}
                        <div className="flex justify-center gap-3 mb-4">
                            <button
                                onClick={handlePrev}
                                disabled={currentStep === 0}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === 0
                                        ? 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                        : 'bg-gray-600 text-white hover:bg-gray-500'
                                }`}
                            >
                                ← 上一步
                            </button>

                            <button
                                onClick={handleRestart}
                                className="px-6 py-3 rounded-lg font-semibold bg-gray-700 text-white hover:bg-gray-600 transition-all"
                            >
                                🔄 重新开始
                            </button>

                            <button
                                onClick={handleNext}
                                disabled={currentStep === STEPS.length - 1}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === STEPS.length - 1
                                        ? 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                        : 'bg-gray-600 text-white hover:bg-gray-500'
                                }`}
                            >
                                下一步 →
                            </button>
                        </div>

                        {/* Autoplay Toggle */}
                        <div className="text-center">
                            <button
                                onClick={() => setIsAutoPlaying(!isAutoPlaying)}
                                className={`px-4 py-2 rounded-lg font-semibold transition-all ${
                                    isAutoPlaying
                                        ? 'bg-green-600 text-white'
                                        : 'bg-gray-700 text-gray-300'
                                }`}
                            >
                                {isAutoPlaying ? '▶️ 自动播放中' : '⏸️ 已暂停'}
                            </button>
                        </div>

                        {/* Step Indicators */}
                        <div className="flex justify-center gap-2 mt-4 flex-wrap">
                            {STEPS.map((step, index) => (
                                <button
                                    key={index}
                                    onClick={() => setCurrentStep(index)}
                                    className={`px-3 py-2 rounded-lg text-xs font-medium transition-all ${
                                        index === currentStep
                                            ? 'bg-white text-gray-900'
                                            : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                                    }`}
                                >
                                    {index + 1}. {step.title}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
