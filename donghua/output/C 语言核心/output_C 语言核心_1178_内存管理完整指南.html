    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

            hover: 'hover:bg-emerald-100'

        const CODE_EXAMPLES = [
            {
                title: "内存布局总览",
                code: `// C 程序内存布局 (从高地址到低地址)
// +------------------+
// |    内核空间       |
// +------------------+ 0xFFFFFFFF
// |    栈 (Stack)     | ← 高地址，向下增长
// |  (局部变量，帧)    |
// +------------------+
//        ↓ 增长方向
// +------------------+
//    空闲空间
// +------------------+
//        ↑ 增长方向
// |    堆 (Heap)      | ← 低地址，向上增长
// |  (malloc 分配)    |
// +------------------+
// |   BSS 段          | (未初始化全局/静态)
// +------------------+
// |   DATA 段         | (已初始化全局/静态)
// +------------------+
// |   代码段 (.text)  |
// +------------------+ 0x00000000`,
                highlight: "栈/堆",
                explanation: "栈用于局部变量和函数调用，自动管理。堆用于动态分配，手动管理。理解内存布局有助于调试和 optimization。"
            },
            {
                title: "malloc/free 基础",
                code: `#include <stdlib.h>

// 分配单个对象
int *arr = (int*)malloc(10 * sizeof(int));
if (arr == NULL) {
    // ❌ 分配失败处理
    return -1;
}

// 使用内存
for (int i = 0; i < 10; i++) {
    arr[i] = i * 2;
}

// ⚠️ 必须释放
free(arr);
arr = NULL;  // 防止悬空指针

// 分配数组 (C99)
int *buf = calloc(100, sizeof(int));  // 自动清零
// ...
free(buf);`,
                highlight: "NULL",
                explanation: "malloc 返回未初始化内存，calloc 自动清零。始终检查返回值是否为 NULL。释放后立即置为 NULL 防止悬空指针。"
            },
            {
                title: "realloc 调整大小",
                code: `#include <stdlib.h>

int *data = (int*)malloc(10 * sizeof(int));
// ... 使用 data

// ✅ 正确方式：使用临时指针
int *temp = (int*)realloc(data, 20 * sizeof(int));
if (temp == NULL) {
    // ❌ 失败：data 仍然有效
    free(data);
    return -1;
}
data = temp;  // 成功：更新指针

// ❌ 错误方式：直接赋值
// data = realloc(data, 20 * sizeof(int));
// 如果失败，原 data 丢失 = 内存泄漏！

// 缩小也会返回新指针
data = (int*)realloc(data, 5 * sizeof(int));
free(data);`,
                highlight: "temp",
                explanation: "realloc 可能移动内存块并返回新指针。始终使用临时指针接收返回值，防止失败时丢失原指针导致内存泄漏。"
            },
            {
                title: "常见内存错误",
                code: `// 1. 内存泄漏 (Memory Leak)
void leak() {
    int *p = malloc(sizeof(int));
    *p = 42;
    return;  // ❌ 忘记 free
}

// 2. 悬空指针 (Dangling Pointer)
int *dangling() {
    int *p = malloc(sizeof(int));
    free(p);
    return p;  // ❌ 返回已释放的指针
}

// 3. 双重释放 (Double Free)
void doubleFree() {
    int *p = malloc(sizeof(int));
    free(p);
    free(p);  // ❌ 未定义行为！
}

// 4. 越界访问 (Buffer Overflow)
void overflow() {
    int *arr = malloc(10 * sizeof(int));
    arr[10] = 0;  // ❌ 应该是 arr[9]
    free(arr);
}`,
                highlight: "❌",
                explanation: "四大内存错误：泄漏 (忘 free)、悬空 (用已释放)、双释 (free 两次)、越界 (超范围)。使用工具如 Valgrind 检测。"
            },
            {
                title: "内存对齐与性能",
                code: `#include <stdalign.h>

// 内存对齐影响性能
struct Unaligned {
    char a;      // 1 字节
    // pad x3     // 填充
    int b;       // 4 字节
    char c;      // 1 字节
    // pad x3     // 填充
};  // sizeof = 12 字节

// alignas 指定对齐
struct Aligned {
    alignas(16) float vector[4];  // SIMD 对齐
};

// 检查对齐
_Static_assert(alignof(struct Aligned) == 16,
               "需要 16 字节对齐");

// 分配对齐内存 (C11)
void *ptr = aligned_alloc(16, 64);  // 16 字节对齐，64 字节
free(ptr);`,
                highlight: "alignas",
                explanation: "内存对齐影响访问性能。现代 CPU 访问对齐数据更快。SIMD 指令需要特定对齐 (16/32 字节)。C11 提供 aligned_alloc。"
            },
            {
                title: "智能释放模式",
                code: `// RAII 风格：自动清理
typedef struct {
    int *data;
    size_t size;
} Buffer;

Buffer* buffer_create(size_t size) {
    Buffer *buf = calloc(1, sizeof(Buffer));
    if (!buf) return NULL;
    buf->data = malloc(size);
    if (!buf->data) {
        free(buf);  // 清理已分配部分
        return NULL;
    }
    buf->size = size;
    return buf;
}

void buffer_destroy(Buffer *buf) {
    if (!buf) return;
    free(buf->data);  // 先释放成员
    free(buf);        // 再释放结构体
}

// 使用
Buffer *b = buffer_create(1024);
// ... 使用
buffer_destroy(b);  // 一次性清理`,
                highlight: "destroy",
                explanation: "封装分配/释放逻辑，确保成对调用。先释放成员再释放容器。类似 C++ RAII，防止资源泄漏。"
            },
            {
                title: "内存池技术",
                code: `// 固定大小对象池
#define POOL_SIZE 100
#define BLOCK_SIZE 64

typedef struct Block {
    struct Block *next;
    uint8_t data[BLOCK_SIZE - sizeof(struct Block*)];
} Block;

typedef struct {
    Block *freeList;
    Block blocks[POOL_SIZE];
} MemoryPool;

MemoryPool* pool_create() {
    MemoryPool *pool = calloc(1, sizeof(MemoryPool));
    for (int i = 0; i < POOL_SIZE - 1; i++) {
        pool->blocks[i].next = &pool->blocks[i + 1];
    }
    pool->blocks[POOL_SIZE - 1].next = NULL;
    pool->freeList = &pool->blocks[0];
    return pool;
}

void* pool_alloc(MemoryPool *pool) {
    if (!pool->freeList) return NULL;  // 池耗尽
    Block *block = pool->freeList;
    pool->freeList = block->next;
    return block->data;
}

void pool_free(MemoryPool *pool, void *ptr) {
    Block *block = (Block*)((uint8_t*)ptr - offsetof(Block, data));
    block->next = pool->freeList;
    pool->freeList = block;
}`,
                highlight: "pool",
                explanation: "内存池预分配固定大小块，避免 malloc 开销。适用于频繁分配/释放相同大小对象的场景，如网络包、数据库记录。"
            },
            {
                title: "内存管理最佳实践",
                code: `// ✅ 良好习惯
void goodPractice() {
    // 1. 立即初始化
    int *p = calloc(10, sizeof(int));

    // 2. 检查返回值
    if (!p) {
        logError("分配失败");
        return;
    }

    // 3. 记录大小
    size_t size = 10 * sizeof(int);

    // 4. 配对使用
    // malloc → free
    // calloc → free
    // realloc → free
    // aligned_alloc → free

    // 5. 释放后置 NULL
    free(p);
    p = NULL;
}

// 工具宏
#define SAFE_FREE(ptr) do { \\
    free(ptr);              \\
    (ptr) = NULL;           \\
} while(0)

// 调试宏
#ifdef DEBUG
    #define MALLOC(n) \\
        (printf("malloc %zu@%s:%d\\n", n, __FILE__, __LINE__), malloc(n))
#else
    #define MALLOC(n) malloc(n)
#endif`,
                highlight: "SAFE_FREE",
                explanation: "立即初始化，检查返回值，配对使用，释放后置 NULL。使用宏简化安全释放。调试时可添加日志追踪。"
            }
        ];

        function App() {
            const [step, setStep] = React.useState(0);
            const [voiceEndTimer, setVoiceEndTimer] = React.useState(null);
            const voiceEndTimerRef = React.useRef(null);

            React.useEffect(() => {
                speakCurrentStep();
                return () => {
                    if (voiceEndTimerRef.current) {
                        clearTimeout(voiceEndTimerRef.current);
                    }
                };
            }, []);

            const speakCurrentStep = () => {
                if (voiceEndTimerRef.current) {
                    clearTimeout(voiceEndTimerRef.current);
                }

                const currentExample = CODE_EXAMPLES[step];
                const explanations = [
                    "C 程序内存分为五个区域：代码段存放指令，DATA 段存放已初始化全局变量，BSS 段存放未初始化全局变量，堆用于动态分配，栈用于函数调用。栈向下增长，堆向上增长。",
                    "malloc 分配指定字节数，返回 void 指针。calloc 额外将内存清零。始终检查返回值是否为 NULL，因为分配可能失败。释放后应将指针置为 NULL 防止悬空指针。",
                    "realloc 调整已分配内存大小。它可能移动内存并返回新指针。必须使用临时指针接收返回值，因为失败时返回 NULL 但原指针仍然有效。",
                    "四大内存错误：内存泄漏是分配后忘记释放。悬空指针是使用已释放的指针。双重释放导致未定义行为。越界访问破坏相邻内存。",
                    "内存对齐影响访问性能。CPU 访问对齐数据更快，某些架构要求严格对齐。C11 提供 alignas 关键字和 aligned_alloc 函数用于指定对齐。",
                    "封装分配和释放逻辑，确保成对调用。先释放成员再释放容器结构体。这种 RAII 风格可以防止资源泄漏，使代码更健壮。",
                    "内存池预分配固定大小的内存块，避免频繁的 malloc 和 free 调用开销。适用于频繁分配相同大小对象的场景，如网络包处理。",
                    "良好习惯包括立即初始化、检查返回值、配对使用、释放后置 NULL。使用 SAFE_FREE 宏简化安全释放。调试时可添加日志宏追踪分配。"
                ];

                const text = `第${step + 1}步：${currentExample.title}。${explanations[step]}`;

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;

                const voices = speechSynthesis.getVoices();
                const xiaoxiaoVoice = voices.find(voice =>
                    voice.name.includes('Xiaoxiao') ||
                    voice.name.includes('zh-CN')
                );
                if (xiaoxiaoVoice) {
                    utterance.voice = xiaoxiaoVoice;
                }

                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setStep(prev => (prev + 1) % CODE_EXAMPLES.length);
                    }, 800);
                };

                utterance.onerror = (event) => {
                    console.error('语音合成错误:', event);
                    voiceEndTimerRef.current = setTimeout(() => {
                        setStep(prev => (prev + 1) % CODE_EXAMPLES.length);
                    }, 800);
                };

                speechSynthesis.speak(utterance);
            };

            React.useEffect(() => {
                speakCurrentStep();
            }, [step]);

            const renderMemoryLayout = () => {
                return (
                    <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                        <h4 className="text-lg font-bold text-emerald-800 mb-4">内存布局可视化</h4>
                        <div className="space-y-1">
                            <div className="h-12 bg-gray-800 text-white flex items-center justify-center rounded text-sm">内核空间</div>
                            <div className="h-16 bg-red-200 border-2 border-red-300 flex items-center justify-center rounded text-sm relative">

                                <span className="absolute right-2 text-xs text-red-600">↓ 向下增长</span>
                            </div>
                            <div className="h-8 bg-gray-100 flex items-center justify-center rounded text-xs text-gray-500">空闲空间</div>
                            <div className="h-16 bg-emerald-200 border-2 border-emerald-300 flex items-center justify-center rounded text-sm relative">
                                <span className="font-bold text-emerald-800">堆 Heap</span>
                                <span className="absolute right-2 text-xs text-emerald-600">↑ 向上增长</span>
                            </div>
                            <div className="h-10 bg-yellow-100 border border-yellow-300 flex items-center justify-center rounded text-xs text-yellow-800">BSS 段 (未初始化全局变量)</div>

                return (
                    <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                        <h4 className="text-lg font-bold text-emerald-800 mb-4">堆内存分配动画</h4>
                        <div className="space-y-2">
                            {allocated.map((isAlloc, i) => (
                                <div
                                    key={i}
                                    className={`h-12 rounded border-2 flex items-center justify-center transition-all duration-500 ${
                                        isAlloc
                                            ? 'bg-emerald-200 border-emerald-400 animate-pulse'
                                            : 'bg-gray-100 border-gray-300'
                                    }`}
                                >
                                    <span className={isAlloc ? 'text-emerald-800 font-bold' : 'text-gray-400'}>
                                        {isAlloc ? `块 ${i + 1} (已分配)` : `块 ${i + 1} (空闲)`}
                                    </span>
                                </div>
                            ))}
                        </div>
                        <div className="flex gap-2 mt-4">
                            <button
                                onClick={() => setAllocated(prev => prev.map((a, i) => i === 1 ? true : a))}
                                className="px-4 py-2 bg-emerald-500 text-white rounded hover:bg-emerald-600"
                            >
                                malloc
                            </button>
                            <button
                                onClick={() => setAllocated(prev => prev.map((a, i) => i === 1 ? false : a))}
                                className="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600"
                            >
                                free
                            </button>
                        </div>
                    </div>
                );
            };

            const renderErrorTypes = () => {
                const errors = [
                    { name: '内存泄漏', icon: '💧', color: 'bg-blue-100', desc: '忘记 free' },
                    { name: '悬空指针', icon: '🎯', color: 'bg-yellow-100', desc: '使用已释放' },
                    { name: '双重释放', icon: '💥', color: 'bg-red-100', desc: 'free 两次' },
                    { name: '越界访问', icon: '⚠️', color: 'bg-orange-100', desc: '超出范围' }
                ];

                return (
                    <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                        <h4 className="text-lg font-bold text-emerald-800 mb-4">内存错误类型</h4>
                        <div className="grid grid-cols-2 gap-3">
                            {errors.map((err, i) => (
                                <div key={i} className={`${err.color} p-3 rounded border border-gray-200`}>
                                    <div className="text-2xl mb-1">{err.icon}</div>
                                    <div className="font-bold text-gray-800">{err.name}</div>
                                    <div className="text-xs text-gray-600">{err.desc}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderPool = () => {
                const blocks = Array(8).fill(null);
                return (
                    <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                        <h4 className="text-lg font-bold text-emerald-800 mb-4">内存池结构</h4>
                        <div className="grid grid-cols-4 gap-2 mb-4">
                            {blocks.map((_, i) => (
                                <div
                                    key={i}
                                    className={`h-16 rounded border-2 flex items-center justify-center ${
                                        i < 3 ? 'bg-emerald-200 border-emerald-400' :
                                        i < 6 ? 'bg-blue-200 border-blue-400' :
                                        'bg-gray-100 border-gray-300'
                                    }`}
                                >
                                    <span className="text-xs font-bold text-gray-700">
                                        {i < 3 ? '已用' : i < 6 ? '已分配' : '空闲'}
                                    </span>
                                </div>
                            ))}
                        </div>
                        <div className="space-y-2 text-sm">
                            <div className="flex items-center gap-2">
                                <div className="w-4 h-4 bg-emerald-200 rounded border border-emerald-400"></div>
                                <span>已用 (活跃对象)</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-4 h-4 bg-blue-200 rounded border border-blue-400"></div>
                                <span>已分配 (使用中)</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-4 h-4 bg-gray-100 rounded border border-gray-300"></div>
                                <span>空闲 (可用)</span>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-emerald-50 via-green-50 to-blue-50 p-4">
                    <div className="max-w-7xl mx-auto">
                        <header className="text-center mb-6">
                            <h1 className="text-4xl font-bold bg-gradient-to-r from-emerald-600 to-green-600 bg-clip-text text-transparent mb-2">
                                1178 - 内存管理完整指南
                            </h1>
                            <p className="text-lg text-gray-700">C 语言核心 - malloc/free/堆/栈/内存错误检测</p>
                            <div className="flex justify-center gap-2 mt-4">
                                <span className="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-sm">内存布局</span>
                                <span className="px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm">动态分配</span>
                                <span className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">错误检测</span>
                                <span className="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm">内存池</span>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-emerald-500">
                                    <h3 className="text-xl font-bold text-emerald-700 mb-3">代码示例</h3>
                                    <div className="bg-gray-50 rounded p-3 font-mono text-sm overflow-x-auto">
                                        <pre className="text-gray-800 whitespace-pre-wrap">
                                            {CODE_EXAMPLES[step].code}
                                        </pre>
                                    </div>
                                    <div className="mt-3 p-3 bg-yellow-50 rounded border border-yellow-200">
                                        <p className="text-sm text-yellow-800">
                                            <span className="font-bold">亮点:</span> {CODE_EXAMPLES[step].highlight}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-green-500">
                                    <h3 className="text-xl font-bold text-green-700 mb-3">可视化演示</h3>
                                    {step === 0 && renderMemoryLayout()}
                                    {step === 1 && renderAllocFree()}
                                    {step === 2 && (
                                        <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-emerald-800 mb-4">realloc 过程</h4>
                                            <div className="space-y-3">
                                                <div className="p-3 bg-emerald-100 rounded">
                                                    <div className="text-sm font-bold">原块 (10 int)</div>
                                                    <div className="h-8 bg-emerald-200 rounded mt-1"></div>
                                                </div>
                                                <div className="text-center text-gray-500">↓ realloc(20 int)</div>
                                                <div className="p-3 bg-blue-100 rounded">
                                                    <div className="text-sm font-bold">新块 (20 int，可能移动)</div>
                                                    <div className="h-16 bg-blue-200 rounded mt-1"></div>
                                                </div>
                                                <div className="p-2 bg-yellow-50 rounded text-xs text-yellow-800">
                                                    ⚠️ 失败时返回 NULL，原指针仍有效
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 3 && renderErrorTypes()}
                                    {step === 4 && (
                                        <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-emerald-800 mb-4">对齐效应</h4>
                                            <div className="space-y-3">
                                                <div className="grid grid-cols-8 gap-1">
                                                    {[...Array(8)].map((_, i) => (
                                                        <div key={i} className={`h-8 flex items-center justify-center text-xs rounded ${
                                                            i % 4 === 0 ? 'bg-emerald-200' : 'bg-gray-100'
                                                        }`}>
                                                            {i}
                                                        </div>
                                                    ))}
                                                </div>
                                                <p className="text-sm text-gray-700">
                                                    <span className="text-emerald-600 font-bold">4 字节对齐:</span> 地址能被 4 整除时访问最快
                                                </p>
                                                <p className="text-sm text-gray-700">
                                                    <span className="text-blue-600 font-bold">16 字节对齐:</span> SIMD 指令必需
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                    {step === 5 && (
                                        <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-emerald-800 mb-4">RAII 模式</h4>
                                            <div className="space-y-2">
                                                <div className="p-3 bg-emerald-100 rounded">
                                                    <div className="text-sm font-bold">create() → 分配资源</div>
                                                </div>
                                                <div className="text-center text-gray-400">↓</div>
                                                <div className="p-3 bg-blue-100 rounded">
                                                    <div className="text-sm font-bold">使用资源</div>
                                                </div>
                                                <div className="text-center text-gray-400">↓</div>
                                                <div className="p-3 bg-red-100 rounded">
                                                    <div className="text-sm font-bold">destroy() → 一次性清理</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 6 && renderPool()}
                                    {step === 7 && (
                                        <div className="p-4 bg-gradient-to-r from-emerald-50 to-green-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-emerald-800 mb-4">最佳实践清单</h4>
                                            <div className="space-y-2">
                                                {['立即初始化', '检查返回值', '配对使用', '释放后置 NULL', '使用工具检测'].map((item, i) => (
                                                    <div key={i} className="flex items-center gap-2">
                                                        <span className="text-green-500">✓</span>
                                                        <span className="text-gray-700">{item}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-blue-500">
                                    <h3 className="text-xl font-bold text-blue-700 mb-3">关键要点</h3>
                                    <div className="space-y-3">
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 0 ? 'bg-emerald-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-emerald-600">布局:</span> 栈↓ 空闲 堆↑
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 1 ? 'bg-green-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-green-600">malloc:</span> 检查 NULL
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 2 ? 'bg-blue-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-blue-600">realloc:</span> 用临时指针
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 3 ? 'bg-purple-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-purple-600">错误:</span> 泄漏/悬空/双释/越界
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 4 ? 'bg-pink-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-pink-600">对齐:</span> 影响性能
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 5 ? 'bg-indigo-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-indigo-600">RAII:</span> 成对调用
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 6 ? 'bg-orange-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-orange-600">内存池:</span> 固定大小块
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 7 ? 'bg-teal-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-teal-600">实践:</span> 5 项清单
                                            </p>
                                        </div>
                                    </div>
                                    <div className="mt-4 p-3 bg-blue-50 rounded border border-blue-200">
                                        <p className="text-sm text-blue-800">
                                            {CODE_EXAMPLES[step].explanation}
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-r from-emerald-500 to-green-600 rounded-lg shadow-lg p-4 text-white">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm">进度</span>
                                        <span className="text-sm font-bold">{step + 1} / {CODE_EXAMPLES.length}</span>
                                    </div>
                                    <div className="w-full bg-white bg-opacity-30 rounded-full h-2">
                                        <div
                                            className="bg-white rounded-full h-2 transition-all duration-500"
                                            style={{ width: `${((step + 1) / CODE_EXAMPLES.length) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="text-center mt-8 text-gray-600">
                            <p className="text-sm">C 语言核心 · 内存管理完整指南 · 嵌入式开发必备技能</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
