void Enter_Sleep_Mode(void) {

    // 1. 配置唤醒源 (EXTI 线)

    PWR->CR &= ~PWR_CR_PDDS;

    FLASH->ACR |= FLASH_ACR_PRFTEN;

    // 4. 设置 SLEEPDEEP=1 (Stop 模式)
    SCB->SCR |= SCB_SCR_SLEEPDEEP_Msk;

    __WFI();

// 进入低功耗前关闭不需要的时钟
void DisableUnusedClocks(void) {
    // AHB1 外设
    RCC->AHB1ENR = RCC_AHB1ENR_GPIOAEN;  // 仅保留必要 GPIO

    // AHB2 外设
    RCC->AHB2ENR = 0;  // 关闭 USB、RNG 等

    // AHB3 外设
    RCC->AHB3ENR = 0;  // 关闭 FSMC/FMC

    // APB1 外设
    RCC->APB1ENR = RCC_APB1ENR_TIM2EN;  // 仅保留必要定时器

    // APB2 外设
    RCC->APB2ENR = 0;  // 关闭 ADC、SPI1 等
}

// 动态时钟控制
void Peripheral_Clock_Control(uint32_t *enr_reg, uint32_t clock_bit, int enable) {
    if(enable)
        *enr_reg |= clock_bit;
    else
        *enr_reg &= ~clock_bit;
}

// 防止浮空引脚漏电流

void GPIO_LowPower_Config(void) {
    // 1. 未使用引脚：模拟输入 (最高阻抗)
    GPIOA->MODER |= GPIO_MODER_MODER0;  // 模拟模式

#include <stdint.h>

// 全局变量 (保持在 Stop 模式)
volatile uint32_t sensor_data;
volatile uint8_t measurement_count;

void main(void) {
    // 1. 系统初始化
    SystemClock_Config();
    RTC_WakeupInit(1000);  // 1 秒唤醒
    GPIO_LowPower_Config();

    // 2. 检查唤醒源
    if(PWR->CSR & PWR_CSR_WUF) {
        // RTC 唤醒，执行测量
        PWR->CR |= PWR_CR_CWUF;  // 清除唤醒标志

        // 3. 恢复外设
        SystemClock_Config();
        ADC_Config();

        // 4. 执行测量
        sensor_data = ADC_Read();
        measurement_count++;

        // 5. 保存数据

        // 6. 关闭外设

                                </div>
                                <div className="w-full bg-gray-700 rounded h-4">
                                    <div className="bg-yellow-500 h-4 rounded" style={{width: '10%'}}></div>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1">
                                    <span>Stop</span>
                                    <span className="text-green-400">100μA</span>
                                </div>
                                <div className="w-full bg-gray-700 rounded h-4">
                                    <div className="bg-green-500 h-4 rounded" style={{width: '0.1%'}}></div>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1">
                                    <span>Standby</span>
                                    <span className="text-blue-400">1μA</span>
                                </div>
                                <div className="w-full bg-gray-700 rounded h-4">
                                    <div className="bg-blue-500 h-4 rounded" style={{width: '0.001%'}}></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // GPIO 配置可视化
            const GPIOVisual = () => {
                const configs = [
                    { mode: '浮空输入', current: '~100μA', bad: true },
                    { mode: '模拟输入', current: '~1μA', good: true },
                    { mode: '上拉输入', current: '~10μA', warn: true },
                    { mode: '推挽输出', current: '~5μA', good: true }
                ];

                return (
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h3 className="text-sm font-bold text-blue-400 mb-3">GPIO 功耗对比</h3>
                        <div className="space-y-2">
                            {configs.map((c, i) => (
                                <div key={i} className={`p-2 rounded text-xs flex justify-between ${
                                    c.bad ? 'bg-red-900/30' : c.warn ? 'bg-yellow-900/30' : 'bg-green-900/30'
                                }`}>
                                    <span>{c.mode}</span>
                                    <span className={c.bad ? 'text-red-400' : c.warn ? 'text-yellow-400' : 'text-green-400'}>
                                        {c.current} {c.good ? '✓' : c.bad ? '✗' : '⚠'}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // 电池寿命计算
            const BatteryLife = () => {
                return (
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h3 className="text-sm font-bold text-purple-400 mb-3">电池寿命估算</h3>
                        <div className="text-xs space-y-2">
                            <div className="flex justify-between">
                                <span>电池容量:</span>
                                <span>2000mAh</span>
                            </div>
                            <div className="flex justify-between">
                                <span>工作时间:</span>
                                <span>10ms @ 10mA</span>
                            </div>
                            <div className="flex justify-between">
                                <span>休眠时间:</span>
                                <span>990ms @ 100μA</span>
                            </div>
                            <div className="border-t border-gray-600 pt-2">
                                <div className="flex justify-between">
                                    <span>平均电流:</span>
                                    <span className="text-green-400">199μA</span>
                                </div>
                            </div>
                            <div className="border-t border-gray-600 pt-2">
                                <div className="flex justify-between">
                                    <span>电池寿命:</span>
                                    <span className="text-purple-400 font-bold">~1.1 年</span>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4">
                    {/* 头部 */}
                    <div className="max-w-7xl mx-auto mb-4">
                        <div className="flex justify-between items-center mb-2">
                            <h1 className="text-xl font-bold text-green-400">
                                1210 - 低功耗模式完整指南
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => setIsPlaying(!isPlaying)} className="px-3 py-1 bg-blue-600 rounded hover:bg-blue-700 text-sm">
                                    {isPlaying ? '暂停' : '播放'}
                                </button>
                                <button onClick={() => setShowCode(!showCode)} className="px-3 py-1 bg-purple-600 rounded hover:bg-purple-700 text-sm">
                                    {showCode ? '隐藏代码' : '显示代码'}
                                </button>
                            </div>
                        </div>

                        {/* 进度条 */}
                        <div className="flex gap-1 mb-4">
                            {STEPS.map((_, i) => (
                                <button
                                    key={i}
                                    onClick={() => setCurrentStep(i)}
                                    className={`flex-1 h-2 rounded transition-all ${
                                        i === currentStep ? 'bg-green-500 scale-110' :
                                        i < currentStep ? 'bg-green-700' : 'bg-gray-600'
                                    }`}
                                />
                            ))}
                        </div>
                    </div>

                    {/* 主内容区 - 三列布局 */}
                    <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
                        {/* 左列：代码 */}
                        {showCode && (
                            <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                                <h2 className="text-sm font-bold text-green-400 mb-2">
                                    {STEPS[currentStep].title}
                                </h2>
                                <pre className="text-xs text-gray-300 overflow-x-auto whitespace-pre-wrap bg-gray-900 p-3 rounded">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                        )}

                        {/* 中列：可视化动画 */}
                        <div className={`${showCode ? 'col-span-1' : 'col-span-2'} space-y-4`}>
                            <PowerModeVisual />
                            <div className="grid grid-cols-2 gap-4">
                                {currentStep >= 5 ? <GPIOVisual /> : <PowerChart />}
                                {currentStep >= 6 ? <BatteryLife /> : <div className="bg-gray-800 rounded-lg p-4"><h3 className="text-sm font-bold text-gray-400 mb-2">等待下一步...</h3></div>}
                            </div>
                        </div>

                        {/* 右列：说明 */}
                        <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                            <h3 className="text-sm font-bold text-blue-400 mb-2">说明</h3>
                            <p className="text-xs text-gray-300 leading-relaxed mb-3">
                                {STEPS[currentStep].description}
                            </p>
                            <div className="bg-yellow-900/30 border border-yellow-600/50 rounded p-2">
                                <p className="text-xs text-yellow-300">
                                    <span className="font-bold">💡 重点:</span> {STEPS[currentStep].highlight}
                                </p>
                            </div>

                            {/* 导航按钮 */}
                            <div className="flex gap-2 mt-4">
                                <button
                                    onClick={() => setCurrentStep(Math.max(0, currentStep - 1))}
                                    disabled={currentStep === 0}
                                    className="flex-1 py-2 bg-gray-700 rounded hover:bg-gray-600 disabled:opacity-50 text-xs"
                                >
                                    ← 上一步
                                </button>
                                <button
                                    onClick={() => setCurrentStep(Math.min(STEPS.length - 1, currentStep + 1))}
                                    disabled={currentStep === STEPS.length - 1}
                                    className="flex-1 py-2 bg-green-600 rounded hover:bg-green-500 disabled:opacity-50 text-xs"
                                >
                                    下一步 →
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 底部摘要 */}
                    <div className="max-w-7xl mx-auto mt-4 bg-gray-800 rounded-lg p-4">
                        <h3 className="text-sm font-bold text-green-400 mb-2">低功耗设计核心要点</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-green-400 font-bold">模式选择</span>
                                <p className="text-gray-400 mt-1">Sleep/Stop/Standby</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-yellow-400 font-bold">时钟管理</span>
                                <p className="text-gray-400 mt-1">关闭未用外设</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-blue-400 font-bold">GPIO 配置</span>
                                <p className="text-gray-400 mt-1">防止浮空漏电</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-purple-400 font-bold">占空优化</span>
                                <p className="text-gray-400 mt-1">最大化休眠时间</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
