// 以 TIM2 为例，APB1 时钟 72MHz

void PWM_Init(void) {
    // 1. 使能时钟
    RCC->APB1ENR |= RCC_APB1ENR_TIM2EN;
    RCC->APB2ENR |= RCC_APB2ENR_IOPAEN;

    // 2. 配置 GPIO 为复用推挽输出
    GPIOA->CRL &= ~0xF0;
    GPIOA->CRL |= 0xB0;  // AF_PP, 50MHz

    // 3. 定时器时基配置
    TIM2->PSC = 72 - 1;      // 预分频 72,1MHz 计数
    TIM2->ARR = 1000 - 1;    // 1kHz PWM 频率
    TIM2->CCR1 = 500;        // 50% 占空比

    // 4. PWM 模式配置
    TIM2->CCMR1 |= TIM_CCMR1_OC1M_2 | TIM_CCMR1_OC1M_1; // PWM 模式 1
    TIM2->CCMR1 |= TIM_CCMR1_PRELOAD;  // 预装载使能

    // 5. 使能输出
    TIM2->CCER |= TIM_CCER_CC1E;

    // 6. 启动定时器
    TIM2->CR1 |= TIM_CR1_CEN;
}

// 频率计算：Freq = 72MHz / (72 × 1000) = 1kHz`,

// 频率要求：> 200Hz 避免可见闪烁

void LED_SetBrightness(uint8_t duty) {
    // duty: 0(最暗) - 100(最亮)
    TIM2->CCR1 = duty * TIM2->ARR / 100;
}

// 呼吸灯效果
void LED_Breath(void) {
    static int8_t dir = 1;
    static uint8_t brightness = 0;

    if (dir) brightness++;
    else brightness--;

    if (brightness >= 100) dir = 0;
    if (brightness == 0) dir = 1;

    LED_SetBrightness(brightness);
    Delay_ms(10);
}

// Gamma 校正 (使调光更线性)
uint8_t Gamma_Correct(uint8_t input) {
    // PWM 值 = (input/255)^2.2 × 100%
    return (uint8_t)(pow(input/255.0, 2.2) * 100);

// 频率：10kHz - 20kHz(避开可闻噪声)

// 电机速度控制
void Motor_SetSpeed(int8_t speed) {
    // speed: -100(反转) ~ +100(正转)
    uint8_t duty = abs(speed);

    if (speed > 0) {
        // 正转：IN1=1, IN2=0
        GPIO_Set(IN1);
        GPIO_Reset(IN2);
        TIM2->CCR1 = duty * TIM2->ARR / 100;
    } else if (speed < 0) {
        // 反转：IN1=0, IN2=1
        GPIO_Reset(IN1);
        GPIO_Set(IN2);
        TIM2->CCR1 = duty * TIM2->ARR / 100;
    } else {
        // 停止：刹车或滑行
        TIM2->CCR1 = 0;
    }
}

// 软启动 (避免电流冲击)
void Motor_SoftStart(uint8_t target) {
    for (uint8_t i = 0; i <= target; i++) {
        Motor_SetSpeed(i);
        Delay_ms(10);
    }
}`,

// 频率 = 72MHz / 14400 = 5kHz

void Servo_SetAngle(uint8_t angle) {
    // angle: 0 - 180 度
    // 脉冲宽度 = 500 + (angle/180) × 2000 (μs)
    uint16_t pulse_width = 500 + (angle * 2000 / 180);

    // 假设 1 计数 = 1μs (预分频 72)
    // 占空比 = pulse_width / 20000
    TIMx->CCR1 = pulse_width;

    static uint8_t current = 90;
    int8_t step = (target > current) ? 1 : -1;

// STM32 高级定时器配置 (TIM1/TIM8)

                            </div>
                        </div>

                        {/* 右侧：解释区 */}
                        <div class="w-1/3 flex flex-col bg-gray-800">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-yellow-400">📖 原理解析</h2>
                            </div>
                            <div class="flex-1 overflow-auto p-4">
                                <p class="text-base text-gray-300 leading-relaxed">
                                    {STEPS[currentStep].explanation}
                                </p>
                                <div class="mt-6 p-4 bg-gray-900 rounded-lg border border-gray-700">
                                    <h3 class="text-sm font-bold text-orange-400 mb-2">📌 关键要点</h3>
                                    <ul class="text-sm text-gray-400 space-y-1 list-disc list-inside">
                                        {currentStep === 0 && <li>PWM 通过快速开关电源模拟模拟电压</li>}
                                        {currentStep === 0 && <li>占空比决定平均输出电压</li>}
                                        {currentStep === 0 && <li>频率影响开关损耗和噪声</li>}
                                        {currentStep === 1 && <li>PSC 分频，ARR 决定周期</li>}
                                        {currentStep === 1 && <li>CCR 决定占空比</li>}
                                        {currentStep === 1 && <li>PWM 模式 1：CNT<CCR 有效</li>}
                                        {currentStep === 2 && <li>视觉暂留效应产生亮度感知</li>}
                                        {currentStep === 2 && <li>>200Hz 避免可见闪烁</li>}
                                        {currentStep === 2 && <li>Gamma 校正使调光线性</li>}
                                        {currentStep === 3 && <li>占空比决定电机平均电压</li>}
                                        {currentStep === 3 && <li>H 桥控制旋转方向</li>}
                                        {currentStep === 3 && <li>10-20kHz 避开可闻噪声</li>}
                                        {currentStep === 4 && <li>50Hz(20ms 周期) 舵机信号</li>}
                                        {currentStep === 4 && <li>0.5ms=0°, 1.5ms=90°, 2.5ms=180°</li>}
                                        {currentStep === 5 && <li>互补输出驱动 H 桥</li>}
                                        {currentStep === 5 && <li>死区防止上下管直通</li>}
                                        {currentStep === 5 && <li>刹车功能提供故障保护</li>}
                                        {currentStep === 6 && <li>双通道捕获周期和脉宽</li>}
                                        {currentStep === 6 && <li>触发复位提高测量精度</li>}
                                        {currentStep === 7 && <li>频率 = CK_INT/((PSC+1)(ARR+1))</li>}
                                        {currentStep === 7 && <li>占空比 = CCR/(ARR+1)</li>}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 底部控制栏 */}
                    <div class="border-t border-gray-700 bg-gray-800 p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <span class="text-sm text-gray-400">步骤 {currentStep + 1} / {STEPS.length}</span>
                                <div class="flex space-x-2">
                                    {STEPS.map((_, i) => (
                                        <button key={i} onClick={() => setCurrentStep(i)}
                                            className={`w-3 h-3 rounded-full transition-all ${i === currentStep ? 'bg-orange-400 scale-125' : 'bg-gray-600'}`}
                                        />
                                    ))}
                                </div>
                            </div>
                            <div class="flex space-x-3">
                                <button onClick={() => setCurrentStep((prev - 1 + STEPS.length) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    ⏮ 上一步
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)}
                                    className="px-4 py-2 bg-orange-600 hover:bg-orange-500 rounded-lg text-sm transition-colors">
                                    {isPlaying ? '⏸ 暂停' : '▶ 播放'}
                                </button>
                                <button onClick={() => setCurrentStep((prev + 1) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    下一步 ⏭
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
