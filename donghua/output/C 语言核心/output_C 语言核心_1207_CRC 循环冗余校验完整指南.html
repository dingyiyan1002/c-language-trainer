// 循环冗余校验是一种错误检测码

// CRC 工作原理:
// 1. 将数据视为多项式系数 (二进制)
// 2. 用生成多项式进行模 2 除法
// 3. 余数即为 CRC 校验值

// CRC_IDR   - 独立数据寄存器 (8 位)
// CRC_CR    - 控制寄存器
// CRC_INIT  - 初始值寄存器

// 复位 CRC 外设 (加载初始值 0xFFFFFFFF)
CRC->CR |= CRC_CR_RESET;

CRC->CR &= ~CRC_CR_REV_IN;

CRC->CR |= CRC_CR_REV_OUT;   // 输出按位反转

                description: "CRC 外设包含数据寄存器 DR(用于写入数据和读取结果)、控制寄存器 CR(配置反转和复位)、初始值寄存器 INIT。STM32F7/F4/H7 系列还支持可编程多项式。输入/输出反转用于兼容不同协议的位序要求。复位 CRC 外设会自动加载 INIT 寄存器的初始值。",

// 多项式：0x04C11DB7
// 初始值：0xFFFFFFFF
// 输入反转：按字节
// 输出反转：是
// 最终异或：0xFFFFFFFF

#include <stdint.h>

uint32_t CRC32_Calculate(uint8_t *data, uint32_t length) {
    // 1. 复位 CRC 单元
    CRC->CR |= CRC_CR_RESET;

    // 2. 写入数据 (按 32 位写入最快)
    uint32_t wordLen = length / 4;
    for(uint32_t i = 0; i < wordLen; i++) {
        CRC->DR = *(uint32_t*)(data + i*4);
    }

    // 3. 处理剩余字节
    uint32_t remainder = length % 4;
    for(uint32_t i = 0; i < remainder; i++) {
        *(__IO uint8_t*)&CRC->DR = data[wordLen*4 + i];
    }

    // 4. 读取结果 (已自动完成最终异或)
    return CRC->DR;
}

// 使用示例
uint8_t buffer[] = "Hello, World!";
uint32_t crc = CRC32_Calculate(buffer, sizeof(buffer));

// 多项式：0x8005 (简化 0xA001)
// 初始值：0xFFFF
// 输入反转：按字节
// 输出反转：是
// 最终异或：0x0000

// STM32 CRC 配置 (需要软件后处理)
uint16_t CRC16_Modbus(uint8_t *data, uint32_t length) {
    // STM32 硬件 CRC-32，需要软件适配 CRC-16
    // 或使用软件查表法

    uint16_t crc = 0xFFFF;
    for(uint32_t i = 0; i < length; i++) {
        crc ^= data[i];
        for(uint8_t j = 0; j < 8; j++) {
            if(crc & 0x0001)
                crc = (crc >> 1) ^ 0xA001;
            else
                crc >>= 1;
        }
    }
    return crc;
}

// STM32G4/H7 支持可编程多项式
void CRC16_Init(void) {
    CRC->INIT = 0xFFFF;       // 初始值
    CRC->POL = 0xA001;        // 多项式
    CRC->CR |= CRC_CR_POLYSIZE_0;  // 16 位多项式
    CRC->CR |= CRC_CR_REV_IN_0;    // 输入反转
    CRC->CR |= CRC_CR_REV_OUT;     // 输出反转
}`,

typedef struct {
    uint32_t firmwareSize;

    uint8_t version[16];
    uint8_t reserved[12];
} Firmware_Header;

#define APP_ADDRESS 0x08004000
#define HEADER_PTR  ((Firmware_Header*)APP_ADDRESS)

// 校验固件
int Verify_Firmware(void) {
    uint32_t size = HEADER_PTR->firmwareSize;
    uint32_t expected_crc = HEADER_PTR->crc32;

    // 计算固件 CRC (跳过 CRC 字段本身)

    // 写入固件数据
    uint32_t *fw_ptr = (uint32_t*)(APP_ADDRESS + sizeof(Firmware_Header));

    for(uint32_t i = 0; i < data_len / 4; i++) {
        CRC->DR = fw_ptr[i];

    uint32_t calculated_crc = CRC->DR;

    return (calculated_crc == expected_crc) ? 1 : 0;
}

typedef struct {
    uint8_t  addr;
    uint8_t  func;
    uint8_t  data[256];
    uint16_t crc16;
} Modbus_Frame;

// 发送帧
void Modbus_Send(Modbus_Frame *frame, uint8_t dataLen) {
    // 计算 CRC
    frame->crc16 = CRC16_Modbus((uint8_t*)frame, dataLen);

    // 发送整个帧 (包含 CRC)
    UART_Transmit((uint8_t*)frame, dataLen + 2);
}

// 接收帧
int Modbus_Receive(Modbus_Frame *frame) {
    // 接收完整帧
    int len = UART_Receive((uint8_t*)frame, sizeof(Modbus_Frame));

    // 提取并验证 CRC
    uint16_t received_crc = frame->crc16;
    uint16_t calculated_crc = CRC16_Modbus((uint8_t*)frame, len - 2);

    if(received_crc != calculated_crc) {
        return -1;  // CRC 错误，丢弃帧
    }
    return len;
}`,

// 防止数据损坏或掉电丢失

typedef struct {
    uint32_t magic;      // 魔数 0x12345678
    uint32_t length;
    uint8_t  data[128];
    uint32_t crc32;
} Stored_Data;

// 保存数据到 Flash
void Store_Data(uint8_t *data, uint32_t len) {
    Stored_Data stored;
    stored.magic = 0x12345678;
    stored.length = len;
    memcpy(stored.data, data, len);
    stored.crc32 = CRC32_Calculate(data, len);

    // 写入 Flash
    FLASH_Unlock();
    FLASH_EraseSector(FLASH_Sector_11, VoltageRange_3);
    FLASH_ProgramWord(FLASH_ADDR, (uint32_t)&stored);
    FLASH_Lock();
}

// 从 Flash 读取并验证
int Read_Data(uint8_t *buffer, uint32_t maxLen) {
    Stored_Data *stored = (Stored_Data*)FLASH_ADDR;

    // 验证魔数
    if(stored->magic != 0x12345678) return -1;

    // 验证 CRC
    uint32_t crc = CRC32_Calculate(stored->data, stored->length);
    if(crc != stored->crc32) return -2;

    // 读取数据
    memcpy(buffer, stored->data, stored->length);
    return stored->length;
}`,

// 1. 硬件 CRC (STM32)
// 速度：~4 个时钟周期/32 位数据
// 占用：无 CPU 资源，DMA 可直接写入
uint32_t HW_CRC(uint8_t *data, uint32_t len) {
    CRC->CR |= CRC_CR_RESET;
    for(uint32_t i = 0; i < len; i++)
        *(__IO uint8_t*)&CRC->DR = data[i];

                                </div>
                                <div className="w-full bg-gray-700 rounded h-4">
                                    <div className="bg-yellow-500 h-4 rounded" style={{width: '25%'}}></div>
                                </div>
                            </div>
                            <div>
                                <div className="flex justify-between text-xs mb-1">
                                    <span>直接计算</span>
                                    <span className="text-red-400">~500μs</span>
                                </div>
                                <div className="w-full bg-gray-700 rounded h-4">
                                    <div className="bg-red-500 h-4 rounded" style={{width: '100%'}}></div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // 固件校验流程
            const FirmwareVerify = () => {
                const steps = [
                    { name: '读取头部', status: currentStep >= 4 },
                    { name: '复位 CRC', status: currentStep >= 4 },
                    { name: '计算 CRC', status: currentStep >= 4 },
                    { name: '比较验证', status: currentStep >= 4 },
                    { name: '跳转执行', status: currentStep >= 4 && false }
                ];

                return (
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h3 className="text-sm font-bold text-orange-400 mb-3">固件校验流程</h3>
                        <div className="space-y-2">
                            {steps.map((step, i) => (
                                <div key={i} className="flex items-center gap-2">
                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs ${
                                        step.status ? 'bg-green-500' : 'bg-gray-600'
                                    }`}>
                                        {i + 1}
                                    </div>
                                    <span className="text-xs">{step.name}</span>
                                    {step.status && <span className="text-green-400 text-xs">✓</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4">
                    {/* 头部 */}
                    <div className="max-w-7xl mx-auto mb-4">
                        <div className="flex justify-between items-center mb-2">
                            <h1 className="text-xl font-bold text-indigo-400">
                                1207 - CRC 循环冗余校验完整指南
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => setIsPlaying(!isPlaying)} className="px-3 py-1 bg-blue-600 rounded hover:bg-blue-700 text-sm">
                                    {isPlaying ? '暂停' : '播放'}
                                </button>
                                <button onClick={() => setShowCode(!showCode)} className="px-3 py-1 bg-purple-600 rounded hover:bg-purple-700 text-sm">
                                    {showCode ? '隐藏代码' : '显示代码'}
                                </button>
                            </div>
                        </div>

                        {/* 进度条 */}
                        <div className="flex gap-1 mb-4">
                            {STEPS.map((_, i) => (
                                <button
                                    key={i}
                                    onClick={() => setCurrentStep(i)}
                                    className={`flex-1 h-2 rounded transition-all ${
                                        i === currentStep ? 'bg-indigo-500 scale-110' :
                                        i < currentStep ? 'bg-indigo-700' : 'bg-gray-600'
                                    }`}
                                />
                            ))}
                        </div>
                    </div>

                    {/* 主内容区 - 三列布局 */}
                    <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
                        {/* 左列：代码 */}
                        {showCode && (
                            <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                                <h2 className="text-sm font-bold text-indigo-400 mb-2">
                                    {STEPS[currentStep].title}
                                </h2>
                                <pre className="text-xs text-gray-300 overflow-x-auto whitespace-pre-wrap bg-gray-900 p-3 rounded">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                        )}

                        {/* 中列：可视化动画 */}
                        <div className={`${showCode ? 'col-span-1' : 'col-span-2'} space-y-4`}>
                            <CRCVisualization />
                            <div className="grid grid-cols-2 gap-4">
                                <CRCComparison />
                                {currentStep >= 7 ? <PerformanceChart /> : <FirmwareVerify />}
                            </div>
                        </div>

                        {/* 右列：说明 */}
                        <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                            <h3 className="text-sm font-bold text-blue-400 mb-2">说明</h3>
                            <p className="text-xs text-gray-300 leading-relaxed mb-3">
                                {STEPS[currentStep].description}
                            </p>
                            <div className="bg-yellow-900/30 border border-yellow-600/50 rounded p-2">
                                <p className="text-xs text-yellow-300">
                                    <span className="font-bold">💡 重点:</span> {STEPS[currentStep].highlight}
                                </p>
                            </div>

                            {/* 导航按钮 */}
                            <div className="flex gap-2 mt-4">
                                <button
                                    onClick={() => setCurrentStep(Math.max(0, currentStep - 1))}
                                    disabled={currentStep === 0}
                                    className="flex-1 py-2 bg-gray-700 rounded hover:bg-gray-600 disabled:opacity-50 text-xs"
                                >
                                    ← 上一步
                                </button>
                                <button
                                    onClick={() => setCurrentStep(Math.min(STEPS.length - 1, currentStep + 1))}
                                    disabled={currentStep === STEPS.length - 1}
                                    className="flex-1 py-2 bg-indigo-600 rounded hover:bg-indigo-500 disabled:opacity-50 text-xs"
                                >
                                    下一步 →
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 底部摘要 */}
                    <div className="max-w-7xl mx-auto mt-4 bg-gray-800 rounded-lg p-4">
                        <h3 className="text-sm font-bold text-indigo-400 mb-2">CRC 校验核心要点</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-indigo-400 font-bold">硬件加速</span>
                                <p className="text-gray-400 mt-1">4 周期完成计算</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-purple-400 font-bold">协议匹配</span>
                                <p className="text-gray-400 mt-1">配置反转和初始值</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-green-400 font-bold">固件校验</span>
                                <p className="text-gray-400 mt-1">Bootloader 必备</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-orange-400 font-bold">数据保护</span>
                                <p className="text-gray-400 mt-1">Flash 存储必加</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
