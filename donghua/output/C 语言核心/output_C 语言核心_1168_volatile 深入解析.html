<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1168 - volatile 关键字深入解析</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flow { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        @keyframes highlight { 0%, 100% { background-color: rgba(239, 68, 68, 0.2); } 50% { background-color: rgba(239, 68, 68, 0.5); } }
        @keyframes readFlash { 0%, 100% { background-color: rgba(16, 185, 129, 0.3); } 50% { background-color: rgba(16, 185, 129, 0.6); } }
        @keyframes optimizeBlock { 0% { transform: scale(1); } 50% { transform: scale(0.95); opacity: 0.7; } 100% { transform: scale(1); } }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-blink { animation: blink 1s steps(2) infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.5s ease-out; }
        .animate-flow { animation: flow 2s linear infinite; }
        .animate-highlight { animation: highlight 1.5s ease-in-out infinite; }
        .animate-readFlash { animation: readFlash 1s ease-in-out infinite; }
        .animate-optimizeBlock { animation: optimizeBlock 1s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLOR_MAP = {
            primary: '#ef4444',
            secondary: '#dc2626',
            accent: '#f87171',
            highlight: '#fca5a5',
            bg: '#7f1d1d',
            text: '#fee2e2'
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const steps = [
                { title: 'volatile 关键字概述', voice: 'volatile 关键字概述。volatile 告诉编译器，变量的值可能在任何时候被程序之外的因素改变，因此编译器不能对这个变量进行优化。每次使用 volatile 变量时，都必须从内存中重新读取，而不是使用寄存器中的缓存值。' },
                { title: '编译器优化问题', voice: '编译器优化问题。没有 volatile 时，编译器可能将变量值缓存到寄存器中。如果变量被中断服务程序或硬件修改，程序读到的将是过时的缓存值，导致严重错误。volatile 强制每次访问都从内存读取，确保数据新鲜。' },
                { title: '中断服务程序场景', voice: '中断服务程序场景。全局标志变量在中断服务程序中被修改，在主循环中被检查。必须使用 volatile 修饰，否则编译器可能优化掉重复读取，导致主循环永远看不到标志变化。这是嵌入式系统最常见的 volatile 应用场景。' },
                { title: '内存映射硬件寄存器', voice: '内存映射硬件寄存器。硬件寄存器映射到内存地址，其值由硬件状态决定。读取寄存器可能触发硬件操作，每次读取值可能不同。必须使用 volatile 指针访问，确保每次访问都真正读写硬件，而不是优化的缓存值。' },
                { title: '多线程共享变量', voice: '多线程共享变量。在多任务系统中，全局变量可能被多个任务访问修改。volatile 确保每次访问都从内存读取最新值。注意，volatile 不能替代互斥锁，它只保证可见性，不保证原子性。' },
                { title: 'volatile 正确用法', voice: 'volatile 正确用法。一，中断服务程序修改的全局标志。二，内存映射硬件寄存器指针。三，多任务共享的状态变量。四，延时循环计数器。五，看门狗定时器寄存器。这些场景变量值都可能被程序外因素改变。' },
                { title: 'volatile 常见误区', voice: 'volatile 常见误区。误区一，认为 volatile 保证原子操作。误区二，过度使用 volatile 降低性能。误区三，volatile 不能防止指令重排序。误区四，volatile 不替代同步原语。volatile 只保证可见性，不保证顺序和原子性。' },
                { title: 'volatile 与 const 组合', voice: 'volatile 与 const 组合使用。volatile const 表示只读但可能变化的值，典型应用是只读硬件状态寄存器。程序不能写入，但每次读取值可能不同。这种组合在嵌入式驱动开发中很常见。' }
            ];

            useEffect(() => {
                if (!isPlaying) return;
                const speak = () => {
                    if (isMuted || !steps[currentStep]) return;
                    const utterance = new SpeechSynthesisUtterance(steps[currentStep].voice);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;
                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev < steps.length - 1 ? prev + 1 : prev));
                        }, 800);
                    };
                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev < steps.length - 1 ? prev + 1 : prev));
                        }, 800);
                    };
                    window.speechSynthesis.speak(utterance);
                };
                speak();
                return () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    window.speechSynthesis.cancel();
                };
            }, [currentStep, isPlaying, isMuted]);

            const OptimizationDemo = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>编译器优化对比</h4>
                        <div className="grid grid-cols-2 gap-4">
                            <div className={`${currentStep >= 1 ? 'animate-slideIn' : ''}`}>
                                <div className="text-red-400 font-bold mb-2">❌ 无 volatile (错误)</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`int flag = 0;

// 主循环
while (1) {
    if (flag) {  // 编译器优化：
        // 处理事件      // 只读取一次 flag
    }                // 缓存到寄存器
}`}
                                </pre>
                                <div className="mt-2 text-xs text-red-400">
                                    ⚠️ 编译器可能将 flag 缓存到寄存器，永远看不到中断修改
                                </div>
                            </div>
                            <div className={`${currentStep >= 1 ? 'animate-slideIn' : ''}`}>
                                <div className="text-emerald-400 font-bold mb-2">✓ 使用 volatile (正确)</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`volatile int flag = 0;

// 主循环
while (1) {
    if (flag) {  // 每次从内存
        // 处理事件      // 重新读取 flag
    }                // 确保看到变化
}`}
                                </pre>
                                <div className="mt-2 text-xs text-emerald-400">
                                    ✓ 每次访问都从内存读取，确保看到最新值
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ISRScenario = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>中断服务程序场景</h4>
                        <div className="space-y-3">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="bg-blue-900/30 p-3 rounded border border-blue-600">
                                    <div className="text-blue-300 font-bold mb-2">主程序</div>
                                    <pre className="text-xs font-mono text-gray-300">
{`volatile bool dataReady = false;

void main(void) {
    while (1) {
        if (dataReady) {
            processData();
            dataReady = false;
        }
    }
}`}
                                    </pre>
                                </div>
                                <div className="bg-purple-900/30 p-3 rounded border border-purple-600">
                                    <div className="text-purple-300 font-bold mb-2">中断服务程序</div>
                                    <pre className="text-xs font-mono text-gray-300">
{`void IRQ_Handler(void) {
    // 采集数据
    collectData();
    // 设置标志
    dataReady = true;
    // 通知主程序
}`}
                                    </pre>
                                </div>
                            </div>
                            <div className="bg-amber-900/30 p-3 rounded border border-amber-600">
                                <div className="text-amber-300 font-bold mb-2">执行流程</div>
                                <div className="flex items-center gap-4 text-sm">
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
                                        <span>主循环等待</span>
                                    </div>
                                    <div className="text-gray-500">→</div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 bg-purple-500 rounded-full animate-blink"></div>
                                        <span>中断触发</span>
                                    </div>
                                    <div className="text-gray-500">→</div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 bg-emerald-500 rounded-full"></div>
                                        <span>标志置位</span>
                                    </div>
                                    <div className="text-gray-500">→</div>
                                    <div className="flex items-center gap-2">
                                        <div className="w-3 h-3 bg-blue-500 rounded-full animate-readFlash"></div>
                                        <span>主程序检测到</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const MMIOExample = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>内存映射硬件寄存器</h4>
                        <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`// 硬件寄存器定义 (STM32 GPIO)
typedef struct {
    volatile uint32_t MODER;    // 模式寄存器
    volatile uint32_t OTYPER;   // 输出类型
    volatile uint32_t OSPEEDR;  // 速度寄存器
    volatile uint32_t PUPDR;    // 上拉/下拉
    volatile uint32_t IDR;      // 输入数据 (只读)
    volatile uint32_t ODR;      // 输出数据
} GPIO_TypeDef;

// 基地址定义
#define GPIOA_BASE  0x40020000
#define GPIOA       ((GPIO_TypeDef *)GPIOA_BASE)

// 使用
uint32_t input = GPIOA->IDR;  // 读取引脚状态
GPIOA->ODR = 0x0001;          // 设置引脚输出`}
                        </pre>
                        <div className="mt-3 p-3 bg-blue-900/30 rounded border border-blue-600">
                            <p className="text-blue-300 text-sm">
                                💡 硬件寄存器值由硬件状态决定，每次读取可能不同。volatile 确保每次访问都真正读写硬件。
                            </p>
                        </div>
                    </div>
                </div>
            );

            const MultithreadingExample = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>多任务共享变量</h4>
                        <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`// 任务间通信
volatile int sharedCounter = 0;
volatile bool taskFlag = false;

// 任务 1
void Task1(void) {
    while (1) {
        if (taskFlag) {  // volatile 确保读取最新值
            sharedCounter++;
            taskFlag = false;
        }
    }
}

// 任务 2
void Task2(void) {
    while (1) {
        taskFlag = true;  // 通知任务 1
        delay_ms(1000);
    }
}`}
                        </pre>
                        <div className="mt-3 p-3 bg-yellow-900/30 rounded border border-yellow-600">
                            <p className="text-yellow-300 text-sm">
                                ⚠️ 注意：volatile 只保证可见性，不保证原子性。sharedCounter++ 不是原子操作，需要互斥锁保护。
                            </p>
                        </div>
                    </div>
                </div>
            );

            const VolatileConstExample = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>volatile const 组合</h4>
                        <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`// 只读硬件状态寄存器
typedef struct {
    volatile const uint32_t STATUS;  // 只读，但值可能变化
    volatile uint32_t CONTROL;       // 可读写
} Device_TypeDef;

#define DEVICE_BASE  ((Device_TypeDef *)0x40010000)

// 使用
uint32_t getDeviceStatus(void) {
    return DEVICE_BASE->STATUS;  // 每次读取硬件状态
}

void setControl(uint32_t val) {
    DEVICE_BASE->CONTROL = val;  // 写入控制寄存器
}`}
                        </pre>
                        <div className="mt-3 grid grid-cols-2 gap-4 text-xs">
                            <div className="bg-emerald-900/30 p-2 rounded">
                                <div className="text-emerald-300 font-bold">const</div>
                                <div className="text-gray-400">程序不能修改</div>
                            </div>
                            <div className="bg-blue-900/30 p-2 rounded">
                                <div className="text-blue-300 font-bold">volatile</div>
                                <div className="text-gray-400">值可能意外变化</div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const BestPractices = () => (
                <div className="space-y-4">
                    <div className="bg-gradient-to-r from-red-900/50 to-orange-900/50 rounded-lg p-6">
                        <h3 className="text-xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>volatile 使用场景总结</h3>
                        <ul className="space-y-3 text-gray-300">
                            <li className="flex items-start">
                                <span className="text-red-400 mr-2">✓</span>
                                <span><strong>中断服务程序标志：</strong>ISR 修改、主程序检查的全局变量</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-red-400 mr-2">✓</span>
                                <span><strong>内存映射寄存器：</strong>访问硬件寄存器必须使用 volatile 指针</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-red-400 mr-2">✓</span>
                                <span><strong>多任务共享变量：</strong>任务间通信的状态标志</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-red-400 mr-2">✓</span>
                                <span><strong>精确延时循环：</strong>volatile 计数器防止编译器优化掉循环</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-red-400 mr-2">✓</span>
                                <span><strong>看门狗定时器：</strong>喂狗寄存器需要 volatile 访问</span>
                            </li>
                        </ul>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>常见误区</h4>
                        <ul className="space-y-2 text-sm text-gray-300">
                            <li className="flex items-start">
                                <span className="text-yellow-400 mr-2">⚠️</span>
                                <span>volatile <strong>不保证原子性</strong>，不能替代互斥锁</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-yellow-400 mr-2">⚠️</span>
                                <span>volatile <strong>不防止指令重排序</strong>，需要内存屏障</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-yellow-400 mr-2">⚠️</span>
                                <span>过度使用 volatile 会<strong>降低性能</strong></span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-yellow-400 mr-2">⚠️</span>
                                <span>volatile 不是线程同步的银弹</span>
                            </li>
                        </ul>
                    </div>
                </div>
            );

            const renderContent = () => {
                switch(currentStep) {
                    case 0:
                        return (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-r from-red-900/50 to-orange-900/50 rounded-lg p-6">
                                    <h3 className="text-2xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>volatile 关键字概述</h3>
                                    <ul className="space-y-3 text-gray-300">
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">▸</span>
                                            <span>告诉编译器变量可能被程序外因素修改</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">▸</span>
                                            <span>禁止编译器对该变量进行优化</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">▸</span>
                                            <span>每次访问都从内存重新读取</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">▸</span>
                                            <span>嵌入式系统最关键的类型限定符</span>
                                        </li>
                                    </ul>
                                </div>
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <pre className="text-xs font-mono text-gray-300">
{`// volatile 修饰的变量
volatile int sensorValue;
volatile uint8_t *port = (uint8_t *)0x40020000;

// 编译器行为对比
int normal = getValue();    // 可能缓存
volatile int v = getValue(); // 总是重新读取`}
                                    </pre>
                                </div>
                            </div>
                        );
                    case 1:
                        return <OptimizationDemo />;
                    case 2:
                        return <ISRScenario />;
                    case 3:
                        return <MMIOExample />;
                    case 4:
                        return <MultithreadingExample />;
                    case 5:
                    case 6:
                        return <BestPractices />;
                    case 7:
                        return <VolatileConstExample />;
                    default:
                        return null;
                }
            };

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        <header className="mb-6 flex items-center justify-between">
                            <div>
                                <h1 className="text-3xl font-bold" style={{ color: COLOR_MAP.primary }}>
                                    1168 - volatile 关键字深入解析
                                </h1>
                                <p className="text-gray-400 mt-1">C 语言核心 · 步骤 {currentStep + 1} / {steps.length}</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsMuted(!isMuted)}
                                    className={`px-4 py-2 rounded ${isMuted ? 'bg-red-600' : 'bg-red-600'} hover:opacity-80`}>
                                    {isMuted ? '🔇 静音' : '🔊 语音'}
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)}
                                    className={`px-4 py-2 rounded ${isPlaying ? 'bg-red-600' : 'bg-gray-600'} hover:opacity-80`}>
                                    {isPlaying ? '⏸ 暂停' : '▶ 继续'}
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-3 gap-6">
                            <div className="col-span-1 space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>代码示例</h3>
                                    <pre className="text-xs font-mono text-gray-300 overflow-x-auto">
{`// 典型 volatile 使用
volatile int irqFlag = 0;

// ISR 中
void IRQ_Handler() {
    irqFlag = 1;
}

// 主循环中
while (1) {
    if (irqFlag) {
        // 每次从内存读取
        // 确保看到变化
    }
}`}
                                    </pre>
                                </div>
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>关键点</h3>
                                    <ul className="space-y-2 text-sm text-gray-300">
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">•</span>
                                            <span>禁止编译器优化</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">•</span>
                                            <span>每次访问从内存读取</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">•</span>
                                            <span>用于 ISR、MMIO、共享变量</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-red-400 mr-2">•</span>
                                            <span>不保证原子性</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>

                            <div className="col-span-1">
                                <div className="bg-gray-800 rounded-lg p-6 h-full">
                                    <h3 className="text-xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>
                                        {steps[currentStep].title}
                                    </h3>
                                    {renderContent()}
                                </div>
                            </div>

                            <div className="col-span-1 space-y-4">
                                <OptimizationDemo />
                                <ISRScenario />
                            </div>
                        </div>

                        <footer className="mt-8 flex justify-center gap-2">
                            {steps.map((_, idx) => (
                                <button key={idx} onClick={() => setCurrentStep(idx)}
                                    className={`w-3 h-3 rounded-full transition-all ${idx === currentStep ? 'w-8' : ''}`}
                                    style={{ backgroundColor: idx <= currentStep ? COLOR_MAP.primary : '#374151' }} />
                            ))}
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
