<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1167 - 枚举类型最佳实践</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flow { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        @keyframes highlight { 0%, 100% { background-color: rgba(245, 158, 11, 0.2); } 50% { background-color: rgba(245, 158, 11, 0.5); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-blink { animation: blink 1s steps(2) infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.5s ease-out; }
        .animate-flow { animation: flow 2s linear infinite; }
        .animate-highlight { animation: highlight 1.5s ease-in-out infinite; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLOR_MAP = {
            primary: '#f59e0b',
            secondary: '#d97706',
            accent: '#fbbf24',
            highlight: '#fcd34d',
            bg: '#78350f',
            text: '#fef3c7'
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const steps = [
                { title: '枚举类型基础', voice: '枚举类型基础。枚举 enum 是一种用户定义的类型，用于声明一组命名的整数常量。枚举提高了代码可读性，使魔法数字变得有意义。例如，用 STATUS_OK 代替 0，用 STATUS_ERROR 代替 -1。' },
                { title: '枚举默认值规则', voice: '枚举默认值规则。第一个枚举成员默认值为 0，后续成员依次递增 1。可以显式指定成员值，未显式指定的成员值为前一个成员值加 1。负数也可以作为枚举值。' },
                { title: '枚举与 switch 语句', voice: '枚举与 switch 语句配合使用。switch 语句是枚举最常见的应用场景，编译器可以检查 switch 是否处理了所有枚举值。GCC 的-Wswitch 和-Wswitch-enum 警告选项可帮助发现遗漏的 case。' },
                { title: '枚举底层类型', voice: '枚举底层类型。C 标准规定枚举的底层类型是实现定义的整型，通常是 int。C++11 允许显式指定枚举底层类型。枚举变量的大小不一定等于 int，取决于编译器的实现。' },
                { title: '强类型枚举 C++11', voice: '强类型枚举。C++11 引入 enum class 强类型枚举，解决了传统枚举的作用域污染和类型安全问题。强类型枚举不隐式转换为整数，必须显式转换。推荐使用 enum class 替代传统 enum。' },
                { title: '枚举应用场景', voice: '枚举应用场景。状态机状态定义、错误码定义、配置选项、协议命令、硬件寄存器字段值等。枚举让代码更具自解释性，减少魔法数字，提高可维护性。' },
                { title: '枚举最佳实践', voice: '枚举最佳实践。一，使用有意义的前缀避免命名冲突。二，配合静态分析工具检查完整性。三，避免依赖默认值，显式指定所有值。四，使用 enum class 获得更好的类型安全。五，为枚举值添加文档注释。' },
                { title: '常见陷阱与解决', voice: '常见陷阱与解决方案。陷阱一，不同枚举类型之间可以隐式转换，可能导致错误。陷阱二，枚举值可能重复。陷阱三，枚举范围检查困难。解决方案是使用强类型枚举和辅助函数进行验证。' }
            ];

            useEffect(() => {
                if (!isPlaying) return;
                const speak = () => {
                    if (isMuted || !steps[currentStep]) return;
                    const utterance = new SpeechSynthesisUtterance(steps[currentStep].voice);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;
                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev < steps.length - 1 ? prev + 1 : prev));
                        }, 800);
                    };
                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev < steps.length - 1 ? prev + 1 : prev));
                        }, 800);
                    };
                    window.speechSynthesis.speak(utterance);
                };
                speak();
                return () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    window.speechSynthesis.cancel();
                };
            }, [currentStep, isPlaying, isMuted]);

            const EnumValues = () => (
                <div className="space-y-3">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>枚举值演示</h4>
                        <div className="space-y-2">
                            {['STATUS_OK = 0', 'STATUS_WARNING = 1', 'STATUS_ERROR = 2', 'STATUS_FATAL = 3'].map((item, idx) => (
                                <div key={idx} className={`flex items-center justify-between p-3 rounded ${currentStep >= 1 ? 'animate-fadeIn' : ''} bg-amber-900/30 border border-amber-600/50`}
                                     style={{ animationDelay: `${idx * 100}ms` }}>
                                    <span className="font-mono text-amber-200">{item.split(' = ')[0]}</span>
                                    <span className="text-amber-400">= {idx}</span>
                                </div>
                            ))}
                        </div>
                        <div className="mt-4 p-3 bg-blue-900/30 rounded border border-blue-600">
                            <p className="text-blue-300 text-sm">
                                💡 第一个成员默认为 0，后续依次递增。可显式指定值：STATUS_CUSTOM = 100
                            </p>
                        </div>
                    </div>
                </div>
            );

            const SwitchExample = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>枚举与 switch 语句</h4>
                        <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300 overflow-x-auto">
{`typedef enum {
    STATE_IDLE,
    STATE_RUNNING,
    STATE_PAUSED,
    STATE_STOPPED
} State;

void handleState(State state) {
    switch (state) {
        case STATE_IDLE:
            // 空闲处理
            break;
        case STATE_RUNNING:
            // 运行处理
            break;
        case STATE_PAUSED:
            // 暂停处理
            break;
        case STATE_STOPPED:
            // 停止处理
            break;
        default:
            // 未知状态处理
            break;
    }
}`}
                        </pre>
                        <div className="mt-3 grid grid-cols-4 gap-2">
                            {['IDLE', 'RUNNING', 'PAUSED', 'STOPPED'].map((state, idx) => (
                                <div key={idx} className={`p-2 rounded text-center text-xs ${currentStep >= 2 && idx === currentStep - 2 ? 'bg-amber-500 animate-pulse' : 'bg-gray-700'}`}>
                                    <div className="text-amber-200">STATE_{state}</div>
                                    <div className="text-gray-400 mt-1">case {idx}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const EnumComparison = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>传统枚举 vs 强类型枚举</h4>
                        <div className="grid grid-cols-2 gap-4">
                            <div className={`${currentStep >= 4 ? 'animate-slideIn' : ''}`}>
                                <div className="text-gray-400 font-bold mb-2">传统 enum</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-red-300">
{`enum Color {
    RED,    // 污染作用域
    GREEN,
    BLUE
};

Color c = RED;
int x = RED;  // 隐式转换
c = c + 1;    // 类型不安全`}
                                </pre>
                                <ul className="mt-2 text-xs text-gray-400 space-y-1">
                                    <li>✗ 枚举值污染外层作用域</li>
                                    <li>✗ 可隐式转换为整数</li>
                                    <li>✗ 可进行算术运算</li>
                                </ul>
                            </div>
                            <div className={`${currentStep >= 4 ? 'animate-slideIn' : ''}`}>
                                <div className="text-emerald-400 font-bold mb-2">enum class (C++11)</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-emerald-300">
{`enum class Color {
    RED,
    GREEN,
    BLUE
};

Color c = Color::RED;
int x = static_cast<int>(c);
// c = c + 1;  // 编译错误`}
                                </pre>
                                <ul className="mt-2 text-xs text-gray-400 space-y-1">
                                    <li>✓ 枚举值在类作用域内</li>
                                    <li>✓ 不能隐式转换为整数</li>
                                    <li>✓ 类型安全</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ApplicationExamples = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>枚举应用场景</h4>
                        <div className="space-y-4">
                            <div className={`${currentStep >= 5 ? 'animate-scaleIn' : ''}`}>
                                <div className="text-amber-400 font-bold mb-2">状态机状态定义</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`typedef enum {
    STATE_INIT,
    STATE_READY,
    STATE_PROCESSING,
    STATE_COMPLETE,
    STATE_ERROR
} MachineState;`}
                                </pre>
                            </div>
                            <div className={`${currentStep >= 5 ? 'animate-scaleIn' : ''}`}>
                                <div className="text-amber-400 font-bold mb-2">错误码定义</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`typedef enum {
    ERR_OK          = 0,
    ERR_INVALID_ARG = 1,
    ERR_NO_MEMORY   = 2,
    ERR_TIMEOUT     = 3,
    ERR_IO          = 4
} ErrorCode;`}
                                </pre>
                            </div>
                            <div className={`${currentStep >= 5 ? 'animate-scaleIn' : ''}`}>
                                <div className="text-amber-400 font-bold mb-2">协议命令定义</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`typedef enum {
    CMD_READ   = 0x01,
    CMD_WRITE  = 0x02,
    CMD_DELETE = 0x03,
    CMD_QUERY  = 0x04
} ProtocolCmd;`}
                                </pre>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const BestPractices = () => (
                <div className="space-y-4">
                    <div className="bg-gradient-to-r from-amber-900/50 to-orange-900/50 rounded-lg p-6">
                        <h3 className="text-xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>枚举最佳实践</h3>
                        <ul className="space-y-3 text-gray-300">
                            <li className="flex items-start">
                                <span className="text-amber-400 mr-2">✓</span>
                                <span><strong>命名前缀：</strong>使用统一前缀避免冲突，如 STATE_IDLE、ERR_OK</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-amber-400 mr-2">✓</span>
                                <span><strong>显式赋值：</strong>显式指定所有枚举值，不依赖默认递增规则</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-amber-400 mr-2">✓</span>
                                <span><strong>完整性检查：</strong>使用编译器警告-Wswitch-enum 检查 switch 完整性</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-amber-400 mr-2">✓</span>
                                <span><strong>强类型枚举：</strong>C++ 项目优先使用 enum class 获得类型安全</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-amber-400 mr-2">✓</span>
                                <span><strong>文档注释：</strong>为每个枚举值添加注释说明用途</span>
                            </li>
                        </ul>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-4">
                        <pre className="text-xs font-mono text-gray-300">
{`// 好的枚举命名
typedef enum {
    WiFi_DISCONNECTED = 0,
    WiFi_CONNECTING   = 1,
    WiFi_CONNECTED    = 2,
    WiFi_ERROR        = 3
} WiFiState;

// 显式指定值，便于扩展和调试
typedef enum {
    SENSOR_OK      = 0,
    SENSOR_TIMEOUT = 100,
    SENSOR_CRC_ERR = 101,
   _SENSOR_RANGE   = 102
} SensorError;`}
                        </pre>
                    </div>
                </div>
            );

            const renderContent = () => {
                switch(currentStep) {
                    case 0:
                        return (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-r from-amber-900/50 to-orange-900/50 rounded-lg p-6">
                                    <h3 className="text-2xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>枚举类型基础</h3>
                                    <ul className="space-y-3 text-gray-300">
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">▸</span>
                                            <span>声明一组命名的整数常量</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">▸</span>
                                            <span>提高代码可读性和可维护性</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">▸</span>
                                            <span>替代魔法数字，使代码自解释</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">▸</span>
                                            <span>编译器可进行类型检查</span>
                                        </li>
                                    </ul>
                                </div>
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <pre className="text-xs font-mono text-gray-300">
{`// 枚举定义
enum StatusCode {
    STATUS_OK,      // 0 - 成功
    STATUS_ERROR,   // 1 - 错误
    STATUS_TIMEOUT  // 2 - 超时
};

// 使用
enum StatusCode result = STATUS_OK;
if (result == STATUS_OK) {
    // 处理成功
}`}
                                    </pre>
                                </div>
                            </div>
                        );
                    case 1:
                        return <EnumValues />;
                    case 2:
                    case 3:
                        return <SwitchExample />;
                    case 4:
                        return <EnumComparison />;
                    case 5:
                        return <ApplicationExamples />;
                    case 6:
                        return <BestPractices />;
                    case 7:
                        return (
                            <div className="space-y-4">
                                <div className="bg-gradient-to-r from-amber-900/50 to-orange-900/50 rounded-lg p-6">
                                    <h3 className="text-xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>常见陷阱与解决方案</h3>
                                    <div className="space-y-4">
                                        <div className="bg-red-900/30 p-3 rounded border border-red-600">
                                            <div className="text-red-300 font-bold mb-1">陷阱 1: 作用域污染</div>
                                            <pre className="text-xs font-mono text-gray-300 mt-2">
{`enum { RED, GREEN };
enum { RED, BLUE };  // RED 重复定义!`}
                                            </pre>
                                            <div className="text-green-300 text-xs mt-2">解决：使用不同前缀或 enum class</div>
                                        </div>
                                        <div className="bg-red-900/30 p-3 rounded border border-red-600">
                                            <div className="text-red-300 font-bold mb-1">陷阱 2: 隐式转换</div>
                                            <pre className="text-xs font-mono text-gray-300 mt-2">
{`Status s = OK;
int x = s + 1;  // 隐式转换，可能出错`}
                                            </pre>
                                            <div className="text-green-300 text-xs mt-2">解决：使用 enum class 禁止隐式转换</div>
                                        </div>
                                        <div className="bg-red-900/30 p-3 rounded border border-red-600">
                                            <div className="text-red-300 font-bold mb-1">陷阱 3: 未处理所有 case</div>
                                            <pre className="text-xs font-mono text-gray-300 mt-2">
{`switch (state) {
    case STATE_A: break;
    case STATE_B: break;
    // 新增 STATE_C 后忘记处理
}`}
                                            </pre>
                                            <div className="text-green-300 text-xs mt-2">解决：使用-Wswitch-enum 编译器警告</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            };

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        <header className="mb-6 flex items-center justify-between">
                            <div>
                                <h1 className="text-3xl font-bold" style={{ color: COLOR_MAP.primary }}>
                                    1167 - 枚举类型最佳实践
                                </h1>
                                <p className="text-gray-400 mt-1">C 语言核心 · 步骤 {currentStep + 1} / {steps.length}</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsMuted(!isMuted)}
                                    className={`px-4 py-2 rounded ${isMuted ? 'bg-red-600' : 'bg-amber-600'} hover:opacity-80`}>
                                    {isMuted ? '🔇 静音' : '🔊 语音'}
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)}
                                    className={`px-4 py-2 rounded ${isPlaying ? 'bg-amber-600' : 'bg-gray-600'} hover:opacity-80`}>
                                    {isPlaying ? '⏸ 暂停' : '▶ 继续'}
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-3 gap-6">
                            <div className="col-span-1 space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>代码示例</h3>
                                    <pre className="text-xs font-mono text-gray-300 overflow-x-auto">
{`// 基础枚举
enum Color {
    RED,    // 0
    GREEN,  // 1
    BLUE    // 2
};

// 显式赋值
enum Status {
    OK       = 0,
    ERROR    = 1,
    TIMEOUT  = 100,
    CRC_ERR  = 101
};

enum Color c = GREEN;`}
                                    </pre>
                                </div>
                                <EnumValues />
                            </div>

                            <div className="col-span-1">
                                <div className="bg-gray-800 rounded-lg p-6 h-full">
                                    <h3 className="text-xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>
                                        {steps[currentStep].title}
                                    </h3>
                                    {renderContent()}
                                </div>
                            </div>

                            <div className="col-span-1 space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>关键点</h3>
                                    <ul className="space-y-2 text-sm text-gray-300">
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">•</span>
                                            <span>第一个成员默认为 0，后续递增</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">•</span>
                                            <span>可显式指定成员值</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">•</span>
                                            <span>与 switch 语句配合使用</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-amber-400 mr-2">•</span>
                                            <span>enum class 提供更好的类型安全</span>
                                        </li>
                                    </ul>
                                </div>
                                <SwitchExample />
                            </div>
                        </div>

                        <footer className="mt-8 flex justify-center gap-2">
                            {steps.map((_, idx) => (
                                <button key={idx} onClick={() => setCurrentStep(idx)}
                                    className={`w-3 h-3 rounded-full transition-all ${idx === currentStep ? 'w-8' : ''}`}
                                    style={{ backgroundColor: idx <= currentStep ? COLOR_MAP.primary : '#374151' }} />
                            ))}
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
