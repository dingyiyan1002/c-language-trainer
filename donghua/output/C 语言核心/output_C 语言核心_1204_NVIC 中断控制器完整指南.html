    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes flow { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
        @keyframes highlight { 0%, 100% { fill: #ef4444; } 50% { fill: #fbbf24; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes interrupt { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes prioritize { 0% { y: 0; } 50% { y: -10; } 100% { y: 0; } }
        .animate-pulse { animation: pulse 2s infinite; }
        .animate-blink { animation: blink 1s infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.3s ease-out; }
        .animate-flow { animation: flow 1.5s linear infinite; }
        .animate-highlight { animation: highlight 1s infinite; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        .animate-interrupt { animation: interrupt 0.3s ease-in-out infinite; }
        .animate-prioritize { animation: prioritize 1s ease-in-out infinite; }

// 嵌套向量中断控制器 - ARM Cortex-M 核心组件

// NVIC 核心功能
// 1. 中断请求管理 (IRQ 0-239)
// 2. 优先级分组 (抢占 + 响应)
// 3. 中断嵌套 (高优先级打断低优先级)
// 4. 向量表 (直接跳转到 ISR)

// 中断类型
// 1. 系统异常 (SysTick、PendSV、SVCall)
// 2. 外部中断 (GPIO、UART、SPI 等外设)

// 中断处理流程
// 1. 外设产生中断请求
// 2. NVIC 仲裁优先级
// 3. 保存现场 (R0-R3, R12, LR, PC, xPSR)
// 4. 跳转到中断向量表
// 5. 执行 ISR(中断服务函数)
// 6. 恢复现场，返回主程序

// 关键寄存器
// ISER: 中断使能寄存器
// ICER: 中断清除寄存器
// ISPR: 中断挂起寄存器
// IPR: 中断优先级寄存器`,

// STM32 使用 4 位表示优先级 (0-15)

// SCB->AIRCR 寄存器配置
// 优先级分组：抢占优先级 + 响应优先级 (亚优先级)

void NVIC_PriorityGroupConfig(uint32_t group) {
    SCB->AIRCR = (SCB->AIRCR & ~SCB_AIRCR_PRIGROUP_Msk) | group;
}

// 5 种优先级分组
// Group 0: 0 位抢占，4 位响应 (0-15)
// Group 1: 1 位抢占，3 位响应 (0-7)
// Group 2: 2 位抢占，2 位响应 (0-3) ← 最常用
// Group 3: 3 位抢占，1 位响应 (0-1)
// Group 4: 4 位抢占，0 位响应 (0-15)

// 示例：Group 2 配置
NVIC_PriorityGroupConfig(NVIC_PRIORITYGROUP_2);
// 抢占优先级：0-3 (4 级)
// 响应优先级：0-3 (4 级)

// 配置中断优先级
NVIC_InitTypeDef NVIC_InitStructure;
NVIC_InitStructure.NVIC_IRQChannel = USART1_IRQn;
NVIC_InitStructure.NVIC_IRQChannelPreemptionPriority = 1;
NVIC_InitStructure.NVIC_IRQChannelSubPriority = 2;
NVIC_InitStructure.NVIC_IRQChannelCmd = ENABLE;
NVIC_Init(&NVIC_InitStructure);`,
                    explanation: "优先级分组决定抢占优先级和响应优先级的位数分配。抢占优先级决定能否打断正在处理的中断，响应优先级决定同优先级时的处理顺序。Group 2 最常用，提供 4 级抢占和 4 级响应。",

                {
                    title: "中断使能与配置",
                    code: `// 中断使能与配置

// 1. 使能特定中断
NVIC_EnableIRQ(IRQn_Type IRQn);
// 例：NVIC_EnableIRQ(USART1_IRQn);

// 2. 禁用特定中断
NVIC_DisableIRQ(IRQn_Type IRQn);

// 3. 软件触发中断
NVIC_SetPendingIRQ(IRQn_Type IRQn);

// 4. 清除挂起中断
NVIC_ClearPendingIRQ(IRQn_Type IRQn);

// 5. 获取中断激活状态
uint32_t NVIC_GetActive(IRQn_Type IRQn);

// 完整配置示例
void EXTI0_IRQHandler_Config(void) {
    // 配置优先级分组
    NVIC_SetPriorityGrouping(NVIC_PRIORITYGROUP_2);

    // 配置 EXTI0 中断
    NVIC_InitTypeDef NVIC_InitStruct;
    NVIC_InitStruct.NVIC_IRQChannel = EXTI0_IRQn;
    NVIC_InitStruct.NVIC_IRQChannelCmd = ENABLE;
    NVIC_InitStruct.NVIC_IRQChannelPreemptionPriority = 1;
    NVIC_InitStruct.NVIC_IRQChannelSubPriority = 1;
    NVIC_Init(&NVIC_InitStruct);
}

// 中断服务函数 (在 startup 文件中声明)
void EXTI0_IRQHandler(void) {
    if (EXTI->PR & EXTI_PR_PR0) {
        // 处理中断
        GPIO_Toggle();
        // 清除中断标志
        EXTI->PR = EXTI_PR_PR0;
    }
}`,
                    explanation: "NVIC 提供标准 API 配置中断：EnableIRQ 使能、DisableIRQ 禁用、SetPendingIRQ 软件触发、ClearPendingIRQ 清除挂起。完整配置需设置优先级分组、抢占优先级、响应优先级和中断通道。",

// 提供精确的 1ms 延时和操作系统节拍

// SysTick 寄存器
// CTRL: 控制寄存器
// LOAD: 重装载值
// VAL: 当前值
// CAL: 校准值

void SysTick_Init(uint32_t ms) {
    // 配置 1ms 中断 (假设系统时钟 72MHz)
    // 72MHz / 8 = 9MHz (9000 计数/ms)
    // 或直接 72MHz / 1000 = 72000 计数/ms

    SysTick->LOAD = 72000 - 1;     // 1ms@72MHz
    SysTick->VAL = 0;               // 清除当前值
    SysTick->CTRL = 0;              // 先禁用

    // 配置: 处理器时钟，使能中断，使能
    SysTick->CTRL = SysTick_CTRL_CLKSOURCE_Msk |
                    SysTick_CTRL_TICKINT_Msk |
                    SysTick_CTRL_ENABLE_Msk;

    // 设置优先级 (最低)
    NVIC_SetPriority(SysTick_IRQn, 0x0F);
}

    // 操作系统节拍计数

    // 或执行周期性任务

                            {/* ISR 原则 */}
                            <rect x="20" y="35" width="170" height="80" fill="#1f2937" stroke={COLOR_MAP.success} rx="8" />
                            <text x="105" y="55" fill={COLOR_MAP.success} fontSize="10" textAnchor="middle" fontWeight="bold">ISR 编写原则</text>
                            <text x="35" y="75" fill="#9ca3af" fontSize="8">• 快进快出 ✓</text>
                            <text x="35" y="90" fill="#9ca3af" fontSize="8">• 只处理紧急事务</text>
                            <text x="35" y="105" fill="#9ca3af" fontSize="8">• volatile 共享变量</text>
                            <text x="35" y="120" fill={COLOR_MAP.danger} fontSize="8">✗ 避免 printf/延时</text>
                            {/* 临界区 */}
                            <rect x="200" y="35" width="180" height="55" fill="#1f2937" stroke={COLOR_MAP.primary} rx="8" />
                            <text x="290" y="55" fill={COLOR_MAP.primary} fontSize="10" textAnchor="middle" fontWeight="bold">临界区保护</text>
                            <text x="215" y="75" fill="#9ca3af" fontSize="7" fontFamily="monospace">__disable_irq();</text>
                            <text x="215" y="87" fill={COLOR_MAP.accent} fontSize="7" fontFamily="monospace">shared_data = val;</text>
                            <text x="215" y="99" fill="#9ca3af" fontSize="7" fontFamily="monospace">__enable_irq();</text>
                            {/* 优先级金字塔 */}
                            <rect x="20" y="125" width="170" height="90" fill="#1f2937" stroke={COLOR_MAP.info} rx="8" />
                            <text x="105" y="145" fill={COLOR_MAP.info} fontSize="10" textAnchor="middle" fontWeight="bold">优先级金字塔</text>
                            {/* 金字塔 */}
                            <polygon points="105,155 40,205 170,205" fill="none" stroke="#6b7280" strokeWidth="1" />
                            <rect x="75" y="160" width="60" height="12" fill={COLOR_MAP.danger} rx="2" />
                            <text x="105" y="169" fill="white" fontSize="7" textAnchor="middle">EXTI(紧急)</text>
                            <rect x="65" y="175" width="80" height="12" fill={COLOR_MAP.accent} opacity="0.7" rx="2" />
                            <text x="105" y="184" fill="white" fontSize="7" textAnchor="middle">UART(数据)</text>
                            <rect x="55" y="190" width="100" height="12" fill={COLOR_MAP.primary} opacity="0.4" rx="2" />
                            <text x="105" y="199" fill="white" fontSize="7" textAnchor="middle">TIM/SysTick(周期)</text>
                            {/* 调试清单 */}
                            <rect x="200" y="100" width="180" height="115" fill="#1f2937" stroke={COLOR_MAP.accent} rx="8" />
                            <text x="290" y="120" fill={COLOR_MAP.accent} fontSize="10" textAnchor="middle" fontWeight="bold">调试检查清单</text>
                            <text x="215" y="140" fill={COLOR_MAP.success} fontSize="8">✓ ISR 执行时间 &lt; 100μs</text>
                            <text x="215" y="155" fill={COLOR_MAP.success} fontSize="8">✓ 标志正确清除</text>
                            <text x="215" y="170" fill={COLOR_MAP.success} fontSize="8">✓ 共享变量 volatile</text>
                            <text x="215" y="185" fill={COLOR_MAP.success} fontSize="8">✓ 优先级合理配置</text>
                            <text x="215" y="200" fill={COLOR_MAP.success} fontSize="8">✓ 嵌套深度合理</text>
                            <text x="215" y="215" fill={COLOR_MAP.success} fontSize="8">✓ 无死锁风险</text>
                        </svg>
                    )
                }
            ];

            const [counterValue, setCounterValue] = React.useState(0);

            React.useEffect(() => {
                const speak = (text) => {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;
                    const voices = window.speechSynthesis.getVoices();
                    const zhVoice = voices.find(v => v.lang.includes('zh-CN') && v.name.includes('Xiaoxiao'))
                        || voices.find(v => v.lang.includes('zh-CN'))
                        || voices[0];
                    if (zhVoice) utterance.voice = zhVoice;
                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev + 1) % STEPS.length);
                        }, 800);
                    };
                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev + 1) % STEPS.length);
                        }, 800);
                    };
                    window.speechSynthesis.speak(utterance);
                };
                speak(STEPS[currentStep].title);
                return () => clearTimeout(voiceEndTimerRef.current);
            }, [currentStep]);

            React.useEffect(() => {
                const timer = setInterval(() => {
                    setCounterValue(prev => (prev + 1) % 72000);
                }, 1);
                return () => clearInterval(timer);
            }, []);

            return (
                <div class="flex flex-col h-screen bg-gray-900 text-white">
                    <div class="flex-1 flex overflow-hidden">
                        {/* 左侧：代码区 */}
                        <div class="w-1/3 border-r border-gray-700 flex flex-col bg-gray-800">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-red-400">💻 代码示例</h2>
                            </div>
                            <div class="flex-1 overflow-auto p-4">
                                <pre class="text-sm text-green-400 font-mono whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                        </div>

                        {/* 中间：可视化区 */}
                        <div class="w-1/3 border-r border-gray-700 flex flex-col">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-orange-400">🎬 可视化动画</h2>
                            </div>
                            <div class="flex-1 p-4 bg-gray-800">
                                {STEPS[currentStep].renderVisual()}
                            </div>
                        </div>

                        {/* 右侧：解释区 */}
                        <div class="w-1/3 flex flex-col bg-gray-800">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-yellow-400">📖 原理解析</h2>
                            </div>
                            <div class="flex-1 overflow-auto p-4">
                                <p class="text-base text-gray-300 leading-relaxed">
                                    {STEPS[currentStep].explanation}
                                </p>
                                <div class="mt-6 p-4 bg-gray-900 rounded-lg border border-gray-700">
                                    <h3 class="text-sm font-bold text-red-400 mb-2">📌 关键要点</h3>
                                    <ul class="text-sm text-gray-400 space-y-1 list-disc list-inside">
                                        {currentStep === 0 && <li>NVIC 管理 240 个外部中断</li>}
                                        {currentStep === 0 && <li>向量表直接存储 ISR 地址</li>}
                                        {currentStep === 0 && <li>中断自动保存恢复现场</li>}
                                        {currentStep === 1 && <li>Group 2 最常用 (4 级抢占 +4 级响应)</li>}
                                        {currentStep === 1 && <li>抢占优先级决定能否打断</li>}
                                        {currentStep === 1 && <li>响应优先级决定同优先级的顺序</li>}
                                        {currentStep === 2 && <li>EnableIRQ 使能中断</li>}
                                        {currentStep === 2 && <li>SetPendingIRQ 软件触发</li>}
                                        {currentStep === 2 && <li>ClearPendingIRQ 清除挂起</li>}
                                        {currentStep === 3 && <li>EXTI 检测 GPIO 边沿</li>}
                                        {currentStep === 3 && <li>配置触发边沿 (上升沿/下降沿)</li>}
                                        {currentStep === 3 && <li>ISR 需清除中断标志</li>}
                                        {currentStep === 4 && <li>SysTick 是 24 位递减定时器</li>}
                                        {currentStep === 4 && <li>LOAD 决定中断周期</li>}
                                        {currentStep === 4 && <li>用于系统节拍和精确延时</li>}
                                        {currentStep === 5 && <li>多中断协同工作</li>}
                                        {currentStep === 5 && <li>SysTick 提供时间基准</li>}
                                        {currentStep === 5 && <li>EXTI 响应外部事件</li>}
                                        {currentStep === 6 && <li>ISR 快进快出</li>}
                                        {currentStep === 6 && <li>volatile 修饰共享变量</li>}
                                        {currentStep === 6 && <li>临界区保护共享资源</li>}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 底部控制栏 */}
                    <div class="border-t border-gray-700 bg-gray-800 p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <span class="text-sm text-gray-400">步骤 {currentStep + 1} / {STEPS.length}</span>
                                <div class="flex space-x-2">
                                    {STEPS.map((_, i) => (
                                        <button key={i} onClick={() => setCurrentStep(i)}
                                            className={`w-3 h-3 rounded-full transition-all ${i === currentStep ? 'bg-red-400 scale-125' : 'bg-gray-600'}`}
                                        />
                                    ))}
                                </div>
                            </div>
                            <div class="flex space-x-3">
                                <button onClick={() => setCurrentStep((prev - 1 + STEPS.length) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    ⏮ 上一步
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)}
                                    className="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-lg text-sm transition-colors">
                                    {isPlaying ? '⏸ 暂停' : '▶ 播放'}
                                </button>
                                <button onClick={() => setCurrentStep((prev + 1) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    下一步 ⏭
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
