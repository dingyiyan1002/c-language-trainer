<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1190 - RTOS 软件定时器 - C 语言核心</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #059669 0%, #064e3b 100%); color: #e0e7ff; min-height: 100vh; overflow-x: hidden; }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes countdown { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes timerExpire { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); backgroundColor: '#ef4444'; } }
        @keyframes tick { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .pulse { animation: pulse 2s infinite; }
        .blink { animation: blink 1s infinite; }
        .countdown { animation: countdown 1s linear infinite; }
        .timer-expire { animation: timerExpire 0.5s ease-in-out; }
        .tick { animation: tick 0.1s ease-in-out; }

        .state-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .code-line { display: block; padding: 2px 0; }
        .code-keyword { color: #c678dd; }
        .code-type { color: #e5c07b; }
        .code-function { color: #61afef; }
        .code-string { color: #98c379; }
        .code-comment { color: #7f8c8d; font-style: italic; }
        .code-number { color: #d19a66; }
        .code-operator { color: #56b6c2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ========== COLOR MAP - 6 unique colors for this file ==========
        const COLOR_MAP = {
            primary: '#10b981',    // Emerald - Timer active
            secondary: '#f59e0b',  // Amber - Timer expired
            accent: '#3b82f6',     // Blue - One-shot mode
            bg: '#0f172a',         // Slate 900
            text: '#f1f5f9',       // Slate 100
            border: '#334155'      // Slate 700
        };

        // ========== SKILL.md v3.0 8 Regions ==========
        const STEPS = [
            { title: "定时器基础", subtitle: "周期与回调", duration: 8000 },
            { title: "创建与配置", subtitle: "API 参数详解", duration: 8000 },
            { title: "启动与停止", subtitle: "生命周期管理", duration: 8000 },
            { title: "自动重载", subtitle: "周期模式", duration: 8000 },
            { title: "单次触发", subtitle: "One-shot 模式", duration: 8000 },
            { title: "定时器服务", subtitle: "守护任务", duration: 8000 },
            { title: "应用案例", subtitle: "LED 闪烁与看门狗", duration: 8000 },
            { title: "最佳实践", subtitle: "使用指南", duration: 10000 }
        ];

        // ========== Main App ==========
        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const voiceEndTimerRef = useRef(null);
            const synthRef = useRef(window.speechSynthesis);
            const currentUtteranceRef = useRef(null);

            // 定时器状态
            const [timerState, setTimerState] = useState({
                period: 1000,      // ms
                remaining: 1000,
                autoReload: true,
                isRunning: true,
                expiredCount: 0,
                callbackCalled: false
            });

            // 动画状态
            const [tickAnim, setTickAnim] = useState(false);

            // ========== 语音合成 ==========
            const speak = useCallback((text) => {
                if (isMuted) return;
                if (currentUtteranceRef.current) {
                    synthRef.current.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;

                const voices = synthRef.current.getVoices();
                const xiaoxiaoVoice = voices.find(v =>
                    v.name.includes('Xiaoxiao') ||
                    v.name.includes('zh-CN') ||
                    v.lang === 'zh-CN'
                );
                if (xiaoxiaoVoice) utterance.voice = xiaoxiaoVoice;

                utterance.onend = () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            setIsPlaying(false);
                            return prev;
                        });
                    }, 800);
                };

                utterance.onerror = (event) => {
                    console.warn('Speech synthesis error:', event);
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            setIsPlaying(false);
                            return prev;
                        });
                    }, 800);
                };

                currentUtteranceRef.current = utterance;
                synthRef.current.speak(utterance);
            }, [isMuted]);

            // ========== 步骤推进 ==========
            useEffect(() => {
                const step = STEPS[currentStep];
                speak(step.title + "。" + step.subtitle);
                return () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                };
            }, [currentStep, speak]);

            // ========== 定时器倒计时模拟 ==========
            useEffect(() => {
                if (currentStep >= 3 && currentStep <= 4 && isPlaying && timerState.isRunning) {
                    const interval = setInterval(() => {
                        setTickAnim(true);
                        setTimeout(() => setTickAnim(false), 100);

                        setTimerState(prev => {
                            const newRemaining = prev.remaining - 100;

                            if (newRemaining <= 0) {
                                // 定时器到期
                                if (prev.autoReload) {
                                    // 周期模式：重置
                                    return {
                                        ...prev,
                                        remaining: prev.period,
                                        expiredCount: prev.expiredCount + 1,
                                        callbackCalled: true
                                    };
                                } else {
                                    // 单次模式：停止
                                    return {
                                        ...prev,
                                        remaining: 0,
                                        isRunning: false,
                                        expiredCount: prev.expiredCount + 1,
                                        callbackCalled: true
                                    };
                                }
                            }

                            return {
                                ...prev,
                                remaining: newRemaining,
                                callbackCalled: false
                            };
                        });
                    }, 100);

                    return () => clearInterval(interval);
                }
            }, [currentStep, isPlaying, timerState.isRunning, timerState.autoReload, timerState.period]);

            // ========== 手动控制 ==========
            const handleNext = () => { if (currentStep < STEPS.length - 1) setCurrentStep(currentStep + 1); };
            const handlePrev = () => { if (currentStep > 0) setCurrentStep(currentStep - 1); };
            const handleRestart = () => {
                setCurrentStep(0);
                setIsPlaying(true);
                setTimerState({ period: 1000, remaining: 1000, autoReload: true, isRunning: true, expiredCount: 0, callbackCalled: false });
            };

            const toggleTimer = () => {
                setTimerState(prev => ({ ...prev, isRunning: !prev.isRunning }));
            };

            const resetTimer = () => {
                setTimerState(prev => ({ ...prev, remaining: prev.period, expiredCount: 0 }));
            };

            // ========== 渲染代码区域 ==========
            const renderCode = () => {
                const codeSnippets = {
                    0: (
                        <div className="text-sm">
                            <span className="code-comment">/* 软件定时器基础 */</span><br/>
                            <span className="code-keyword">typedef void</span> (*<span className="code-type">TimerCallbackFunction_t</span>)(<br/>
                            &nbsp;&nbsp;<span className="code-type">TimerHandle_t</span> xTimer<br/>
                            );<br/><br/>
                            <span className="code-comment">/* 定时器两种模式 */</span><br/>
                            <span className="code-keyword">#define</span> pdTRUE_AUTO_RELOAD    1  <span className="code-comment">// 周期模式 */</span><br/>
                            <span className="code-keyword">#define</span> pdFALSE_ONE_SHOT      0  <span className="code-comment">// 单次模式 */</span><br/><br/>
                            <span className="code-comment">/* 典型应用 */</span><br/>
                            <span className="code-comment">// - LED 闪烁 (周期 500ms) */</span><br/>
                            <span className="code-comment">// - 看门狗喂狗 (周期 100ms) */</span><br/>
                            <span className="code-comment">// - 传感器轮询 (周期 1s) */</span><br/>
                        </div>
                    ),
                    1: (
                        <div className="text-sm">
                            <span className="code-comment">/* 创建定时器 */</span><br/>
                            <span className="code-type">TimerHandle_t</span> xTimer;<br/><br/>
                            xTimer = <span className="code-function">xTimerCreate</span>(<br/>
                            &nbsp;&nbsp;"BlinkTimer",         <span className="code-comment">// 名称 (调试用) */</span><br/>
                            &nbsp;&nbsp;pdMS_TO_TICKS(500),   <span className="code-comment">// 周期 500ms */</span><br/>
                            &nbsp;&nbsp;pdTRUE,               <span className="code-comment">// 自动重载 (周期模式) */</span><br/>
                            &nbsp;&nbsp;(<span className="code-type">void</span>*)0,          <span className="code-comment">// ID (可选) */</span><br/>
                            &nbsp;&nbsp;vBlinkCallback         <span className="code-comment">// 回调函数 */</span><br/>
                            );<br/><br/>
                            <span className="code-keyword">if</span> (xTimer == NULL) {<br/>
                            &nbsp;&nbsp;<span className="code-comment">// 创建失败处理 */</span><br/>
                            }<br/>
                        </div>
                    ),
                    2: (
                        <div className="text-sm">
                            <span className="code-comment">/* 启动定时器 */</span><br/>
                            <span className="code-keyword">if</span> (<span className="code-function">xTimerStart</span>(xTimer, 0) != pdPASS) {<br/>
                            &nbsp;&nbsp;<span className="code-comment">// 启动失败 */</span><br/>
                            }<br/><br/>
                            <span className="code-comment">/* 停止定时器 */</span><br/>
                            <span className="code-function">xTimerStop</span>(xTimer, 0);<br/><br/>
                            <span className="code-comment">/* 修改周期 */</span><br/>
                            <span className="code-function">xTimerChangePeriod</span>(<br/>
                            &nbsp;&nbsp;xTimer, pdMS_TO_TICKS(1000), 0);<br/><br/>
                            <span className="code-comment">/* 删除定时器 */</span><br/>
                            <span className="code-function">xTimerDelete</span>(xTimer, 0);<br/>
                        </div>
                    ),
                    3: (
                        <div className="text-sm">
                            <span className="code-comment">/* 周期模式 (Auto-Reload) */</span><br/>
                            <span className="code-keyword">void</span> <span className="code-function">vPeriodicCallback</span>(<span className="code-type">TimerHandle_t</span> xTimer) {<br/>
                            &nbsp;&nbsp;<span className="code-keyword">static</span> <span className="code-type">int</span> count = 0;<br/>
                            &nbsp;&nbsp;count++;<br/><br/>
                            &nbsp;&nbsp;<span className="code-comment">// 每 500ms 执行一次 */</span><br/>
                            &nbsp;&nbsp;<span className="code-function">LED_Toggle</span>();<br/>
                            &nbsp;&nbsp;<span className="code-function">Sensor_Poll</span>();<br/><br/>
                            &nbsp;&nbsp;<span className="code-comment">// 可获取定时器 ID */</span><br/>
                            &nbsp;&nbsp;<span className="code-type">uint32_t</span> id = (<span className="code-type">uint32_t</span>)<span className="code-function">pvTimerGetTimerID</span>(xTimer);<br/>
                            }<br/>
                        </div>
                    ),
                    4: (
                        <div className="text-sm">
                            <span className="code-comment">/* 单次触发模式 (One-Shot) */</span><br/>
                            <span className="code-type">TimerHandle_t</span> xOneShot =<br/>
                            &nbsp;&nbsp;<span className="code-function">xTimerCreate</span>(<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;"OneShot",<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;pdMS_TO_TICKS(5000),  <span className="code-comment">// 5 秒后触发 */</span><br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;pdFALSE,              <span className="code-comment">// 单次模式 */</span><br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;NULL,<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;vTimeoutCallback<br/>
                            &nbsp;&nbsp;);<br/><br/>
                            <span className="code-comment">// 典型应用：超时检测、延迟执行 */</span><br/>
                        </div>
                    ),
                    5: (
                        <div className="text-sm">
                            <span className="code-comment">/* 定时器服务任务 */</span><br/>
                            <span className="code-comment">// FreeRTOS 自动创建守护任务 */</span><br/>
                            <span className="code-comment">// 配置参数： */</span><br/>
                            #define configUSE_TIMERS             1<br/>
                            #define configTIMER_TASK_PRIORITY    3<br/>
                            #define configTIMER_QUEUE_LENGTH     10<br/>
                            #define configTIMER_TASK_STACK_DEPTH 128<br/><br/>
                            <span className="code-comment">/* 定时器命令 */</span><br/>
                            <span className="code-keyword">typedef enum</span> {<br/>
                            &nbsp;&nbsp;tmrCOMMAND_START,<br/>
                            &nbsp;&nbsp;tmrCOMMAND_STOP,<br/>
                            &nbsp;&nbsp;tmrCOMMAND_CHANGE_PERIOD<br/>
                            } TimerCommand_t;<br/>
                        </div>
                    ),
                    6: (
                        <div className="text-sm">
                            <span className="code-comment">/* LED 闪烁应用 */</span><br/>
                            <span className="code-keyword">void</span> <span className="code-function">vBlinkCallback</span>(<span className="code-type">TimerHandle_t</span> xTimer) {<br/>
                            &nbsp;&nbsp;<span className="code-function">GPIO_Toggle</span>(LED_PIN);<br/>
                            }<br/><br/>
                            <span className="code-comment">// 启动 */</span><br/>
                            <span className="code-type">TimerHandle_t</span> xLedTimer =<br/>
                            &nbsp;&nbsp;<span className="code-function">xTimerCreate</span>("LED", 500, pdTRUE,<br/>
                            &nbsp;&nbsp;NULL, vBlinkCallback);<br/>
                            <span className="code-function">xTimerStart</span>(xLedTimer, 0);<br/><br/>
                            <span className="code-comment">/* 软件看门狗 */</span><br/>
                            <span className="code-function">xTimerCreate</span>("WDG", 100, pdTRUE,<br/>
                            &nbsp;&nbsp;NULL, vFeedWatchdog);<br/>
                        </div>
                    ),
                    7: (
                        <div className="text-sm">
                            <span className="code-comment">/* 最佳实践清单 */</span><br/>
                            <span className="code-comment">// ✓ 1. 回调中避免阻塞 API */</span><br/>
                            <span className="code-comment">// ✓ 2. 回调执行时间尽量短 */</span><br/>
                            <span className="code-comment">// ✓ 3. 长任务交给 Task 处理 */</span><br/>
                            <span className="code-comment">// ✓ 4. 使用 ID 区分多个定时器 */</span><br/>
                            <span className="code-comment">// ✓ 5. 停止定时器后再删除 */</span><br/>
                            <span className="code-comment">// ✓ 6. 注意 configTIMER_TASK_PRIORITY */</span><br/>
                            <span className="code-comment">// ✓ 7. 周期使用 pdMS_TO_TICKS 转换 */</span><br/>
                        </div>
                    )
                };
                return codeSnippets[currentStep];
            };

            // ========== 渲染可视化区域 ==========
            const renderVisualization = () => {
                if (currentStep === 0) {
                    // 定时器基础
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>软件定时器基础</h3>
                            <div className="flex justify-center items-center gap-8">
                                <div className="text-center">
                                    <div className="w-24 h-24 rounded-full flex items-center justify-center mb-2 countdown" style={{backgroundColor: COLOR_MAP.primary}}>
                                        <span className="text-4xl">⏱️</span>
                                    </div>
                                    <div className="text-sm" style={{color: COLOR_MAP.text}}>定时器核心</div>
                                </div>
                                <div className="text-4xl">→</div>
                                <div className="text-center">
                                    <div className="w-20 h-20 rounded-lg flex items-center justify-center mb-2 pulse" style={{backgroundColor: COLOR_MAP.secondary}}>
                                        <span className="text-3xl">📞</span>
                                    </div>
                                    <div className="text-sm" style={{color: COLOR_MAP.text}}>回调函数</div>
                                </div>
                            </div>
                            <div className="space-y-2 text-sm">
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(16,185,129,0.2)'}}>
                                    <div className="font-bold" style={{color: COLOR_MAP.primary}}>周期定时器</div>
                                    <div>每隔固定时间触发一次</div>
                                    <div>应用：LED 闪烁、传感器轮询</div>
                                </div>
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(245,158,11,0.2)'}}>
                                    <div className="font-bold" style={{color: COLOR_MAP.secondary}}>单次定时器</div>
                                    <div>仅触发一次后停止</div>
                                    <div>应用：超时检测、延迟执行</div>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (currentStep === 1) {
                    // 创建与配置
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>定时器创建参数</h3>
                            <div className="border-2 rounded-lg p-4 space-y-3" style={{borderColor: COLOR_MAP.border}}>
                                <div className="flex justify-between items-center">
                                    <span className="text-sm" style={{color: COLOR_MAP.text}}>pcTimerName</span>
                                    <span className="font-mono text-xs" style={{color: COLOR_MAP.primary}}>"BlinkTimer"</span>
                                </div>
                                <div className="text-xs" style={{color: COLOR_MAP.text}}>调试用名称，帮助识别定时器</div>

                                <div className="border-t pt-3" style={{borderColor: COLOR_MAP.border}}></div>

                                <div className="flex justify-between items-center">
                                    <span className="text-sm" style={{color: COLOR_MAP.text}}>xTimerPeriodInTicks</span>
                                    <span className="font-mono text-xs" style={{color: COLOR_MAP.secondary}}>pdMS_TO_TICKS(500)</span>
                                </div>
                                <div className="text-xs" style={{color: COLOR_MAP.text}}>周期时间 (转换为系统 tick)</div>

                                <div className="border-t pt-3" style={{borderColor: COLOR_MAP.border}}></div>

                                <div className="flex justify-between items-center">
                                    <span className="text-sm" style={{color: COLOR_MAP.text}}>uxAutoReload</span>
                                    <span className="font-mono text-xs" style={{color: COLOR_MAP.accent}}>pdTRUE / pdFALSE</span>
                                </div>
                                <div className="text-xs" style={{color: COLOR_MAP.text}}>TRUE=周期模式，FALSE=单次模式</div>

                                <div className="border-t pt-3" style={{borderColor: COLOR_MAP.border}}></div>

                                <div className="flex justify-between items-center">
                                    <span className="text-sm" style={{color: COLOR_MAP.text}}>pvTimerID</span>
                                    <span className="font-mono text-xs" style={{color: '#8b5cf6'}}>(void*)0</span>
                                </div>
                                <div className="text-xs" style={{color: COLOR_MAP.text}}>用户自定义 ID，回调中可获取</div>

                                <div className="border-t pt-3" style={{borderColor: COLOR_MAP.border}}></div>

                                <div className="flex justify-between items-center">
                                    <span className="text-sm" style={{color: COLOR_MAP.text}}>pxCallbackFunction</span>
                                    <span className="font-mono text-xs" style={{color: '#ef4444'}}>vBlinkCallback</span>
                                </div>
                                <div className="text-xs" style={{color: COLOR_MAP.text}}>定时器到期时执行的函数</div>
                            </div>
                        </div>
                    );
                }

                if (currentStep === 2) {
                    // 启动与停止
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>定时器生命周期</h3>
                            <div className="relative">
                                {/* 创建 */}
                                <div className="p-3 rounded-lg mb-2" style={{backgroundColor: 'rgba(59,130,246,0.2)'}}>
                                    <div className="font-bold flex items-center gap-2" style={{color: COLOR_MAP.accent}}>
                                        <span>1️⃣</span> xTimerCreate()
                                    </div>
                                    <div className="text-xs ml-8">创建定时器对象，初始化参数</div>
                                </div>

                                {/* 箭头 */}
                                <div className="flex justify-center my-1">
                                    <span className="text-2xl">⬇</span>
                                </div>

                                {/* 启动 */}
                                <div className="p-3 rounded-lg mb-2" style={{backgroundColor: 'rgba(16,185,129,0.2)'}}>
                                    <div className="font-bold flex items-center gap-2" style={{color: COLOR_MAP.primary}}>
                                        <span>2️⃣</span> xTimerStart()
                                    </div>
                                    <div className="text-xs ml-8">启动定时器，开始倒计时</div>
                                </div>

                                {/* 箭头 */}
                                <div className="flex justify-center my-1">
                                    <span className="text-2xl">⬇</span>
                                </div>

                                {/* 运行/停止 */}
                                <div className="grid grid-cols-2 gap-2">
                                    <div className="p-3 rounded-lg" style={{backgroundColor: 'rgba(245,158,11,0.2)'}}>
                                        <div className="font-bold flex items-center gap-2" style={{color: COLOR_MAP.secondary}}>
                                            <span>🔄</span> 周期运行
                                        </div>
                                        <div className="text-xs ml-6">自动重载，持续触发</div>
                                    </div>
                                    <div className="p-3 rounded-lg" style={{backgroundColor: 'rgba(107,114,128,0.2)'}}>
                                        <div className="font-bold flex items-center gap-2" style={{color: '#6b7280'}}>
                                            <span>⏹</span> xTimerStop()
                                        </div>
                                        <div className="text-xs ml-6">停止定时器</div>
                                    </div>
                                </div>

                                {/* 箭头 */}
                                <div className="flex justify-center my-1">
                                    <span className="text-2xl">⬇</span>
                                </div>

                                {/* 删除 */}
                                <div className="p-3 rounded-lg" style={{backgroundColor: 'rgba(239,68,68,0.2)'}}>
                                    <div className="font-bold flex items-center gap-2" style={{color: '#ef4444'}}>
                                        <span>🗑</span> xTimerDelete()
                                    </div>
                                    <div className="text-xs ml-8">释放定时器资源</div>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (currentStep === 3 || currentStep === 4) {
                    // 自动重载 / 单次触发
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>
                                {currentStep === 3 ? '周期模式 (Auto-Reload)' : '单次模式 (One-Shot)'}
                            </h3>

                            {/* 定时器显示 */}
                            <div className={`w-32 h-32 rounded-full mx-auto flex flex-col items-center justify-center border-4 transition-all ${tickAnim ? 'scale-105' : ''}`}
                                style={{
                                    borderColor: timerState.isRunning ? COLOR_MAP.primary : '#6b7280',
                                    backgroundColor: timerState.callbackCalled ? 'rgba(245,158,11,0.3)' : 'transparent'
                                }}>
                                <span className="text-4xl mb-2">⏱️</span>
                                <span className="text-2xl font-bold" style={{color: COLOR_MAP.text}}>{timerState.remaining}ms</span>
                            </div>

                            {/* 状态信息 */}
                            <div className="grid grid-cols-3 gap-4 text-center">
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(16,185,129,0.2)'}}>
                                    <div className="text-xs" style={{color: COLOR_MAP.text}}>运行状态</div>
                                    <div className="font-bold" style={{color: timerState.isRunning ? COLOR_MAP.primary : '#6b7280'}}>
                                        {timerState.isRunning ? '▶ 运行' : '⏹ 停止'}
                                    </div>
                                </div>
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(245,158,11,0.2)'}}>
                                    <div className="text-xs" style={{color: COLOR_MAP.text}}>触发次数</div>
                                    <div className="font-bold" style={{color: COLOR_MAP.secondary}}>{timerState.expiredCount}</div>
                                </div>
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(59,130,246,0.2)'}}>
                                    <div className="text-xs" style={{color: COLOR_MAP.text}}>模式</div>
                                    <div className="font-bold" style={{color: COLOR_MAP.accent}}>{timerState.autoReload ? '周期' : '单次'}</div>
                                </div>
                            </div>

                            {/* 控制按钮 */}
                            <div className="flex gap-2">
                                <button onClick={toggleTimer}
                                    className="flex-1 py-2 rounded font-bold transition-opacity hover:opacity-80"
                                    style={{backgroundColor: timerState.isRunning ? '#ef4444' : COLOR_MAP.primary}}>
                                    {timerState.isRunning ? '⏸ 暂停' : '▶ 启动'}
                                </button>
                                <button onClick={resetTimer}
                                    className="flex-1 py-2 rounded font-bold transition-opacity hover:opacity-80"
                                    style={{backgroundColor: COLOR_MAP.secondary}}>
                                    🔄 重置
                                </button>
                                <button onClick={() => setTimerState(prev => ({ ...prev, autoReload: !prev.autoReload, remaining: 1000, expiredCount: 0 }))}
                                    className="flex-1 py-2 rounded font-bold transition-opacity hover:opacity-80"
                                    style={{backgroundColor: COLOR_MAP.accent}}>
                                    {timerState.autoReload ? '改单次' : '改周期'}
                                </button>
                            </div>

                            {/* 回调指示 */}
                            {timerState.callbackCalled && (
                                <div className="p-3 rounded-lg text-center pulse" style={{backgroundColor: 'rgba(245,158,11,0.3)'}}>
                                    <span className="font-bold" style={{color: COLOR_MAP.secondary}}>📞 回调函数执行中...</span>
                                </div>
                            )}
                        </div>
                    );
                }

                if (currentStep === 5) {
                    // 定时器服务
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>定时器服务任务</h3>
                            <div className="relative">
                                {/* 定时器队列 */}
                                <div className="p-4 rounded-lg mb-4" style={{backgroundColor: 'rgba(59,130,246,0.2)'}}>
                                    <div className="font-bold text-center mb-2" style={{color: COLOR_MAP.accent}}>定时器命令队列</div>
                                    <div className="flex gap-1 justify-center">
                                        {[...Array(10)].map((_, i) => (
                                            <div key={i} className={`w-6 h-8 border rounded flex items-center justify-center text-xs ${i < 3 ? 'pulse' : 'opacity-30'}`} style={{borderColor: COLOR_MAP.accent, backgroundColor: i < 3 ? COLOR_MAP.accent : 'transparent'}}>
                                                {i < 3 ? ['START', 'STOP', 'CHANGE'][i] : ''}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="text-xs text-center mt-2">configTIMER_QUEUE_LENGTH = 10</div>
                                </div>

                                {/* 服务任务 */}
                                <div className="p-4 rounded-lg mb-4 border-2" style={{backgroundColor: 'rgba(16,185,129,0.2)', borderColor: COLOR_MAP.primary}}>
                                    <div className="font-bold text-center mb-2" style={{color: COLOR_MAP.primary}}>RTOS 定时器服务任务</div>
                                    <div className="text-xs space-y-1">
                                        <div>✓ 高优先级任务 (configTIMER_TASK_PRIORITY)</div>
                                        <div>✓ 处理所有定时器命令</div>
                                        <div>✓ 到期时调用回调函数</div>
                                        <div>✓ 栈大小：configTIMER_TASK_STACK_DEPTH</div>
                                    </div>
                                </div>

                                {/* 回调执行 */}
                                <div className="p-4 rounded-lg" style={{backgroundColor: 'rgba(245,158,11,0.2)'}}>
                                    <div className="font-bold text-center mb-2" style={{color: COLOR_MAP.secondary}}>用户回调函数</div>
                                    <div className="text-xs text-center">
                                        在定时器服务任务上下文中执行<br/>
                                        ⚠️ 避免调用阻塞 API
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }

                if (currentStep === 6) {
                    // 应用案例
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>典型应用案例</h3>

                            {/* LED 闪烁 */}
                            <div className="p-4 rounded-lg" style={{backgroundColor: 'rgba(16,185,129,0.2)'}}>
                                <div className="font-bold flex items-center gap-2" style={{color: COLOR_MAP.primary}}>
                                    <span>💡</span> LED 闪烁定时器
                                </div>
                                <div className="grid grid-cols-2 gap-4 mt-3">
                                    <div className="text-center">
                                        <div className={`w-16 h-16 rounded-full mx-auto flex items-center justify-center ${timerState.expiredCount % 2 === 0 ? 'pulse' : 'opacity-30'}`} style={{backgroundColor: timerState.expiredCount % 2 === 0 ? '#fbbf24' : '#374151'}}>
                                            <span className="text-3xl">{timerState.expiredCount % 2 === 0 ? '💡' : '🌑'}</span>
                                        </div>
                                        <div className="text-xs mt-1">LED 状态</div>
                                    </div>
                                    <div className="text-xs space-y-1">
                                        <div>周期：500ms</div>
                                        <div>模式：自动重载</div>
                                        <div>触发：{timerState.expiredCount} 次</div>
                                    </div>
                                </div>
                            </div>

                            {/* 软件看门狗 */}
                            <div className="p-4 rounded-lg" style={{backgroundColor: 'rgba(245,158,11,0.2)'}}>
                                <div className="font-bold flex items-center gap-2" style={{color: COLOR_MAP.secondary}}>
                                    <span>🐕</span> 软件看门狗
                                </div>
                                <div className="text-xs mt-2">
                                    周期 100ms 自动喂狗，防止系统死机
                                </div>
                                <div className="flex gap-1 mt-2">
                                    {[...Array(5)].map((_, i) => (
                                        <div key={i} className={`flex-1 h-4 rounded ${i < 3 ? 'pulse' : 'opacity-30'}`} style={{backgroundColor: i < 3 ? COLOR_MAP.secondary : '#374151'}}></div>
                                    ))}
                                </div>
                            </div>

                            {/* 传感器轮询 */}
                            <div className="p-4 rounded-lg" style={{backgroundColor: 'rgba(59,130,246,0.2)'}}>
                                <div className="font-bold flex items-center gap-2" style={{color: COLOR_MAP.accent}}>
                                    <span>📡</span> 传感器轮询
                                </div>
                                <div className="text-xs mt-2">
                                    周期 1s 读取传感器数据
                                </div>
                            </div>
                        </div>
                    );
                }

                if (currentStep === 7) {
                    // 最佳实践
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>软件定时器最佳实践</h3>
                            <div className="grid grid-cols-1 gap-3 text-xs">
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(16,185,129,0.2)'}}>
                                    <div className="font-bold" style={{color: COLOR_MAP.primary}}>✓ 回调中避免阻塞</div>
                                    <div>不要调用 vTaskDelay、xQueueReceive 等阻塞 API</div>
                                    <div>长任务发送给任务处理</div>
                                </div>
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(245,158,11,0.2)'}}>
                                    <div className="font-bold" style={{color: COLOR_MAP.secondary}}>✓ 回调执行时间短</div>
                                    <div>快速设置标志位或发送消息</div>
                                    <div>避免复杂计算和长循环</div>
                                </div>
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(59,130,246,0.2)'}}>
                                    <div className="font-bold" style={{color: COLOR_MAP.accent}}>✓ 使用 ID 区分定时器</div>
                                    <div>创建时传入 pvTimerID</div>
                                    <div>回调中用 pvTimerGetTimerID() 获取</div>
                                </div>
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(239,68,68,0.2)'}}>
                                    <div className="font-bold" style={{color: '#ef4444'}}>✓ 先停止再删除</div>
                                    <div>xTimerStop() 后 xTimerDelete()</div>
                                    <div>防止删除时回调仍在执行</div>
                                </div>
                                <div className="p-3 rounded" style={{backgroundColor: 'rgba(139,92,246,0.2)'}}>
                                    <div className="font-bold" style={{color: '#8b5cf6'}}>✓ 配置优先级</div>
                                    <div>configTIMER_TASK_PRIORITY 要足够高</div>
                                    <div>确保定时器及时触发</div>
                                </div>
                            </div>
                        </div>
                    );
                }

                return null;
            };

            // ========== 渲染解释区域 ==========
            const renderExplanation = () => {
                const explanations = {
                    0: {
                        title: "软件定时器基础",
                        points: [
                            "RTOS 软件定时器在到期时执行用户定义的回调函数",
                            "支持周期模式 (Auto-Reload) 和单次模式 (One-Shot)",
                            "典型应用：LED 闪烁、看门狗喂狗、传感器轮询",
                            "回调函数在定时器服务任务上下文中执行"
                        ]
                    },
                    1: {
                        title: "创建与配置",
                        points: [
                            "xTimerCreate() 创建定时器，返回句柄",
                            "参数包括：名称、周期、重载模式、ID、回调函数",
                            "周期使用 pdMS_TO_TICKS() 转换为系统 tick",
                            "创建失败返回 NULL，需检查返回值"
                        ]
                    },
                    2: {
                        title: "启动与停止",
                        points: [
                            "xTimerStart() 启动定时器，开始倒计时",
                            "xTimerStop() 停止定时器但不删除",
                            "xTimerChangePeriod() 动态修改周期",
                            "xTimerDelete() 释放定时器资源"
                        ]
                    },
                    3: {
                        title: "自动重载 (周期模式)",
                        points: [
                            "uxAutoReload=pdTRUE 时启用周期模式",
                            "定时器到期后自动重载，周而复始",
                            "适合周期性任务：LED 闪烁、数据采集",
                            "每次触发计数器 +1，可持续运行"
                        ]
                    },
                    4: {
                        title: "单次触发模式",
                        points: [
                            "uxAutoReload=pdFALSE 时为单次模式",
                            "定时器到期触发一次后自动停止",
                            "适合超时检测、延迟执行",
                            "需要重新 xTimerStart() 才能再次触发"
                        ]
                    },
                    5: {
                        title: "定时器服务任务",
                        points: [
                            "FreeRTOS 自动创建定时器服务任务 (Daemon Task)",
                            "处理所有定时器的启动、停止、修改命令",
                            "到期时调用用户回调函数",
                            "通过 configTIMER_TASK_PRIORITY 配置优先级"
                        ]
                    },
                    6: {
                        title: "应用案例",
                        points: [
                            "LED 闪烁：500ms 周期定时器翻转 GPIO",
                            "软件看门狗：100ms 周期自动喂狗",
                            "传感器轮询：1s 周期读取传感器数据",
                            "超时检测：单次定时器监测系统响应"
                        ]
                    },
                    7: {
                        title: "最佳实践",
                        points: [
                            "回调中避免阻塞 API，快速返回",
                            "使用 ID 区分多个定时器",
                            "删除前先停止定时器",
                            "配置足够高的定时器任务优先级",
                            "长任务通过队列委托给任务处理"
                        ]
                    }
                };

                const exp = explanations[currentStep];
                return (
                    <div>
                        <h3 className="text-lg font-bold mb-3" style={{color: COLOR_MAP.primary}}>{exp.title}</h3>
                        <ul className="space-y-2">
                            {exp.points.map((point, idx) => (
                                <li key={idx} className="flex items-start gap-2">
                                    <span className="text-green-400 mt-1">▸</span>
                                    <span>{point}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-screen p-4 gap-4">
                    {/* 顶部标题 */}
                    <div className="text-center py-3 rounded-lg" style={{backgroundColor: 'rgba(0,0,0,0.3)'}}>
                        <h1 className="text-2xl font-bold mb-1">1190 - RTOS 软件定时器</h1>
                        <p className="text-sm opacity-75">C 语言核心 | 嵌入式实时操作系统定时器机制</p>
                    </div>

                    {/* 三列主布局 */}
                    <div className="flex-1 grid grid-cols-3 gap-4 overflow-hidden">
                        {/* 左列：代码 */}
                        <div className="rounded-lg p-4 overflow-auto" style={{backgroundColor: COLOR_MAP.bg, border: `2px solid ${COLOR_MAP.border}`}}>
                            <h2 className="text-lg font-bold mb-3 flex items-center gap-2" style={{color: COLOR_MAP.text}}>
                                <span>📝</span> 代码示例
                            </h2>
                            <div className="font-mono text-xs leading-relaxed" style={{color: COLOR_MAP.text}}>
                                {renderCode()}
                            </div>
                        </div>

                        {/* 中列：可视化 */}
                        <div className="rounded-lg p-4 overflow-auto" style={{backgroundColor: COLOR_MAP.bg, border: `2px solid ${COLOR_MAP.border}`}}>
                            <h2 className="text-lg font-bold mb-3 flex items-center gap-2" style={{color: COLOR_MAP.text}}>
                                <span>🎬</span> 可视化演示
                            </h2>
                            <div className="text-sm">
                                {renderVisualization()}
                            </div>
                        </div>

                        {/* 右列：解释 */}
                        <div className="rounded-lg p-4 overflow-auto" style={{backgroundColor: COLOR_MAP.bg, border: `2px solid ${COLOR_MAP.border}`}}>
                            <h2 className="text-lg font-bold mb-3 flex items-center gap-2" style={{color: COLOR_MAP.text}}>
                                <span>📖</span> 原理解析
                            </h2>
                            <div className="text-sm space-y-3" style={{color: COLOR_MAP.text}}>
                                {renderExplanation()}
                            </div>
                        </div>
                    </div>

                    {/* 底部控制栏 */}
                    <div className="rounded-lg p-3 flex items-center justify-between" style={{backgroundColor: 'rgba(0,0,0,0.3)'}}>
                        <div className="flex items-center gap-4">
                            <button onClick={handlePrev} disabled={currentStep === 0}
                                className="px-4 py-2 rounded disabled:opacity-50 disabled:cursor-not-allowed hover:opacity-80"
                                style={{backgroundColor: COLOR_MAP.primary}}>上一步</button>
                            <button onClick={handleNext} disabled={currentStep === STEPS.length - 1}
                                className="px-4 py-2 rounded disabled:opacity-50 disabled:cursor-not-allowed hover:opacity-80"
                                style={{backgroundColor: COLOR_MAP.secondary}}>下一步</button>
                            <button onClick={handleRestart}
                                className="px-4 py-2 rounded hover:opacity-80"
                                style={{backgroundColor: COLOR_MAP.accent}}>重新开始</button>
                        </div>

                        <div className="flex items-center gap-4">
                            <div className="text-sm">
                                <span className="opacity-75">进度：</span>
                                <span className="font-bold">{currentStep + 1} / {STEPS.length}</span>
                            </div>
                            <button onClick={() => setIsMuted(!isMuted)}
                                className="px-3 py-2 rounded text-sm"
                                style={{backgroundColor: isMuted ? '#ef4444' : '#10b981'}}>
                                {isMuted ? '🔇 静音' : '🔊 有声'}
                            </button>
                            <button onClick={() => setIsPlaying(!isPlaying)}
                                className="px-4 py-2 rounded font-bold"
                                style={{backgroundColor: isPlaying ? COLOR_MAP.primary : COLOR_MAP.accent}}>
                                {isPlaying ? '⏸ 暂停' : '▶ 播放'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
