// 1. 睡眠模式 (Sleep Mode)
// - CPU 停止，外设运行
// - 唤醒：任意中断
// - 电流：~10mA
// - 唤醒时间：即时
void enterSleep(void) {
    __WFI();  // Wait For Interrupt
}

// 2. 停止模式 (Stop Mode)
// - CPU+ 外设停止，SRAM 保持
// - 唤醒：EXTI 中断
// - 电流：~100μA
// - 唤醒时间：~50μs
void enterStop(void) {
    PWR->CR |= PWR_CR_LPDS;  // 低压调节
    SCB->SCR &= ~SCB_SCR_SLEEPDEEP;
    __WFI();
}

// 3. 待机模式 (Standby Mode)
// - 仅备份域运行
// - 唤醒：WKUP 引脚/NRST
// - 电流：~2μA
// - 唤醒时间：~2ms (相当于复位)
void enterStandby(void) {
    PWR->CR |= PWR_CR_PDDS | PWR_CR_CWUF;
    SCB->SCR |= SCB_SCR_SLEEPDEEP;
    __WFI();
}`,

// 功耗 ∝ 频率 × 电压²

void enterLowPowerRun(void) {
    // 1. 切换到 HSI (内部振荡器)
    RCC->CFGR |= RCC_CFGR_SW_HSI;
    while (!(RCC->CFGR & RCC_CFGR_SWS_HSI));

    // 2. 关闭 PLL
    RCC->CR &= ~RCC_CR_PLLON;

    // 3. 降低 AHB 分频
    RCC->CFGR |= RCC_CFGR_HPRE_DIV4;  // 4 分频

    // 4. 降低电压 (如果支持)
    PWR->CR |= PWR_CR_VOS_1;  // Scale 2

    // 系统降频至 4MHz，功耗降低 75%
}

void exitLowPowerRun(void) {
    // 恢复全速运行
    RCC->CR |= RCC_CR_PLLON;
    while (!(RCC->CR & RCC_CR_PLLRDY));
    RCC->CFGR |= RCC_CFGR_SW_PLL;
    while (!(RCC->CFGR & RCC_CFGR_SWS_PLL));
}`,

void disableUnusedPeripherals(void) {
    // AHB1 外设
    RCC->AHB1ENR &= ~(
        RCC_AHB1ENR_DMA2EN |   // DMA2
        RCC_AHB1ENR_DMA1EN |   // DMA1
        RCC_AHB1ENR_CRCEN      // CRC
    );

    // APB1 外设
    RCC->APB1ENR &= ~(
        RCC_APB1ENR_USART2EN | // USART2
        RCC_APB1ENR_USART3EN | // USART3
        RCC_APB1ENR_SPI2EN |   // SPI2
        RCC_APB1ENR_I2C1EN |   // I2C

    RCC->APB2ENR &= ~(

    );

}`,

    // ✅ 正确：模拟输入或固定输出
    for (int i = 0; i < 8; i++) {
        GPIOA->CRL &= ~(0xF << (i * 4));
        GPIOA->CRL |= (0x0 << (i * 4));  // 模拟输入
    }

    // 未使用引脚：输出低电平
    GPIOB->MODER &= ~(0x3 << (9 * 2));
    GPIOB->MODER |= (0x1 << (9 * 2));  // 输出
    GPIOB->ODR &= ~(1 << 9);           // 输出 0

    GPIOA->PUPDR &= ~(0x3 << (0 * 2));

void EXTI_Wakeup_Config(void) {
    // 1. 使能 SYSCFG 时钟
    RCC->APB2ENR |= RCC_APB2ENR_SYSCFGEN;

    // 2. 配置 EXTI 线路 (PA0)
    SYSCFG->EXTICR[0] &= ~SYSCFG_EXTICR1_EXTI0;
    SYSCFG->EXTICR[0] |= SYSCFG_EXTICR1_EXTI0_PA;

    // 3. 配置上升沿触发
    EXTI->RTSR |= EXTI_RTSR_TR0;

    // 4. 使能中断
    EXTI->IMR |= EXTI_IMR_MR0;

    // 5. NVIC 配置
    NVIC_EnableIRQ(EXTI0_IRQn);

// 公式：寿命 (小时) = 容量 (mAh) / 平均电流 (mA)

// 示例：CR2032 纽扣电池 (220mAh)
// 应用参数:
#define RUN_CURRENT_mA    10      // 运行电流
#define SLEEP_CURRENT_uA  100     // 休眠电流
#define DUTY_CYCLE        0.01    // 1% 占空比

// 计算平均电流
float avgCurrent_mA =
    RUN_CURRENT_mA * DUTY_CYCLE +
    SLEEP_CURRENT_uA / 1000.0 * (1 - DUTY_CYCLE);
// = 10 × 0.01 + 0.1 × 0.99 = 0.199 mA
