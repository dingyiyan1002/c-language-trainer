<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1189 - RTOS 事件组与任务通知 - C 语言核心</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #7c3aed 0%, #4c1d95 100%); color: #e0e7ff; min-height: 100vh; overflow-x: hidden; }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.98); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes flow { 0% { transform: translateY(0); } 100% { transform: translateY(20px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes bitSet { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes eventNotify { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .pulse { animation: pulse 2s infinite; }
        .blink { animation: blink 1s infinite; }
        .flow { animation: flow 2s infinite; }
        .rotate { animation: rotate 2s linear infinite; }
        .bit-set { animation: bitSet 0.5s ease-in-out; }
        .event-notify { animation: eventNotify 0.8s ease-out; }

        .state-transition { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .code-line { display: block; padding: 2px 0; }
        .code-keyword { color: #c678dd; }
        .code-type { color: #e5c07b; }
        .code-function { color: #61afef; }
        .code-string { color: #98c379; }
        .code-comment { color: #7f8c8d; font-style: italic; }
        .code-number { color: #d19a66; }
        .code-operator { color: #56b6c2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ========== COLOR MAP - 6 unique colors for this file ==========
        const COLOR_MAP = {
            primary: '#a855f7',    // Purple - Event group bits
            secondary: '#06b6d4',  // Cyan - Task notification
            accent: '#f43f5e',     // Rose - Event flags
            bg: '#0f172a',         // Slate 900
            text: '#f1f5f9',       // Slate 100
            border: '#334155'      // Slate 700
        };

        // ========== SKILL.md v3.0 8 Regions ==========
        const STEPS = [
            { title: "事件组基础", subtitle: "多事件同步", duration: 8000 },
            { title: "事件位操作", subtitle: "设置与清除", duration: 8000 },
            { title: "事件等待", subtitle: "AND/OR 逻辑", duration: 8000 },
            { title: "任务通知基础", subtitle: "轻量级同步", duration: 8000 },
            { title: "通知值操作", subtitle: "设置与获取", duration: 8000 },
            { title: "通知增强功能", subtitle: "掩码与操作", duration: 8000 },
            { title: "应用案例", subtitle: "多传感器系统", duration: 8000 },
            { title: "机制对比", subtitle: "选择合适方案", duration: 10000 }
        ];

        // ========== Main App ==========
        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const voiceEndTimerRef = useRef(null);
            const synthRef = useRef(window.speechSynthesis);
            const currentUtteranceRef = useRef(null);

            // 事件组状态
            const [eventGroupState, setEventGroupState] = useState({
                bits: 0b00000101, // Bit 0 and Bit 2 set
                waitMode: 'AND',  // 'AND' or 'OR'
                waitMask: 0b00000011,
                clearedOnExit: true
            });

            // 任务通知状态
            const [taskNotifyState, setTaskNotifyState] = useState({
                notifyValue: 42,
                notifyPending: false,
                notifyMode: 'SetValueWithOverwrite'
            });

            // 事件动画
            const [eventAnim, setEventAnim] = useState({
                active: false,
                bitIndex: 0,
                action: 'set' // 'set' or 'clear'
            });

            // ========== 语音合成 ==========
            const speak = useCallback((text) => {
                if (isMuted) return;
                if (currentUtteranceRef.current) {
                    synthRef.current.cancel();
                }

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;

                const voices = synthRef.current.getVoices();
                const xiaoxiaoVoice = voices.find(v =>
                    v.name.includes('Xiaoxiao') ||
                    v.name.includes('zh-CN') ||
                    v.lang === 'zh-CN'
                );
                if (xiaoxiaoVoice) utterance.voice = xiaoxiaoVoice;

                utterance.onend = () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            setIsPlaying(false);
                            return prev;
                        });
                    }, 800);
                };

                utterance.onerror = (event) => {
                    console.warn('Speech synthesis error:', event);
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    voiceEndTimerRef.current = setTimeout(() => {
                        setCurrentStep(prev => {
                            if (prev < STEPS.length - 1) return prev + 1;
                            setIsPlaying(false);
                            return prev;
                        });
                    }, 800);
                };

                currentUtteranceRef.current = utterance;
                synthRef.current.speak(utterance);
            }, [isMuted]);

            // ========== 步骤推进 ==========
            useEffect(() => {
                const step = STEPS[currentStep];
                speak(step.title + "。" + step.subtitle);
                return () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                };
            }, [currentStep, speak]);

            // ========== 手动控制 ==========
            const handleNext = () => { if (currentStep < STEPS.length - 1) setCurrentStep(currentStep + 1); };
            const handlePrev = () => { if (currentStep > 0) setCurrentStep(currentStep - 1); };
            const handleRestart = () => {
                setCurrentStep(0);
                setIsPlaying(true);
                setEventGroupState({ bits: 0b00000101, waitMode: 'AND', waitMask: 0b00000011, clearedOnExit: true });
                setTaskNotifyState({ notifyValue: 42, notifyPending: false, notifyMode: 'SetValueWithOverwrite' });
            };

            // ========== 渲染代码区域 ==========
            const renderCode = () => {
                const codeSnippets = {
                    0: (
                        <div className="text-sm">
                            <span className="code-comment">/* 事件组 - 多事件同步 */</span><br/>
                            <span className="code-type">EventGroupHandle_t</span> xEventGroup;<br/><br/>
                            <span className="code-comment">// 创建事件组 */</span><br/>
                            xEventGroup = <span className="code-function">xEventGroupCreate</span>();<br/><br/>
                            <span className="code-comment">/* 事件位定义 */</span><br/>
                            #define EVENT_SENSOR_READY  (1 &lt;&lt; 0)<br/>
                            #define EVENT_DATA_RECEIVED (1 &lt;&lt; 1)<br/>
                            #define EVENT_ERROR_FLAG    (1 &lt;&lt; 2)<br/>
                            #define EVENT_SHUTDOWN      (1 &lt;&lt; 3)<br/>
                            <span className="code-comment">// 共 24 个事件位 (FreeRTOS) */</span><br/>
                        </div>
                    ),
                    1: (
                        <div className="text-sm">
                            <span className="code-comment">/* 设置事件位 */</span><br/>
                            <span className="code-comment">// 设置 Bit 0 (传感器就绪) */</span><br/>
                            <span className="code-function">xEventGroupSetBits</span>(<br/>
                            &nbsp;&nbsp;xEventGroup,<br/>
                            &nbsp;&nbsp;EVENT_SENSOR_READY<br/>
                            );<br/><br/>
                            <span className="code-comment">/* ISR 安全版本 */</span><br/>
                            <span className="code-keyword">void</span> <span className="code-function">Sensor_ISR</span>(<span className="code-keyword">void</span>) {<br/>
                            &nbsp;&nbsp;BaseType_t xHigher = pdFALSE;<br/>
                            &nbsp;&nbsp;<span className="code-function">xEventGroupSetBitsFromISR</span>(<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;xEventGroup, EVENT_DATA_RECEIVED,<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&xHigher);<br/>
                            &nbsp;&nbsp;<span className="code-function">portYIELD_FROM_ISR</span>(xHigher);<br/>
                            }<br/>
                        </div>
                    ),
                    2: (
                        <div className="text-sm">
                            <span className="code-comment">/* 等待事件 (多条件) */</span><br/>
                            <span className="code-type">EventBits_t</span> uxEvent = <span className="code-function">xEventGroupWaitBits</span>(<br/>
                            &nbsp;&nbsp;xEventGroup,         <span className="code-comment">// 事件组句柄 */</span><br/>
                            &nbsp;&nbsp;EVENT_SENSOR_READY | <span className="code-comment">// 等待的位 */</span><br/>
                            &nbsp;&nbsp;EVENT_DATA_RECEIVED,<br/>
                            &nbsp;&nbsp;pdTRUE,              <span className="code-comment">// 清除位 (true=自动清除) */</span><br/>
                            &nbsp;&nbsp;pdFALSE,             <span className="code-comment">// 等待模式 (false=OR, true=AND) */</span><br/>
                            &nbsp;&nbsp;portMAX_DELAY       <span className="code-comment">// 超时时间 */</span><br/>
                            );<br/><br/>
                            <span className="code-comment">// 返回值：实际触发的事件位 */</span><br/>
                        </div>
                    ),
                    3: (
                        <div className="text-sm">
                            <span className="code-comment">/* 任务通知 - 轻量级同步 */</span><br/>
                            <span className="code-type">TaskHandle_t</span> xTaskToNotify;<br/><br/>
                            <span className="code-comment">// ISR 中通知任务 */</span><br/>
                            <span className="code-keyword">void</span> <span className="code-function">EXTI_IRQHandler</span>(<span className="code-keyword">void</span>) {<br/>
                            &nbsp;&nbsp;BaseType_t xHigher = pdFALSE;<br/>
                            &nbsp;&nbsp;<span className="code-function">vTaskNotifyGiveFromISR</span>(<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;xTaskToNotify, &xHigher);<br/>
                            &nbsp;&nbsp;<span className="code-function">portYIELD_FROM_ISR</span>(xHigher);<br/>
                            }<br/><br/>
                            <span className="code-comment">// 任务中等待通知 */</span><br/>
                            <span className="code-function">ulTaskNotifyTake</span>(pdTRUE, portMAX_DELAY);<br/>
                        </div>
                    ),
                    4: (
                        <div className="text-sm">
                            <span className="code-comment">/* 设置通知值 */</span><br/>
                            <span className="code-keyword">void</span> <span className="code-function">NotifyTaskWithValue</span>() {<br/>
                            &nbsp;&nbsp;<span className="code-function">xTaskNotify</span>(<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;xTaskToNotify,     <span className="code-comment">// 目标任务句柄 */</span><br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;42,              <span className="code-comment">// 通知值 (32 位) */</span><br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;eSetValueWithOverwrite  <span className="code-comment">// 操作模式 */</span><br/>
                            &nbsp;&nbsp;);<br/>
                            }<br/><br/>
                            <span className="code-comment">// 获取通知值 */</span><br/>
                            <span className="code-type">uint32_t</span> value = <span className="code-function">ulTaskNotifyTake</span>(<br/>
                            &nbsp;&nbsp;pdTRUE,            <span className="code-comment">// 清除通知 */</span><br/>
                            &nbsp;&nbsp;portMAX_DELAY      <span className="code-comment">// 超时时间 */</span><br/>
                            );<br/>
                        </div>
                    ),
                    5: (
                        <div className="text-sm">
                            <span className="code-comment">/* 通知值增强操作 */</span><br/>
                            <span className="code-comment">// 带掩码的设置操作 */</span><br/>
                            <span className="code-function">xTaskNotify</span>(<br/>
                            &nbsp;&nbsp;xTaskToNotify,<br/>
                            &nbsp;&nbsp;(1 &lt;&lt; 5),           <span className="code-comment">// 值 */</span><br/>
                            &nbsp;&nbsp;eSetBits          <span className="code-comment">// 按位或操作 */</span><br/>
                            );<br/><br/>
                            <span className="code-comment">// 带掩码的清除操作 */</span><br/>
                            <span className="code-function">xTaskNotify</span>(<br/>
                            &nbsp;&nbsp;xTaskToNotify,<br/>
                            &nbsp;&nbsp;~(1 &lt;&lt; 3),          <span className="code-comment">// 掩码 */</span><br/>
                            &nbsp;&nbsp;eValueMasked      <span className="code-comment">// 按位与操作 */</span><br/>
                            );<br/>
                        </div>
                    ),
                    6: (
                        <div className="text-sm">
                            <span className="code-comment">/* 多传感器事件同步 */</span><br/>
                            <span className="code-keyword">void</span> <span className="code-function">vSensorTask</span>(<span className="code-keyword">void</span>* pvParams) {<br/>
                            &nbsp;&nbsp;<span className="code-keyword">while</span>(1) {<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;<span className="code-comment">// 等待任意传感器就绪 (OR 模式) */</span><br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;<span className="code-type">EventBits_t</span> events =<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span className="code-function">xEventGroupWaitBits</span>(<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;xSensorEvents,<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;SENSOR_1_RDY | SENSOR_2_RDY |<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;SENSOR_3_RDY,<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;pdFALSE, pdFALSE, 100);<br/><br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;<span className="code-keyword">if</span> (events & SENSOR_1_RDY) {...}<br/>
                            &nbsp;&nbsp;&nbsp;&nbsp;<span className="code-keyword">if</span> (events & SENSOR_2_RDY) {...}<br/>
                            &nbsp;&nbsp;}<br/>
                            }<br/>
                        </div>
                    ),
                    7: (
                        <div className="text-sm">
                            <span className="code-comment">/* 同步机制对比 */</span><br/>
                            <span className="code-comment">// 二值信号量：1 事件，1 任务 */</span><br/>
                            <span className="code-comment">// 事件组：多事件，多任务 (24 位) */</span><br/>
                            <span className="code-comment">// 任务通知：1 事件，1 任务 (最轻量) */</span><br/><br/>
                            <span className="code-comment">/* 选择指南 */</span><br/>
                            <span className="code-keyword">typedef enum</span> {<br/>
                            &nbsp;&nbsp;SYNC_BINARY_SEM,   <span className="code-comment">// ISR→任务，单事件 */</span><br/>
                            &nbsp;&nbsp;SYNC_EVENT_GROUP,  <span className="code-comment">// 多事件同步 */</span><br/>
                            &nbsp;&nbsp;SYNC_TASK_NOTIFY,  <span className="code-comment">// 轻量通知 */</span><br/>
                            &nbsp;&nbsp;SYNC_QUEUE         <span className="code-comment">// 带数据传输 */</span><br/>
                            } SyncSelect_t;<br/>
                        </div>
                    )
                };
                return codeSnippets[currentStep];
            };

            // ========== 渲染可视化区域 ==========
            const renderVisualization = () => {
                if (currentStep === 0) {
                    // 事件组基础
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>事件组 (Event Group)</h3>
                            <div className="border-2 rounded-lg overflow-hidden" style={{borderColor: COLOR_MAP.border}}>
                                <div className="p-2 text-center font-bold" style={{backgroundColor: COLOR_MAP.primary}}>事件寄存器 (24 位)</div>
                                <div className="grid grid-cols-8 gap-1 p-4">
                                    {[...Array(24)].map((_, idx) => (
                                        <div key={idx}
                                            className={`h-10 rounded flex items-center justify-center transition-all ${eventGroupState.bits & (1 << idx) ? 'pulse' : 'opacity-30'}`}
                                            style={{
                                                backgroundColor: eventGroupState.bits & (1 << idx) ? COLOR_MAP.accent : '#374151'
                                            }}>
                                            <span className="text-xs font-bold">{idx}</span>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-2 text-xs text-center" style={{color: COLOR_MAP.text}}>
                                    当前值：0x{eventGroupState.bits.toString(16).toUpperCase()} (二进制：{eventGroupState.bits.toString(2).padStart(8, '0')})
                                </div>
                            </div>
                            <div className="text-xs text-center" style={{color: COLOR_MAP.text}}>
                                每个位代表一个独立事件，可同时等待多个事件
                            </div>
                        </div>
                    );
                }

                if (currentStep === 1) {
                    // 事件位操作
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>事件位设置与清除</h3>
                            <div className="flex justify-center gap-4">
                                {/* 设置按钮 */}
                                <button onClick={() => {
                                    const bitIdx = Math.floor(Math.random() * 8);
                                    setEventAnim({ active: true, bitIndex: bitIdx, action: 'set' });
                                    setEventGroupState(prev => ({ ...prev, bits: prev.bits | (1 << bitIdx) }));
                                    setTimeout(() => setEventAnim({ active: false, bitIndex: 0, action: 'set' }), 500);
                                }}
                                    className="px-6 py-4 rounded-lg font-bold transition-opacity hover:opacity-80"
                                    style={{backgroundColor: COLOR_MAP.accent}}>
                                    设置事件位 (Set)
                                </button>

                                {/* 清除按钮 */}
                                <button onClick={() => {
                                    const bitIdx = Math.floor(Math.random() * 8);
                                    setEventAnim({ active: true, bitIndex: bitIdx, action: 'clear' });
                                    setEventGroupState(prev => ({ ...prev, bits: prev.bits & ~(1 << bitIdx) }));
                                    setTimeout(() => setEventAnim({ active: false, bitIndex: 0, action: 'clear' }), 500);
                                }}
                                    className="px-6 py-4 rounded-lg font-bold transition-opacity hover:opacity-80"
                                    style={{backgroundColor: '#6b7280'}}>
                                    清除事件位 (Clear)
                                </button>
                            </div>

                            {/* 事件位显示 */}
                            <div className="flex justify-center gap-2">
                                {[...Array(8)].map((_, idx) => (
                                    <div key={idx}
                                        className={`w-12 h-16 rounded-lg flex flex-col items-center justify-center transition-all bit-set ${eventAnim.active && eventAnim.bitIndex === idx ? 'scale-125' : ''}`}
                                        style={{
                                            backgroundColor: eventGroupState.bits & (1 << idx) ? COLOR_MAP.accent : '#374151'
                                        }}>
                                        <span className="text-xs mb-1">Bit{idx}</span>
                                        <span className="font-bold">{eventGroupState.bits & (1 << idx) ? '1' : '0'}</span>
                                    </div>
                                ))}
                            </div>

                            <div className="text-xs text-center" style={{color: COLOR_MAP.text}}>
                                点击按钮随机设置/清除事件位
                            </div>
                        </div>
                    );
                }

                if (currentStep === 2) {
                    // 事件等待
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>事件等待模式 (AND/OR)</h3>

                            {/* OR 模式 */}
                            <div className="p-4 rounded-lg" style={{backgroundColor: 'rgba(6,182,212,0.2)'}}>
                                <div className="font-bold mb-2" style={{color: COLOR_MAP.secondary}}>OR 模式 (任意事件)</div>
                                <div className="flex items-center gap-4">
                                    <div className="flex-1 space-y-2">
                                        {[
                                            {bit: 0, label: '事件 A', set: true},
                                            {bit: 1, label: '事件 B', set: false},
                                            {bit: 2, label: '事件 C', set: true}
                                        ].map((evt) => (
                                            <div key={evt.bit} className="flex items-center gap-2">
                                                <div className={`w-8 h-8 rounded flex items-center justify-center ${evt.set ? 'pulse' : 'opacity-30'}`} style={{backgroundColor: evt.set ? COLOR_MAP.accent : '#374151'}}>
                                                    {evt.set ? '✓' : '×'}
                                                </div>
                                                <span>{evt.label}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="text-2xl">→</div>
                                    <div className="w-20 h-20 rounded-full flex items-center justify-center pulse" style={{backgroundColor: '#10b981'}}>
                                        <span className="text-3xl">✓</span>
                                    </div>
                                </div>
                                <div className="text-xs mt-2">任一事件触发 → 任务唤醒</div>
                            </div>

                            {/* AND 模式 */}
                            <div className="p-4 rounded-lg" style={{backgroundColor: 'rgba(168,85,247,0.2)'}}>
                                <div className="font-bold mb-2" style={{color: COLOR_MAP.primary}}>AND 模式 (所有事件)</div>
                                <div className="flex items-center gap-4">
                                    <div className="flex-1 space-y-2">
                                        {[
                                            {bit: 0, label: '事件 A', set: true},
                                            {bit: 1, label: '事件 B', set: true},
                                            {bit: 2, label: '事件 C', set: false}
                                        ].map((evt) => (
                                            <div key={evt.bit} className="flex items-center gap-2">
                                                <div className={`w-8 h-8 rounded flex items-center justify-center ${evt.set ? 'pulse' : 'opacity-30'}`} style={{backgroundColor: evt.set ? COLOR_MAP.primary : '#374151'}}>
                                                    {evt.set ? '✓' : '×'}
                                                </div>
                                                <span>{evt.label}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="text-2xl">→</div>
                                    <div className="w-20 h-20 rounded-full flex items-center justify-center" style={{backgroundColor: '#ef4444'}}>
                                        <span className="text-3xl">×</span>
                                    </div>
                                </div>
                                <div className="text-xs mt-2">所有事件触发 → 任务唤醒 (C 未触发，继续等待)</div>
                            </div>
                        </div>
                    );
                }

                if (currentStep === 3) {
                    // 任务通知基础
                    return (
                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-center mb-4" style={{color: COLOR_MAP.text}}>任务通知 (Task Notification)</h3>
                            <div className="relative">
                                {/* 通知者 */}
                                <div className="p-4 rounded-lg mb-4" style={{backgroundColor: 'rgba(6,182,212,0.2)'}}>
                                    <div className="font-bold flex items-center gap-2" style={{color: COLOR_MAP.secondary}}>
                                        <span>⚡</span> 通知者 (ISR/Task)
                                    </div>

                                    </div>
