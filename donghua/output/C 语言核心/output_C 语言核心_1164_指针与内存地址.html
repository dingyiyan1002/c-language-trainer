<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1164 - 指针与内存地址 - 嵌入式 C 可视化动画</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes flow { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
    @keyframes highlight { 0%, 100% { box-shadow: 0 0 5px rgba(249, 115, 22, 0.5); } 50% { box-shadow: 0 0 20px rgba(249, 115, 22, 0.8); } }
    .animate-pulse { animation: pulse 1.5s ease-in-out infinite; }
    .animate-blink { animation: blink 0.5s ease-in-out infinite; }
    .animate-slideIn { animation: slideIn 0.5s ease-out forwards; }
    .animate-scaleIn { animation: scaleIn 0.5s ease-out forwards; }
    .animate-flow { animation: flow 1.5s linear infinite; }
    .animate-highlight { animation: highlight 1.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gray-900 text-white">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const COLOR_MAP = {
      primary: '#f97316',
      secondary: '#fb923c',
      accent: '#fdba74',
      bg: '#7c2d12',
      text: '#ffedd5',
      border: '#ea580c'
    };

    const STEPS = [
      { title: '指针概述', voice: '指针是 C 语言中最强大的特性之一。指针本质上是一个变量，它存储的是另一个变量的内存地址。通过指针可以直接访问和操作内存，这在嵌入式编程中尤为重要。' },
      { title: '内存模型', voice: '程序内存分为多个区域：代码区存储程序指令，全局区存储全局变量和静态变量，栈区存储局部变量和函数调用信息，堆区用于动态内存分配。' },
      { title: '地址与取值', voice: '取地址运算符&获取变量的内存地址，解引用运算符*获取指针指向的值。指针声明时*表示这是一个指针变量，使用时*表示取指针指向的值。' },
      { title: '指针运算', voice: '指针可以进行算术运算。指针加 1 不是地址值加 1，而是加上所指类型的大小。int 指针加 1 地址增加 4 字节，char 指针加 1 地址增加 1 字节。' },
      { title: '指针与数组', voice: '数组名本质上是指向数组首元素的常量指针。可以通过指针访问数组元素，数组下标操作 arr[i] 等价于*(arr+i)。指针可以遍历数组提高效率。' },
      { title: '指针与函数', voice: '指针作为函数参数可以实现传址调用，函数内部可以修改实参的值。函数也可以返回指针，但要注意不能返回局部变量的地址。' },
      { title: '二级指针', voice: '二级指针是指向指针的指针，使用**声明。二级指针常用于动态二维数组、修改指针变量的值、指针数组等场景。' },
      { title: 'void 指针', voice: 'void 指针是通用指针类型，可以指向任何数据类型。void 指针不能直接解引用，必须先强制类型转换。常用于函数参数实现泛型功能。' }
    ];

    function App() {
      const [currentStep, setCurrentStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(true);
      const [voiceStatus, setVoiceStatus] = useState('就绪');
      const voiceEndTimerRef = useRef(null);

      useEffect(() => {
        if (!isPlaying) return;
        const step = STEPS[currentStep];
        setVoiceStatus('播放中...');

        const utterance = new SpeechSynthesisUtterance(step.voice);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;

        const voices = speechSynthesis.getVoices();
        const xiaoxiao = voices.find(v => v.name.includes('Xiaoxiao') || v.name.includes('zh-CN'));
        if (xiaoxiao) utterance.voice = xiaoxiao;

        utterance.onend = () => {
          setVoiceStatus('已完成');
          voiceEndTimerRef.current = setTimeout(() => {
            if (currentStep < STEPS.length - 1) {
              setCurrentStep(prev => prev + 1);
            } else {
              setIsPlaying(false);
            }
          }, 800);
        };

        utterance.onerror = () => {
          setVoiceStatus('播放失败');
          voiceEndTimerRef.current = setTimeout(() => {
            if (currentStep < STEPS.length - 1) {
              setCurrentStep(prev => prev + 1);
            }
          }, 800);
        };

        speechSynthesis.speak(utterance);
        return () => clearTimeout(voiceEndTimerRef.current);
      }, [currentStep, isPlaying]);

      const handlePlay = () => {
        setCurrentStep(0);
        setIsPlaying(true);
        speechSynthesis.cancel();
      };

      const handlePause = () => {
        setIsPlaying(false);
        speechSynthesis.cancel();
      };

      const handleNext = () => {
        if (currentStep < STEPS.length - 1) {
          setCurrentStep(prev => prev + 1);
          speechSynthesis.cancel();
        }
      };

      const handlePrev = () => {
        if (currentStep > 0) {
          setCurrentStep(prev => prev - 1);
          speechSynthesis.cancel();
        }
      };

      const renderStepContent = () => {
        switch(currentStep) {
          case 0: return <Step0Overview />;
          case 1: return <Step1MemoryModel />;
          case 2: return <Step2AddrDeref />;
          case 3: return <Step3PointerMath />;
          case 4: return <Step4PointerArray />;
          case 5: return <Step5PointerFunc />;
          case 6: return <Step6DoublePointer />;
          case 7: return <Step7VoidPointer />;
          default: return <Step0Overview />;
        }
      };

      return (
        <div className="min-h-screen p-4" style={{ background: `linear-gradient(135deg, ${COLOR_MAP.bg} 0%, #0f172a 100%)` }}>
          <div className="mb-4 flex items-center justify-between" style={{ backgroundColor: 'rgba(30, 41, 59, 0.8)', borderRadius: '12px', padding: '16px' }}>
            <div>
              <h1 className="text-2xl font-bold" style={{ color: COLOR_MAP.text }}>1164 - 指针与内存地址</h1>
              <p className="text-sm" style={{ color: COLOR_MAP.accent }}>Embedded C - Pointer and Memory Address</p>
            </div>
            <div className="flex items-center gap-4">
              <div className="text-sm" style={{ color: COLOR_MAP.accent }}>
                {voiceStatus} | 步骤 {currentStep + 1}/{STEPS.length}
              </div>
              <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 rounded disabled:opacity-50" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>上一个</button>
              {!isPlaying ? (
                <button onClick={handlePlay} className="px-4 py-2 rounded" style={{ backgroundColor: '#10b981', color: 'white' }}>播放</button>
              ) : (
                <button onClick={handlePause} className="px-4 py-2 rounded" style={{ backgroundColor: '#f59e0b', color: 'white' }}>暂停</button>
              )}
              <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} className="px-4 py-2 rounded disabled:opacity-50" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>下一个</button>
            </div>
          </div>

          <div className="grid grid-cols-3 gap-4 h-[calc(100vh-150px)]">
            <div className="rounded-lg overflow-hidden shadow-xl" style={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', border: `2px solid ${COLOR_MAP.border}` }}>
              <div className="px-4 py-2 font-semibold" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>代码示例</div>
              <pre className="p-4 text-sm overflow-auto h-full text-gray-100 font-mono">
                <code>{renderStepContent()}</code>
              </pre>
            </div>

            <div className="rounded-lg overflow-hidden shadow-xl" style={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', border: `2px solid ${COLOR_MAP.border}` }}>
              <div className="px-4 py-2 font-semibold" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>可视化动画</div>
              <div className="p-4 h-full overflow-auto">
                {renderVisualization()}
              </div>
            </div>

            <div className="rounded-lg overflow-hidden shadow-xl" style={{ backgroundColor: 'rgba(15, 23, 42, 0.9)', border: `2px solid ${COLOR_MAP.border}` }}>
              <div className="px-4 py-2 font-semibold" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>解释说明</div>
              <div className="p-4 space-y-3 h-full overflow-auto">
                <div className="p-3 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}20` }}>
                  <div className="font-bold mb-2" style={{ color: COLOR_MAP.text }}>{STEPS[currentStep].title}</div>
                  <p style={{ color: COLOR_MAP.accent }}>{STEPS[currentStep].voice}</p>
                </div>
                {renderExplanation()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function renderVisualization() {
      switch(currentStep) {
        case 0: return <Step0OverviewViz />;
        case 1: return <Step1MemoryModelViz />;
        case 2: return <Step2AddrDerefViz />;
        case 3: return <Step3PointerMathViz />;
        case 4: return <Step4PointerArrayViz />;
        case 5: return <Step5PointerFuncViz />;
        case 6: return <Step6DoublePointerViz />;
        case 7: return <Step7VoidPointerViz />;
        default: return <Step0OverviewViz />;
      }
    }

    function renderExplanation() {
      switch(currentStep) {
        case 0: return <Step0OverviewExp />;
        case 1: return <Step1MemoryModelExp />;
        case 2: return <Step2AddrDerefExp />;
        case 3: return <Step3PointerMathExp />;
        case 4: return <Step4PointerArrayExp />;
        case 5: return <Step5PointerFuncExp />;
        case 6: return <Step6DoublePointerExp />;
        case 7: return <Step7VoidPointerExp />;
        default: return null;
      }
    }

    function Step0Overview() {
      return `/**
 * 指针与内存地址 - 概述
 * Pointer and Memory Address
 *
 * 指针本质:
 * - 存储内存地址的变量
 * - 直接访问内存的钥匙
 * - 嵌入式编程的核心
 */

// 指针声明
int *ptr;          // 指向 int 的指针
char *str;         // 指向 char 的指针
float *fptr;       // 指向 float 的指针
void *vptr;        // 通用指针 (void*)

// 指针相关运算符
// &  : 取地址 (Address of)
// *  : 解引用 (Dereference)

// 示例
int var = 100;
int *ptr = &var;   // ptr 存储 var 的地址
int val = *ptr;    // val = 100, 取 ptr 指向的值

// 指针重要性
// 1. 直接操作硬件寄存器
// 2. 高效传递大数据
// 3. 动态内存管理
// 4. 实现数据结构 (链表/树等)`;
    }

    function Step0OverviewViz() {
      return (
        <div className="space-y-4">
          <div className="text-center mb-4">
            <div className="text-lg font-bold" style={{ color: COLOR_MAP.text }}>指针概念</div>
          </div>
          <div className="p-4 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}20`, border: `2px solid ${COLOR_MAP.border}` }}>
            <div className="flex justify-between items-center">
              <div className="p-3 rounded text-center" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>
                <div className="font-bold text-sm">指针变量 ptr</div>
                <div className="text-xs mt-2 font-mono">0x2000</div>
                <div className="text-xs" style={{ color: COLOR_MAP.accent }}>存储地址</div>
              </div>
              <div className="flex items-center">
                <div className="w-24 h-0.5" style={{ backgroundColor: COLOR_MAP.accent }}></div>
                <div className="w-3 h-3 rotate-45 -mx-2" style={{ backgroundColor: COLOR_MAP.accent }}></div>
                <div className="text-xs mx-2" style={{ color: COLOR_MAP.text }}>指向</div>
              </div>
              <div className="p-3 rounded text-center" style={{ backgroundColor: COLOR_MAP.secondary, color: 'white' }}>
                <div className="font-bold text-sm">变量 var</div>
                <div className="text-xs mt-2 font-mono">100</div>
                <div className="text-xs" style={{ color: COLOR_MAP.accent }}>地址：0x2000</div>
              </div>
            </div>
            <div className="mt-4 grid grid-cols-2 gap-3">
              <div className="p-2 rounded text-center text-xs" style={{ backgroundColor: `${COLOR_MAP.accent}20`, border: `1px solid ${COLOR_MAP.accent}`, color: COLOR_MAP.text }}>
                <div>ptr = &var;</div>
                <div style={{ color: COLOR_MAP.text }}>ptr 得到 var 的地址</div>
              </div>
              <div className="p-2 rounded text-center text-xs" style={{ backgroundColor: `${COLOR_MAP.accent}20`, border: `1px solid ${COLOR_MAP.accent}`, color: COLOR_MAP.text }}>
                <div>*ptr = 100;</div>
                <div style={{ color: COLOR_MAP.text }}>解引用取到值</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Step0OverviewExp() {
      return (
        <div className="space-y-2 text-sm" style={{ color: COLOR_MAP.accent }}>
          <p><strong style={{ color: COLOR_MAP.text }}>指针本质：</strong> 指针是一个变量，但它存储的不是普通值，而是另一个变量的内存地址。通过指针可以间接访问和修改该地址的数据。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>嵌入式应用：</strong> 在嵌入式 C 中，指针用于访问硬件寄存器 (如#define REG (*(volatile uint32_t*)0x40020000))、操作缓冲区、实现数据结构等。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>指针声明：</strong> int *ptr 声明一个指向 int 的指针。*表示这是指针变量，int 表示它指向的数据类型。</p>
        </div>
      );
    }

    function Step1MemoryModel() {
      return `/**
 * 内存模型
 */

// 程序内存布局
// ┌─────────────────────────┐ 高地址
// │    内核空间 (Kernel)     │
// ├─────────────────────────┤
// │    代码区 (.text)        │  存储程序指令
// │    (只读，固定大小)       │
// ├─────────────────────────┤
// │    数据区 (.data)        │  已初始化全局/静态变量
// │    .bss 段               │  未初始化全局/静态变量
// ├─────────────────────────┤
// │         堆 (Heap)        │  动态分配，向上增长
// │         ↑                │
// │         │ 空闲区域        │
// │         ↓                │
// │         栈 (Stack)       │  自动增长，向下增长
// ├─────────────────────────┤
// │    用户空间              │
// └─────────────────────────┘ 低地址

// 各区域特点
// 代码区：只读，存储指令
// 数据区：全局变量，静态变量
// 堆：malloc/free 动态分配
// 栈：局部变量，函数调用`;
    }

    function Step1MemoryModelViz() {
      return (
        <div className="space-y-2">
          <div className="text-center font-bold mb-2" style={{ color: COLOR_MAP.text }}>内存布局</div>
          <div className="space-y-1">
            <div className="p-2 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.primary}30`, border: `1px solid ${COLOR_MAP.primary}` }}>
              <div className="font-bold text-xs" style={{ color: COLOR_MAP.text }}>代码区 (.text)</div>
              <div className="text-xs" style={{ color: COLOR_MAP.accent }}>程序指令 · 只读</div>
            </div>
            <div className="p-2 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.secondary}30`, border: `1px solid ${COLOR_MAP.secondary}` }}>
              <div className="font-bold text-xs" style={{ color: COLOR_MAP.text }}>数据区 (.data/.bss)</div>
              <div className="text-xs" style={{ color: COLOR_MAP.accent }}>全局变量 · 静态变量</div>
            </div>
            <div className="p-2 rounded text-center" style={{ backgroundColor: `${COLOR_MAP.accent}30`, border: `1px solid ${COLOR_MAP.accent}` }}>
              <div className="font-bold text-xs" style={{ color: COLOR_MAP.text }}>堆 (Heap)</div>
              <div className="text-xs" style={{ color: COLOR_MAP.text }}>malloc/free · 向上增长</div>
            </div>
            <div className="text-center text-xs" style={{ color: COLOR_MAP.accent }}>↑ ↓ 空闲区域</div>
            <div className="p-2 rounded text-center animate-pulse" style={{ backgroundColor: `${COLOR_MAP.bg}60`, border: `1px solid ${COLOR_MAP.border}` }}>
              <div className="font-bold text-xs" style={{ color: COLOR_MAP.text }}>栈 (Stack)</div>
              <div className="text-xs" style={{ color: COLOR_MAP.accent }}>局部变量 · 向下增长</div>
            </div>
          </div>
        </div>
      );
    }

    function Step1MemoryModelExp() {
      return (
        <div className="space-y-2 text-sm" style={{ color: COLOR_MAP.accent }}>
          <p><strong style={{ color: COLOR_MAP.text }}>代码区：</strong> 存储程序的可执行指令，只读。函数代码位于此区域。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>数据区：</strong> .data 段存储已初始化的全局变量和静态变量，.bss 段存储未初始化的全局变量和静态变量 (自动初始化为 0)。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>堆和栈：</strong> 堆用于动态内存分配 (malloc/free)，向上增长。栈用于局部变量和函数调用，向下增长。两者相向增长，可能相遇导致栈溢出。</p>
        </div>
      );
    }

    function Step2AddrDeref() {
      return `/**
 * 地址运算符 & 和 解引用运算符 *
 */

// 变量与地址
int var = 42;
// 内存示意:
// 地址      值
// 0x1000:  42

// & 取地址运算符
int *ptr = &var;
// ptr 的值是 0x1000 (var 的地址)

// * 解引用运算符
int val = *ptr;
// val = 42 (取 ptr 指向地址的值)

// 完整示例
int a = 10;
int *p = &a;      // p 指向 a
*p = 20;          // 修改 a 的值为 20
printf("%d", a);  // 输出 20

// & 和*互为逆运算
int x = 100;
int *px = &x;     // &x 得到 x 的地址
int y = *&x;      // y = 100 (&和*抵消)
int z = *px;      // z = 100`;
    }

    function Step2AddrDerefViz() {
      return (
        <div className="space-y-3">
          <div className="text-center font-bold mb-2" style={{ color: COLOR_MAP.text }}>& 和 * 运算符</div>
          <div className="p-3 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}20`, border: `2px solid ${COLOR_MAP.border}` }}>
            <div className="space-y-2 text-xs">
              <div className="flex items-center gap-2">
                <div className="w-20 font-bold" style={{ color: COLOR_MAP.text }}>int var = 42;</div>
                <div className="flex-1 p-1 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}30`, border: `1px solid ${COLOR_MAP.primary}` }}>
                  <span style={{ color: COLOR_MAP.text }}>地址：0x1000</span>
                  <span className="mx-2" style={{ color: COLOR_MAP.accent }}>|</span>
                  <span style={{ color: COLOR_MAP.text }}>值：42</span>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-20 font-bold" style={{ color: COLOR_MAP.text }}>&var</div>
                <div className="flex-1 p-1 rounded" style={{ backgroundColor: `${COLOR_MAP.secondary}30`, border: `1px solid ${COLOR_MAP.secondary}` }}>
                  <span style={{ color: COLOR_MAP.text }}>得到地址：0x1000</span>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-20 font-bold" style={{ color: COLOR_MAP.text }}>int *ptr = &var;</div>
                <div className="flex-1 p-1 rounded" style={{ backgroundColor: `${COLOR_MAP.accent}30`, border: `1px solid ${COLOR_MAP.accent}` }}>
                  <span style={{ color: COLOR_MAP.text }}>ptr 存储 0x1000</span>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-20 font-bold" style={{ color: COLOR_MAP.text }}>*ptr</div>
                <div className="flex-1 p-1 rounded animate-pulse" style={{ backgroundColor: COLOR_MAP.primary, color: 'white' }}>
                  <span>解引用得到：42</span>
                </div>
              </div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2 text-xs text-center">
            <div className="p-2 rounded" style={{ backgroundColor: `${COLOR_MAP.primary}30`, border: `1px solid ${COLOR_MAP.primary}`, color: COLOR_MAP.text }}>
              & : 取地址
            </div>
            <div className="p-2 rounded" style={{ backgroundColor: `${COLOR_MAP.secondary}30`, border: `1px solid ${COLOR_MAP.secondary}`, color: COLOR_MAP.text }}>
              * : 取指针指向的值
            </div>
          </div>
        </div>
      );
    }

    function Step2AddrDerefExp() {
      return (
        <div className="space-y-2 text-sm" style={{ color: COLOR_MAP.accent }}>
          <p><strong style={{ color: COLOR_MAP.text }}>& 取地址：</strong> & 是一元运算符，返回操作数的内存地址。&var 返回变量 var 的地址。这个地址值可以赋给指针变量。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>* 解引用：</strong> * 也是一元运算符，用于访问指针指向的内存位置。*ptr 返回 ptr 所存储地址处的值。*有时也叫"间接寻址运算符"。</p>

          <p><strong style={{ color: COLOR_MAP.text }}>通用指针：</strong> void* 是"无类型"指针，可以存储任何类型变量的地址。这使 void* 成为泛型编程的基础。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>使用限制：</strong> void* 不能直接解引用 (*vptr 非法)，不能直接指针运算 (vptr++ 非法)。必须先强制转换为具体类型指针。</p>
          <p><strong style={{ color: COLOR_MAP.text }}>应用场景：</strong> malloc/free 返回/接收 void*；泛型函数参数 (如 qsort、bsearch)；数据存储不知道具体类型时。</p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
