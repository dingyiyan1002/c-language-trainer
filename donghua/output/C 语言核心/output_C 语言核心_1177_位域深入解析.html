<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1177 - 位域深入解析 - C 语言核心</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flow { 0% { transform: translateY(0); } 50% { transform: translateY(-5px); } 100% { transform: translateY(0); } }
        @keyframes highlight { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(251,191,36,0.2); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bitFill { from { width: 0%; } to { width: 100%; } }
        .animate-pulse { animation: pulse 2s infinite; }
        .animate-blink { animation: blink 1s infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.5s ease-out; }
        .animate-flow { animation: flow 2s infinite; }
        .animate-highlight { animation: highlight 1.5s infinite; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out; }
        .animate-bitFill { animation: bitFill 1s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const COLOR_MAP = {
            primary: 'from-teal-500 to-cyan-600',
            light: 'from-teal-50 to-cyan-50',
            text: 'text-teal-600',
            bg: 'bg-teal-50',
            border: 'border-teal-200',
            hover: 'hover:bg-teal-100'
        };

        const CODE_EXAMPLES = [
            {
                title: "位域声明基础",
                code: `struct BitField {
    unsigned int flag1 : 1;  // 1 位，值 0-1
    unsigned int flag2 : 2;  // 2 位，值 0-3
    unsigned int mode  : 4;  // 4 位，值 0-15
    unsigned int       : 3;  // 3 位填充 (未命名)
    unsigned int data  : 6;  // 6 位，值 0-63
};
// 总计：16 位 = 2 字节`,
                highlight: ": 1",
                explanation: "位域使用冒号后跟位数来声明\n允许在结构体中精确控制每个字段的位数\n未命名位域用于填充和对齐"
            },
            {
                title: "位域内存布局",
                code: `union BitView {
    struct {
        uint8_t b0: 1;  // 位 0
        uint8_t b1: 1;  // 位 1
        uint8_t b2: 1;  // 位 2
        uint8_t b3: 1;  // 位 3
        uint8_t b4: 1;  // 位 4
        uint8_t b5: 1;  // 位 5
        uint8_t b6: 1;  // 位 6
        uint8_t b7: 1;  // 位 7
    } bits;
    uint8_t byte;  // 整体访问
};

union BitView bv;
bv.byte = 0b10110101;
printf("b0=%d, b2=%d, b7=%d\\n",
       bv.bits.b0, bv.bits.b2, bv.bits.b7);`,
                highlight: "bits",
                explanation: "联合体实现位级和字节级双重访问\n适用于硬件寄存器配置\n位域在联合体内紧凑排列"
            },
            {
                title: "硬件寄存器映射",
                code: `// STM32 GPIO 控制寄存器
typedef struct {
    uint32_t MODE0 : 2;   // 位 0-1: 引脚 0 模式
    uint32_t MODE1 : 2;   // 位 2-3: 引脚 1 模式
    uint32_t MODE2 : 2;   // 位 4-5: 引脚 2 模式
    uint32_t MODE3 : 2;   // 位 6-7: 引脚 3 模式
    uint32_t MODE4 : 2;   // 位 8-9: 引脚 4 模式
    uint32_t MODE5 : 2;   // 位 10-11: 引脚 5 模式
    uint32_t MODE6 : 2;   // 位 12-13: 引脚 6 模式
    uint32_t MODE7 : 2;   // 位 14-15: 引脚 7 模式
    uint32_t MODE8 : 2;   // 位 16-17: 引脚 8 模式
    uint32_t MODE9 : 2;   // 位 18-19: 引脚 9 模式
    uint32_t MODE10: 2;   // 位 20-21: 引脚 10 模式
    uint32_t MODE11: 2;   // 位 22-23: 引脚 11 模式
    uint32_t MODE12: 2;   // 位 24-25: 引脚 12 模式
    uint32_t MODE13: 2;   // 位 26-27: 引脚 13 模式
    uint32_t MODE14: 2;   // 位 28-29: 引脚 14 模式
    uint32_t MODE15: 2;   // 位 30-31: 引脚 15 模式
} GPIO_MODER_TypeDef;

#define GPIOA_MODER (*(GPIO_MODER_TypeDef*)0x48000000)`,
                highlight: "MODE",
                explanation: "位域完美匹配硬件寄存器布局\n每个 GPIO 引脚模式占用 2 位\n直接通过结构体成员访问，无需移位掩码"
            },
            {
                title: "有符号位域",
                code: `struct SignedBits {
    int temp     : 12;  // 12 位有符号，-2048~2047
    int humidity : 10;  // 10 位有符号，-512~511
    int pressure : 8;   // 8 位有符号，-128~127
};

struct SignedBits sensor;
sensor.temp = -100;      // 有效
sensor.temp = 3000;      // ❌ 溢出！

// 位域大小决定取值范围
// n 位有符号范围：-2^(n-1) ~ 2^(n-1)-1`,
                highlight: "int",
                explanation: "有符号位域最高位为符号位\n赋值超出范围会导致未定义行为\n通常使用 unsigned 避免符号扩展问题"
            },
            {
                title: "位域对齐与移植性",
                code: `// ⚠️ 位域布局依赖编译器实现！
struct Portable {
    uint8_t a : 4;
    uint8_t b : 4;
    // GCC/Clang: 紧凑排列在 1 字节内
    // MSVC: 可能按 int 对齐

// ✅ 可移植的做法
struct Safe {
    uint16_t field;
    #define GET_A(x)  ((x) & 0x0F)
    #define GET_B(x)  (((x) >> 4) & 0x0F)
    #define SET_A(x,v) ((x) = ((x) & 0xF0) | ((v) & 0x0F))
};`,
                highlight: "⚠️",
                explanation: "位域内存布局由编译器定义\n跨平台代码建议使用位操作宏\n或使用静态断言验证布局"
            },
            {
                title: "位域实际案例：CAN 总线",
                code: `// CAN 2.0B 标准帧
typedef struct {
    uint32_t STDID : 11;  // 标准标识符
    uint32_t IDE   : 1;   // 标识符扩展 (0=标准)
    uint32_t RTR   : 1;   // 远程传输请求
    uint32_t DLC   : 4;   // 数据长度码 (0-8)
    uint32_t DATA0 : 8;   // 数据字节 0
    uint32_t DATA1 : 8;   // 数据字节 1
    // ... 更多数据字节
} CAN_Frame;

// 使用示例
CAN_Frame frame;
frame.STDID = 0x123;  // 11 位 ID
frame.RTR = 0;        // 数据帧
frame.DLC = 8;        // 8 字节数据`,
                highlight: "STDID",
                explanation: "CAN 协议帧天然适合位域表示\n每个字段位数精确定义\n无需手动移位/掩码操作"
            },
            {
                title: "位域 vs 位操作宏",
                code: `// 位域方式
struct Flags {
    unsigned ready   : 1;
    unsigned busy    : 1;
    unsigned error   : 1;
    unsigned channel : 5;
};
struct Flags f;
f.ready = 1;          // ✓ 直观
f.channel = 0x1F;     // ✓ 自动掩码

// 宏方式
#define SET_READY(reg)   ((reg) |= 0x01)
#define GET_CHANNEL(reg) ((reg) >> 3 & 0x1F)
uint8_t reg = 0;
SET_READY(reg);         // ✓ 可移植
uint8_t ch = GET_CHANNEL(reg);`,
                highlight: "ready",
                explanation: "位域：代码可读性好，但移植性差\n宏：可移植性好，但代码冗长\n根据项目需求选择合适方案"
            },
            {
                title: "位域最佳实践总结",
                code: `// ✅ 推荐使用场景
// 1. 硬件寄存器映射 (已知布局)
// 2. 协议帧解析 (标准定义)
// 3. 内存受限的嵌入式系统
// 4. 内部工具/原型开发

// ⚠️ 谨慎使用场景
// 1. 跨平台库代码
// 2. 需要二进制兼容的 API
// 3. 网络协议 (字节序问题)
// 4. 文件持久化存储

// 💡 替代方案
// 使用位操作宏 + 静态断言验证
#include <stdint.h>
_Static_assert(sizeof(struct BitField) == 2,
               "位域大小验证");`,
                highlight: "✅",
                explanation: "位域是强大但有风险的工具\n明确使用场景和限制\n必要时使用编译时断言验证"
            }
        ];

        function App() {
            const [step, setStep] = React.useState(0);
            const [voiceEndTimer, setVoiceEndTimer] = React.useState(null);
            const voiceEndTimerRef = React.useRef(null);

            React.useEffect(() => {
                speakCurrentStep();
                return () => {
                    if (voiceEndTimerRef.current) {
                        clearTimeout(voiceEndTimerRef.current);
                    }
                };
            }, []);

            const speakCurrentStep = () => {
                if (voiceEndTimerRef.current) {
                    clearTimeout(voiceEndTimerRef.current);
                }

                const currentExample = CODE_EXAMPLES[step];
                const explanations = [
                    "位域允许在结构体中声明指定位数的成员，用于节省内存或映射硬件寄存器。语法是在成员名后加冒号和位数。",
                    "联合体中的位域可以实现位级和字节级的双重访问。改变 byte 会影响所有 bits 成员，反之亦然。这在硬件寄存器操作中非常有用。",
                    "位域在嵌入式开发中广泛用于映射硬件寄存器。例如 STM32 的 GPIO 模式寄存器，每个引脚占用 2 位，共 16 个引脚占 32 位。",
                    "有符号位域的最高位是符号位。12 位有符号数的范围是负 2048 到 2047。赋值超出范围会导致未定义行为，通常建议使用无符号位域。",
                    "位域的内存布局由编译器实现定义，不同编译器可能有不同的对齐方式。跨平台代码建议使用位操作宏来保证可移植性。",
                    "CAN 总线协议帧天然适合用位域表示。标准标识符占 11 位，加上控制位和数据字节，可以直接映射 CAN 帧结构。",
                    "位域方式代码更直观可读，但移植性较差。位操作宏方式可移植性好，但代码较冗长。根据项目需求选择合适方案。",
                    "位域适用于硬件寄存器映射、协议帧解析、内存受限系统。不推荐用于跨平台库、网络协议或文件存储等场景。"
                ];

                const text = `第${step + 1}步：${currentExample.title}。${explanations[step]}`;

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.0;
                utterance.pitch = 1.0;

                const voices = speechSynthesis.getVoices();
                const xiaoxiaoVoice = voices.find(voice =>
                    voice.name.includes('Xiaoxiao') ||
                    voice.name.includes('zh-CN')
                );
                if (xiaoxiaoVoice) {
                    utterance.voice = xiaoxiaoVoice;
                }

                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        setStep(prev => (prev + 1) % CODE_EXAMPLES.length);
                    }, 800);
                };

                utterance.onerror = (event) => {
                    console.error('语音合成错误:', event);
                    voiceEndTimerRef.current = setTimeout(() => {
                        setStep(prev => (prev + 1) % CODE_EXAMPLES.length);
                    }, 800);
                };

                speechSynthesis.speak(utterance);
            };

            React.useEffect(() => {
                speakCurrentStep();
            }, [step]);

            const renderMemoryLayout = () => {
                return (
                    <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                        <h4 className="text-lg font-bold text-teal-800 mb-4">位域内存布局可视化</h4>
                        <div className="space-y-4">
                            <div className="grid grid-cols-16 gap-1">
                                {[...Array(16)].map((_, i) => (
                                    <div key={i} className={`text-center p-2 rounded text-sm ${
                                        i === 0 ? 'bg-teal-200' :
                                        i >= 1 && i <= 2 ? 'bg-cyan-200' :
                                        i >= 3 && i <= 6 ? 'bg-blue-200' :
                                        i >= 7 && i <= 9 ? 'bg-gray-200' :
                                        'bg-purple-200'
                                    }`}>
                                        <div className="text-xs text-gray-600">位{i}</div>
                                        <div className="font-bold text-gray-800">
                                            {i === 0 ? 'flag1' :
                                             i >= 1 && i <= 2 ? 'flag2' :
                                             i >= 3 && i <= 6 ? 'mode' :
                                             i >= 7 && i <= 9 ? '填充' :
                                             'data'}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-between text-xs text-gray-600 mt-2">
                                <span>0</span>
                                <span>15</span>
                            </div>
                        </div>
                        <div className="mt-4 p-3 bg-white rounded border border-teal-200">
                            <p className="text-sm text-teal-700">
                                <span className="font-bold">struct BitField:</span> flag1(1 位) + flag2(2 位) + mode(4 位) + 填充 (3 位) + data(6 位) = 16 位 = 2 字节
                            </p>
                        </div>
                    </div>
                );
            };

            const renderBitOperations = () => {
                const bits = [0, 1, 0, 1, 1, 0, 1, 0];
                return (
                    <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                        <h4 className="text-lg font-bold text-teal-800 mb-4">位操作对比</h4>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="p-4 bg-white rounded border border-teal-200">
                                <h5 className="font-bold text-teal-700 mb-2">位域方式</h5>
                                <pre className="text-xs bg-gray-50 p-2 rounded overflow-x-auto">
{`struct {
  unsigned a:4;
  unsigned b:4;
} f;
f.a = 0x0A;  // 自动掩码
f.b = 0x05;`}
                                </pre>
                            </div>
                            <div className="p-4 bg-white rounded border border-cyan-200">
                                <h5 className="font-bold text-cyan-700 mb-2">位操作宏方式</h5>
                                <pre className="text-xs bg-gray-50 p-2 rounded overflow-x-auto">
{`#define SET_A(v) \\
  reg = (reg & 0xF0) | ((v) & 0x0F)
#define SET_B(v) \\
  reg = (reg & 0x0F) | ((v) << 4)
SET_A(0x0A);
SET_B(0x05);`}
                                </pre>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-teal-50 via-cyan-50 to-blue-50 p-4">
                    <div className="max-w-7xl mx-auto">
                        <header className="text-center mb-6">
                            <h1 className="text-4xl font-bold bg-gradient-to-r from-teal-600 to-cyan-600 bg-clip-text text-transparent mb-2">
                                1177 - 位域深入解析
                            </h1>
                            <p className="text-lg text-gray-700">C 语言核心 - 位域：精确控制内存的每一位</p>
                            <div className="flex justify-center gap-2 mt-4">
                                <span className="px-3 py-1 bg-teal-100 text-teal-700 rounded-full text-sm">位域声明</span>
                                <span className="px-3 py-1 bg-cyan-100 text-cyan-700 rounded-full text-sm">内存布局</span>
                                <span className="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm">硬件寄存器</span>
                                <span className="px-3 py-1 bg-purple-100 text-purple-700 rounded-full text-sm">可移植性</span>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-teal-500">
                                    <h3 className="text-xl font-bold text-teal-700 mb-3">代码示例</h3>
                                    <div className="bg-gray-50 rounded p-3 font-mono text-sm overflow-x-auto">
                                        <pre className="text-gray-800 whitespace-pre-wrap">
                                            {CODE_EXAMPLES[step].code}
                                        </pre>
                                    </div>
                                    <div className="mt-3 p-3 bg-yellow-50 rounded border border-yellow-200">
                                        <p className="text-sm text-yellow-800">
                                            <span className="font-bold">亮点:</span> {CODE_EXAMPLES[step].highlight}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-cyan-500">
                                    <h3 className="text-xl font-bold text-cyan-700 mb-3">可视化演示</h3>
                                    {step === 0 && renderMemoryLayout()}
                                    {step === 1 && (
                                        <div className="space-y-4">
                                            <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                                                <h4 className="text-lg font-bold text-teal-800 mb-3">联合体位域视图</h4>
                                                <div className="grid grid-cols-8 gap-1 mb-3">
                                                    {['b0','b1','b2','b3','b4','b5','b6','b7'].map((bit, i) => (
                                                        <div key={i} className="text-center p-2 bg-teal-100 rounded">
                                                            <div className="text-xs text-gray-600">位{i}</div>
                                                            <div className="font-bold text-teal-700">{bit}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                                <div className="p-3 bg-white rounded border border-teal-200">
                                                    <p className="text-sm">
                                                        <span className="font-bold">union:</span> 8 个 1 位域 = 1 字节
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 2 && (
                                        <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-teal-800 mb-3">GPIO 模式寄存器</h4>
                                            <div className="grid grid-cols-8 gap-1">
                                                {['M0','M1','M2','M3','M4','M5','M6','M7'].map((m, i) => (
                                                    <div key={i} className="text-center p-2 bg-teal-100 rounded">
                                                        <div className="text-xs text-gray-600">引脚{i}</div>
                                                        <div className="font-bold text-teal-700">2 位</div>
                                                    </div>
                                                ))}
                                            </div>
                                            <p className="text-xs text-center mt-2 text-gray-600">32 位寄存器，16 个引脚 × 2 位/引脚</p>
                                        </div>
                                    )}
                                    {step === 3 && (
                                        <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-teal-800 mb-3">有符号位域范围</h4>
                                            <div className="space-y-2">
                                                <div className="p-2 bg-teal-100 rounded">
                                                    <span className="text-sm">12 位：-2048 ~ 2047</span>
                                                </div>
                                                <div className="p-2 bg-cyan-100 rounded">
                                                    <span className="text-sm">10 位：-512 ~ 511</span>
                                                </div>
                                                <div className="p-2 bg-blue-100 rounded">
                                                    <span className="text-sm">8 位：-128 ~ 127</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 4 && renderBitOperations()}
                                    {step === 5 && (
                                        <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-teal-800 mb-3">CAN 帧结构</h4>
                                            <div className="space-y-2">
                                                <div className="flex items-center gap-2">
                                                    <div className="w-24 p-2 bg-teal-100 rounded text-center">
                                                        <div className="text-xs">STDID</div>
                                                        <div className="font-bold">11 位</div>
                                                    </div>
                                                    <div className="flex-1 h-10 bg-teal-50 rounded flex items-center justify-center text-xs text-gray-600">
                                                        标准标识符
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="w-24 p-2 bg-cyan-100 rounded text-center">
                                                        <div className="text-xs">IDE/RTR/DLC</div>
                                                        <div className="font-bold">6 位</div>
                                                    </div>
                                                    <div className="flex-1 h-10 bg-cyan-50 rounded flex items-center justify-center text-xs text-gray-600">
                                                        控制位
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <div className="w-24 p-2 bg-blue-100 rounded text-center">
                                                        <div className="text-xs">DATA</div>
                                                        <div className="font-bold">64 位</div>
                                                    </div>
                                                    <div className="flex-1 h-10 bg-blue-50 rounded flex items-center justify-center text-xs text-gray-600">
                                                        数据字节 (0-7)
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 6 && (
                                        <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-teal-800 mb-3">对比分析</h4>
                                            <table className="w-full text-sm">
                                                <thead>
                                                    <tr className="border-b">
                                                        <th className="p-2 text-left">特性</th>
                                                        <th className="p-2">位域</th>
                                                        <th className="p-2">宏</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    <tr>
                                                        <td className="p-2">可读性</td>
                                                        <td className="p-2 text-green-600">✓ 好</td>
                                                        <td className="p-2 text-red-600">✗ 差</td>
                                                    </tr>
                                                    <tr>
                                                        <td className="p-2">移植性</td>
                                                        <td className="p-2 text-red-600">✗ 差</td>
                                                        <td className="p-2 text-green-600">✓ 好</td>
                                                    </tr>
                                                    <tr>
                                                        <td className="p-2">自动掩码</td>
                                                        <td className="p-2 text-green-600">✓ 是</td>
                                                        <td className="p-2 text-red-600">✗ 手动</td>
                                                    </tr>
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                    {step === 7 && (
                                        <div className="p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-teal-800 mb-3">使用场景决策</h4>
                                            <div className="space-y-3">
                                                <div className="p-3 bg-green-50 border border-green-200 rounded">
                                                    <div className="font-bold text-green-700">✅ 推荐</div>
                                                    <ul className="text-xs text-green-600 mt-1 space-y-1">
                                                        <li>• 硬件寄存器映射</li>
                                                        <li>• 协议帧解析</li>
                                                        <li>• 内存受限系统</li>
                                                    </ul>
                                                </div>
                                                <div className="p-3 bg-red-50 border border-red-200 rounded">
                                                    <div className="font-bold text-red-700">⚠️ 谨慎</div>
                                                    <ul className="text-xs text-red-600 mt-1 space-y-1">
                                                        <li>• 跨平台库代码</li>
                                                        <li>• 网络协议</li>
                                                        <li>• 文件存储</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-blue-500">
                                    <h3 className="text-xl font-bold text-blue-700 mb-3">关键要点</h3>
                                    <div className="space-y-3">
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 0 ? 'bg-teal-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-teal-600">语法:</span> 成员名 : 位数
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 1 ? 'bg-cyan-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-cyan-600">联合:</span> 位级/字节级双重访问
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 2 ? 'bg-blue-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-blue-600">应用:</span> 硬件寄存器映射
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 3 ? 'bg-purple-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-purple-600">范围:</span> n 位有符号 = ±2^(n-1)
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 4 ? 'bg-pink-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-pink-600">移植:</span> 布局由编译器定义
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 5 ? 'bg-indigo-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-indigo-600">协议:</span> CAN/UART/I2C 帧
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 6 ? 'bg-orange-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-orange-600">对比:</span> 位域 vs 宏操作
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 7 ? 'bg-teal-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-teal-600">实践:</span> 明确使用场景
                                            </p>
                                        </div>
                                    </div>
                                    <div className="mt-4 p-3 bg-blue-50 rounded border border-blue-200">
                                        <p className="text-sm text-blue-800">
                                            {CODE_EXAMPLES[step].explanation}
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-r from-teal-500 to-cyan-600 rounded-lg shadow-lg p-4 text-white">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm">进度</span>
                                        <span className="text-sm font-bold">{step + 1} / {CODE_EXAMPLES.length}</span>
                                    </div>
                                    <div className="w-full bg-white bg-opacity-30 rounded-full h-2">
                                        <div
                                            className="bg-white rounded-full h-2 transition-all duration-500"
                                            style={{ width: `${((step + 1) / CODE_EXAMPLES.length) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="text-center mt-8 text-gray-600">
                            <p class="text-sm">C 语言核心 · 位域深入解析 · 嵌入式开发必备技能</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
