// 基本语法
asm volatile (
    "指令 1\\n"
    "指令 2\\n"
    : 输出操作数
    : 输入操作数
    : 破坏寄存器
);

// 示例 1: NOP 空操作
#define NOP() asm volatile ("nop")

// 示例 2: 读写寄存器
uint32_t get_MSP(void) {
    uint32_t result;
    asm volatile ("MRS %0, MSP" : "=r" (result));
    return result;
}

// 示例 3: 带输入输出
uint32_t add(uint32_t a, uint32_t b) {
    uint32_t result;
    asm volatile (
        "ADD %0, %1, %2"
        : "=r" (result)
        : "r" (a), "r" (b)
    );
    return result;
}

// 示例 4: 内存屏障
#define MEMORY_BARRIER() \\

// 约束符:

extern "C" void CppFunction(int x);  // C 链接

void CppFunction(int x) {  // C++ 实现
    // 可以用 C++ 特性

int* create_array(int size) {

#include <Python.h>

// C 函数：计算阶乘
static long factorial(long n) {
    return n <= 1 ? 1 : n * factorial(n - 1);
}

// Python 可调用的包装函数
static PyObject* my_factorial(PyObject *self, PyObject *args) {
    long n;
    // 解析 Python 参数
    if (!PyArg_ParseTuple(args, "l", &n)) {
        return NULL;  // 参数错误
    }

    long result = factorial(n);

    // 返回 Python 对象
    return PyLong_FromLong(result);
}

// 方法表
static PyMethodDef Methods[] = {

    {NULL, NULL, 0, NULL}  // 结束标记

// 模块定义

// x86-64 System V ABI (Linux):
// 参数：RDI, RSI, RDX, RCX, R8, R9 (前 6 个)

// 临时寄存器：RAX, RCX, RDX, RSI, RDI, R8-R11
// 保存寄存器：RBX, RBP, R12-R15
