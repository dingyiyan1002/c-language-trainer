void IWDG_Config(void) {
    // 1. 使能 LSI 时钟
    RCC->CSR |= RCC_CSR_LSION;
    while (!(RCC->CSR & RCC_CSR_LSIRDY));

    // 2. 使能看门狗写访问
    IWDG->KR = 0x5555;  // 解锁

    // 3. 配置预分频 (4/8/16/32/64/128/256)
    IWDG->PR = 0x03;    // 32 分频
    // 超时 = (预分频 × 重装载值) / LSI 频率
    //      = (32 × 1000) / 32000 = 1 秒

    // 4. 配置重装载值
    IWDG->RLR = 1000;   // 1 秒超时

    // 5. 等待寄存器同步
    while (IWDG->SR != 0);

    // 6. 启动看门狗
    IWDG->KR = 0xCCCC;  // 启动

    // 7. 重新装载 (喂狗)
    IWDG->KR = 0xAAAA;  // 立即重装载
}

// 喂狗宏
#define FEED_DOG() (IWDG->KR = 0xAAAA)`,

void WWDG_Config(void) {
    // 1. 使能时钟
    RCC->APB1ENR |= RCC_APB1ENR_WWDGEN;

    // 2. 配置看门狗
    // Counter: 0x7F (最大值)
    // Prescaler: 8 分频
    // Window: 0x5F (喂狗窗口)
    WWDG->CFR =
        (0x00 << 7) |     // Counter = 0x7F
        (0x01 << 6) |     // Prescaler = 8
        (0x5F);           // Window = 0x5F

    // 3. 使能提前唤醒中断 (可选)
    WWDG->CFR |= WWDG_CFR_EWI;
    NVIC_EnableIRQ(WWDG_IRQn);

    // 4. 启动看门狗
    WWDG->CR = WWDG_CR_WDGA | 0x7F;
}

// 喂狗 (必须在窗口内)
void WWDG_Feed(void) {
    // 窗口：0x40 ~ 0x5F
    // 过早 (<0x40): 不会喂狗
    // 过晚 (>0x5F): 系统复位
    WWDG->CR = 0x7F;  // 重置计数器
}

// 窗口计算:

void main_loop(void) {

}
// 超时时间 > 最长循环周期

// 2. 关键代码段后喂狗
void criticalTask(void) {
    initHardware();
    FEED_DOG();       // 阶段 1 完成
    loadConfig();
    FEED_DOG();       // 阶段 2 完成
    startApplication();

Task tasks[] = {task1, task2, task3};
