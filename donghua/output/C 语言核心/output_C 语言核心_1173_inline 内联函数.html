<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1173 - inline 内联函数详解</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flow { 0% { transform: translateX(0); } 100% { transform: translateX(100%); } }
        @keyframes highlight { 0%, 100% { background-color: rgba(99, 102, 241, 0.2); } 50% { background-color: rgba(99, 102, 241, 0.5); } }
        @keyframes inlineExpand { 0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(1.05); } }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-blink { animation: blink 1s steps(2) infinite; }
        .animate-slideIn { animation: slideIn 0.5s ease-out; }
        .animate-scaleIn { animation: scaleIn 0.5s ease-out; }
        .animate-flow { animation: flow 2s linear infinite; }
        .animate-highlight { animation: highlight 1.5s ease-in-out infinite; }
        .animate-inlineExpand { animation: inlineExpand 1s ease-in-out infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLOR_MAP = {
            primary: '#6366f1',
            secondary: '#4f46e5',
            accent: '#818cf8',
            highlight: '#c7d2fe',
            bg: '#312e81',
            text: '#e0e7ff'
        };

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isMuted, setIsMuted] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const steps = [
                { title: 'inline 内联函数概述', voice: 'inline 内联函数概述。inline 是 C99 引入的关键字，用于建议编译器将函数体直接插入到调用处，消除函数调用开销。内联可以减少函数调用的压栈、跳转、返回开销，但会增加代码体积。适用于小型、频繁调用的函数。' },
                { title: '函数调用开销', voice: '函数调用开销分析。普通函数调用需要参数压栈、控制转移、栈帧建立、局部变量分配、返回值传递、栈帧销毁等步骤。对于简单函数，调用开销可能超过函数体执行时间。内联可以消除这些开销，提高执行效率。' },
                { title: 'inline 语法与用法', voice: 'inline 语法与用法。inline 关键字放在函数返回类型前。inline 函数通常在头文件中定义，供多个源文件包含。inline 只是对编译器的建议，编译器可能忽略。现代编译器即使没有 inline 也会自动内联优化的函数。' },
                { title: 'inline 与宏对比', voice: 'inline 与宏函数对比。宏是文本替换，没有类型检查，可能产生副作用。inline 是真正的函数，有类型检查，参数只求值一次。inline 更安全、更易调试，应优先使用 inline 替代宏函数。' },
                { title: '适用场景与限制', voice: '适用场景与限制。适合内联：短小函数、频繁调用、简单逻辑。不适合内联：大型函数、递归函数、虚函数。过度内联会导致代码膨胀，降低指令缓存命中率，反而降低性能。' },
                { title: '编译器优化行为', voice: '编译器优化行为。现代编译器有自动内联优化，即使没有 inline 关键字也会内联合适的函数。优化级别影响内联决策，O2 和 O3 更激进内联。inline 关键字更多是语义提示，表明希望内联的意图。' },
                { title: 'extern inline 语义', voice: 'extern inline 语义详解。C99 中 inline 函数默认是内部链接。extern inline 提供外部链接，用于在头文件中定义 inline 函数，确保多个编译单元能看到函数体。这是 inline 函数的正确多文件用法。' },
                { title: '最佳实践总结', voice: 'inline 最佳实践。一，优先让编译器决定内联。二，小型工具函数使用 inline。三，头文件中定义 inline 函数。四，用 inline 替代宏函数。五，性能关键代码可显式 inline。六，避免过度内联大型函数。' }
            ];

            useEffect(() => {
                if (!isPlaying) return;
                const speak = () => {
                    if (isMuted || !steps[currentStep]) return;
                    const utterance = new SpeechSynthesisUtterance(steps[currentStep].voice);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;
                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev < steps.length - 1 ? prev + 1 : prev));
                        }, 800);
                    };
                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev < steps.length - 1 ? prev + 1 : prev));
                        }, 800);
                    };
                    window.speechSynthesis.speak(utterance);
                };
                speak();
                return () => {
                    if (voiceEndTimerRef.current) clearTimeout(voiceEndTimerRef.current);
                    window.speechSynthesis.cancel();
                };
            }, [currentStep, isPlaying, isMuted]);

            const FunctionCallOverhead = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>函数调用开销分析</h4>
                        <div className="grid grid-cols-2 gap-4">
                            <div className={`${currentStep >= 1 ? 'animate-slideIn' : ''}`}>
                                <div className="text-red-400 font-bold mb-2">❌ 普通函数调用</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`// 调用方
result = add(a, b);
// 1. 参数压栈 (a, b)
// 2. CALL 指令跳转
// 3. 保存返回地址
// 4. 建立栈帧

// 被调用方
int add(int x, int y) {
    // 5. 分配局部变量
    return x + y;  // 6. 计算
    // 7. 返回值存储
    // 8. 销毁栈帧
    // 9. RET 返回
}`}
                                </pre>
                                <div className="mt-2 text-xs text-red-400">
                                    ⚠️ 约 10-20 个时钟周期开销
                                </div>
                            </div>
                            <div className={`${currentStep >= 1 ? 'animate-slideIn' : ''}`}>
                                <div className="text-emerald-400 font-bold mb-2">✓ 内联函数</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`// 编译器内联后
result = add(a, b);
// 直接展开为:
// result = a + b;

// 无调用开销!
// 1. 无参数压栈
// 2. 无跳转指令
// 3. 无栈帧操作
// 4. 直接计算`}
                                </pre>
                                <div className="mt-2 text-xs text-emerald-400">
                                    ✓ 消除调用开销，零成本抽象
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const InlineVsMacro = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>inline vs 宏函数</h4>
                        <div className="grid grid-cols-2 gap-4">
                            <div className={`${currentStep >= 3 ? 'animate-slideIn' : ''}`}>
                                <div className="text-red-400 font-bold mb-2">❌ 宏函数</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`#define MAX(a, b) ((a) > (b) ? (a) : (b))

// 问题 1: 参数多次求值
int x = 5;
MAX(x++, 3);  // 展开后:
// ((x++) > (3) ? (x++) : (x++))
// x 被自增 3 次!

// 问题 2: 无类型检查
MAX(1, "2");  // 编译通过，运行时错误`}
                                </pre>
                                <div className="mt-2 text-xs text-red-400">
                                    ⚠️ 文本替换，无类型安全，副作用问题
                                </div>
                            </div>
                            <div className={`${currentStep >= 3 ? 'animate-slideIn' : ''}`}>
                                <div className="text-emerald-400 font-bold mb-2">✓ inline 函数</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`inline int max(int a, int b) {
    return (a > b) ? a : b;
}

// 参数只求值一次
int x = 5;
max(x++, 3);  // x 只自增 1 次

// 类型安全检查
max(1, "2");  // ✗ 编译错误!
// 类型不匹配`}
                                </pre>
                                <div className="mt-2 text-xs text-emerald-400">
                                    ✓ 真正函数，类型安全，参数单次求值
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const InlineSyntax = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>inline 语法与用法</h4>
                        <div className="space-y-3">
                            <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`// 基本语法
inline return_type function_name(params) {
    // 函数体直接插入调用处
}

// 示例
inline int add(int a, int b) {
    return a + b;
}

inline uint32_t min(uint32_t a, uint32_t b) {
    return (a < b) ? a : b;
}

// 头文件中使用
// math_utils.h
#ifndef MATH_UTILS_H
#define MATH_UTILS_H

static inline int square(int x) {
    return x * x;
}

#endif`}
                            </pre>
                            <div className="p-3 bg-blue-900/30 rounded border border-blue-600">
                                <div className="text-blue-300 text-sm">
                                    💡 inline 通常与 static 连用 (static inline)，避免多重定义问题
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const UseCases = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>inline 应用场景</h4>
                        <div className="space-y-3">
                            <div className={`${currentStep >= 4 ? 'animate-scaleIn' : ''}`}>
                                <div className="text-indigo-400 font-bold mb-2">Getter/Setter 函数</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`typedef struct {
    int x, y, width, height;
} Rectangle;

static inline int rectGetWidth(const Rectangle* r) {
    return r->width;
}

static inline void rectSetWidth(Rectangle* r, int w) {
    r->width = w;
}`}
                                </pre>
                            </div>
                            <div className={`${currentStep >= 4 ? 'animate-scaleIn' : ''}`}>
                                <div className="text-cyan-400 font-bold mb-2">数学运算函数</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`static inline int abs_val(int x) {
    return (x < 0) ? -x : x;
}

static inline int clamp(int v, int min, int max) {
    return (v < min) ? min : (v > max) ? max : v;
}

static inline float map(float x, float in_min, float in_max,
                        float out_min, float out_max) {
    return (x - in_min) * (out_max - out_min) / (in_max - in_min) + out_min;
}`}
                                </pre>
                            </div>
                            <div className={`${currentStep >= 4 ? 'animate-scaleIn' : ''}`}>
                                <div className="text-purple-400 font-bold mb-2">位操作函数</div>
                                <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`static inline void setBit(uint32_t *reg, int bit) {
    *reg |= (1U << bit);
}

static inline void clearBit(uint32_t *reg, int bit) {
    *reg &= ~(1U << bit);
}

static inline int testBit(uint32_t reg, int bit) {
    return (reg >> bit) & 1;
}`}
                                </pre>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ExternInline = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>extern inline 语义</h4>
                        <div className="space-y-3">
                            <pre className="bg-gray-900 p-3 rounded text-xs font-mono text-gray-300">
{`// 正确做法：头文件中定义 inline 函数

// utils.h
#ifndef UTILS_H
#define UTILS_H

// 内部链接 (每个编译单元一份副本)
static inline int helper(int x) {
    return x * 2;
}

// 外部链接 (所有编译单元共享)
extern inline int publicFunc(int x);

#endif

// utils.c
#include "utils.h"

inline int publicFunc(int x) {
    return helper(x) + 1;
}`}
                            </pre>
                            <div className="grid grid-cols-2 gap-4 mt-4">
                                <div className="bg-blue-900/30 p-3 rounded border border-blue-600">
                                    <div className="text-blue-300 font-bold mb-1">static inline</div>
                                    <div className="text-xs text-gray-400">内部链接，每个 .c 文件独立副本，头文件推荐用法</div>
                                </div>
                                <div className="bg-purple-900/30 p-3 rounded border border-purple-600">
                                    <div className="text-purple-300 font-bold mb-1">extern inline</div>
                                    <div className="text-xs text-gray-400">外部链接，需要单独的 inline 定义</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const CompilerBehavior = () => (
                <div className="space-y-4">
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-4" style={{ color: COLOR_MAP.text }}>编译器内联优化行为</h4>
                        <div className="space-y-3">
                            <div className={`${currentStep >= 5 ? 'animate-scaleIn' : ''}`}>
                                <div className="text-indigo-400 font-bold mb-2">编译器优化级别</div>
                                <table className="w-full text-sm">
                                    <thead>
                                        <tr className="border-b border-gray-600">
                                            <th className="text-left py-2" style={{ color: COLOR_MAP.text }}>优化级别</th>
                                            <th className="text-center" style={{ color: COLOR_MAP.text }}>内联行为</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr className="border-b border-gray-700">
                                            <td className="py-2 font-mono">-O0</td>
                                            <td className="text-center text-gray-300">几乎不内联</td>
                                        </tr>
                                        <tr className="border-b border-gray-700">
                                            <td className="py-2 font-mono">-O1</td>
                                            <td className="text-center text-gray-300">保守内联</td>
                                        </tr>
                                        <tr className="border-b border-gray-700">
                                            <td className="py-2 font-mono">-O2</td>
                                            <td className="text-center text-emerald-300">积极内联小函数</td>
                                        </tr>
                                        <tr>
                                            <td className="py-2 font-mono">-O3</td>
                                            <td className="text-center text-emerald-300">激进内联</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div className={`${currentStep >= 5 ? 'animate-scaleIn' : ''} p-3 bg-amber-900/30 rounded border border-amber-600`}>
                                <div className="text-amber-300 font-bold mb-2">编译器内联启发式</div>
                                <ul className="text-xs text-gray-300 space-y-1">
                                    <li>• 函数体非常小 (少于 5-10 行)</li>
                                    <li>• 被频繁调用 (热路径函数)</li>
                                    <li>• 不是递归函数</li>
                                    <li>• 内联后代码体积增长可控</li>
                                    <li>• 函数体在编译单元可见</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const BestPractices = () => (
                <div className="space-y-4">
                    <div className="bg-gradient-to-r from-indigo-900/50 to-purple-900/50 rounded-lg p-6">
                        <h3 className="text-xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>inline 最佳实践</h3>
                        <ul className="space-y-3 text-gray-300">
                            <li className="flex items-start">
                                <span className="text-indigo-400 mr-2">✓</span>
                                <span><strong>让编译器决定：</strong>现代编译器自动内联优化，不必过度标注 inline</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-indigo-400 mr-2">✓</span>
                                <span><strong>小型工具函数：</strong>getter/setter、数学运算、位操作使用 inline</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-indigo-400 mr-2">✓</span>
                                <span><strong>头文件定义：</strong>使用 static inline 在头文件中定义内联函数</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-indigo-400 mr-2">✓</span>
                                <span><strong>替代宏函数：</strong>用 inline 函数替代有副作用风险的宏</span>
                            </li>
                            <li className="flex items-start">
                                <span className="text-yellow-400 mr-2">⚠️</span>
                                <span><strong>避免过度内联：</strong>大型函数内联会导致代码膨胀，降低缓存命中率</span>
                            </li>
                        </ul>
                    </div>
                    <div className="bg-gray-800 rounded-lg p-4">
                        <h4 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>完整示例</h4>
                        <pre className="text-xs font-mono text-gray-300">
{`// fixed_math.h - 定点数学库
#ifndef FIXED_MATH_H
#define FIXED_MATH_H

#include <stdint.h>

#define FIXED_SHIFT  16

static inline int32_t intToFixed(int x) {
    return x << FIXED_SHIFT;
}

static inline int fixedToInt(int32_t f) {
    return f >> FIXED_SHIFT;
}

static inline int32_t fixedMul(int32_t a, int32_t b) {
    return ((int64_t)a * b) >> FIXED_SHIFT;
}

static inline int32_t fixedDiv(int32_t a, int32_t b) {
    return ((int64_t)a << FIXED_SHIFT) / b;
}

#endif`}
                        </pre>
                    </div>
                </div>
            );

            const renderContent = () => {
                switch(currentStep) {
                    case 0:
                        return (
                            <div className="space-y-6">
                                <div className="bg-gradient-to-r from-indigo-900/50 to-purple-900/50 rounded-lg p-6">
                                    <h3 className="text-2xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>inline 内联函数概述</h3>
                                    <ul className="space-y-3 text-gray-300">
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">▸</span>
                                            <span>C99 引入的函数优化机制</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">▸</span>
                                            <span>函数体直接插入调用处</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">▸</span>
                                            <span>消除函数调用开销</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">▸</span>
                                            <span>以代码体积换取执行速度</span>
                                        </li>
                                    </ul>
                                </div>
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <pre className="text-xs font-mono text-gray-300">
{`// inline 函数定义
inline int max(int a, int b) {
    return (a > b) ? a : b;
}

// 调用
int x = max(5, 3);
// 编译器内联后:
// int x = (5 > 3) ? 5 : 3;`}
                                    </pre>
                                </div>
                            </div>
                        );
                    case 1:
                        return <FunctionCallOverhead />;
                    case 2:
                        return <InlineSyntax />;
                    case 3:
                        return <InlineVsMacro />;
                    case 4:
                        return <UseCases />;
                    case 5:
                        return <CompilerBehavior />;
                    case 6:
                        return <ExternInline />;
                    case 7:
                        return <BestPractices />;
                    default:
                        return null;
                }
            };

            return (
                <div className="min-h-screen p-6">
                    <div className="max-w-7xl mx-auto">
                        <header className="mb-6 flex items-center justify-between">
                            <div>
                                <h1 className="text-3xl font-bold" style={{ color: COLOR_MAP.primary }}>
                                    1173 - inline 内联函数详解
                                </h1>
                                <p className="text-gray-400 mt-1">C 语言核心 · 步骤 {currentStep + 1} / {steps.length}</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <button onClick={() => setIsMuted(!isMuted)}
                                    className={`px-4 py-2 rounded ${isMuted ? 'bg-red-600' : 'bg-indigo-600'} hover:opacity-80`}>
                                    {isMuted ? '🔇 静音' : '🔊 语音'}
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)}
                                    className={`px-4 py-2 rounded ${isPlaying ? 'bg-indigo-600' : 'bg-gray-600'} hover:opacity-80`}>
                                    {isPlaying ? '⏸ 暂停' : '▶ 继续'}
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-3 gap-6">
                            <div className="col-span-1 space-y-4">
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>代码示例</h3>
                                    <pre className="text-xs font-mono text-gray-300 overflow-x-auto">
{`// 基础 inline
inline int add(int a, int b) {
    return a + b;
}

// static inline (推荐)
static inline int square(int x) {
    return x * x;
}

// 头文件用法
// header.h
static inline int min(int a, int b) {
    return a < b ? a : b;
}`}
                                    </pre>
                                </div>
                                <div className="bg-gray-800 rounded-lg p-4">
                                    <h3 className="text-lg font-bold mb-3" style={{ color: COLOR_MAP.text }}>关键点</h3>
                                    <ul className="space-y-2 text-sm text-gray-300">
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">•</span>
                                            <span>消除函数调用开销</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">•</span>
                                            <span>编译器可能忽略 inline 建议</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">•</span>
                                            <span>比宏函数更安全</span>
                                        </li>
                                        <li className="flex items-start">
                                            <span className="text-indigo-400 mr-2">•</span>
                                            <span>过度内联会膨胀代码</span>
                                        </li>
                                    </ul>
                                </div>
                            </div>

                            <div className="col-span-1">
                                <div className="bg-gray-800 rounded-lg p-6 h-full">
                                    <h3 className="text-xl font-bold mb-4" style={{ color: COLOR_MAP.text }}>
                                        {steps[currentStep].title}
                                    </h3>
                                    {renderContent()}
                                </div>
                            </div>

                            <div className="col-span-1 space-y-4">
                                <FunctionCallOverhead />
                                <InlineVsMacro />
                            </div>
                        </div>

                        <footer className="mt-8 flex justify-center gap-2">
                            {steps.map((_, idx) => (
                                <button key={idx} onClick={() => setCurrentStep(idx)}
                                    className={`w-3 h-3 rounded-full transition-all ${idx === currentStep ? 'w-8' : ''}`}
                                    style={{ backgroundColor: idx <= currentStep ? COLOR_MAP.primary : '#374151' }} />
                            ))}
                        </footer>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
