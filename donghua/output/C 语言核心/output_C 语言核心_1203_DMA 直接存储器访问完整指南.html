        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes flow { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }

        .animate-blink { animation: blink 1s infinite; }

        .animate-highlight { animation: highlight 1s infinite; }

                    code: `// DMA (Direct Memory Access) 直接存储器访问
// 核心作用：硬件数据传输，不占用 CPU

// 为什么需要 DMA?
// 无 DMA: CPU 逐字节复制数据
//   for (i=0; i<N; i++) dst[i] = src[i];
//   - CPU 被占用，无法执行其他任务
//   - 效率低，功耗高

// 有 DMA: 硬件自动传输
//   DMA_Config(src, dst, size);
//   DMA_Start();
//   - CPU 可并行执行其他任务
//   - 效率高，功耗低

// DMA 应用场景
// 1. ADC 数据采集 → 内存
// 2. 内存 → DAC 输出
// 3. UART/SPI/I2C 数据收发
// 4. 内存块复制/填充

// 关键优势
// - 释放 CPU 用于计算任务
// - 提高系统整体效率
// - 降低功耗`,
                    explanation: "DMA 允许外设和内存之间直接传输数据，无需 CPU 干预。CPU 只需配置 DMA 控制器，启动后即可并行执行其他任务。数据传输完成后 DMA 产生中断通知 CPU。这种机制大幅提高系统效率，特别适合大数据量传输。",

                    code: `// STM32 DMA 配置 (以 DMA1 通道 1 为例)
// 用于 ADC1 数据采集

void DMA_ADC_Init(void) {
    // 1. 使能时钟
    RCC->AHBENR |= RCC_AHBENR_DMA1EN;

    // 2. 禁用通道 (配置前必须)
    DMA1->CCR1 &= ~DMA_CCR1_EN;

    // 3. 配置外设地址 (ADC 数据寄存器)
    DMA1->CPAR = (uint32_t)&ADC1->DR;

    // 4. 配置内存地址
    DMA1->CMAR = (uint32_t)adc_buffer;

    // 5. 配置传输数据量
    DMA1->CNDTR = ADC_BUFFER_SIZE;

    // 6. 配置通道参数
    DMA1->CCR1 |= DMA_CCR1_DIR;    // 外设→内存
    DMA1->CCR1 |= DMA_CCR1_CIRC;   // 循环模式
    DMA1->CCR1 |= DMA_CCR1_MINC;   // 内存地址递增
    DMA1->CCR1 |= DMA_CCR1_PSIZE_0; // 外设 16 位
    DMA1->CCR1 |= DMA_CCR1_MSIZE_0; // 内存 16 位
    DMA1->CCR1 |= DMA_CCR1_PL_1;   // 非常高优先级

    // 7. 使能通道
    DMA1->CCR1 |= DMA_CCR1_EN;
}`,

                            <g>

                            </g>

                                <rect x="30" y="85" width="60" height="35" fill="#1f2937" stroke={COLOR_MAP.primary} strokeWidth="2" rx="5" />
                                <text x="60" y="102" fill="white" fontSize="8" textAnchor="middle">5. 参数</text>

                            <g>

                                <text x="140" y="102" fill="white" fontSize="8" textAnchor="middle">6. 使能</text>
                                <text x="140" y="115" fill={COLOR_MAP.success} fontSize="7" textAnchor="middle">CCR→EN=1</text>

                {
                    title: "DMA 传输模式",
                    code: `// DMA 三种传输模式

// 1. 普通模式 (单次传输)
// 传输完成后停止，产生中断
DMA1->CCR1 &= ~DMA_CCR1_CIRC;  // 非循环

// 2. 循环模式 (连续传输)
// 传输完成后自动重新开始
// 适用于：ADC 连续采样、DAC 波形输出
DMA1->CCR1 |= DMA_CCR1_CIRC;  // 循环模式

// 3. 内存到内存模式
// 用于快速内存块复制
DMA1->CCR1 |= DMA_CCR1_MEM2MEM;  // M2M 模式

// 数据传输方向
// 外设→内存：DMA_CCR1_DIR
// 内存→外设：0
// 内存→内存：DMA_CCR1_MEM2MEM

// 地址递增模式
// DMA_CCR1_MINC: 内存地址递增
// DMA_CCR1_PINC: 外设地址递增`,
                    explanation: "DMA 支持三种模式：普通模式传输一次后停止；循环模式自动重新开始，适合连续数据采集；M2M 模式用于内存块快速复制。地址递增决定传输后地址是否自动增加。",
                    renderVisual: () => (

// 缓冲区定义
#define BUFFER_SIZE 256

void DMA_DoubleBuffer_Init(void) {
    DMA1->CNDTR = BUFFER_SIZE * 2;  // 双倍大小
    DMA1->CMAR = (uint32_t)buffer;  // 指向 buffer[0][0]
    DMA1->CCR1 |= DMA_CCR1_CIRC;    // 循环模式
    DMA1->CCR1 |= DMA_CCR1_HTIE;    // 半传输中断
    DMA1->CCR1 |= DMA_CCR1_TCIE;    // 全传输中断
}

// 中断服务函数
void DMA1_Channel1_IRQHandler(void) {
    if (DMA1->ISR & DMA_ISR_HTIF1) {  // 半传输

    }
}`,

                            <text x="60" y="94" fill="white" fontSize="7" textAnchor="middle">✓</text>

                            <rect x="110" y="35" width="80" height="70" fill="#1f2937" stroke={COLOR_MAP.primary} rx="8" />
                            <text x="150" y="55" fill={COLOR_MAP.primary} fontSize="9" textAnchor="middle" fontWeight="bold">DAC 输出</text>
                            <text x="150" y="70" fill="#9ca3af" fontSize="7" textAnchor="middle">MEM→DMA→DAC</text>
                            <circle cx="150" cy="90" r="8" fill={COLOR_MAP.success} />
                            <text x="150" y="94" fill="white" fontSize="7" textAnchor="middle">✓</text>

                            <rect x="200" y="35" width="80" height="70" fill="#1f2937" stroke={COLOR_MAP.success} rx="8" />
                            <text x="240" y="55" fill={COLOR_MAP.success} fontSize="9" textAnchor="middle" fontWeight="bold">UART 收发</text>
                            <text x="240" y="70" fill="#9ca3af" fontSize="7" textAnchor="middle">UART→DMA→MEM</text>
                            <circle cx="240" cy="90" r="8" fill={COLOR_MAP.success} />
                            <text x="240" y="94" fill="white" fontSize="7" textAnchor="middle">✓</text>

                            <rect x="290" y="35" width="80" height="70" fill="#1f2937" stroke={COLOR_MAP.accent} rx="8" />
                            <text x="330" y="55" fill={COLOR_MAP.accent} fontSize="9" textAnchor="middle" fontWeight="bold">内存复制</text>
                            <text x="330" y="70" fill="#9ca3af" fontSize="7" textAnchor="middle">M2M 模式</text>
                            <circle cx="330" cy="90" r="8" fill={COLOR_MAP.success} />
                            <text x="330" y="94" fill="white" fontSize="7" textAnchor="middle">✓</text>
                            {/* 配置检查清单 */}
                            <rect x="20" y="115" width="170" height="90" fill="#1f2937" stroke={COLOR_MAP.success} rx="8" />
                            <text x="105" y="135" fill={COLOR_MAP.success} fontSize="10" textAnchor="middle" fontWeight="bold">配置检查清单</text>
                            <text x="35" y="155" fill={COLOR_MAP.success} fontSize="8">✓ 传输方向</text>
                            <text x="35" y="170" fill={COLOR_MAP.success} fontSize="8">✓ 循环模式</text>
                            <text x="35" y="185" fill={COLOR_MAP.success} fontSize="8">✓ 地址递增</text>
                            <text x="35" y="200" fill={COLOR_MAP.success} fontSize="8">✓ 数据宽度</text>
                            {/* 性能对比 */}
                            <rect x="200" y="115" width="170" height="90" fill="#1f2937" stroke={COLOR_MAP.primary} rx="8" />
                            <text x="285" y="135" fill={COLOR_MAP.primary} fontSize="10" textAnchor="middle" fontWeight="bold">性能对比</text>
                            {/* CPU 条形 */}
                            <text x="215" y="155" fill="#9ca3af" fontSize="8">CPU:</text>
                            <rect x="250" y="145" width="30" height="15" fill={COLOR_MAP.danger} rx="2" />
                            <text x="285" y="155" fill={COLOR_MAP.danger} fontSize="8">100KB/s</text>
                            <text x="340" y="155" fill={COLOR_MAP.danger} fontSize="8">100% CPU</text>
                            {/* DMA 条形 */}
                            <text x="215" y="180" fill="#9ca3af" fontSize="8">DMA:</text>
                            <rect x="250" y="170" width="100" height="15" fill={COLOR_MAP.success} rx="2" />
                            <text x="285" y="180" fill={COLOR_MAP.success} fontSize="8">10MB/s</text>
                            <text x="340" y="180" fill={COLOR_MAP.success} fontSize="8">0% CPU</text>
                            {/* 倍率指示 */}
                            <text x="285" y="200" fill={COLOR_MAP.accent} fontSize="10" textAnchor="middle" fontWeight="bold">100 倍性能提升</text>
                        </svg>
                    )
                }
            ];

            const [counterValue, setCounterValue] = React.useState(0);

            React.useEffect(() => {
                const speak = (text) => {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;
                    const voices = window.speechSynthesis.getVoices();
                    const zhVoice = voices.find(v => v.lang.includes('zh-CN') && v.name.includes('Xiaoxiao'))
                        || voices.find(v => v.lang.includes('zh-CN'))
                        || voices[0];
                    if (zhVoice) utterance.voice = zhVoice;
                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev + 1) % STEPS.length);
                        }, 800);
                    };
                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev + 1) % STEPS.length);
                        }, 800);
                    };
                    window.speechSynthesis.speak(utterance);
                };
                speak(STEPS[currentStep].title);
                return () => clearTimeout(voiceEndTimerRef.current);
            }, [currentStep]);

            React.useEffect(() => {
                const timer = setInterval(() => {
                    setTransferProgress(prev => {
                        if (prev >= 100) return 0;
                        return prev + 2;
                    });
                    setCounterValue(prev => (prev + 1) % 10000);
                }, 100);
                return () => clearInterval(timer);
            }, []);

            return (
                <div class="flex flex-col h-screen bg-gray-900 text-white">
                    <div class="flex-1 flex overflow-hidden">
                        {/* 左侧：代码区 */}
                        <div class="w-1/3 border-r border-gray-700 flex flex-col bg-gray-800">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-blue-400">💻 代码示例</h2>
                            </div>
                            <div class="flex-1 overflow-auto p-4">
                                <pre class="text-sm text-green-400 font-mono whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                        </div>

                        {/* 中间：可视化区 */}
                        <div class="w-1/3 border-r border-gray-700 flex flex-col">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-emerald-400">🎬 可视化动画</h2>
                            </div>
                            <div class="flex-1 p-4 bg-gray-800">
                                {STEPS[currentStep].renderVisual()}
                            </div>
                        </div>

                        {/* 右侧：解释区 */}
                        <div class="w-1/3 flex flex-col bg-gray-800">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-yellow-400">📖 原理解析</h2>
                            </div>
                            <div class="flex-1 overflow-auto p-4">
                                <p class="text-base text-gray-300 leading-relaxed">
                                    {STEPS[currentStep].explanation}
                                </p>
                                <div class="mt-6 p-4 bg-gray-900 rounded-lg border border-gray-700">
                                    <h3 class="text-sm font-bold text-blue-400 mb-2">📌 关键要点</h3>
                                    <ul class="text-sm text-gray-400 space-y-1 list-disc list-inside">
                                        {currentStep === 0 && <li>DMA 硬件传输数据，不占用 CPU</li>}
                                        {currentStep === 0 && <li>CPU 配置后即可并行执行其他任务</li>}
                                        {currentStep === 0 && <li>传输完成后 DMA 产生中断通知</li>}
                                        {currentStep === 1 && <li>配置前必须先禁用通道</li>}
                                        {currentStep === 1 && <li>CPAR 外设地址，CMAR 内存地址</li>}
                                        {currentStep === 1 && <li>CNDTR 设置传输数据量</li>}
                                        {currentStep === 2 && <li>普通模式：传输一次后停止</li>}
                                        {currentStep === 2 && <li>循环模式：自动重新开始</li>}
                                        {currentStep === 2 && <li>M2M 模式：内存块快速复制</li>}
                                        {currentStep === 3 && <li>TC 中断：传输完成触发</li>}
                                        {currentStep === 3 && <li>HT 中断：半传输触发 (双缓冲)</li>}
                                        {currentStep === 3 && <li>TE 中断：传输错误触发</li>}
                                        {currentStep === 4 && <li>ADC+DMA 经典组合</li>}
                                        {currentStep === 4 && <li>循环模式实现连续采集</li>}
                                        {currentStep === 4 && <li>CPU 随时读取最新数据</li>}
                                        {currentStep === 5 && <li>双缓冲解决传输处理冲突</li>}
                                        {currentStep === 5 && <li>HT/TC 中断交替触发</li>}
                                        {currentStep === 5 && <li>实现无缝数据流</li>}
                                        {currentStep === 6 && <li>ADC/DAC/UART/M2M 应用</li>}
                                        {currentStep === 6 && <li>DMA 比 CPU 快 100 倍</li>}
                                        {currentStep === 6 && <li>零 CPU 占用</li>}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 底部控制栏 */}
                    <div class="border-t border-gray-700 bg-gray-800 p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <span class="text-sm text-gray-400">步骤 {currentStep + 1} / {STEPS.length}</span>
                                <div class="flex space-x-2">
                                    {STEPS.map((_, i) => (
                                        <button key={i} onClick={() => setCurrentStep(i)}
                                            className={`w-3 h-3 rounded-full transition-all ${i === currentStep ? 'bg-blue-400 scale-125' : 'bg-gray-600'}`}
                                        />
                                    ))}
                                </div>
                            </div>
                            <div class="flex space-x-3">
                                <button onClick={() => setCurrentStep((prev - 1 + STEPS.length) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    ⏮ 上一步
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)}
                                    className="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm transition-colors">
                                    {isPlaying ? '⏸ 暂停' : '▶ 播放'}
                                </button>
                                <button onClick={() => setCurrentStep((prev + 1) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    下一步 ⏭
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
