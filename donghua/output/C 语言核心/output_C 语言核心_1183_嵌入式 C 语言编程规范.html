// 1. 宏定义：全大写下划线分隔

} Point;

float movingAverage(float *samples, int N) {

// 1. 嵌入式系统慎用动态分配
// ❌ 不推荐 (可能碎片/失败)
void *p = malloc(size);

// ✅ 推荐：静态/栈分配
static uint8_t buffer[BUFFER_SIZE];
uint8_t localBuffer[256];

// 2. 必须使用时的规范
void function(void) {
    void *p = malloc(size);
    if (p == NULL) {
        return ERR_NO_MEMORY;  // 检查返回值
    }
    // ... 使用
    free(p);
    p = NULL;  // 防止悬空指针
}

// 3. 配对使用原则
// malloc ↔ free
// calloc ↔ free
// realloc ↔ free
// 开辟 ↔ 释放

// 4. 避免内存泄漏
typedef struct {
    int *data;
    int size;
} Buffer;

Buffer* createBuffer(int size) {
    Buffer *b = calloc(1, sizeof(Buffer));
    b->data = malloc(size);
    return b;
}

void destroyBuffer(Buffer *b) {
    if (b) {
        free(b->data);  // 先成员
        free(b);        // 后容器

                                        <pre className="text-gray-800 whitespace-pre-wrap">
                                            {CODE_EXAMPLES[step].code}
                                        </pre>
                                    </div>
                                    <div className="mt-3 p-3 bg-yellow-50 rounded border border-yellow-200">
                                        <p className="text-sm text-yellow-800">
                                            <span className="font-bold">亮点:</span> {CODE_EXAMPLES[step].highlight}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-gray-500">
                                    <h3 className="text-xl font-bold text-gray-700 mb-3">可视化演示</h3>
                                    {step === 0 && renderCompareTable()}
                                    {step === 1 && (
                                        <div className="p-4 bg-gradient-to-r from-slate-50 to-gray-50 rounded-lg">

                                            <div className="space-y-3">
                                                <div className="p-3 bg-blue-50 rounded border-l-4 border-blue-500">
                                                    <div className="font-bold text-blue-700">文件头</div>
                                                    <div className="text-xs text-blue-600">@file @brief @author @version</div>
                                                </div>
                                                <div className="p-3 bg-green-50 rounded border-l-4 border-green-500">
                                                    <div className="font-bold text-green-700">函数注释</div>
                                                    <div className="text-xs text-green-600">@param @return @note @pre</div>
                                                </div>
                                                <div className="p-3 bg-yellow-50 rounded border-l-4 border-yellow-500">
                                                    <div className="font-bold text-yellow-700">算法注释</div>

                                                </div>

                                                    <div className="text-xs text-red-600">待办/修复标记</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 2 && (
                                        <div className="p-4 bg-gradient-to-r from-slate-50 to-gray-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-slate-800 mb-4">排版示例</h4>
                                            <div className="space-y-3">
                                                <div className="p-3 bg-green-50 rounded">
                                                    <div className="font-bold text-green-700 mb-1">4 空格缩进</div>
                                                    <pre className="text-xs bg-white p-2 rounded">if (cond) &#123;
    doX();
&#125;</pre>
                                                </div>
                                                <div className="p-3 bg-blue-50 rounded">
                                                    <div className="font-bold text-blue-700 mb-1">K&R 大括号</div>
                                                    <pre className="text-xs bg-white p-2 rounded">if (cond) &#123;
    // ...
&#125;</pre>
                                                </div>
                                                <div className="p-3 bg-purple-50 rounded">
                                                    <div className="font-bold text-purple-700 mb-1">运算符空格</div>
                                                    <pre className="text-xs bg-white p-2 rounded">x = a + b * c;</pre>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 3 && (
                                        <div className="p-4 bg-gradient-to-r from-slate-50 to-gray-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-slate-800 mb-4">变量分类</h4>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="p-3 bg-blue-50 rounded">
                                                    <div className="font-bold text-blue-700">全局 g_</div>
                                                    <div className="text-xs font-mono">g_counter</div>
                                                </div>
                                                <div className="p-3 bg-green-50 rounded">
                                                    <div className="font-bold text-green-700">静态 s_</div>
                                                    <div className="text-xs font-mono">s_private</div>
                                                </div>
                                                <div className="p-3 bg-yellow-50 rounded">
                                                    <div className="font-bold text-yellow-700">常量 k</div>
                                                    <div className="text-xs font-mono">kMaxSize</div>
                                                </div>
                                                <div className="p-3 bg-purple-50 rounded">

                                                    <div className="text-xs font-mono">const int MAX</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                        <div className="p-4 bg-gradient-to-r from-slate-50 to-gray-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-slate-800 mb-4">函数设计原则</h4>
                                            <div className="space-y-2">
                                                <div className="p-3 bg-green-50 rounded">
                                                    <div className="font-bold text-green-700">单一职责</div>
                                                    <div className="text-xs text-green-600">一个函数一件事</div>
                                                </div>
                                                <div className="p-3 bg-blue-50 rounded">

                                                    <div className="text-xs text-blue-600">&lt; 50 行</div>
                                                </div>
                                                <div className="p-3 bg-yellow-50 rounded">
                                                    <div className="font-bold text-yellow-700">参数限制</div>
                                                    <div className="text-xs text-yellow-600">≤ 4 个参数</div>
                                                </div>
                                                <div className="p-3 bg-purple-50 rounded">
                                                    <div className="font-bold text-purple-700">检查返回值</div>
                                                    <div className="text-xs text-purple-600">所有调用检查错误</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                        <div className="p-4 bg-gradient-to-r from-slate-50 to-gray-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-slate-800 mb-4">错误码定义</h4>
                                            <div className="space-y-2">
                                                {[
                                                    {code: 'ERR_OK', value: 0, color: 'bg-green-100'},
                                                    {code: 'ERR_INVALID_ARG', value: -1, color: 'bg-yellow-100'},
                                                    {code: 'ERR_NO_MEMORY', value: -2, color: 'bg-orange-100'},
                                                    {code: 'ERR_TIMEOUT', value: -3, color: 'bg-red-100'},
                                                    {code: 'ERR_NOT_FOUND', value: -4, color: 'bg-purple-100'}
                                                ].map((item, i) => (
                                                    <div key={i} className={`p-2 ${item.color} rounded flex justify-between items-center`}>
                                                        <span className="font-mono text-xs font-bold">{item.code}</span>
                                                        <span className="text-xs">{item.value}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                    {step === 6 && (
                                        <div className="p-4 bg-gradient-to-r from-slate-50 to-gray-50 rounded-lg">
                                            <h4 className="text-lg font-bold text-slate-800 mb-4">内存分配对比</h4>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="p-3 bg-green-50 rounded border-2 border-green-300">
                                                    <h5 className="font-bold text-green-700 mb-2">✅ 静态</h5>
                                                    <pre className="text-xs bg-white p-2 rounded">static uint8_t buf[256];</pre>
                                                    <div className="text-xs text-green-600 mt-2">无碎片，可预测</div>
                                                </div>
                                                <div className="p-3 bg-red-50 rounded border-2 border-red-300">
                                                    <h5 className="font-bold text-red-700 mb-2">⚠️ 动态</h5>
                                                    <pre className="text-xs bg-white p-2 rounded">malloc(size);</pre>
                                                    <div className="text-xs text-red-600 mt-2">可能碎片/失败</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {step === 7 && renderCheckList()}
                                </div>
                            </div>

                            <div className="lg:col-span-1 space-y-4">
                                <div className="bg-white rounded-lg shadow-lg p-4 border-l-4 border-blue-500">
                                    <h3 className="text-xl font-bold text-blue-700 mb-3">关键要点</h3>
                                    <div className="space-y-3">
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 0 ? 'bg-slate-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-slate-600">命名:</span> 语义化前缀
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 1 ? 'bg-gray-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-gray-600">注释:</span> Doxygen 风格
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 2 ? 'bg-blue-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-blue-600">排版:</span> 4 空格缩进
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 3 ? 'bg-green-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-green-600">变量:</span> 限制全局
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 4 ? 'bg-yellow-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-yellow-600">函数:</span> 单一职责
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 5 ? 'bg-purple-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-purple-600">错误:</span> 统一码
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 6 ? 'bg-pink-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-pink-600">内存:</span> 优先静态
                                            </p>
                                        </div>
                                        <div className={`p-3 rounded transition-all duration-500 ${step === 7 ? 'bg-teal-100 scale-105' : 'bg-gray-50'}`}>
                                            <p className="text-sm text-gray-800">
                                                <span className="font-bold text-teal-600">检查:</span> 5 维度
                                            </p>
                                        </div>
                                    </div>
                                    <div className="mt-4 p-3 bg-blue-50 rounded border border-blue-200">
                                        <p className="text-sm text-blue-800">
                                            {CODE_EXAMPLES[step].explanation}
                                        </p>
                                    </div>
                                </div>

                                <div className="bg-gradient-to-r from-slate-500 to-gray-600 rounded-lg shadow-lg p-4 text-white">
                                    <div className="flex items-center justify-between mb-2">
                                        <span className="text-sm">进度</span>
                                        <span className="text-sm font-bold">{step + 1} / {CODE_EXAMPLES.length}</span>
                                    </div>
                                    <div className="w-full bg-white bg-opacity-30 rounded-full h-2">
                                        <div
                                            className="bg-white rounded-full h-2 transition-all duration-500"
                                            style={{ width: `${((step + 1) / CODE_EXAMPLES.length) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <footer className="text-center mt-8 text-gray-600">
                            <p className="text-sm">C 语言核心 · 嵌入式 C 语言编程规范 · 高质量代码基础</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
