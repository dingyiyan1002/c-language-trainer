<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLOR_MAP = {
            primary: '#8b5cf6',    // Purple - Digital
            secondary: '#06b6d4',  // Cyan - Analog
            accent1: '#f97316',    // Orange - R-2R
            accent2: '#22c55e',    // Green - Output
            accent3: '#eab308',    // Yellow - Reference
            accent4: '#ef4444',    // Red - Error
        };

        const STEPS = [
            {
                title: "DAC 基础概念",
                description: "数字信号到模拟信号的转换",
                code: `// DAC 核心概念
// 1. 数字输入：离散的数字值 (0-2^n -1)
// 2. 模拟输出：连续变化的电压/电流
// 3. 分辨率：n 位 (8/10/12/16 位)
// 4. 参考电压：Vref (决定输出范围)
// 5. 建立时间：数字变化到输出稳定的时间

// STM32 DAC 特性
// - 12 位分辨率
// - 双通道输出 (DAC_OUT1, DAC_OUT2)
// - 支持电压/电流输出
// - 内部/外部参考
// - DMA 传输支持
// - 波形生成功能

// 输出电压计算
// Vout = (Digital_Value × Vref) / 4095
// 例：Digital=2048, Vref=3.3V
// Vout = 2048 × 3.3 / 4095 ≈ 1.65V

// 分辨率与 LSB
// 12 位：4096 级 (0-4095)
// LSB = Vref / 4096 = 3.3V / 4096 ≈ 0.8mV`,
                visualState: { showConcept: true, showDigital: true, showAnalog: true }
            },
            {
                title: "DAC 转换原理",
                description: "电阻网络与解码电路",
                code: `// DAC 核心结构

// 1. R-2R 梯形电阻网络
// 经典 DAC 架构，使用两种阻值
// 优点：仅需两种精密电阻
// 缺点：速度受限

// R-2R 网络原理
// 每个节点：R 和 2R 电阻
// 电流按二进制权重分配
// MSB 电流 = I, LSB 电流 = I/2^(n-1)

// 2. 权电阻网络
// 每个位对应一个权电阻
// 电阻值：R, 2R, 4R, 8R... 2^(n-1)R
// 优点：简单直观
// 缺点：电阻值范围大，难匹配

// 3. 电流舵型 (Current Steering)
// 高速 DAC 常用架构
// 电流源阵列，开关切换
// 速度可达 MSPS 级

// 建立时间 (Settling Time)
// 数字输入变化到输出稳定在±0.5 LSB 内的时间
// STM32 DAC: ~1μs @ 12 位`,
                visualState: { showPrinciple: true, showR2R: true }
            },
            {
                title: "DAC 输出模式",
                description: "电压输出与电流输出",
                code: `// DAC 输出配置

// 1. 电压输出模式
// 内部缓冲放大器
// 输出阻抗低，驱动能力强
// 范围：0 ~ Vref (轨到轨)

void DAC_VoltageMode(void) {
    DAC->CR |= DAC_CR_EN1;        // 使能通道 1
    DAC->CR &= ~DAC_CR_BOFF1;     // 使能缓冲
    // Vout = (DOR1 × Vref) / 4095
}

// 2. 电流输出模式
// 关闭内部缓冲
// 需外接运放或负载
// 适合驱动特定负载

void DAC_CurrentMode(void) {
    DAC->CR |= DAC_CR_EN1;
    DAC->CR |= DAC_CR_BOFF1;      // 关闭缓冲
    // 外接负载电阻转换为电压
}

// 3. 输出范围扩展
// 使用外部运放放大
// 例：增益=2，输出 0~6.6V

// 负载能力
// 内部缓冲：约 5mA
// 外部运放：可达 100mA+`,
                visualState: { showOutput: true, showVoltage: true, showCurrent: true }
            },
            {
                title: "DAC 触发源",
                description: "软件触发与硬件触发",
                code: `// DAC 触发源配置

// 1. 软件触发
// CPU 写 DHR 寄存器后手动触发
// 适合低速、按需更新

void DAC_SoftwareTrigger(void) {
    DAC->DHR12R1 = value;    // 写入数据
    DAC->SWTRIGR |= 1;        // 软件触发
    // 输出立即更新
}

// 2. 定时器触发 (硬件)
// 自动周期性更新
// 适合波形生成

void DAC_TimerTrigger(void) {
    DAC->CR |= DAC_CR_TEN1;      // 使能触发
    DAC->CR &= ~DAC_CR_TSEL1;    // 选择 TRGO

    // 配置定时器
    TIM6->PSC = 7199;            // 72MHz/7200 = 10kHz
    TIM6->ARR = 99;              // 100 分频
    TIM6->CR2 |= TIM_CR2_MMS_1;  // TRGO = Update
}

// 3. DMA 触发
// 配合定时器自动输出波形
// 无需 CPU 干预

void DAC_DMAWaveform(void) {
    DAC->CR |= DAC_CR_DMAEN1;    // 使能 DMA
    // DMA 自动从内存传输到 DHR
}`,
                visualState: { showTrigger: true, showSoftware: true, showHardware: true }
            },
            {
                title: "DAC 波形生成",
                description: "正弦波、三角波、锯齿波",
                code: `// DAC 波形生成

// 1. 正弦波生成
// 使用查找表 (LUT)
#define SINE_TABLE_SIZE 256
const uint16_t sine_table[SINE_TABLE_SIZE] = {
    2048, 2098, 2148, ...  // 预计算正弦值
};

void DAC_GenerateSine(void) {
    static uint32_t index = 0;
    DAC->DHR12R1 = sine_table[index];
    index = (index + 1) % SINE_TABLE_SIZE;
}

// 2. 三角波生成
// 使用硬件三角波模式
void DAC_TriangleWave(void) {
    DAC->CR |= DAC_CR_WAVE1_0;   // 三角波
    DAC->CR |= (11 << 8);        // 幅度 12 位
}

// 3. 锯齿波生成
// 线性递增后突变
void DAC_SawtoothWave(void) {
    static uint16_t value = 0;
    value += 100;
    if (value > 4095) value = 0;
    DAC->DHR12R1 = value;
}

// 噪声波形
// DAC 内置噪声生成功能
DAC->CR |= DAC_CR_WAVE1_1;  // 噪声模式`,
                visualState: { showWaveform: true, showSine: true, showTriangle: true }
            },
            {
                title: "DAC 数据传输",
                description: "轮询、中断、DMA 方式",
                code: `// DAC 数据传输方式

// 1. 轮询方式
// CPU 直接写入 DHR 寄存器
// 简单但占用 CPU
void DAC_Poll(uint16_t value) {
    DAC->DHR12R1 = value;
    // 立即更新输出 (软件触发)
}

// 2. 中断方式
// 转换完成/ DMA 传输完成中断
void DAC_InterruptInit(void) {
    DAC->CR |= DAC_CR_DMAUDRIE1;  // DMA 欠载中断
    NVIC_EnableIRQ(DAC_IRQn);
}

void DAC_IRQHandler(void) {
    if (DAC->SR & DAC_SR_DMAUDR1) {
        // DMA 欠载，重新加载
        DAC->SR |= DAC_SR_DMAUDR1;  // 清除标志
    }
}

// 3. DMA 方式 (推荐)
// 自动传输，适合波形生成
void DAC_DMAInit(uint16_t *buffer, uint32_t size) {
    DAC->CR |= DAC_CR_DMAEN1;     // 使能 DAC DMA

    DMA1->CPAR = (uint32_t)&DAC->DHR12R1;
    DMA1->CMAR = (uint32_t)buffer;
    DMA1->CNDTR = size;
    DMA1->CCR |= DMA_CCR_CIRC;    // 循环模式
    DMA1->CCR |= DMA_CCR_MINC;    // 内存自增
    DMA1->CCR |= DMA_CCR_EN;
}`,
                visualState: { showTransfer: true, showDMA: true }
            },
            {
                title: "DAC 误差与校准",
                description: "偏移、增益与非线性误差",
                code: `// DAC 误差来源

// 1. 偏移误差 (Offset Error)
// 零输入时输出不为零
// 可通过校准消除

// 2. 增益误差 (Gain Error)
// 满量程输出偏差
// 与参考电压相关

// 3. 微分非线性 (DNL)
// 相邻码的步长不一致
// DNL > -1 LSB 保证单调性

// 4. 积分非线性 (INL)
// 实际曲线偏离理想直线
// 影响精度

// 5. 毛刺 (Glitch)
// 主进位切换时的尖峰
// 例：0111→1000

// 6. 建立时间 (Settling Time)
// 输出稳定到±0.5 LSB 的时间

// 校准方法
void DAC_Calibrate(void) {
    // 1. 测量零点输出
    DAC->DHR12R1 = 0;
    uint16_t offset = MeasureOutput();

    // 2. 测量满量程
    DAC->DHR12R1 = 4095;
    uint16_t fullscale = MeasureOutput();

    // 3. 计算校正系数
    // 后续输出 = (理想值 × gain) + offset
}`,
                visualState: { showCalibration: true, showErrors: true }
            },
            {
                title: "DAC 应用实例",
                description: "信号发生器与电机控制",
                code: `// 应用 1: DDS 信号发生器
// 直接数字频率合成 (Direct Digital Synthesis)

#define SAMPLE_RATE 48000
#define SINE_SIZE 1024

void DDS_Generate(float frequency) {
    uint32_t phase_inc = (frequency * SINE_SIZE) / SAMPLE_RATE;
    static uint32_t phase = 0;

    while (1) {
        DAC->DHR12R1 = sine_table[phase >> 16];
        phase += phase_inc;
        Delay_us(1000000 / SAMPLE_RATE);
    }
}

// 应用 2: 电机控制 (FOC)
// 生成三相正弦 PWM 参考

void FOC_GenerateThreePhase(void) {
    static uint16_t angle = 0;
    angle += 10;  // 相位增量

    uint16_t ua = sine_table[angle % 1024];
    uint16_t ub = sine_table[(angle + 341) % 1024];  // -120°
    uint16_t uc = sine_table[(angle + 682) % 1024];  // -240°

    DAC1->DHR12R1 = ua;  // U 相
    DAC2->DHR12R1 = ub;  // V 相
    // W 相 = -(ua + ub)
}

// 应用 3: 可编程电源
// DAC + 运放 + ADC 反馈`,
                visualState: { showApplication: true, showDDS: true, showMotor: true }
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isAutoPlaying, setIsAutoPlaying] = useState(true);
            const [showAnswer, setShowAnswer] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const speak = (text) => {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const zhVoice = voices.find(v =>
                    v.lang === 'zh-CN' &&
                    (v.name.includes('Xiaoxiao') || v.name.includes('Chinese'))
                );
                if (zhVoice) utterance.voice = zhVoice;
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.lang = 'zh-CN';

                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (isAutoPlaying && currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 800);
                };
                utterance.onerror = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (isAutoPlaying && currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 800);
                };
                speechSynthesis.speak(utterance);
            };

            useEffect(() => {
                speak(STEPS[currentStep].title + '。' + STEPS[currentStep].description);
                return () => clearTimeout(voiceEndTimerRef.current);
            }, [currentStep]);

            const handleNext = () => {
                if (currentStep < STEPS.length - 1) {
                    setCurrentStep(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setCurrentStep(prev => prev - 1);
                }
            };

            const handleRestart = () => {
                setCurrentStep(0);
                speechSynthesis.cancel();
                setTimeout(() => speak(STEPS[0].title + '。' + STEPS[0].description), 100);

                                <line x1="250" y1="80" x2="270" y2="100" stroke={COLOR_MAP.secondary} strokeWidth="2" />

                                {/* Timing diagram */}

                        {/* DMA Transfer */}
                        {(vs.showTransfer || vs.showDMA) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">DMA 波形输出:</text>

                                <text x="165" y="70" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">DMA</text>
                                <text x="165" y="85" fill={COLOR_MAP.accent1} fontSize="7" textAnchor="middle">自动传输</text>
                                <text x="165" y="100" fill={COLOR_MAP.accent1} fontSize="7" textAnchor="middle">循环模式</text>

                                {/* DAC */}

                                <text x="265" y="70" fill={COLOR_MAP.accent3} fontSize="8" textAnchor="middle">DAC_DHR</text>
                                <text x="265" y="85" fill={COLOR_MAP.accent3} fontSize="7" textAnchor="middle">数据寄存器</text>

                                {/* Output */}
                                <rect x="330" y="50" width="50" height="60" fill={COLOR_MAP.secondary} opacity="0.3" stroke={COLOR_MAP.secondary} strokeWidth="2" />
                                <text x="355" y="80" fill={COLOR_MAP.secondary} fontSize="8" textAnchor="middle">Vout</text>

                                {/* Arrows */}
                                <line x1="105" y1="80" x2="125" y2="80" stroke={COLOR_MAP.accent4} strokeWidth="2" />
                                <line x1="205" y1="80" x2="225" y2="80" stroke={COLOR_MAP.accent4} strokeWidth="2" />
                                <line x1="305" y1="80" x2="325" y2="80" stroke={COLOR_MAP.accent4} strokeWidth="2" />

                                {/* Timer trigger */}
                                <rect x="130" y="120" width="70" height="30" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="165" y="140" fill={COLOR_MAP.accent2} fontSize="7" textAnchor="middle">TIM TRGO</text>
                                <line x1="165" y1="120" x2="165" y2="115" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                            </g>
                        )}

                        {/* Calibration and Errors */}
                        {(vs.showCalibration || vs.showErrors) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">DAC 误差与校准:</text>

                                {/* Error types */}
                                <rect x="20" y="50" width="150" height="80" fill={COLOR_MAP.accent1} opacity="0.1" stroke={COLOR_MAP.accent1} strokeWidth="1" />
                                <text x="95" y="70" fill="#fff" fontSize="8" textAnchor="middle">误差来源</text>
                                <text x="30" y="90" fill={COLOR_MAP.accent4} fontSize="7">• 偏移误差 (Offset)</text>
                                <text x="30" y="105" fill={COLOR_MAP.accent4} fontSize="7">• 增益误差 (Gain)</text>
                                <text x="30" y="120" fill={COLOR_MAP.accent4} fontSize="7">• 非线性 (INL/DNL)</text>

                                {/* Ideal vs Actual */}
                                <rect x="190" y="50" width="170" height="80" fill={COLOR_MAP.primary} opacity="0.1" stroke={COLOR_MAP.primary} strokeWidth="1" />
                                <text x="275" y="70" fill="#fff" fontSize="8" textAnchor="middle">理想 vs 实际传输曲线</text>

                                {/* Staircase */}
                                {[0,1,2,3,4,5,6,7].map((i) => (
                                    <g key={i}>
                                        <line x1={200 + i * 20} y1={120 - i * 5} x2={200 + i * 20 + 15} y2={120 - i * 5} stroke={COLOR_MAP.accent2} strokeWidth="1" />
                                        <line x1={200 + i * 20 + 15} y1={120 - i * 5} x2={200 + i * 20 + 15} y2={115 - i * 5} stroke={COLOR_MAP.accent2} strokeWidth="1" />

                                {/* Glitch illustration */}

                                <polygon points="60,145 55,155 65,155" fill={COLOR_MAP.accent4} />
                                <line x1="60" y1="155" x2="100" y2="155" stroke={COLOR_MAP.secondary} strokeWidth="2" />
                                <text x="110" y="170" fill={COLOR_MAP.accent4} fontSize="7">主进位跳变</text>
                            </g>
                        )}

                        {/* Applications */}
                        {(vs.showApplication || vs.showDDS || vs.showMotor) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">DAC 应用实例:</text>

                                <rect x="75" y="130" width="40" height="20" fill={COLOR_MAP.accent3} opacity="0.4" />
                                <text x="95" y="143" fill="#fff" fontSize="6" textAnchor="middle">LUT</text>
                                <line x1="115" y1="140" x2="130" y2="140" stroke={COLOR_MAP.accent4} strokeWidth="2" />

                                <text x="275" y="70" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">电机 FOC 控制</text>
                                <text x="275" y="90" fill="#fff" fontSize="7" textAnchor="middle">三相正弦参考</text>
                                <text x="275" y="105" fill="#fff" fontSize="7" textAnchor="middle">U/V/W 三相</text>

                                {/* Three phase */}

                                <text x="210" y="155" fill={COLOR_MAP.accent1} fontSize="7">V 相：sin(θ-120°)</text>
                                <text x="210" y="170" fill={COLOR_MAP.accent1} fontSize="7">W 相：sin(θ-240°)</text>

                                {/* Programmable Power */}
                                <rect x="200" y="180" width="150" height="40" fill={COLOR_MAP.accent3} opacity="0.2" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="275" y="200" fill={COLOR_MAP.accent3} fontSize="8" textAnchor="middle">可编程电源</text>
                                <text x="275" y="215" fill={COLOR_MAP.accent3} fontSize="7" textAnchor="middle">DAC+ 运放+ADC 反馈</text>
                            </g>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-4">
                            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
                                1198. DAC 数模转换完整指南
                            </h1>
                            <p className="text-gray-400 text-sm">R-2R 网络 · 波形生成 · DMA 传输 · DDS 应用</p>
                        </div>

                        {/* Progress Bar */}
                        <div className="mb-4">
                            <div className="flex justify-between text-xs text-gray-400 mb-1">
                                <span>步骤 {currentStep + 1} / {STEPS.length}</span>
                                <span>{Math.round(((currentStep + 1) / STEPS.length) * 100)}%</span>
                            </div>
                            <div className="w-full bg-gray-800 rounded-full h-2">
                                <div
                                    className="h-2 rounded-full transition-all duration-500"
                                    style={{
                                        width: `${((currentStep + 1) / STEPS.length) * 100}%`,
                                        background: `linear-gradient(90deg, ${COLOR_MAP.primary}, ${COLOR_MAP.secondary})`
                                    }}
                                />
                            </div>
                        </div>

                        {/* Main Content - Three Column Layout */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            {/* Left: Code */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.primary }}>
                                    💻 代码示例
                                </h3>
                                <pre className="text-xs text-gray-300 overflow-x-auto whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>

                            {/* Center: Visualization */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.secondary }}>
                                    🔬 可视化动画
                                </h3>
                                <svg className="w-full h-64" viewBox="0 0 400 320">
                                    <DACVisualization />
                                </svg>
                            </div>

                            {/* Right: Explanation */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.accent1 }}>
                                    📖 核心概念
                                </h3>
                                <ul className="space-y-2 text-sm text-gray-300">
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.primary }}>逆过程:</strong> 数字→模拟转换</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.secondary }}>R-2R 网络:</strong> 精密电阻阵列</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent1 }}>输出模式:</strong> 电压/电流可选</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent2 }}>触发源:</strong> 软件/定时器/DMA</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent3 }}>波形生成:</strong> 正弦/三角/锯齿波</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.primary }}>DDS 应用:</strong> 直接数字频率合成</span>
                                    </li>
                                </ul>

                                {/* Code Challenge */}
                                <div className="mt-4 p-3 bg-gray-700 rounded">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-semibold">💡 代码挑战</span>
                                        <button
                                            onClick={() => setShowAnswer(!showAnswer)}
                                            className="text-xs px-2 py-1 rounded"
                                            style={{ backgroundColor: COLOR_MAP.primary, color: '#fff' }}
                                        >
                                            {showAnswer ? '隐藏' : '显示'}答案
                                        </button>
                                    </div>
                                    <p className="text-xs text-gray-400 mb-2">
                                        计算产生 1kHz 正弦波所需的定时器频率 (256 点/周期):
                                    </p>
                                    {showAnswer && (
                                        <pre className="text-xs text-gray-300 overflow-x-auto">
{`// 定时器频率 = 输出频率 × 点数/周期
// f_timer = 1000 × 256 = 256 kHz

// STM32 配置 (72MHz 时钟)
TIM6->PSC = 72000000 / 256000 - 1;  // = 279
TIM6->ARR = 255;  // 256 点

// 或使用定时器更新事件
// 72MHz / (280 × 256) ≈ 1kHz`,
                                        </pre>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Control Buttons */}
                        <div className="flex justify-center gap-3 mb-4">
                            <button
                                onClick={handlePrev}
                                disabled={currentStep === 0}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === 0
                                        ? 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                        : 'bg-gray-600 text-white hover:bg-gray-500'
                                }`}
                            >
                                ← 上一步
                            </button>

                            <button
                                onClick={handleRestart}
                                className="px-6 py-3 rounded-lg font-semibold bg-gray-700 text-white hover:bg-gray-600 transition-all"
                            >
                                🔄 重新开始
                            </button>

                            <button
                                onClick={handleNext}
                                disabled={currentStep === STEPS.length - 1}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === STEPS.length - 1
                                        ? 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                        : 'bg-gray-600 text-white hover:bg-gray-500'
                                }`}
                            >
                                下一步 →
                            </button>
                        </div>

                        {/* Autoplay Toggle */}
                        <div className="text-center">
                            <button
                                onClick={() => setIsAutoPlaying(!isAutoPlaying)}
                                className={`px-4 py-2 rounded-lg font-semibold transition-all ${
                                    isAutoPlaying
                                        ? 'bg-green-600 text-white'
                                        : 'bg-gray-700 text-gray-300'
                                }`}
                            >
                                {isAutoPlaying ? '▶️ 自动播放中' : '⏸️ 已暂停'}
                            </button>
                        </div>

                        {/* Step Indicators */}
                        <div className="flex justify-center gap-2 mt-4 flex-wrap">
                            {STEPS.map((step, index) => (
                                <button
                                    key={index}
                                    onClick={() => setCurrentStep(index)}
                                    className={`px-3 py-2 rounded-lg text-xs font-medium transition-all ${
                                        index === currentStep
                                            ? 'bg-white text-gray-900'
                                            : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                                    }`}
                                >
                                    {index + 1}. {step.title}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
