<!DOCTYPE html>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flow { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes highlight { 0%, 100% { background-color: #3b82f6; } 50% { background-color: #60a5fa; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bitStream { 0% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(200px); opacity: 0.5; } }
        @keyframes baudTick { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLOR_MAP = {
            primary: '#22c55e',    // Green - TX
            secondary: '#3b82f6',  // Blue - RX
            accent1: '#f97316',    // Orange - Start/Stop
            accent2: '#a855f7',    // Purple - Data
            accent3: '#eab308',    // Yellow - Parity
            accent4: '#ef4444',    // Red - Error
        };

        const STEPS = [
            {
                title: "UART/USART 基础",
                description: "异步串行通信协议",
                code: `// UART/USART 特性
// 1. 异步通信 (无需时钟线)
// 2. 全双工 (同时收发)
// 3. 两根线：TX + RX
// 4. 波特率：9600, 19200, 115200 等
// 5. 空闲状态：高电平 (逻辑 1)

// 硬件连接 (交叉连接)
// MCU1 TX ───→ RX MCU2
// MCU1 RX ←─── TX MCU2
// MCU1 GND ─── GND MCU2

// UART vs USART
// UART: Universal Asynchronous RX/TX
// USART: Universal Synchronous/Asynchronous RX/TX
// USART 额外支持同步模式 (带时钟)

// 典型应用
// - 调试输出 (printf)
// - GPS/蓝牙/WiFi 模块
// - 传感器通信
// - Bootloader`,
                visualState: { showConnection: true, showCrossConnect: true }
            },
            {
                title: "UART 数据帧格式",
                description: "起始位 + 数据位 + 校验位 + 停止位",
                code: `// UART 数据帧格式
// ┌─────┬──────────┬──────┬──────┐
// │START│ DATA[7:0]│PARITY│ STOP │
// └─────┴──────────┴──────┴──────┘
//   │       │        │      │
//   │       │        │      └─ 停止位 (1/1.5/2 位)
//   │       │        └─ 校验位 (可选)
//   │       └─ 数据位 (5-9 位，常用 8 位)
//   └─ 起始位 (1 位，低电平)

// 常见配置表示法
// 8N1: 8 数据位，无校验，1 停止位 (最常用)
// 8E1: 8 数据位，偶校验，1 停止位
// 7O2: 7 数据位，奇校验，2 停止位

// 时序图 (8N1, 发送字节 0x55)
// 空闲：───────────────────────
// 起始：───────↓
// 数据：       D0 D1 D2 D3 D4 D5 D6 D7
//            (0  1  0  1  0  1  0  1) 0x55
// 停止：                             ↑───
// 空闲：───────────────────────────────`,
                visualState: { showFrame: true, show8N1: true }
            },
            {
                title: "波特率与位时序",
                description: "波特率计算与采样",
                code: `// 波特率定义
// 波特率 = 每秒传输的位数 (bits per second)
// 常见波特率：9600, 19200, 38400, 115200

// STM32 波特率计算 (APB 时钟 72MHz)
// Baud = fCLK / (16 × USARTDIV)
// USARTDIV = fCLK / (16 × Baud)

// 例：115200 波特率
// USARTDIV = 72000000 / (16 × 115200) = 39.0625
// 整数部分：39 = 0x27
// 小数部分：0.0625 × 16 = 1 = 0x1
// USART_BRR = 0x271

void UART_Init(uint32_t baud) {
    // 使能时钟
    RCC->APB2ENR |= RCC_APB2ENR_USART1EN;

    // 配置 TX(PA9) RX(PA10)
    GPIOA->CRH &= ~(0xFF << 4);
    GPIOA->CRH |= (0xB << 4) | (0x4 << 8);  // TX 复用推挽，RX 浮空输入

    // 设置波特率 115200
    USART1->BRR = 0x271;

    // 配置：8 数据位，1 停止位，无校验
    USART1->CR1 = USART_CR1_TE | USART_CR1_RE | USART_CR1_UE;
}`,
                visualState: { showBaud: true, showSampling: true }
            },
            {
                title: "UART 发送原理",
                description: "并行转串行与移位寄存器",
                code: `// UART 发送器框图
// CPU 写入 DR → 发送移位寄存器 → TX 引脚
//                (并行转串行)

// 发送流程
// 1. CPU 写入数据寄存器 (DR/TDR)
// 2. 数据加载到发送移位寄存器
// 3. TXE 标志置位 (发送寄存器空)
// 4. 移位寄存器逐位发送到 TX 引脚
// 5. TC 标志置位 (发送完成)

// 查询方式发送
void UART_SendByte(uint8_t data) {
    while (!(USART1->SR & USART_SR_TXE));  // 等待 TXE
    USART1->DR = data;                      // 写入数据
    while (!(USART1->SR & USART_SR_TC));   // 等待 TC
}

// 中断方式发送
void USART1_IRQHandler(void) {
    if (USART1->SR & USART_SR_TXE) {
        if (txCount < txLen) {
            USART1->DR = txBuffer[txCount++];
        } else {
            USART1->CR1 &= ~USART_CR1_TXEIE;  // 关闭中断
        }
    }
}`,
                visualState: { showTransmit: true, showShiftRegister: true }
            },
            {
                title: "UART 接收原理",
                description: "串行转并行与过采样",
                code: `// UART 接收器框图
// RX 引脚 → 接收移位寄存器 → 数据寄存器 DR → CPU 读取
//          (串行转并行)

// 接收流程
// 1. 检测起始位 (下降沿)
// 2. 每位中间时刻采样 (16 倍过采样)
// 3. 8 位数据移入接收移位寄存器
// 4. 校验位检查 (如有)
// 5. 停止位验证
// 6. RXNE 标志置位 (接收非空)
// 7. CPU 读取 DR 寄存器

// 查询方式接收
uint8_t UART_RecvByte(void) {
    while (!(USART1->SR & USART_SR_RXNE));  // 等待 RXNE
    return USART1->DR;                       // 读取数据
}

// 中断方式接收
void USART1_IRQHandler(void) {
    if (USART1->SR & USART_SR_RXNE) {
        uint8_t data = USART1->DR;
        rxBuffer[rxCount++] = data;
        if (rxCount >= RX_BUFFER_SIZE) {
            rxComplete = 1;
        }
    }
}`,
                visualState: { showReceive: true, showOversampling: true }
            },
            {
                title: "UART 校验方式",
                description: "奇校验、偶校验与无校验",
                code: `// 校验位作用
// 检测单比特错误，提高可靠性

// 偶校验 (Even Parity)
// 数据位 + 校验位中 1 的个数 = 偶数
// 例：0x55 (01010101) → 4 个 1 → 校验位=0
//     0x0F (00001111) → 4 个 1 → 校验位=0
//     0x01 (00000001) → 1 个 1 → 校验位=1

// 奇校验 (Odd Parity)
// 数据位 + 校验位中 1 的个数 = 奇数
// 例：0x55 (01010101) → 4 个 1 → 校验位=1
//     0x0F (00001111) → 4 个 1 → 校验位=1
//     0x01 (00000001) → 1 个 1 → 校验位=0

// 无校验 (No Parity)
// 不使用校验位，常用配置 8N1

// STM32 校验配置
void UART_ParityConfig(USART_TypeDef* USARTx, uint8_t parity) {
    USARTx->CR1 &= ~(USART_CR1_PCE | USART_CR1_PS);
    if (parity == EVEN) {
        USARTx->CR1 |= USART_CR1_PCE;  // 偶校验
    } else if (parity == ODD) {
        USARTx->CR1 |= USART_CR1_PCE | USART_CR1_PS;  // 奇校验
    }
    // parity == NONE: 清除所有位
}`,
                visualState: { showParity: true, showEven: true, showOdd: true }
            },
            {
                title: "UART 错误处理",
                description: "帧错误、溢出错误与校验错误",
                code: `// UART 错误类型

// 1. 帧错误 (Frame Error, FE)
// 原因：停止位不是高电平
// 可能：波特率不匹配、噪声干扰

// 2. 溢出错误 (Overrun Error, ORE)
// 原因：RXNE 未清零时新数据到达
// 后果：前一个数据丢失

// 3. 噪声错误 (Noise Error, NE)
// 原因：采样期间检测到毛刺
// 可能：电磁干扰、信号质量问题

// 4. 校验错误 (Parity Error, PE)
// 原因：接收校验位与计算不符
// 可能：噪声、波特率偏差

// 错误处理函数
void UART_ErrorHandler(void) {
    uint32_t sr = USART1->SR;

    if (sr & USART_SR_FE) {
        // 帧错误 - 检查波特率
        log_error("Frame Error");
        USART1->CR |= USART_CR_RE;  // 重新使能接收
    }
    if (sr & USART_SR_ORE) {
        // 溢出错误 - 清空 DR
        volatile uint32_t tmp = USART1->SR;
        tmp = USART1->DR;  // 读 SR 后读 DR 清除
        log_error("Overrun Error");
    }
    if (sr & USART_SR_PE) {
        // 校验错误 - 重新同步
        log_error("Parity Error");
    }
}`,
                visualState: { showErrors: true, showErrorTypes: true }
            },
            {
                title: "UART 应用实例",
                description: "printf 重定向与环形缓冲区",
                code: `// printf 重定向 (使用 MicroLIB)
#include <stdio.h>

int fputc(int ch, FILE *f) {
    while (!(USART1->SR & USART_SR_TXE));
    USART1->DR = ch;
    return ch;
}

int fgetc(FILE *f) {
    while (!(USART1->SR & USART_SR_RXNE));
    return USART1->DR;
}

// 环形缓冲区 (Ring Buffer)
#define RX_BUFFER_SIZE 256
typedef struct {
    uint8_t buffer[RX_BUFFER_SIZE];
    volatile uint16_t head;
    volatile uint16_t tail;
} RingBuffer_t;

static RingBuffer_t rxRing;

void RingBuf_Init(void) {
    rxRing.head = 0;
    rxRing.tail = 0;
}

void RingBuf_Push(uint8_t data) {
    uint16_t next = (rxRing.head + 1) % RX_BUFFER_SIZE;
    if (next != rxRing.tail) {
        rxRing.buffer[rxRing.head] = data;
        rxRing.head = next;
    }
}

uint8_t RingBuf_Pop(void) {
    if (rxRing.head == rxRing.tail) return 0;
    uint8_t data = rxRing.buffer[rxRing.tail];
    rxRing.tail = (rxRing.tail + 1) % RX_BUFFER_SIZE;
    return data;
}`,
                visualState: { showApplication: true, showRingBuffer: true }
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isAutoPlaying, setIsAutoPlaying] = useState(true);
            const [showAnswer, setShowAnswer] = useState(false);
            const voiceEndTimerRef = useRef(null);

            const speak = (text) => {
                if (!text) return;
                const utterance = new SpeechSynthesisUtterance(text);
                const voices = speechSynthesis.getVoices();
                const zhVoice = voices.find(v =>
                    v.lang === 'zh-CN' &&
                    (v.name.includes('Xiaoxiao') || v.name.includes('Chinese'))
                );
                if (zhVoice) utterance.voice = zhVoice;
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.lang = 'zh-CN';

                utterance.onend = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (isAutoPlaying && currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 800);
                };
                utterance.onerror = () => {
                    voiceEndTimerRef.current = setTimeout(() => {
                        if (isAutoPlaying && currentStep < STEPS.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        }
                    }, 800);
                };
                speechSynthesis.speak(utterance);
            };

            useEffect(() => {
                speak(STEPS[currentStep].title + '。' + STEPS[currentStep].description);
                return () => clearTimeout(voiceEndTimerRef.current);
            }, [currentStep]);

            const handleNext = () => {
                if (currentStep < STEPS.length - 1) {
                    setCurrentStep(prev => prev + 1);
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setCurrentStep(prev => prev - 1);
                }
            };

            const handleRestart = () => {
                setCurrentStep(0);
                speechSynthesis.cancel();
                setTimeout(() => speak(STEPS[0].title + '。' + STEPS[0].description), 100);
            };

            const UARTVisualization = () => {
                const step = STEPS[currentStep];
                const vs = step.visualState;

                return (
                    <div className="w-full h-96 bg-gray-800 rounded-lg p-6 relative overflow-hidden">
                        {/* Cross Connection */}
                        {(vs.showConnection || vs.showCrossConnect) && (
                            <g>
                                {/* Device 1 */}
                                <rect x="20" y="40" width="100" height="80" rx="5" fill={COLOR_MAP.primary} opacity="0.2" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="70" y="75" fill={COLOR_MAP.primary} fontSize="12" textAnchor="middle">Device 1</text>
                                <text x="70" y="95" fill={COLOR_MAP.primary} fontSize="10" textAnchor="middle">MCU/PC</text>

                                {/* Device 2 */}
                                <rect x="280" y="40" width="100" height="80" rx="5" fill={COLOR_MAP.secondary} opacity="0.2" stroke={COLOR_MAP.secondary} strokeWidth="2" />
                                <text x="330" y="75" fill={COLOR_MAP.secondary} fontSize="12" textAnchor="middle">Device 2</text>
                                <text x="330" y="95" fill={COLOR_MAP.secondary} fontSize="10" textAnchor="middle">Module</text>

                                {/* TX Line (cross to RX) */}
                                <line x1="120" y1="70" x2="280" y2="100" stroke={COLOR_MAP.primary} strokeWidth="3" className="flow" />
                                <text x="200" y="80" fill={COLOR_MAP.primary} fontSize="10" textAnchor="middle">TX → RX</text>

                                {/* RX Line (cross from TX) */}
                                <line x1="120" y1="100" x2="280" y2="70" stroke={COLOR_MAP.secondary} strokeWidth="3" className="flow" />
                                <text x="200" y="115" fill={COLOR_MAP.secondary} fontSize="10" textAnchor="middle">RX ← TX</text>

                                {/* GND */}
                                <line x1="120" y1="120" x2="280" y2="120" stroke="#666" strokeWidth="2" />
                                <text x="200" y="135" fill="#888" fontSize="10" textAnchor="middle">GND</text>

                                {/* Pin labels */}
                                <text x="115" y="68" fill={COLOR_MAP.primary} fontSize="9" textAnchor="end">TX</text>
                                <text x="115" y="103" fill={COLOR_MAP.secondary} fontSize="9" textAnchor="end">RX</text>
                                <text x="285" y="68" fill={COLOR_MAP.primary} fontSize="9">RX</text>
                                <text x="285" y="103" fill={COLOR_MAP.secondary} fontSize="9">TX</text>
                            </g>
                        )}

                        {/* UART Frame Structure */}
                        {(vs.showFrame || vs.show8N1) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">UART 帧格式 (8N1):</text>

                                {/* Idle */}
                                <line x1="20" y1="60" x2="60" y2="60" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="30" y="55" fill="#888" fontSize="8">空闲 1</text>

                                {/* Start Bit */}
                                <line x1="60" y1="60" x2="60" y2="90" stroke={COLOR_MAP.accent1} strokeWidth="3" />
                                <line x1="60" y1="90" x2="90" y2="90" stroke={COLOR_MAP.accent1} strokeWidth="3" />
                                <text x="65" y="110" fill={COLOR_MAP.accent1} fontSize="8">Start</text>

                                {/* Data Bits (8 bits, LSB first) */}
                                {[0,1,2,3,4,5,6,7].map((i) => (
                                    <g key={i}>
                                        <line x1={90 + i * 25} y1={90} x2={90 + i * 25} y2={60} stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                        <line x1={90 + i * 25} y1={60} x2={115 + i * 25} y2={60} stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                        <text x={97 + i * 25} y="110" fill={COLOR_MAP.accent2} fontSize="7">D{i}</text>
                                    </g>
                                ))}
                                <line x1="290" y1="60" x2="290" y2="90" stroke={COLOR_MAP.accent2} strokeWidth="2" />

                                {/* Stop Bit */}
                                <line x1="290" y1="90" x2="320" y2="90" stroke={COLOR_MAP.accent1} strokeWidth="3" />
                                <line x1="320" y1="90" x2="320" y2="60" stroke={COLOR_MAP.accent1} strokeWidth="3" />
                                <line x1="320" y1="60" x2="370" y2="60" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="295" y="110" fill={COLOR_MAP.accent1} fontSize="8">Stop</text>
                                <text x="340" y="55" fill="#888" fontSize="8">空闲 1</text>

                                {/* Bit time label */}
                                <text x="20" y="140" fill="#fff" fontSize="9">1 位时间 = 1/波特率</text>
                                <text x="20" y="160" fill="#888" fontSize="8">115200bps → 8.68μs/位</text>
                            </g>
                        )}

                        {/* Baud Rate Sampling */}
                        {(vs.showBaud || vs.showSampling) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">16 倍过采样:</text>

                                {/* Received signal */}
                                <line x1="20" y1="60" x2="60" y2="60" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="60" y1="60" x2="60" y2="90" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="60" y1="90" x2="300" y2="90" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="300" y1="90" x2="300" y2="60" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <line x1="300" y1="60" x2="370" y2="60" stroke={COLOR_MAP.primary} strokeWidth="2" />

                                {/* Sample points */}
                                {[0,1,2,3,4,5,6,7].map((i) => (
                                    <g key={i}>
                                        <circle cx={85 + i * 30} cy="90" r="4" fill={COLOR_MAP.accent3} className="baudTick" />
                                        <text x={85 + i * 30} y="110" fill={COLOR_MAP.accent3} fontSize="7" textAnchor="middle">S{i}</text>
                                    </g>
                                ))}

                                {/* Sampling explanation */}
                                <text x="20" y="140" fill="#fff" fontSize="9">每位采样 16 次:</text>
                                <text x="20" y="160" fill={COLOR_MAP.accent4} fontSize="8">• 第 8 次采样为数据值</text>
                                <text x="20" y="175" fill={COLOR_MAP.accent4} fontSize="8">• 其余用于噪声滤波</text>
                                <text x="20" y="190" fill={COLOR_MAP.accent4} fontSize="8">• 提高抗干扰能力</text>

                                {/* Baud rate formula */}
                                <rect x="200" y="130" width="160" height="70" fill={COLOR_MAP.primary} opacity="0.1" stroke={COLOR_MAP.primary} strokeWidth="1" />
                                <text x="280" y="150" fill={COLOR_MAP.primary} fontSize="9" textAnchor="middle">波特率计算</text>
                                <text x="280" y="170" fill="#fff" fontSize="8" textAnchor="middle">BRR = fCLK / (16 × Baud)</text>
                                <text x="280" y="190" fill="#888" fontSize="7" textAnchor="middle">72M / (16 × 115200) = 39.0625</text>
                            </g>
                        )}

                        {/* Transmit Shift Register */}
                        {(vs.showTransmit || vs.showShiftRegister) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">发送移位寄存器:</text>

                                {/* CPU write */}
                                <rect x="20" y="50" width="70" height="40" fill={COLOR_MAP.primary} opacity="0.3" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="55" y="65" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">CPU</text>
                                <text x="55" y="80" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">写 DR</text>

                                {/* Data Register */}
                                <rect x="100" y="50" width="60" height="40" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="130" y="65" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">DR</text>
                                <text x="130" y="80" fill={COLOR_MAP.accent2} fontSize="7" textAnchor="middle">数据寄存器</text>

                                {/* Shift Register */}
                                <rect x="180" y="50" width="100" height="40" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="230" y="65" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">发送移位</text>
                                <text x="230" y="80" fill={COLOR_MAP.accent1} fontSize="7" textAnchor="middle">并行→串行</text>

                                {/* TX Pin */}
                                <circle cx="320" cy="70" r="15" fill={COLOR_MAP.primary} opacity="0.5" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="320" y="75" fill="#fff" fontSize="10" textAnchor="middle">TX</text>

                                {/* Arrows */}
                                <line x1="95" y1="70" x2="95" y2="70" stroke={COLOR_MAP.accent4} strokeWidth="2" markerEnd="url(#arrow)" />
                                <line x1="165" y1="70" x2="175" y2="70" stroke={COLOR_MAP.accent4} strokeWidth="2" markerEnd="url(#arrow)" />
                                <line x1="285" y1="70" x2="300" y2="70" stroke={COLOR_MAP.accent4} strokeWidth="2" markerEnd="url(#arrow)" />

                                {/* Bit stream animation */}
                                {[0,1,2,3,4].map((i) => (
                                    <circle
                                        key={i}
                                        cx={200 + i * 20}
                                        cy="120"
                                        r="6"
                                        fill={COLOR_MAP.accent3}
                                        className="bitStream"
                                        style={{ animationDelay: `${i * 0.15}s` }}
                                    />
                                ))}
                                <text x="20" y="140" fill={COLOR_MAP.accent3} fontSize="8">bit0 → bit1 → ... → bit7</text>
                            </g>
                        )}

                        {/* Receive with Oversampling */}
                        {(vs.showReceive || vs.showOversampling) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">接收移位寄存器:</text>

                                {/* RX Pin */}
                                <circle cx="50" cy="70" r="15" fill={COLOR_MAP.secondary} opacity="0.5" stroke={COLOR_MAP.secondary} strokeWidth="2" />
                                <text x="50" y="75" fill="#fff" fontSize="10" textAnchor="middle">RX</text>

                                {/* Shift Register */}
                                <rect x="80" y="50" width="100" height="40" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="130" y="65" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">接收移位</text>
                                <text x="130" y="80" fill={COLOR_MAP.accent1} fontSize="7" textAnchor="middle">串行→并行</text>

                                {/* Data Register */}
                                <rect x="200" y="50" width="60" height="40" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="230" y="65" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">DR</text>
                                <text x="230" y="80" fill={COLOR_MAP.accent2} fontSize="7" textAnchor="middle">数据寄存器</text>

                                {/* CPU read */}
                                <rect x="280" y="50" width="70" height="40" fill={COLOR_MAP.primary} opacity="0.3" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <text x="315" y="65" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">CPU</text>
                                <text x="315" y="80" fill={COLOR_MAP.primary} fontSize="8" textAnchor="middle">读 DR</text>

                                {/* Arrows */}
                                <line x1="70" y1="70" x2="75" y2="70" stroke={COLOR_MAP.accent4} strokeWidth="2" markerEnd="url(#arrow)" />
                                <line x1="185" y1="70" x2="195" y2="70" stroke={COLOR_MAP.accent4} strokeWidth="2" markerEnd="url(#arrow)" />
                                <line x1="265" y1="70" x2="275" y2="70" stroke={COLOR_MAP.accent4} strokeWidth="2" markerEnd="url(#arrow)" />

                                {/* Start bit detection */}
                                <text x="20" y="130" fill="#fff" fontSize="9">起始位检测:</text>
                                <text x="20" y="150" fill={COLOR_MAP.accent4} fontSize="8">• 下降沿触发</text>
                                <text x="20" y="165" fill={COLOR_MAP.accent4} fontSize="8">• 连续采样确认为低</text>
                                <text x="20" y="180" fill={COLOR_MAP.accent4} fontSize="8">• 排除噪声干扰</text>
                            </g>
                        )}

                        {/* Parity */}
                        {(vs.showParity || vs.showEven || vs.showOdd) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">校验位:</text>

                                {/* Even Parity */}
                                <rect x="20" y="50" width="160" height="70" fill={COLOR_MAP.accent1} opacity="0.2" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="100" y="70" fill={COLOR_MAP.accent1} fontSize="9" textAnchor="middle">偶校验 (Even)</text>
                                <text x="100" y="90" fill="#fff" fontSize="8" textAnchor="middle">1 的个数=偶数</text>
                                <text x="100" y="110" fill="#888" fontSize="7" textAnchor="middle">0x55(4 个 1) → P=0</text>

                                {/* Odd Parity */}
                                <rect x="200" y="50" width="160" height="70" fill={COLOR_MAP.accent2} opacity="0.2" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="280" y="70" fill={COLOR_MAP.accent2} fontSize="9" textAnchor="middle">奇校验 (Odd)</text>
                                <text x="280" y="90" fill="#fff" fontSize="8" textAnchor="middle">1 的个数=奇数</text>
                                <text x="280" y="110" fill="#888" fontSize="7" textAnchor="middle">0x55(4 个 1) → P=1</text>

                                {/* Parity bit in frame */}
                                <text x="20" y="150" fill="#fff" fontSize="9">帧中的校验位:</text>
                                <line x1="20" y1="170" x2="40" y2="170" stroke={COLOR_MAP.primary} strokeWidth="2" />
                                <rect x="40" y="160" width="20" height="20" fill={COLOR_MAP.accent1} opacity="0.5" />
                                <text x="50" y="175" fill="#fff" fontSize="8" textAnchor="middle">S</text>
                                <rect x="60" y="160" width="80" height="20" fill={COLOR_MAP.accent2} opacity="0.5" />
                                <text x="100" y="175" fill="#fff" fontSize="8" textAnchor="middle">Data[7:0]</text>
                                <rect x="140" y="160" width="20" height="20" fill={COLOR_MAP.accent3} opacity="0.5" className="parityCheck" />
                                <text x="150" y="175" fill="#fff" fontSize="8" textAnchor="middle">P</text>
                                <rect x="160" y="160" width="20" height="20" fill={COLOR_MAP.accent1} opacity="0.5" />
                                <text x="170" y="175" fill="#fff" fontSize="8" textAnchor="middle">P</text>
                            </g>
                        )}

                        {/* Error Types */}
                        {(vs.showErrors || vs.showErrorTypes) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">UART 错误类型:</text>

                                {/* Frame Error */}
                                <rect x="20" y="50" width="150" height="35" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="95" y="65" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">帧错误 (FE)</text>
                                <text x="95" y="80" fill="#888" fontSize="7" textAnchor="middle">停止位≠1</text>

                                {/* Overrun Error */}
                                <rect x="20" y="90" width="150" height="35" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="95" y="105" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">溢出错误 (ORE)</text>
                                <text x="95" y="120" fill="#888" fontSize="7" textAnchor="middle">RXNE 未读，新数据到</text>

                                {/* Noise Error */}
                                <rect x="190" y="50" width="150" height="35" fill={COLOR_MAP.accent3} opacity="0.3" stroke={COLOR_MAP.accent3} strokeWidth="2" />
                                <text x="265" y="65" fill={COLOR_MAP.accent3} fontSize="8" textAnchor="middle">噪声错误 (NE)</text>
                                <text x="265" y="80" fill="#888" fontSize="7" textAnchor="middle">采样检测到毛刺</text>

                                {/* Parity Error */}
                                <rect x="190" y="90" width="150" height="35" fill={COLOR_MAP.accent4} opacity="0.3" stroke={COLOR_MAP.accent4} strokeWidth="2" />
                                <text x="265" y="105" fill={COLOR_MAP.accent4} fontSize="8" textAnchor="middle">校验错误 (PE)</text>
                                <text x="265" y="120" fill="#888" fontSize="7" textAnchor="middle">校验位不匹配</text>

                                {/* Error flags */}
                                <text x="20" y="150" fill="#fff" fontSize="9">清除方式:</text>
                                <text x="20" y="170" fill={COLOR_MAP.accent4} fontSize="8">读 SR 寄存器 → 读 DR 寄存器</text>
                            </g>
                        )}

                        {/* Ring Buffer */}
                        {(vs.showApplication || vs.showRingBuffer) && (
                            <g>
                                <text x="20" y="40" fill="#fff" fontSize="11">环形缓冲区:</text>

                                {/* Circular buffer visualization */}
                                <circle cx="100" cy="120" r="60" fill="none" stroke={COLOR_MAP.accent2} strokeWidth="3" />

                                {/* Head pointer */}
                                <circle cx="100" cy="60" r="8" fill={COLOR_MAP.accent1} />
                                <text x="100" y="65" fill="#fff" fontSize="8" textAnchor="middle">H</text>

                                {/* Tail pointer */}
                                <circle cx="160" cy="120" r="8" fill={COLOR_MAP.accent3} />
                                <text x="160" y="125" fill="#fff" fontSize="8" textAnchor="middle">T</text>

                                {/* Data in buffer */}
                                <circle cx="130" cy="75" r="6" fill={COLOR_MAP.accent4} opacity="0.6" />
                                <circle cx="145" cy="95" r="6" fill={COLOR_MAP.accent4} opacity="0.6" />
                                <circle cx="155" cy="115" r="6" fill={COLOR_MAP.accent4} opacity="0.6" />

                                {/* ISR write */}
                                <rect x="200" y="50" width="100" height="40" fill={COLOR_MAP.accent1} opacity="0.3" stroke={COLOR_MAP.accent1} strokeWidth="2" />
                                <text x="250" y="65" fill={COLOR_MAP.accent1} fontSize="8" textAnchor="middle">接收中断</text>
                                <text x="250" y="80" fill={COLOR_MAP.accent1} fontSize="7" textAnchor="middle">RXNE=1 → Push</text>

                                {/* Main loop read */}
                                <rect x="200" y="100" width="100" height="40" fill={COLOR_MAP.accent2} opacity="0.3" stroke={COLOR_MAP.accent2} strokeWidth="2" />
                                <text x="250" y="115" fill={COLOR_MAP.accent2} fontSize="8" textAnchor="middle">主循环</text>
                                <text x="250" y="130" fill={COLOR_MAP.accent2} fontSize="7" textAnchor="middle">Pop → 处理</text>

                                {/* Arrows */}
                                <line x1="305" y1="70" x2="165" y2="70" stroke={COLOR_MAP.accent1} strokeWidth="2" markerEnd="url(#arrow)" />
                                <line x1="200" y1="120" x2="175" y2="120" stroke={COLOR_MAP.accent2} strokeWidth="2" markerEnd="url(#arrow)" />
                            </g>
                        )}

                        {/* Arrow marker */}
                        <defs>
                            <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="#f97316" />
                            </marker>
                        </defs>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="text-center mb-4">
                            <h1 className="text-3xl font-bold mb-2" style={{ color: COLOR_MAP.primary }}>
                                1196. UART/USART 串口通信完整指南
                            </h1>
                            <p className="text-gray-400 text-sm">异步串行 · 全双工 · 交叉连接 · 波特率</p>
                        </div>

                        {/* Progress Bar */}
                        <div className="mb-4">
                            <div className="flex justify-between text-xs text-gray-400 mb-1">
                                <span>步骤 {currentStep + 1} / {STEPS.length}</span>
                                <span>{Math.round(((currentStep + 1) / STEPS.length) * 100)}%</span>
                            </div>
                            <div className="w-full bg-gray-800 rounded-full h-2">
                                <div
                                    className="h-2 rounded-full transition-all duration-500"
                                    style={{
                                        width: `${((currentStep + 1) / STEPS.length) * 100}%`,
                                        background: `linear-gradient(90deg, ${COLOR_MAP.primary}, ${COLOR_MAP.secondary})`
                                    }}
                                />
                            </div>
                        </div>

                        {/* Main Content - Three Column Layout */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            {/* Left: Code */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.primary }}>
                                    💻 代码示例
                                </h3>
                                <pre className="text-xs text-gray-300 overflow-x-auto whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>

                            {/* Center: Visualization */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.secondary }}>
                                    🔬 可视化动画
                                </h3>
                                <svg className="w-full h-64" viewBox="0 0 400 320">
                                    <UARTVisualization />
                                </svg>
                            </div>

                            {/* Right: Explanation */}
                            <div className="bg-gray-800 rounded-lg p-4 border border-gray-700">
                                <h3 className="text-lg font-semibold mb-3" style={{ color: COLOR_MAP.accent1 }}>
                                    📖 核心概念
                                </h3>
                                <ul className="space-y-2 text-sm text-gray-300">
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.primary }}>异步通信:</strong> 无需时钟线</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.secondary }}>交叉连接:</strong> TX→RX, RX←TX</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent1 }}>帧格式:</strong> 起始 + 数据 + (校验)+停止</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent2 }}>16 倍过采样:</strong> 提高抗干扰</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.accent3 }}>校验方式:</strong> 奇/偶/无校验</span>
                                    </li>
                                    <li className="flex items-start">
                                        <span className="mr-2">▸</span>
                                        <span><strong style={{ color: COLOR_MAP.primary }}>4 种错误:</strong> FE/ORE/NE/PE</span>
                                    </li>
                                </ul>

                                {/* Code Challenge */}
                                <div className="mt-4 p-3 bg-gray-700 rounded">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-xs font-semibold">💡 代码挑战</span>
                                        <button
                                            onClick={() => setShowAnswer(!showAnswer)}
                                            className="text-xs px-2 py-1 rounded"
                                            style={{ backgroundColor: COLOR_MAP.primary, color: '#fff' }}
                                        >
                                            {showAnswer ? '隐藏' : '显示'}答案
                                        </button>
                                    </div>
                                    <p className="text-xs text-gray-400 mb-2">
                                        计算 16MHz 时钟下 9600 波特率的 BRR 值:
                                    </p>
                                    {showAnswer && (
                                        <pre className="text-xs text-gray-300 overflow-x-auto">
{`// BRR = fCLK / (16 × Baud)
// BRR = 16000000 / (16 × 9600)
// BRR = 16000000 / 153600 = 104.1667
// 整数部分：104 = 0x68
// 小数部分：0.1667 × 16 = 2.67 ≈ 3 = 0x3
// USART_BRR = 0x683

#define BRR_9600  0x683  // 16MHz, 9600bps`}
                                        </pre>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Control Buttons */}
                        <div className="flex justify-center gap-3 mb-4">
                            <button
                                onClick={handlePrev}
                                disabled={currentStep === 0}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === 0
                                        ? 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                        : 'bg-gray-600 text-white hover:bg-gray-500'
                                }`}
                            >
                                ← 上一步
                            </button>

                            <button
                                onClick={handleRestart}
                                className="px-6 py-3 rounded-lg font-semibold bg-gray-700 text-white hover:bg-gray-600 transition-all"
                            >
                                🔄 重新开始
                            </button>

                            <button
                                onClick={handleNext}
                                disabled={currentStep === STEPS.length - 1}
                                className={`px-6 py-3 rounded-lg font-semibold transition-all ${
                                    currentStep === STEPS.length - 1
                                        ? 'bg-gray-700 text-gray-500 cursor-not-allowed'
                                        : 'bg-gray-600 text-white hover:bg-gray-500'
                                }`}
                            >
                                下一步 →
                            </button>
                        </div>

                        {/* Autoplay Toggle */}
                        <div className="text-center">
                            <button
                                onClick={() => setIsAutoPlaying(!isAutoPlaying)}
                                className={`px-4 py-2 rounded-lg font-semibold transition-all ${
                                    isAutoPlaying
                                        ? 'bg-green-600 text-white'
                                        : 'bg-gray-700 text-gray-300'
                                }`}
                            >
                                {isAutoPlaying ? '▶️ 自动播放中' : '⏸️ 已暂停'}
                            </button>
                        </div>

                        {/* Step Indicators */}
                        <div className="flex justify-center gap-2 mt-4 flex-wrap">
                            {STEPS.map((step, index) => (
                                <button
                                    key={index}
                                    onClick={() => setCurrentStep(index)}
                                    className={`px-3 py-2 rounded-lg text-xs font-medium transition-all ${
                                        index === currentStep
                                            ? 'bg-white text-gray-900'
                                            : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                                    }`}
                                >
                                    {index + 1}. {step.title}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
