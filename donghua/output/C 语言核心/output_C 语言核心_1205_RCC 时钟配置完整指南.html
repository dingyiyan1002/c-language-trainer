<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1205 - RCC 时钟配置完整指南 - 嵌入式 C 语言可视化动画</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes flow { 0% { transform: translateY(0); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0); } }
        @keyframes highlight { 0%, 100% { background-color: rgba(59, 130, 246, 0.2); } 50% { background-color: rgba(59, 130, 246, 0.5); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes countdown { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes danger { 0%, 100% { background-color: rgba(239, 68, 68, 0.3); } 50% { background-color: rgba(239, 68, 68, 0.6); } }
        @keyframes reset { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes moveClock { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(20px); } }
        @keyframes activate { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes switchClock { 0%, 100% { border-color: rgba(168, 85, 247, 0.3); } 50% { border-color: rgba(168, 85, 247, 0.8); } }

        .pulse { animation: pulse 2s infinite; }
        .blink { animation: blink 1s infinite; }
        .slideIn { animation: slideIn 0.5s ease-out; }
        .scaleIn { animation: scaleIn 0.5s ease-out; }
        .flow { animation: flow 2s infinite; }
        .highlight { animation: highlight 2s infinite; }
        .fadeIn { animation: fadeIn 0.5s ease-out; }
        .countdown { animation: countdown 0.3s ease-out; }
        .danger { animation: danger 1s infinite; }
        .reset { animation: reset 1s linear; }
        .moveClock { animation: moveClock 2s infinite; }
        .activate { animation: activate 0.5s ease-out; }
        .switchClock { animation: switchClock 3s infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 颜色主题：绿色/蓝色渐变 (RCC 时钟树)
        const COLOR_MAP = {
            primary: '#10b981',
            secondary: '#3b82f6',
            accent: '#14b8a6',
            highlight: '#34d399',
            danger: '#ef4444',
            warning: '#f59e0b'
        };

        const STEPS = [
            {
                title: "RCC 时钟系统基础",
                code: `// RCC - Reset and Clock Control
// 时钟系统概述

// STM32 时钟源:
// 1. HSI - 内部高速时钟 (8MHz/16MHz)
// 2. HSE - 外部高速时钟 (4-26MHz 晶振)
// 3. LSI - 内部低速时钟 (32kHz)
// 4. LSE - 外部低速时钟 (32.768kHz)
// 5. PLL - 锁相环倍频输出

// 时钟树结构:
// 时钟源 → PLL 倍频 → AHB 分频 → APB1/APB2 分频
//                              ↓         ↓
//                         低速外设   高速外设`,
                description: "RCC (Reset and Clock Control) 是 STM32 的时钟管理系统。它为整个芯片提供时钟信号，包括 5 个时钟源：HSI(内部高速)、HSE(外部高速)、LSI(内部低速)、LSE(外部低速) 和 PLL(锁相环倍频)。时钟树从时钟源开始，经过 PLL 倍频，再通过 AHB、APB1、APB2 分频器分配到各个外设。",
                highlight: "时钟是微控制器的心脏，RCC 管理整个时钟树"
            },
            {
                title: "时钟源选择与配置",
                code: `// 1. HSI 内部高速时钟 (默认启用)
// RCC->CR |= RCC_CR_HSION;  // 启用 HSI
// while(!(RCC->CR & RCC_CR_HSIRDY));

// 2. HSE 外部高速时钟 (更精确)
RCC->CR |= RCC_CR_HSEON;  // 启用 HSE
while(!(RCC->CR & RCC_CR_HSERDY));  // 等待就绪

// 3. LSI 内部低速时钟 (看门狗用)
RCC->CSR |= RCC_CSR_LSION;
while(!(RCC->CSR & RCC_CSR_LSIRDY));

// 4. LSE 外部低速时钟 (RTC 用)
RCC->BDCR |= RCC_BDCR_LSEON;
while(!(RCC->BDCR & RCC_BDCR_LSERDY));`,
                description: "HSI 是默认的内部时钟源，启动快但精度较低 (±1%)。HSE 需要外部晶振，精度高 (±20ppm)，适合 USB 等需要精确时序的应用。LSI 用于独立看门狗，LSE 用于 RTC 实时时钟。每个时钟源启用后都需要等待 RDY 标志位置位。",
                highlight: "HSE 精度比 HSI 高 50 倍，适合精确时序应用"
            },
            {
                title: "PLL 锁相环倍频配置",
                code: `// PLL 配置：将 HSE 倍频到系统时钟
// 公式：PLLCLK = HSE × PLLMUL / PLLDIV

RCC->PLLCFGR = (0 << 0)           // PLLSRC=0: 选择 HSE
             | (4 << 4)           // PLLM=4: 输入分频
             | (84 << 6)          // PLLN=84: 倍频系数
             | (0 << 16)          // PLLP=2: 主 PLL 分频
             | (2 << 24);         // PLLQ=2: USB 分频

// 启用 PLL
RCC->CR |= RCC_CR_PLLON;
while(!(RCC->CR & RCC_CR_PLLRDY));  // 等待锁定

// 系统时钟 = 8MHz × 84 / 4 = 168MHz`,
                description: "PLL 通过倍频将低频时钟提升到系统所需的高频。配置参数包括：PLLSRC(源选择)、PLLM(输入分频)、PLLN(倍频系数)、PLLP(主输出分频)、PLLQ(USB 分频)。例如 8MHz HSE 经过 PLL 可倍频到 168MHz 系统时钟。",
                highlight: "PLL 倍频公式：SYSCLK = HSE × PLLN / PLLM"
            },
            {
                title: "系统时钟切换",
                code: `// 1. 配置 Flash 等待周期 (时钟越快等待越长)
FLASH->ACR |= FLASH_ACR_LATENCY_5WS;

// 2. 启用 HSE 和 PLL
RCC->CR |= RCC_CR_HSEON | RCC_CR_PLLON;
while(!(RCC->CR & RCC_CR_HSERDY));
while(!(RCC->CR & RCC_CR_PLLRDY));

// 3. 配置 AHB/APB 分频
RCC->CFGR |= RCC_CFGR_HPRE_DIV1;   // AHB=SYSCLK
RCC->CFGR |= RCC_CFGR_PPRE1_DIV4;  // APB1=SYSCLK/4
RCC->CFGR |= RCC_CFGR_PPRE2_DIV2;  // APB2=SYSCLK/2

// 4. 切换系统时钟源到 PLL
RCC->CFGR |= RCC_CFGR_SW_PLL;
while((RCC->CFGR & RCC_CFGR_SWS) != RCC_CFGR_SWS_PLL);`,
                description: "切换系统时钟需要遵循严格顺序：先配置 Flash 等待周期 (防止高速时钟下读取错误)，然后启用目标时钟源和 PLL，配置总线分频器，最后切换 SW 位。切换后需要检查 SWS 状态位确认成功。",
                highlight: "切换时钟前必须配置 Flash 延迟，否则会导致系统不稳定"
            },
            {
                title: "AHB 总线时钟配置",
                code: `// AHB (Advanced High-performance Bus) 分频配置
// HPRE[3:0] 位控制 AHB 预分频器

RCC->CFGR &= ~RCC_CFGR_HPRE;  // 清除原配置
RCC->CFGR |= RCC_CFGR_HPRE_DIV1;  // AHB = SYSCLK/1

// 可选分频比:1,2,4,8,16,64,128,256,512
// AHB 时钟驱动:CPU、DMA、GPIO、Flash 接口

// 查看当前 AHB 时钟
uint32_t ahbClock = SystemCoreClock >>
                   ((RCC->CFGR & RCC_CFGR_HPRE) >> 4);`,
                description: "AHB 是系统主干总线，CPU、DMA、GPIO 和 Flash 接口都连接到 AHB。HPRE 分频器可将 AHB 时钟分频以降低功耗。通常 AHB 时钟等于系统时钟 (DIV1)，但在低功耗应用中可以分频。",
                highlight: "AHB 时钟 = SYSCLK / HPRE，驱动 CPU 和高速外设"
            },
            {
                title: "APB1/APB2 外设时钟配置",
                code: `// APB1 (低速外设总线，最高 36MHz)
RCC->CFGR |= RCC_CFGR_PPRE1_DIV4;  // APB1 = HCLK/4
// 挂载外设：TIM2-7, I2C, SPI2, USART2-5, CAN

// APB2 (高速外设总线，最高 72MHz)
RCC->CFGR |= RCC_CFGR_PPRE2_DIV2;  // APB2 = HCLK/2
// 挂载外设：TIM1, TIM8, SPI1, USART1, ADC, GPIO

// 启用外设时钟
RCC->AHB1ENR |= RCC_AHB1ENR_GPIOAEN;  // GPIOA
RCC->APB1ENR |= RCC_APB1ENR_USART2EN; // USART2
RCC->APB2ENR |= RCC_APB2ENR_TIM1EN;   // TIM1`,
                description: "APB1 是低速外设总线，最高 36MHz (STM32F1) 或 42MHz (STM32F4)，连接 I2C、SPI2、USART2-5 等低速外设。APB2 是高速外设总线，最高 72MHz 或 84MHz，连接 TIM1、SPI1、USART1、ADC 等高速外设。使用外设前必须先启用其时钟。",
                highlight: "忘记启用外设时钟是常见错误，会导致外设无响应"
            },
            {
                title: "时钟安全系统 CSS",
                code: `// CSS - Clock Security System
// 当 HSE 失效时自动切换到 HSI 并产生中断

// 启用 CSS
RCC->CR |= RCC_CR_CSSON;

// CSS 中断处理
void RCC_IRQHandler(void) {
    if(RCC->CIR & RCC_CIR_CSSFLAG) {
        // HSE 失效，已自动切换到 HSI
        // 备份关键数据
        // 降频运行或进入安全模式

        RCC->CIR |= RCC_CIR_CSSC;  // 清除标志
    }
}

// 手动检测 HSE 状态
if(!(RCC->CR & RCC_CR_HSERDY)) {
    // HSE 未就绪，使用备用时钟
}`,
                description: "CSS 时钟安全系统监控 HSE 的状态，当外部晶振失效时自动切换到内部 HSI 并触发中断。这对于需要高可靠性的应用至关重要，可以防止系统因时钟失效而崩溃。中断服务程序应保存关键数据并进入安全模式。",
                highlight: "CSS 提供时钟失效保护，自动切换到备用时钟源"
            },
            {
                title: "低功耗时钟配置",
                code: `// 进入睡眠前降低时钟频率
void EnterLowPower(void) {
    // 1. 切换到 HSI (关闭 HSE 节省功耗)
    RCC->CFGR |= RCC_CFGR_SW_HSI;
    while((RCC->CFGR & RCC_CFGR_SWS) != RCC_CFGR_SWS_HSI);

    // 2. 关闭 HSE
    RCC->CR &= ~RCC_CR_HSEON;

    // 3. 关闭 PLL
    RCC->CR &= ~RCC_CR_PLLON;

    // 4. 分频 AHB/APB 降低系统时钟
    RCC->CFGR |= RCC_CFGR_HPRE_DIV8;

    // 5. 进入睡眠模式
    __WFI();  // Wait For Interrupt
}

// 唤醒后恢复高速时钟
void WakeUpHighSpeed(void) {
    RCC->CR |= RCC_CR_HSEON | RCC_CR_PLLON;
    // ... 等待就绪并切换时钟
}`,
                description: "低功耗模式下，应关闭不必要的时钟源 (HSE、PLL)，切换到 HSI 并降低系统时钟频率。这可以显著降低动态功耗。唤醒后需要恢复高速时钟配置。LSE 和 LSI 可以在睡眠中保持运行，用于 RTC 和看门狗。",
                highlight: "时钟配置对功耗影响巨大，降频 + 关闭未用时钟可省电 80%"
            }
        ];

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [showCode, setShowCode] = useState(true);
            const voiceEndTimerRef = useRef(null);

            // 语音播放函数
            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;

                    // 尝试使用更好的中文语音
                    const voices = window.speechSynthesis.getVoices();
                    const zhVoice = voices.find(v =>
                        v.lang === 'zh-CN' ||
                        v.lang === 'zh-CN-XiaoxiaoNeural' ||
                        v.lang.includes('Chinese')
                    );
                    if (zhVoice) utterance.voice = zhVoice;

                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            if (isPlaying && currentStep < STEPS.length - 1) {
                                setCurrentStep(prev => prev + 1);
                            }
                        }, 800);
                    };

                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            if (isPlaying && currentStep < STEPS.length - 1) {
                                setCurrentStep(prev => prev + 1);
                            }
                        }, 800);
                    };

                    window.speechSynthesis.speak(utterance);
                }
            };

            useEffect(() => {
                const step = STEPS[currentStep];
                speak(step.title + "。" + step.description + "。" + step.highlight);

                return () => {
                    if (voiceEndTimerRef.current) {
                        clearTimeout(voiceEndTimerRef.current);
                    }
                };
            }, [currentStep]);

            // 时钟树可视化组件
            const ClockTree = () => {
                const clockStates = {
                    hsi: currentStep >= 1,
                    hse: currentStep >= 1,
                    lsi: currentStep >= 1,
                    lse: currentStep >= 1,
                    pll: currentStep >= 2,
                    ahb: currentStep >= 4,
                    apb1: currentStep >= 5,
                    apb2: currentStep >= 5
                };

                return (
                    <div className="relative w-full h-64 bg-gray-800 rounded-lg p-4">
                        {/* 时钟源 */}
                        <div className="flex justify-around mb-4">
                            <div className={`w-16 h-16 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-500 ${clockStates.hsi ? 'bg-green-500 pulse' : 'bg-gray-600'}`}>
                                HSI<br/>8MHz
                            </div>
                            <div className={`w-16 h-16 rounded-full flex items-center justify-center text-xs font-bold transition-all duration-500 ${clockStates.hse ? 'bg-blue-500 pulse' : 'bg-gray-600'}`}>
                                HSE<br/>8MHz
                            </div>
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-xs ${clockStates.lsi ? 'bg-teal-400 blink' : 'bg-gray-600'}`}>
                                LSI
                            </div>
                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-xs ${clockStates.lse ? 'bg-teal-400 blink' : 'bg-gray-600'}`}>
                                LSE
                            </div>
                        </div>

                        {/* PLL */}
                        <div className="flex justify-center mb-4">
                            <div className={`w-24 h-16 rounded-lg flex flex-col items-center justify-center transition-all duration-500 ${clockStates.pll ? 'bg-purple-500 flow' : 'bg-gray-600'}`}>
                                <span className="text-sm font-bold">PLL</span>
                                <span className="text-xs">×21</span>
                            </div>
                        </div>

                        {/* 分频器 */}
                        <div className="flex justify-around">
                            <div className={`w-20 h-12 rounded flex items-center justify-center text-xs transition-all duration-500 ${clockStates.ahb ? 'bg-cyan-500 highlight' : 'bg-gray-600'}`}>
                                AHB<br/>÷1
                            </div>
                            <div className={`w-20 h-12 rounded flex items-center justify-center text-xs transition-all duration-500 ${clockStates.apb1 ? 'bg-orange-500 highlight' : 'bg-gray-600'}`}>
                                APB1<br/>÷4
                            </div>
                            <div className={`w-20 h-12 rounded flex items-center justify-center text-xs transition-all duration-500 ${clockStates.apb2 ? 'bg-pink-500 highlight' : 'bg-gray-600'}`}>
                                APB2<br/>÷2
                            </div>
                        </div>

                        {/* 时钟流向动画 */}
                        {clockStates.pll && (
                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                                <div className="w-2 h-2 bg-yellow-400 rounded-full animate-ping"></div>
                            </div>
                        )}
                    </div>
                );
            };

            // 频率显示器组件
            const FrequencyDisplay = () => {
                const frequencies = {
                    sysclk: currentStep >= 3 ? '168 MHz' : '-',
                    ahb: currentStep >= 4 ? '168 MHz' : '-',
                    apb1: currentStep >= 5 ? '42 MHz' : '-',
                    apb2: currentStep >= 5 ? '84 MHz' : '-',
                    timer: currentStep >= 5 ? '84 MHz' : '-'
                };

                return (
                    <div className="bg-gray-800 rounded-lg p-4 space-y-2">
                        <h3 className="text-sm font-bold text-gray-400 mb-2">时钟频率监控</h3>
                        <div className="grid grid-cols-2 gap-2 text-xs">
                            <div className="flex justify-between">
                                <span>SYSCLK:</span>
                                <span className={frequencies.sysclk !== '-' ? 'text-green-400' : 'text-gray-500'}>{frequencies.sysclk}</span>
                            </div>
                            <div className="flex justify-between">
                                <span>AHB:</span>
                                <span className={frequencies.ahb !== '-' ? 'text-blue-400' : 'text-gray-500'}>{frequencies.ahb}</span>
                            </div>
                            <div className="flex justify-between">
                                <span>APB1:</span>
                                <span className={frequencies.apb1 !== '-' ? 'text-orange-400' : 'text-gray-500'}>{frequencies.apb1}</span>
                            </div>
                            <div className="flex justify-between">
                                <span>APB2:</span>
                                <span className={frequencies.apb2 !== '-' ? 'text-pink-400' : 'text-gray-500'}>{frequencies.apb2}</span>
                            </div>
                            <div className="flex justify-between col-span-2">
                                <span>Timer APB2:</span>
                                <span className={frequencies.timer !== '-' ? 'text-purple-400' : 'text-gray-500'}>{frequencies.timer}</span>
                            </div>
                        </div>
                    </div>
                );
            };

            // 外设时钟使能可视化
            const PeripheralClocks = () => {
                const peripherals = [
                    { name: 'GPIOA', reg: 'AHB1ENR', enabled: currentStep >= 5 },
                    { name: 'USART2', reg: 'APB1ENR', enabled: currentStep >= 5 },
                    { name: 'TIM1', reg: 'APB2ENR', enabled: currentStep >= 5 },
                    { name: 'SPI1', reg: 'APB2ENR', enabled: currentStep >= 5 },
                    { name: 'I2C1', reg: 'APB1ENR', enabled: currentStep >= 5 },
                    { name: 'ADC1', reg: 'APB2ENR', enabled: currentStep >= 5 }
                ];

                return (
                    <div className="bg-gray-800 rounded-lg p-3">
                        <h3 className="text-xs font-bold text-gray-400 mb-2">外设时钟使能状态</h3>
                        <div className="space-y-1">
                            {peripherals.map((p, i) => (
                                <div key={i} className={`flex justify-between text-xs p-1 rounded ${p.enabled ? 'bg-green-900/50' : 'bg-gray-700'}`}>
                                    <span>{p.name}</span>
                                    <span className={p.enabled ? 'text-green-400' : 'text-gray-500'}>
                                        {p.enabled ? '✓ 已启用' : '✗ 禁用'}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4">
                    {/* 头部 */}
                    <div className="max-w-7xl mx-auto mb-4">
                        <div className="flex justify-between items-center mb-2">
                            <h1 className="text-xl font-bold text-green-400">
                                1205 - RCC 时钟配置完整指南
                            </h1>
                            <div className="flex gap-2">
                                <button onClick={() => setIsPlaying(!isPlaying)} className="px-3 py-1 bg-blue-600 rounded hover:bg-blue-700 text-sm">
                                    {isPlaying ? '暂停' : '播放'}
                                </button>
                                <button onClick={() => setShowCode(!showCode)} className="px-3 py-1 bg-purple-600 rounded hover:bg-purple-700 text-sm">
                                    {showCode ? '隐藏代码' : '显示代码'}
                                </button>
                            </div>
                        </div>

                        {/* 进度条 */}
                        <div className="flex gap-1 mb-4">
                            {STEPS.map((_, i) => (
                                <button
                                    key={i}
                                    onClick={() => setCurrentStep(i)}
                                    className={`flex-1 h-2 rounded transition-all ${
                                        i === currentStep ? 'bg-green-500 scale-110' :
                                        i < currentStep ? 'bg-green-700' : 'bg-gray-600'
                                    }`}
                                />
                            ))}
                        </div>
                    </div>

                    {/* 主内容区 - 三列布局 */}
                    <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4">
                        {/* 左列：代码 */}
                        {showCode && (
                            <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                                <h2 className="text-sm font-bold text-green-400 mb-2">
                                    {STEPS[currentStep].title}
                                </h2>
                                <pre className="text-xs text-gray-300 overflow-x-auto whitespace-pre-wrap bg-gray-900 p-3 rounded">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                        )}

                        {/* 中列：可视化动画 */}
                        <div className={`${showCode ? 'col-span-1' : 'col-span-2'} space-y-4`}>
                            <ClockTree />
                            <div className="grid grid-cols-2 gap-4">
                                <FrequencyDisplay />
                                <PeripheralClocks />
                            </div>
                        </div>

                        {/* 右列：说明 */}
                        <div className="bg-gray-800 rounded-lg p-4 col-span-1">
                            <h3 className="text-sm font-bold text-blue-400 mb-2">说明</h3>
                            <p className="text-xs text-gray-300 leading-relaxed mb-3">
                                {STEPS[currentStep].description}
                            </p>
                            <div className="bg-yellow-900/30 border border-yellow-600/50 rounded p-2">
                                <p className="text-xs text-yellow-300">
                                    <span className="font-bold">💡 重点:</span> {STEPS[currentStep].highlight}
                                </p>
                            </div>

                            {/* 导航按钮 */}
                            <div className="flex gap-2 mt-4">
                                <button
                                    onClick={() => setCurrentStep(Math.max(0, currentStep - 1))}
                                    disabled={currentStep === 0}
                                    className="flex-1 py-2 bg-gray-700 rounded hover:bg-gray-600 disabled:opacity-50 text-xs"
                                >
                                    ← 上一步
                                </button>
                                <button
                                    onClick={() => setCurrentStep(Math.min(STEPS.length - 1, currentStep + 1))}
                                    disabled={currentStep === STEPS.length - 1}
                                    className="flex-1 py-2 bg-green-600 rounded hover:bg-green-500 disabled:opacity-50 text-xs"
                                >
                                    下一步 →
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 底部摘要 */}
                    <div className="max-w-7xl mx-auto mt-4 bg-gray-800 rounded-lg p-4">
                        <h3 className="text-sm font-bold text-purple-400 mb-2">RCC 配置核心要点</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-green-400 font-bold">5 个时钟源</span>
                                <p className="text-gray-400 mt-1">HSI/HSE/LSI/LSE/PLL</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-blue-400 font-bold">3 级分频</span>
                                <p className="text-gray-400 mt-1">AHB → APB1 → APB2</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-purple-400 font-bold">CSS 保护</span>
                                <p className="text-gray-400 mt-1">HSE 失效自动切换</p>
                            </div>
                            <div className="bg-gray-700 p-2 rounded">
                                <span className="text-orange-400 font-bold">低功耗</span>
                                <p className="text-gray-400 mt-1">降频 + 关闭未用时钟</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
