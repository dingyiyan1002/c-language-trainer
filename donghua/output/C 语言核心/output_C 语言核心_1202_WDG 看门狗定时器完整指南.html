// 时钟源：LSI(~32kHz 内部低速时钟)

void IWDG_Init(void) {
    // 1. 使能访问 IWDG 寄存器
    IWDG->KR = 0x5555;  // 解锁

    // 2. 配置预分频器 (64 分频)
    IWDG->PR = IWDG_PR_PR_2;  // /64

    // 3. 配置重装载值
    IWDG->RLR = 1000;  // 1000 × 2ms = 2 秒超时

    // 4. 等待寄存器同步
    while (IWDG->SR);

    // 5. 启动看门狗 (开始计数)
    IWDG->KR = 0xCCCC;  // 启动
}

// 喂狗函数 (在主循环中调用)
void IWDG_Feed(void) {
    IWDG->KR = 0xAAAA;  // 重载计数器
}

// 超时计算
// Timeout = (RLR + 1) × (Prescaler / LSI)
// 例：1000 × 64 / 32000 = 2 秒`,

// 时钟源：APB1 时钟 (72MHz)

void WWDG_Init(void) {
    // 1. 使能时钟
    RCC->APB1ENR |= RCC_APB1ENR_WWDGEN;

    // 2. 配置窗口值 (64-127 之间喂狗有效)
    WWDG->CFR = (100 << 0);  // 窗口=100
    // 必须在计数器 64-100 之间喂狗
    // < 64: 已溢出复位
    // > 100: 过早喂狗，复位

    // 3. 配置预分频和使能中断
    WWDG->CFR |= (0 << 6);   // /1 (72MHz)
    WWDG->CFR |= WWDG_CFR_EWI; // 提前唤醒中断

    // 4. 启动看门狗
    WWDG->CR = WWDG_CR_WDGA; // 使能
    WWDG->CR |= (127 << 0);  // 初始值
}

// 喂狗函数 (必须在窗口内调用)
void WWDG_Feed(void) {
    // 检查计数器是否在窗口内
    if ((WWDG->CR & 0x7F) <= 100) {
        WWDG->CR = (127 << 0);  // 喂狗
    }
}`,

// 1. 在主循环中喂狗 (不在中断中)
void main(void) {
    IWDG_Init();
    while (1) {
        Process_Sensor();  // 处理传感器
        Update_Display();  // 更新显示
        Check_Alerts();    // 检查告警
        IWDG_Feed();       // 主循环结束喂狗
    }
}

// 2. 看门狗复位检测
void System_Init(void) {
    if (RCC->CSR & RCC_CSR_IWDGRSTF) {

                IWDG_Stop();
                Enter_Sleep();
                break;
        }
    }
}`,

                    utterance.lang = 'zh-CN';
                    utterance.rate = 1.0;
                    const voices = window.speechSynthesis.getVoices();
                    const zhVoice = voices.find(v => v.lang.includes('zh-CN') && v.name.includes('Xiaoxiao'))
                        || voices.find(v => v.lang.includes('zh-CN'))
                        || voices[0];
                    if (zhVoice) utterance.voice = zhVoice;
                    utterance.onend = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev + 1) % STEPS.length);
                        }, 800);
                    };
                    utterance.onerror = () => {
                        voiceEndTimerRef.current = setTimeout(() => {
                            setCurrentStep(prev => (prev + 1) % STEPS.length);
                        }, 800);
                    };
                    window.speechSynthesis.speak(utterance);
                };
                speak(STEPS[currentStep].title);
                return () => clearTimeout(voiceEndTimerRef.current);
            }, [currentStep]);

            React.useEffect(() => {
                const timer = setInterval(() => {
                    setWatchdogCounter(prev => {
                        if (prev <= 0) return 100;
                        return prev - 1;
                    });
                    setCounterValue(prev => (prev + 1) % 10000);
                }, 100);
                return () => clearInterval(timer);
            }, []);

            return (
                <div class="flex flex-col h-screen bg-gray-900 text-white">
                    <div class="flex-1 flex overflow-hidden">
                        {/* 左侧：代码区 */}
                        <div class="w-1/3 border-r border-gray-700 flex flex-col bg-gray-800">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-purple-400">💻 代码示例</h2>
                            </div>
                            <div class="flex-1 overflow-auto p-4">
                                <pre class="text-sm text-green-400 font-mono whitespace-pre-wrap">
                                    {STEPS[currentStep].code}
                                </pre>
                            </div>
                        </div>

                        {/* 中间：可视化区 */}
                        <div class="w-1/3 border-r border-gray-700 flex flex-col">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-cyan-400">🎬 可视化动画</h2>
                            </div>
                            <div class="flex-1 p-4 bg-gray-800">
                                {STEPS[currentStep].renderVisual()}
                            </div>
                        </div>

                        {/* 右侧：解释区 */}
                        <div class="w-1/3 flex flex-col bg-gray-800">
                            <div class="p-3 border-b border-gray-700 bg-gray-900">
                                <h2 class="text-lg font-bold text-yellow-400">📖 原理解析</h2>
                            </div>
                            <div class="flex-1 overflow-auto p-4">
                                <p class="text-base text-gray-300 leading-relaxed">
                                    {STEPS[currentStep].explanation}
                                </p>
                                <div class="mt-6 p-4 bg-gray-900 rounded-lg border border-gray-700">
                                    <h3 class="text-sm font-bold text-purple-400 mb-2">📌 关键要点</h3>
                                    <ul class="text-sm text-gray-400 space-y-1 list-disc list-inside">
                                        {currentStep === 0 && <li>看门狗检测系统故障并复位</li>}
                                        {currentStep === 0 && <li>独立看门狗使用 LSI 时钟</li>}
                                        {currentStep === 0 && <li>窗口看门狗检测时序异常</li>}
                                        {currentStep === 1 && <li>IWDG 配置：解锁→分频→重载→启动</li>}
                                        {currentStep === 1 && <li>喂狗写入 0xAAAA 重载计数器</li>}
                                        {currentStep === 1 && <li>超时 = RLR × (PR/LSI)</li>}
                                        {currentStep === 2 && <li>窗口内喂狗：64-100</li>}
                                        {currentStep === 2 && <li>过早/过晚喂狗都会复位</li>}
                                        {currentStep === 2 && <li>提前唤醒中断可紧急处理</li>}
                                        {currentStep === 3 && <li>主循环喂狗，不在中断中</li>}
                                        {currentStep === 3 && <li>复位检测记录故障原因</li>}
                                        {currentStep === 3 && <li>多级看门狗分层保护</li>}
                                        {currentStep === 4 && <li>调试时临时禁用看门狗</li>}
                                        {currentStep === 4 && <li>栈溢出检测定位死机</li>}
                                        {currentStep === 4 && <li>DWT 计数器测量任务时间</li>}
                                        {currentStep === 5 && <li>状态机管理运行模式</li>}
                                        {currentStep === 5 && <li>错误状态不喂狗触发复位</li>}
                                        {currentStep === 5 && <li>低功耗前停止看门狗</li>}
                                        {currentStep === 6 && <li>IWDG：独立可靠，通用场景</li>}
                                        {currentStep === 6 && <li>WWDG：精度高，时序敏感</li>}
                                        {currentStep === 6 && <li>高可靠系统双重保护</li>}
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 底部控制栏 */}
                    <div class="border-t border-gray-700 bg-gray-800 p-4">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-4">
                                <span class="text-sm text-gray-400">步骤 {currentStep + 1} / {STEPS.length}</span>
                                <div class="flex space-x-2">
                                    {STEPS.map((_, i) => (
                                        <button key={i} onClick={() => setCurrentStep(i)}
                                            className={`w-3 h-3 rounded-full transition-all ${i === currentStep ? 'bg-purple-400 scale-125' : 'bg-gray-600'}`}
                                        />
                                    ))}
                                </div>
                            </div>
                            <div class="flex space-x-3">
                                <button onClick={() => setCurrentStep((prev - 1 + STEPS.length) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    ⏮ 上一步
                                </button>
                                <button onClick={() => setIsPlaying(!isPlaying)}
                                    className="px-4 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm transition-colors">
                                    {isPlaying ? '⏸ 暂停' : '▶ 播放'}
                                </button>
                                <button onClick={() => setCurrentStep((prev + 1) % STEPS.length)}
                                    className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm transition-colors">
                                    下一步 ⏭
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
