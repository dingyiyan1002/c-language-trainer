<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>题目 1 - printf 格式化输出 - 可视化演示</title>

  <!-- 四个 CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* ===== CSS 变量 ===== */
    :root {
      --anim-speed: 3000ms;
      --bounce-range: -12px;
      --bounce-scale: 1.12;
      --orb-color: rgba(250, 204, 21, 0.8);
      --card-glow: rgba(16, 185, 129, 0.3);
    }

    /* ===== 全局样式 ===== */
    * { scrollbar-width: thin; scrollbar-color: #3a3a4a #0d1117; }
    *::-webkit-scrollbar { width: 6px; height: 6px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 3px; }

    body {
      background: linear-gradient(180deg, #0a0e17, #0d1219);
      color: #c9d1d9;
      font-family: 'SF Mono', 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
      overflow: hidden;
      margin: 0;
    }

    /* ===== CSS 动画 1: fadeInUp ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .anim-fade-in { animation: fadeInUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* ===== CSS 动画 2: bubbleUp ===== */
    @keyframes bubbleUp {
      0% { opacity: 0; transform: translateY(30px) scale(0.85); filter: blur(4px); }
      40% { opacity: 1; filter: blur(0px); }
      70% { transform: translateY(-4px) scale(1.02); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
    }
    .anim-bubble-up { animation: bubbleUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* ===== CSS 动画 3: bigBounce ===== */
    @keyframes bigBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(var(--bounce-range)) scale(var(--bounce-scale)); }
    }
    .anim-bounce { animation: bigBounce var(--anim-speed) cubic-bezier(0.4, 0, 0.2, 1) infinite; }

    /* ===== CSS 动画 4: valuePop ===== */
    @keyframes valuePop {
      0% { transform: scale(0.3) translateY(8px); opacity: 0; }
      50% { transform: scale(1.15) translateY(-3px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .anim-value-pop { animation: valuePop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* ===== CSS 动画 5: scanLight ===== */
    @keyframes scanLight {
      0% { left: -60%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { left: 160%; opacity: 0; }
    }

    /* ===== CSS 动画 6: cursorBlink ===== */
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor-blink { animation: cursorBlink 1s step-end infinite; }

    /* ===== CSS 动画 7: pulse ===== */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }

    /* ===== CSS 动画 8: boxPop ===== */
    @keyframes boxPop {
      0% { transform: scale(0) rotate(-12deg); opacity: 0; }
      50% { transform: scale(1.12) rotate(3deg); }
      70% { transform: scale(0.96) rotate(-1deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* ===== 代码行样式 ===== */
    .code-line {
      padding: 4px 12px;
      font-size: 14px;
      line-height: 1.6;
      border-radius: 6px;
      margin: 1px 6px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .code-line.is-current {
      background: rgba(250, 204, 21, 0.1);
      border-color: rgba(250, 204, 21, 0.3);
      transform: scale(1.02) translateX(8px);
    }

    .code-line.is-current::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(250,204,21,0.08), transparent);
      animation: scanLight 3s ease-in-out infinite;
    }

    .code-line.is-executed {
      opacity: 0.4;
    }

    .code-line .line-number {
      color: #484f59;
      width: 40px;
      display: inline-block;
      text-align: right;
      margin-right: 12px;
      user-select: none;
    }

    .code-line .line-content {
      color: #c9d1d9;
    }

    /* ===== 变量卡片 ===== */
    .var-card {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(251, 191, 36, 0.05));
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: boxPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .var-card.type-int {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05));
      border-color: rgba(251, 191, 36, 0.4);
    }

    .var-card.type-string {
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(34, 197, 94, 0.05));
      border-color: rgba(34, 197, 94, 0.4);
    }

    .var-label {
      font-size: 11px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .var-name {
      font-size: 13px;
      color: #79c0ff;
      margin-bottom: 8px;
    }

    .var-value {
      font-size: 24px;
      font-weight: bold;
      color: #e6edf3;
      font-family: 'SF Mono', monospace;
    }

    .var-address {
      font-size: 10px;
      color: #484f59;
      margin-top: 8px;
    }

    /* ===== 终端 ===== */
    .terminal {
      background: rgba(13, 17, 23, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      font-family: 'SF Mono', monospace;
      font-size: 13px;
    }

    .terminal-line {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }

    .terminal-prompt {
      color: #3fb950;
      font-weight: bold;
    }

    .terminal-output {
      color: #e6edf3;
    }

    /* ===== 按钮 ===== */
    .ctrl-btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: #8b949e;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .ctrl-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.1);
      color: #e6edf3;
    }

    .ctrl-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .ctrl-btn.primary {
      background: linear-gradient(135deg, #238636, #2ea043);
      border-color: rgba(46, 160, 67, 0.4);
      color: #fff;
    }

    /* ===== 面板 ===== */
    .panel {
      background: rgba(22, 27, 34, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
    }

    .panel-title {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== 进度条 ===== */
    .progress-bar {
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #238636, #2ea043);
      transition: width 0.3s ease;
    }

    /* ===== 解说消息 ===== */
    .message {
      background: rgba(255, 255, 255, 0.03);
      border-left: 3px solid #2ea043;
      padding: 10px 12px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 8px;
      font-size: 13px;
      animation: bubbleUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .message.highlight {
      border-color: #f0b724;
      background: rgba(240, 183, 36, 0.1);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // 题目数据
    const questionData = {
      id: 1,
      title: 'printf 格式化输出',
      code: `#include <stdio.h>

int main() {
    int age = 25;
    printf("我今年%d 岁\\n", age);
    return 0;
}`,
      knowledgePoint: 'printf 格式化输出、变量定义'
    };

    // 代码行数据
    const codeLines = [
      { num: 1, content: '#include <stdio.h>', type: 'preprocessor' },
      { num: 2, content: '', type: 'empty' },
      { num: 3, content: 'int main() {', type: 'function' },
      { num: 4, content: '    int age = 25;', type: 'declaration', var: 'age', value: 25 },
      { num: 5, content: '    printf("我今年%d 岁\\n", age);', type: 'function-call' },
      { num: 6, content: '    return 0;', type: 'return' },
      { num: 7, content: '}', type: 'brace' }
    ];

    // 步骤定义
    const steps = [
      {
        step: 0,
        currentLine: -1,
        executedLines: [],
        variables: {},
        output: [],
        message: '程序开始执行，准备加载代码...'
      },
      {
        step: 1,
        currentLine: 0,
        executedLines: [0],
        variables: {},
        output: [],
        message: '第 1 行：预处理指令，包含 stdio.h 头文件，提供 printf 函数声明'
      },
      {
        step: 2,
        currentLine: 2,
        executedLines: [0, 2],
        variables: {},
        output: [],
        message: '第 3 行：main 函数入口，程序开始执行'
      },
      {
        step: 3,
        currentLine: 3,
        executedLines: [0, 2, 3],
        variables: { age: { value: 25, type: 'int', address: '0x7fff5fbff8ac' } },
        output: [],
        message: '第 4 行：定义 int 类型变量 age，分配 4 字节内存，初始化为 25'
      },
      {
        step: 4,
        currentLine: 4,
        executedLines: [0, 2, 3, 4],
        variables: { age: { value: 25, type: 'int', address: '0x7fff5fbff8ac' } },
        output: [],
        message: '第 5 行：调用 printf 函数，格式化字符串，%d 占位符等待变量替换'
      },
      {
        step: 5,
        currentLine: 4,
        executedLines: [0, 2, 3, 4],
        variables: { age: { value: 25, type: 'int', address: '0x7fff5fbff8ac' } },
        output: ['我今年 25 岁'],
        message: 'printf 输出：读取 age 的值 (25)，替换%d，在终端显示"我今年 25 岁"'
      },
      {
        step: 6,
        currentLine: 5,
        executedLines: [0, 2, 3, 4, 5],
        variables: { age: { value: 25, type: 'int', address: '0x7fff5fbff8ac' } },
        output: ['我今年 25 岁'],
        message: '第 6 行：return 0，程序正常结束，返回状态码 0 给操作系统'
      },
      {
        step: 7,
        currentLine: -1,
        executedLines: [0, 2, 3, 4, 5],
        variables: {},
        output: ['我今年 25 岁'],
        message: '程序执行完毕，main 函数返回，栈帧销毁，变量 age 释放'
      }
    ];

    function App() {
      // 状态声明
      const [step, setStep] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [speed, setSpeed] = useState(1500);
      const msgScrollRef = useRef(null);

      // 当前步骤数据
      const currentStep = steps[step] || steps[0];

      // 自动播放
      useEffect(() => {
        if (isPlaying && step < steps.length - 1) {
          const timer = setTimeout(() => {
            setStep(prev => prev + 1);
          }, speed);
          return () => clearTimeout(timer);
        } else if (step >= steps.length - 1) {
          setIsPlaying(false);
        }
      }, [isPlaying, step, speed]);

      // 消息面板滚动
      useEffect(() => {
        if (msgScrollRef.current) {
          msgScrollRef.current.scrollTop = 0;
        }
      }, [step]);

      // 导航函数
      const nextStep = useCallback(() => {
        setStep(prev => Math.min(steps.length - 1, prev + 1));
      }, []);

      const prevStep = useCallback(() => {
        setStep(prev => Math.max(0, prev - 1));
      }, []);

      const reset = useCallback(() => {
        setStep(0);
        setIsPlaying(false);
      }, []);

      const togglePlay = useCallback(() => {
        setIsPlaying(prev => !prev);
      }, []);

      // 键盘快捷键
      useEffect(() => {
        const handleKey = (e) => {
          switch(e.key) {
            case 'ArrowRight':
            case ' ':
              e.preventDefault();
              nextStep();
              break;
            case 'ArrowLeft':
              e.preventDefault();
              prevStep();
              break;
            case 'Enter':
              e.preventDefault();
              togglePlay();
              break;
            case 'r':
            case 'R':
              e.preventDefault();
              reset();
              break;
          }
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [nextStep, prevStep, reset, togglePlay]);

      // 渲染代码行
      const renderCodeLine = (line, index) => {
        const isCurrent = currentStep.currentLine === index;
        const isExecuted = currentStep.executedLines.includes(index);

        return (
          <div
            key={index}
            className={`code-line ${isCurrent ? 'is-current' : ''} ${isExecuted && !isCurrent ? 'is-executed' : ''}`}
          >
            <span className="line-number">{line.num}</span>
            <span className="line-content">
              <span style={{ color: line.type === 'preprocessor' ? '#79c0ff' : line.type === 'function' ? '#d2a8ff' : '#c9d1d9' }}>
                {line.content}
              </span>
            </span>
          </div>
        );
      };

      // 渲染变量卡片
      const renderVarCards = () => {
        const vars = currentStep.variables;
        if (!vars || Object.keys(vars).length === 0) {
          return (
            <div className="text-center py-8 text-gray-500">
              暂无变量
            </div>
          );
        }

        return (
          <div className="grid grid-cols-1 gap-3">
            {Object.entries(vars).map(([name, data]) => (
              <div key={name} className={`var-card type-${data.type}`}>
                <div className="var-label">{data.type}</div>
                <div className="var-name">{name}</div>
                <div className="var-value" key={data.value}>
                  {data.value}
                </div>
                <div className="var-address">{data.address}</div>
              </div>
            ))}
          </div>
        );
      };

      return (
        <div className="h-screen flex flex-col overflow-hidden">
          {/* 顶部栏 */}
          <div className="flex-shrink-0 px-4 py-3 flex items-center justify-between border-b border-white/10"
               style={{ background: 'linear-gradient(90deg, rgba(15,20,30,0.98), rgba(20,25,35,0.98))' }}>
            <div className="flex items-center gap-3">
              <div className="flex gap-2">
                <div className="w-3 h-3 rounded-full bg-red-500"></div>
                <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div className="w-3 h-3 rounded-full bg-green-500"></div>
              </div>
              <span className="text-sm text-gray-400">main.c</span>
              <span className="text-xs text-gray-500">题目 #{questionData.id}</span>
            </div>

            <div className="flex items-center gap-2">
              <button className="ctrl-btn" onClick={prevStep} disabled={step === 0}>
                ◀
              </button>
              <button className="ctrl-btn primary" onClick={togglePlay}>
                {isPlaying ? '⏸ 暂停' : '▶ 播放'}
              </button>
              <button className="ctrl-btn" onClick={nextStep} disabled={step >= steps.length - 1}>
                ▶▶
              </button>
              <button className="ctrl-btn" onClick={reset}>
                ↻ 重置
              </button>
            </div>

            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-500">速度</span>
              <input
                type="range"
                min="500"
                max="3000"
                step="100"
                value={speed}
                onChange={(e) => setSpeed(Number(e.target.value))}
                className="w-24"
              />
              <span className="text-xs text-gray-400 w-12">{speed}ms</span>
            </div>
          </div>

          {/* 主体 */}
          <div className="flex-1 flex overflow-hidden">
            {/* 左侧：代码区 */}
            <div className="flex-[3] flex flex-col border-r border-white/10 overflow-hidden">
              <div className="flex-1 overflow-auto py-3">
                {codeLines.map(renderCodeLine)}
              </div>

              {/* 终端 */}
              <div className="h-28 flex-shrink-0 border-t border-white/10 p-3">
                <div className="terminal h-full overflow-auto">
                  <div className="text-xs text-gray-500 mb-2">$ 程序输出</div>
                  {currentStep.output.map((line, i) => (
                    <div key={i} className="terminal-line anim-fade-in">
                      <span className="terminal-prompt">$</span>
                      <span className="terminal-output">{line}</span>
                    </div>
                  ))}
                  {currentStep.output.length === 0 && (
                    <div className="text-gray-600 text-sm">等待输出...</div>
                  )}
                </div>
              </div>
            </div>

            {/* 右侧：可视化区 */}
            <div className="flex-[2] flex flex-col overflow-hidden p-4 gap-4">
              {/* 变量面板 */}
              <div className="panel">
                <div className="panel-title">
                  <span>📦</span> 内存变量
                </div>
                {renderVarCards()}
              </div>

              {/* 解说面板 */}
              <div className="panel flex-1 overflow-auto" ref={msgScrollRef}>
                <div className="panel-title">
                  <span>💡</span> 执行解说
                </div>
                <div className="message highlight anim-bubble-up">
                  {currentStep.message}
                </div>
              </div>
            </div>
          </div>

          {/* 进度条 */}
          <div className="h-1 flex-shrink-0 bg-white/5">
            <div
              className="progress-fill"
              style={{ width: `${(step / (steps.length - 1)) * 100}%` }}
            ></div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
