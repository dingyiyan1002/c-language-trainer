<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="50" cy="50" r="48" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- C 语言标志 - 大写的 C -->
  <text x="50" y="65" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="55" 
        font-weight="bold"
        fill="url(#codeGradient)"
        text-anchor="middle"
        filter="url(#shadow)">C</text>
  
  <!-- 装饰性的代码符号 -->
  <text x="20" y="25" 
        font-family="monospace" 
        font-size="14" 
        fill="#ffffff"
        opacity="0.8">&lt;/&gt;</text>
  
  <!-- 底部装饰线 -->
  <path d="M 25 80 L 75 80" 
        stroke="#fbbf24" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.6"/>
  
  <!-- 小圆点装饰 -->
  <circle cx="30" cy="20" r="3" fill="#fbbf24" opacity="0.7"/>
  <circle cx="70" cy="25" r="2" fill="#fbbf24" opacity="0.5"/>
  <circle cx="75" cy="70" r="2.5" fill="#fbbf24" opacity="0.6"/>
</svg>
