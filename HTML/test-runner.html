<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C 语言可视化 - 测试启动器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .panel {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .chapter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .chapter-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .chapter-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-color: #667eea;
        }
        .chapter-card h3 {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 8px;
        }
        .chapter-card p {
            color: #666;
            font-size: 0.9em;
        }
        .file-list {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .file-item {
            background: white;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid #667eea;
        }
        .file-item:hover {
            background: #f0f4ff;
            transform: translateX(5px);
        }
        .file-item.active {
            background: #667eea;
            color: white;
        }
        .preview-frame {
            width: 100%;
            height: 700px;
            border: 4px solid #667eea;
            border-radius: 8px;
            background: white;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border-left: 4px solid #667eea;
        }
        .status strong {
            color: #667eea;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 C 语言可视化教学系统 - 测试启动器</h1>

        <!-- 章节选择 -->
        <div class="panel">
            <h2>📚 选择章节</h2>
            <div class="chapter-grid" id="chapterGrid"></div>
        </div>

        <!-- 文件列表 -->
        <div class="panel" id="filePanel" style="display: none;">
            <h2 id="chapterTitle">📄 文件列表</h2>
            <div class="file-list" id="fileList"></div>
        </div>

        <!-- 预览区域 -->
        <div class="panel" id="previewPanel" style="display: none;">
            <h2>🖥️ 预览</h2>
            <div class="controls">
                <button onclick="loadCurrentFile()">🔄 重新加载</button>
                <button onclick="openInNewWindow()">🔗 新窗口打开</button>
                <button onclick="copyData()">📋 复制数据</button>
            </div>
            <div class="status" id="status">
                <strong>当前文件：</strong> <span id="currentFile">未选择</span>
            </div>
            <iframe id="previewFrame" class="preview-frame" style="display: none;"></iframe>
        </div>
    </div>

    <script>
        const CHAPTERS = [
            { name: '基础入门', dir: '基础入门', files: [] },
            { name: 'Level1', dir: 'Level1', files: [] },
            { name: 'Level2', dir: 'Level2', files: [] },
            { name: 'Level3', dir: 'Level3', files: [] },
            { name: 'Level4', dir: 'Level4', files: [] },
            { name: 'Level5', dir: 'Level5', files: [] },
            { name: '面试专题', dir: '面试专题', files: [] },
            { name: '基础语法入门', dir: '基础语法入门', files: [] },
            { name: '变量与数据类型', dir: '变量与数据类型', files: [] },
            { name: '运算符与表达式', dir: '运算符与表达式', files: [] },
            { name: '控制流语句', dir: '控制流语句', files: [] },
            { name: '函数', dir: '函数', files: [] },
            { name: '数组', dir: '数组', files: [] },
            { name: '指针陷阱', dir: '指针陷阱', files: [] },
            { name: '内存安全', dir: '内存安全', files: [] },
            { name: 'Linux 系统编程', dir: 'Linux 系统编程', files: [] },
            { name: 'Linux 常用命令', dir: 'Linux 常用命令', files: [] },
            { name: '嵌入式 Linux 应用', dir: '嵌入式 Linux 应用', files: [] },
            { name: 'C++ 基础入门', dir: 'C++ 基础入门', files: [] }
        ];

        let currentChapter = null;
        let currentFile = null;

        // 初始化章节列表
        function initChapters() {
            const grid = document.getElementById('chapterGrid');
            grid.innerHTML = '';

            CHAPTERS.forEach((chapter, index) => {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.innerHTML = `
                    <h3>${chapter.name}</h3>
                    <p id="count-${index}">加载中...</p>
                `;
                card.onclick = () => loadChapter(index);
                grid.appendChild(card);
            });
        }

        // 加载章节文件列表
        async function loadChapter(index) {
            currentChapter = CHAPTERS[index];
            document.getElementById('filePanel').style.display = 'block';
            document.getElementById('chapterTitle').textContent = `📄 ${currentChapter.name} - 文件列表`;

            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<div class="loading">正在扫描文件...</div>';

            try {
                // 使用 fetch API 尝试获取文件列表
                const response = await fetch(`${currentChapter.dir}/`);
                if (response.ok) {
                    const text = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(text, 'text/html');
                    const links = Array.from(doc.querySelectorAll('a'))
                        .map(a => a.getAttribute('href'))
                        .filter(href => href && href.endsWith('.js'));

                    currentChapter.files = links;
                    displayFiles();
                } else {
                    throw new Error('无法访问目录');
                }
            } catch (error) {
                // 如果无法自动扫描，显示手动输入提示
                fileList.innerHTML = `
                    <div class="status">
                        <strong>⚠️ 无法自动扫描文件</strong><br>
                        请将生成的 .js 文件放在 <code>HTML/${currentChapter.dir}/</code> 目录下<br>
                        或者确保你已经将 engine_v1.html 放在 HTML 目录
                    </div>
                `;
            }
        }

        // 显示文件列表
        function displayFiles() {
            const fileList = document.getElementById('fileList');
            const countEl = document.getElementById(`count-${CHAPTERS.indexOf(currentChapter)}`);
            
            countEl.textContent = `${currentChapter.files.length} 个文件`;

            if (currentChapter.files.length === 0) {
                fileList.innerHTML = '<div class="status">暂无文件，请先生成数据</div>';
                return;
            }

            fileList.innerHTML = '';
            currentChapter.files.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.textContent = file;
                item.onclick = () => selectFile(file, index);
                fileList.appendChild(item);
            });
        }

        // 选择文件
        function selectFile(filename, index) {
            currentFile = filename;
            document.getElementById('currentFile').textContent = filename;
            document.getElementById('previewPanel').style.display = 'block';

            // 高亮选中
            document.querySelectorAll('.file-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            loadCurrentFile();
        }

        // 加载文件到 iframe
        function loadCurrentFile() {
            if (!currentFile || !currentChapter) return;

            const frame = document.getElementById('previewFrame');
            frame.style.display = 'block';

            // 创建临时 HTML，注入 engine_v1.html 和数据文件
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>${currentFile}</title>
                    <style>body { margin: 0; }</style>
                </head>
                <body>
                    <script>
                        // 这里会加载数据文件
                    <\/script>
                    <script src="${currentChapter.dir}/${currentFile}"><\/script>
                    <!-- 注意：你需要手动将 engine_v1.html 的内容复制到这里 -->
                </body>
                </html>
            `;

            frame.srcdoc = html;
        }

        // 在新窗口打开
        function openInNewWindow() {
            if (!currentFile || !currentChapter) return;
            const url = `${currentChapter.dir}/${currentFile}`;
            window.open(url, '_blank');
        }

        // 复制数据
        function copyData() {
            if (!currentFile || !currentChapter) return;
            alert('提示：数据文件是纯 JS 文件，你可以直接用文本编辑器打开复制 LESSON_DATA 对象');
        }

        // 初始化
        initChapters();
    </script>
</body>
</html>
